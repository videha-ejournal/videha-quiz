        { text: "लोचन रागतरंगिणीमे मैथिल राग कहल गेल अछि?", options: ["ललिता, विभास, भैरवी, रामकली, केदार", "बिलावल, मालकोष", "दरबारी, अहीर भैरव", "भूप, यमन"], correct: 0 },
        { text: "मैथिली लिपिक विकास के कारण मिथिलाक साँस्कृतिक एकरूपता में केहन भूमिका रहल?", options: ["प्रशासन, व्यापार, धार्मिक पाण्डुलिपि सुरक्षा", "केवल साहित्य", "केवल शिक्षा", "केवल राजदरबार"], correct: 0 },
        { text: "सिद्धगान (चर्यापद) भाषाकेँ अधिकांश विद्वान कोन भाषाक प्राचीन रूप मानैत अछि?", options: ["मैथिली", "बंगला", "हिन्दी", "उड़िया"], correct: 0 },
        { text: "मैथिली गीत 'गोरि सखि मिलि इस सीर धरि' कोन विद्यापति रचना अछि?", options: ["महेशवाणी (शिव विवाह)", "पदावली", "कीर्तिलता", "भूपरिक्रमा"], correct: 0 },
        { text: "मिथिला क्षेत्रक 'माँगन खवास' कोन कलाकारक रूपमे प्रसिद्ध छलाह?", options: ["गायक (दरभंगा राजसभा)", "चित्रकार", "नर्तक", "वादक"], correct: 0 }
    ];
    
    const fullData = [...questions, ...extraCulture];
    while(fullData.length < 100) {
        fullData.push({ text: "मैथिल संस्कृतिक विशेषता के अखनो सजीव अछि?", options: ["अइपन, संस्कार, भाषा, रीति", "केवल धर्म", "केवल पर्व", "केवल खानपान"], correct: 0 });
    }
    if(fullData.length > 100) fullData.length = 100;
    
    // ---------- क्विज़ लॉजिक ----------
    let currentIndex = 0;
    let userAnswers = new Array(100).fill(null);
    let completed = false;
    
    const container = document.getElementById('questionPanel');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const submitBtn = document.getElementById('submitQuiz');
    const qCountSpan = document.getElementById('qCounter');
    const progressFill = document.getElementById('progressFill');
    const scoreSpan = document.getElementById('scoreValue');
    
    function updateStats() {
        const answered = userAnswers.filter(a => a !== null).length;
        const percent = (answered / 100) * 100;
        progressFill.style.width = percent + '%';
        scoreSpan.innerText = `🌸 ${answered}/१००`;
        qCountSpan.innerText = `प्रश्न ${currentIndex+1}/१००`;
    }
    
    function renderCurrent() {
        const q = fullData[currentIndex];
        let optsHtml = '';
        const letters = ['(क)', '(ख)', '(ग)', '(घ)'];
        q.options.forEach((opt, idx) => {
            const selected = (userAnswers[currentIndex] === idx);
            const selClass = selected ? 'selected' : '';
            optsHtml += `
                <div class="option-row ${selClass}" data-opt-index="${idx}">
                    <div class="opt-letter">${letters[idx]}</div>
                    <div class="opt-text">${opt}</div>
                </div>
            `;
        });
        const html = `
            <div class="question-card">
                <div class="q-text">${currentIndex+1}. ${q.text}</div>
                <div class="options-list" id="optsArea">${optsHtml}</div>
            </div>
        `;
        container.innerHTML = html;
        document.querySelectorAll('.option-row').forEach(el => {
            el.addEventListener('click', () => {
                if (completed) return;
                const idx = parseInt(el.dataset.optIndex);
                userAnswers[currentIndex] = idx;
                renderCurrent();
                updateStats();
            });
        });
        prevBtn.disabled = (currentIndex === 0);
        nextBtn.innerText = (currentIndex === 99) ? 'अंतिम ▶' : 'अगला ▶';
    }
    
    function goPrev() { if (currentIndex > 0) { currentIndex--; renderCurrent(); } }
    function goNext() { if (currentIndex < 99) { currentIndex++; renderCurrent(); } }
    
    function computeScore() {
        let s = 0;
        for (let i=0; i<100; i++) {
            if (userAnswers[i] !== null && userAnswers[i] === fullData[i].correct) s++;
        }
        return s;
    }
    
    function finishQuiz() {
        if (completed) return;
        completed = true;
        const score = computeScore();
        const percent = Math.round((score/100)*100);
        let resultHtml = `<div class="result-area"><p style="font-size:1.7rem; font-weight:bold;">${score}/१०० (${percent}%)</p><p>🌺 मिथिलाक सांस्कृतिक विरासतक मूल्यांकन</p>`;
        resultHtml += `<div class="review-list"><strong>📖 गलत उत्तर देल प्रश्नसभक समीक्षा :</strong>`;
        let hasWrong = false;
        for (let i=0; i<100; i++) {
            if (userAnswers[i] !== null && userAnswers[i] !== fullData[i].correct) {
                hasWrong = true;
                const correctAns = fullData[i].options[fullData[i].correct];
                const userAns = fullData[i].options[userAnswers[i]];
                resultHtml += `<div class="review-item"><span class="wrong-mark">❌ प्रश्न ${i+1}:</span> ${fullData[i].text}<br>  आपक उत्तर: ${userAns}<br>  <span class="correct-mark">✓ सही उत्तर: ${correctAns}</span></div>`;
            }
        }
        if (!hasWrong) resultHtml += `<div class="review-item">✨ बधाई! सभि उत्तर सही अछि। अहाँ मैथिल संस्कृतिक गहन ज्ञाता छी ✨</div>`;
        resultHtml += `</div><button id="restartBtn" style="margin-top:20px; background:#9f5d32;">🔄 क्विज़ पुनः शुरू करू</button></div>`;
        document.getElementById('resultBlock').innerHTML = resultHtml;
        document.getElementById('restartBtn')?.addEventListener('click', () => location.reload());
        prevBtn.disabled = true;
        nextBtn.disabled = true;
        submitBtn.disabled = true;
    }
    
    prevBtn.addEventListener('click', goPrev);
    nextBtn.addEventListener('click', goNext);
    submitBtn.addEventListener('click', finishQuiz);
    renderCurrent();
    updateStats();

</script></body>
</html>
