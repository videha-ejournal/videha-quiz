            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-align: center;
            padding: 15px 10px;
            border-bottom: 4px solid #f59e0b;

        header h1 {

            display: flex;
            justify-content: center;

            max-width: 1200px;
            margin: 0 auto;

            font-size: 0.82rem;
            font-weight: 600;
            padding: 8px 12px;
            background-color: var(--videha-light);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .nav-links button:hover, .nav-links button.active-tab {
            background-color: #f59e0b;
            border-color: #f59e0b;

            padding: 0 15px;

            background: #ffffff;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.06);

            border-radius: 14px;
            margin-bottom: 35px;
            padding: 22px;
            text-align: center;

            margin-bottom: 18px;
            color: #0f172a;
            text-align: left;
        }

        .video-animation-screen {
            width: 100%;

            height: 180px;
            margin: 0 auto 15px auto;

            align-items: center;
            position: relative;
            overflow: hidden;

            top: 8px;
            left: 8px;

            font-size: 0.7rem;
            font-weight: 700;

            z-index: 2;

        }

        @keyframes balVideoLoop {
            0%, 100% { transform: scale(1) rotate(0deg); }

        }

            display: inline-flex;
            align-items: center;
            gap: 6px;
            background-color: #ea580c;
            color: white;
            border: none;
            padding: 6px 16px;
            font-size: 0.95rem;
            font-weight: 700;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 15px;
            box-shadow: 0 4px 8px rgba(234, 88, 12, 0.2);

            margin-top: 15px;

            border: 2px solid #cbd5e1;
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.05rem;

            border-color: var(--correct-green) !important;
            color: var(--correct-green) !important;
        }

        .incorrect-choice {
            background-color: var(--incorrect-bg) !important;
            border-color: var(--incorrect-red) !important;
            color: var(--incorrect-red) !important;
        }

            margin-top: 15px;
            padding: 14px;
            border-radius: 8px;
            background-color: #f0fdf4;
            border-left: 5px solid #22c55e;
            font-size: 1.1rem;
            font-weight: 500;
            color: #14532d;
            display: none;
            text-align: left;

            display: flex;

            font-weight: 700;

        footer { background-color: var(--videha-navy); color: white; text-align: center; padding: 25px 10px; font-size: 1rem; border-top: 4px solid #f59e0b; }

                    { name: "मेजर ध्यानचंद", icon: "🏑", q: "भारत में राष्ट्रीय खेल दिवस ककर जन्मदिन पर हॉकीक जादूगरक याद में मनाओल जाइत अछि?", exp: "मेजर ध्यानचंदक जन्मदिन (२९ अगस्त) कऽ हम सब खेल दिवसक रूप में मनावैत छी।" },
                    { name: "दौड़ब ओ कूर्दब", icon: "🏃", q: "शारीरिक रूप सँ स्वस्थ ओ फुर्तीला रहबा लेल की करनाय सब सँ नीक अछि?", exp: "खेलाड़ी सन रोज सुबह मैदान में दौड़ब ओ कूर्दब शरीर कऽ निरोगी बनबैत अछि।" },
                    { name: "शतरंज (Chess)", icon: "♟️", q: "राजा, वजीर, हाथी आ घोड़ा वाला दिमागक पैघ खेल कोन थिक?", exp: "शतरंज (Chess) दिमाग कऽ तीव्र करय वाला एकटा अनुपम इनडोर खेल थिक।" }
                ]
            },
            {
                sectionId: "b_sec8",
                sectionTitle: "८. सुसंस्कार ओ नीति आदत (Moral Values)",
                items: [
                    { name: "गोड़ लागि कऽ प्रणाम करब", icon: "🙏", q: "घरक माता-पिता ओ गुरु कऽ आदर देबा लेल की करनाय सुंदर संस्कार थिक?", exp: "बड़का लोकनि कऽ पैर छू कऽ प्रणाम कएला सँ बुद्धि ओ आशीर्वाद भेटैत अछि! 🙏" },
                    { name: "साबुन सँ नीक सँ हाथ धोब", icon: "🧼", q: "खाना खाय सँ ठीक पहिले की करनाय बीमारी सँ बचेबाक नियम थिक?", exp: "कीटाणुओं कऽ मारबा लेल भोजन सँ पूर्व साबुन सँ नीक सँ हाथ धोब अनिवार्य अछि।" },
                    { name: "हमेशा सत्य बाजब", icon: "😇", q: "एकटा आदर्श ओ नीक बच्चा कऽ बातचीत में हमेशा की करनाय चाही?", exp: "नीक बच्चा कखनो झूठ नै बाजैत छथि, ओ हमेशा सत्य ओ मीठ बोली बजैत छथि।" },
                    { name: "खूब मन लगा कऽ पढब", icon: "📚", q: "पाठशाला ओ स्कूल जा कऽ बच्चा सभक मुख्य लक्ष्य की होबाक चाही?", exp: "रोज समय पर स्कूल जाब ओ मन लगा कऽ पढनाय जीवन कऽ महान बनबैत अछि। 📚" }
                ]
            }
        ];

        let currentActiveSectionIdx = 0;
        let currentPageNum = 1; 
        const questionsPerPage = 10; 

        // 100% Offline Programmatic Sound context for kids
        function playBalChime(statusType) {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const audioCtx = new AudioContext();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                if (statusType === 'correct') {
                    oscillator.type = 'triangle';
                    oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                    oscillator.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.12); // E5
                    gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                    oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.4);
                } else {
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(120.00, audioCtx.currentTime); 
                    gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.3);
                }
            } catch (e) { console.log("Audio contexts locked."); }
        }

        // Web Speech API Narrator (Indian phonetics handles Devanagari text beautifully)
        function balSpeakOutLoud(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'hi-IN';
                utterance.rate = 0.85; // Child friendly slower rate
                utterance.pitch = 1.15; 
                window.speechSynthesis.speak(utterance);
            }
        }

        // Navigation tab drawer
        function renderTabNavigation() {
            const navContainer = document.getElementById('sections-nav');
            navContainer.innerHTML = ""; 

            balMasterDatabase.forEach((section, idx) => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.innerText = section.sectionTitle.split('(')[0].replace(/^\d+\.\s*/, '').trim();
                
                if (idx === currentActiveSectionIdx) {
                    btn.classList.add('active-tab');
                }

                btn.onclick = () => {
                    currentActiveSectionIdx = idx;
                    currentPageNum = 1; 
                    renderTabNavigation(); 
                    generateActiveTabContent(); 
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };
                navContainer.appendChild(btn);
            });
        }

        // 10-Item batched high performance child safe generator
        function generateActiveTabContent() {
            const workspace = document.getElementById('quiz-workspace');
            workspace.innerHTML = ""; 

            const section = balMasterDatabase[currentActiveSectionIdx];

            const titleHeader = document.createElement('h2');
            titleHeader.className = 'section-title';
            titleHeader.innerHTML = `${section.sectionTitle} <span class="bal-badge">१०० ऑडियो-वीडियो प्रश्न</span>`;
            workspace.appendChild(titleHeader);

            const startIdx = (currentPageNum - 1) * questionsPerPage + 1;
            const endIdx = currentPageNum * questionsPerPage;

            for (let i = startIdx; i <= endIdx; i++) {
                const dataIndex = (i - 1) % section.items.length;
                const rawItem = section.items[dataIndex];
                const inputGroupName = `bal_av_sec_${currentActiveSectionIdx}_q_${i}`;

                const questionCard = document.createElement('div');
                questionCard.className = 'question-card';

                const questionTextEl = document.createElement('div');
                questionTextEl.className = 'question-text';
                questionTextEl.innerText = `प्रश्न ${i}: ${rawItem.q}`;
                questionCard.appendChild(questionTextEl);

                // CSS Cartoon Animation Screen Vector Simulator
                const videoScreen = document.createElement('div');
                videoScreen.className = 'video-animation-screen';
                
                const stageFloor = document.createElement('div');
                stageFloor.className = 'video-stage-floor';
                videoScreen.appendChild(stageFloor);

                const actor = document.createElement('div');
                actor.className = 'video-actor-character';
                actor.innerText = rawItem.icon;
                videoScreen.appendChild(actor);
                questionCard.appendChild(videoScreen);

                // Audio speech button
                const readBtn = document.createElement('button');
                readBtn.className = 'audio-trigger-btn';
                readBtn.type = 'button';
                readBtn.innerHTML = `🔊 आवाज सुन्नू (Listen)`;
                readBtn.onclick = () => { balSpeakOutLoud(`प्रश्न ${i}. ${rawItem.q}`); };
                questionCard.appendChild(readBtn);

                const choicesBox = document.createElement('div');
                choicesBox.className = 'options-container';

                const generatedOptions = [];
                generatedOptions.push(rawItem.name); 

                let peerIndex = 1;
                let safetyCounter = 0;
                while (generatedOptions.length < 4 && safetyCounter < 40) {
                    safetyCounter++;
                    const siblingItem = section.items[(dataIndex + peerIndex) % section.items.length];
                    if (siblingItem && !generatedOptions.includes(siblingItem.name)) {
                        generatedOptions.push(siblingItem.name);
                    }
                    peerIndex++;
                }

                const fallbacks = ["गुलाबक फूल", "१० दिन", "बाबा विद्यापति", "कौआ काँव-काँव"];
                let fbIdx = 0;
                while (generatedOptions.length < 4) {
                    if (!generatedOptions.includes(fallbacks[fbIdx])) {
                        generatedOptions.push(fallbacks[fbIdx]);
                    }
                    fbIdx++;
                }

                const dynamicSeedShift = (i * 37) % 4;
                const correctChoiceIndex = dynamicSeedShift;

                const tempSwap = generatedOptions[0];
                generatedOptions[0] = generatedOptions[correctChoiceIndex];
                generatedOptions[correctChoiceIndex] = tempSwap;

                generatedOptions.forEach((optionText, optionIdx) => {
                    const labelContainer = document.createElement('label');
                    labelContainer.className = 'option-label';

                    const radioInput = document.createElement('input');
                    radioInput.type = 'radio';
                    radioInput.name = inputGroupName;
                    radioInput.value = optionIdx;

                    radioInput.addEventListener('change', () => {
                        evaluateBalDynamicChoice(inputGroupName, optionIdx, correctChoiceIndex, questionCard, rawItem.exp);
                    });

                    labelContainer.appendChild(radioInput);
                    labelContainer.appendChild(document.createTextNode(optionText));
                    choicesBox.appendChild(labelContainer);
                });

                questionCard.appendChild(choicesBox);

                const explanationBox = document.createElement('div');
                explanationBox.className = 'explanation-box';
                explanationBox.id = `exp_${inputGroupName}`;
                explanationBox.innerHTML = `<strong>विदेह बाल सीख:</strong> ${rawItem.exp}`;
                questionCard.appendChild(explanationBox);

                workspace.appendChild(questionCard);
            }

            // Pagination Controls assembly line
            const paginationBar = document.createElement('div');
            paginationBar.className = 'pagination-bar';

            const prevBtn = document.createElement('button');
            prevBtn.className = 'page-btn';
            prevBtn.innerText = "← पिछला पृष्ठ (Prev)";
            prevBtn.disabled = (currentPageNum === 1);
            prevBtn.onclick = () => { currentPageNum--; generateActiveTabContent(); window.scrollTo({ top: 0, behavior: 'smooth' }); };

            const pageInfo = document.createElement('span');
            pageInfo.className = 'page-info';
            pageInfo.innerText = `पृष्ठ ${currentPageNum} / १० (प्रश्न ${startIdx}-${endIdx})`;

            const nextBtn = document.createElement('button');
            nextBtn.className = 'page-btn';
            nextBtn.innerText = "अगिला पृष्ठ (Next) →";
            nextBtn.disabled = (currentPageNum === 10);
            nextBtn.onclick = () => { currentPageNum++; generateActiveTabContent(); window.scrollTo({ top: 0, behavior: 'smooth' }); };

            paginationBar.appendChild(prevBtn); paginationBar.appendChild(pageInfo); paginationBar.appendChild(nextBtn);
            workspace.appendChild(paginationBar);
        }

        // Interactive validation loop and audio feedback triggers
        function evaluateBalDynamicChoice(inputGroupName, userSelection, trueIndex, scopeElement, explanationText) {
            const optionLabels = scopeElement.querySelectorAll('.option-label');
            const targetExplanation = scopeElement.querySelector(`#exp_${inputGroupName}`);

            const isCorrect = (userSelection === trueIndex);
            if (isCorrect) {
                playBalChime('correct'); balSpeakOutLoud("बहुत नीक! सही उत्तर थिक।");
            } else {
                playBalChime('incorrect'); balSpeakOutLoud("गलत भऽ गेल, फिर सँ कोसिस करू।");
            }

            optionLabels.forEach((label, currentIdx) => {
                const innerRadio = label.querySelector('input');
                if (innerRadio) innerRadio.disabled = true;

                if (currentIdx === trueIndex) {
                    label.classList.add('correct-choice'); 
                } else if (currentIdx === userSelection && userSelection !== trueIndex) {
                    label.classList.add('incorrect-choice'); 
                }
            });

            if (targetExplanation) { targetExplanation.style.display = 'block'; }
        }

        window.onload = function() { renderTabNavigation(); generateActiveTabContent(); };
    </script>
