        document.addEventListener('DOMContentLoaded', () => {
            const tabsHeader = document.getElementById('tabs-header');
            const tabsBody = document.getElementById('tabs-body');
            const tabState = {};

            quizData.forEach((tab, tIndex) => {
                const tabId = 'tab_' + tIndex;
                tabState[tabId] = { score: 0, answered: [], total: tab.questions.length };

                // 1. Create Tab Buttons
                const btn = document.createElement('button');
                btn.className = 'tab-btn' + (tIndex === 0 ? ' active' : '');
                btn.innerText = tab.title;
                btn.onclick = (e) => openTab(e, tabId);
                tabsHeader.appendChild(btn);

                // 2. Create Tab Content Container
                const contentDiv = document.createElement('div');
                contentDiv.id = tabId;
                contentDiv.className = 'tab-content';
                contentDiv.style.display = tIndex === 0 ? 'block' : 'none';

                // 3. Generate Questions
                tab.questions.forEach((qObj, qIndex) => {
                    const qId = `${tabId}_q${qIndex}`;
                    const qBlock = document.createElement('div');
                    qBlock.className = 'question-block';
                    qBlock.id = qId;

                    const qTitle = document.createElement('h3');
                    qTitle.innerText = `प्रश्न ${qIndex + 1}. ${qObj.q}`;
                    qBlock.appendChild(qTitle);

                    const ul = document.createElement('ul');
                    ul.className = 'options-list';

                    qObj.o.forEach((optText, oIndex) => {
                        const li = document.createElement('li');
                        const label = document.createElement('label');
                        label.className = 'option-label';
                        
                        const input = document.createElement('input');
                        input.type = 'radio';
                        input.name = qId;
                        input.value = (oIndex === qObj.a) ? 'correct' : 'wrong';
                        
                        input.onclick = function() {
                            evaluateAnswer(this, qId, oIndex === qObj.a, tabId);
                        };

                        label.appendChild(input);
                        label.appendChild(document.createTextNode(' ' + optText));
                        li.appendChild(label);
                        ul.appendChild(li);
                    });
                    qBlock.appendChild(ul);

                    const expDiv = document.createElement('div');
                    expDiv.id = 'exp-' + qId;
                    expDiv.className = 'explanation';
                    expDiv.innerHTML = `<strong>व्याख्या:</strong> ${qObj.e}`;
                    qBlock.appendChild(expDiv);

                    contentDiv.appendChild(qBlock);
                });

                // 4. Submit Section
                const submitSection = document.createElement('div');
                submitSection.className = 'submit-section';
                
                const submitBtn = document.createElement('button');
                submitBtn.className = 'submit-btn';
                submitBtn.innerText = 'Evaluate / Submit ' + tab.title.split(':')[0];
                submitBtn.onclick = () => showTabScore(tabId);
                
                const resultDiv = document.createElement('div');
                resultDiv.id = 'result-' + tabId;
                resultDiv.className = 'result-score';

                submitSection.appendChild(submitBtn);
                submitSection.appendChild(resultDiv);
                contentDiv.appendChild(submitSection);

                tabsBody.appendChild(contentDiv);
            });

            // Logic Functions
            window.openTab = function(evt, tabId) {
                const contents = document.getElementsByClassName("tab-content");
                for (let i = 0; i < contents.length; i++) {
                    contents[i].style.display = "none";
                }
                const btns = document.getElementsByClassName("tab-btn");
                for (let i = 0; i < btns.length; i++) {
                    btns[i].className = btns[i].className.replace(" active", "");
                }
                document.getElementById(tabId).style.display = "block";
                evt.currentTarget.className += " active";
            };

            window.evaluateAnswer = function(radioBtn, qId, isCorrect, tabId) {
                if (tabState[tabId].answered.includes(qId)) return;
                tabState[tabId].answered.push(qId);

                const questionBlock = document.getElementById(qId);
                const labels = questionBlock.querySelectorAll('.option-label');
                const explanation = document.getElementById('exp-' + qId);

                labels.forEach(label => {
                    label.classList.add('disabled-option');
                    const input = label.querySelector('input');
                    input.disabled = true;
                    if(input.value === 'correct') {
                        label.classList.add('correct-ans');
                    }
                });

                const clickedLabel = radioBtn.parentElement;
                if (isCorrect) {
                    tabState[tabId].score++;
                } else {
                    clickedLabel.classList.add('incorrect-ans');
                }

                explanation.style.display = 'block';
            };

            window.showTabScore = function(tabId) {
                const resultDiv = document.getElementById('result-' + tabId);
                const state = tabState[tabId];
                
                if(state.answered.length < state.total) {
                    resultDiv.innerHTML = "कृपया एहि भागक सबहि प्रश्नक उत्तर दिअ।";
                    resultDiv.style.color = "#dc3545";
                } else {
                    resultDiv.innerHTML = `एहि भागमे अहाँक प्राप्तांक: ${state.score} / ${state.total}`;
                    resultDiv.style.color = "#000080";
                }
            };
        });
    </script>
