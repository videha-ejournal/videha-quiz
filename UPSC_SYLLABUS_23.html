                    { q: "मैथिली सँ अंग्रेजीमे अनुवादक समकालीन रुझान की अछि?", o: ["एकदम नहि भऽ रहल अछि", "मैथिलीक उत्कृष्ट रचनासभकें वैश्विक मंच (Global Audience) धरि पहुँचाएब", "केवल कविताक अनुवाद", "पैसा कमाबय लेल"], a: 1, e: "मैथिली साहित्यकें वैश्विक स्तर पर पहचान दिअबाक लेल समकालीन लेखक अपन वा अन्यक रचनाकें अंग्रेजीमे अनुवाद कऽ रहल छथि।" },

            {

                    { q: "मैथिली साहित्यमे समकालीन 'कवर ब्लर्ब' (Cover Blurb - पाछाँ लिखल संक्षिप्त परिचय) क की महत्व अछि?", o: ["कोनो महत्व नहि", "पाठकसभकें पुस्तकक मूल विमर्श आ वैचारिक पीठिका (Synopsis) सँ तुरंत परिचित कराबय लेल", "लेखकक फोटो लेल", "किताबक मूल्य बढ़ाबय लेल"], a: 1, e: "आधुनिक प्रकाशनमे ब्लर्ब (Back cover text) अत्यन्त महत्वपूर्ण भऽ गेल अछि, ई पाठककें किताबक भीतरक यथार्थ सँ जोड़ैत अछि।" },
                    { q: "समकालीन लेखकसभ अपन पुस्तकक प्रचार-प्रसार लेल डिजिटल कवर (Digital Covers) क उपयोग कतय करैत छथि?", o: ["केवल अलमारीमे", "फेसबुक, व्हाट्सएप्प आ सोशल मीडिया पर विमर्श (Digital Marketing) लेल", "दीवार पर सटा कऽ", "कोनो उपयोग नहि"], a: 1, e: "आकर्षक डिजिटल कवर सोशल मीडिया पर तुरंत ध्यानाकर्षित करैत अछि आ पुस्तकक डिजिटल मार्केटिंगमे पैघ भूमिका निभावैत अछि।" },
                    { q: "मिथिला चित्रकलामे 'तान्त्रिक मोटिफ' (Tantric motifs - मण्डल, यन्त्र) क प्रयोग समकालीन शोध-ग्रन्थक आवरण पर किएक कएल जाइत अछि?", o: ["डराबय लेल", "नव्य-न्याय वा दार्शनिक/शास्त्रीय शोधक गम्भीरता आ रहस्यमयताकें दर्शाबय लेल", "सुन्दरता लेल", "कोनो कारण नहि"], a: 1, e: "दर्शन वा तार्किक शोध (जेना गंगेश उपाध्याय पर) क ग्रन्थ पर यन्त्र वा मण्डलक चित्र ओकर बौद्धिक आ तान्त्रिक गम्भीरताक प्रतीक अछि।" },
                    { q: "समानान्तर आन्दोलनक प्रकाशनसभमे 'लघु-पत्रिका' (Little Magazines) क कवर डिजाइन प्रायः केहन होइत छल?", o: ["अत्यन्त महग", "साधारण, श्वेत-श्याम (Black & White) मुदा वैचारिक रूप सँ अत्यन्त मारक आ विद्रोही", "रंगीन मुदा अर्थहीन", "कोनो कवर नहि"], a: 1, e: "लघु-पत्रिका आन्दोलनक समय संसाधनक कमी छल, मुदा ओकर सादा (B&W) कवर सेहो अपन रेखाचित्र (Sketches) सँ क्रान्तिक सन्देश दैत छल।" },
                    { q: "समकालीन मैथिली प्रकाशन 'लेखकक छवि' (Author's branding) कें कवर पर कोना प्रस्तुत करैत अछि?", o: ["लेखकक फोटो नहि छापैछ", "फ्लैप (Flap) वा पाछाँमे लेखकक फोटो आ ओकर साहित्यिक-अकादमिक अवदानक प्रामाणिक परिचय (Profile) दऽ कऽ", "केवल नाम लिखैछ", "हास्य चित्र दैछ"], a: 1, e: "पेशेवर प्रकाशनमे लेखकक प्रोफाइल आ फोटोकें सुव्यवस्थित ढंग सँ रखल जाइत अछि जाहि सँ पाठक लेखकक वैचारिक पृष्ठभूमिसँ जुड़ि सकय।" },
                    { q: "विदेह द्वारा सम्पादित 'बाल-साहित्य' क पुस्तकसभक आवरण पर की विशेषता भेटैत अछि?", o: ["कठिन दार्शनिक चित्र", "रंग-बिरंग, आकर्षक आ बाल-मनोविज्ञानक अनुकूल कार्टून वा पशु-पक्षीक (जेना मयूर, माछ) चित्र", "केवल अक्षर", "कोनो चित्र नहि"], a: 1, e: "बाल-साहित्यक आवरण बच्चाकें आकर्षित करय लेल पूर्णतः रंगीन आ मिथिलाक जीव-जन्तुसभक पारम्परिक चित्र सँ सजल होइत अछि।" },
                    { q: "समकालीन विमर्शमे 'पुस्तक आवरण' (Book Cover) कें साहित्यक कोन अंग मानल गेल अछि?", o: ["बाहरी आ फालतू", "रचनाक 'प्रथम दृश्य-पाठ' (First Visual Text) जे पाठक आ रचनाक बीच पहिल संवाद स्थापित करैत अछि", "केवल कागजक टुकड़ा", "अन्तिम अंग"], a: 1, e: "समकालीन अकादमिक विमर्शमे आवरण कलाकें 'Paratext' मानल जाइत अछि, जे पाठकक अवचेतन पर पहिल प्रभाव डेलैत अछि।" }
                ]
            }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            const tabsHeader = document.getElementById('tabs-header');
            const tabsBody = document.getElementById('tabs-body');

            // Track scores and answered state
            const tabState = {};

            quizData.forEach((tab, tIndex) => {
                const tabId = 'tab_' + tIndex;
                tabState[tabId] = { score: 0, answered: [], total: tab.questions.length };

                // 1. Create Tab Buttons
                const btn = document.createElement('button');
                btn.className = 'tab-btn' + (tIndex === 0 ? ' active' : '');
                btn.innerText = tab.title;
                btn.onclick = (e) => openTab(e, tabId);
                tabsHeader.appendChild(btn);

                // 2. Create Tab Content Container
                const contentDiv = document.createElement('div');
                contentDiv.id = tabId;
                contentDiv.className = 'tab-content';
                contentDiv.style.display = tIndex === 0 ? 'block' : 'none';

                // 3. Generate Questions for this Tab
                tab.questions.forEach((qObj, qIndex) => {
                    const qId = `${tabId}_q${qIndex}`;
                    
                    const qBlock = document.createElement('div');
                    qBlock.className = 'question-block';
                    qBlock.id = qId;

                    // Question Title
                    const qTitle = document.createElement('h3');
                    qTitle.innerText = `प्रश्न ${qIndex + 1}. ${qObj.q}`;
                    qBlock.appendChild(qTitle);

                    // Options List
                    const ul = document.createElement('ul');
                    ul.className = 'options-list';

                    qObj.o.forEach((optText, oIndex) => {
                        const li = document.createElement('li');
                        const label = document.createElement('label');
                        label.className = 'option-label';
                        
                        const input = document.createElement('input');
                        input.type = 'radio';
                        input.name = qId;
                        input.value = (oIndex === qObj.a) ? 'correct' : 'wrong';
                        
                        // Handle instant evaluation
                        input.onclick = function() {
                            evaluateAnswer(this, qId, oIndex === qObj.a, tabId);
                        };

                        label.appendChild(input);
                        label.appendChild(document.createTextNode(' ' + optText));
                        li.appendChild(label);
                        ul.appendChild(li);
                    });
                    qBlock.appendChild(ul);

                    // Explanation Div
                    const expDiv = document.createElement('div');
                    expDiv.id = 'exp-' + qId;
                    expDiv.className = 'explanation';
                    expDiv.innerHTML = `<strong>व्याख्या:</strong> ${qObj.e}`;
                    qBlock.appendChild(expDiv);

                    contentDiv.appendChild(qBlock);
                });

                // 4. Add Submit Section for this tab
                const submitSection = document.createElement('div');
                submitSection.className = 'submit-section';
                
                const submitBtn = document.createElement('button');
                submitBtn.className = 'submit-btn';
                submitBtn.innerText = 'Evaluate / Submit ' + tab.title.split(':')[0];
                submitBtn.onclick = () => showTabScore(tabId);
                
                const resultDiv = document.createElement('div');
                resultDiv.id = 'result-' + tabId;
                resultDiv.className = 'result-score';

                submitSection.appendChild(submitBtn);
                submitSection.appendChild(resultDiv);
                contentDiv.appendChild(submitSection);

                tabsBody.appendChild(contentDiv);
            });

            // Logic Functions
            window.openTab = function(evt, tabId) {
                const contents = document.getElementsByClassName("tab-content");
                for (let i = 0; i < contents.length; i++) {
                    contents[i].style.display = "none";
                }
                const btns = document.getElementsByClassName("tab-btn");
                for (let i = 0; i < btns.length; i++) {
                    btns[i].className = btns[i].className.replace(" active", "");
                }
                document.getElementById(tabId).style.display = "block";
                evt.currentTarget.className += " active";
            };

            window.evaluateAnswer = function(radioBtn, qId, isCorrect, tabId) {
                if (tabState[tabId].answered.includes(qId)) return;
                tabState[tabId].answered.push(qId);

                const questionBlock = document.getElementById(qId);
                const labels = questionBlock.querySelectorAll('.option-label');
                const explanation = document.getElementById('exp-' + qId);

                labels.forEach(label => {
                    label.classList.add('disabled-option');
                    const input = label.querySelector('input');
                    input.disabled = true;
                    if(input.value === 'correct') {
                        label.classList.add('correct-ans');
                    }
                });

                const clickedLabel = radioBtn.parentElement;
                if (isCorrect) {
                    tabState[tabId].score++;
                } else {
                    clickedLabel.classList.add('incorrect-ans');
                }

                explanation.style.display = 'block';
            };

            window.showTabScore = function(tabId) {
                const resultDiv = document.getElementById('result-' + tabId);
                const state = tabState[tabId];
                
                if(state.answered.length < state.total) {
                    resultDiv.innerHTML = "कृपया एहि भागक सबहि प्रश्नक उत्तर दिअ।";
                    resultDiv.style.color = "#dc3545";
                } else {
                    resultDiv.innerHTML = `एहि भागमे अहाँक प्राप्तांक: ${state.score} / ${state.total}`;
                    resultDiv.style.color = "#000080";
                }
            };
        });
    </script>
