}

<div class="rapid-container" id="rapidApp"> <div class="header"> <div class="title-row"> <div class="highscore-badge">🏆 हाईस्कोर: <span id="highscoreDisplay">0</span></div> </div> <div class="upload-area"> <span class="upload-btn" id="rapidUploadBtn">📂 Excel अपलोड</span> <input type="file" id="rapidExcel" accept=".xlsx, .xls" style="display: none;"> <span id="dataInfo">📘 नमूना डेटा</span> </div> </div> <div class="mode-tabs"> <button class="mode-tab active-tab" data-rapid-mode="en2ma">🇬🇧 → 🇮🇳 अंग्रेजी → मैथिली</button> <button class="mode-tab" data-rapid-mode="ma2en">🇮🇳 → 🇬🇧 मैथिली → अंग्रेजी</button> </div> <div class="game-panel"> <div class="timer-area"> <div class="timer-circle"> <svg width="90" height="90" viewBox="0 0 100 100"> <circle class="timer-bg" cx="50" cy="50" r="40" fill="none" stroke="#e2d4c2" stroke-width="8"/> <circle class="timer-fill" id="timerRing" cx="50" cy="50" r="40" fill="none" stroke="#b48b5a" stroke-width="8" stroke-linecap="round"/> </svg> <div class="timer-text" id="timerSeconds">10</div> </div> </div> <div class="question-area"> <div class="challenge-word" id="rapidWord">लोड होत...</div> <div class="pos-tag" id="rapidPos"></div> </div> <div id="optionsContainer" class="options-grid"></div> <div class="action-row"> <button id="nextRoundBtn" class="next-round">➡ अगिला प्रश्न</button> <button id="resetGameBtn" class="reset-game">🔄 रीसेट</button> </div> <div id="rapidFeedback" class="feedback" style="display: none;"></div> <div class="score-stats"> <span>🎯 स्कोर: <span id="currentScoreSpan">0</span></span> <span>🔥 स्ट्रीक: <span id="streakSpan">0</span></span> <span>⏳ समय: <span id="timeBonusSpan">+0</span></span> </div> </div>

<script>


</script><script>

    // ---------- DATA & GLOBALS ----------
    let dictionary = [];          // { english, maithili1, pos }
    let currentMode = "en2ma";   // 'en2ma' or 'ma2en'
    let currentQuestion = null;
    let currentOptions = [];
    let currentTimer = null;
    let timeLeft = 10;
    let timerActive = false;
    let gameActive = true;
    let currentScore = 0;
    let currentStreak = 0;
    let highScore = 0;
    let roundInProgress = false;
    let waitingNext = false;

    // DOM elements
    const rapidWordSpan = document.getElementById("rapidWord");
    const rapidPosSpan = document.getElementById("rapidPos");
    const optionsDiv = document.getElementById("optionsContainer");
    const timerSecondsSpan = document.getElementById("timerSeconds");
    const timerRing = document.getElementById("timerRing");
    const currentScoreSpan = document.getElementById("currentScoreSpan");
    const streakSpan = document.getElementById("streakSpan");
    const timeBonusSpan = document.getElementById("timeBonusSpan");
    const feedbackDiv = document.getElementById("rapidFeedback");
    const nextRoundBtn = document.getElementById("nextRoundBtn");
    const resetGameBtn = document.getElementById("resetGameBtn");
    const highscoreDisplay = document.getElementById("highscoreDisplay");
    const uploadBtn = document.getElementById("rapidUploadBtn");
    const excelInput = document.getElementById("rapidExcel");
    const dataInfoSpan = document.getElementById("dataInfo");
    const modeTabs = document.querySelectorAll(".mode-tab");

    // ---------- SAMPLE DATA ----------
    const SAMPLE_DICT = [
        { english: "abandon", maithili1: "छोड़ब / त्याग करब", pos: "v." },
        { english: "able", maithili1: "समर्थ", pos: "adj." },
        { english: "beautiful", maithili1: "सुन्दर", pos: "adj." },
        { english: "begin", maithili1: "शुरू करब", pos: "v." },
        { english: "big", maithili1: "बड़का", pos: "adj." },
        { english: "brave", maithili1: "वीर", pos: "adj." },
        { english: "bright", maithili1: "चमकीला", pos: "adj." },
        { english: "broad", maithili1: "चौड़ा", pos: "adj." },
        { english: "busy", maithili1: "व्यस्त", pos: "adj." },
        { english: "calm", maithili1: "शान्त", pos: "a." },
        { english: "cheap", maithili1: "सस्ता", pos: "adj." },
        { english: "cold", maithili1: "ठंडा", pos: "a." },
        { english: "courage", maithili1: "साहस", pos: "n." },
        { english: "deep", maithili1: "गहरा", pos: "adj." },
        { english: "easy", maithili1: "आसान", pos: "adj." },
        { english: "enemy", maithili1: "दुश्मन", pos: "n." },
        { english: "forget", maithili1: "भूलब", pos: "v." },
        { english: "generous", maithili1: "उदार", pos: "adj." },
        { english: "happy", maithili1: "खुश", pos: "adj." },
        { english: "humble", maithili1: "विनम्र", pos: "adj." }
    ];

    // Helper: normalize for answer comparison
    function normalize(str) {
        return str.trim().toLowerCase().replace(/[.,!?;:]/g, '').replace(/\s+/g, ' ').trim();
    }

    // generate 4 options (one correct + 3 random distractors)
    function generateOptions(correctAnswer, mode) {
        let pool = [];
        if (mode === "en2ma") {
            pool = dictionary.filter(d => d.maithili1 !== correctAnswer).map(d => d.maithili1);
        } else {
            pool = dictionary.filter(d => d.english !== correctAnswer).map(d => d.english);
        }
        pool = [...new Set(pool)];
        let distractors = [];
        while (distractors.length < 3 && pool.length) {
            let rand = pool.splice(Math.floor(Math.random() * pool.length), 1)[0];
            distractors.push(rand);
        }
        while (distractors.length < 3) distractors.push(correctAnswer);
        let opts = [correctAnswer, ...distractors];
        for (let i = opts.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [opts[i], opts[j]] = [opts[j], opts[i]];
        }
        return opts;
    }

    // pick random question from dictionary
    function pickRandomQuestion() {
        if (!dictionary.length) return null;
        const randomIndex = Math.floor(Math.random() * dictionary.length);
        return dictionary[randomIndex];
    }

    // load new round: set question, generate options, reset timer
    function startNewRound() {
        if (!dictionary.length) {
            rapidWordSpan.innerText = "कोनो डेटा नहि अछि। फाइल अपलोड करू।";
            optionsDiv.innerHTML = "";
            return;
        }
        currentQuestion = pickRandomQuestion();
        if (!currentQuestion) return;
        let correctAnswer = (currentMode === "en2ma") ? currentQuestion.maithili1 : currentQuestion.english;
        currentOptions = generateOptions(correctAnswer, currentMode);

        // display question
        if (currentMode === "en2ma") {
            rapidWordSpan.innerText = currentQuestion.english;
            rapidPosSpan.innerText = currentQuestion.pos || "";
        } else {
            rapidWordSpan.innerText = currentQuestion.maithili1;
            rapidPosSpan.innerText = currentQuestion.pos || "";
        }

        // render option buttons
        optionsDiv.innerHTML = "";
        currentOptions.forEach((opt, idx) => {
            const btn = document.createElement("div");
            btn.className = "rapid-opt";
            btn.innerText = `${String.fromCharCode(65+idx)}. ${opt}`;
            btn.setAttribute("data-value", opt);
            btn.addEventListener("click", () => handleAnswer(opt, correctAnswer));
            optionsDiv.appendChild(btn);
        });

        // reset timer
        resetTimer();
        gameActive = true;
        roundInProgress = true;
        waitingNext = false;
        feedbackDiv.style.display = "none";
        nextRoundBtn.disabled = false;
        nextRoundBtn.innerText = "⏳ उत्तर दिये";
        // enable click on options
        document.querySelectorAll(".rapid-opt").forEach(opt => opt.style.pointerEvents = "auto");
    }

    // Timer logic with visual ring
    let timerInterval = null;
    const totalTime = 10;
    const circumference = 2 * Math.PI * 40; // r=40

    function resetTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timeLeft = totalTime;
        timerSecondsSpan.innerText = timeLeft;
        const offset = circumference - (timeLeft / totalTime) * circumference;
        timerRing.style.strokeDasharray = circumference;
        timerRing.style.strokeDashoffset = offset;
        timerActive = true;
        timerInterval = setInterval(() => {
            if (!gameActive || waitingNext) return;
            if (timeLeft <= 1) {
                // time's up -> treat as wrong answer
                clearInterval(timerInterval);
                timerActive = false;
                timeOutPenalty();
            } else {
                timeLeft--;
                timerSecondsSpan.innerText = timeLeft;
                const newOffset = circumference - (timeLeft / totalTime) * circumference;
                timerRing.style.strokeDashoffset = newOffset;
            }
        }, 1000);
    }

    function stopTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        timerActive = false;
    }

    function timeOutPenalty() {
        if (!gameActive || waitingNext) return;
        gameActive = false;
        roundInProgress = false;
        const correctAns = (currentMode === "en2ma") ? currentQuestion.maithili1 : currentQuestion.english;
        feedbackDiv.style.display = "block";
        feedbackDiv.innerHTML = `⏰ समय समाप्त! सही उत्तर: "${correctAns}"। स्ट्रीक टूटल।`;
        feedbackDiv.style.background = "#fff0cc";
        currentStreak = 0;
        streakSpan.innerText = currentStreak;
        updateScoreUI();
        disableOptions();
        waitingNext = true;
        nextRoundBtn.disabled = false;
        nextRoundBtn.innerText = "➡ अगिला प्रश्न";
    }

    function handleAnswer(selected, correct) {
        if (!gameActive || waitingNext) return;
        const isCorrect = (selected === correct);
        stopTimer();
        gameActive = false;
        roundInProgress = false;
        let timeBonus = 0;
        if (isCorrect) {
            // calculate bonus: remaining time * 10 points
            timeBonus = timeLeft * 10;
            currentStreak++;
            currentScore += 100 + timeBonus;
            updateScoreUI();
            feedbackDiv.style.display = "block";
            feedbackDiv.innerHTML = `✅ सही! +100 अंक, समय बोनस +${timeBonus} 🔥 स्ट्रीक ${currentStreak}`;
            feedbackDiv.style.background = "#e0f0dc";
            // confetti on correct
            canvasConfetti({ particleCount: 40, spread: 55, origin: { y: 0.6 } });
        } else {
            currentStreak = 0;
            streakSpan.innerText = currentStreak;
            const correctAns = (currentMode === "en2ma") ? currentQuestion.maithili1 : currentQuestion.english;
            feedbackDiv.style.display = "block";
            feedbackDiv.innerHTML = `❌ गलत। सही उत्तर: "${correctAns}"। स्ट्रीक टूटल।`;
            feedbackDiv.style.background = "#ffe0e0";
        }
        timeBonusSpan.innerText = `+${timeBonus}`;
        // update highscore
        if (currentScore > highScore) {
            highScore = currentScore;
            highscoreDisplay.innerText = highScore;
            localStorage.setItem("rapidHighscore", highScore);
            canvasConfetti({ particleCount: 120, spread: 80, origin: { y: 0.7 } });
        }
        disableOptions();
        waitingNext = true;
        nextRoundBtn.disabled = false;
        nextRoundBtn.innerText = "➡ अगिला प्रश्न";
    }

    function disableOptions() {
        document.querySelectorAll(".rapid-opt").forEach(opt => opt.style.pointerEvents = "none");
    }

    function updateScoreUI() {
        currentScoreSpan.innerText = currentScore;
        streakSpan.innerText = currentStreak;
    }

    function nextRound() {
        if (!waitingNext) {
            // if user hasn't answered yet, force timeout? better show warning
            if (roundInProgress) {
                feedbackDiv.style.display = "block";
                feedbackDiv.innerHTML = "⚠️ पहिले वर्तमान प्रश्न केर उत्तर दिये या समय समाप्त होबे दे।";
                feedbackDiv.style.background = "#fff0cc";
                return;
            }
        }
        // clean up and start new round
        stopTimer();
        startNewRound();
    }

    function resetGame() {
        stopTimer();
        currentScore = 0;
        currentStreak = 0;
        updateScoreUI();
        timeBonusSpan.innerText = "+0";
        highscoreDisplay.innerText = highScore;
        waitingNext = false;
        gameActive = true;
        roundInProgress = false;
        startNewRound();
    }

    function changeMode(mode) {
        currentMode = mode;
        modeTabs.forEach(tab => {
            if (tab.getAttribute("data-rapid-mode") === mode) tab.classList.add("active-tab");
            else tab.classList.remove("active-tab");
        });
        resetGame();
    }

    // ----- Excel Parsing -----
    function parseExcelToDict(buffer) {
        const wb = XLSX.read(buffer, { type: 'array' });
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
        if (!rows || rows.length < 2) return [];
        const header = rows[0].map(c => String(c || "").trim().toLowerCase());
        const engIdx = header.findIndex(h => h.includes("english word"));
        const maiIdx = header.findIndex(h => h.includes("maithili meaning 1"));
        const posIdx = header.findIndex(h => h.includes("pos"));
        if (engIdx === -1 || maiIdx === -1) return [];
        const dict = [];
        for (let i = 1; i < rows.length; i++) {
            const row = rows[i];
            if (!row || !row[engIdx]) continue;
            const eng = String(row[engIdx]).trim();
            const mai = String(row[maiIdx]).trim();
            if (eng && mai) {
                dict.push({
                    english: eng,
                    maithili1: mai,
                    pos: posIdx !== -1 ? String(row[posIdx] || "").trim() : ""
                });
            }
        }
        return dict;
    }

    function loadExcelAndReset(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const parsed = parseExcelToDict(e.target.result);
            if (parsed.length === 0) {
                alert("Excel में वैध डेटा नहि अछि। नमूना लोड रहल।");
                setSampleData();
            } else {
                dictionary = parsed;
                dataInfoSpan.innerText = `📁 ${file.name} (${dictionary.length})`;
                resetGame();
            }
        };
        reader.readAsArrayBuffer(file);
    }

    function setSampleData() {
        dictionary = [...SAMPLE_DICT];
        dataInfoSpan.innerText = "📘 नमूना डेटा";
        resetGame();
    }

    // load highscore from localStorage
    function loadHighScore() {
        const saved = localStorage.getItem("rapidHighscore");
        if (saved && !isNaN(parseInt(saved))) {
            highScore = parseInt(saved);
            highscoreDisplay.innerText = highScore;
        } else {
            highScore = 0;
        }
    }

    // event binding
    function init() {
        loadHighScore();
        setSampleData();
        uploadBtn.addEventListener("click", () => excelInput.click());
        excelInput.addEventListener("change", (e) => {
            if (e.target.files && e.target.files[0]) loadExcelAndReset(e.target.files[0]);
        });
        modeTabs.forEach(tab => {
            tab.addEventListener("click", () => changeMode(tab.getAttribute("data-rapid-mode")));
        });
        nextRoundBtn.addEventListener("click", nextRound);
        resetGameBtn.addEventListener("click", resetGame);
    }
