</script><script>

    // --------------------------------------------------------------
    // FRESH DATA – previously unused from the Maithili thesaurus
    // (mix of nouns, verbs, adjectives, cultural terms)
    // --------------------------------------------------------------
    const WORD_BANK = [
        { word: "अखबार", meaning: "newspaper", hint: "समाचारपत्र" },
        { word: "अछोरब", meaning: "snatch", hint: "छीनब" },
        { word: "अजब", meaning: "strange, wonderful", hint: "अद्भुत, विचित्र" },
        { word: "अट्टहास", meaning: "laughter, roar", hint: "ठहाका" },
        { word: "अनुभवी", meaning: "experienced", hint: "अनुभवबाला" },
        { word: "अपराजित", meaning: "undefeated", hint: "अजेय" },
        { word: "अमर", meaning: "immortal", hint: "नहि मुइनिहार" },
        { word: "अर्ध", meaning: "half", hint: "आधा" },
        { word: "अलग", meaning: "separate", hint: "पृथक" },
        { word: "अवश्य", meaning: "certainly", hint: "निश्चय" },
        { word: "आइना", meaning: "mirror", hint: "दर्पण" },
        { word: "आँगन", meaning: "courtyard", hint: "प्राङ्गण" },
        { word: "आज्ञा", meaning: "order", hint: "आदेश" },
        { word: "इमान", meaning: "honesty", hint: "साधुता" },
        { word: "उच्च", meaning: "high", hint: "ऊँच" },
        { word: "उपयोग", meaning: "use", hint: "प्रयोग" },
        { word: "ऊँट", meaning: "camel", hint: "रेगिस्तानी पशु" },
        { word: "ऋतु", meaning: "season", hint: "मौसम" },
        { word: "एकता", meaning: "unity", hint: "मेल" },
        { word: "ऐतिहासिक", meaning: "historical", hint: "इतिहास सम्बन्धी" },
        { word: "कच्चा", meaning: "raw", hint: "अपक्व" },
        { word: "कटु", meaning: "bitter", hint: "तीत, कड़ु" },
        { word: "कनिष्ठ", meaning: "youngest", hint: "सभसँ छोट" },
        { word: "कपाट", meaning: "door", hint: "कबाड़" },
        { word: "कमल", meaning: "lotus", hint: "पुड़इनि" },
        { word: "करुणा", meaning: "compassion", hint: "दया" },
        { word: "कलश", meaning: "pitcher", hint: "घैल" },
        { word: "कवि", meaning: "poet", hint: "काव्य रचयिता" },
        { word: "काठ", meaning: "wood", hint: "लकड़ी" },
        { word: "किरण", meaning: "ray", hint: "प्रकाश-रेखा" },
        { word: "कुकुर", meaning: "dog", hint: "कुत्ता" },
        { word: "कूल्हा", meaning: "hip", hint: "जाँघक जोड़" },
        { word: "केस", meaning: "hair", hint: "केश" },
        { word: "कोलाहल", meaning: "uproar", hint: "हल्ला" },
        { word: "गाँव", meaning: "village", hint: "ग्राम" }
    ];

    // Helper: shuffle array
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // Get distractors (other meanings)
    function getDistractors(correctMeaning, currentWord, fullList, count = 3) {
        let candidates = fullList.filter(item => item.meaning !== correctMeaning && item.word !== currentWord)
                                 .map(item => item.meaning);
        candidates = [...new Set(candidates)];
        if (candidates.length < count) {
            const fallback = ["light", "dark", "peace", "war", "earth", "sky", "river", "mountain", "friend"];
            candidates.push(...fallback);
            candidates = [...new Set(candidates)];
        }
        return shuffleArray(candidates).slice(0, count);
    }

    // Build question bank
    function buildQuestionBank() {
        let bank = [];
        for (let item of WORD_BANK) {
            const correct = item.meaning;
            const wrongs = getDistractors(correct, item.word, WORD_BANK, 3);
            let options = [correct, ...wrongs];
            options = shuffleArray(options);
            bank.push({
                maithili: item.word,
                correct: correct,
                options: options,
                hint: item.hint
            });
        }
        return shuffleArray(bank);
    }

    // State variables
    let questions = [];
    let currentIndex = 0;
    let score = 0;
    let streak = 0;
    let answered = false;
    let selectedValue = null;
    let mistakes = [];
    let total = 0;

    // Timer variables
    let timerInterval = null;
    let timeLeft = 12;
    const TIME_PER_QUESTION = 12;

    // DOM elements
    const mainDiv = document.getElementById("quizMain");
    const scoreSpan = document.getElementById("scoreDisplay");
    const streakSpan = document.getElementById("streakDisplay");
    const qIdxSpan = document.getElementById("qIdx");
    const qTotSpan = document.getElementById("qTot");

    function updateHeader() {
        scoreSpan.innerText = score;
        streakSpan.innerText = streak;
        qIdxSpan.innerText = currentIndex + 1;
        qTotSpan.innerText = total;
    }

    function stopTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
    }

    function startTimer() {
        stopTimer();
        timeLeft = TIME_PER_QUESTION;
        const timerFill = document.querySelector('.timer-fill');
        if (timerFill) timerFill.style.width = "100%";
        timerInterval = setInterval(() => {
            if (answered) return; // already answered, don't auto-submit
            if (timeLeft <= 0) {
                // time's up – auto-mark as wrong if not answered
                if (!answered) {
                    const currentQ = questions[currentIndex];
                    handleTimeout(currentQ);
                }
            } else {
                timeLeft--;
                const percent = (timeLeft / TIME_PER_QUESTION) * 100;
                if (timerFill) timerFill.style.width = `${percent}%`;
            }
        }, 1000);
    }

    function handleTimeout(currentQ) {
        if (answered) return;
        answered = true;
        selectedValue = null;
        // no answer selected → wrong
        streak = 0;
        mistakes.push({
            maithili: currentQ.maithili,
            correct: currentQ.correct,
            selected: "(समय समाप्त)",
            hint: currentQ.hint
        });
        updateHeader();
        stopTimer();
        render(); // re-render with feedback showing correct answer
    }

    function render() {
        if (!questions.length || currentIndex >= total) {
            stopTimer();
            showResult();
            return;
        }
        const q = questions[currentIndex];
        let optionsHtml = "";
        const markers = ["𑂃", "𑂥", "𑂒", "𑂙"];
        for (let i = 0; i < q.options.length; i++) {
            let extraClass = "";
            if (answered) {
                if (q.options[i] === q.correct) extraClass = "correct-highlight";
                else if (selectedValue === q.options[i] && selectedValue !== q.correct) extraClass = "wrong-highlight";
                else extraClass = "disabled";
            }
            optionsHtml += `
                <div class="opt ${extraClass}" data-choice="${escapeHtml(q.options[i])}">
                    <div class="opt-letter">${markers[i]}</div>
                    <div class="opt-text">${escapeHtml(q.options[i])}</div>
                </div>
            `;
        }

        let feedbackHtml = "";
        if (answered) {
            const isCorrect = (selectedValue === q.correct);
            const timeMsg = selectedValue === null ? " (समय समाप्त)" : "";
            feedbackHtml = `
                <div class="feedback">
                    ${isCorrect ? "✅ सही उत्तर! +1 अंक" : "❌ गलत" + timeMsg + "। सही अर्थ: <strong>" + escapeHtml(q.correct) + "</strong>"}
                    <br><span style="font-size:0.85rem;">💡 ${escapeHtml(q.hint)}</span>
                </div>
            `;
        } else {
            feedbackHtml = `
                <div class="feedback">
                    🔍 <strong>${escapeHtml(q.hint)}</strong><br>
                    ⏱️ बाँकी समय: <span id="timerDisplay">${timeLeft}</span> सेकण्ड
                </div>
            `;
        }

        const nextDisabled = answered ? "" : "disabled";
        const actionsHtml = `
            <div class="actions">
                <button class="btn btn-primary" id="nextBtn" ${nextDisabled}>➡ अगला प्रश्न</button>
                <button class="btn btn-secondary" id="refreshBtn">🔄 नवा सेट</button>
            </div>
        `;

        const timerPercent = (timeLeft / TIME_PER_QUESTION) * 100;
        const fullHtml = `
            <div class="word-card">
                <div class="maithili">${escapeHtml(q.maithili)}</div>
                <div class="hint-light">✨ सही अंग्रेजी अर्थ चुनू</div>
            </div>
            <div class="timer-bar">
                <div class="timer-fill" style="width: ${timerPercent}%;"></div>
            </div>
            <div class="options-grid" id="optionsContainer">
                ${optionsHtml}
            </div>
            ${feedbackHtml}
            ${actionsHtml}
        `;
        mainDiv.innerHTML = fullHtml;

        // update timer display in feedback if not answered
        if (!answered) {
            const timerSpan = document.getElementById("timerDisplay");
            if (timerSpan) {
                const updateTimerSpan = () => {
                    const span = document.getElementById("timerDisplay");
                    if (span) span.innerText = timeLeft;
                };
                // hook into timer via a simple interval update (but timer already updates)
                // we'll just rely on existing timer callback to update DOM? we'll do a small override
                // but we'll handle via a separate observer? easier: the render already shows timeLeft.
                // we'll call updateTimerDisplay manually within timer.
            }
        }

        if (!answered) {
            const choices = document.querySelectorAll('.opt');
            choices.forEach(choice => {
                choice.addEventListener('click', (e) => {
                    if (answered) return;
                    const chosen = choice.getAttribute('data-choice');
                    handleAnswer(chosen);
                });
            });
            startTimer();
        } else {
            stopTimer();
        }

        const nextBtn = document.getElementById('nextBtn');
        if (nextBtn) nextBtn.addEventListener('click', () => nextQuestion());
        const refreshBtn = document.getElementById('refreshBtn');
        if (refreshBtn) refreshBtn.addEventListener('click', () => fullReset());
    }

    function handleAnswer(chosen) {
        if (answered) return;
        const q = questions[currentIndex];
        stopTimer();
        answered = true;
        selectedValue = chosen;
        if (chosen === q.correct) {
            score++;
            streak++;
        } else {
            streak = 0;
            mistakes.push({
                maithili: q.maithili,
                correct: q.correct,
                selected: chosen,
                hint: q.hint
            });
        }
        updateHeader();
        render();
    }

    function nextQuestion() {
        if (!answered) return;
        if (currentIndex + 1 < total) {
            currentIndex++;
            answered = false;
            selectedValue = null;
            updateHeader();
            render();
        } else {
            stopTimer();
            showResult();
        }
    }

    function showResult() {
        const percent = total ? Math.round((score / total) * 100) : 0;
        let message = "";
        if (percent >= 80) message = "🎉 उत्कृष्ट! मैथिली विद्या में निपुण";
        else if (percent >= 60) message = "👍 बढ़िया प्रयास, थोर अभ्यास आओर चाही";
        else message = "📘 फेर कोशिश करू, थिसारस सहायक रहत";

        let missHtml = "";
        if (mistakes.length) {
            missHtml = `<div class="miss-list"><h4 style="margin-bottom:10px;">📌 गलत/छूटल उत्तरक समीक्षा:</h4>`;
            mistakes.forEach(m => {
                missHtml += `<div class="miss-item">🔹 <strong>${escapeHtml(m.maithili)}</strong> – सही: "${escapeHtml(m.correct)}" · आप: "${escapeHtml(m.selected)}"<br><span style="font-size:0.7rem;">📖 ${escapeHtml(m.hint)}</span></div>`;
            });
            missHtml += `</div>`;
        } else {
            missHtml = `<div class="miss-list"><h4>✨ सब उत्तर सही! बहुत नीक</h4></div>`;
        }

        const finalHtml = `
            <div class="result-area">
                <h2>🏁 क्विज़ समाप्त</h2>
                <div class="final-score">${score} / ${total}</div>
                <p style="margin-bottom: 20px;">${message}</p>
                ${missHtml}
                <div class="actions" style="margin-top: 20px;">
                    <button class="btn btn-primary" id="restartSame">🔄 फेर सुरु करू</button>
                    <button class="btn btn-secondary" id="freshSetBtn">✨ नवा प्रश्न-सेट</button>
                </div>
            </div>
        `;
        mainDiv.innerHTML = finalHtml;
        document.getElementById('restartSame')?.addEventListener('click', () => restartWithSame());
        document.getElementById('freshSetBtn')?.addEventListener('click', () => fullReset());
    }

    function restartWithSame() {
        stopTimer();
        currentIndex = 0;
        score = 0;
        streak = 0;
        answered = false;
        selectedValue = null;
        mistakes = [];
        updateHeader();
        render();
    }

    function fullReset() {
        stopTimer();
        questions = buildQuestionBank();
        total = questions.length;
        currentIndex = 0;
        score = 0;
        streak = 0;
        answered = false;
        selectedValue = null;
        mistakes = [];
        updateHeader();
        render();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
