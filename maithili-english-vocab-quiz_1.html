var ST = { em: null, me: null };
var curMode = 'em';

function shuffle(a) {
  var b = a.slice(), i = b.length, j, t;
  while (i--) { j = Math.floor(Math.random()*(i+1)); t=b[i]; b[i]=b[j]; b[j]=t; }
  return b;
}

function switchMode(m) {
  curMode = m;
  ['em','me'].forEach(function(x) {
    document.getElementById('tab-'+x).className = 'tab-btn' + (x===m?' active':'');
    document.getElementById('pane-'+x).className = 'pane' + (x===m?' active':'');
  });
  if (!ST[m]) startQuiz(m);
}

function startQuiz(m) {
  var sz = parseInt(document.getElementById('qsize-'+m).value);
  var pool = shuffle(QDB[m]).slice(0, sz);
  ST[m] = { idx:0, score:0, qs:pool, answered:false, done:false };
  render(m);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render(m) {
  var s = ST[m];
  var el = document.getElementById('area-'+m);
  if (!s || s.done) { renderScore(m); return; }
  var q = s.qs[s.idx];
  var total = s.qs.length;
  var pct = Math.round(s.idx/total*100);
  var isDev = (m==='me');
  var modeLabel = m==='em' ? 'English \u2192 \u092E\u0948\u0925\u093F\u0932\u0940' : '\u092E\u0948\u0925\u093F\u0932\u0940 \u2192 English';

  var choiceHtml = '';
  for (var i=0; i<q.choices.length; i++) {
    choiceHtml += '<button class="cbtn" id="cb-'+m+'-'+i+'" onclick="answer(\''+m+'\','+i+')">'+esc(q.choices[i])+'</button>';
  }

  el.innerHTML =
    '<div class="qhdr">' +
      '<span class="qtitle">'+modeLabel+'</span>' +
      '<span class="qstat">Q '+(s.idx+1)+' / '+total+' &nbsp;&#10003; '+s.score+'</span>' +
    '</div>' +
    '<div class="prog-wrap"><div class="prog-bar" style="width:'+pct+'%"></div></div>' +
    '<div class="card">' +
      '<div class="qnum">Question '+(s.idx+1)+'</div>' +
      '<div class="qword'+(isDev?' dev':'')+'">'+esc(q.q)+'</div>' +
      '<div class="qpos">'+(q.pos?'('+esc(q.pos)+')':'&nbsp;')+'</div>' +
      '<div class="choices">'+choiceHtml+'</div>' +
      '<div class="fb" id="fb-'+m+'"></div>' +
    '</div>' +
    '<div class="nav-row">' +
      '<button class="nbtn pri" id="nxt-'+m+'" style="display:none" onclick="nextQ(\''+m+'\')">'+
        (s.idx+1<total ? '\u0905\u0917\u093F\u0932\u093E / Next \u2192' : '\u092A\u0930\u093F\u0923\u093E\u092E / Result') +
      '</button>' +
      '<button class="nbtn sec" onclick="skipQ(\''+m+'\')">&#x091B;&#x094B;&#x0921;&#x093C;&#x0942; / Skip</button>' +
      '<button class="nbtn sec" onclick="startQuiz(\''+m+'\')">&#x0928;&#x0935; &#x0915;&#x094D;&#x0935;&#x093F;&#x091C; / New Quiz</button>' +
    '</div>';
}

  s.answered = true;
  var q = s.qs[s.idx];
  var ok = ci === q.correct;
  if (ok) s.score++;
  for (var i=0; i<q.choices.length; i++) {
    var b = document.getElementById('cb-'+m+'-'+i);
    b.disabled = true;
    if (i===q.correct) b.className='cbtn rev';
    else if (i===ci && !ok) b.className='cbtn bad';
  }
  var fb = document.getElementById('fb-'+m);
  if (ok) { fb.textContent='\u2713 \u0938\u0939\u0940! Correct!'; fb.className='fb ok'; }
  else { fb.innerHTML='\u2717 \u0917\u0932\u0924! Wrong. \u2192 '+esc(q.choices[q.correct]); fb.className='fb bad'; }
  document.getElementById('nxt-'+m).style.display='inline-block';
}

function skipQ(m) {
  var s = ST[m];
  if (!s) return;
  if (s.answered) { nextQ(m); return; }
  var q = s.qs[s.idx];
  for (var i=0; i<q.choices.length; i++) {
    var b = document.getElementById('cb-'+m+'-'+i);
    b.disabled = true;
    if (i===q.correct) b.className='cbtn rev';
  }
  var fb = document.getElementById('fb-'+m);
  fb.innerHTML='\u0909\u0924\u094D\u0924\u0930: '+esc(q.choices[q.correct]);
  fb.className='fb';
  s.answered = true;
  document.getElementById('nxt-'+m).style.display='inline-block';
}

function nextQ(m) {
  var s = ST[m];
  if (!s) return;
  s.idx++; s.answered = false;
  if (s.idx >= s.qs.length) { s.done=true; renderScore(m); return; }
  render(m);
}

function renderScore(m) {
  var s = ST[m];
  if (!s) return;
  var total = s.qs.length;
  var pct = Math.round(s.score/total*100);
  var msg = pct>=90 ? '\u0909\u0924\u094D\u0915\u0943\u0937\u094D\u091F! Excellent! \uD83C\uDF89' :
            pct>=70 ? '\u092C\u0939\u0941\u0924 \u0928\u0940\u0915! Very good! \uD83D\uDC4D' :
            pct>=50 ? '\u0920\u0940\u0915\u0920\u093E\u0915\u093E\u0964 Not bad \u2014 keep practicing!' :
            '\u0905\u092D\u094D\u092F\u093E\u0938 \u091C\u093E\u0930\u0940 \u0930\u093E\u0916\u0942\u0964 Keep practicing!';
  var other = m==='em'?'me':'em';
  var otherLabel = m==='em' ? '\u092E\u0948\u0925\u093F\u0932\u0940 \u2192 English' : 'English \u2192 \u092E\u0948\u0925\u093F\u0932\u0940';
  document.getElementById('area-'+m).innerHTML =
    '<div class="scoreboard">' +
      '<div class="sc-big">'+s.score+' / '+total+'</div>' +
      '<div class="sc-pct">('+pct+'%)</div>' +
      '<div class="sc-msg">'+msg+'</div>' +
      '<div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">' +
        '<button class="nbtn pri" onclick="startQuiz(\''+m+'\')">&#x092B;&#x0947;&#x0930; &#x0916;&#x0947;&#x0932;&#x0942; / Play Again</button>' +
        '<button class="nbtn sec" onclick="switchMode(\''+other+'\')">'+otherLabel+'</button>' +
      '</div>' +
    '</div>';
}

window.onload = function() { startQuiz('em'); };
