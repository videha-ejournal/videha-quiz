<!DOCTYPE html>
<html lang="mai">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>गजल विशेषांक — विदेह क्विज</title>
<style>
:root{--navy:#1a2744;--crimson:#8B1A1A;--gold:#c49a3c;--cream:#FAF6EE;
--ok-fg:#1d7a3e;--bad-fg:#a32020}
*{box-sizing:border-box}
body{margin:0;background:var(--cream);color:#1A1A1A;
font-family:'Lato','Segoe UI',system-ui,sans-serif;line-height:1.55;padding-bottom:60px}
header{background:linear-gradient(180deg,#16213b,var(--navy));color:#fff;
padding:28px 20px 22px;text-align:center;border-bottom:4px solid var(--gold)}
header h1{margin:0;font-family:'Noto Serif Devanagari',serif;font-size:1.7em}
header .sub{color:var(--gold);font-size:.82em;letter-spacing:.1em;font-style:italic;margin-top:8px}
header .src{color:#cdd6ea;font-size:.78em;margin-top:6px}
.wrap{max-width:760px;margin:0 auto;padding:20px 16px}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;justify-content:center}
.tab{font-family:'Noto Serif Devanagari',serif;font-weight:700;font-size:.9em;
padding:8px 16px;border-radius:20px;border:2px solid var(--navy);background:#fff;
color:var(--navy);cursor:pointer;transition:.15s}
.tab.active{background:var(--navy);color:#fff}
.counter-badge{background:var(--crimson);color:#fff;font-size:.72em;font-weight:700;
padding:2px 7px;border-radius:10px;margin-left:6px;vertical-align:middle}
.progress{height:6px;background:#e7dcc2;border-radius:4px;margin-bottom:18px;overflow:hidden}
.progress > div{height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--crimson));transition:width .3s}
.pane{display:none}.pane.active{display:block}
.card{background:#fff;border-radius:11px;box-shadow:0 4px 16px rgba(26,39,68,.1);
padding:22px 22px 18px;margin-bottom:16px}
.qmeta{font-size:.78em;color:#8a93ab;font-weight:700;margin-bottom:8px}
.q{font-family:'Noto Serif Devanagari',serif;font-size:1.12em;font-weight:600;
color:var(--navy);margin-bottom:14px}
.opt{display:block;width:100%;text-align:left;
font-family:'Noto Serif Devanagari',serif;font-size:1em;
padding:11px 15px;margin-bottom:9px;border:1.5px solid #d8cfb8;border-radius:8px;
background:#fffdf8;cursor:pointer;transition:.13s;color:#1A1A1A}
.opt:hover{border-color:var(--gold);background:#fff8e8}
.opt.ok{border-color:var(--ok-fg);background:#eafaf0;color:var(--ok-fg);font-weight:700}
.opt.bad{border-color:var(--bad-fg);background:#fdeeee;color:var(--bad-fg)}
.opt:disabled{cursor:default}
.fb{margin-top:11px;font-size:.92em;font-weight:600;min-height:20px;
font-family:'Noto Serif Devanagari',serif}
.fb.ok{color:var(--ok-fg)}.fb.bad{color:var(--bad-fg)}
.hint-box{background:#fffbef;border:1px solid var(--gold);border-radius:7px;
padding:10px 14px;margin-top:10px;font-family:'Noto Serif Devanagari',serif;
font-size:.88em;color:#5a4010;display:none}
.hint-box.show{display:block}
.nav{display:flex;gap:9px;flex-wrap:wrap;margin-top:12px}
.nbtn{font-family:'Lato',sans-serif;font-size:.9em;font-weight:700;
padding:9px 20px;border-radius:6px;border:none;cursor:pointer;transition:.15s}
.nbtn.pri{background:var(--crimson);color:#fff}.nbtn.pri:hover{background:var(--navy)}
.nbtn.sec{background:transparent;color:var(--navy);border:2px solid var(--navy)}
.nbtn.sec:hover{background:var(--navy);color:#fff}
.scoreboard{background:#fff;border-radius:11px;box-shadow:0 4px 18px rgba(26,39,68,.11);
padding:34px 26px;text-align:center;margin-bottom:18px}
.scbig{font-family:'Playfair Display',serif;font-size:2.8em;color:var(--crimson);font-weight:700;margin-bottom:6px}
.scpct{font-size:1.05em;color:#5a6a8a;margin-bottom:9px}
.scmsg{font-family:'Noto Serif Devanagari',serif;font-size:1.05em;color:var(--navy);margin-bottom:20px}
.orn{text-align:center;color:var(--gold);font-size:1em;letter-spacing:.2em;margin:14px 0;opacity:.65}
footer{text-align:center;color:#8a7a4a;font-size:.78em;padding:24px 16px 0}
footer a{color:var(--crimson);text-decoration:none}
@media(max-width:520px){header h1{font-size:1.35em}.q{font-size:1.05em}}
</style>
</head>
<body>
<header>
  <h1>गजल विशेषांक</h1>
  <div class="sub">GAZAL SPECIAL ISSUE · विदेह अंक २१ · ०१ नवम्बर २००८</div>
  <div class="src">विदेह : प्रथम मैथिली पाक्षिक ई-पत्रिका · videha.co.in · ISSN 2229-547X</div>
</header>
<div class="orn">❖ ❖ ❖</div>
<div class="wrap">
  <div class="tabs" id="tabs"></div>
  <div class="progress"><div id="bar"></div></div>
  <div id="panes"></div>
</div>
<footer>© विदेह Videha · <a href="https://videha.co.in">videha.co.in</a> · विदेह विशेषांक प्रश्नोत्तरी</footer>
<script>
const DATA = [{"tab": "विशेषांक परिचय", "items": [{"q": "विदेहक ई गजल विशेषांक कोन तिथिकेँ प्रकाशित भेल?", "opts": ["०१ नवम्बर २००८", "१५ जून २००८", "१५ मार्च २०१३", "१५ नवम्बर २०१३"], "correct": 0, "hint": "वर्ष १, मास ११, अंक २१।"}, {"q": "ई गजल विशेषांक विदेहक कोन अंक छल?", "opts": ["अंक २१", "अंक १२", "अंक १४२", "अंक १२६"], "correct": 0, "hint": "हाइकू अंक (१२) केर बाद।"}, {"q": "\"मैथिलीमे गजल आ एकर संरचना\" शीर्षक आलेखक लेखक के छथि?", "opts": ["धीरेन्द्र प्रेमर्षि", "देवशंकर नवीन", "गंगेश गुंजन", "महेन्द्र मलंगिया"], "correct": 0, "hint": "गजल-संरचनाक मूल आलेख।"}]}, {"tab": "मैथिली गजल", "items": [{"q": "आलेख अनुसार मैथिलीमे गजलक श्रीगणेश करनिहार (पहिल गजलकार) के छथि?", "opts": ["पं. जीवन झा", "सियाराम झा 'सरस'", "राजेन्द्र विमल", "कलानन्द भट्ट"], "correct": 0, "hint": "हिन्दीक भारतेन्दु आ नेपालीक मोतीराम भट्टक समकालीन।"}, {"q": "हिन्दीमे गजलक श्रीगणेश करनिहार के मानल गेल छथि?", "opts": ["भारतेन्दु", "मोतीराम भट्ट", "जीवन झा", "ग़ालिब"], "correct": 0, "hint": "तीनू भाषामे एक्कहि कालखण्ड।"}, {"q": "जनकवि \"यात्री\" (वैद्यनाथ मिश्र) केर कोन कविता पूर्णतः गजलक संरचनामे लिखल गेल अछि?", "opts": ["भगवान हमर ई मिथिला", "एना कतेक दिन", "अन्चिनहार गाम", "लोकवेद आ लालकिला"], "correct": 0, "hint": "मिथिला विषयक प्रसिद्ध रचना।"}, {"q": "\"पल्लव\"क गजल अंकमे एकमात्र महिला गजलकारक रूपमे के प्रस्तुत भेलीह?", "opts": ["डा. शेफालिका वर्मा", "रूपा धीरू", "ज्योति झा चौधरी", "विभा रानी"], "correct": 0, "hint": "आलेख कहैत अछि गजलमे महिला हस्ताक्षर बहुत कम।"}, {"q": "आलेख अनुसार मूलतः गीतकार रहितहु गजल लिखनिहारमे कोन नाम अछि?", "opts": ["आरसीप्रसाद सिंह", "फजलुर्रहमान हाशमी", "तारानन्द वियोगी", "रोशन जनकपुरी"], "correct": 0, "hint": "रवीन्द्रनाथ ठाकुर, बुद्धिनाथ मिश्र सेहो एहि सूचीमे।"}]}, {"tab": "साहित्य समाचार", "items": [{"q": "पहिल कीर्तिनारायण मिश्र सम्मान कोन कविकेँ \"एना कतेक दिन\" संग्रह पर देल गेल?", "opts": ["हरेकृष्ण झा", "मन्त्रेश्वर झा", "कीर्तिनारायण मिश्र", "गंगेश गुंजन"], "correct": 0, "hint": "विद्यापति पर्वक अवसरपर, १९५० जन्म, गाम कोइलख।"}, {"q": "एहि बेरक यात्री चेतना पुरस्कार केकरा भेटल?", "opts": ["मन्त्रेश्वर झा", "हरेकृष्ण झा", "कीर्तिनारायण मिश्र", "देवशंकर नवीन"], "correct": 0, "hint": "गाम लालगंज, जिला मधुबनी।"}, {"q": "एहि अंकमे चर्चित \"द ह्वाइट टाइगर\" उपन्यासकेँ कोन पुरस्कार भेटल छल?", "opts": ["मैन बुकर", "नोबेल", "ज्ञानपीठ", "साहित्य अकादमी"], "correct": 0, "hint": "लेखक अरविन्द अडिग।"}, {"q": "गद्य-पद्य मिश्रित \"राधा\" (छठम खेप) केर रचनाकार के छथि?", "opts": ["गंगेश गुंजन", "रामलोचन ठाकुर", "धीरेन्द्र प्रेमर्षि", "श्यामल सुमन"], "correct": 0, "hint": "मैथिली साहित्यक नव कीर्तिमान कहल गेल।"}, {"q": "विश्वनाथन आनन्द एहि कालमे कोन प्रतियोगिता जितलन्हि?", "opts": ["वर्ल्ड चेस", "बुकर", "ओलम्पिक", "कॉमनवेल्थ"], "correct": 0, "hint": "संगहि भारत चन्द्रयान-१ शुरू कएलक।"}]}];
let score=0,total=0,answered=0;
DATA.forEach(g=>total+=g.items.length);
const tabsEl=document.getElementById('tabs');
const panesEl=document.getElementById('panes');
const bar=document.getElementById('bar');
DATA.forEach((g,gi)=>{
  const tb=document.createElement('button');
  tb.className='tab'+(gi===0?' active':'');
  tb.innerHTML=g.tab+'<span class="counter-badge">'+g.items.length+'</span>';
  tb.onclick=()=>switchTab(gi);
  tabsEl.appendChild(tb);
  const pane=document.createElement('div');
  pane.className='pane'+(gi===0?' active':'');
  pane.id='pane-'+gi;
  g.items.forEach((q,qi)=>pane.appendChild(buildCard(g,gi,qi,q)));
  panesEl.appendChild(pane);
});
function buildCard(g,gi,qi,q){
  const card=document.createElement('div');card.className='card';
  const meta=document.createElement('div');meta.className='qmeta';
  meta.textContent=g.tab+' · प्रश्न '+(qi+1)+'/'+g.items.length;card.appendChild(meta);
  const qd=document.createElement('div');qd.className='q';qd.textContent=q.q;card.appendChild(qd);
  const opts=[];
  q.opts.forEach((o,oi)=>{
    const b=document.createElement('button');b.className='opt';b.textContent=o;
    b.onclick=()=>pick(b,oi);card.appendChild(b);opts.push(b);
  });
  const fb=document.createElement('div');fb.className='fb';card.appendChild(fb);
  let hintBox=null;
  if(q.hint){hintBox=document.createElement('div');hintBox.className='hint-box';
    hintBox.textContent='💡 '+q.hint;card.appendChild(hintBox);}
  const nav=document.createElement('div');nav.className='nav';
  if(q.hint){const hb=document.createElement('button');hb.className='nbtn sec';hb.textContent='संकेत';
    hb.onclick=()=>hintBox.classList.toggle('show');nav.appendChild(hb);}
  card.appendChild(nav);
  let done=false;
  function pick(btn,oi){
    if(done)return;done=true;answered++;
    opts.forEach((b,bi)=>{b.disabled=true;
      if(bi===q.correct)b.classList.add('ok');
      else if(b===btn)b.classList.add('bad');});
    if(oi===q.correct){score++;fb.className='fb ok';fb.textContent='✓ सही उत्तर!';}
    else{fb.className='fb bad';fb.textContent='✗ सही उत्तर: '+q.opts[q.correct];}
    bar.style.width=(answered/total*100)+'%';
    if(answered===total)showScore();
  }
  return card;
}
function switchTab(gi){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===gi));
  document.querySelectorAll('.pane').forEach((p,i)=>p.classList.toggle('active',i===gi));
  window.scrollTo({top:0,behavior:'smooth'});
}
function showScore(){
  const pct=Math.round(score/total*100);
  let msg=pct>=80?'उत्कृष्ट! अहाँक ज्ञान अद्भुत अछि।':pct>=50?'नीक प्रयास — आओर पढ़ू।':'फेर सँ प्रयास करू, अहाँ नीक करब।';
  const sb=document.createElement('div');sb.className='scoreboard';
  sb.innerHTML='<div class="orn">❖ ❖ ❖</div><div class="scbig">'+score+' / '+total+'</div>'+
    '<div class="scpct">'+pct+'%</div><div class="scmsg">'+msg+'</div>'+
    '<button class="nbtn pri" onclick="location.reload()">फेर सँ खेलू</button>';
  const w=document.querySelector('.wrap');w.insertBefore(sb,w.firstChild);
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
