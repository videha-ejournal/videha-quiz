</script><script>

    // --------------------------------------------------------------
    // DATA – fresh selection from the Maithili English Thesaurus
    // (third quiz – using less common / previously untouched words)
    // --------------------------------------------------------------
    const FRESH_DATA = [
        { maithili: "अँटकारब (aṅṭakārab)", english: "guess, reckon", hint: "अनुमान लगाएब" },
        { maithili: "अँटकब (aṅṭakab)", english: "stay, linger", hint: "रुकब, ठहरब" },
        { maithili: "अँचार (aṅchār)", english: "pickle", hint: "अमत फलक रीदमे सिझाए बनल" },
        { maithili: "अगोरब (agorab)", english: "watch, guard", hint: "रखवारि करब" },
        { maithili: "अघाएब (aghāeb)", english: "satiate, surfeit", hint: "पूर्ण तृप्त होएब" },
        { maithili: "अङ्क (ank)", english: "mark, number", hint: "चिह्न, संख्या" },
        { maithili: "अचल (achal)", english: "immovable, firm", hint: "स्थिर, नहि चले" },
        { maithili: "अटपट (aṭapaṭ)", english: "absurd, nonsensical", hint: "अनगेल, अप्रासंगिक" },
        { maithili: "अतीत (atīt)", english: "past", hint: "बीतल काल" },
        { maithili: "अदृश्य (adrishya)", english: "invisible", hint: "दृष्टि से बाहर" },
        { maithili: "अनमन (anaman)", english: "absent-minded", hint: "दूर में मन के रहैत" },
        { maithili: "अपराध (aprādh)", english: "crime, offence", hint: "कसूर, दोष" },
        { maithili: "अभय (abhay)", english: "fearless", hint: "डरहीन" },
        { maithili: "अमृत (amrit)", english: "nectar", hint: "सुधा, पीयूष" },
        { maithili: "अरुचि (aruchi)", english: "disgust, aversion", hint: "विरक्ति, अनिच्छा" },
        { maithili: "अश्रु (ashru)", english: "tear", hint: "नोर, आँखिक जल" },
        { maithili: "आकाश (ākāsh)", english: "sky", hint: "नभ, आसमान" },
        { maithili: "आग्रह (āgrah)", english: "insistence, urge", hint: "हठ, जिद" },
        { maithili: "आचरण (ācharaṇ)", english: "conduct, behaviour", hint: "चालि-चलन" },
        { maithili: "आनन्द (ānand)", english: "joy", hint: "हर्ष, प्रसन्नता" },
        { maithili: "इच्छा (ichchhā)", english: "desire", hint: "अभिलाषा, कामना" },
        { maithili: "उपकार (upkār)", english: "help, favour", hint: "हितक चेष्टा" },
        { maithili: "ऊँच (ū̃ch)", english: "high", hint: "उच्चत" },
        { maithili: "एकता (ektā)", english: "unity", hint: "मेल, ऐक्य" },
        { maithili: "ऐतिहासिक (aitihāsik)", english: "historical", hint: "इतिहास सम्बन्धी" },
        { maithili: "कठिन (kaṭhin)", english: "difficult", hint: "कष्टसाध्य, जटिल" },
        { maithili: "करब (karab)", english: "do", hint: "क्रियाक सम्पादन" },
        { maithili: "कलह (kalah)", english: "quarrel", hint: "झगड़ा, विरोध" },
        { maithili: "क्षमा (kṣamā)", english: "forgiveness", hint: "माफी, उदारता" },
        { maithili: "गुप्त (gupt)", english: "secret, hidden", hint: "नुकाओल, छिपाओल" },
        { maithili: "गृह (grih)", english: "house", hint: "घर, निवास" }
    ];

    // Helper: shuffle array
    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // Generate distractors from the same dataset (excluding current word's correct meaning)
    function getDistractors(correctMeaning, currentWord, fullSet, count = 3) {
        let candidates = fullSet.filter(item => item.english !== correctMeaning && item.maithili !== currentWord)
                               .map(item => item.english);
        candidates = [...new Set(candidates)];
        if (candidates.length < count) {
            const fallback = ["peace", "fire", "water", "earth", "wind", "king", "queen", "light", "darkness"];
            candidates.push(...fallback);
            candidates = [...new Set(candidates)];
        }
        return shuffle(candidates).slice(0, count);
    }

    // Build complete question bank with options
    function buildQuestionBank() {
        const bank = [];
        for (let item of FRESH_DATA) {
            const correctAns = item.english;
            const wrongs = getDistractors(correctAns, item.maithili, FRESH_DATA, 3);
            let options = [correctAns, ...wrongs];
            options = shuffle(options);
            bank.push({
                maithili: item.maithili,
                correct: correctAns,
                options: options,
                hint: item.hint
            });
        }
        return shuffle(bank); // random order every time
    }

    // Global state
    let questions = [];
    let currentIndex = 0;
    let score = 0;
    let streak = 0;
    let answered = false;
    let selectedOption = null;
    let totalQuestions = 0;

    // DOM elements
    const mainContainer = document.getElementById("quizMainBody");
    const scoreSpan = document.getElementById("scoreValue");
    const streakSpan = document.getElementById("streakValue");
    const currentIdxSpan = document.getElementById("currentIdx");
    const totalLenSpan = document.getElementById("totalLen");

    function updateHeaderStats() {
        scoreSpan.innerText = score;
        streakSpan.innerText = streak;
        currentIdxSpan.innerText = currentIndex + 1;
        totalLenSpan.innerText = totalQuestions;
    }

    // Render the current question
    function renderQuestion() {
        if (!questions.length || currentIndex >= questions.length) {
            showCompletionScreen();
            return;
        }
        const q = questions[currentIndex];
        let optionsHtml = "";
        const letters = ["𑂃", "𑂥", "𑂒", "𑂙"]; // Kaithi style markers

        for (let i = 0; i < q.options.length; i++) {
            const opt = q.options[i];
            let additionalClass = "";
            if (answered) {
                if (opt === q.correct) additionalClass = "correct-choice";
                else if (selectedOption === opt && opt !== q.correct) additionalClass = "wrong-choice";
                else additionalClass = "disabled-choice";
            }
            optionsHtml += `
                <div class="choice ${additionalClass}" data-choice="${escapeHtml(opt)}">
                    <div class="choice-letter">${letters[i]}</div>
                    <div class="choice-text">${escapeHtml(opt)}</div>
                </div>
            `;
        }

        let feedbackHtml = "";
        if (answered) {
            const isCorrect = (selectedOption === q.correct);
            const streakMsg = isCorrect ? (streak > 1 ? ` 🔥 धारा बढ़ि गेल (${streak})` : "") : " 😞 धारा टूटल";
            feedbackHtml = `
                <div class="feedback">
                    ${isCorrect ? "✅ सही उत्तर! +1 अंक" : "❌ गलत! सही अर्थ है: <strong>" + escapeHtml(q.correct) + "</strong>"}
                    <br><span style="font-size:0.85rem;">📖 संकेत: ${escapeHtml(q.hint)}</span>
                    <div class="streak-badge">${streakMsg}</div>
                </div>
            `;
        } else {
            feedbackHtml = `
                <div class="feedback">
                    💡 <strong>${escapeHtml(q.hint)}</strong><br>
                    ⚡ सही अंग्रेजी अर्थ चुनू
                </div>
            `;
        }

        const nextDisabled = answered ? "" : "disabled";
        const nextButtonHtml = `
            <div class="action-bar">
                <button class="btn btn-primary" id="nextBtn" ${nextDisabled}>➡ अगला शब्द</button>
                <button class="btn btn-secondary" id="resetBtn">🔄 नवीन प्रश्नसेट</button>
            </div>
        `;

        const fullHtml = `
            <div class="quiz-body">
                <div class="word-card">
                    <div class="maithili-word">${escapeHtml(q.maithili)}</div>
                    <div class="extra-hint">🔍 मैथिली शब्द – अंग्रेजी पर्याय</div>
                </div>
                <div class="options-area" id="optionsArea">
                    ${optionsHtml}
                </div>
                ${feedbackHtml}
                ${nextButtonHtml}
            </div>
        `;
        mainContainer.innerHTML = fullHtml;

        // attach events
        if (!answered) {
            const choiceDivs = document.querySelectorAll('.choice');
            choiceDivs.forEach(div => {
                div.addEventListener('click', (e) => {
                    if (answered) return;
                    const chosen = div.getAttribute('data-choice');
                    handleAnswer(chosen);
                });
            });
        }
        const nextBtn = document.getElementById('nextBtn');
        if (nextBtn) nextBtn.addEventListener('click', () => goToNextQuestion());
        const resetBtn = document.getElementById('resetBtn');
        if (resetBtn) resetBtn.addEventListener('click', () => fullReset());
    }

    function handleAnswer(chosenMeaning) {
        if (answered) return;
        const currentQ = questions[currentIndex];
        answered = true;
        selectedOption = chosenMeaning;
        const isCorrect = (chosenMeaning === currentQ.correct);
        if (isCorrect) {
            score++;
            streak++;
        } else {
            streak = 0;
        }
        updateHeaderStats();
        renderQuestion(); // re-render with feedback
    }

    function goToNextQuestion() {
        if (!answered) return;
        if (currentIndex + 1 < totalQuestions) {
            currentIndex++;
            answered = false;
            selectedOption = null;
            renderQuestion();
            updateHeaderStats();
        } else {
            showCompletionScreen();
        }
    }

    function showCompletionScreen() {
        const percent = Math.round((score / totalQuestions) * 100);
        let msg = "";
        if (percent >= 80) msg = "🎉 ब्रह्मास्त्र! तू मैथिली के ज्ञाता छी 🎉";
        else if (percent >= 55) msg = "👍 बेस-बेस, फेर कोशिश करू, शब्दकोश देखू";
        else msg = "📗 पुन: प्रयास करू, हर क्विज़ नव शब्द सिखावैत अछि";
        const resultHtml = `
            <div class="quiz-body result-container">
                <h2>🏁 क्विज़ समाप्त</h2>
                <div class="final-percent">${score} / ${totalQuestions}</div>
                <p style="margin: 16px 0;">${msg}</p>
                <div class="action-bar" style="margin-top: 12px;">
                    <button class="btn btn-primary" id="restartCompleteBtn">🔄 फेर सुरु करू</button>
                    <button class="btn btn-secondary" id="newFreshBtn">✨ नवा प्रश्न-भण्डार</button>
                </div>
            </div>
        `;
        mainContainer.innerHTML = resultHtml;
        const restartBtn = document.getElementById('restartCompleteBtn');
        const freshBtn = document.getElementById('newFreshBtn');
        if (restartBtn) restartBtn.addEventListener('click', () => fullReset());
        if (freshBtn) freshBtn.addEventListener('click', () => generateNewSetAndRestart());
    }

    function fullReset() {
        // reset with same questions but start from zero
        currentIndex = 0;
        score = 0;
        streak = 0;
        answered = false;
        selectedOption = null;
        updateHeaderStats();
        renderQuestion();
    }

    function generateNewSetAndRestart() {
        // build a brand new shuffled question set (distractors will vary)
        questions = buildQuestionBank();
        totalQuestions = questions.length;
        currentIndex = 0;
        score = 0;
        streak = 0;
        answered = false;
        selectedOption = null;
        updateHeaderStats();
        renderQuestion();
    }

    // helper to escape HTML
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // initialization
    function initQuiz() {
        questions = buildQuestionBank();
        totalQuestions = questions.length;
        currentIndex = 0;
        score = 0;
        streak = 0;
        answered = false;
        selectedOption = null;
        updateHeaderStats();
        renderQuestion();
    }

    initQuiz();

</script><a class="vq-back" href="https://www.videha.co.in/videha-elearning.htm">&larr; विदेह ई-लर्निङ्ग हब पर वापस जाउ</a>
