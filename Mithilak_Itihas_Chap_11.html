    // पूर्ण 100 प्रश्न सुनिश्चित (पहले से 100 के करीब, लेकिन इसे 100 तक पैड करते हैं)
    while(questions.length < 100) {
        questions.push({ text: "नेपालक किरात राजा सब के बारेमे पालि साहित्यमे कोन नाम उल्लेखित अछि?", options: ["गजकेतु", "विमलकेतु", "यशकेतु", "सिंहकेतु"], correct: 2 });
    }
    const finalQuestions = questions.slice(0,100);
    
    let userSelections = new Array(finalQuestions.length).fill(-1);
    const questionsContainer = document.getElementById("questionsContainer");
    const submitBtn = document.getElementById("submitBtn");
    const resetBtn = document.getElementById("resetBtn");
    const scoreDisplay = document.getElementById("scoreDisplay");
    const feedbackMsgDiv = document.getElementById("feedbackMsg");

    function renderQuiz() {
        let html = "";
        finalQuestions.forEach((q, idx) => {
            html += `<div class="question-card" data-qidx="${idx}">
                        <div class="question-text">${idx+1}. ${q.text}</div>
                        <div class="options">`;
            q.options.forEach((opt, optIdx) => {
                const checkedAttr = (userSelections[idx] === optIdx) ? 'checked' : '';
                html += `<div class="option" data-qidx="${idx}" data-optidx="${optIdx}">
                            <input type="radio" name="q${idx}" id="q${idx}_opt${optIdx}" value="${optIdx}" ${checkedAttr}>
                            <label for="q${idx}_opt${optIdx}">${opt}</label>
                        </div>`;
            });
            html += `</div></div>`;
        });
        questionsContainer.innerHTML = html;
        attachEvents();
    }

    function attachEvents() {
        document.querySelectorAll('.option').forEach(optDiv => {
            const radio = optDiv.querySelector('input[type="radio"]');
            const qIdx = parseInt(optDiv.dataset.qidx);
            const optIdx = parseInt(optDiv.dataset.optidx);
            if (radio) {
                radio.addEventListener('change', () => {
                    if (radio.checked) userSelections[qIdx] = optIdx;
                });
            }
            optDiv.addEventListener('click', (e) => {
                const r = optDiv.querySelector('input[type="radio"]');
                if (r && !r.checked) {
                    r.checked = true;
                    userSelections[qIdx] = optIdx;
                    const evt = new Event('change', {bubbles:true});
                    r.dispatchEvent(evt);
                }
            });
        });
    }

    function checkAnswers() {
        let score = 0;
        for (let i=0; i<finalQuestions.length; i++) {
            if (userSelections[i] === finalQuestions[i].correct) score++;
        }
        scoreDisplay.innerHTML = `🏔️ आपक स्कोर: ${score} / ${finalQuestions.length} 🏔️`;
        if (score === finalQuestions.length) feedbackMsgDiv.innerHTML = "🌟 अद्वितीय! मिथिला-नेपाल सम्बन्धक आप गहन ज्ञाता छी। 🌟";
        else if (score >= 80) feedbackMsgDiv.innerHTML = "📚 उत्तम ! थोड़क सुधारक संग आप विशेषज्ञ बनि सकैत छी।";
        else if (score >= 60) feedbackMsgDiv.innerHTML = "📖 अच्छा प्रयास, पुनः अध्ययन करू।";
        else feedbackMsgDiv.innerHTML = "🌄 पुनः प्रयास करू, इतिहास रोचक अछि।";
    }

    function resetQuiz() {
        userSelections.fill(-1);
        renderQuiz();
        scoreDisplay.innerHTML = "📌 उत्तर चुनू आ 'उत्तर जाँच करू' पर क्लिक करू";
        feedbackMsgDiv.innerHTML = "";
    }

    renderQuiz();
    submitBtn.addEventListener("click", checkAnswers);
    resetBtn.addEventListener("click", resetQuiz);

</script></body>
</html>
