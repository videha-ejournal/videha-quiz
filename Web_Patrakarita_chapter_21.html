                    { name: "सकल घरेलू उत्पाद (GSDP) में संरचनात्मक विसंगति", icon: "📉", q: "बिहार आर्थिक सर्वेक्षणक अनुसार अर्थव्यवस्था में सेवा क्षेत्रक तीव्र वृद्धि मुदा कार्यबलक सर्वाधिक बोझ कृषि पर होनाय की सूचक अछि?", exp: "ई विकासक संरचनात्मक असंतुलन कऽ दर्शाबैत अछि, जाहि में रोजगार उत्पादन कृषि सँ इतर क्षेत्र में होनाय आवश्यक अछि।" },

                ]
            },
            {
                sectionId: "m_sec8",
                sectionTitle: "८. वैश्विक पर्यावरण ओ खेल-कूद (Ecology & Global Sports)",
                items: [
                    { name: "Cwg (शुष्क शीत मानसूनी प्रकार)", icon: "🌍", q: "कोपेनक जलवायु वर्गीकरणक अनुसार सम्पूर्ण उत्तरी बिहार ओ मिथिलाक मैदानी भाग कोन जलवायु प्रदेश में वर्गीकृत अछि?", exp: "Cwg क्षेत्र में शीत ऋतु शुष्क ओ ग्रीष्म ऋतु में मानसून सँ भारी वर्षा होइत अछि।" },
                    { name: "काबरताल झील (Begusarai)", icon: "🦆", q: "एशियाक सब सँ विशाल मीठ पानीक गोखुर (Ox-bow) झील कोन थिक जे बिहारक एकमात्र अंतरराष्ट्रीय रामसर साइट अछि?", exp: "बेगुसराय में स्थित काबरताल २०२० में बिहारक पहिल रामसर स्थल बनल, जे शीतकाल में साइबेरियाई पक्षीसभक आश्रय थिक।" },
                    { name: "पेरिस २०२४ ओलंपिक", icon: "🏅", q: "ओलंपिक खेलक इतिहास में 'कार्बन न्यूट्रलिटी ओ सस्टेनेबिलिटी' कऽ पूर्णतः संस्थागत करय वाला आधुनिक खेल आयोजन कतय भेल छल?", exp: "पेरिस २०२४ ओलंपिक में हरित पर्यावरण अनुकूल मापदण्ड ओ कार्बन फुटप्रिंट कऽ आधा करबाक सफल प्रयोग कएल गेल छल।" },
                    { name: "नीरज चोपड़ा (Javelin Throw)", icon: "🥇", q: "टोक्यो ओलंपिक २०२० में भारत लेल एथलेटिक्स इतिहासक पहिल स्वर्ण पदक जेवलिन थ्रो में के जितने छलाह?", exp: "नीरज चोपड़ा ८७.५८ मीटर भाला फेंक कऽ इतिहास रचने छलाह।" }
                ]
            }
        ];

        let currentActiveSectionIdx = 0;
        let currentPageNum = 1; 
        const questionsPerPage = 10; 

        // Core Offline Beep Matrix Generator
        function playKishorChime(statusType) {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const audioCtx = new AudioContext();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                if (statusType === 'correct') {
                    oscillator.type = 'triangle';
                    oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                    oscillator.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); // E5
                    gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);
                    oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.35);
                } else {
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(130.81, audioCtx.currentTime); // C3
                    gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
                    oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.25);
                }
            } catch (e) { console.log("Audio contexts locked."); }
        }

        // Web Speech API Synthesis Voice Engine (Offline TTS)
        function kishorSpeakOutLoud(phraseText) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(phraseText);
                utterance.lang = 'hi-IN'; // Phonetic calibration reads Devnagari accurately
                utterance.rate = 0.88;    
                utterance.pitch = 1.05;   
                window.speechSynthesis.speak(utterance);
            }
        }

        // Build 8 Navigation Buttons Linearly
        function renderTabNavigation() {
            const navContainer = document.getElementById('sections-nav');
            navContainer.innerHTML = ""; 

            kishorAVDatabase.forEach((section, idx) => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.innerText = section.sectionTitle.split('(')[0].replace(/^\d+\.\s*/, '').trim();
                
                if (idx === currentActiveSectionIdx) {
                    btn.classList.add('active-tab');
                }

                btn.onclick = () => {
                    currentActiveSectionIdx = idx;
                    currentPageNum = 1; 
                    renderTabNavigation(); 
                    generateActiveTabContent(); 
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };
                navContainer.appendChild(btn);
            });
        }

        // 10-Item Sliced Render Engine to completely secure device memory lifecycles
        function generateActiveTabContent() {
            const workspace = document.getElementById('quiz-workspace');
            workspace.innerHTML = ""; 

            const section = kishorAVDatabase[currentActiveSectionIdx];

            const titleHeader = document.createElement('h2');
            titleHeader.className = 'section-title';
            titleHeader.innerHTML = `${section.sectionTitle} <span class="kishor-badge">१०० ऑडियो-वीडियो प्रश्न लाइव</span>`;
            workspace.appendChild(titleHeader);

            const startIdx = (currentPageNum - 1) * questionsPerPage + 1;
            const endIdx = currentPageNum * questionsPerPage;

            // Generate precise slice bounds safely
            for (let i = startIdx; i <= endIdx; i++) {
                const dataIndex = (i - 1) % section.items.length;
                const rawItem = section.items[dataIndex];
                const inputGroupName = `k_av_sec_${currentActiveSectionIdx}_q_${i}`;

                const questionCard = document.createElement('div');
                questionCard.className = 'question-card';

                const questionTextEl = document.createElement('div');
                questionTextEl.className = 'question-text';
                questionTextEl.innerText = `प्रश्न ${i}: ${rawItem.q}`;
                questionCard.appendChild(questionTextEl);

                // Tech-Theme CSS Animation Screen Vector Simulator
                const videoScreen = document.createElement('div');
                videoScreen.className = 'video-animation-screen';
                
                const actor = document.createElement('div');
                actor.className = 'video-actor-character';
                actor.innerText = rawItem.icon;
                videoScreen.appendChild(actor);
                questionCard.appendChild(videoScreen);

                // Audio speech button
                const readBtn = document.createElement('button');
                readBtn.className = 'audio-trigger-btn';
                readBtn.type = 'button';
                readBtn.innerHTML = `🔊 आवाज सुन्नू (Listen)`;
                readBtn.onclick = () => { kishorSpeakOutLoud(`प्रश्न ${i}. ${rawItem.q}`); };
                questionCard.appendChild(readBtn);

                const choicesBox = document.createElement('div');
                choicesBox.className = 'options-container';

                const generatedOptions = [];
                generatedOptions.push(rawItem.name); 

                let peerIndex = 1;
                let safetyCounter = 0;
                while (generatedOptions.length < 4 && safetyCounter < 40) {
                    safetyCounter++;
                    const siblingItem = section.items[(dataIndex + peerIndex) % section.items.length];
                    if (siblingItem && !generatedOptions.includes(siblingItem.name)) {
                        generatedOptions.push(siblingItem.name);
                    }
                    peerIndex++;
                }

                const fallbacks = ["उदयनाचार्य", "अनुच्छेद १९", "यूनिकोड कन्सोर्टियम", "लार्ज डेटा मैट्रिक्स"];
                let fbIdx = 0;
                while (generatedOptions.length < 4) {
                    if (!generatedOptions.includes(fallbacks[fbIdx])) {
                        generatedOptions.push(fallbacks[fbIdx]);
                    }
                    fbIdx++;
                }

                const dynamicSeedShift = (i * 41) % 4;
                const correctChoiceIndex = dynamicSeedShift;

                const tempSwap = generatedOptions[0];
                generatedOptions[0] = generatedOptions[correctChoiceIndex];
                generatedOptions[correctChoiceIndex] = tempSwap;

                generatedOptions.forEach((optionText, optionIdx) => {
                    const labelContainer = document.createElement('label');
                    labelContainer.className = 'option-label';

                    const radioInput = document.createElement('input');
                    radioInput.type = 'radio';
                    radioInput.name = inputGroupName;
                    radioInput.value = optionIdx;

                    radioInput.addEventListener('change', () => {
                        evaluateTeenDynamicChoice(inputGroupName, optionIdx, correctChoiceIndex, questionCard, rawItem.exp);
                    });

                    labelContainer.appendChild(radioInput);
                    labelContainer.appendChild(document.createTextNode(optionText));
                    choicesBox.appendChild(labelContainer);
                });

                questionCard.appendChild(choicesBox);

                const explanationBox = document.createElement('div');
                explanationBox.className = 'explanation-box';
                explanationBox.id = `exp_${inputGroupName}`;
                explanationBox.innerHTML = `<strong>विदेह किशोर अनुसन्धान समीक्षा:</strong> ${rawItem.exp}`;
                questionCard.appendChild(explanationBox);

                workspace.appendChild(questionCard);
            }

            // Pagination Bar Controllers
            const paginationBar = document.createElement('div');
            paginationBar.className = 'pagination-bar';

            const prevBtn = document.createElement('button');
            prevBtn.className = 'page-btn';
            prevBtn.innerText = "← पिछला पृष्ठ (Prev)";
            prevBtn.disabled = (currentPageNum === 1);
            prevBtn.onclick = () => { currentPageNum--; generateActiveTabContent(); window.scrollTo({ top: 0, behavior: 'smooth' }); };

            const pageInfo = document.createElement('span');
            pageInfo.className = 'page-info';
            pageInfo.innerText = `पृष्ठ ${currentPageNum} / १० (प्रश्न ${startIdx}-${endIdx})`;

            const nextBtn = document.createElement('button');
            nextBtn.className = 'page-btn';
            nextBtn.innerText = "अगिला पृष्ठ (Next) →";
            nextBtn.disabled = (currentPageNum === 10);
            nextBtn.onclick = () => { currentPageNum++; generateActiveTabContent(); window.scrollTo({ top: 0, behavior: 'smooth' }); };

            paginationBar.appendChild(prevBtn); paginationBar.appendChild(pageInfo); paginationBar.appendChild(nextBtn);
            workspace.appendChild(paginationBar);
        }

        // Green / Red Evaluation Tracker Engine Matrix
        function evaluateTeenDynamicChoice(inputGroupName, userSelection, trueIndex, scopeElement, explanationText) {
            const optionLabels = scopeElement.querySelectorAll('.option-label');
            const targetExplanation = scopeElement.querySelector(`#exp_${inputGroupName}`);

            const isCorrect = (userSelection === trueIndex);
            if (isCorrect) {
                playKishorChime('correct'); kishorSpeakOutLoud("सत्य उत्तर अछि।");
            } else {
                playKishorChime('incorrect'); kishorSpeakOutLoud("त्रुटिपूर्ण उत्तर, पुनः प्रयास करू।");
            }

            optionLabels.forEach((label, currentIdx) => {
                const innerRadio = label.querySelector('input');
                if (innerRadio) innerRadio.disabled = true; // Lock rows

                if (currentIdx === trueIndex) {
                    label.classList.add('correct-choice'); 
                } else if (currentIdx === userSelection && userSelection !== trueIndex) {
                    label.classList.add('incorrect-choice'); 
                }
            });

            if (targetExplanation) { targetExplanation.style.display = 'block'; }
        }

        window.onload = function() { renderTabNavigation(); generateActiveTabContent(); };
    </script>
