        { text: "मैथिली साहित्यक प्राचीनतम साहित्य 'चर्यापद' के कालक विद्वान प्रायः कोन शताब्दी मानैत छथि ?", options: ["७म-११म शताब्दी", "५म शताब्दी", "१२म शताब्दी", "९म शताब्दी"], correct: 0 },
        { text: "कवीश्वर चन्द्राझा के महाकाव्य ‘रामायण’ के प्रकाशन के बाद मैथिलीमे महाकाव्य परम्पराक प्रारम्भ भेल, ई प्रकाशन कोन दशकमे भेल ?", options: ["१८९०", "१९०५", "१९२०", "१९३०"], correct: 1 },
        { text: "लेखक के अनुसार ‘प्रयोगवाद’ युगक स्थापना करबाक पूर्व मैथिली साहित्यमे दृश्य परिवर्तन कोन कालखण्डमे देखल गेल ?", options: ["१८६०-१९००", "१९२५-१९३०", "१९४०-१९५०", "१९१०-१९२०"], correct: 1 },
        { text: "प्रो. हरिगोहन झाक ‘कन्यादान’ (१९३३) के प्रकाशन के परिणामस्वरूप कोन विधामे नवीन शिल्प विकसित भेल ?", options: ["कथा-साहित्य (उपन्यास)", "गीत-काव्य", "नाटक", "निबन्ध"], correct: 0 },
        { text: "मैथिली साहित्यक इतिहास लेखनमे डा. दिनेश कुमार झा द्वारा ‘उल्लेखनात्मक इतिहास’ के नामे पुस्तक अछि ?", options: ["मैथिली साहित्यक उल्लेखनात्मक इतिहास", "साहित्य दर्पण", "मैथिली प्रबन्ध", "कोनो नहि"], correct: 0 },
        { text: "डा. जयकान्त मिश्र अपन इतिहासमे कितना भाग (खण्ड) बज्ञात छथि ?", options: ["एक", "दुई", "तीन", "चार"], correct: 1 },
        { text: "लेखक के अनुसार 'मध्यकाल' के अन्त आ 'आधुनिक काल' के आरम्भ मे लगभग ६० वर्षक अन्तर विद्वानसभ मे अछि, कारण छी ?", options: ["स्पष्ट साहित्यिक घटनाक अभाव", "ऐतिहासिक प्रमाणक कमी", "राजनैतिक अस्थिरता", "उपर्युक्त सभ"], correct: 3 },
        { text: "डा. जयकान्त मिश्र मैथिली आधुनिक युगक प्रारम्भ हेतु कोन वर्ष के महत्वपूर्ण मानैत छथि ?", options: ["१८८०", "१८५७-६०", "१९००", "१९२०"], correct: 1 },
        { text: "मैथिली साहित्यक विषय-प्रवेश मे युग-विभाजनक समस्या पर लेखक के मुख्य सन्देश छी ?", options: ["प्रत्येक विद्वान भिन्न-भिन्न सीमा देने अछि", "निर्धारित करब कठिन", "दुनू सही अछि", "कोनो समस्या नहि"], correct: 0 },
        { text: "प्रो. रमानाथ झा 'पद्य-संग्रह' के प्रकाशन सँ मैथिली साहित्यक क्षेत्रमे कया सुविधा भेल ?", options: ["प्राचीन आ नवीन कविताक ऐतिहासिक रूपरेखा", "संस्कृत अध्ययन", "व्याकरण निर्धारण", "कोनो नहि"], correct: 0 },
        { text: "लेखक अनुसार १९२५-३० के बाद मैथिली कविताक नवीन प्रवृत्तिक समानान्तर कथाशिल्प मे प्रयोगक आग्रह प्रबल भेल, तहि कालके प्रमुख कथाकार छथि ?", options: ["गंगानन्द सिंह", "प्रो. हरिगोहन झा", "बटुकनाथ झा", "प्रो. रमानाथ झा"], correct: 1 },
        { text: "मैथिली साहित्यमे पत्र-पत्रिकाक प्रकाशन परम्पराक कारण आधुनिक युगमे विशेष प्रगति भेल, कोन पत्रिका सर्वाधिक महत्वपूर्ण मानल जाइत अछि ?", options: ["मिथिला मिहिर", "भोद", "वैदेही", "मिथिलादर्श"], correct: 1 },
        { text: "लेखक के अनुसार मैथिली साहित्यक इतिहासक काल-विभाजन मे विद्यापति युग के बाद कोन युग आबैत अछि ?", options: ["चन्द्राझाक युग (रामकाव्य)", "प्रयोगवाद युग", "गद्य युग", "महाकाव्य युग"], correct: 0 },
        { text: "‘पुरुष-परीक्षा’ के मैथिली अनुवाद (१८९८) मे चन्द्राझा भाषा के अनादर के विरुद्ध आवाज उठौलनि, एहि पुस्तक के भूमिकामे चन्द्राझा के का कहल अछि ?", options: ["मैथिलीमे अनादर बुद्धि", "हिन्दीक उन्नति", "अंग्रेजी प्रभाव", "संस्कृत श्रेष्ठता"], correct: 0 },
        { text: "लेखक दुर्गानाथ झा ‘शिशिर’ के अनुसार प्रायोगिक रुपमे मैथिली साहित्यक तीन युग छथि – विद्यापतिक युग (प्राचीन/कृष्णकाव्य), चन्द्राझाक युग (नवीन/रामकाव्य) आ तत्पश्चात् के युग। मुदा प्रयोगवादी कविता के कारण कोन नव युगक उदय संदिग्ध अछि ?", options: ["प्रयोगवाद युग अलग नहि बनि सकल", "ई फैशन मात्र अछि", "समाजसँ दूर", "ई सब सही अछि"], correct: 3 },
        { text: "प्रो. धीरेन्द्र १४१२-१५२७ ई. के मैथिली साहित्यक काल के का नाम देने छथि ?", options: ["विद्यापति-युग", "उत्तर-विद्यापति-युग", "चन्द्राझा युग", "भक्ति काल"], correct: 0 },
        { text: "आधुनिक युगक प्रारम्भ हेतु लेखक अंग्रेजी शिक्षाक प्रसार के साथ-साथ कोन आन्दोलन के महत्व स्वीकार करैत अछि ?", options: ["समाज-सुधार आ मातृभाषा-गौरव जागरण", "केवल राजनीतिक स्वतन्त्रता", "वैदिक यज्ञ", "कोनो नहि"], correct: 0 }
    ];
    
    // कुल 46 प्रश्न (विस्तृत अध्याय ३ हेतु)
    const totalQ = questions.length;
    let userSelections = new Array(totalQ).fill(null);
    let submitted = false;
    
    const qContainer = document.getElementById('questionsContainer');
    const totalSpan = document.getElementById('totalQ');
    const scoreSpan = document.getElementById('scoreCount');
    const percentSpanEl = document.getElementById('percentSpan');
    
    function renderQuiz() {
        qContainer.innerHTML = '';
        questions.forEach((q, idx) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.dataset.qid = idx;
            const qTextDiv = document.createElement('div');
            qTextDiv.className = 'q-text';
            qTextDiv.innerText = `${idx+1}. ${q.text}`;
            card.appendChild(qTextDiv);
            const optsDiv = document.createElement('div');
            optsDiv.className = 'opts';
            q.options.forEach((opt, optIdx) => {
                const optLabel = document.createElement('label');
                optLabel.className = 'opt';
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = `q_${idx}`;
                radio.value = optIdx;
                radio.disabled = submitted;
                if (userSelections[idx] === optIdx) radio.checked = true;
                radio.addEventListener('change', (e) => {
                    if (!submitted) {
                        userSelections[idx] = parseInt(e.target.value);
                        updateStatDisplay();
                        showSingleFb(idx, card);
                    }
                });
                const optSpan = document.createElement('span');
                optSpan.innerText = `${String.fromCharCode(65+optIdx)}. ${opt}`;
                optLabel.appendChild(radio);
                optLabel.appendChild(optSpan);
                optsDiv.appendChild(optLabel);
            });
            card.appendChild(optsDiv);
            const fbDiv = document.createElement('div');
            fbDiv.className = 'feedback';
            fbDiv.id = `fb_${idx}`;
            card.appendChild(fbDiv);
            qContainer.appendChild(card);
            if (submitted) showSingleFb(idx, card);
        });
        totalSpan.innerText = totalQ;
        updateStatDisplay();
    }
    
    function showSingleFb(qid, cardDiv) {
        const fbDiv = cardDiv.querySelector('.feedback');
        const selected = userSelections[qid];
        const correctIdx = questions[qid].correct;
        if (selected === null) {
            fbDiv.innerHTML = '';
            fbDiv.className = 'feedback';
            return;
        }
        if (selected === correctIdx) {
            fbDiv.innerHTML = '✅ सही उत्तर।';
            fbDiv.className = 'feedback correct-fb';
        } else {
            const correctLetter = String.fromCharCode(65+correctIdx);
            fbDiv.innerHTML = `❌ अशुद्ध। सही उत्तर : ${correctLetter}. ${questions[qid].options[correctIdx]}`;
            fbDiv.className = 'feedback wrong-fb';
        }
    }
    
    function updateStatDisplay() {
        let answered = userSelections.filter(v => v !== null).length;
        let correctCount = 0;
        for (let i=0; i<totalQ; i++) {
            if (userSelections[i] !== null && userSelections[i] === questions[i].correct) correctCount++;
        }
        if (!submitted) {
            scoreSpan.innerText = `${correctCount}/${totalQ}`;
            let perc = Math.round((correctCount/totalQ)*100);
            percentSpanEl.innerText = `${perc}% (प्रगति)`;
        } else {
            scoreSpan.innerText = `${correctCount}/${totalQ}`;
            let perc = Math.round((correctCount/totalQ)*100);
            percentSpanEl.innerText = `${perc}%`;
        }
    }
    
    function evaluateAll() {
        if (submitted) {
            alert("पहिने जाँच होइ चुकल अछि। नव उत्तर देवाक लेल 'पुनः आरम्भ' करू।");
            return;
        }
        let unanswered = [];
        for (let i=0; i<totalQ; i++) if (userSelections[i] === null) unanswered.push(i+1);
        if (unanswered.length > 0) {
            if (!confirm(`⚠️ ${unanswered.length} प्रश्न अनुत्तरित अछि (प्र. ${unanswered.slice(0,15).join(',')}...). जाँच करब?`)) return;
        }
        submitted = true;
        const allRadios = document.querySelectorAll('input[type="radio"]');
        allRadios.forEach(radio => radio.disabled = true);
        let finalCorrect = 0;
        for (let i=0; i<totalQ; i++) {
            const card = document.querySelector(`.question-card[data-qid='${i}']`);
            if (card) showSingleFb(i, card);
            if (userSelections[i] !== null && userSelections[i] === questions[i].correct) finalCorrect++;
        }
        scoreSpan.innerText = `${finalCorrect}/${totalQ}`;
        let perc = Math.round((finalCorrect/totalQ)*100);
        percentSpanEl.innerText = `${perc}% ${perc>=60 ? '📖 विद्वान्' : '📚 पुनरावृत्ति'}`;
    }
    
    function resetQuiz() {
        submitted = false;
        userSelections = new Array(totalQ).fill(null);
        const radios = document.querySelectorAll('input[type="radio"]');
        radios.forEach(r => { r.checked = false; r.disabled = false; });
        renderQuiz();
    }
    
    document.getElementById('submitBtn').addEventListener('click', evaluateAll);
    document.getElementById('resetBtn').addEventListener('click', resetQuiz);
    
    renderQuiz();

</script><a class="vq-back" href="https://www.videha.co.in/videha-elearning.htm">&larr; विदेह ई-लर्निङ्ग हब पर वापस जाउ</a>
