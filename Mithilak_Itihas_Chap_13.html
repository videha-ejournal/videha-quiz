            {text:"महाराज कामेश्वर सिंहक मृत्यु के वर्ष भेल?", opts:["1962","1950","1947","1955"],ans:0},
            {text:"कामेश्वर सिंहक मृत्युक बाद हुनक विल (वसीयत) के एक्जीक्युटर बनलाह?", opts:["पंडित लक्ष्मीकांत झा","डॉ. जटाशंकर झा","कुमार शुभेश्वर सिंह","राजा बहादुर विशेश्वर सिंह"],ans:0},
            {text:"दरभंगा राज्यक अन्तिम महाराज के छलाह?", opts:["कामेश्वर सिंह","रामेश्वर सिंह","लक्ष्मीश्वर सिंह","माधव सिंह"],ans:0},
            {text:"खुदीराम बोस कोन क्रान्तिकारी संगे अमर भेलाह?", opts:["प्रफुल्ल चाकी","बिपिन चन्द्र पाल","अरविन्द घोष","सुभाष बोस"],ans:0},
            {text:"लक्ष्मीश्वर सिंह केक वर्ष काँग्रेस अधिवेशन प्रयागमे भेल छल?", opts:["1888","1885","1890","1893"],ans:0},
            {text:"रामेश्वर सिंह बिहार जमीन्दार सभाक आजीवन सभापति छलाह – ओ कोन सभाक सक्रिय सदस्य छलाह?", opts:["लेजिस्लेटिव कौंसिल","कांग्रेस","हिन्दू महासभा","यूनियन पार्टी"],ans:0},
            {text:"ग्रैण्डक पश्चात तिरहूतक कलक्टर कोन भेलाह?", opts:["वार्थस्ट","केली","बारकर","डनकन"],ans:1},
            {text:"महाराज लक्ष्मीश्वर सिंह कोन राष्ट्रिय नेतासँ पत्राचार करैत छलाह?", opts:["महात्मा गाँधी","जवाहरलाल नेहरू","सुभाष चन्द्र बोस","बाल गंगाधर तिलक"],ans:0},
            {text:"खुदीराम बोस आ प्रफुल्ल चाकी केक आन्दोलनसँ जुड़ल अछि?", opts:["कलकत्ता बम प्रकरण","चम्पारण सत्याग्रह","असहयोग आन्दोलन","भारत छोड़ो"],ans:0},
            {text:"बेतियाक प्रथम महाराज जिनका शाहजहाँ सँ राजा पदवी मिलल छल?", opts:["गज सिंह","जुगलकेश्वर सिंह","उग्रसेन सिंह","पृथ्वी सिंह"],ans:0},
            {text:"बक्सर युद्ध (1764) के सेनापति कोन छलाह?", opts:["मीर कासिम","शुजाउद्दौला","शाह आलम द्वितीय","मीर जाफर"],ans:0},
            {text:"1765 मे राबर्ट बारकर केक जमीन्दारकेँ दबौलन्हि?", opts:["बेतिया राजा","दरभंगा राजा","मकवानी राजा","नरहन राजा"],ans:0},
            {text:"छत्रसिंहक नेपाल युद्धमे सहायता के हेतु कतेक घोड़सवार अंग्रेजकेँ देने छलन्हि?", opts:["16","12","25","30"],ans:0},
            {text:"महेश्वर सिंहक समयमे कोन अंग्रेज अधिकारीपर बन्दुक तानलक अफवाह फैलल छल?", opts:["डोवटन","ग्रैण्ड","केली","मिस्टर डोवटन"],ans:3},
            {text:"कोन राजा के समयमे दरभंगा राज्य पूर्ण रूपेण जमीन्दारी बनि गेल?", opts:["माधव सिंह","प्रताप सिंह","छत्रसिंह","लक्ष्मीश्वर सिंह"],ans:0},
            {text:"स्वतन्त्रता आन्दोलनमे चम्पारणक विशेष स्थान के हेतु अछि?", opts:["गाँधीजी क सत्याग्रह प्रयोग","नील कोठी विद्रोह","बीरू कुरमी आन्दोलन","जमीन्दारी विरोध"],ans:0},
            {text:"ग्रैण्ड कोन व्यवसाय सँ सम्बन्धित छलाह?", opts:["नील व्यापार","अफीम","पटसन","चाय"],ans:0},
            {text:"1857 क विद्रोहक बाद तिरहूत क्षेत्रमे सबसँ बेसी प्रभाव कोन उद्योगपर पड़ल?", opts:["नील उद्योग","जूट उद्योग","चीनी उद्योग","खादी"],ans:0},
            {text:"दरभंगा राज्यक अन्तिम प्रशासनिक सुधार के कालमे भेल?", opts:["कामेश्वर सिंह","रामेश्वर सिंह","लक्ष्मीश्वर सिंह","माधव सिंह"],ans:0},
            {text:"महाराज रामेश्वर सिंह के अलावा कोन महाराज संस्कृत एशोसियेसनक सभापति छलाह?", opts:["कामेश्वर सिंह","लक्ष्मीश्वर सिंह","शिवसिंह","प्रताप सिंह"],ans:0},
            {text:"चम्पारण सत्याग्रह के बाद गाँधीजी के शीघ्रहि कोन आन्दोलन शुरू केलन्हि?", opts:["असहयोग आन्दोलन","खेड़ा सत्याग्रह","दांडी मार्च","भारत छोड़ो"],ans:0},
            {text:"महाराज कामेश्वर सिंह कोन शोध संस्थानक स्थापना केलन्हि?", opts:["मिथिला रिसर्च इंस्टीच्युट","दरभंगा संग्रहालय","बिहार रिसर्च सोसाइटी","काशी प्रसाद जायसवाल संस्थान"],ans:0},
            {text:"1935 अधिनियमक बाद भारतमे जमीन्दारी उन्मूलनक प्रक्रिया के राज्य सबसँ पहिल शुरू केलक?", opts:["बिहार","मद्रास","बंगाल","बंबई"],ans:0}
        ];

        // ensure exactly 100 questions
        while(questions.length < 100) {
            questions.push({text:"अंग्रेजी राजक अमलमे मिथिलाक जनताक मुख्य पीड़ा कोन छल?", opts:["अत्यधिक कर","नील कोठीक जबर्दस्ती","जमीन्दारी उत्पीड़न","उपर्युक्त सभ"],ans:3});
        }
        const finalQ = questions.slice(0,100);
        let selections = new Array(finalQ.length).fill(-1);
        let container = document.getElementById("quizRoot");
        let scoreDiv = document.getElementById("scoreArea");
        let feedDiv = document.getElementById("feedMsg");

        function render(){
            let h = "";
            finalQ.forEach((q,i)=>{
                h += `<div class="q-card"><div class="q-text">${i+1}. ${q.text}</div><div class="options">`;
                q.opts.forEach((opt,oi)=>{
                    let checked = (selections[i]===oi) ? 'checked' : '';
                    h += `<div class="opt" data-q="${i}" data-o="${oi}">
                            <input type="radio" name="q${i}" id="q${i}_o${oi}" value="${oi}" ${checked}>
                            <label for="q${i}_o${oi}">${opt}</label>
                          </div>`;
                });
                h += `</div></div>`;
            });
            container.innerHTML = h;
            attachEvents();
        }

        function attachEvents(){
            document.querySelectorAll('.opt').forEach(el=>{
                const qIdx = parseInt(el.dataset.q);
                const oIdx = parseInt(el.dataset.o);
                const radio = el.querySelector('input[type="radio"]');
                if(radio){
                    radio.addEventListener('change',()=>{ if(radio.checked) selections[qIdx]=oIdx; });
                }
                el.addEventListener('click',()=>{
                    const r = el.querySelector('input[type="radio"]');
                    if(r && !r.checked){
                        r.checked = true;
                        selections[qIdx] = oIdx;
                        let ev = new Event('change',{bubbles:true});
                        r.dispatchEvent(ev);
                    }
                });
            });
        }

        function check(){
            let score=0;
            for(let i=0;i<finalQ.length;i++){
                if(selections[i]===finalQ[i].ans) score++;
            }
            scoreDiv.innerHTML = `🎯 अंक: ${score} / ${finalQ.length} 🎯`;
            if(score===finalQ.length) feedDiv.innerHTML = "🏆 उत्कृष्ट ! अंग्रेजी अमलक आप गहन ज्ञाता छी।";
            else if(score>=85) feedDiv.innerHTML = "📚 बहुत नीक, थोड़क अध्ययन आवश्यक।";
            else if(score>=70) feedDiv.innerHTML = "📖 अच्छा प्रयास, पुनः पठन करू।";
            else feedDiv.innerHTML = "📜 पुनः अध्ययन करू, इतिहास रोचक अछि।";
        }

        function resetQuiz(){
            selections.fill(-1);
            render();
            scoreDiv.innerHTML = "📌 उत्तर चुनू आ 'उत्तर जाँच करू' पर क्लिक करू";
            feedDiv.innerHTML = "";
        }

        window.onload = () => {
            render();
            document.getElementById("submitBtn").addEventListener("click",check);
            document.getElementById("resetBtn").addEventListener("click",resetQuiz);
        };
    })();
