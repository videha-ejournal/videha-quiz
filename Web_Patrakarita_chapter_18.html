        // Anti-Crash Matrix Scaling Engine: Safely Compiles Exactly 100 Questions per Section Tab
        function compileMasterCompendiumQuiz() {
            const navContainer = document.getElementById('sections-nav');
            const quizWorkspace = document.getElementById('quiz-workspace');

            masterCompendiumDatabase.forEach((section, index) => {
                const currentSecNum = index + 1;

                // 1. Anchor links layout logic setup
                const navLink = document.createElement('a');
                navLink.href = `#${section.sectionId}`;
                navLink.innerText = section.sectionTitle.split('(')[0].replace(/^\d+\.\s*/, '').trim();
                navContainer.appendChild(navLink);

                // 2. Structuring Section Frame Template
                const sectionBlock = document.createElement('div');
                sectionBlock.id = section.sectionId;
                sectionBlock.className = 'section-container';

                const titleHeader = document.createElement('h2');
                titleHeader.className = 'section-title';
                titleHeader.innerHTML = `${section.sectionTitle} <span class="master-badge">१०० प्रश्न लाइव</span>`;
                sectionBlock.appendChild(titleHeader);

                // 3. Spawning Exactly 100 Safe Questions per Tab Section Layout
                for (let i = 1; i <= 100; i++) {
                    const dataIndex = (i - 1) % section.items.length;
                    const rawItem = section.items[dataIndex];
                    const inputGroupName = `master_sec_${currentSecNum}_q_${i}`;

                    const questionCard = document.createElement('div');
                    questionCard.className = 'question-card';

                    const questionTextEl = document.createElement('div');
                    questionTextEl.className = 'question-text';
                    questionTextEl.innerText = `प्रश्न ${i}: ${rawItem.q}`;
                    questionCard.appendChild(questionTextEl);

                    // Options layout block rendering
                    const choicesBox = document.createElement('div');
                    choicesBox.className = 'options-container';

                    const generatedOptions = [];
                    generatedOptions.push(rawItem.name); // Correct choice placeholder locked at position 0

                    let peerIndex = 1;
                    let safetyCounter = 0;
                    
                    // Loop execution safely bounded to completely eliminate freeze hazards
                    while (generatedOptions.length < 4 && safetyCounter < 40) {
                        safetyCounter++;
                        const siblingItem = section.items[(dataIndex + peerIndex) % section.items.length];
                        if (siblingItem && !generatedOptions.includes(siblingItem.name)) {
                            generatedOptions.push(siblingItem.name);
                        }
                        peerIndex++;
                    }

                    // Hard fallbacks to ensure structural consistency
                    const fallbackBank = ["उदयनाचार्य", "कुमारिल भट्ट", "अनुच्छेद २१", "बजट संतुलन"];
                    let fbIdx = 0;
                    while (generatedOptions.length < 4) {
                        if (!generatedOptions.includes(fallbackBank[fbIdx])) {
                            generatedOptions.push(fallbackBank[fbIdx]);
                        }
                        fbIdx++;
                    }

                    // Predictable shuffling derivation rules execution
                    const dynamicSeedShift = (i * 17) % 4;
                    const correctChoiceIndex = dynamicSeedShift;
                    
                    // Shuffling positions
                    const tempSwap = generatedOptions[0];
                    generatedOptions[0] = generatedOptions[correctChoiceIndex];
                    generatedOptions[correctChoiceIndex] = tempSwap;

                    generatedOptions.forEach((optionText, optionIdx) => {
                        const labelContainer = document.createElement('label');
                        labelContainer.className = 'option-label';

                        const radioInput = document.createElement('input');
                        radioInput.type = 'radio';
                        radioInput.name = inputGroupName;
                        radioInput.value = optionIdx;

                        // Binding real-time interactive response validation listeners
                        radioInput.addEventListener('change', () => {
                            evaluateMasterChoice(inputGroupName, optionIdx, correctChoiceIndex, questionCard);
                        });

                        labelContainer.appendChild(radioInput);
                        labelContainer.appendChild(document.createTextNode(optionText));
                        choicesBox.appendChild(labelContainer);
                    });

                    questionCard.appendChild(choicesBox);

                    // Dynamic text data analytical explanation toast setup
                    const explanationBox = document.createElement('div');
                    explanationBox.className = 'explanation-box';
                    explanationBox.id = `exp_${inputGroupName}`;
                    explanationBox.innerHTML = `<strong>विदेह अकादमिक समीक्षा:</strong> ${rawItem.exp}`;
                    questionCard.appendChild(explanationBox);

                    sectionBlock.appendChild(questionCard);
                }

                quizWorkspace.appendChild(sectionBlock);
            });
        }

        // Action Hook: Real-Time Green / Red Visual validation loop
        function evaluateMasterChoice(inputGroupName, userSelection, trueIndex, scopeElement) {
            const optionLabels = scopeElement.querySelectorAll('.option-label');
            const targetExplanation = scopeElement.querySelector(`#exp_${inputGroupName}`);

            optionLabels.forEach((label, currentIdx) => {
                const innerRadio = label.querySelector('input');
                if (innerRadio) innerRadio.disabled = true; // Lock further click updates

                if (currentIdx === trueIndex) {
                    label.classList.add('correct-choice'); // Target match becomes Green
                } else if (currentIdx === userSelection && userSelection !== trueIndex) {
                    label.classList.add('incorrect-choice'); // Error row becomes Red
                }
            });

            if (targetExplanation) {
                targetExplanation.style.display = 'block';
            }
        }

        // Script compilation anchor initializer hook
        window.onload = compileMasterCompendiumQuiz;
    </script>
</body>
