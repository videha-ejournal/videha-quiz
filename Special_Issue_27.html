<!DOCTYPE html>
<html lang="mai">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>मैथिली क्विज़ - रामभरोस कापड़ि 'भ्रमर' विशेषांक | विदेह ३७०</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', 'Noto Sans Devanagari', 'Mukta', system-ui, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #1e3c2c 0%, #0e2a1c 100%);
            min-height: 100vh;
            padding: 25px 20px;
        }
        .quiz-container {
            max-width: 950px;
            margin: 0 auto;
            background: #fffaf2;
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            overflow: hidden;
            padding: 20px 28px 35px;
            transition: all 0.2s;
        }
        h1 {
            font-size: 2rem;
            color: #c4450c;
            border-left: 8px solid #2b7a3e;
            padding-left: 20px;
            margin: 0 0 8px 0;
            font-weight: 700;
        }
        .sub {
            color: #4a5b3e;
            margin-bottom: 25px;
            padding-left: 28px;
            font-weight: 500;
            border-bottom: 2px dotted #e2c7a3;
            display: inline-block;
        }
        .stats-bar {
            display: flex;
            justify-content: space-between;
            background: #e9f0e3;
            padding: 12px 20px;
            border-radius: 60px;
            margin: 15px 0 25px;
            flex-wrap: wrap;
            gap: 12px;
            font-weight: bold;
        }
        .score-card, .q-counter {
            background: #2c5e2f;
            padding: 6px 18px;
            border-radius: 40px;
            color: white;
            font-size: 1rem;
            box-shadow: inset 0 -1px 0 #1f3f21;
        }
        .score-card span, .q-counter span {
            font-weight: 800;
            font-size: 1.3rem;
            margin-left: 8px;
            background: #ffd966;
            color: #2d4a22;
            padding: 2px 10px;
            border-radius: 50px;
        }
        progress {
            width: 100%;
            height: 14px;
            border-radius: 20px;
            overflow: hidden;
        }
        progress::-webkit-progress-bar { background-color: #ddd9ce; }
        progress::-webkit-progress-value { background-color: #e67e22; border-radius: 20px; transition: width 0.2s;}
        .question-text {
            font-size: 1.65rem;
            font-weight: 700;
            background: #fff5e8;
            padding: 25px 22px;
            border-radius: 40px;
            margin: 15px 0 20px;
            line-height: 1.4;
            color: #1f3b26;
            border: 1px solid #f0dec0;
        }
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin: 20px 0 25px;
        }
        .option-btn {
            background: #ffffff;
            border: 2px solid #cfbc92;
            border-radius: 100px;
            padding: 14px 20px;
            font-size: 1.05rem;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            transition: 0.1s linear;
            color: #2a452a;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .option-prefix {
            font-weight: 800;
            background: #f2e0be;
            width: 38px;
            height: 38px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 60px;
            font-size: 1.2rem;
        }
        .option-btn:hover:not(.disabled-opt) {
            background: #fbefdb;
            transform: scale(0.99);
            border-color: #b97f3a;
        }
        .correct-highlight {
            background: #c8e6d9 !important;
            border-color: #2e7d32 !important;
            color: #1c441c;
        }
        .wrong-highlight {
            background: #ffe0db !important;
            border-color: #c7362b !important;
            color: #a12218;
            text-decoration: line-through;
        }
        .disabled-opt {
            cursor: default;
            opacity: 0.95;
        }
        .explanation-box {
            background: #ecf3e5;
            border-left: 6px solid #3b8c40;
            padding: 16px 20px;
            border-radius: 28px;
            margin: 10px 0 15px;
            font-size: 1rem;
            color: #2c3e2f;
            line-height: 1.45;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 15px;
        }
        button {
            background: #f1cf9a;
            border: none;
            padding: 10px 22px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.1s;
            color: #3a2a1c;
        }
        button.primary {
            background: #c95a0f;
            color: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        button.primary:hover { background: #a84305; transform: scale(1.02);}
        .jump-area {
            display: flex;
            gap: 12px;
            align-items: center;
            background: #fff0e0;
            padding: 6px 15px;
            border-radius: 80px;
        }
        select {
            padding: 8px 12px;
            border-radius: 40px;
            border: 1px solid #b78f54;
            background: white;
            font-size: 1rem;
            font-weight: bold;
        }
        footer {
            text-align: center;
            margin-top: 35px;
            font-size: 0.8rem;
            color: #6b5c42;
        }
        @media (max-width: 600px) {
            .quiz-container { padding: 15px; }
            .question-text { font-size: 1.3rem; padding: 18px; }
            .option-btn { font-size: 0.9rem; padding: 10px 14px;}
        }
        .reset-btn {
            background: #b5651e;
            color: white;
        }
    </style>
</head>
<body>
<div class="quiz-container" id="quizApp">
    <h1>📖 मैथिली क्विज़ : रामभरोस कापड़ि 'भ्रमर' विशेषांक</h1>
    <div class="sub">विदेह ३७० (२०२३) – बहुआयामी साहित्यकार, पत्रकार, नाटककार</div>
    
    <div class="stats-bar">
        <div class="score-card">✅ स्कोर : <span id="scoreValue">0</span> / <span id="totalQSpan">0</span></div>
        <div class="q-counter">📌 प्रश्न <span id="currentQSpan">1</span> / <span id="totalQSpan2">0</span></div>
        <div class="jump-area">
            <span>🔢 जाउ :</span>
            <select id="jumpSelect"></select>
        </div>
    </div>
    <div class="progress-area">
        <progress id="quizProgress" value="0" max="100"></progress>
    </div>

    <div id="questionContainer" class="question-text">लोड होइत अछि...</div>
    <div class="options-grid" id="optionsContainer"></div>
    <div id="explanationDiv" class="explanation-box" style="display: none;"></div>

    <div class="nav-buttons">
        <button id="prevBtn" class="primary">◀ पिछला</button>
        <button id="nextBtn" class="primary">अगला ▶</button>
        <button id="resetQuizBtn" class="reset-btn">⟳ रिसेट करू</button>
    </div>
    <footer>⚡ एक विकल्प पर क्लिक करी – हरियर (सही) / लाल (गलत) + व्याख्या | सभ प्रश्न विदेह ३७० (भ्रमर विशेषांक) पर आधारित</footer>
</div>

<script>
// --------------------------------------------------------------
// अद्वितीय मैथिली प्रश्न संग्रह (रामभरोस कापड़ि 'भ्रमर' विशेषांक)
// विषय : जीवन परिचय, रचना, पुरस्कार, पत्रकारिता, परिवार आदि
// अधिकतम अद्वितीय प्रश्न (२५०+)
// --------------------------------------------------------------

function generateUniqueQuestions() {
    const questions = [];
    function add(qText, opts, correctIdx, expl) {
        questions.push({
            text: qText,
            options: [...opts],
            correct: correctIdx,
            explanation: expl
        });
    }

    // ----- १. जीवनी एवं परिचय -----
    add("रामभरोस कापड़ि 'भ्रमर' केर जन्म कतय भेल छल?", 
        ["बघचौड़ा, धनुषा (नेपाल)", "जनकपुर", "दरभंगा", "मधुबनी"], 0,
        "पृष्ठ ९, ९५: बघचौड़ा गाम, जिला धनुषा, नेपाल।");
    add("भ्रमर जीक जन्म विक्रम संवत कोन अछि?", 
        ["२००८ साल साओन २२ गते", "२०१० साल", "१९९० वि.सं.", "२०२० वि.सं."], 0,
        "पृष्ठ ९: जन्म २००८ साल, श्रावण २२।");
    add("भ्रमर जीक अंग्रेजी जन्म वर्ष कोन अछि?", 
        ["१९५१ ई.", "१९५५ ई.", "१९४७ ई.", "१९६० ई."], 0,
        "पृष्ठ ९: अंग्रेजी क्यालेण्डर अनुसार ५ मई १९५१।");
    add("रामभरोस कापड़ि 'भ्रमर' केर पिताक नाम की छै?", 
        ["रामगुलाम कापड़ि", "अमरनाथ झा", "बदरीनाथ झा", "मनोरथी कापड़ि"], 0,
        "पृष्ठ ९, ४३: पिता स्व. रामगुलाम कापड़ि।");
    add("भ्रमर जीक माताक नाम की छै?", 
        ["दुखनी देवी", "गोरेश्वरी देवी", "कुमुद देवी", "सीता देवी"], 0,
        "पृष्ठ ९, ४३: माता स्व. दुखनी देवी।");
    add("भ्रमर जीक पत्नी केर नाम की छै?", 
        ["दलतीया देवी", "कल्पना झा", "मीना मधु", "वसुन्धरा देवी"], 0,
        "पृष्ठ १६, ४३: दलतीया देवी (भगवानपट्टी, धनुषा)।");
    add("रामभरोस कापड़ि 'भ्रमर' केर कुल संतान कति छै?", 
        ["तीन पुत्र आ दू पुत्री", "दू पुत्र आ तीन पुत्री", "एक पुत्र", "चार पुत्र"], 0,
        "पृष्ठ १६, ४३: जेठ पुत्र रामनारायण, माझिल प्रदीप, छोट संदीप; दू बेटी।");
    add("भ्रमर जीक साहित्यिक उपनाम 'भ्रमर' कोन स्तरसँ स्थायी भेल?", 
        ["मैट्रिक परीक्षा फॉर्म भरैत समय", "जन्मसँ", "गुरु द्वारा दिआल", "प्रो.धीरेन्द्र सुझाव पर"], 0,
        "पृष्ठ ५८-५९: मैट्रिक परीक्षामे उपनाम डालि दिए।");
    add("रामभरोस कापड़िक घर परिवारमे कोन सम्मानित व्यक्ति रहलाह?", 
        ["पिता रामगुलाम (प्रधानपञ्च)", "माता प्रधानपञ्च", "भाई सुकुमार", "ससुर"], 0,
        "पृष्ठ ४३: पिता तीन बेर प्रधानपञ्च निर्वाचित।");

    // ----- २. शिक्षा एवं प्रारम्भिक जीवन -----
    add("भ्रमर जीक प्रारम्भिक शिक्षा कतय भेल?", 
        ["बेल्ही मिडिल स्कूल", "सरस्वती हाइ स्कूल, जनकपुर", "काठमाडौं", "भारत"], 0,
        "पृष्ठ ४३-४४: तीन कक्षा धरि बेल्ही मिडिल स्कूल।");
    add("भ्रमर जी के एस.एल.सी. (मैट्रिक) कतय सँ केलनि?", 
        ["सरस्वती माध्यमिक विद्यालय, जनकपुर", "त्रिभुवन विश्वविद्यालय", "बेल्ही स्कूल", "भारत"], 0,
        "पृष्ठ ४४, ४७: सरस्वती हाई स्कूल, जनकपुर।");
    add("भ्रमर जी कोन विश्वविद्यालयसँ एम.ए. (मैथिली) केलनि?", 
        ["रामस्वरूप रामसागर बहुमुखि क्याम्पस (त्रिभुवन विश्वविद्यालय)", "नेपाल संस्कृत विश्वविद्यालय", "दरभंगा विश्वविद्यालय", "पटना विश्वविद्यालय"], 0,
        "पृष्ठ ४४, ५२: रा.रा.ब. क्याम्पस, जनकपुर (प्रथम बैच)।");
    add("भ्रमर जीक मैथिली विषयमे एम.ए. श्रेणी कोन छल?", 
        ["प्रथम श्रेणी", "द्वितीय", "तृतीय", "प्रतिष्ठा"], 0,
        "पृष्ठ ४४: प्रथम श्रेणीमे उत्तीर्ण।");
    add("प्रो. धीरेश्वर झा 'धीरेन्द्र' संग भ्रमर जी कोन रुपमे जुड़ल छलाह?", 
        ["गुरु-शिष्य आ पड़ोसी", "शत्रु", "व्यापार साझेदार", "पत्रकार सहयोगी"], 0,
        "पृष्ठ ४४-४५, १६०: डा.धीरेन्द्र हुनक प्रेरणास्रोत, पढ़ाबैत छलिन।");
    add("भ्रमर जीक पहिल प्रकाशित रचना कोन छल?", 
        ["इमानदार बालक (बालकथा)", "बन्न कोठरी औनाइत धुआ", "नहि, आब नहि", "तोरा संगे जयबौ रे कुजबा"], 0,
        "पृष्ठ ४५, ६८: 'इमानदार बालक' १९६४ ई. मिथिला मिहिरमे छपल।");
    add("भ्रमर जीक पहिल प्रकाशित रचना कहाँ छपल छल?", 
        ["मिथिला मिहिर (साप्ताहिक, पटना)", "गामघर", "आँजुर", "जनकपुर एक्सप्रेस"], 0,
        "पृष्ठ ४५: प्रतिष्ठित मैथिली साप्ताहिक मिथिला मिहिर।");

    // ----- ३. साहित्यिक कृति (कविता) -----
    add("भ्रमर जीक पहिल कविता संग्रह कोन छै?", 
        ["बन्न कोठरी औनाइत धुआ (२०२९ वि.सं.)", "मोमक पघलैत अधर", "अप्पन अनचिन्हार", "अन्हरियाक चान"], 0,
        "पृष्ठ ३२, १२२: २०२९ वि.सं. प्रकाशित।");
    add("दीर्घ प्रेम काव्य 'नहि, आब नहि' केर हिन्दी अनुवाद कोन अछि?", 
        ["बस, अब नहीं", "भयो अब भयो", "अप्पन अनचिन्हार", "युद्धभूमिक एसगर योद्धा"], 0,
        "पृष्ठ ३२, १२२: 'बस, अब नहीं' अनुवादक गोपाल अश।");
    add("भ्रमर जीक गजल संग्रह 'अन्हरियाक चान' केर प्रकाशन वर्ष कोन अछि?", 
        ["२०७० वि.सं.", "२०६५", "२०५०", "२०२९"], 0,
        "पृष्ठ ३२, १२२: वि.सं. २०७०।");
    add("'अन्हरियाक चान' पोथी केर प्रकाशक कोन अछि?", 
        ["जनकपुर ललित कला प्रतिष्ठान", "साझा प्रकाशन", "नेपाल प्रज्ञा प्रतिष्ठान", "विदेह प्रकाशन"], 0,
        "पृष्ठ १५४: जनकपुर ललित कला प्रतिष्ठान २०१३ ई. (२०७० वि.सं.)।");
    add("'नहि, आब नहि' दीर्घकविताक नेपाली अनुवाद कोन अछि?", 
        ["भयो, अब भयो", "बस अब नहीं", "अप्पन अनचिन्हार", "युद्धभूमिक एसगर योद्धा"], 0,
        "पृष्ठ ३२, १२२: अनुवादक मनु ब्राजाकी।");
    add("भ्रमर जीक 'युद्धभूमिक एसगर योद्धा' केर प्रकाशन वर्ष कोन छै?", 
        ["२०७५ वि.सं.", "२०६०", "२०४५", "२०७०"], 0,
        "पृष्ठ ३२: वि.सं. २०७५ कविता संग्रह।");

    // ----- ४. कथा संग्रह -----
    add("भ्रमर जीक पहिल कथा संग्रह कोन छै?", 
        ["तोरा संगे जयबौ रे कुजबा (१९८७ ई.)", "हुगली उपर बहैत गंगा", "एण्टी भाइरस", "घरमुहाँ"], 0,
        "पृष्ठ ३२, ७४: १९८७ ई. प्रकाशित, मैथिली अकादमी पटना द्वारा।");
    add("नेपालीय मैथिलीक पहिल आधुनिक कथा संग्रह कोनक अछि?", 
        ["तोरा संगे जयबौ रे कुजबा (भ्रमर)", "हुगली उपर बहैत गंगा", "गामक लोक", "अन्तर"], 0,
        "पृष्ठ ५८-५९: भ्रमर स्वयं दावा करैत छथि।");
    add("भ्रमर जीक तेसर कथा संग्रह कोन अछि?", 
        ["एण्टी भाइरस (२०७६ वि.सं.)", "तोरा संगे जयबौ रे कुजबा", "हुगली उपर बहैत गंगा", "घरमुहाँ"], 0,
        "पृष्ठ ३२, १२२: २०७६ वि.सं. प्रकाशित।");
    add("'हुगली उपर बहैत गंगा' कथा संग्रह कोन वर्ष प्रकाशित भेल?", 
        ["२०६५ वि.सं.", "२०४५", "२०७०", "२०१५"], 0,
        "पृष्ठ ३२: २०६५ वि.सं.");

    // ----- ५. उपन्यास -----
    add("भ्रमर जीक एकमात्र उपन्यास कोन अछि?",

            ["ठेकान पर", "समय सन्दर्भ", "अहाँ जे कहलहुँ", "सीमाक आर-पार"], 0, "पृष्ठ ३५: ठेकान पर (विचार संग्रह)।");
        else if (r === 7) add("भ्रमर जीक कोन पोथी सर्वाधिक पुरस्कृत अछि?", 
            ["घरमुहाँ (गंकी धुस्वाँ पुरस्कार)", "बन्न कोठरी", "तोरा संगे जयबौ रे कुजबा", "एण्टी भाइरस"], 0, "पृष्ठ २७, ३०: पचास हजार पुरस्कार।");
        else if (r === 8) add("भ्रमर जी कोन विश्वविद्यालयसँ मानद पीएच.डी. प्राप्त केलनि?", 
            ["त्रिभुवन विश्वविद्यालय", "नेपाल संस्कृत विश्वविद्यालय", "दरभंगा संस्कृत विश्वविद्यालय", "जनकपुर विश्वविद्यालय"], 0, "पृष्ठ १०, ३२: त्रिभुवन विश्वविद्यालयसँ मानद।");
        else add(`भ्रमर जीक 'जनकपुरधाम र यस क्षेत्रका सांस्कृतिक सम्पदाहरू' पोथी कोन वर्ष प्रकाशित भेल?`, 
            ["२०५६ वि.सं.", "२०६०", "२०४५", "२०५०"], 0, "पृष्ठ ३४: शोध आलेख २०५६ वि.सं.");
    }

    // अन्त्यमा प्रश्नको संख्या २२०+ हेतु
    return questions.slice(0, 260);
}

// ---------- क्विज़ नियंत्रक ----------
let questions = [];
let userAnswers = [];
let currentIndex = 0;
let score = 0;

function recalcScore() {
    let s = 0;
    for (let i = 0; i < userAnswers.length; i++) {
        if (userAnswers[i] && userAnswers[i].isCorrect === true) s++;
    }
    score = s;
    document.getElementById('scoreValue').innerText = score;
    let answeredCount = userAnswers.filter(a => a !== null).length;
    document.getElementById('quizProgress').value = answeredCount;
    document.getElementById('quizProgress').max = questions.length;
}

function updateUI() {
    if (!questions.length) return;
    const q = questions[currentIndex];
    document.getElementById('questionContainer').innerHTML = `<span>${currentIndex+1}. </span> ${q.text}`;
    const optsDiv = document.getElementById('optionsContainer');
    optsDiv.innerHTML = '';
    const letters = ['क', 'ख', 'ग', 'घ'];
    q.options.forEach((opt, idx) => {
        const btn = document.createElement('div');
        btn.className = 'option-btn';
        btn.setAttribute('data-opt-index', idx);
        btn.innerHTML = `<span class="option-prefix">${letters[idx]}</span><span>${opt}</span>`;
        const saved = userAnswers[currentIndex];
        if (saved !== null) {
            btn.classList.add('disabled-opt');
            if (idx === q.correct) btn.classList.add('correct-highlight');
            if (idx === saved.selectedIdx && saved.isCorrect === false) btn.classList.add('wrong-highlight');
            else if (idx === saved.selectedIdx && saved.isCorrect === true) btn.classList.add('correct-highlight');
        } else {
            btn.addEventListener('click', (e) => {
                if (userAnswers[currentIndex] !== null) return;
                const isCor = (idx === q.correct);
                if (isCor) {
                    btn.classList.add('correct-highlight');
                } else {
                    btn.classList.add('wrong-highlight');
                    document.querySelectorAll('.option-btn').forEach((b, i2) => {
                        if (i2 === q.correct) b.classList.add('correct-highlight');
                    });
                }
                userAnswers[currentIndex] = { selectedIdx: idx, isCorrect: isCor };
                recalcScore();
                document.querySelectorAll('.option-btn').forEach(b => b.classList.add('disabled-opt'));
                const expDiv = document.getElementById('explanationDiv');
                expDiv.style.display = 'block';
                expDiv.innerHTML = `<strong>📘 व्याख्या :</strong> ${q.explanation}<br>✔ सही उत्तर : ${q.options[q.correct]}`;
            });
        }
        optsDiv.appendChild(btn);
    });
    if (userAnswers[currentIndex] !== null) {
        const expDiv = document.getElementById('explanationDiv');
        expDiv.style.display = 'block';
        expDiv.innerHTML = `<strong>📘 व्याख्या :</strong> ${q.explanation}<br>✔ सही उत्तर : ${q.options[q.correct]}`;
    } else {
        document.getElementById('explanationDiv').style.display = 'none';
    }
    document.getElementById('currentQSpan').innerText = currentIndex+1;
    document.getElementById('jumpSelect').value = currentIndex;
    document.getElementById('totalQSpan').innerText = questions.length;
    document.getElementById('totalQSpan2').innerText = questions.length;
}

function nextQuestion() { if (currentIndex < questions.length-1) { currentIndex++; updateUI(); } else alert("सब प्रश्न देखि चुकल छी! रिसेट करू।"); }
function prevQuestion() { if (currentIndex > 0) { currentIndex--; updateUI(); } }
function resetQuiz() { userAnswers = new Array(questions.length).fill(null); score=0; currentIndex=0; recalcScore(); updateUI(); }
function jumpToQuestion() { const idx = parseInt(document.getElementById('jumpSelect').value); if (!isNaN(idx) && idx>=0 && idx<questions.length) { currentIndex=idx; updateUI(); } }
function populateJump() {
    const sel = document.getElementById('jumpSelect');
    sel.innerHTML = '';
    for (let i=0; i<questions.length; i++) {
        let opt = document.createElement('option');
        opt.value = i;
        opt.innerText = `प्रश्न ${i+1}`;
        sel.appendChild(opt);
    }
    sel.addEventListener('change', jumpToQuestion);
}

function init() {
    questions = generateUniqueQuestions();
    userAnswers = new Array(questions.length).fill(null);
    currentIndex = 0;
    score = 0;
    recalcScore();
    populateJump();
    updateUI();
    document.getElementById('prevBtn').addEventListener('click', prevQuestion);
    document.getElementById('nextBtn').addEventListener('click', nextQuestion);
    document.getElementById('resetQuizBtn').addEventListener('click', resetQuiz);
}
init();
</script>
