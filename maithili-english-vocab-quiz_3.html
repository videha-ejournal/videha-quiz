</script><script>

    // --------------------------------------------------------------
    // DATA extracted from the provided Maithili English Thesaurus
    // (Entries with clear Maithili word & English meaning)
    // --------------------------------------------------------------
    const QUIZ_DATA = [
        { maithili: "शाली (shali)", english: "graced with", hint: "शोभा/प्रतिष्ठा से युक्त" },
        { maithili: "सहित (sahit)", english: "including, with, together", hint: "समेत, संयुक्त" },
        { maithili: "सापेक्ष (sapeksa)", english: "requiring, depending on", hint: "अपेक्षा रखनिहार, निर्भर" },
        { maithili: "अँकुर", english: "sprout", hint: "बीजक प्ररोह" },
        { maithili: "अँखि", english: "eye", hint: "नयन, नेत्र" },
        { maithili: "अँच", english: "flame", hint: "धधरा, ताप" },
        { maithili: "अँचर", english: "fringe of sari", hint: "साड़ीक अग्रभाग" },
        { maithili: "अँटकार", english: "guess, estimation, assessment", hint: "अनुमान, अन्दाज" },
        { maithili: "अँडा", english: "egg", hint: "अण्डा" },
        { maithili: "अंश", english: "part, portion; clip", hint: "भाग, खण्ड, शेयर" },
        { maithili: "अकास", english: "sky", hint: "आसमान, शून्यगोलक" },
        { maithili: "आगि", english: "fire", hint: "अग्नि" },
        { maithili: "आँटा", english: "flour (wheat)", hint: "चिक्कस, गेहूं का आटा" },
        { maithili: "आदमी", english: "man", hint: "मनुष्य, पति, नोकर" },
        { maithili: "आनन्द", english: "happiness, joy", hint: "हर्ष, प्रसन्नता" },
        { maithili: "आशा", english: "hope", hint: "उमेद, प्रतीक्षा" },
        { maithili: "इच्छा", english: "desire, wish", hint: "अभिलाषा, कामना" },
        { maithili: "उदास", english: "sad, gloomy", hint: "दुखी, अप्रसन्न, विखिन्न" },
        { maithili: "ऋण", english: "debt, loan", hint: "करजा, उधार" },
        { maithili: "एक", english: "one", hint: "प्रथम संख्या, एकाकी" },
        { maithili: "ओछ", english: "narrow-minded, mean", hint: "अनुदार, कृपण, अधम" },
        { maithili: "कम", english: "less", hint: "न्यून, हीन" },
        { maithili: "कठिन", english: "hard, difficult", hint: "कठोर, जटिल, कष्टसाध्य" },
        { maithili: "कन्या", english: "daughter, bride", hint: "बेटी, वधू" },
        { maithili: "कर", english: "hand", hint: "हाथ, लगान, कर" },
        { maithili: "कहब", english: "tell, say, ask", hint: "शब्द द्वारा व्यक्त करब" },
        { maithili: "काठ", english: "wood, timber", hint: "लकड़ी" },
        { maithili: "काम", english: "work", hint: "कर्म, काज" },
        { maithili: "काल", english: "time; black", hint: "समय, आवधि, कारी रंग" },
        { maithili: "किरण", english: "rays", hint: "प्रकाशकणक गतिरेखा" },
        { maithili: "कुकुर", english: "dog", hint: "प्रमान, कुत्ता" },
        { maithili: "कृतज्ञ", english: "grateful", hint: "उपकार माननिहार" },
        { maithili: "केश", english: "hair", hint: "माथक रोम" },
        { maithili: "कोमल", english: "soft, tender", hint: "मृदु, मोलाएम" },
        { maithili: "गाछ", english: "tree", hint: "वृक्ष" },
        { maithili: "गीत", english: "song", hint: "गान, गेय पद" },
        { maithili: "गोबर", english: "cow-dung", hint: "गाए-बड़द-महिसिक विष्ठा" }
    ];

    // Helper to shuffle an array (Fisher-Yates)
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // generate distractors: pick random wrong english meanings from other entries
    function getDistractors(correctEng, currentWord, fullSet, count = 3) {
        let candidates = fullSet.filter(item => item.english !== correctEng && item.maithili !== currentWord)
                               .map(item => item.english);
        // remove duplicates
        candidates = [...new Set(candidates)];
        if (candidates.length < count) {
            // fallback generic distractors
            const fallback = ["moon", "water", "forest", "village", "king", "earth", "bird", "flower"];
            candidates.push(...fallback);
            candidates = [...new Set(candidates)];
        }
        let shuffled = shuffleArray([...candidates]);
        return shuffled.slice(0, count);
    }

    // prepare questions array with randomized options
    let questions = [];
    function buildQuestions() {
        const baseData = [...QUIZ_DATA];
        const total = baseData.length;
        questions = [];
        for (let i = 0; i < total; i++) {
            const item = baseData[i];
            const correctAns = item.english;
            const wrongs = getDistractors(correctAns, item.maithili, baseData, 3);
            let options = [correctAns, ...wrongs];
            options = shuffleArray(options);
            questions.push({
                maithili: item.maithili,
                correct: correctAns,
                options: options,
                hint: item.hint || "अर्थ चुनू"
            });
        }
        // reshuffle questions order for freshness
        questions = shuffleArray(questions);
        return questions;
    }

    // state variables
    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let answered = false;
    let selectedOption = null;
    let totalQuestions = 0;

    // DOM elements
    const dynamicDiv = document.getElementById("dynamicContent");
    const scoreSpan = document.getElementById("scoreValue");
    const currentQSpan = document.getElementById("currentQ");
    const totalQSpan = document.getElementById("totalQ");

    function updateStatsUI() {
        scoreSpan.innerText = score;
        currentQSpan.innerText = currentIndex + 1;
        totalQSpan.innerText = totalQuestions;
    }

    // render current question
    function renderQuestion() {
        if (!currentQuestions.length || currentIndex >= currentQuestions.length) {
            showResultScreen();
            return;
        }
        const q = currentQuestions[currentIndex];
        // build html
        let optionsHtml = "";
        const letters = ["अ", "ब", "क", "ड"]; // just for style
        q.options.forEach((opt, idx) => {
            let letter = letters[idx % letters.length];
            let additionalClass = "";
            if (answered) {
                if (opt === q.correct) {
                    additionalClass = "opt-correct";
                } else if (selectedOption === opt && opt !== q.correct) {
                    additionalClass = "opt-wrong";
                } else {
                    additionalClass = "disabled-opt";
                }
            } else {
                additionalClass = "";
            }
            optionsHtml += `
                <div class="opt-btn ${additionalClass}" data-opt="${escapeHtml(opt)}">
                    <div class="opt-prefix">${letter}</div>
                    <div class="opt-text">${escapeHtml(opt)}</div>
                </div>
            `;
        });

        let feedbackHtml = "";
        if (answered) {
            const isCorrect = (selectedOption === q.correct);
            feedbackHtml = `<div class="feedback">
                ${isCorrect ? "✅ सही उत्तर! (+1)" : "❌ गलत उत्तर! सही अर्थ है: <strong>" + escapeHtml(q.correct) + "</strong>"}
                <br><span style="font-size:0.8rem; opacity:0.8;">💡 ${escapeHtml(q.hint)}</span>
            </div>`;
        } else {
            feedbackHtml = `<div class="feedback">🔍 सही विकल्प चुनू — ${escapeHtml(q.hint)}</div>`;
        }

        const nextBtnHtml = answered ? `<button class="next-btn" id="nextBtn">➡ अगला प्रश्न</button>` : `<button class="next-btn" id="nextBtn" disabled style="opacity:0.6;">🔒 पहिले उत्तर दिअ</button>`;
        const resetHtml = `<button class="next-btn reset-btn" id="resetQuizBtn">🔄 नवा क्विज़ शुरू करू</button>`;

        const fullHtml = `
            <div class="question-area">
                <div class="maithili-word">${escapeHtml(q.maithili)}</div>
                <div class="hint">📖 अंग्रेजी अर्थ चुनू</div>
                <div class="options-grid" id="optionsGrid">
                    ${optionsHtml}
                </div>
                ${feedbackHtml}
                <div style="display: flex; gap: 12px; margin-top: 8px;">
                    ${nextBtnHtml}
                </div>
                <div style="margin-top: 12px;">
                    ${resetHtml}
                </div>
            </div>
        `;
        dynamicDiv.innerHTML = fullHtml;

        // attach events
        if (!answered) {
            const optDivs = document.querySelectorAll(".opt-btn");
            optDivs.forEach(div => {
                div.addEventListener("click", (e) => {
                    if (answered) return;
                    const chosen = div.getAttribute("data-opt");
                    answerQuestion(chosen);
                });
            });
        } else {
            // next button event
            const nextBtn = document.getElementById("nextBtn");
            if (nextBtn) nextBtn.addEventListener("click", nextQuestion);
        }
        const resetBtn = document.getElementById("resetQuizBtn");
        if (resetBtn) resetBtn.addEventListener("click", resetQuiz);
    }

    function answerQuestion(chosenAns) {
        if (answered) return;
        const q = currentQuestions[currentIndex];
        selectedOption = chosenAns;
        answered = true;
        const isCorrect = (chosenAns === q.correct);
        if (isCorrect) {
            score++;
        }
        updateStatsUI();
        renderQuestion();  // re-render with feedback, disabling options
    }

    function nextQuestion() {
        if (!answered) return;
        currentIndex++;
        if (currentIndex < currentQuestions.length) {
            answered = false;
            selectedOption = null;
            renderQuestion();
            updateStatsUI();
        } else {
            showResultScreen();
        }
    }

    function showResultScreen() {
        const percentage = Math.round((score / totalQuestions) * 100);
        let message = "";
        if (percentage >= 80) message = "🎉 बहुत नीक! उत्तम प्रदर्शन 🎉";
        else if (percentage >= 50) message = "👍 अछि-अछि, आर अभ्यास करू 👍";
        else message = "📚 फेर कोशिश करू, थिसारस देखू 📚";
        const resultHtml = `
            <div class="result-area">
                
                <p style="font-size:1.6rem; margin:15px 0;">${score} / ${totalQuestions}</p>
                <p style="font-size:1.1rem;">${message}</p>
                <button id="restartFinalBtn" class="next-btn" style="background:#8b6946; margin-top:20px;">🔄 नवा प्रश्न-संचय से शुरू करू</button>
            </div>
        `;
        dynamicDiv.innerHTML = resultHtml;
        const restartBtn = document.getElementById("restartFinalBtn");
        if (restartBtn) restartBtn.addEventListener("click", () => resetQuiz());
    }

    function resetQuiz() {
        // rebuild questions with fresh order and fresh distractors (new question pool)
        currentQuestions = buildQuestions();
        currentIndex = 0;
        score = 0;
        answered = false;
        selectedOption = null;
        totalQuestions = currentQuestions.length;
        updateStatsUI();
        renderQuestion();
    }

    // helper: escape HTML to avoid injection
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // initialize the quiz
    function initQuiz() {
        currentQuestions = buildQuestions();
        totalQuestions = currentQuestions.length;
        currentIndex = 0;
        score = 0;
        answered = false;
        selectedOption = null;
        updateStatsUI();
        renderQuestion();
    }

    initQuiz();

</script><a class="vq-back" href="https://www.videha.co.in/videha-elearning.htm">&larr; विदेह ई-लर्निङ्ग हब पर वापस जाउ</a>
