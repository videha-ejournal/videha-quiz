    // Ensure exactly 100 questions
    while(questions.length < 100) questions.push({ text: "पुस्तक आधारित प्रश्न (अतिरिक्त)", options: ["सही", "गलत", "अन्य", "नै"], correct: "सही" });

    const totalQ = 100;
    const perPage = 10;
    let currentPage = 1;
    let userAnswers = new Array(totalQ).fill(null);

    function calculateScore() { let s=0; for(let i=0;i<totalQ;i++) if(userAnswers[i] && userAnswers[i]===questions[i].correct) s++; return s; }
    function updateScoreUI() { document.getElementById("scoreDisplay").innerText = calculateScore(); }

    function updateSingleFeedback(idx) {
        let fb = document.getElementById(`fb_${idx}`);
        if(!fb) return;
        let selected = userAnswers[idx];
        let correctAns = questions[idx].correct;
        if(!selected) fb.innerHTML = `⚡ कोनो उत्तर नै चुनल। सही: “${correctAns}”`;
        else if(selected === correctAns) fb.innerHTML = `✅ सही! “${correctAns}”`;
        else fb.innerHTML = `❌ गलत। सही: “${correctAns}”`;
        fb.className = `question-feedback ${!selected ? 'feedback-neutral' : (selected===correctAns ? 'feedback-correct' : 'feedback-wrong')}`;
    }

    function renderPage() {
        let start = (currentPage-1)*perPage, end = Math.min(start+perPage, totalQ);
        let html = "";
        for(let i=start; i<end; i++) {
            let q = questions[i];
            let sel = userAnswers[i];
            html += `<div class="question-card"><div class="question-text">${i+1}. ${q.text}</div><div class="options">`;
            q.options.forEach(opt => {
                let checked = (sel === opt) ? "checked" : "";
                let id = `q_${i}_${opt.replace(/\s/g,'')}`;
                html += `<div class="option-item"><input type="radio" name="q_${i}" value="${opt.replace(/"/g,'&quot;')}" id="${id}" ${checked}><label for="${id}">${opt}</label></div>`;
            });
            html += `</div><div class="question-feedback" id="fb_${i}"></div></div>`;
        }
        document.getElementById("questionsContainer").innerHTML = html;
        for(let i=start; i<end; i++) {
            let radios = document.querySelectorAll(`input[name="q_${i}"]`);
            radios.forEach(radio => {
                radio.addEventListener("change", (e) => {
                    userAnswers[i] = e.target.value;
                    updateSingleFeedback(i);
                    updateScoreUI();
                });
            });
            updateSingleFeedback(i);
        }
        document.getElementById("pageInfo").innerText = `पृष्ठ ${currentPage} / ${Math.ceil(totalQ/perPage)}`;
        updatePagination();
    }

    function updatePagination() {
        let totalPages = Math.ceil(totalQ/perPage);
        let btns = "";
        for(let p=1;p<=totalPages;p++) btns += `<button class="page-btn ${p===currentPage?'active':''}" data-page="${p}">${p}</button>`;
        document.getElementById("paginationControls").innerHTML = btns;
        document.querySelectorAll(".page-btn").forEach(btn => {
            btn.addEventListener("click", (e) => { currentPage = parseInt(btn.dataset.page); renderPage(); });
        });
    }

    function showReport() {
        let wrong = [];
        for(let i=0;i<totalQ;i++) {
            if(!userAnswers[i] || userAnswers[i] !== questions[i].correct)
                wrong.push({num:i+1, correct:questions[i].correct, given:userAnswers[i]||"अनुत्तरित"});
        }
        let reportDiv = document.getElementById("reportSection");
        if(wrong.length===0) reportDiv.innerHTML = `<div class="report-title">🎉 सब प्रश्न सही! बधाई 🎉</div>`;
        else {
            let html = `<div class="report-title">📋 गलत / छूटल प्रश्न (${wrong.length}/${totalQ}) :</div><ul class="report-list">`;
            wrong.forEach(w => { html += `<li><strong>${w.num}.</strong> आपक: ${w.given} → सही: ${w.correct}</li>`; });
            html += `</ul>`;
            reportDiv.innerHTML = html;
        }
        reportDiv.style.display = "block";
    }

    function resetQuiz() { userAnswers.fill(null); renderPage(); updateScoreUI(); document.getElementById("reportSection").style.display = "none"; }
    function finalSubmit() { updateScoreUI(); showReport(); alert(`पूर्ण स्कोर: ${calculateScore()}/100`); }

    document.getElementById("prevPageBtn").onclick = () => { if(currentPage>1){currentPage--; renderPage();} };
    document.getElementById("nextPageBtn").onclick = () => { if(currentPage<Math.ceil(totalQ/perPage)){currentPage++; renderPage();} };
    document.getElementById("submitBtn").onclick = finalSubmit;
    document.getElementById("resetBtn").onclick = resetQuiz;
