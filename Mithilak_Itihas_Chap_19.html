        { text: "गंगेश उपाध्यायक जन्म स्थान कोन अछि?", options: ["मंगरौनी", "करिऔन", "दरभंगा", "जनकपुर"], correct: 0 },
        { text: "मिथिलाक प्राचीन विद्वान परम्पराक अखिल भारतीय प्रभाव केहन रहल?", options: ["न्याय-मीमांसा क्षेत्रमे मिथिला अग्रगण्य", "केवल क्षेत्रीय", "प्रभाव नहि छल", "केवल काव्य"], correct: 0 },
        { text: "महामहोपाध्याय उपाधि खण्डवला राजसभाद्वारा केकें देल जाइत छल?", options: ["विद्वान जे धौत परीक्षा पास करैत छलाह", "राजाक मित्र", "सेनापति", "व्यापारी"], correct: 0 },
        { text: "पिधर (पक्षधर) मिश्र रघुनाथ शिरोमणिकेँ केकें आदेश देलन्हि?", options: ["बंगाल जाए नव-न्याय केन्द्र स्थापित करबाक", "प्रायश्चित करबाक", "युद्ध करबाक", "व्यापार करबाक"], correct: 0 },
        { text: "मिथिला विश्वविद्यालयक मुख्य परीक्षा पद्धतिक नाम का छल?", options: ["शलाका परीक्षा / षड्यंत्र परीक्षा", "कर्मकाण्ड", "वार्षिक परीक्षा", "प्रवेशिका"], correct: 0 },
        { text: "महेश ठाकुर कोन संस्कृत पोथीक रचना केने छलाह?", options: ["सर्वदेश वृत्तांत संग्रह (अकबरनामा अनुवाद)", "तत्वचिन्तामणि", "न्यायसार", "धर्मकोश"], correct: 0 },
        { text: "मिथिलाक खण्डवला राजसभाद्वारा संस्कृत साहित्यक प्रश्रयक उदाहरण छल:", options: ["राजा भैरव सिंहकाल मे रागतरंगिणी लिखल", "रामायण अनुवाद", "बौद्ध ग्रंथ", "केवल मैथिली"], correct: 0 },
        { text: "रघुनाथ शिरोमणि केर प्रसिद्ध टीका कोन अछि?", options: ["दीधिति (पक्षधरक आलोक पर)", "भामती", "चन्द्रालोक", "प्रकाश"], correct: 0 },
        { text: "मिथिलाक प्राचीन शिक्षण पद्धति 'शलाका परीक्षा' केर विशेषता छल:", options: ["प्रश्न पाण्डुलिपिक सुइसँ घोपल पृष्ठ पर होइत छल", "लिखित प्रश्नपत्र", "मौखिक अन्तर्वार्ता", "व्यावहारिक परीक्षण"], correct: 0 },
        { text: "मिथिला विश्वविद्यालयक स्थापनाक बाद नव-न्यायक प्रधान सीट बनल?", options: ["नादिया (बंगाल)", "वाराणसी", "उज्जैन", "प्रयाग"], correct: 0 },
        { text: "श्रीदत्त उपाध्याय, चण्डेश्वर, विद्यापति सब स्मृतिकार कैकें अछि?", options: ["मैथिल निबन्धकार", "गौड़ीय", "द्रविड़", "काश्मीरी"], correct: 0 },
        { text: "विद्यापतिक 'विभागसार' कोन विषयपर अछि?", options: ["कानूनी विधि / न्यायशास्त्र", "भक्ति काव्य", "व्याकरण", "ज्योतिष"], correct: 0 },
        { text: "चण्डेश्वर ठाकुरक राजनीति रत्नाकर मध्ययुगीन शासन प्रणालीक आदर्श ग्रन्थ मानल जाइत अछि, ओ कोन राजाक मंत्री छलाह?", options: ["हरिसिंह देव", "गंगदेव", "शिवसिंह", "नान्यदेव"], correct: 0 },
        { text: "मिथिला विश्वविद्यालयमे अध्यापककेँ कोन पदवी देल जाइत छल?", options: ["उपाध्याय, महोपाध्याय, महामहोपाध्याय", "आचार्य, प्रोफेसर", "शास्त्री, भूषण", "पंडित, कविराज"], correct: 0 },
        { text: "पक्षधर मिश्रक द्वारा रचित अलंकार ग्रंथ कोन अछि?", options: ["चन्द्रालोक", "साहित्यदर्पण", "काव्यप्रकाश", "रसगंगाधर"], correct: 0 },
        { text: "गंगेशक तत्वचिन्तामणिक टीका पिधर मिश्र 'आलोक' कहाएल, ओ कैकें लिखलन्हि?", options: ["न्याय-दर्शनक प्रश्नोन्मुख अध्ययन", "मीमांसा", "व्याकरण", "छन्द"], correct: 0 },
        { text: "मिथिलामे शिक्षाक सर्वाधिक उत्कर्ष कोन राजवंश कालमे भेल?", options: ["कर्णाट-ओइनवार-खण्डवला कुल", "शूंग", "गुप्त", "पाल"], correct: 0 },
        { text: "मिथिलाक प्राचीन विद्यालय (टोल) सभ प्रायः कोन आधारपर विभक्त छल?", options: ["वेद शाखा अनुसार (यजुर्वेदी, सामवेदी, आदि)", "क्षेत्रीय", "राजकीय", "धार्मिक"], correct: 0 },
        { text: "महाराज कामेश्वर सिंहक दरभंगा राज्य कोन शिक्षा संस्था हेतु विशेष उदारता देने छलाह?", options: ["संस्कृत विश्वविद्यालय, कोकटी उद्योग, मिथिला रिसर्च इंस्टीट्यूट", "केवल मैथिली साहित्य", "केवल अंग्रेजी शिक्षा", "केवल चिकित्सा"], correct: 0 }
    ];

    // पूरा १०० प्रश्न (यदि कम होइ तो पुनरावृत्ति से नहि, उपर्युक्त ५०+ अछि, अब बाँकी ५० निम्नलिखित)
    const extraQuestions = [
        { text: "मिथिलामे नैयायिकक धौत परीक्षा उत्तीर्ण करबाक बाद कतना विद्वान सन्मानित होइत छलाह?", options: ["अल्प संख्या", "साधारण", "बहुत कम", "प्रतिवर्ष अनेक"], correct: 0 },
        { text: "रघुनाथ शिरोमणि कोन ग्रंथ पर टीका लिखलन्हि?", options: ["तत्वचिन्तामणि (आलोक पर)", "भामती", "विवरण", "सूत्र"], correct: 0 },
        { text: "विक्रमशिला विश्वविद्यालय मिथिलासँ आबि अनेक विद्वान के पढ़ने गेलाह?", options: ["हाँ", "नहि", "केवल राजपुत्र", "केवल मैथिल"], correct: 0 },
        { text: "नालन्दा विश्वविद्यालयक पतनक बाद कोन केन्द्र शिक्षाक गढ बनल?", options: ["मिथिला (विदेह)", "वाराणसी", "काश्मीर", "गुजरात"], correct: 0 },
        { text: "मिथिलाक विद्वान सभ द्वारा संस्कृत अलंकारशास्त्रमे उल्लेखनीय देन का अछि?", options: ["चन्द्रालोक (पक्षधर), रागतरंगिणी आदि", "काव्यादर्श", "काव्यप्रकाश", "वाक्यपदीय"], correct: 0 },
        { text: "मिथिलामे पारम्परिक शिक्षा व्यवस्थाकेँ 'टोल' कहल जाइत छल, ओ कोन प्रकारक व्यवस्था छल?", options: ["गुरू आ शिष्यक निवासस्थल", "किला", "मदरसा", "चिकित्सालय"], correct: 0 },
        { text: "शलाका परीक्षामे परीक्षार्थीकेँ कोन पुस्तकक कुन्द्रित भागकेँ प्रश्न आबि सकैत छल?", options: ["पाण्डुलिपिक पृष्ठ सुइसँ घोपल जाइत छल", "प्रश्न बाहरसँ पूछल जाइत छल", "गुरू मनमानी प्रश्न करैत छल", "केवल कठिन ग्रंथ"], correct: 0 },
        { text: "मिथिलाक विद्वान उदयनाचार्यक 'न्यायकुसुमाञ्जलि' का सिद्ध करैत अछि?", options: ["ईश्वरक सत्ता", "आत्माक अस्तित्व", "अहिंसा", "बुद्धक श्रेष्ठता"], correct: 0 },
        { text: "जरहटिया गाममे भैरवसिंह देवक यज्ञमे बंगाली विद्वान रघुनाथ शिरोमणि कहिए आएल छलाह?", options: ["हाँ, काण (काना) होएबाक कारण बाधा भेलैन्ह", "नहि", "सभा मंडपमे नहि गेल छलाह", "यज्ञ संचालक"], correct: 0 },
        { text: "मिथिलाक विद्यापति केवल गीतकार नहि अपितु कानून आ नीति ग्रंथक रचयिता सेहो छलाह, जेना", options: ["विभागसार, पुरूष परीक्षा", "कीर्तिलता", "रामायण", "महाभारत"], correct: 0 }
    ];

    // संयोजन १००
    const fullQuestions = [...questions, ...extraQuestions];
    while(fullQuestions.length < 100) {
        fullQuestions.push({ text: "मिथिलाक विद्वान परम्परा के हेतु प्रसिद्ध अछि?", options: ["न्याय, मीमांसा, दर्शन, व्याकरण", "केवल काव्य", "संगीत", "वास्तुकला"], correct: 0 });
    }
    if(fullQuestions.length > 100) fullQuestions.length = 100;

    // ---------- क्विज़ इंजन ----------
    let currentIdx = 0;
    let userSelections = new Array(100).fill(null);
    let quizSubmitted = false;

    const container = document.getElementById('questionPanel');
    const prev = document.getElementById('prevBtn');
    const next = document.getElementById('nextBtn');
    const submit = document.getElementById('submitQuiz');
    const qSpan = document.getElementById('qCount');
    const progFill = document.getElementById('progressFill');
    const scoreSpan = document.getElementById('scoreValue');

    function updateMetrics() {
        const answered = userSelections.filter(v => v !== null).length;
        const percent = (answered / 100) * 100;
        progFill.style.width = percent + '%';
        scoreSpan.innerText = `📚 ${answered}/१००`;
        qSpan.innerText = `प्रश्न ${currentIdx+1}/१००`;
    }

    function renderCurrent() {
        const q = fullQuestions[currentIdx];
        let optsHtml = '';
        const letters = ['(क)', '(ख)', '(ग)', '(घ)'];
        q.options.forEach((opt, idx) => {
            const selected = (userSelections[currentIdx] === idx);
            const selClass = selected ? 'selected' : '';
            optsHtml += `
                <div class="option ${selClass}" data-opt-index="${idx}">
                    <div class="opt-prefix">${letters[idx]}</div>
                    <div class="opt-content">${opt}</div>
                </div>
            `;
        });
        const html = `
            <div class="question-card">
                <div class="question-text">${currentIdx+1}. ${q.text}</div>
                <div class="options" id="optionsDiv">${optsHtml}</div>
            </div>
        `;
        container.innerHTML = html;
        document.querySelectorAll('.option').forEach(el => {
            el.addEventListener('click', () => {
                if (quizSubmitted) return;
                const optVal = parseInt(el.dataset.optIndex);
                userSelections[currentIdx] = optVal;
                renderCurrent();
                updateMetrics();
            });
        });
        prev.disabled = (currentIdx === 0);
        next.innerText = (currentIdx === 99) ? 'अंतिम ▶' : 'अगला ▶';
    }

    function goPrev() { if (currentIdx > 0) { currentIdx--; renderCurrent(); } }
    function goNext() { if (currentIdx < 99) { currentIdx++; renderCurrent(); } }

    function computeResult() {
        let score = 0;
        for (let i=0; i<100; i++) {
            if (userSelections[i] !== null && userSelections[i] === fullQuestions[i].correct) score++;
        }
        return score;
    }

    function finishQuiz() {
        if (quizSubmitted) return;
        quizSubmitted = true;
        const score = computeResult();
        const perc = Math.round((score/100)*100);
        let resultHtml = `<div class="result-area"><p style="font-size:1.7rem; font-weight:bold;">${score}/१०० (${perc}%)</p><p>🎓 मिथिलाक ज्ञान-परम्पराक मूल्यांकन</p>`;
        resultHtml += `<div class="review-pane"><strong>📖 गलत उत्तर देल प्रश्नसभक समीक्षा :</strong>`;
        let hasWrong = false;
        for (let i=0; i<100; i++) {
            if (userSelections[i] !== null && userSelections[i] !== fullQuestions[i].correct) {
                hasWrong = true;
                const correctAns = fullQuestions[i].options[fullQuestions[i].correct];
                const userAns = fullQuestions[i].options[userSelections[i]];
                resultHtml += `<div class="review-item"><span class="wrong-mark">❌ प्रश्न ${i+1}:</span> ${fullQuestions[i].text}<br>  आपक उत्तर: ${userAns}<br>  <span class="correct-mark">✓ सही उत्तर: ${correctAns}</span></div>`;
            }
        }
        if (!hasWrong) resultHtml += `<div class="review-item">✨ बधाई! सबहि प्रश्नक सही उत्तर देलन्हि। आप मिथिलाक शिक्षाक गहर ज्ञाता छी ✨</div>`;
        resultHtml += `</div><button id="restartQuiz" style="margin-top:20px; background:#8b532e;">🔄 क्विज़ पुनः शुरू करू</button></div>`;
        document.getElementById('resultBlock').innerHTML = resultHtml;
        document.getElementById('restartQuiz')?.addEventListener('click', () => location.reload());
        prev.disabled = true;
        next.disabled = true;
        submit.disabled = true;
    }

    prev.addEventListener('click', goPrev);
    next.addEventListener('click', goNext);
    submit.addEventListener('click', finishQuiz);
    renderCurrent();
    updateMetrics();

</script><a class="vq-back" href="https://www.videha.co.in/videha-elearning.htm">&larr; विदेह ई-लर्निङ्ग हब पर वापस जाउ</a>
