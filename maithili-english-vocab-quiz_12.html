        { english: "brave", pos: "adj.", maithili1: "वीर", maithili2: "साहसी", engAntonym: "cowardice", maiAntonym1: "भीरुता", maiAntonym2: "कायरता" },
        { english: "bright", pos: "adj.", maithili1: "चमकीला", maithili2: "उज्जर", engAntonym: "dark", maiAntonym1: "अँधेरा", maiAntonym2: "धुंधला" },

        { english: "busy", pos: "adj.", maithili1: "व्यस्त", maithili2: "व्यस्त रहब", engAntonym: "idle", maiAntonym1: "निरर्थक", maiAntonym2: "निकम्मा" },
        { english: "calm", pos: "a.", maithili1: "शान्त", maithili2: "थिर", engAntonym: "stormy", maiAntonym1: "क्रोधी", maiAntonym2: "उद्दंड" },
        { english: "cheap", pos: "adj.", maithili1: "सस्ता", maithili2: "कम दामक", engAntonym: "expensive", maiAntonym1: "बहुमूल्य", maiAntonym2: "महंगा" },
        { english: "cold", pos: "a.", maithili1: "ठंडा", maithili2: "सर्द", engAntonym: "hot", maiAntonym1: "गरम", maiAntonym2: "तीता" },
        { english: "courage", pos: "n.", maithili1: "साहस", maithili2: "हिम्मत", engAntonym: "cowardice", maiAntonym1: "भीरुता", maiAntonym2: "कायरता" },
        { english: "dark", pos: "a.", maithili1: "अंधेरा", maithili2: "गाढ़", engAntonym: "light", maiAntonym1: "रोशनी", maiAntonym2: "प्रकाश" },
        { english: "deep", pos: "adj.", maithili1: "गहरा", maithili2: "गहन", engAntonym: "shallow", maiAntonym1: "उथलल", maiAntonym2: "सतही" },
        { english: "easy", pos: "adj.", maithili1: "आसान", maithili2: "सरल", engAntonym: "difficult", maiAntonym1: "कठिन", maiAntonym2: "मुश्किल" },
        { english: "empty", pos: "adj.", maithili1: "खाली", maithili2: "रिक्त", engAntonym: "full", maiAntonym1: "परिपूर्ण", maiAntonym2: "भरल" },
        { english: "enemy", pos: "n.", maithili1: "दुश्मन", maithili2: "शत्रु", engAntonym: "friend", maiAntonym1: "सहायक", maiAntonym2: "समर्थक" },
        { english: "faithful", pos: "adj.", maithili1: "वफादार", maithili2: "निष्ठावान", engAntonym: "", maiAntonym1: "", maiAntonym2: "" },
        { english: "forget", pos: "v.", maithili1: "भूलब", maithili2: "विस्मृत", engAntonym: "remember", maiAntonym1: "स्मरण रखनाइ", maiAntonym2: "याद केनाइ" },
        { english: "generous", pos: "adj.", maithili1: "उदार", maithili2: "दानी", engAntonym: "", maiAntonym1: "", maiAntonym2: "" },
        { english: "happy", pos: "adj.", maithili1: "खुश", maithili2: "प्रसन्न", engAntonym: "unhappy", maiAntonym1: "", maiAntonym2: "" },
        { english: "humble", pos: "adj.", maithili1: "विनम्र", maithili2: "नम्र", engAntonym: "proud", maiAntonym1: "अभिमानी", maiAntonym2: "गर्वित" }
    ];

    // ----- Helper: parse Excel & build dictionary -----
    function parseExcelToDictionary(dataBuffer) {
        const workbook = XLSX.read(dataBuffer, { type: 'array' });
        const sheetName = workbook.SheetNames[0]; // assuming first sheet
        const sheet = workbook.Sheets[sheetName];
        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
        if (!rows || rows.length < 2) return [];
        const headerRow = rows[0];
        const colIndex = {
            english: -1, pos: -1, maithili1: -1, maithili2: -1,
            engAntonym: -1, maiAntonym1: -1, maiAntonym2: -1
        };
        for (let i = 0; i < headerRow.length; i++) {
            const cell = String(headerRow[i] || "").trim().toLowerCase();
            if (cell.includes("english word")) colIndex.english = i;
            else if (cell.includes("pos")) colIndex.pos = i;
            else if (cell.includes("maithili meaning 1")) colIndex.maithili1 = i;
            else if (cell.includes("maithili meaning 2")) colIndex.maithili2 = i;
            else if (cell.includes("english antonym")) colIndex.engAntonym = i;
            else if (cell.includes("maithili antonym 1")) colIndex.maiAntonym1 = i;
            else if (cell.includes("maithili antonym 2")) colIndex.maiAntonym2 = i;
        }
        if (colIndex.english === -1) return [];
        const dict = [];
        for (let i = 1; i < rows.length; i++) {
            const row = rows[i];
            if (!row || !row[colIndex.english]) continue;
            const eng = String(row[colIndex.english] || "").trim();
            if (eng.length < 1) continue;
            dict.push({
                english: eng,
                pos: colIndex.pos !== -1 ? String(row[colIndex.pos] || "").trim() : "",
                maithili1: colIndex.maithili1 !== -1 ? String(row[colIndex.maithili1] || "").trim() : "",
                maithili2: colIndex.maithili2 !== -1 ? String(row[colIndex.maithili2] || "").trim() : "",
                engAntonym: colIndex.engAntonym !== -1 ? String(row[colIndex.engAntonym] || "").trim() : "",
                maiAntonym1: colIndex.maiAntonym1 !== -1 ? String(row[colIndex.maiAntonym1] || "").trim() : "",
                maiAntonym2: colIndex.maiAntonym2 !== -1 ? String(row[colIndex.maiAntonym2] || "").trim() : ""
            });
        }
        return dict;
    }

    // load default sample if no upload
    function loadSampleData() {
        dictionary = [...SAMPLE_DATA];
        fileInfoSpan.innerText = "📘 नमूना डेटा (25 प्रविष्टि)";
        statusBadge.innerText = "● Sample mode";
        statusBadge.style.color = "#b87c4f";
        resetQuiz();
        generateNewSet();
    }

    // reset quiz state
    function resetQuiz() {
        currentIndex = 0;
        currentScore = 0;
        totalAnswered = 0;
        scoreSpan.innerText = "0";
        totalSpan.innerText = "0";
        waitingForNext = false;
        feedbackDiv.style.display = "none";
        nextBtn.disabled = false;
        generateNewSet();
    }

    // generate 10 questions based on current mode
    function generateNewSet() {
        if (!dictionary.length) {
            questionEl.innerText = "कोनो डेटा नहि अछि। कृपया Excel फाइल अपलोड करू।";
            optionsDiv.innerHTML = "";
            return;
        }
        const mode = currentMode;
        let newQuestions = [];
        const shuffled = [...dictionary];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        let usedIndices = new Set();
        if (mode === "synant") {
            // build synonym/antonym questions: focus on words with either a meaningful antonym or distinct synonym pair
            const candidates = [];
            for (let item of dictionary) {
                if (item.engAntonym && item.engAntonym.length > 0) {
                    candidates.push({ type: "antonym", word: item.english, correct: item.engAntonym, maiCorrect: item.maiAntonym1 });
                }
                // also add synonym possibility (using maithili meaning as clue? but we will use same word)
                if (item.maithili1 && item.maithili1.length > 0 && item.english) {
                    candidates.push({ type: "synonym", word: item.english, correct: item.maithili1, source: "maithili" });
                }
            }
            const unique = [];
            const seen = new Set();
            for (let c of candidates) {
                if (!seen.has(c.word + c.type) && c.correct) {
                    seen.add(c.word + c.type);
                    unique.push(c);
                }
            }
            for (let i = 0; i < Math.min(10, unique.length); i++) {
                const cand = unique[i];
                if (cand.type === "antonym") {
                    let options = [cand.correct];
                    // get other antonyms as distractors
                    let otherAntonyms = dictionary.filter(d => d.engAntonym && d.engAntonym !== cand.correct).map(d => d.engAntonym);
                    otherAntonyms = [...new Set(otherAntonyms)].slice(0, 3);
                    while (options.length < 4 && otherAntonyms.length) options.push(otherAntonyms.shift());
                    while (options.length < 4) options.push(cand.correct);
                    options = options.slice(0,4);
                    shuffleArray(options);
                    newQuestions.push({
                        text: `"${cand.word}" केर विलोम (antonym) चुनू।`,
                        correct: cand.correct,
                        options: options,
                        type: "antonym"
                    });
                } else {
                    // synonym: which maithili meaning is synonym?
                    let options = [cand.correct];
                    let otherMeanings = dictionary.filter(d => d.maithili1 && d.maithili1 !== cand.correct).map(d => d.maithili1);
                    otherMeanings = [...new Set(otherMeanings)].slice(0,3);
                    while (options.length < 4 && otherMeanings.length) options.push(otherMeanings.shift());
                    while (options.length < 4) options.push(cand.correct);
                    shuffleArray(options);
                    newQuestions.push({
                        text: `"${cand.word}" केर समानार्थी (synonym) चुनू।`,
                        correct: cand.correct,
                        options: options,
                        type: "synonym"
                    });
                }
            }
        } 
        else if (mode === "en2ma") {
            const valid = dictionary.filter(d => d.maithili1 && d.maithili1.length > 0);
            for (let i = 0; i < Math.min(10, valid.length); i++) {
                const item = valid[i];
                let options = [item.maithili1];
                let others = valid.filter(v => v.maithili1 !== item.maithili1).map(v => v.maithili1);
                others = [...new Set(others)].slice(0,3);
                while (options.length < 4 && others.length) options.push(others.shift());
                while (options.length < 4) options.push(item.maithili1);
                shuffleArray(options);
                newQuestions.push({
                    text: `"${item.english}" केर मैथिली अनुवाद की अछि? ${item.pos ? `(${item.pos})` : ''}`,
                    correct: item.maithili1,
                    options: options,
                    type: "en2ma"
                });
            }
        } 
        else if (mode === "ma2en") {
            const valid = dictionary.filter(d => d.maithili1 && d.maithili1.length > 0 && d.english);
            for (let i = 0; i < Math.min(10, valid.length); i++) {
                const item = valid[i];
                let options = [item.english];
                let others = valid.filter(v => v.english !== item.english).map(v => v.english);
                others = [...new Set(others)].slice(0,3);
                while (options.length < 4 && others.length) options.push(others.shift());
                while (options.length < 4) options.push(item.english);
                shuffleArray(options);
                newQuestions.push({
                    text: `"${item.maithili1}" (${item.pos || 'शब्द'}) केर अंग्रेजी अर्थ की अछि?`,
                    correct: item.english,
                    options: options,
                    type: "ma2en"
                });
            }
        }
        if (newQuestions.length === 0) {
            questionEl.innerText = "प्रश्न नहि बन सकल। कोनो वैध डेटा जोड़ू।";
            optionsDiv.innerHTML = "";
            totalSpan.innerText = "0";
            return;
        }
        currentQuestions = newQuestions.slice(0, 10);
        currentIndex = 0;
        currentScore = 0;
        totalAnswered = 0;
        totalSpan.innerText = currentQuestions.length;
        scoreSpan.innerText = "0";
        waitingForNext = false;
        feedbackDiv.style.display = "none";
        nextBtn.disabled = false;
        renderCurrentQuestion();
    }

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
    }

    function renderCurrentQuestion() {
        if (!currentQuestions.length || currentIndex >= currentQuestions.length) {
            questionEl.innerText = "✌️ Quiz समाप्त! फिनु शुरू करू।";
            optionsDiv.innerHTML = "";
            nextBtn.disabled = true;
            return;
        }
        const q = currentQuestions[currentIndex];
        questionEl.innerHTML = q.text;
        optionsDiv.innerHTML = "";
        const letters = ['A', 'B', 'C', 'D'];
        q.options.forEach((opt, idx) => {
            const optionDiv = document.createElement("div");
            optionDiv.className = "option-item";
            optionDiv.setAttribute("data-opt", opt);
            optionDiv.innerHTML = `<span class="option-letter">${letters[idx]}</span> <span>${opt}</span>`;
            optionDiv.addEventListener("click", () => handleAnswer(opt, q.correct));
            optionsDiv.appendChild(optionDiv);
        });
        feedbackDiv.style.display = "none";
        nextBtn.disabled = false;
    }

    function handleAnswer(selected, correct) {
        if (waitingForNext) return;
        waitingForNext = true;
        const isCorrect = (selected === correct);
        if (isCorrect) {
            currentScore++;
            scoreSpan.innerText = currentScore;
            feedbackDiv.style.display = "block";
            feedbackDiv.innerHTML = "✅ सही जवाब! बढ़िया!";
            feedbackDiv.style.background = "#e0f0e0";
        } else {
            feedbackDiv.style.display = "block";
            feedbackDiv.innerHTML = `❌ गलत। सही उत्तर: "${correct}"`;
            feedbackDiv.style.background = "#ffe0e0";
        }
        totalAnswered++;
        // disable options
        document.querySelectorAll(".option-item").forEach(el => el.style.pointerEvents = "none");
        nextBtn.disabled = false;
    }

    function nextQuestion() {
        if (!waitingForNext && totalAnswered !== currentIndex+1) {
            // if user didn't answer yet, show warning
            feedbackDiv.style.display = "block";
            feedbackDiv.innerHTML = "⚠️ कृपया पहिले उत्तर दिये!";
            feedbackDiv.style.background = "#fff0cc";
            return;
        }
        currentIndex++;
        if (currentIndex < currentQuestions.length) {
            waitingForNext = false;
            renderCurrentQuestion();
        } else {
            // quiz end
            questionEl.innerHTML = `🎉 समाप्त! आपक स्कोर: ${currentScore}/${currentQuestions.length} 🎉`;
            optionsDiv.innerHTML = "";
            feedbackDiv.style.display = "block";
            feedbackDiv.innerHTML = `खेल समाप्त! पुनः शुरू करबाक लेल मोड बदलू या पेज रिलोड करू।`;
            nextBtn.disabled = true;
        }
    }

    // event binding
    function initEventListeners() {
        modeBtns.forEach(btn => {
            btn.addEventListener("click", () => {
                modeBtns.forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                currentMode = btn.getAttribute("data-mode");
                resetQuiz();
            });
        });
        nextBtn.addEventListener("click", nextQuestion);
        excelInput.addEventListener("change", handleFileUpload);
        document.querySelector(".file-label").addEventListener("click", () => excelInput.click());
    }

    function handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const parsedDict = parseExcelToDictionary(data);
            if (parsedDict.length === 0) {
                statusBadge.innerText = "⚠️ पार्स विफल, नमूना लोड";
                loadSampleData();
            } else {
                dictionary = parsedDict;
                fileInfoSpan.innerText = `📂 ${file.name} (${dictionary.length} शब्द)`;
                statusBadge.innerText = "✓ Excel लोड भेल";
                statusBadge.style.color = "#2c6e2c";
                resetQuiz();
            }
        };
        reader.readAsArrayBuffer(file);
    }

    function init() {
        initEventListeners();
        loadSampleData();  // start with sample
    }
    init();

</script></body>
</html>
