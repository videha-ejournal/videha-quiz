/* ══════ ENGINE ══════ */
var ST = {a:null,b:null,c:null,d:null};
var curMode = 'a';

function shuffle(a){
  var b=a.slice(),i=b.length,j,t;
  while(i--){j=Math.floor(Math.random()*(i+1));t=b[i];b[i]=b[j];b[j]=t;}
  return b;
}

function switchMode(m){
  curMode=m;
  ['a','b','c','d'].forEach(function(x){
    document.getElementById('tab-'+x).className='tbtn'+(x===m?' active':'');
    document.getElementById('pane-'+x).className='pane'+(x===m?' active':'');
  });
  if(!ST[m])startQuiz(m);
}

function startQuiz(m){
  var el=document.getElementById('qsize-'+m);
  var sz=parseInt(el.value);
  var pool=shuffle(QDB[m].slice()).slice(0,sz);
  ST[m]={idx:0,score:0,qs:pool,answered:false,done:false};
  render(m);
}

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

var TAB_LABELS = {
  a:'लेखक परिचय',
  b:'नाटक एवं नाटककार',
  c:'उद्धरण एवं विश्लेषण',
  d:'समग्र आलेख'
};

function render(m){
  var s=ST[m];
  var el=document.getElementById('area-'+m);
  if(!s||s.done){renderScore(m);return;}
  var q=s.qs[s.idx];
  var total=s.qs.length;
  var pct=Math.round(s.idx/total*100);
  var nextLabel=(s.idx+1<total)?'अगिला / Next \u2192':'परिणाम / Result';

  var ch='';
  for(var i=0;i<q.choices.length;i++){
    ch+='<button class="cbtn" id="cb-'+m+'-'+i+'" onclick="answer(\''+m+'\','+i+')">'+esc(q.choices[i])+'</button>';
  }

  var hintHtml='';
  if(q.hint){
    hintHtml='<div class="hint-box" id="hint-'+m+'">&#128161; '+esc(q.hint)+'</div>';
  }

  el.innerHTML=
    '<div class="qhdr">'+
      '<span class="qtitle">'+esc(TAB_LABELS[m])+'</span>'+
      '<span class="qstat">Q '+(s.idx+1)+' / '+total+' &nbsp;&#10003;&nbsp;'+s.score+'</span>'+
    '</div>'+
    '<div class="progw"><div class="progb" style="width:'+pct+'%"></div></div>'+
    '<div class="card">'+
      '<div class="qnum">'+esc(q.cat||'')+'</div>'+
      '<div class="qword">'+esc(q.q)+'</div>'+
      '<div class="choices">'+ch+'</div>'+
      hintHtml+
      '<div class="fb" id="fb-'+m+'"></div>'+
    '</div>'+
    '<div class="nav">'+
      '<button class="nbtn pri" id="nxt-'+m+'" style="display:none" onclick="nextQ(\''+m+'\')">'+nextLabel+'</button>'+
      (q.hint?'<button class="nbtn sec" onclick="toggleHint(\''+m+'\')">संकेत / Hint</button>':'')+
      '<button class="nbtn sec" onclick="skipQ(\''+m+'\')">&#x091B;&#x094B;&#x0921;&#x093C;&#x0942; / Skip</button>'+
      '<button class="nbtn sec" onclick="startQuiz(\''+m+'\')">नव / New</button>'+
    '</div>';
}

function toggleHint(m){
  var h=document.getElementById('hint-'+m);
  if(h)h.classList.toggle('show');
}

function answer(m,ci){
  var s=ST[m];
  if(!s||s.answered)return;
  s.answered=true;
  var q=s.qs[s.idx];
  var ok=(ci===q.correct);
  if(ok)s.score++;
  for(var i=0;i<q.choices.length;i++){
    var b=document.getElementById('cb-'+m+'-'+i);
    b.disabled=true;
    if(i===q.correct)b.className='cbtn rev';
    else if(i===ci&&!ok)b.className='cbtn bad';
  }
  var fb=document.getElementById('fb-'+m);
  if(ok){fb.textContent='\u2713 सही! Correct!';fb.className='fb ok';}
  else{fb.innerHTML='\u2717 गलत! Wrong. \u2192 '+esc(q.choices[q.correct]);fb.className='fb bad';}
  if(!ok&&q.hint){
    var h=document.getElementById('hint-'+m);
    if(h)h.classList.add('show');
  }
  document.getElementById('nxt-'+m).style.display='inline-block';
}

function skipQ(m){
  var s=ST[m];
  if(!s)return;
  if(s.answered){nextQ(m);return;}
  var q=s.qs[s.idx];
  for(var i=0;i<q.choices.length;i++){
    var b=document.getElementById('cb-'+m+'-'+i);
    b.disabled=true;
    if(i===q.correct)b.className='cbtn rev';
  }
  var fb=document.getElementById('fb-'+m);
  fb.innerHTML='उत्तर: '+esc(q.choices[q.correct]);
  fb.className='fb';
  if(q.hint){
    var h=document.getElementById('hint-'+m);
    if(h)h.classList.add('show');
  }
  s.answered=true;
  document.getElementById('nxt-'+m).style.display='inline-block';
}

function nextQ(m){
  var s=ST[m];
  if(!s)return;
  s.idx++;s.answered=false;
  if(s.idx>=s.qs.length){s.done=true;renderScore(m);return;}
  render(m);
}

function renderScore(m){
  var s=ST[m];
  if(!s)return;
  var total=s.qs.length;
  var pct=Math.round(s.score/total*100);
  var msg = pct>=90 ? 'उत्कृष्ट! Excellent! \uD83C\uDF89' :
            pct>=70 ? 'बहुत नीक! Very Good! \uD83D\uDC4D' :
            pct>=50 ? 'ठीकठाक। Keep practicing!' :
            'अभ्यास जारी राखू। Keep practicing!';

  var others=['a','b','c','d'].filter(function(x){return x!==m;});
  var btns=others.map(function(x){
    return '<button class="nbtn sec" onclick="switchMode(\''+x+'\')">'+esc(TAB_LABELS[x])+'</button>';
  }).join('');

  document.getElementById('area-'+m).innerHTML=
    '<div class="scoreboard">'+
      '<div class="scbig">'+s.score+' / '+total+'</div>'+
      '<div class="scpct">('+pct+'%)</div>'+
      '<div class="scmsg">'+msg+'</div>'+
      '<div style="display:flex;gap:9px;justify-content:center;flex-wrap:wrap">'+
        '<button class="nbtn pri" onclick="startQuiz(\''+m+'\')">फेर खेलू / Play Again</button>'+
        btns+
      '</div>'+
    '</div>';
}

window.onload=function(){startQuiz('a');};
