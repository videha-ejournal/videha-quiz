<body>
<a class="vq-back" href="../videha-elearning.htm">&larr; विदेह ई-लर्निङ्ग हब पर वापस जाउ</a> <div class="quiz-container"> <div class="quiz-header"> <h1>📜 Socio-Genetic Architecture of Mithila <small>Chapter 5 · Panji Prabandha</small></h1> <p>Based on Gajendra Thakur's "Decoding the Panji of Mithila" – Kinship, Gotras, Exogamy & the Dusana Panji</p> </div> <div class="quiz-body" id="quizBody"> </div> <div class="quiz-footer"> <button id="submitBtn">✓ Submit & Check Answers</button> <button id="resetBtn" class="reset-btn">⟳ Reset Quiz</button> <div class="score-board" id="scoreDisplay">Score: --/--</div> </div>
</div>
<script>
  // ----- QUESTIONS (based strictly on Chapter 5 content) -----
  const questions = [
    {
      text: "According to Chapter 5, which socio-religious crisis directly led to the institutionalization of the Panji Prabandha in 1326 AD?",
      options: [
        "A famine that destroyed oral records",
        "The accidental incestuous marriage of Pandit Harinath Upadhyaya",
        "A rebellion by Karna Kayasthas against Brahmin authority",
        "The destruction of palm-leaf manuscripts by the Tughlaq army"
      ],
      correct: 1,
      explanation: "The incident of Pandit Harinath Upadhyaya marrying his maternal cousin (within prohibited Sapinda degrees) exposed the failure of oral genealogical memory, prompting King Harisimhadeva to formalize written Panji records."
    },
    {
      text: "How does the Panji system classify the primary patrilineal clans among Maithil Brahmins?",
      options: [
        "By Moolgram and Bikaua status",
        "Through 20 primary Gotras, each linked to specific Pravara sages",
        "Using the 16 Chhathi nodes exclusively",
        "By the Dusana Panji and hypergamy ranks"
      ],
      correct: 1,
      explanation: "Chapter 5 details the 20 Gotras (clans) such as Shandilya, Vatsa, Kashyapa, each with associated Pravara (three or five ancient sages) and original Mulas."
    },
    {
      text: "What is the functional purpose of the 'Utedh' (Uteh) chart in the Panji system?",
      options: [
        "To list property rights of zamindars",
        "To map 32 ancestral lines and compute 16 Chhathi nodes for marriage eligibility",
        "To record only royal genealogies of Darbhanga Raj",
        "To track migration to Nepal"
      ],
      correct: 1,
      explanation: "The Utedh maps 32 ancestors (paternal+maternal) and the 16 specific kinship nodes (Chhathi) to verify that no consanguineous relationship exists within prohibited generations."
    },
    {
      text: "Which of the following best describes the 'Sapinda' prohibition enforced by the Panji?",
      options: [
        "Marriage is allowed only within the same Moolgram",
        "Couples must not share a common ancestor within 5 maternal generations and 6/7 paternal generations",
        "Only Gotra exogamy matters; maternal lineage is ignored",
        "The bride must be from the groom’s stepmother’s village"
      ],
      correct: 1,
      explanation: "Sapinda rules (from Manusmriti) prohibit marriage if shared ancestry exists within five generations on mother’s side and six/seven generations on father’s side, ensuring genetic distance."
    },
    {
      text: "What unique social function does the 'Dusana Panji' (Dooshan Panji / Black Book) serve?",
      options: [
        "It records only the highest Shrotriya titles",
        "It documents lineage 'defects' — inter-caste unions, unknown parentage, devadasi connections — and tracks generational purification",
        "It is a secret register for royal marriages only",
        "It replaces the Mool Panji for Kayastha families"
      ],
      correct: 1,
      explanation: "The Dusana Panji systematically records caste transgressions, cross-caste marriages, and socially stigmatized unions, often with a six-generation purification mechanism — a counter-archive within the system."
    },
    {
      text: "According to Chapter 5, how did the introduction of the 'Shakha Panji' under Maharaja Madhav Singh alter Maithil society?",
      options: [
        "It abolished the Gotra system entirely",
        "It introduced rigid hierarchy (Shrotriya, Yogya, Panjibaddha) and fueled hypergamy, polygamy and child marriage",
        "It digitized all palm-leaf manuscripts",
        "It restricted Panjikars to Nepal only"
      ],
      correct: 1,
      explanation: "The Shakha Panji (branch books) created a three-tiered social ranking, institutionalized hypergamy, and led to social malpractices including child marriage and high widow numbers."
    },
    {
      text: "Which historical intellectual figure is documented in the Dusana Panji as having been born five years after his father’s death and married to a Charmakarini (leather-worker caste woman)?",
      options: [
        "Vidyapati Thakur",
        "Aryabhata",
        "Gangesha Upadhyaya (founder of Navya-Nyaya)",
        "Maharaja Harisimhadeva"
      ],
      correct: 2,
      explanation: "The Dooshan Panji records that Gangesha Upadhyaya was born 'pitri parokshe panch varsh vyatite' and his wife Vallabha/Medha was a Charmakarini, highlighting suppressed genealogical facts."
    },
    {
      text: "What does the term 'Bikaua' refer to in the context of Mithila’s social evolution?",
      options: [
        "Brahmin priests who refused dowry",
        "High-ranking men who married multiple lower-status women for cash, often abandoning them",
        "Women who maintained Panji records",
        "A type of purification ritual after 6 generations"
      ],
      correct: 1,
      explanation: "The Bikaua class emerged from hypergamy: high-status (often Shrotriya) men married dozens of younger women from lower tiers, causing polygamy and a wave of child widows."
    },
    {
      text: "How does the Panji system calculate the 16 Chhathi (Sixth-Degree Ancestors) to prevent prohibited marriage?",
      options: [
        "Only paternal uncles are verified",
        "The bride’s 16 Chhathi are cross-referenced with the groom’s paternal lineage — any overlap forbids the union",
        "The system matches horoscopes of both families",
        "Only the groom’s great-grandfather is checked"
      ],
      correct: 1,
      explanation: "After computing 32 ancestors, if any of the bride’s 16 Chhathi appears in the groom’s paternal line within prohibited generations, the marriage is forbidden. Maternal overlap is permitted."
    },
    {
      text: "What was the original, pre-hierarchical character of the Panji system under King Harisimhadeva, as emphasized in Chapter 5?",
      options: [
        "It strictly separated Shrotriya from Dalits",
        "It was a scientifically grounded, egalitarian genealogical register for Brahmins, Kayasthas, and Kshatriyas, treating all families equally",
        "It excluded Karna Kayasthas entirely",
        "It was used only by the Karnata royal family"
      ],
      correct: 1,
      explanation: "The chapter notes that Harisimhadeva’s Panji was purely scientific, with all registered families equal; hierarchy came later under Madhav Singh’s Shakha system."
    }
  ];

  // UI elements
  const quizBody = document.getElementById('quizBody');
  const submitBtn = document.getElementById('submitBtn');
  const resetBtn = document.getElementById('resetBtn');
  const scoreDisplay = document.getElementById('scoreDisplay');

  let userSelections = new Array(questions.length).fill(null);
  let submitted = false;
  let score = 0;

  // Render all questions
  function renderQuiz() {
    quizBody.innerHTML = '';
    questions.forEach((q, idx) => {
      const card = document.createElement('div');
      card.className = 'question-card';
      card.dataset.qidx = idx;
      
      const qTextDiv = document.createElement('div');
      qTextDiv.className = 'question-text';
      qTextDiv.innerText = `${idx+1}. ${q.text}`;
      card.appendChild(qTextDiv);
      
      const optsDiv = document.createElement('div');
      optsDiv.className = 'options';
      
      q.options.forEach((opt, optIdx) => {
        const optionDiv = document.createElement('div');
        optionDiv.className = 'option';
        const radio = document.createElement('input');
        radio.type = 'radio';
        radio.name = `q${idx}`;
        radio.value = optIdx;
        radio.id = `q${idx}_opt${optIdx}`;
        if (!submitted && userSelections[idx] === optIdx) radio.checked = true;
        if (submitted) radio.disabled = true;
        
        const label = document.createElement('label');
        label.htmlFor = `q${idx}_opt${optIdx}`;
        label.innerText = opt;
        
        optionDiv.appendChild(radio);
        optionDiv.appendChild(label);
        
        // event listener for change (only if not submitted)
        radio.addEventListener('change', (e) => {
          if (!submitted) {
            userSelections[idx] = parseInt(e.target.value);
          }
        });
        
        optsDiv.appendChild(optionDiv);
      });
      
      card.appendChild(optsDiv);
      
      // feedback area if submitted
      if (submitted) {
        const fbDiv = document.createElement('div');
        fbDiv.className = 'feedback';
        const isCorrect = (userSelections[idx] === q.correct);
        if (isCorrect) {
          fbDiv.innerHTML = `<div class="correct-feedback">✓ Correct. ${q.explanation}</div>`;
        } else {
          const correctLetter = String.fromCharCode(65 + q.correct);
          fbDiv.innerHTML = `<div class="wrong-feedback">✗ Incorrect. Correct answer: ${correctLetter}) ${q.options[q.correct]}.<br>${q.explanation}</div>`;
        }
        card.appendChild(fbDiv);
      }
      
      quizBody.appendChild(card);
    });
  }

  // compute score
  function computeScore() {
    let correctCount = 0;
    for (let i = 0; i < questions.length; i++) {
      if (userSelections[i] !== null && userSelections[i] === questions[i].correct) {
        correctCount++;
      }
    }
    return correctCount;
  }

  function updateScoreDisplay() {
    const total = questions.length;
    const correctCount = computeScore();
    score = correctCount;
    scoreDisplay.innerText = `Score: ${correctCount}/${total}`;
  }

  function submitQuiz() {
    if (submitted) {
      // already submitted, do nothing
      return;
    }
    // check that all questions are answered
    let allAnswered = true;
    for (let i = 0; i < questions.length; i++) {
      if (userSelections[i] === null) {
        allAnswered = false;
        break;
      }
    }
    if (!allAnswered) {
      alert("Please answer all 10 questions before submitting.");
      return;
    }
    submitted = true;
    updateScoreDisplay();
    renderQuiz(); // re-render with feedback and disable radios
  }

  function resetQuiz() {
    submitted = false;
    userSelections.fill(null);
    score = 0;
    updateScoreDisplay();
    renderQuiz();
  }

  // initial rendering
  renderQuiz();
  updateScoreDisplay();

  submitBtn.addEventListener('click', submitQuiz);
  resetBtn.addEventListener('click', resetQuiz);
</script><div class="vq-footer">© सम्पादक, videha.co.in</div>
</body>
