        addQ("'की दिव्य भूमि मिथिला' पंक्ति के रचयिता छथि?", "बुद्धिधारी सिंह रमाकर", "सुमन", "मोहन भारद्वाज", "राजमोहन झा", 0);
        addQ("'मैथिली कोकिल' कहल जाइत अछि?", "विद्यापति", "ज्योतिरीश्वर", "गोविन्ददास", "लोचन", 0);
        if(QUESTIONS.length >= 248) break;
    }
    // अन्तिमतः 250 प्रश्न
    const FINAL = QUESTIONS.slice(0,250);
    let userAnswers = new Array(FINAL.length).fill(null);
    let current = 0;
    const total = FINAL.length;
    document.getElementById("totalQ").innerText = total;
    document.getElementById("totalScore").innerText = total;

    function render() {
        const q = FINAL[current];
        const saved = userAnswers[current];
        let html = `<div class="question-card">
            <div class="q-text">${current+1}. ${q.text}</div>
            <div class="options">`;
        q.options.forEach((opt, idx) => {
            html += `<div class="option">
                        <input type="radio" name="qOpt" value="${idx}" id="opt_${idx}" ${saved === idx ? 'checked' : ''}>
                        <label for="opt_${idx}">${String.fromCharCode(65+idx)}. ${opt}</label>
                    </div>`;
        });
        html += `</div></div>`;
        document.getElementById("quizArea").innerHTML = html;
        document.getElementById("qNum").innerText = current+1;
        // attach event listeners
        document.querySelectorAll('input[name="qOpt"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                const chosen = parseInt(e.target.value);
                userAnswers[current] = chosen;
                document.querySelectorAll('.option').forEach((optEl, idx) => {
                    optEl.classList.remove('correct-answer', 'wrong-answer');
                    if (idx === FINAL[current].correct) {
                        optEl.classList.add('correct-answer');
                    } else if (idx === chosen) {
                        optEl.classList.add('wrong-answer');
                    }
                });
                updateScore();
            });
        });
        if (saved !== null) {
            document.querySelectorAll('.option').forEach((optEl, idx) => {
                if (idx === FINAL[current].correct) {
                    optEl.classList.add('correct-answer');
                } else if (idx === saved) {
                    optEl.classList.add('wrong-answer');
                }
            });
        }
    }

    function updateScore() {
        let correct = 0;
        for(let i=0; i<FINAL.length; i++) {
            if(userAnswers[i] !== null && userAnswers[i] === FINAL[i].correct) correct++;
        }
        document.getElementById("scoreValue").innerText = correct;
    }

    function showResult() {
        let correct = 0;
        for(let i=0; i<FINAL.length; i++) {
            if(userAnswers[i] !== null && userAnswers[i] === FINAL[i].correct) correct++;
        }
        let percent = (correct/total*100).toFixed(2);
        document.getElementById("resultPanel").innerHTML = `<div class="result-area">
            🎉 अंक: ${correct} / ${total} (${percent}%) 🎉<br>
            📖 मैथिली NET/JRF स्तर: ${correct >= 180 ? 'प्रवीण (EXCELLENT)' : (correct>=120 ? 'संतोषजनक' : 'अध्ययन आवश्यक')}
        </div>`;
    }

    document.getElementById("prevBtn").addEventListener("click", () => {
        if(current > 0) { current--; render(); }
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
        if(current < total-1) { current++; render(); }
    });
    document.getElementById("submitBtn").addEventListener("click", () => {
        showResult();
        updateScore();
    });
    render();
    updateScore();

</script><a class="vq-back" href="https://www.videha.co.in/videha-elearning.htm">&larr; विदेह ई-लर्निङ्ग हब पर वापस जाउ</a>
