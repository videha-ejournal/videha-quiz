        { text: "नवीन काव्यधारा मे ‘बहेडजी’ (राधाकृष्ण झा) के कविताक विशेषता कोन अछि ?", options: ["वातावरणिक सजीवता, लोकभाषा", "संस्कृत निष्ठा", "पाण्डित्यपूर्ण शैली", "दीर्घ महाकाव्य"], correct: 0 },
        { text: "नवीन काव्यधाराक कवि ‘मधुरजी’ (मधुरानन्द चौधरी) के कविता ‘राधा-विरह’ के प्रकृति कोन अछि ?", options: ["महाकाव्य (शृंगारपरक)", "खण्डकाव्य", "गीति-काव्य", "हास्य-रस"], correct: 0 },
        { text: "प्रसिद्ध कवि ‘यात्रीजी’ के पुरस्कृत रचना ‘शिवा’ के प्रकाशन वर्ष अछि ?", options: ["१३५७ साल (१९४९ ई.)", "१९३६", "१९४४", "१९५२"], correct: 0 },
        { text: "नवीन काव्यधाराक एक प्रमुख प्रवृत्ति ‘प्रयोगवाद’ के बारे मे लेखक (दुर्गानाथ झा) का कहल अछि ?", options: ["प्रयोगक हेतु सिद्धान्त, किन्तु जन-जीवन सँ दूर", "अत्यधिक लोकप्रिय", "प्राचीन शैलीक पुनरुद्धार", "भक्ति परक"], correct: 0 },
        { text: "मैथिली कविताक नवीनतम धारा ‘हाइकु’, ‘सॉनेट’ प्रभृति के प्रयोग कोन कवि केलनि ?", options: ["डा. कुलानन्द झा ‘प्रवासी’, श्रीकान्त छठ", "भुवनजी", "प्रो. ईशनाथ झा", "सुमनजी"], correct: 0 },
        { text: "लेखक अनुसार सन् १९२५-३० के बाद मैथिली आधुनिक काव्यधारा दुई श्रेणीमे बाँटल जा सकैत अछि – प्रगीत-काव्य आ ?", options: ["न्यतम प्रयोगवादी काव्य", "महाकाव्य", "नाट्य-काव्य", "लोक-गीत"], correct: 0 },
        { text: "प्रगीत-काव्यक प्रमुख कवि लोकनिमे कोन गणना नहि होइत ?", options: ["चन्द्राझा", "भुवनजी", "यात्रीजी", "प्रो. ईशनाथ झा"], correct: 0 },
        { text: "नवीन काव्यधारा अन्तर्गत ‘कवि तारानन्द तरुण’ के केर प्रसिद्धि अछि ?", options: ["गजल आ आधुनिक प्रयोग", "प्राचीन गीति", "शिव भक्ति", "वीर रस"], correct: 0 },
        { text: "मैथिली कवितामे ‘अकविता’ (महल स्तोन) प्रयोग कोन कालमे देखल गेल ?", options: ["प्रयोगवादी कविता प्रवृत्ति (१९५८ के बाद)", "विद्यापति काल", "भक्ति काल", "प्राचीन गीत परम्परा"], correct: 0 },
        { text: "नवीन काव्यधाराक प्रथम सशक्त गीत-संग्रह ‘आषाढ़’ (१९३६) के रचियता कोन छथि ?", options: ["भुवनजी", "यात्रीजी", "सुमनजी", "प्रो. ईशनाथ झा"], correct: 0 },
        { text: "प्रो. ईशनाथ झा के ‘कीचकवध’ महाकाव्य के अलावा हुनकर दोसर महाकाव्य कोन अछि ?", options: ["कृष्णचरित (१९७४-७५)", "एकावलीपरिणय", "सुभद्राहरण", "रुक्मिणी परिणय"], correct: 0 }
    ];

    const totalQ = questions.length;
    let userSelections = new Array(totalQ).fill(null);
    let submitted = false;

    const container = document.getElementById('questionsArea');
    const totalSpan = document.getElementById('totalQ');
    const scoreSpan = document.getElementById('scoreCount');
    const percentSpan = document.getElementById('percentBox');

    function renderQuiz() {
        container.innerHTML = '';
        questions.forEach((q, idx) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.dataset.qid = idx;
            const qDiv = document.createElement('div');
            qDiv.className = 'q-text';
            qDiv.innerText = `${idx+1}. ${q.text}`;
            card.appendChild(qDiv);
            const optsDiv = document.createElement('div');
            optsDiv.className = 'opts-list';
            q.options.forEach((opt, optIdx) => {
                const label = document.createElement('label');
                label.className = 'opt-item';
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = `q_${idx}`;
                radio.value = optIdx;
                radio.disabled = submitted;
                if (userSelections[idx] === optIdx) radio.checked = true;
                radio.addEventListener('change', (e) => {
                    if (!submitted) {
                        userSelections[idx] = parseInt(e.target.value);
                        updateStats();
                        showFeedback(idx, card);
                    }
                });
                const span = document.createElement('span');
                span.innerText = `${String.fromCharCode(65+optIdx)}. ${opt}`;
                label.appendChild(radio);
                label.appendChild(span);
                optsDiv.appendChild(label);
            });
            card.appendChild(optsDiv);
            const fbDiv = document.createElement('div');
            fbDiv.className = 'feedback';
            fbDiv.id = `fb_${idx}`;
            card.appendChild(fbDiv);
            container.appendChild(card);
            if (submitted) showFeedback(idx, card);
        });
        totalSpan.innerText = totalQ;
        updateStats();
    }

    function showFeedback(qid, cardDiv) {
        const fbDiv = cardDiv.querySelector('.feedback');
        const selected = userSelections[qid];
        const correctIdx = questions[qid].correct;
        if (selected === null) {
            fbDiv.innerHTML = '';
            fbDiv.className = 'feedback';
            return;
        }
        if (selected === correctIdx) {
            fbDiv.innerHTML = '✅ सही उत्तर।';
            fbDiv.className = 'feedback fb-correct';
        } else {
            const correctLetter = String.fromCharCode(65+correctIdx);
            fbDiv.innerHTML = `❌ अशुद्ध। सही उत्तर : ${correctLetter}. ${questions[qid].options[correctIdx]}`;
            fbDiv.className = 'feedback fb-wrong';
        }
    }

    function updateStats() {
        let correct = 0;
        for (let i=0; i<totalQ; i++) {
            if (userSelections[i] !== null && userSelections[i] === questions[i].correct) correct++;
        }
        if (!submitted) {
            scoreSpan.innerText = `${correct}/${totalQ}`;
            let perc = Math.round((correct/totalQ)*100);
            percentSpan.innerText = `${perc}% (उत्तर चुनल)`;
        } else {
            scoreSpan.innerText = `${correct}/${totalQ}`;
            let perc = Math.round((correct/totalQ)*100);
            percentSpan.innerText = `${perc}% ${perc>=60 ? '🎉 नवीन रसिक' : '📖 नवीन काव्य पढू'}`;
        }
    }

    function evaluateAll() {
        if (submitted) {
            alert("पहिने जाँच होइ चुकल अछि। पुनः आरम्भ कए नव उत्तर दी।");
            return;
        }
        let unanswered = [];
        for (let i=0; i<totalQ; i++) if (userSelections[i] === null) unanswered.push(i+1);
        if (unanswered.length > 0) {
            if (!confirm(`⚠️ ${unanswered.length} प्रश्न अनुत्तरित अछि (जेना प्र. ${unanswered.slice(0,12).join(',')}...). जाँच करब तौ?`)) return;
        }
        submitted = true;
        const allRadios = document.querySelectorAll('input[type="radio"]');
        allRadios.forEach(radio => radio.disabled = true);
        let finalCorrect = 0;
        for (let i=0; i<totalQ; i++) {
            const card = document.querySelector(`.question-card[data-qid='${i}']`);
            if (card) showFeedback(i, card);
            if (userSelections[i] !== null && userSelections[i] === questions[i].correct) finalCorrect++;
        }
        scoreSpan.innerText = `${finalCorrect}/${totalQ}`;
        let perc = Math.round((finalCorrect/totalQ)*100);
        percentSpan.innerText = `${perc}% ${perc>=60 ? '🏆 आधुनिक कविताक ज्ञाता' : '📚 पुनरावलोकन जरूरी'}`;
    }

    function resetQuiz() {
        submitted = false;
        userSelections = new Array(totalQ).fill(null);
        const radios = document.querySelectorAll('input[type="radio"]');
        radios.forEach(r => { r.checked = false; r.disabled = false; });
        renderQuiz();
    }

    document.getElementById('submitBtn').addEventListener('click', evaluateAll);
    document.getElementById('resetBtn').addEventListener('click', resetQuiz);
    renderQuiz();

</script></body>
</html>
