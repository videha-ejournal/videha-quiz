<!DOCTYPE html>
<html lang="mai">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>मिथिला विकास परिषद् (MVP) विशेष क्विज़ | Mithila Vikas Parishad Quiz</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #1a3f2c 0%, #0e2a1c 100%);
      font-family: 'Segoe UI', 'Poppins', 'Noto Sans Devanagari', 'Mukta', sans-serif;
      padding: 1.5rem;
      color: #fef5e6;
    }

    .quiz-container {
      max-width: 1000px;
      margin: 0 auto;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(6px);
      border-radius: 2rem;
      padding: 1.5rem;
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5);
      border: 1px solid #ffcd94;
    }

    .header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      background: #0f2b1f;
      padding: 0.7rem 1.5rem;
      border-radius: 60px;
      margin-bottom: 1.2rem;
    }

    .counter, .score {
      background: #00000055;
      padding: 0.4rem 1.2rem;
      border-radius: 40px;
      font-weight: bold;
    }

    .counter span:first-child, .score span:first-child {
      color: #ffb347;
      margin-right: 8px;
    }

    .reset-btn {
      background: #b5442e;
      border: none;
      padding: 0.4rem 1.2rem;
      border-radius: 40px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .reset-btn:hover {
      background: #e67e22;
      transform: scale(1.02);
    }

    .progress-bar {
      background: #2b543e;
      border-radius: 30px;
      height: 10px;
      width: 100%;
      margin: 0.8rem 0;
      overflow: hidden;
    }

    .progress-fill {
      background: #f39c12;
      width: 0%;
      height: 100%;
      transition: width 0.25s;
    }

    .card {
      background: white;
      color: #1e2f2a;
      border-radius: 1.8rem;
      padding: 1.6rem;
      margin: 1rem 0;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }

    .question {
      font-size: 1.55rem;
      font-weight: 700;
      border-left: 6px solid #e67e22;
      padding-left: 1rem;
      margin-bottom: 1.5rem;
      line-height: 1.4;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin-bottom: 1.4rem;
    }

    .opt {
      background: #f2f6fc;
      border: 2px solid #cbd5e1;
      border-radius: 50px;
      padding: 0.75rem 1.2rem;
      font-size: 1rem;
      text-align: left;
      cursor: pointer;
      transition: 0.1s;
      font-weight: 500;
      color: #1f2e3a;
    }

    .opt:hover:not(:disabled) {
      background: #e9f0f9;
      border-color: #f39c12;
      transform: translateX(5px);
    }

    .opt-correct {
      background: #c8e6d9 !important;
      border-color: #2e7d32 !important;
      color: #1b5e20;
    }

    .opt-wrong {
      background: #ffdddd !important;
      border-color: #c62828 !important;
      color: #b71c1c;
      text-decoration: line-through;
    }

    .explanation {
      background: #fff8e7;
      border-left: 5px solid #e67e22;
      padding: 0.9rem 1.2rem;
      border-radius: 1rem;
      margin-top: 0.8rem;
      font-size: 0.95rem;
      color: #3b2b1a;
    }

    .nav-buttons {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      margin-top: 0.5rem;
    }

    .nav-btn {
      background: #2c5a42;
      border: none;
      padding: 0.6rem 1.8rem;
      border-radius: 50px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .nav-btn:hover {
      background: #e67e22;
    }

    footer {
      text-align: center;
      margin-top: 1.8rem;
      font-size: 0.75rem;
      opacity: 0.8;
    }

    @media (max-width: 650px) {
      .question {
        font-size: 1.2rem;
      }
      .opt {
        font-size: 0.85rem;
        padding: 0.6rem 1rem;
      }
    }
  
/* Videha standard quiz header/footer */
.videha-quiz-top{
  background:linear-gradient(135deg,#071f4e,#0b2d6b);
  color:#fff;text-align:center;padding:24px 16px;
  border-bottom:6px solid #f4c542;font-weight:700;
  font-family:Arial,'Noto Serif Devanagari',sans-serif;
  font-size:24px;line-height:1.45;margin:0 0 18px 0;
}
.videha-quiz-top span{font-size:16px;font-weight:500}
.videha-quiz-top a{color:#f4c542;text-decoration:none}
.videha-hub-return{
  display:block;text-align:center;margin:14px auto 18px;
  color:#071f4e !important;font-weight:700;text-decoration:none;
  font-family:'Noto Serif Devanagari',Arial,sans-serif;font-size:16px;
}
.videha-hub-return:hover{text-decoration:underline}
.videha-quiz-footer{
  background:#071f4e;color:#fff;text-align:center;padding:16px;
  margin-top:28px;border-top:5px solid #f4c542;
  font-family:Arial,'Noto Serif Devanagari',sans-serif;
}
</style>
</head>
<body>
<header class="videha-quiz-top">Videha QUIZ  |  विदेह ई-लर्निङ्ग क्विज<br>Videha eLearning Quiz<br><span>Videha — First Maithili Fortnightly eJournal  |  <a href="https://www.videha.co.in">www.videha.co.in</a></span></header>

<div class="quiz-container" id="mvpQuiz">
  <div class="header">
    <div class="counter"><span>📖 प्रश्न</span> <span id="currentQ">1</span> / <span id="totalQ">0</span></div>
    <div class="score"><span>🏆 स्कोर</span> <span id="scoreVal">0</span> / <span id="totalScoreVal">0</span></div>
    <button class="reset-btn" id="resetQuiz">⟳ पुनः प्रारंभ</button>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="card">
    <div class="question" id="questionText">लोड होइत अछि...</div>
    <div class="options" id="optionsContainer"></div>
    <div class="explanation" id="explanationBox">✅ कोनो विकल्प चुनू → सही/गलत रंग + व्याख्या</div>
  </div>
  <div class="nav-buttons">
    <button class="nav-btn" id="prevBtn">◀ पिछला</button>
    <button class="nav-btn" id="nextBtn">अगिला ▶</button>
  </div>
  </div>

<script>
  // ------------------------------------------------------------
  // प्रश्न बैंक - केवल मिथिला विकास परिषद् (MVP) से संबंधित
  // स्रोत: प्रदत्त PDF (VIDEHA_408 MITHILA VIKAS PARISHAD.pdf)
  // उद्देश्य: संस्थाक इतिहास, कार्य, व्यक्ति, उपलब्धि, समालोचना
  // ------------------------------------------------------------
  const MVP_QUESTIONS = [
    // 1-20: स्थापना, संस्थापक, उद्देश्य, संरचना
    { text: "मिथिला विकास परिषद् (MVP) केर स्थापना वर्ष की अछि?", options: ["1975", "1980", "1985", "1990"], correct: 1, explanation: "PDF के अनुसार MVP केर स्थापना 1980 मे भेल छल (पृष्ठ 48)।" },
    { text: "MVP केर संस्थापक एवं सर्वकालिक अध्यक्ष के छथि?", options: ["गोपीकांत झा", "विनय प्रतिहस्त", "अशोक झा", "प्रमोद ठाकुर"], correct: 2, explanation: "अशोक झा संस्थापक अध्यक्ष छथि, जे आजु धरि अध्यक्ष छथि (पृष्ठ 48, 66)।" },
    { text: "MVP केर मुख्य उद्देश्य की अछि?", options: ["केवल नाटक मंचन", "मिथिला-मैथिलीक सर्वांगीण विकास", "राजनीतिक दल बनाब", "कोलकातामे मैथिली सीमित करब"], correct: 1, explanation: "PDF मे उल्लेख: ‘मिशिला-मैशिलीक सर्वांगीण विकास’ (पृष्ठ 49)।" },
    { text: "MVP केर कार्य क्षेत्र मुख्य रूपें कोन शहर अछि?", options: ["दरभंगा", "मधुबनी", "कोलकाता", "पटना"], correct: 2, explanation: "संस्थाक उपस्थिति कोलकाता (कलकत्ता) मे अछि (पृष्ठ 49)।" },
    { text: "MVP केर महिला मंच केर नाम की अछि?", options: ["मैथिली नारी मंच", "मिथिला महिला मंच", "स्त्री सशक्तिकरण मंच", "मिथिला बहिनी मंच"], correct: 1, explanation: "PDF: ‘मिशिला महिला मंच’ अध्यक्षा शैल झा (पृष्ठ 49)।" },
    { text: "MVP केर महिला मंचक अध्यक्षा के छथिन?", options: ["शैल झा (अशोक झाक पत्नी)", "शैल झा 'सागर'", "प्रेमलता मिश्र", "कल्पना झा"], correct: 0, explanation: "श्रीमती शैल झा (अशोक झाक पत्नी) अध्यक्षा छथिन। कोलकातामे दू शैल झा छथि, एहि महिला मंचक शैल झा अशोक झाक पत्नी छथिन (पृष्ठ 49)।" },
    { text: "MVP के सह-संस्थापक सदस्य सभमे कोन नहि अछि?", options: ["प्रमोद कुमार ठाकुर", "गोपीकांत झा 'मुन्ना'", "विनय प्रतिहस्त", "रामलोचन ठाकुर"], correct: 3, explanation: "रामलोचन ठाकुर संस्थापक सदस्य नहि छलाह, बाद मे जुड़ल (पृष्ठ 48)।" },
    { text: "PDF अनुसार MVP केर वृत्ति (nature) की अछि?", options: ["लाभकारी व्यापारिक", "लाभरहित आ गैर राजनीतिक", "राजनीतिक दल", "धार्मिक ट्रस्ट"], correct: 1, explanation: "वृति- लाभरहित आ गैर राजनीतिक संगठन (पृष्ठ 49)।" },
    
    // रेल आन्दोलन एवं परिवहन (8-20)
    { text: "गंगासागर एक्सप्रेस (सियालदह-जयनगर) के प्रतिदिन परिचालन लेल MVP सफल आन्दोलन केलक। कोन बोगी के जोड़बामे सफलता भेटल?", options: ["ए.सी. बोगी", "स्लीपर कोच", "जनरल डिब्बा", "लगेज कार"], correct: 0, explanation: "MVP ए.सी. बोगी लेल प्रयास एवं सफलता (पृष्ठ 55)।" },
    { text: "कोलकाता सँ जयनगर धरि वंदे भारत ट्रेन परिचालन हेतु MVP केन्हें पहल केलक?", options: ["नई दिल्ली सँ जयनगर धरि", "कोलकाता सँ दरभंगा", "जयपुर सँ जयनगर", "गौहाटी सँ जयनगर"], correct: 0, explanation: "PDF: ‘कोलकाता-जयनगर के संग नई देलही स' जयनगर धरि वंदे भारत’ पहल (पृष्ठ 56)।" },
    { text: "मधुबनी स्टेशन पर कोनक शहीद वेदीक सौन्दर्यीकरण MVP केलक?", options: ["ललित बाबू", "कपूरी ठाकुर", "भोगेन्द्र झा", "यात्री जी"], correct: 0, explanation: "स्वगीय ललित बाबू के शहीद वेदीक सौंदर्यीकरण (पृष्ठ 56)।" },
    { text: "MVP केन्हें रेलवे स्टेशन के ललित बाबू के नाम पर करबाक पहल केलक?", options: ["मधुबनी", "समस्तीपुर", "जयनगर", "दरभंगा"], correct: 1, explanation: "समस्तीपुर रेलवे स्टेशन के नाम ललित बाबू के नाम पर करबाक पहल (पृष्ठ 56)।" },
    { text: "दरभंगा जयनगर सड़क संख्या NH 105 के विस्तारीकरण लेल MVP पहल केलक, ई कोन राज्यक सड़क अछि?", options: ["बिहार", "पश्चिम बंगाल", "झारखण्ड", "नेपाल"], correct: 0, explanation: "दरभंगा-जयनगर NH 105 बिहारमे अछि (पृष्ठ 58)।" },
    { text: "कुली द्वारा रेल गाडी मे सीट बिक्रीक विरोध मे MVP केन्हें आन्दोलन केलक?", options: ["48 घंटा अनशन हावड़ा मे", "धरना सियालदह", "रेल मंत्रालय घेराव", "मुकदमा"], correct: 0, explanation: "कोलकाताक हावडा मे 48 घंटाक अनशन (पृष्ठ 56-57)।" },
    { text: "कोन ट्रेन के समय परिवर्तन लेल MVP प्रयास केलक एवं सफल भेल?", options: ["गंगासागर एक्सप्रेस", "मिथिलांचल एक्सप्रेस", "सियालदह जयनगर पैसेंजर", "हावड़ा रक्सौल एक्सप्रेस"], correct: 0, explanation: "गंगासागर एक्सप्रेसक समय परिवर्तन लेल प्रयास (पृष्ठ 56)।" },
    { text: "MVP के सफल प्रयास सँ कोन दूरगामी ट्रेन जयपुर सँ दरभंगा धरि प्रारंभ भेल?", options: ["जयपुर-दरभंगा एक्सप्रेस", "वंदे भारत", "गंगासागर", "मिथिलांचल"], correct: 0, explanation: "जयपुर सँ दरभंगा धरि ट्रेन परिचालन प्रारंभ लेल प्रयास एवं सफलता (पृष्ठ 56)।" },
    
    // मूर्ति स्थापना, स्मारक (21-30)
    { text: "MVP द्वारा गिरीश पार्क (कोलकाता) मे केकर प्रस्तर प्रतिमा स्थापित केल गेल?", options: ["नागार्जुन", "विद्यापति", "सीता", "अशोक झा"], correct: 1, explanation: "गिरीश पार्क मे महाकवि विद्यापतिक मूर्ति (पृष्ठ 58)।" },
    { text: "तारा सुंदरी पार्क (कोलकाता) मे MVP केकर प्रतिमा स्थापित केलक?", options: ["विद्यापति", "यात्री (नागार्जुन)", "कामेश्वर सिंह", "रामलोचन ठाकुर"], correct: 1, explanation: "तारासुंदरी पार्कमे जनकवि-उपन्यासकार यात्री (नागार्जुन)क प्रतिमा (पृष्ठ 58)।" },
    { text: "भूतनाथ मंदिर (हुगली नदी घाट) मे MVP विद्यापतिक मूर्ति संग ककर मूर्ति स्थापित केलक?", options: ["महिपाल ठाकुर", "ललित बाबू", "अशोक झा", "शैल झा"], correct: 0, explanation: "भूतनाथ मंदिर पूर्व प्रधान पुजारी स्व. महिपाल ठाकुर (मैथिल) केर मूर्ति (पृष्ठ 59)।" },
    { text: "सियालदह फ्लाई ओवर केर नामकरण MVP के प्रयास सँ ककर नाम पर भेल?", options: ["विद्यापति सेतु", "मिथिला सेतु", "अशोक सेतु", "नागार्जुन सेतु"], correct: 0, explanation: "सियालदह फ्लाई ओवर के नामकरण विद्यापति सेतु (पृष्ठ 70)।" },
    { text: "कोलकाताक लालदीघी (राइटर्स बिल्डिंग सामने) केकर प्रतिमा के अनावरण के लेल MVP प्रयासरत अछि?", options: ["महाराज कामेश्वर सिंह", "विद्यापति", "अशोक झा", "रवीन्द्रनाथ ठाकुर"], correct: 0, explanation: "महाराज दरभंगा कामेश्वर सिंह के प्रतिमाक अनावरण (पृष्ठ 74)।" },
    
    // नाट्य मंचन एवं रंगकर्म (31-38)
    { text: "MVP द्वारा कोलकाता रंगमंच पर 1981 सँ आइ धरि कति टा नाट्य मंचन भेल अछि?", options: ["28", "38 सँ बेसी", "50", "25"], correct: 1, explanation: "1981 सँ आइ धरि 38 टा सँ बेसी नाट्य मंचन (पृष्ठ 60)।" },
    { text: "अशोक झा द्वारा लिखल नाटक कोन अछि?", options: ["जीबैत लाश", "हमरा मोनक खंजन चिड़ैया", "मिथिला माँगए खून", "जीरो पावर"], correct: 0, explanation: "PDF: ‘जीबैत लाश’, ‘बिरों’, ‘कमौआ पूत’, ‘द्वन्द्व’ अशोक झाक नाटक (पृष्ठ 61)।" },
    { text: "अरिपन नाट्य प्रतियोगिता, पटना, मे MVP कति बेर पुरस्कार विजेता रहल अछि?", options: ["एक बेर", "कतिपय बेर", "केवल एक", "भाग नहि लेलक"], correct: 1, explanation: "अरिपन नाट्य प्रतियोगिता मे कतिपय बेर भाग ल' क' पुरस्कार विजेता (पृष्ठ 60)।" },
    
    // प्रकाशन, पत्रिका (39-45)

    const hasAnswered = answered[currentIdx];
    const userData = userSelections[currentIdx];
    q.options.forEach((opt, optIndex) => {
      const btn = document.createElement("button");
      btn.className = "opt";
      btn.innerText = `${String.fromCharCode(65+optIndex)}. ${opt}`;
      if (hasAnswered) {
        btn.disabled = true;
        if (userData && userData.selected === optIndex) {
          if (userData.isCorrect) btn.classList.add("opt-correct");
          else btn.classList.add("opt-wrong");
        }
        if (optIndex === q.correct && userData && !userData.isCorrect) {
          btn.classList.add("opt-correct");
        }
      } else {
        btn.disabled = false;
        btn.addEventListener("click", () => {
          if (answered[currentIdx]) return;
          const isCorrect = (optIndex === q.correct);
          answered[currentIdx] = true;
          userSelections[currentIdx] = { selected: optIndex, isCorrect };
          if (isCorrect) score++;
          updateUI();
          renderQuestion();
          const correctAns = q.options[q.correct];
          explDiv.innerHTML = `<strong>📘 व्याख्या:</strong> ${q.explanation}<br>${isCorrect ? "✅ सही उत्तर!" : `❌ आपक उत्तर: ${opt} | सही उत्तर: ${correctAns}`}`;
        });
      }
      optsDiv.appendChild(btn);
    });
    if (answered[currentIdx]) {
      const sel = userSelections[currentIdx];
      if (sel) {
        const correctAns = q.options[q.correct];
        explDiv.innerHTML = `<strong>📖 व्याख्या:</strong> ${q.explanation}<br>${sel.isCorrect ? "✔ पहिने सही उत्तर देलन्हि" : `✖ पहिने उत्तर: ${q.options[sel.selected]} | सही: ${correctAns}`}`;
      } else {
        explDiv.innerHTML = `<strong>📖 व्याख्या:</strong> ${q.explanation}`;
      }
    } else {
      explDiv.innerHTML = "⚡ कोनो विकल्प चुनू → सही उत्तर तुरंत देखू (हरियर=सही, लाल=गलत)";
    }
  }
  
  function nextQuestion() {
    if (currentIdx + 1 < TOTAL) {
      currentIdx++;
      renderQuestion();
    } else {
      alert("बधाई हो! अहाँ सभ प्रश्न समाप्त केलन्हि। ‘पुनः प्रारंभ’ क्लिक करी फेर सुरू करू।");
    }
  }
  
  function prevQuestion() {
    if (currentIdx > 0) {
      currentIdx--;
      renderQuestion();
    } else {
      alert("ई पहिल प्रश्न छै।");
    }
  }
  
  function resetQuiz() {
    currentIdx = 0;
    userSelections = new Array(TOTAL).fill(null);
    answered = new Array(TOTAL).fill(false);
    score = 0;
    updateUI();
    renderQuestion();
  }
  
  // initial setup
  updateUI();
  renderQuestion();
  
  prevButton.addEventListener("click", prevQuestion);
  nextButton.addEventListener("click", nextQuestion);
  resetButton.addEventListener("click", resetQuiz);
</script>
