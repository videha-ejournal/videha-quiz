<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}
body {
background: linear-gradient(145deg, #e0d6c5 0%, #cbbfa8 100%);
font-family: 'Segoe UI', 'Poppins', 'Noto Sans Devanagari', system-ui, sans-serif;
padding: 24px 16px;
min-height: 100vh;
display: flex;
justify-content: center;
align-items: center;
}
.quiz-wrapper {
max-width: 950px;
width: 100%;
margin: 0 auto;
}
/* main card */
.quiz-card {
background: #fffef7;
border-radius: 56px;
overflow: hidden;
box-shadow: 0 30px 45px rgba(0, 0, 0, 0.25);
transition: all 0.2s;
}
/* header */
.quiz-header {
background: #6b4c3a;
padding: 1.3rem 2rem;
display: flex;
justify-content: space-between;
align-items: baseline;
flex-wrap: wrap;
gap: 1rem;
color: #fef0e0;
}
.quiz-header h1 {
font-size: 1.8rem;
font-weight: 700;
display: flex;
align-items: center;
gap: 12px;
}
.quiz-header h1 span {
background: #e7b355;
color: #3e2a1f;
font-size: 0.85rem;
padding: 4px 12px;
border-radius: 40px;
}
.stats-panel {
display: flex;
gap: 20px;
background: #4e372a;
padding: 6px 20px;
border-radius: 60px;
}
.stat-item {
font-weight: 500;
}
.stat-value {
background: #ffdead;
color: #4a2e1e;
padding: 2px 10px;
border-radius: 30px;
margin-left: 8px;
}
/* content area */
.quiz-body {
padding: 32px 28px 28px;
background: #fefbf4;
}
.word-display {
background: #f3ecd9;
border-radius: 50px;
text-align: center;
padding: 28px 20px;
margin-bottom: 28px;
box-shadow: inset 0 1px 4px rgba(0,0,0,0.02), 0 8px 12px rgba(0,0,0,0.05);
}
.maithili-word {
font-size: 2.6rem;
font-weight: 800;
font-family: 'Noto Sans Devanagari', monospace;
color: #3a5a46;
letter-spacing: 1px;
}
.translit {
font-size: 0.85rem;
color: #a28d6c;
margin-top: 8px;
font-style: italic;
}
/* progress / confidence */
.confidence-bar {
background: #e1cfb3;
border-radius: 40px;
height: 10px;
width: 100%;
margin: 15px 0 20px;
overflow: hidden;
}
.confidence-fill {
background: #f3b33d;
width: 0%;
height: 100%;
border-radius: 40px;
transition: width 0.3s ease;
}
/* options grid */
.options-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 16px;
margin: 20px 0 24px;
}
.option-btn {
background: #fff7ec;
border: 2px solid #e2cfb5;
border-radius: 100px;
padding: 12px 16px;
display: flex;
align-items: center;
gap: 14px;
cursor: pointer;
transition: all 0.2s;
font-weight: 500;
}
.option-btn:hover:not(.locked) {
background: #ffe8cf;
border-color: #c7a86b;
transform: scale(0.98);
}
.option-marker {
background: #dac29e;
width: 36px;
height: 36px;
display: flex;
align-items: center;
justify-content: center;
border-radius: 40px;
font-weight: bold;
color: #3d2f1f;
}
.option-text {
flex: 1;
font-size: 0.95rem;
}
.option-btn.correct-highlight {
background: #cde6cd;
border-color: #2a772a;
pointer-events: none;
}
.option-btn.correct-highlight .option-marker {
background: #2a772a;
color: white;
}
.option-btn.wrong-highlight {
background: #f3d8d8;
border-color: #bb5555;
pointer-events: none;
}
.option-btn.wrong-highlight .option-marker {
background: #bb5555;
color: white;
}
.option-btn.locked {
pointer-events: none;
opacity: 0.7;
}
/* feedback */
.feedback-card {
background: #e7dfd1;
border-radius: 32px;
padding: 16px 20px;
margin: 12px 0 20px;
text-align: center;
}
.action-area {
display: flex;
gap: 14px;
margin-top: 12px;
}
.btn {
flex: 1;
border: none;
padding: 14px 8px;
border-radius: 60px;
font-weight: 700;
font-size: 1rem;
cursor: pointer;
transition: 0.2s;
}
.btn-primary {
background: #6b4c3a;
color: white;
}
.btn-primary:disabled {
background: #bba28d;
cursor: default;
}
.btn-secondary {
background: #b68948;
color: white;
}
.btn:hover:not(:disabled) {
filter: brightness(0.92);
transform: scale(0.98);
}
/* result & review */
.result-screen {
padding: 28px;
text-align: center;
}
.final-score {
font-size: 3rem;
font-weight: 800;
color: #b5651e;
margin: 20px 0;
}
.mistake-list {
background: #f7f1e6;
border-radius: 28px;
padding: 18px;
margin: 20px 0;
text-align: left;
max-height: 300px;
overflow-y: auto;
}
.mistake-item {
padding: 8px 12px;
border-bottom: 1px solid #e0cfb8;
font-size: 0.9rem;
}
footer {
text-align: center;
padding: 1rem;
font-size: 0.7rem;
background: #fefbf4;
color: #9b886c;
border-top: 1px solid #e6d9c8;
}
@media (max-width: 600px) {
.options-grid {
grid-template-columns: 1fr;
}
.maithili-word {
font-size: 1.9rem;
}
.quiz-body {
padding: 20px;
}
}
.vq-footer {
text-align: center;
padding: 12px;
font-size: 0.82em;
color: #7a8aaa;
border-top: 1px solid #ccc;
margin-top: 12px;
font-family: 'Noto Serif Devanagari', serif;
}
.vq-back {
display: block;
text-align: center;
margin: 16px auto 8px;
font-family: 'Noto Serif Devanagari', serif;
font-size: 0.9em;
color: #8B1A1A;
}
</style>

<body>
<a class="vq-back" href="../videha-elearning.htm">&larr; विदेह ई-लर्निङ्ग हब पर वापस जाउ</a>
<div class="quiz-wrapper"> <div class="quiz-card" id="maithiliQuiz5"> <div class="quiz-header"> <div class="stats-panel"> <div class="stat-item">🎯 अंक <span class="stat-value" id="scoreValue">0</span></div> <div class="stat-item">📋 <span id="currentIdx">0</span>/<span id="totalNum">0</span></div> <div class="stat-item">🔥 लगातार <span class="stat-value" id="streakValue">0</span></div> </div> </div> <div id="mainContent" class="quiz-body"></div> <footer class="vq-footer">© सम्पादक, videha.co.in</footer> </div>

<script>

</script><script>

    // --------------------------------------------------------------
    // FIFTH SET – fresh selection of words from the Maithili thesaurus
    // (avoid repetition from previous quizzes)
    // --------------------------------------------------------------
    const THESAURUS_SET = [
        { word: "अँखि", meaning: "eye", hint: "नेत्र, नयन" },
        { word: "अगरबत्ती", meaning: "incense stick", hint: "धूपबत्ती" },
        { word: "अग्रिम", meaning: "next, advance", hint: "अगिला, आगाँ" },
        { word: "अचानक", meaning: "suddenly", hint: "एकाएक, सहसा" },
        { word: "अजीर्ण", meaning: "indigestion", hint: "अनपच" },
        { word: "अटल", meaning: "firm, steadfast", hint: "नहि घसकैवाला" },
        { word: "अनमोल", meaning: "priceless", hint: "अमूल्य, बहुमूल्य" },
        { word: "अनुसार", meaning: "according to", hint: "विषयक अनुकूल रूपेँ" },
        { word: "अपराधी", meaning: "culprit, guilty", hint: "दोषी" },
        { word: "अब्बल", meaning: "feeble, weak", hint: "हवास सुन्न, शक्तिहीन" },
        { word: "अमूल्य", meaning: "precious, invaluable", hint: "बहुमूल्य, दुर्लभ" },
        { word: "अर्घ", meaning: "ritual offering", hint: "देवता/अतिथिकेँ अर्पित जल" },
        { word: "अलस", meaning: "lazy, slothful", hint: "शिथिल, प्रमादी" },
        { word: "अवगति", meaning: "knowledge, understanding", hint: "बोध, ज्ञान" },
        { word: "अशान्ति", meaning: "unrest, agitation", hint: "हलचल, विक्षोभ" },
        { word: "आकस्मिक", meaning: "accidental, sudden", hint: "अचानक होइवाला" },
        { word: "आग्रह", meaning: "insistence, urge", hint: "हठ, जिद" },
        { word: "आज्ञा", meaning: "order, command", hint: "आदेश, हुकुम" },
        { word: "आनन्दित", meaning: "delighted, pleased", hint: "हर्षित, प्रसन्न" },
        { word: "इच्छा", meaning: "desire, wish", hint: "अभिलाषा, कामना" },
        { word: "ईर्ष्या", meaning: "jealousy, envy", hint: "डाह, ईर्खा" },
        { word: "उचित", meaning: "proper, reasonable", hint: "समीचीन, ठीक" },
        { word: "उत्साह", meaning: "enthusiasm, zeal", hint: "जोस, प्रेरणा" },
        { word: "उपकार", meaning: "favour, help", hint: "हित, सहायता" },
        { word: "ऊर्जा", meaning: "energy", hint: "भौतिक शक्ति" },
        { word: "ऋण", meaning: "debt, loan", hint: "करजा, उधार" },
        { word: "एकता", meaning: "unity, harmony", hint: "मेल, ऐक्य" },
        { word: "ऐतिहासिक", meaning: "historical", hint: "इतिहास सम्बन्धी" },
        { word: "कठोर", meaning: "hard, cruel", hint: "सक्कत, निर्दय" },
        { word: "कमजोर", meaning: "weak, feeble", hint: "दुर्बेल" }
    ];

    // Helper: shuffle array
    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // generate distractors (unique meanings other than correct)
    function getDistractors(correctMeaning, currentWord, fullList, count = 3) {
        let candidates = fullList.filter(item => item.meaning !== correctMeaning && item.word !== currentWord)
                                 .map(item => item.meaning);
        candidates = [...new Set(candidates)];
        if (candidates.length < count) {
            const fallback = ["light", "darkness", "peace", "war", "water", "earth", "sky", "friend", "enemy"];
            candidates.push(...fallback);
            candidates = [...new Set(candidates)];
        }
        return shuffle(candidates).slice(0, count);
    }

    // Build question bank (each question has shuffled options)
    function buildQuestionBank() {
        let bank = [];
        for (let item of THESAURUS_SET) {
            const correct = item.meaning;
            const wrongs = getDistractors(correct, item.word, THESAURUS_SET, 3);
            let options = [correct, ...wrongs];
            options = shuffle(options);
            bank.push({
                maithili: item.word,
                correct: correct,
                options: options,
                hint: item.hint
            });
        }
        return shuffle(bank);
    }

    // State variables
    let questions = [];
    let currentIndex = 0;
    let score = 0;
    let streak = 0;
    let answered = false;
    let selectedAnswer = null;
    let mistakes = []; // store { maithili, correct, selected }

    // DOM elements
    const mainDiv = document.getElementById("mainContent");
    const scoreSpan = document.getElementById("scoreValue");
    const streakSpan = document.getElementById("streakValue");
    const currentIdxSpan = document.getElementById("currentIdx");
    const totalNumSpan = document.getElementById("totalNum");
    let totalQ = 0;

    function updateHeader() {
        scoreSpan.innerText = score;
        streakSpan.innerText = streak;
        currentIdxSpan.innerText = currentIndex + 1;
        totalNumSpan.innerText = totalQ;
    }

    // Render current question
    function renderQuestion() {
        if (!questions.length || currentIndex >= totalQ) {
            showResultScreen();
            return;
        }
        const q = questions[currentIndex];
        const confidencePercent = Math.round((streak / 10) * 100);
        let optionsHtml = "";
        const markers = ["𑂃", "𑂥", "𑂒", "𑂙"];
        for (let i = 0; i < q.options.length; i++) {
            let additionalClass = "";
            if (answered) {
                if (q.options[i] === q.correct) additionalClass = "correct-highlight";
                else if (selectedAnswer === q.options[i] && selectedAnswer !== q.correct) additionalClass = "wrong-highlight";
                else additionalClass = "locked";
            }
            optionsHtml += `
                <div class="option-btn ${additionalClass}" data-value="${escapeHtml(q.options[i])}">
                    <div class="option-marker">${markers[i]}</div>
                    <div class="option-text">${escapeHtml(q.options[i])}</div>
                </div>
            `;
        }

        let feedbackHtml = "";
        if (answered) {
            const isCorrect = (selectedAnswer === q.correct);
            feedbackHtml = `
                <div class="feedback-card">
                    ${isCorrect ? "✅ सटीक उत्तर! +1 अंक" : "❌ गलत उत्तर। सही अर्थ: <strong>" + escapeHtml(q.correct) + "</strong>"}
                    <br><span style="font-size:0.85rem;">💡 संकेत: ${escapeHtml(q.hint)}</span>
                </div>
            `;
        } else {
            feedbackHtml = `
                <div class="feedback-card">
                    🔍 <strong>${escapeHtml(q.hint)}</strong><br>
                    उचित अंग्रेजी अर्थ पर क्लिक करू
                </div>
            `;
        }

        const nextDisabled = answered ? "" : "disabled";
        const actionHtml = `
            <div class="action-area">
                <button class="btn btn-primary" id="nextBtn" ${nextDisabled}>➡ अगिला प्रश्न</button>
                <button class="btn btn-secondary" id="resetBankBtn">🔄 नवा सेट</button>
            </div>
        `;

        const confidenceWidth = answered ? ((streak / 10) * 100) : ((streak / 10) * 100);
        const fullHtml = `
            <div class="word-display">
                <div class="maithili-word">${escapeHtml(q.maithili)}</div>
                <div class="translit">मैथिली शब्द · सही अर्थ चुनू</div>
            </div>
            <div class="confidence-bar">
                <div class="confidence-fill" style="width: ${confidenceWidth}%;"></div>
            </div>
            <div class="options-grid" id="optionsGrid">
                ${optionsHtml}
            </div>
            ${feedbackHtml}
            ${actionHtml}
        `;
        mainDiv.innerHTML = fullHtml;

        if (!answered) {
            const choices = document.querySelectorAll('.option-btn');
            choices.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if (answered) return;
                    const chosen = btn.getAttribute('data-value');
                    handleAnswer(chosen);
                });
            });
        }
        const nextBtn = document.getElementById('nextBtn');
        if (nextBtn) nextBtn.addEventListener('click', () => goToNext());
        const resetBtn = document.getElementById('resetBankBtn');
        if (resetBtn) resetBtn.addEventListener('click', () => fullResetBank());
    }

    function handleAnswer(chosen) {
        if (answered) return;
        const currentQ = questions[currentIndex];
        answered = true;
        selectedAnswer = chosen;
        const isCorrect = (chosen === currentQ.correct);
        if (isCorrect) {
            score++;
            streak++;
        } else {
            streak = 0;
            mistakes.push({
                maithili: currentQ.maithili,
                correct: currentQ.correct,
                selected: chosen,
                hint: currentQ.hint
            });
        }
        updateHeader();
        renderQuestion(); // re-render with styling and feedback
    }

    function goToNext() {
        if (!answered) return;
        if (currentIndex + 1 < totalQ) {
            currentIndex++;
            answered = false;
            selectedAnswer = null;
            updateHeader();
            renderQuestion();
        } else {
            showResultScreen();
        }
    }

    function showResultScreen() {
        const percent = totalQ ? Math.round((score / totalQ) * 100) : 0;
        let message = "";
        if (percent >= 80) message = "🎓 उत्कृष्ट! मैथिली विद्या में निपुण";
        else if (percent >= 60) message = "👍 अच्छा प्रयास, कोश देखि सीखैत रहू";
        else message = "📘 फेर प्रयास करू, थिसारस सहायक रहत";

        let mistakesHtml = "";
        if (mistakes.length > 0) {
            mistakesHtml = `<div class="mistake-list"><h4 style="margin-bottom:10px;">📌 गलत उत्तर के समीक्षा:</h4>`;
            mistakes.forEach(m => {
                mistakesHtml += `<div class="mistake-item">🔹 <strong>${escapeHtml(m.maithili)}</strong> – सही: "${escapeHtml(m.correct)}" · आप चुनल: "${escapeHtml(m.selected)}"<br><span style="font-size:0.75rem;">📖 ${escapeHtml(m.hint)}</span></div>`;
            });
            mistakesHtml += `</div>`;
        } else {
            mistakesHtml = `<div class="mistake-list"><h4>✨ सब उत्तर सही! बहुत नीक</h4></div>`;
        }

        const resultHtml = `
            <div class="result-screen">
                <h2>🏁 क्विज़ समाप्त</h2>
                <div class="final-score">${score} / ${totalQ}</div>
                <p style="margin-bottom: 20px;">${message}</p>
                ${mistakesHtml}
                <div class="action-area" style="margin-top: 25px;">
                    <button class="btn btn-primary" id="restartSame">🔄 फेर सुरु करू (एहि सेट से)</button>
                    <button class="btn btn-secondary" id="newSetBtn">✨ नवा प्रश्न-भण्डार</button>
                </div>
            </div>
        `;
        mainDiv.innerHTML = resultHtml;
        const restartBtn = document.getElementById('restartSame');
        const newSetBtn = document.getElementById('newSetBtn');
        if (restartBtn) restartBtn.addEventListener('click', () => restartWithSameSet());
        if (newSetBtn) newSetBtn.addEventListener('click', () => loadFreshBank());
    }

    function restartWithSameSet() {
        // reset state but keep same questions order (as built)
        currentIndex = 0;
        score = 0;
        streak = 0;
        answered = false;
        selectedAnswer = null;
        mistakes = [];
        updateHeader();
        renderQuestion();
    }

    function loadFreshBank() {
        // build entirely new question set (different distractors, shuffled order)
        questions = buildQuestionBank();
        totalQ = questions.length;
        currentIndex = 0;
        score = 0;
        streak = 0;
        answered = false;
        selectedAnswer = null;
        mistakes = [];
        updateHeader();
        renderQuestion();
    }

    function fullResetBank() {
        loadFreshBank();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Initialization
    function init() {
        questions = buildQuestionBank();
        totalQ = questions.length;
        currentIndex = 0;
        score = 0;
        streak = 0;
        answered = false;
        selectedAnswer = null;
        mistakes = [];
        updateHeader();
        renderQuestion();
    }
    init();

</script></body>
