        .container {

            padding: 14px;

            border-color: var(--incorrect-red) !important;
            color: var(--incorrect-red) !important;

            margin-top: 15px;
            padding: 14px;
            border-radius: 6px;
            background-color: #f0fdf4;
            border-left: 4px solid #22c55e;

            font-weight: 700;

        .controls-panel {

                    { name: "What The Canon Left Out", icon: "📚", q: "पारम्परिक साहित्यक इतिहासकार लोकनि जिन विधाओं ओ लेखकों कऽ उपेक्षित कएने छलाह, हुनका विदेह द्वारा कोन पुस्तक शृंखला में स्थान देल गेल?", exp: "उपेक्षित साहित्यों कऽ 'What The Canon Left Out' पुस्तक शृंखलाक तहत विदेह डिजिटल आर्काइव द्वारा गरिमा प्रदान कएल गेल।" },

            {

                ]
            }

        let currentActiveSectionIdx = 0;
        let currentPageNum = 1; 
        const questionsPerPage = 10; // Splitting 100 questions into 10-item safe responsive batches

        // Renders Exactly 8 Distinct Nav Buttons Linearly
        function renderTabNavigation() {
            const navContainer = document.getElementById('sections-nav');
            navContainer.innerHTML = ""; 

            panjiMasterDatabase.forEach((section, idx) => {
                const btn = document.createElement('button');
                btn.type = 'button';
                // Extract only the title string cleanly
                btn.innerText = section.sectionTitle.split('(')[0].replace(/^\d+\.\s*/, '').trim();
                
                if (idx === currentActiveSectionIdx) {
                    btn.classList.add('active-tab');
                }

                btn.onclick = () => {
                    currentActiveSectionIdx = idx;
                    currentPageNum = 1; // Flush pagination marker
                    renderTabNavigation(); 
                    generateActiveTabContent(); 
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };
                
                navContainer.appendChild(btn);
            });
        }

        // High Performance Render System: Builds only 10 questions of selected tab to prevent DOM lag
        function generateActiveTabContent() {
            const workspace = document.getElementById('quiz-workspace');
            workspace.innerHTML = ""; 

            const section = panjiMasterDatabase[currentActiveSectionIdx];

            const titleHeader = document.createElement('h2');
            titleHeader.className = 'section-title';
            titleHeader.innerHTML = `${section.sectionTitle} <span class="panji-badge">१०० प्रश्न स्लॉट</span>`;
            workspace.appendChild(titleHeader);

            const startIdx = (currentPageNum - 1) * questionsPerPage + 1;
            const endIdx = currentPageNum * questionsPerPage;

            // Generate precise slice bounds safely
            for (let i = startIdx; i <= endIdx; i++) {
                const dataIndex = (i - 1) % section.items.length;
                const rawItem = section.items[dataIndex];
                const inputGroupName = `p_paginated_sec_${currentActiveSectionIdx}_q_${i}`;

                const questionCard = document.createElement('div');
                questionCard.className = 'question-card';

                const questionTextEl = document.createElement('div');
                questionTextEl.className = 'question-text';
                questionTextEl.innerText = `प्रश्न ${i}: ${rawItem.q}`;
                questionCard.appendChild(questionTextEl);

                // 100% Offline Robust Visual Token Box
                const photoBox = document.createElement('div');
                photoBox.className = 'visual-photo-box';
                const visualElement = document.createElement('div');
                visualElement.className = 'visual-element';
                visualElement.innerText = rawItem.icon;
                photoBox.appendChild(visualElement);
                questionCard.appendChild(photoBox);

                const choicesBox = document.createElement('div');
                choicesBox.className = 'options-container';

                const generatedOptions = [];
                generatedOptions.push(rawItem.name); // Correct option locked at index 0

                let peerIndex = 1;
                let safetyCounter = 0;
                while (generatedOptions.length < 4 && safetyCounter < 40) {
                    safetyCounter++;
                    const siblingItem = section.items[(dataIndex + peerIndex) % section.items.length];
                    if (siblingItem && !generatedOptions.includes(siblingItem.name)) {
                        generatedOptions.push(siblingItem.name);
                    }
                    peerIndex++;
                }

                // Crash proof fallbacks shield
                const fallbacks = ["गौड़ीय प्राकृत विन्यास", "दरभंगा राज गजेटियर", "तिरहुता लिपि विकास परिषद", "यूनिकोड वर्जन ५.०"];
                let fbIdx = 0;
                while (generatedOptions.length < 4) {
                    if (!generatedOptions.includes(fallbacks[fbIdx])) {
                        generatedOptions.push(fallbacks[fbIdx]);
                    }
                    fbIdx++;
                }

                // Deterministic Shuffle seed logic
                const dynamicSeedShift = (i * 29) % 4;
                const correctChoiceIndex = dynamicSeedShift;

                const tempSwap = generatedOptions[0];
                generatedOptions[0] = generatedOptions[correctChoiceIndex];
                generatedOptions[correctChoiceIndex] = tempSwap;

                generatedOptions.forEach((optionText, optionIdx) => {
                    const labelContainer = document.createElement('label');
                    labelContainer.className = 'option-label';

                    const radioInput = document.createElement('input');
                    radioInput.type = 'radio';
                    radioInput.name = inputGroupName;
                    radioInput.value = optionIdx;

                    radioInput.addEventListener('change', () => {
                        evaluatePanjiDynamicChoice(inputGroupName, optionIdx, correctChoiceIndex, questionCard);
                    });

                    labelContainer.appendChild(radioInput);
                    labelContainer.appendChild(document.createTextNode(optionText));
                    choicesBox.appendChild(labelContainer);
                });

                questionCard.appendChild(choicesBox);

                const explanationBox = document.createElement('div');
                explanationBox.className = 'explanation-box';
                explanationBox.id = `exp_${inputGroupName}`;
                explanationBox.innerHTML = `<strong>विदेह अनुसन्धान सीख:</strong> ${rawItem.exp}`;
                questionCard.appendChild(explanationBox);

                workspace.appendChild(questionCard);
            }

            // Append Pagination Controller Interface Block
            const paginationBar = document.createElement('div');
            paginationBar.className = 'pagination-bar';

            const prevBtn = document.createElement('button');
            prevBtn.className = 'page-btn';
            prevBtn.innerText = "← पिछला पृष्ठ (Prev)";
            prevBtn.disabled = (currentPageNum === 1);
            prevBtn.onclick = () => {
                currentPageNum--;
                generateActiveTabContent();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const pageInfo = document.createElement('span');
            pageInfo.className = 'page-info';
            pageInfo.innerText = `पृष्ठ ${currentPageNum} / १० (प्रश्न ${startIdx}-${endIdx})`;

            const nextBtn = document.createElement('button');
            nextBtn.className = 'page-btn';
            nextBtn.innerText = "अगिला पृष्ठ (Next) →";
            nextBtn.disabled = (currentPageNum === 10);
            nextBtn.onclick = () => {
                currentPageNum++;
                generateActiveTabContent();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            paginationBar.appendChild(prevBtn);
            paginationBar.appendChild(pageInfo);
            paginationBar.appendChild(nextBtn);
            workspace.appendChild(paginationBar);
        }

        // Visual Green/Red Verification Tracker Engine
        function evaluatePanjiDynamicChoice(inputGroupName, userSelection, trueIndex, scopeElement) {
            const optionLabels = scopeElement.querySelectorAll('.option-label');
            const targetExplanation = scopeElement.querySelector(`#exp_${inputGroupName}`);

            optionLabels.forEach((label, currentIdx) => {
                const innerRadio = label.querySelector('input');
                if (innerRadio) innerRadio.disabled = true; // Lock choice row actions

                if (currentIdx === trueIndex) {
                    label.classList.add('correct-choice'); // Assign Green
                } else if (currentIdx === userSelection && userSelection !== trueIndex) {
                    label.classList.add('incorrect-choice'); // Assign Red
                }
            });

            if (targetExplanation) {
                targetExplanation.style.display = 'block';
            }
        }

        // Core Bootloader Matrix Loader Initializer
        window.onload = function() {
            renderTabNavigation();
            generateActiveTabContent();
        };
    </script>
