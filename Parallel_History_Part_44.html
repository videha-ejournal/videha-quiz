<a class="vq-back" href="../videha-elearning.htm">&larr; विदेह ई-लर्निङ्ग हब पर वापस जाउ</a> <div class="quiz-container"> <div class="header"> <h1>📖 Chapter 44: Dr. Prafulla Kumar Singh 'Maun'</h1> <p>A Parallel History of Mithila & Maithili Literature · Critical Appreciation</p> </div> <div class="quiz-body" id="quizBody"> <div id="questionsContainer"></div> <button class="btn-submit" id="submitQuiz">✔ Submit Answers</button> <div id="resultArea" class="result-area"></div> <button class="reset-btn" id="resetQuiz" style="display: none;">⟳ Take Quiz Again</button> </div> </div>
<script>
    // Quiz data derived from Chapter 44 (pages 439–470)
    const questions = [
        {
            text: "What is the real name of the Maithili scholar and writer who adopted the pen name 'Maun'?",
            options: [
                "Prafulla Kumar Singh",
                "Ram Bharos Kapari 'Bhramar'",
                "Gajendra Thakur",
                "Udaya Narayana Singh"
            ],
            correct: 0,
            explanation: "Dr. Prafulla Kumar Singh adopted the pen name 'Maun' (silence) with philosophical irony; he was born in Hasanpur, Samastipur district."
        },
        {
            text: "In which decade did Dr. Maun spend a highly productive period in Nepal, working as a lecturer and launching the quarterly 'Maithili'?",
            options: [
                "1953–1963",
                "1963–1973",
                "1975–1985",
                "1980–1990"
            ],
            correct: 1,
            explanation: "The Nepal decade (1963–1973) was a crucible of productivity: he taught at Mahendra Morang College, Biratnagar, and edited the first Maithili literary journal from Nepal."
        },
        {
            text: "Which pioneering reportage collection by Maun is considered the first of its kind in Maithili literature?",
            options: [
                "Surjhari",
                "Valmiki Desh Mein",
                "Brahmagrama (1972)",
                "Mithilak Lok Sanskriti Sandarbha"
            ],
            correct: 2,
            explanation: "Brahmagrama (1972) is regarded as the foundational Maithili reportage collection, blending literary journalism and ethnographic observation."
        },
        {
            text: "Maun's landmark literary history 'Nepalak Maithili Sahityak Itihas' (1972) was the first systematic history of Maithili literature from which perspective?",
            options: [
                "Bihar (Indian) Mithila",
                "Nepal’s eastern Terai and border zones",
                "The Sahitya Akademi canon",
                "Bengali Maithili diaspora"
            ],
            correct: 1,
            explanation: "He wrote the first comprehensive literary history from Nepal's perspective, documenting Maithili traditions of Morang, Sunsari, and the Nepal Terai."
        },
        {
            text: "Maun's 2014 work 'Vidapit' deals with which aspect of Maithili culture?",
            options: [
                "Madhubani painting techniques",
                "Vidaapata folk-performance tradition",
                "Navya-Nyaya logic in poetry",
                "Kosi river ecology"
            ],
            correct: 1,
            explanation: "'Vidapit' (2014) is an analytical treatise on the Vidaapata tradition of folk-performance, based on lifelong fieldwork especially in the Morang region."
        },
        {
            text: "Which major folk ballad cycle of the Musahar (Dalit) community did Maun extensively document and analyze, calling it a paradigmatic case of the 'parallel literary canon'?",
            options: [
                "Lorikayan",
                "Dina Bhadri",
                "Salahes",
                "Naikaa Banjaaraa"
            ],
            correct: 2,
            explanation: "The Salahes ballad cycle (Raja Salahes of the Musahar community) is extensively documented by Maun; the Videha framework considers it a prime example of suppressed subaltern tradition."
        },
        {
            text: "According to the chapter, Maun's translation of Premchand's selected stories into Maithili won which prestigious award?",
            options: [
                "Sahitya Akademi Translation Award (2005)",
                "Mithila Vibhuti",
                "Keertinarayan Mishra Award",
                "Jnanpith Award"
            ],
            correct: 0,
            explanation: "Maun received the Sahitya Akademi Translation Award in 2005 (Hyderabad) for 'Premchand: Chaynik Katha', Parts 1 & 2."
        },
        {
            text: "Which theoretical concept from Navya-Nyāya epistemology is used in the chapter to analyze Maun's historical inferences and his vyāpti (invariable concomitance) claims?",
            options: [
                "Śabdabodha (verbal cognition)",
                "Avacchedakatā (delimitation) and vyāpti",
                "Nirvikalpaka pratyakṣa",
                "Lakṣaṇā (indication)"
            ],
            correct: 1,
            explanation: "The Navya-Nyāya analysis applies vyāpti (invariable concomitance) and avacchedaka to examine Maun's cultural claims, such as Tharu identity and cross-border Mithila unity."
        },
        {
            text: "What does the pen name 'Maun' (meaning silence) represent in the context of Prafulla Kumar Singh's persona?",
            options: [
                "His unwillingness to write poetry",
                "A philosophical paradox: a man of few public words but torrential written productivity",
                "His rejection of folk literature",
                "His formal training in yoga"
            ],
            correct: 1,
            explanation: "Maun adopted 'silence' ironically; he was described as a man of few spoken words yet immense scholarly output. Matrika Prasad Koirala joked that 'Maun made their lips silent'."
        },
        {
            text: "Which Maun work is a collection of reportage focusing on the Nepal-Bihar borderland and the Valmiki hermitage region?",
            options: [
                "Mithilak Lok Sanskriti Sandarbha",
                "Valmiki Desh Mein (2005)",
                "Surjhari",
                "Maithili Lokgatha Anusheelan"
            ],
            correct: 1,
            explanation: "'Valmiki Desh Mein' (2005) returns to the Nepal-Bihar Terai, blending cultural pilgrimage and ethnographic documentation."
        },
        {
            text: "According to the Navya-Nyāya portion of the chapter, Maun's fieldwork method primarily relies on which pramāṇa (means of valid knowledge) ?",
            options: [
                "Upamāna (comparison)",
                "Śabda (verbal testimony)",
                "Pratyakṣa (direct perception)",
                "Anumāna (inference)"
            ],
            correct: 2,
            explanation: "Maun's systematic fieldwork — traveling village to village, observing performances first-hand — is an application of pratyakṣa as foundational pramāṇa."
        },
        {
            text: "Which of the following is a key limitation of Maun's fiction mentioned by the critical appreciation?",
            options: [
                "His language was too Sanskritized",
                "His stories never addressed women's issues",
                "His narrative engagement with gender politics remained underdeveloped",
                "He wrote only reportage, no fiction"
            ],
            correct: 2,
            explanation: "The chapter notes that while Maun’s fiction is socially engaged, the treatment of gender politics is less developed compared to his other strengths."
        }
    ];

    let userAnswers = new Array(questions.length).fill(null);
    let quizSubmitted = false;

    function renderQuiz() {
        const container = document.getElementById('questionsContainer');
        if (!container) return;
        let html = '';
        questions.forEach((q, idx) => {
            html += `
                <div class="question-card" data-qidx="${idx}">
                    <div class="question-text">${idx+1}. ${q.text}</div>
                    <ul class="options">
                        ${q.options.map((opt, optIdx) => `
                            <li>
                                <label>
                                    <input type="radio" name="q${idx}" value="${optIdx}" ${userAnswers[idx] === optIdx ? 'checked' : ''}>
                                    ${opt}
                                </label>
                            </li>
                        `).join('')}
                    </ul>
                    <div class="feedback" id="fb-${idx}"></div>
                </div>
            `;
        });
        container.innerHTML = html;

        // attach radio change listeners to update userAnswers array
        for (let i = 0; i < questions.length; i++) {
            const radios = document.querySelectorAll(`input[name="q${i}"]`);
            radios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    if (!quizSubmitted) {
                        userAnswers[i] = parseInt(e.target.value);
                    } else {
                        // if quiz already submitted, prevent changes? we can re-enable only after reset; but keep consistent
                        // but user shouldn't change after submit unless reset; we will disable radios after submit.
                    }
                });
            });
        }
    }

    function evaluateQuiz() {
        if (quizSubmitted) return;
        let score = 0;
        // calculate score and show feedback
        for (let i = 0; i < questions.length; i++) {
            const selected = userAnswers[i];
            const isCorrect = (selected !== null && selected === questions[i].correct);
            if (isCorrect) score++;
            const feedbackDiv = document.getElementById(`fb-${i}`);
            if (feedbackDiv) {
                if (selected === null) {
                    feedbackDiv.innerHTML = `❌ No answer selected. Correct: ${questions[i].options[questions[i].correct]}. ${questions[i].explanation}`;
                    feedbackDiv.className = 'feedback incorrect';
                } else if (isCorrect) {
                    feedbackDiv.innerHTML = `✅ Correct! ${questions[i].explanation}`;
                    feedbackDiv.className = 'feedback correct';
                } else {
                    feedbackDiv.innerHTML = `❌ Incorrect. Your choice: "${questions[i].options[selected]}" — Correct: "${questions[i].options[questions[i].correct]}". ${questions[i].explanation}`;
                    feedbackDiv.className = 'feedback incorrect';
                }
            }
        }
        const total = questions.length;
        const percent = Math.round((score / total) * 100);
        const resultDiv = document.getElementById('resultArea');
        resultDiv.innerHTML = `📊 Score: ${score} / ${total} (${percent}%)<br>${score === total ? '🌟 Excellent understanding of Maun’s life and critical legacy!' : '📚 Review the chapter on Maun — his reportage, folk scholarship, and Navya-Nyāya analysis.'}`;
        
        // disable all radio inputs after submission
        for (let i = 0; i < questions.length; i++) {
            const radios = document.querySelectorAll(`input[name="q${i}"]`);
            radios.forEach(radio => {
                radio.disabled = true;
            });
        }
        quizSubmitted = true;
        document.getElementById('resetQuiz').style.display = 'inline-block';
        const submitBtn = document.getElementById('submitQuiz');
        if (submitBtn) submitBtn.style.opacity = '0.6';
    }

    function resetQuiz() {
        userAnswers.fill(null);
        quizSubmitted = false;
        // re-enable radios and clear feedback
        for (let i = 0; i < questions.length; i++) {
            const radios = document.querySelectorAll(`input[name="q${i}"]`);
            radios.forEach(radio => {
                radio.disabled = false;
                radio.checked = false;
            });
            const fbDiv = document.getElementById(`fb-${i}`);
            if (fbDiv) {
                fbDiv.innerHTML = '';
                fbDiv.className = 'feedback';
            }
        }
        const resultDiv = document.getElementById('resultArea');
        resultDiv.innerHTML = '';
        const submitBtn = document.getElementById('submitQuiz');
        if (submitBtn) submitBtn.style.opacity = '1';
        document.getElementById('resetQuiz').style.display = 'none';
        // re-render to clear selected states? we already cleared, but just ensure consistency
        // also update userAnswers accordingly.
        for (let i = 0; i < questions.length; i++) {
            userAnswers[i] = null;
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        renderQuiz();
        const submitBtn = document.getElementById('submitQuiz');
        submitBtn.addEventListener('click', evaluateQuiz);
        const resetBtn = document.getElementById('resetQuiz');
        resetBtn.addEventListener('click', resetQuiz);
    });
</script><div class="vq-footer">© सम्पादक, videha.co.in</div>
