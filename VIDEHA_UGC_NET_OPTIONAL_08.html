function esc(s){return String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function renderTabs(){
  $('tabs').innerHTML = sections.map(([id,title])=>`<button class="tab ${id===state.current?'active':''}" data-sec="${id}">${esc(title)}</button>`).join('');
  document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{state.current=b.dataset.sec; render(); window.scrollTo({top:0,behavior:'smooth'});});
}
function filteredQuestions(sec){
  let q = quiz.filter(x=>x.section===sec);
  const term = state.query.trim().toLowerCase();
  if(term){q = q.filter(x => (x.q+' '+x.options.join(' ')+' '+x.explanation+' '+x.tag).toLowerCase().includes(term));}
  return q;
}
function render(){
  renderTabs();
  const holder=$('quiz');
  holder.innerHTML='';
  sections.forEach(([sid,title])=>{
    const list=filteredQuestions(sid);
    const panel=document.createElement('section');
    panel.className='panel '+(sid===state.current?'active':'');
    panel.id=sid;
    panel.innerHTML=`<h2 class="section-title">${esc(title)} — ${dn(list.length)} प्रश्न</h2>`;
    list.forEach(item=>{
      const chosen=state.answers[item.id];
      const card=document.createElement('div'); card.className='qcard';
      card.innerHTML=`<div class="qhead">प्रश्न ${dn(item.id)}. ${esc(item.q)} <span class="tag">${esc(item.tag)}</span></div>
        <div class="opts">${item.options.map((op,i)=>{
          let cls='opt';
          if(chosen!==undefined){ if(i===item.answer) cls+=' correct'; else if(i===chosen) cls+=' wrong'; }
          return `<button class="${cls}" data-q="${item.id}" data-o="${i}">${esc(op)}</button>`
        }).join('')}</div>
        <div class="exp ${chosen!==undefined?'show':''}"><b>सही उत्तर:</b> ${esc(item.options[item.answer])}<br><b>व्याख्या:</b> ${esc(item.explanation)}</div>`;
      panel.appendChild(card);
    });
    holder.appendChild(panel);
  });
  document.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{state.answers[Number(b.dataset.q)] = Number(b.dataset.o); render();});
  updateScore(false);
}
function updateScore(show=true){
  const total=quiz.length;
  const attempted=Object.keys(state.answers).length;
  let correct=0; quiz.forEach(q=>{if(state.answers[q.id]===q.answer) correct++;});
  $('score').innerHTML = `कएल प्रश्न: ${dn(attempted)} / ${dn(total)} &nbsp; | &nbsp; सही: ${dn(correct)} &nbsp; | &nbsp; अंक: ${dn(correct)} / ${dn(total)}`;
  if(show) $('score').scrollIntoView({behavior:'smooth',block:'center'});
}
function showAnswers(){ quiz.forEach(q=>state.answers[q.id]=q.answer); render(); updateScore(true); }
function resetQuiz(){ state.answers={}; render(); updateScore(true); }
function nextSection(){ let i=sections.findIndex(s=>s[0]===state.current); state.current=sections[(i+1)%sections.length][0]; render(); window.scrollTo({top:0,behavior:'smooth'}); }
function prevSection(){ let i=sections.findIndex(s=>s[0]===state.current); state.current=sections[(i-1+sections.length)%sections.length][0]; render(); window.scrollTo({top:0,behavior:'smooth'}); }
window.addEventListener('DOMContentLoaded',()=>{
  $('search').oninput=e=>{state.query=e.target.value; render();};
  $('check').onclick=()=>updateScore(true);
  $('show').onclick=showAnswers;
  $('reset').onclick=resetQuiz;
  $('next').onclick=nextSection;
  $('prev').onclick=prevSection;
  render();
});

</script>
</body>
</html>
