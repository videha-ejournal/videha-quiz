</script><script>

    // --------------------------------------------------------------
    // FRESH DATA – seventh set, distinct from previous quizzes
    // (selected from thesaurus, focusing on everyday terms & cultural words)
    // --------------------------------------------------------------
    const FRESH_WORDS = [
        { word: "अन्न", meaning: "foodgrains", hint: "अनाज, धान-गेहूँ" },
        { word: "अपसकुन", meaning: "bad omen", hint: "अशुभ लक्षण" },
        { word: "अप्पन", meaning: "one's own", hint: "स्वकीय, निजा" },
        { word: "अरथी", meaning: "bier", hint: "मुर्दा उठावाक चचरी" },
        { word: "असक", meaning: "unable, sick", hint: "असमर्थ, अस्वस्थ" },
        { word: "आँच", meaning: "flame, heat", hint: "धधरा, ताप" },
        { word: "आँठी", meaning: "seed, stone", hint: "फलक बीआ" },
        { word: "आँसु", meaning: "tear", hint: "नोर, नयन जल" },
        { word: "इँटा", meaning: "brick", hint: "पजेबा, ईष्टका" },
        { word: "ईख", meaning: "sugarcane", hint: "कुसिआर, ऊख" },
        { word: "उखार", meaning: "uproot", hint: "जड़ि सँ निकालब" },
        { word: "उलूक", meaning: "owl", hint: "उल्लू, रात्रिचर पक्षी" },
        { word: "ओखली", meaning: "mortar", hint: "उखरि, कूटबाक पात्र" },
        { word: "कँगना", meaning: "bracelet", hint: "कगना, हाथक गहना" },
        { word: "कच्चा", meaning: "raw, unripe", hint: "अपक्व, अजोह" },
        { word: "कटाल", meaning: "sickle", hint: "हँसिया, काता" },
        { word: "कनिया", meaning: "daughter", hint: "बेटी, कन्या" },
        { word: "कबूतर", meaning: "pigeon", hint: "पड़वा, कपोत" },
        { word: "करजा", meaning: "debt", hint: "ऋण, उधार" },
        { word: "कलश", meaning: "pitcher", hint: "घैल, कुम्भ" },
        { word: "कविता", meaning: "poem", hint: "कबिता, पद्य रचना" },
        { word: "काँस", meaning: "bell metal", hint: "एक मिश्र-धातु" },
        { word: "काक", meaning: "crow", hint: "कौआ" },
        { word: "काज", meaning: "work", hint: "कार्य, कर्तव्य" },
        { word: "कातिक", meaning: "Kartik month", hint: "आठम मास" },
        { word: "कान", meaning: "ear", hint: "श्रवणेन्द्रिय" },
        { word: "कुमार", meaning: "bachelor, prince", hint: "अविवाहित, राजपुत्र" },
        { word: "कोल्हू", meaning: "crusher (oil/cane)", hint: "तेल/कुसिआर पेरबाक कल" },
        { word: "कौड़ी", meaning: "cowrie", hint: "प्राचीन मुद्रा" },
        { word: "खड़िया", meaning: "chalk", hint: "उजर माटि, लिखबाक खड़ी" },
        { word: "खरबूजा", meaning: "musk melon", hint: "एक लताफल" },
        { word: "खलिहान", meaning: "threshing floor", hint: "खरिहान" },
        { word: "खिचड़ी", meaning: "khichdi", hint: "दालि-भात मिलाए" },
        { word: "खीसा", meaning: "story, tale", hint: "कथा, उपाख्यान" },
        { word: "गगन", meaning: "sky", hint: "आकाश" },
        { word: "गट्टा", meaning: "wrist", hint: "पहुँचा" },
        { word: "गदहा", meaning: "donkey", hint: "अस, गर्दभ" },
        { word: "गान", meaning: "song", hint: "गीत, गाना" },
        { word: "गिलास", meaning: "glass, tumbler", hint: "पेय-पात्र" },
        { word: "गोरू", meaning: "cattle", hint: "गाए-बड़द" }
    ];

    // helper shuffle
    function shuffle(a) {
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    // get distractors (other meanings)
    function getDistractors(correct, currentWord, fullList, count = 3) {
        let candidates = fullList.filter(item => item.meaning !== correct && item.word !== currentWord)
                                 .map(item => item.meaning);
        candidates = [...new Set(candidates)];
        if (candidates.length < count) {
            const fallback = ["water", "fire", "earth", "wind", "tree", "bird", "animal", "village"];
            candidates.push(...fallback);
            candidates = [...new Set(candidates)];
        }
        return shuffle(candidates).slice(0, count);
    }

    // build question bank
    function buildBank() {
        let bank = [];
        for (let item of FRESH_WORDS) {
            const correct = item.meaning;
            const wrongs = getDistractors(correct, item.word, FRESH_WORDS, 3);
            let options = [correct, ...wrongs];
            options = shuffle(options);
            bank.push({
                maithili: item.word,
                correct: correct,
                options: options,
                hint: item.hint
            });
        }
        return shuffle(bank);
    }

    // state
    let questions = [];
    let currentIdx = 0;
    let score = 0;
    let streak = 0;
    let answered = false;
    let selectedValue = null;
    let mistakes = [];
    let totalQ = 0;

    // DOM
    const contentDiv = document.getElementById("contentArea");
    const scoreSpan = document.getElementById("scoreVal");
    const streakSpan = document.getElementById("streakVal");
    const qIndexSpan = document.getElementById("qIndex");
    const qTotalSpan = document.getElementById("qTotal");

    function updateHeader() {
        scoreSpan.innerText = score;
        streakSpan.innerText = streak;
        qIndexSpan.innerText = currentIdx + 1;
        qTotalSpan.innerText = totalQ;
    }

    function render() {
        if (!questions.length || currentIdx >= totalQ) {
            showFinal();
            return;
        }
        const q = questions[currentIdx];
        const progressPercent = totalQ ? ((currentIdx + (answered ? 1 : 0)) / totalQ) * 100 : 0;

        let optionsHtml = "";
        const markers = ["𑂃", "𑂥", "𑂒", "𑂙"];
        for (let i = 0; i < q.options.length; i++) {
            let extraClass = "";
            if (answered) {
                if (q.options[i] === q.correct) extraClass = "correct";
                else if (selectedValue === q.options[i] && selectedValue !== q.correct) extraClass = "wrong";
                else extraClass = "locked";
            }
            optionsHtml += `
                <div class="choice ${extraClass}" data-choice="${escapeHtml(q.options[i])}">
                    <div class="choice-letter">${markers[i]}</div>
                    <div class="choice-text">${escapeHtml(q.options[i])}</div>
                </div>
            `;
        }

        let feedbackHtml = "";
        if (answered) {
            const isCorrect = (selectedValue === q.correct);
            feedbackHtml = `
                <div class="feedback-area">
                    ${isCorrect ? "✅ सटीक जवाब! +1 अंक" : "❌ गलत। सही अर्थ: <strong>" + escapeHtml(q.correct) + "</strong>"}
                    <br><span style="font-size:0.85rem;">💡 संकेत: ${escapeHtml(q.hint)}</span>
                </div>
            `;
        } else {
            feedbackHtml = `
                <div class="feedback-area">
                    🔍 <strong>${escapeHtml(q.hint)}</strong><br>
                    सही अंग्रेजी अर्थ पर क्लिक करू
                </div>
            `;
        }

        const nextDisabled = answered ? "" : "disabled";
        const actionsHtml = `
            <div class="actions">
                <button class="btn-next" id="nextButton" ${nextDisabled}>➡ अगिला प्रश्न</button>
                <button class="btn-shuffle" id="shuffleButton">🔄 नवा प्रश्नसेट</button>
            </div>
        `;

        const full = `
            <div class="word-container">
                <div class="maithili-word">${escapeHtml(q.maithili)}</div>
                <div class="translit-note">✨ मैथिली शब्द · अंग्रेजी अर्थ चुनू</div>
            </div>
            <div class="progress-track">
                <div class="progress-fill" style="width: ${progressPercent}%;"></div>
            </div>
            <div class="options" id="optionsDiv">
                ${optionsHtml}
            </div>
            ${feedbackHtml}
            ${actionsHtml}
        `;
        contentDiv.innerHTML = full;

        if (!answered) {
            const choices = document.querySelectorAll('.choice');
            choices.forEach(choice => {
                choice.addEventListener('click', (e) => {
                    if (answered) return;
                    const chosen = choice.getAttribute('data-choice');
                    handleAnswer(chosen);
                });
            });
        }
        const nextBtn = document.getElementById('nextButton');
        if (nextBtn) nextBtn.addEventListener('click', () => nextQuestion());
        const shuffleBtn = document.getElementById('shuffleButton');
        if (shuffleBtn) shuffleBtn.addEventListener('click', () => freshSet());
    }

    function handleAnswer(chosen) {
        if (answered) return;
        const q = questions[currentIdx];
        answered = true;
        selectedValue = chosen;
        if (chosen === q.correct) {
            score++;
            streak++;
        } else {
            streak = 0;
            mistakes.push({
                maithili: q.maithili,
                correct: q.correct,
                selected: chosen,
                hint: q.hint
            });
        }
        updateHeader();
        render();
    }

    function nextQuestion() {
        if (!answered) return;
        if (currentIdx + 1 < totalQ) {
            currentIdx++;
            answered = false;
            selectedValue = null;
            updateHeader();
            render();
        } else {
            showFinal();
        }
    }

    function showFinal() {
        const percent = totalQ ? Math.round((score / totalQ) * 100) : 0;
        let message = "";
        if (percent >= 80) message = "🎉 महान! मैथिली ज्ञान में प्रवीण";
        else if (percent >= 60) message = "👍 अछि प्रयास, कोश देखि सीखत रहू";
        else message = "📘 फेर प्रयास करू, हर क्विज़ नव अवसर";

        let missHtml = "";
        if (mistakes.length) {
            missHtml = `<div class="miss-list"><h4 style="margin-bottom:10px;">📌 गलत उत्तरक समीक्षा:</h4>`;
            mistakes.forEach(m => {
                missHtml += `<div class="miss-item">🔹 <strong>${escapeHtml(m.maithili)}</strong> – सही: "${escapeHtml(m.correct)}" · आप: "${escapeHtml(m.selected)}"<br><span style="font-size:0.7rem;">📖 ${escapeHtml(m.hint)}</span></div>`;
            });
            missHtml += `</div>`;
        } else {
            missHtml = `<div class="miss-list"><h4>✨ सब उत्तर सही! बहुत नीक</h4></div>`;
        }

        const finalHtml = `
            <div class="result-screen">
                <h2>🏁 क्विज़ समाप्त</h2>
                <div class="final-score">${score} / ${totalQ}</div>
                <p style="margin-bottom: 20px;">${message}</p>
                ${missHtml}
                <div class="actions" style="margin-top: 20px;">
                    <button class="btn-next" id="restartBtn">🔄 फेर सुरु करू (एहि सेट से)</button>
                    <button class="btn-shuffle" id="newFreshBtn">✨ नवा शब्द-संचय</button>
                </div>
            </div>
        `;
        contentDiv.innerHTML = finalHtml;
        document.getElementById('restartBtn')?.addEventListener('click', () => restartSame());
        document.getElementById('newFreshBtn')?.addEventListener('click', () => freshSet());
    }

    function restartSame() {
        currentIdx = 0;
        score = 0;
        streak = 0;
        answered = false;
        selectedValue = null;
        mistakes = [];
        updateHeader();
        render();
    }

    function freshSet() {
        questions = buildBank();
        totalQ = questions.length;
        currentIdx = 0;
        score = 0;
        streak = 0;
        answered = false;
        selectedValue = null;
        mistakes = [];
        updateHeader();
        render();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // init
    function init() {
        questions = buildBank();
        totalQ = questions.length;
        currentIdx = 0;
        score = 0;
        streak = 0;
        answered = false;
        selectedValue = null;
        mistakes = [];
        updateHeader();
        render();
    }
