</script><script>

    // ============================================================
    // DATA – enriched from the provided Maithili-English Thesaurus
    // (selected words with clear english gloss)
    // ============================================================
    const THESAURUS_DATA = [
        { maithili: "अँकुर (ankur)", english: "sprout", hint: "बीज से निकलल प्ररोह" },
        { maithili: "अँखिगर (ankhigar)", english: "of good insight", hint: "तत्वग्राही दृष्टि वाला" },
        { maithili: "अकास (akas)", english: "sky", hint: "आसमान, नभ" },
        { maithili: "अगर (agar)", english: "incense tree", hint: "धूपयोग्य काठवाला वृक्ष" },
        { maithili: "अङ्ग (ang)", english: "body, limb", hint: "देह, अवयव" },
        { maithili: "अचल (achal)", english: "immovable, firm", hint: "स्थिर, दृढ़" },
        { maithili: "अजगर (ajagar)", english: "boa, python", hint: "विशालकाय माँप" },
        { maithili: "अतिथि (atithi)", english: "guest", hint: "अभ्यागत, पाहुन" },
        { maithili: "अधिकार (adhikar)", english: "right, authority", hint: "हक, अकतिआर, प्रभुत्व" },
        { maithili: "अन्न (ann)", english: "foodgrains", hint: "अनाज, धान-गेहूँ" },
        { maithili: "अपमान (apman)", english: "insult, disregard", hint: "अनादर, तिरस्कार" },
        { maithili: "अमृत (amrit)", english: "nectar, ambrosia", hint: "सुधा, पीयूष" },
        { maithili: "अरण्य (aranya)", english: "forest", hint: "वन, जङ्गल" },
        { maithili: "अवकाश (avakash)", english: "leisure, leave", hint: "पलखति, छुट्टी" },
        { maithili: "अशान्ति (ashanti)", english: "unrest", hint: "हलचल, विक्षोभ" },
        { maithili: "आँखि (aankhi)", english: "eye", hint: "नयन, नेत्र" },
        { maithili: "आगमन (aagaman)", english: "arrival", hint: "आएब, पहुँचना" },
        { maithili: "आनन्द (anand)", english: "joy, happiness", hint: "हर्ष, प्रसन्नता" },
        { maithili: "आरोग्य (arogya)", english: "health", hint: "रोगहीनता, स्वास्थ्य" },
        { maithili: "इतिहास (itihas)", english: "history", hint: "पूर्वकालक वर्णन" },
        { maithili: "उज्जर (ujjar)", english: "white, bright", hint: "श्वेत, उज्ज्वल" },
        { maithili: "उत्तर (uttar)", english: "answer, north", hint: "जवाब; उत्तर दिशा" },
        { maithili: "ऋषि (rishi)", english: "sage", hint: "तपस्वी, मुनि" },
        { maithili: "एक (ek)", english: "one", hint: "प्रथम संख्या, एकाकी" },
        { maithili: "ऐतिहासिक (aitihasik)", english: "historical", hint: "इतिहास सम्बन्धी" },
        { maithili: "ओज (oj)", english: "vigour, vitality", hint: "बल, पौरुष, तेज" },
        { maithili: "कठोर (kathor)", english: "hard, cruel", hint: "कड़ा, निर्दय" },
        { maithili: "कपट (kapat)", english: "deceit, fraud", hint: "छल, जालसाजी" },
        { maithili: "कमल (kamal)", english: "lotus", hint: "पुड़इनिक फूल" },
        { maithili: "करुणा (karuna)", english: "compassion, pity", hint: "दया, तुता" },
        { maithili: "कलह (kalah)", english: "quarrel", hint: "झगड़ा, विरोध" },
        { maithili: "कष्ट (kasht)", english: "trouble, distress", hint: "तकलीफ, पीड़ा" },
        { maithili: "काँट (kant)", english: "thorn", hint: "कण्टक" },
        { maithili: "काल्हि (kalhi)", english: "yesterday / tomorrow", hint: "गत दिन या आगामी दिन" },
        { maithili: "किसान (kisan)", english: "peasant, farmer", hint: "खेतिहर, गृहस्थ" },
        { maithili: "कीर्ति (kirti)", english: "fame, reputation", hint: "ख्याति, यश" }
    ];

    // Utility: shuffle array (Fisher-Yates)
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // Build list of questions with randomized options (3 distractors + correct)
    function buildQuestionSet() {
        const allItems = [...THESAURUS_DATA];
        const questionBank = [];
        for (let item of allItems) {
            // generate distractors from other entries (different english meaning)
            let otherMeanings = allItems.filter(x => x.english !== item.english).map(x => x.english);
            otherMeanings = [...new Set(otherMeanings)]; // unique
            if (otherMeanings.length < 3) {
                // fallback generic
                otherMeanings.push("village", "river", "mountain", "flower", "friend", "enemy");
                otherMeanings = [...new Set(otherMeanings)];
            }
            let shuffledDistractors = shuffleArray([...otherMeanings]);
            let options = [item.english, ...shuffledDistractors.slice(0, 3)];
            options = shuffleArray(options);
            questionBank.push({
                maithili: item.maithili,
                correct: item.english,
                options: options,
                hint: item.hint
            });
        }
        // shuffle overall order
        return shuffleArray(questionBank);
    }

    // App state
    let questions = [];
    let currentQIndex = 0;
    let currentScore = 0;
    let answerLock = false;      // whether user already answered current question
    let selectedAnswer = null;
    let totalQuestions = 0;

    // DOM references
    const dynamicContainer = document.getElementById("quizDynamicContent");
    const scoreDisplaySpan = document.getElementById("scoreDisplay");
    const qIndexSpan = document.getElementById("qIndex");
    const qTotalSpan = document.getElementById("qTotal");

    function updateUIStats() {
        scoreDisplaySpan.innerText = currentScore;
        qIndexSpan.innerText = currentQIndex + 1;
        qTotalSpan.innerText = totalQuestions;
    }

    // render current question
    function renderCurrentQuestion() {
        if (!questions.length || currentQIndex >= questions.length) {
            showResultScreen();
            return;
        }
        const q = questions[currentQIndex];
        // build options html with letter markers
        let optionsHtml = '';
        const letters = ['꜀', '꜁', '꜂', '꜃']; // stylized markers
        for (let i = 0; i < q.options.length; i++) {
            const opt = q.options[i];
            let optClass = "opt-item";
            if (answerLock) {
                if (opt === q.correct) optClass += " opt-correct";
                else if (selectedAnswer === opt && opt !== q.correct) optClass += " opt-wrong";
                else optClass += " disabled-opt";
            }
            optionsHtml += `
                <div class="${optClass}" data-optvalue="${escapeHtml(opt)}">
                    <div class="opt-marker">${letters[i]}</div>
                    <div class="opt-text">${escapeHtml(opt)}</div>
                </div>
            `;
        }

        let feedbackHtml = '';
        if (answerLock) {
            const isAnswerCorrect = (selectedAnswer === q.correct);
            feedbackHtml = `
                <div class="feedback-card">
                    ${isAnswerCorrect ? '✅ बढ़िया! सही जवाब' : '❌ अफसोस! गलत जवाब'}
                    <br> <strong>सही अर्थ:</strong> ${escapeHtml(q.correct)}
                    <br><span style="font-size:0.8rem;">📖 संकेत: ${escapeHtml(q.hint)}</span>
                </div>
            `;
        } else {
            feedbackHtml = `<div class="feedback-card">🧐 <strong>${escapeHtml(q.hint)}</strong><br>↑ उपर दिए अर्थ में से सही चुनू</div>`;
        }

        const nextDisabled = !answerLock ? 'disabled' : '';
        const nextBtnHtml = `
            <div class="action-buttons">
                <button class="btn btn-primary" id="nextQuestionBtn" ${nextDisabled}>➡ अगला प्रश्न</button>
                <button class="btn btn-secondary" id="resetQuizBtn">🔄 नवा क्विज़</button>
            </div>
        `;

        const fullRender = `
            <div class="question-panel">
                <div class="maithili-display">
                    
                    <div class="hint-badge">🔍 मैथिली शब्द – सही अंग्रेजी चुनू</div>
                </div>
                <div class="options-list" id="optionsList">
                    ${optionsHtml}
                </div>
                ${feedbackHtml}
                ${nextBtnHtml}
            </div>
        `;
        dynamicContainer.innerHTML = fullRender;

        // attach option click events only if not answered
        if (!answerLock) {
            const optionDivs = document.querySelectorAll('.opt-item');
            optionDivs.forEach(div => {
                div.addEventListener('click', (e) => {
                    if (answerLock) return;
                    const chosenValue = div.getAttribute('data-optvalue');
                    handleAnswer(chosenValue);
                });
            });
        }
        // attach next button
        const nextBtn = document.getElementById('nextQuestionBtn');
        if (nextBtn) {
            nextBtn.addEventListener('click', () => {
                if (!answerLock) return;
                moveToNext();
            });
        }
        const resetBtn = document.getElementById('resetQuizBtn');
        if (resetBtn) resetBtn.addEventListener('click', () => resetAndRestart());
    }

    function handleAnswer(chosen) {
        if (answerLock) return;
        const currentQ = questions[currentQIndex];
        selectedAnswer = chosen;
        answerLock = true;
        if (chosen === currentQ.correct) {
            currentScore++;
        }
        updateUIStats();
        renderCurrentQuestion(); // re-render with correct/wrong styling
    }

    function moveToNext() {
        if (!answerLock) return;
        if (currentQIndex + 1 < totalQuestions) {
            currentQIndex++;
            answerLock = false;
            selectedAnswer = null;
            renderCurrentQuestion();
            updateUIStats();
        } else {
            // quiz completed
            showResultScreen();
        }
    }

    function showResultScreen() {
        const percentage = Math.round((currentScore / totalQuestions) * 100);
        let encouragement = "";
        if (percentage >= 80) encouragement = "🌟 विद्वान्! अति उत्तम 🌟";
        else if (percentage >= 55) encouragement = "📗 अछि प्रयास, थिसारस देखि सीखू";
        else encouragement = "📖 फेर खेलू, शब्द संग्रह बढ़ाउ";

        const resultHtml = `
            <div class="result-screen">
                <h2>🎯 क्विज़ समाप्त</h2>
                <div class="final-score">${currentScore} / ${totalQuestions}</div>
                <p style="margin-bottom: 20px;">${encouragement}</p>
                <button class="btn btn-primary" id="restartCompleteBtn">🔄 पुनः क्विज़ शुरू करू</button>
                <button class="btn btn-secondary" id="newRoundBtn" style="margin-top: 12px;">✨ नवा प्रश्न-सेट लेलो</button>
            </div>
        `;
        dynamicContainer.innerHTML = resultHtml;
        const restartBtn = document.getElementById("restartCompleteBtn");
        const newSetBtn = document.getElementById("newRoundBtn");
        if (restartBtn) restartBtn.addEventListener('click', () => resetAndRestart());
        if (newSetBtn) newSetBtn.addEventListener('click', () => regenerateAndStart());
    }

    function resetAndRestart() {
        // same question set, but reset index and score
        currentQIndex = 0;
        currentScore = 0;
        answerLock = false;
        selectedAnswer = null;
        updateUIStats();
        renderCurrentQuestion();
    }

    function regenerateAndStart() {
        // generate a brand new shuffled question set with different distractors
        questions = buildQuestionSet();
        totalQuestions = questions.length;
        currentQIndex = 0;
        currentScore = 0;
        answerLock = false;
        selectedAnswer = null;
        updateUIStats();
        renderCurrentQuestion();
    }

    // initialization
    function initQuiz() {
        questions = buildQuestionSet();
        totalQuestions = questions.length;
        currentQIndex = 0;
        currentScore = 0;
        answerLock = false;
        selectedAnswer = null;
        updateUIStats();
        renderCurrentQuestion();
    }

    // helper to escape HTML
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    initQuiz();
