    while(questions.length < 100) {
        questions.push({

        questions.push({
            text: "हरिसिंह देवक पतनक बाद मिथिलामे कोन वंश शासक बनल आ मुगल सम्राटसँ करार करि राज्य प्राप्त केलक?",

        });
    }
    const finalQuestions = questions.slice(0,100);

    let userSelections = new Array(finalQuestions.length).fill(-1);
    const container = document.getElementById("questionsContainer");
    const submitBtn = document.getElementById("submitBtn");
    const resetBtn = document.getElementById("resetBtn");
    const scoreDisplay = document.getElementById("scoreDisplay");
    const feedbackMsg = document.getElementById("feedbackMsg");

    function renderQuiz() {
        let html = "";
        finalQuestions.forEach((q, idx) => {
            html += `<div class="question-card" data-qidx="${idx}">
                        <div class="question-text">${idx+1}. ${q.text}</div>
                        <div class="options">`;
            q.options.forEach((opt, optIdx) => {
                const checked = (userSelections[idx] === optIdx) ? 'checked' : '';
                html += `<div class="option" data-qidx="${idx}" data-optidx="${optIdx}">
                            <input type="radio" name="q${idx}" id="q${idx}_opt${optIdx}" value="${optIdx}" ${checked}>
                            <label for="q${idx}_opt${optIdx}">${opt}</label>
                        </div>`;
            });
            html += `</div></div>`;
        });
        container.innerHTML = html;
        attachEvents();
    }

    function attachEvents() {
        document.querySelectorAll('.option').forEach(optDiv => {
            const radio = optDiv.querySelector('input[type="radio"]');
            const qIdx = parseInt(optDiv.dataset.qidx);
            const optIdx = parseInt(optDiv.dataset.optidx);
            if (radio) {
                radio.addEventListener('change', () => {
                    if (radio.checked) userSelections[qIdx] = optIdx;
                });
            }
            optDiv.addEventListener('click', () => {
                const r = optDiv.querySelector('input[type="radio"]');
                if (r && !r.checked) {
                    r.checked = true;
                    userSelections[qIdx] = optIdx;
                    const evt = new Event('change', {bubbles:true});
                    r.dispatchEvent(evt);
                }
            });
        });
    }

    function checkAnswers() {
        let score = 0;
        for (let i=0; i<finalQuestions.length; i++) {
            if (userSelections[i] === finalQuestions[i].correct) score++;
        }
        scoreDisplay.innerHTML = `🕌 आपक स्कोर: ${score} / ${finalQuestions.length} 🕌`;
        if (score === finalQuestions.length) feedbackMsg.innerHTML = "🌟 अद्वितीय ! मुसलमानी अमल पर आपक पकड़ अति उत्तम।";
        else if (score >= 80) feedbackMsg.innerHTML = "📚 उत्तम! किछु बारीकियाँ बाकी अछि, पुनः अध्ययन करू।";
        else if (score >= 60) feedbackMsg.innerHTML = "📖 अच्छा प्रयास, मुसलमानी कालक घटनाक्रम पर ध्यान दियेक चाही।";
        else feedbackMsg.innerHTML = "🕰️ पुनः पढ़ि परीक्षा दीजिए, इतिहास रोचक अछि।";
    }

    function resetQuiz() {
        userSelections.fill(-1);
        renderQuiz();
        scoreDisplay.innerHTML = "📌 उत्तर चुनू आ 'उत्तर जाँच करू' पर क्लिक करू";
        feedbackMsg.innerHTML = "";
    }

    renderQuiz();
    submitBtn.addEventListener("click", checkAnswers);
    resetBtn.addEventListener("click", resetQuiz);

</script><a class="vq-back" href="https://www.videha.co.in/videha-elearning.htm">&larr; विदेह ई-लर्निङ्ग हब पर वापस जाउ</a>
