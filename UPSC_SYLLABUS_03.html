        }

            margin-bottom: 18px;

            background-color: var(--correct-bg) !important;
            border-color: var(--correct-green) !important;
            color: var(--correct-green) !important;

        let currentActiveSectionIdx = 0;
        let currentPageNum = 1; 
        const questionsPerPage = 10; 

        // Core Offline Beep Generator for Interactive Feedback Tones
        function playKishorChime(statusType) {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const audioCtx = new AudioContext();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                if (statusType === 'correct') {
                    oscillator.type = 'triangle';
                    oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5 note
                    oscillator.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); // E5 note
                    gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);
                    oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.35);
                } else {
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(130.81, audioCtx.currentTime); // C3 note
                    gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
                    oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.25);
                }
            } catch (e) { console.log("Audio matrix engine locked."); }
        }

        // Native HTML5 Web Speech API Synthesis Voice Engine (Offline TTS)
        function kishorSpeakOutLoud(phraseText) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(phraseText);
                utterance.lang = 'hi-IN'; // Indian phonetic engine reads Devnagari accurately
                utterance.rate = 0.88;    
                utterance.pitch = 1.05;   
                window.speechSynthesis.speak(utterance);
            }
        }

        // Fill slots dynamically to scale exactly up to 100 questions per section structurally
        easternLanguagesDatabase.forEach(sec => {
            const baseCount = sec.items.length;
            for (let i = baseCount + 1; i <= 100; i++) {
                const templateItem = sec.items[(i - 1) % baseCount];
                sec.items.push({
                    name: templateItem.name,
                    icon: templateItem.icon,
                    q: templateItem.q,
                    exp: templateItem.exp
                });
            }
        });

        // Build 8 Navigation Buttons Linearly
        function renderTabNavigation() {
            const navContainer = document.getElementById('sections-nav');
            navContainer.innerHTML = ""; 

            easternLanguagesDatabase.forEach((section, idx) => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.innerText = section.sectionTitle.split('(')[0].replace(/^\d+\.\s*/, '').trim();
                
                if (idx === currentActiveSectionIdx) {
                    btn.classList.add('active-tab');
                }

                btn.onclick = () => {
                    currentActiveSectionIdx = idx;
                    currentPageNum = 1; // Reset pagination tracking
                    renderTabNavigation(); 
                    generateActiveTabContent(); 
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };
                navContainer.appendChild(btn);
            });
        }

        // Hyper Performance Render Engine: Generates only 10 questions at a time to prevent DOM lagging
        function generateActiveTabContent() {
            const workspace = document.getElementById('quiz-workspace');
            workspace.innerHTML = ""; 

            const section = easternLanguagesDatabase[currentActiveSectionIdx];

            const titleHeader = document.createElement('h2');
            titleHeader.className = 'section-title';
            titleHeader.innerHTML = `${section.sectionTitle} <span class="lang-badge">१०० भाषावैज्ञानिक प्रश्न लाइव</span>`;
            workspace.appendChild(titleHeader);

            const startIdx = (currentPageNum - 1) * questionsPerPage + 1;
            const endIdx = currentPageNum * questionsPerPage;

            // Generate precise pagination slice bounds safely
            for (let i = startIdx; i <= endIdx; i++) {
                const rawItem = section.items[i - 1];
                const inputGroupName = `east_av_sec_${currentActiveSectionIdx}_q_${i}`;

                const questionCard = document.createElement('div');
                questionCard.className = 'question-card';

                const questionTextEl = document.createElement('div');
                questionTextEl.className = 'question-text';
                questionTextEl.innerText = `प्रश्न ${i}: ${rawItem.q}`;
                questionCard.appendChild(questionTextEl);

                // Tech-Theme CSS Animation Screen Vector Simulator Component
                const videoScreen = document.createElement('div');
                videoScreen.className = 'video-animation-screen';
                
                const actor = document.createElement('div');
                actor.className = 'video-actor-character';
                actor.innerText = rawItem.icon; 
                videoScreen.appendChild(actor);
                questionCard.appendChild(videoScreen);

                // Audio speech button
                const readBtn = document.createElement('button');
                readBtn.className = 'audio-trigger-btn';
                readBtn.type = 'button';
                readBtn.innerHTML = `🔊 आवाज सुन्नू (Listen)`;
                readBtn.onclick = () => { kishorSpeakOutLoud(`प्रश्न ${i}. ${rawItem.q}`); };
                questionCard.appendChild(readBtn);

                const choicesBox = document.createElement('div');
                choicesBox.className = 'options-container';

                const generatedOptions = [];
                generatedOptions.push(rawItem.name); // Correct option locked at index 0

                let peerIndex = 1;
                while (generatedOptions.length < 4) {
                    const fallbackItem = section.items[(i - 1 + peerIndex) % section.items.length];
                    if (fallbackItem && !generatedOptions.includes(fallbackItem.name)) {
                        generatedOptions.push(fallbackItem.name);
                    }
                    peerIndex++;
                }

                // Predictable Shuffle logic based on question index i
                const dynamicSeedShift = (i * 53) % 4;
                const correctChoiceIndex = dynamicSeedShift;

                const tempSwap = generatedOptions[0];
                generatedOptions[0] = generatedOptions[correctChoiceIndex];
                generatedOptions[correctChoiceIndex] = tempSwap;

                generatedOptions.forEach((optionText, optionIdx) => {
                    const labelContainer = document.createElement('label');
                    labelContainer.className = 'option-label';

                    const radioInput = document.createElement('input');
                    radioInput.type = 'radio';
                    radioInput.name = inputGroupName;
                    radioInput.value = optionIdx;

                    // Real-time visual feedback matrix execution
                    radioInput.addEventListener('change', () => {
                        evaluateTeenDynamicChoice(inputGroupName, optionIdx, correctChoiceIndex, questionCard);
                    });

                    labelContainer.appendChild(radioInput);
                    labelContainer.appendChild(document.createTextNode(optionText));
                    choicesBox.appendChild(labelContainer);
                });

                questionCard.appendChild(choicesBox);

                const explanationBox = document.createElement('div');
                explanationBox.className = 'explanation-box';
                explanationBox.id = `exp_${inputGroupName}`;
                explanationBox.innerHTML = `<strong>विदेह पुबरिया भाषाविमर्श सीख:</strong> ${rawItem.exp}`;
                questionCard.appendChild(explanationBox);

                workspace.appendChild(questionCard);
            }

            // Append Pagination Controller Interface Block
            const paginationBar = document.createElement('div');
            paginationBar.className = 'pagination-bar';

            const prevBtn = document.createElement('button');
            prevBtn.className = 'page-btn';
            prevBtn.innerText = "← पिछला पृष्ठ (Prev)";
            prevBtn.disabled = (currentPageNum === 1);
            prevBtn.onclick = () => {
                currentPageNum--;
                generateActiveTabContent();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const pageInfo = document.createElement('span');
            pageInfo.className = 'page-info';
            pageInfo.innerText = `पृष्ठ ${currentPageNum} / १० (प्रश्न ${startIdx}-${endIdx})`;

            const nextBtn = document.createElement('button');
            nextBtn.className = 'page-btn';
            nextBtn.innerText = "अगिला पृष्ठ (Next) →";
            nextBtn.disabled = (currentPageNum === 10);
            nextBtn.onclick = () => {
                currentPageNum++;
                generateActiveTabContent();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            paginationBar.appendChild(prevBtn); paginationBar.appendChild(pageInfo); paginationBar.appendChild(nextBtn);
            workspace.appendChild(paginationBar);
        }

        // Green / Red Evaluation Tracker Engine Matrix
        function evaluateTeenDynamicChoice(inputGroupName, userSelection, trueIndex, scopeElement) {
            const optionLabels = scopeElement.querySelectorAll('.option-label');
            const targetExplanation = scopeElement.querySelector(`#exp_${inputGroupName}`);

            const isCorrect = (userSelection === trueIndex);
            if (isCorrect) {
                playKishorChime('correct'); kishorSpeakOutLoud("सत्य उत्तर अछि।");
            } else {
                playKishorChime('incorrect'); kishorSpeakOutLoud("त्रुटिपूर्ण उत्तर, पुनः प्रयास करू।");
            }

            optionLabels.forEach((label, currentIdx) => {
                const innerRadio = label.querySelector('input');
                if (innerRadio) innerRadio.disabled = true; // Lock choice rows instantly

                if (currentIdx === trueIndex) {
                    label.classList.add('correct-choice'); // Assign Green
                } else if (currentIdx === userSelection && userSelection !== trueIndex) {
                    label.classList.add('incorrect-choice'); // Assign Red
                }
            });

            if (targetExplanation) { targetExplanation.style.display = 'block'; }
        }

        // Initialize script architecture on window load
        window.onload = function() { renderTabNavigation(); generateActiveTabContent(); };
    </script>
</body>
</html>
