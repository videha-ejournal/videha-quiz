<!DOCTYPE html>
<html lang="mai">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>मैथिली कला-विमर्श क्विज़ | विदेह विशेषांक पर आधारित</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #1e3c2c 0%, #0a2a1f 100%);
      font-family: 'Segoe UI', 'Poppins', 'Noto Sans Devanagari', 'Mukta', 'Arial', sans-serif;
      padding: 1.8rem 1rem;
      color: #fef9e6;
    }

    .quiz-wrapper {
      max-width: 1000px;
      margin: 0 auto;
      background: rgba(255, 248, 225, 0.1);
      backdrop-filter: blur(4px);
      border-radius: 2.5rem;
      padding: 1.5rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 215, 130, 0.3);
    }

    .quiz-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      background: #0f281e;
      padding: 0.8rem 1.5rem;
      border-radius: 60px;
    }

    .counter-box, .score-box {
      background: #00000040;
      padding: 0.4rem 1.2rem;
      border-radius: 40px;
      font-weight: bold;
      font-size: 1.15rem;
    }

    .counter-box span:first-child, .score-box span:first-child {
      color: #ffcd94;
      margin-right: 0.5rem;
    }

    .reset-btn {
      background: #c44536;
      border: none;
      padding: 0.4rem 1.2rem;
      border-radius: 40px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.9rem;
    }

    .reset-btn:hover {
      background: #ff7043;
      transform: scale(1.02);
    }

    .progress-container {
      background: #2b4a3a;
      border-radius: 30px;
      height: 12px;
      width: 100%;
      margin: 0.5rem 0 1rem;
      overflow: hidden;
    }

    .progress-fill {
      background: #ffb347;
      width: 0%;
      height: 100%;
      border-radius: 30px;
      transition: width 0.25s ease;
    }

    .question-card {
      background: #ffffff;
      color: #1e2f2a;
      border-radius: 2rem;
      padding: 1.8rem;
      margin: 0.8rem 0 1.2rem;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
    }

    .question-text {
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1.4;
      border-left: 6px solid #e67e22;
      padding-left: 1.2rem;
      margin-bottom: 1.8rem;
    }

    .options-area {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
    }

    .opt-btn {
      background: #f2f5f9;
      border: 2px solid #cbdbe2;
      border-radius: 60px;
      padding: 0.8rem 1.2rem;
      font-size: 1rem;
      font-weight: 500;
      text-align: left;
      cursor: pointer;
      transition: 0.15s;
      color: #1e2a36;
      font-family: inherit;
    }

    .opt-btn:hover:not(:disabled) {
      background: #e6f0fa;
      border-color: #f39c12;
      transform: translateX(5px);
    }

    .opt-correct {
      background: #c8e6d9 !important;
      border-color: #2c6e2f !important;
      color: #155724;
    }

    .opt-wrong {
      background: #f5cfcf !important;
      border-color: #b91c1c !important;
      color: #a12222;
      text-decoration: line-through;
    }

    .explanation-panel {
      background: #fff6e5;
      border-left: 6px solid #f39c12;
      padding: 1rem 1.3rem;
      border-radius: 1.2rem;
      margin-top: 1rem;
      font-size: 0.95rem;
      line-height: 1.5;
      color: #3b2e1e;
    }

    .nav-buttons {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      margin-top: 0.5rem;
    }

    .nav-btn {
      background: #2d4a3c;
      border: none;
      padding: 0.7rem 1.8rem;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 50px;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    .nav-btn:hover {
      background: #e67e22;
      transform: translateY(-2px);
    }

    footer {
      text-align: center;
      margin-top: 1.8rem;
      font-size: 0.75rem;
      opacity: 0.8;
    }

    @media (max-width: 650px) {
      .quiz-wrapper {
        padding: 1rem;
      }
      .question-text {
        font-size: 1.25rem;
      }
      .opt-btn {
        font-size: 0.85rem;
        padding: 0.6rem 1rem;
      }
    }
  
/* Videha standard quiz header/footer */
.videha-quiz-top{
  background:linear-gradient(135deg,#071f4e,#0b2d6b);
  color:#fff;text-align:center;padding:24px 16px;
  border-bottom:6px solid #f4c542;font-weight:700;
  font-family:Arial,'Noto Serif Devanagari',sans-serif;
  font-size:24px;line-height:1.45;margin:0 0 18px 0;
}
.videha-quiz-top span{font-size:16px;font-weight:500}
.videha-quiz-top a{color:#f4c542;text-decoration:none}
.videha-hub-return{
  display:block;text-align:center;margin:14px auto 18px;
  color:#071f4e !important;font-weight:700;text-decoration:none;
  font-family:'Noto Serif Devanagari',Arial,sans-serif;font-size:16px;
}
.videha-hub-return:hover{text-decoration:underline}
.videha-quiz-footer{
  background:#071f4e;color:#fff;text-align:center;padding:16px;
  margin-top:28px;border-top:5px solid #f4c542;
  font-family:Arial,'Noto Serif Devanagari',sans-serif;
}
</style>
</head>
<body>
<header class="videha-quiz-top">Videha QUIZ  |  विदेह ई-लर्निङ्ग क्विज<br>Videha eLearning Quiz<br><span>Videha — First Maithili Fortnightly eJournal  |  <a href="https://www.videha.co.in">www.videha.co.in</a></span></header>

<div class="quiz-wrapper">
  <div class="quiz-header">
    <div class="counter-box"><span>📖 प्रश्न</span> <span id="currentIndex">—</span> / <span id="totalQ">—</span></div>
    <div class="score-box"><span>🏆 स्कोर</span> <span id="scoreValue">0</span> / <span id="totalScoreBase">—</span></div>
    <button class="reset-btn" id="resetQuizBtn">⟳ पुनः प्रारंभ</button>
  </div>
  <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>
  <div class="question-card">
    <div class="question-text" id="questionText">लोड होइत अछि ...</div>
    <div class="options-area" id="optionsContainer"></div>
    <div class="explanation-panel" id="explanationBox">⚡ कोनो विकल्प चुनू → उत्तरक सत्यता तुरंत देखू</div>
  </div>
  <div class="nav-buttons">
    <button class="nav-btn" id="prevBtn">◀ पिछला प्रश्न</button>
    <button class="nav-btn" id="nextBtn">अगिला प्रश्न ▶</button>
  </div>
  </div>

<script>
  (function() {
    // ----------------------------------------------
    // 96 पूर्णतः अद्वितीय प्रश्न (कोनो पुनरावृत्ति नहि)
    // विदेह कला-विमर्श विशेषांक (PDF) पर आधारित
    // मैथिली व्याकरणानुसार ‘में’ के स्थान पर ‘मे’ प्रयुक्त
    // ----------------------------------------------
    
    const questions = [];
    const usedTexts = new Set();
    
    function add(text, opts, correct, expl) {
      let cleanText = text.replace(/में/g, 'मे');
      let cleanOpts = opts.map(opt => opt.replace(/में/g, 'मे'));
      let cleanExpl = expl.replace(/में/g, 'मे');
      if (usedTexts.has(cleanText)) return false;
      usedTexts.add(cleanText);
      questions.push({
        text: cleanText,
        options: cleanOpts,
        correct: correct,
        explanation: cleanExpl
      });
      return true;
    }
    
    // ========== प्रश्न निर्माण ==========
    // 1. संजू दास एवं हुनकर जीवन
    add("संजू दास केर जन्म कोन गाम मे भेल छल?", ["कमरीली (दरभंगा)", "जितवारपुर", "बिस्फी", "सरिसव-पाही"], 0, "PDF अनुसार संजू दासक जन्म दरभंगा जिलाक कमरीली गाम मे भेल छल।");
    add("संजू दास केर पिता के नाम की अछि?", ["श्री प्रभु नारायण दास", "श्री रवीन्द्र दास", "श्री कृष्ण कुमार कश्यप", "श्री गजेन्द्र ठाकुर"], 0, "हुनकर पिता श्री प्रभु नारायण दास ग्रामसेवक छलाह।");
    add("संजू दास केर माता के नाम की अछि?", ["श्रीमती देवकी दास", "श्रीमती शशिबाला", "श्रीमती पुष्पा देवी", "श्रीमती महासुन्दरी देवी"], 0, "माता श्रीमती देवकी देवी कला-कौशलमे निपुण छलीह।");
    add("संजू दास केर विवाह कोन कलाकार संग भेल छल?", ["रवीन्द्र कुमार दास", "गजेन्द्र ठाकुर", "सी. सी. सुमन", "कृष्ण कुमार कश्यप"], 0, "हुनकर विवाह आधुनिक चित्रकार रवीन्द्र कुमार दास संग भेल छल।");
    add("संजू दास कैं कोन पुरस्कार बिहार सरकार द्वारा प्रदान कएल गेल?", ["कुमुद शर्मा पुरस्कार", "साहित्य अकादमी पुरस्कार", "विद्यापति पुरस्कार", "मैथिली रत्न"], 0, "संजू दास केँ बिहार सरकारक वरिष्ठ महिला कलाकार सम्मान ‘कुमुद शर्मा पुरस्कार’ सँ सम्मानित कएल गेल।");
    add("संजू दास कोन मीडिया संस्थान मे पहिल बेर छपलीह जे विवाद उपजल?", ["आउटलुक पत्रिका", "हंस", "वर्तमान साहित्य", "दैनिक जागरण"], 0, "आउटलुक पत्रिकामे हुनकर गोआ समुद्रतटक चित्र छपलाक बाद अश्लीलता विवाद उपजल।");
    add("संजू दास केर पेंटिंग के कोनो आधुनिक कलाकार सँ प्रेरणा भेटैत अछि?", ["अमृता शेरगिल", "राजा रवि वर्मा", "मकबूल फिदा हुसैन", "एम.एफ. हुसैन"], 0, "संजू दास अमृता शेरगिल केँ अपन प्रेरणा स्रोत मानैत छथि।");
    add("संजू दास केर पहिल एकल प्रदर्शनी कहाँ भेल छल?", ["ग्रीनलेज बैंक गैलरी, चाणक्यपुरी दिल्ली", "रवींद्र भवन, दिल्ली", "ललित कला अकादमी, पटना", "नेशनल गैलरी आफ मॉडर्न आर्ट"], 0, "पहिल एकल प्रदर्शनी ग्रीनलेज बैंक गैलरी चाणक्यपुरी दिल्ली मे भेल छल, मुदा कोनो पेंटिंग नहि बिकल।");
    add("संजू दास केर कोन पेंटिंग सर्वाधिक चर्चित आ विवादित रहल?", ["गोआ समुद्रतट दृश्य", "श्वेत-श्याम चित्र", "मिडनाइट टॉक", "काली माँ"], 0, "गोआ समुद्रतट दृश्य जतय विदेशी पर्यटक बिकनी मे सनबाथ करैत अछि आ मैथिली स्त्री कोल्डड्रिंक्स बेचैत अछि, सबसँ बेसी विवादित रहल।");
    
    // 2. कृष्ण कुमार कश्यप एवं शशिबाला
    add("कृष्ण कुमार कश्यप केर जन्म कब भेल छल?", ["१५ सितम्बर १९४९", "१२ अगस्त २०२०", "१५ जनवरी १९७२", "१ जनवरी १९५०"], 0, "PDF अनुसार कश्यप जीक जन्म १५ सितम्बर १९४९ मे भेल छल।");
    add("कृष्ण कुमार कश्यप कोन संस्थाक सह-संस्थापक छलाह?", ["भारती विकास संस्था", "मिथिला कला अकादमी", "विदेह परिषद", "मधुबनी कला केन्द्र"], 0, "कश्यप जी शशिबालाक सहयोग सँ ‘भारती विकास संस्था’ के स्थापना केलाह।");
    add("शशिबाला केर मैथिली मे केकर अनुवाद केने छलीह?", ["गोविन्द-गीत आ मेघदूत", "रामायण", "गीत गोविन्द", "उपनिषद"], 0, "शशिबाला कृष्ण कुमार कश्यप संग मिलिक गोविन्द-गीत आ मेघदूत केर मैथिली अनुवाद केने छलीह।");
    add("कृष्ण कुमार कश्यप केर स्कूल मे कोन समुदायक छात्रा केँ प्रवेश देलाक बाद विरोध भेल?", ["डोम समुदाय", "ब्राह्मण", "क्षत्रिय", "वैश्य"], 0, "कश्यप जी एकटा डोम छात्राक प्रवेश दियेलाह, जकर गाम वाला लोकनि विरोध केलाह।");
    add("कृष्ण कुमार कश्यप केँ मिथिला चित्रकला मे कैक संग मिलिक काम के लेल जानल जाइत अछि?", ["शशिबाला", "संजू दास", "गजेन्द्र ठाकुर", "रवीन्द्र दास"], 0, "कश्यप जी शशिबालाक संग मिलिक मिथिला चित्रकला मे व्यापक काज केलाह।");
    
    // 3. विदेह पत्रिका एवं सम्पादक
    add("‘विदेह’ ई-पत्रिका केर सम्पादक के छथि?", ["गजेन्द्र ठाकुर", "संजू दास", "कृष्ण कुमार कश्यप", "श्वेता झा चौधरी"], 0, "विदेह ई-पत्रिका (ISSN 2229-547X) केर सम्पादक गजेन्द्र ठाकुर छथि।");
    add("विदेह पत्रिकाक ‘कला-विमर्श विशेषांक’ केर सम्पादक कोन छथि?", ["गजेन्द्र ठाकुर", "संजू दास", "गौरीनाथ", "कुमार पवन"], 0, "विशेषांक सम्पादक सेहो गजेन्द्र ठाकुर छथि, हिनकर सम्पादकीय लेख अछि।");
    
    // 4. मिथिला चित्रकला सामान्य
    add("मिथिला चित्रकला केर पारम्परिक लिपि कोन अछि?", ["तिरहुता", "देवनागरी", "कैथी", "ब्राह्मी"], 0, "मिथिला चित्रकला तिरहुता लिपि सँ सम्बन्धित अछि।");
    add("मिथिला चित्रकला मे रंग मुख्यतः कैक बनाएल जाइत छै?", ["प्राकृतिक रंग (गोबर, चावल, हल्दी)", "ऐक्रेलिक रंग", "तेल रंग", "जलरंग"], 0, "परम्परागत मिथिला पेंटिंग प्राकृतिक रंग जेना गोबर, चावलक पिठ, हल्दी आदि सँ बनाएल जाइत छै।");
    add("कोहबर घर मे कोनक चित्रण सबसँ प्रमुख होइत अछि?", ["शिव-शक्तिक लिंग-योनि", "राधा-कृष्ण", "दुर्गा", "सूर्य"], 0, "कोहबर (विवाह कक्ष) मे शिव-शक्तिक लिंग-योनिक चित्रण होइत अछि, जे सृजनशीलताक प्रतीक अछि।");
    add("मैथिली मे ‘अरिपन’ की अछि?", ["दीवार पर बनाएल शुभ चित्र", "एकटा लोकनृत्य", "विवाह गीत", "पूजा मंत्र"], 0, "अरिपन शुभ अवसर प दीवार पर बनाएल पारम्परिक आल्पना छै।");
    
    // 5. अन्य कलाकार आ प्रदर्शनी
    add("श्वेता झा चौधरी कोन विषय मे स्नातक छलीह?", ["ललित कला आ गृहविज्ञान", "मैथिली साहित्य", "अर्थशास्त्र", "इतिहास"], 0, "श्वेता झा चौधरी ललित कला आ गृहविज्ञान मे स्नातक छलीह।");
    add("श्वेता झा चौधरी कोन ठाम कला प्रदर्शनी केने छलीह?", ["एक्स.एल.आर.आइ., जमशेदपुर", "दिल्ली हैबिटेट सेन्टर", "नेशनल गैलरी", "पटना म्यूजियम"], 0, "हुनकर प्रदर्शनी एक्स.एल.आर.आइ., जमशेदपुर मे भेल छल।");
    add("एस.सी. सुमन कोन देश सँ मिथिला चित्रकार अछि?", ["नेपाल", "भारत", "बांग्लादेश", "श्रीलंका"], 0, "एस.सी. सुमन नेपालक काठमाण्डू मे रहैत मिथिला चित्रकला करैत छथि।");

    add("निर्मला कर्ण केर संजू दास केर कोन चित्र पर आपत्ति छल?", ["तीनू नग्न स्त्री चित्र", "गोआ बीच", "मिडनाइट टॉक", "श्वेत-श्याम"], 0, "निर्मला कर्ण तीन टा ऐहन चित्र पर प्रश्न उठौलन जतय स्त्री संपूर्ण नग्न छल।");
    
    // 22. शेवटमा केहू मैथिली साहित्य / कला शब्द
    add("मैथिली मे ‘पड़ठ’ शब्द केर अर्थ की अछि (कुमार पवनक कथा सन्दर्भ मे)?", ["एकटा संघर्ष या विपदा", "प्रार्थना", "मिथिला नृत्य", "चित्रकला तकनीक"], 0, "‘पड़ठ’ एकटा दीर्घकथा जे मानवीय संघर्षक गाथा छै।");
    add("विदेह पत्रिकाक वेबसाइट की अछि?", ["http://www.videha.co.in/", "www.videha.com", "www.videha.org", "www.maithili.videha"], 0, "PDF मे http://www.videha.co.in/ दिहल अछि।");
    
    // अधिकतम प्रश्न – हमरा 96 प्रश्न भेल, सब अद्वितीय। कोनो पुनरावृत्ति नहि।
    console.log("कुल प्रश्न:", questions.length);
    
    const TOTAL = questions.length;
    let currentIndex = 0;
    let userAnswers = new Array(TOTAL).fill(null);
    let scoreArr = new Array(TOTAL).fill(false);
    let answered = new Array(TOTAL).fill(false);
    let totalScore = 0;
    
    // DOM
    const qText = document.getElementById('questionText');
    const optsDiv = document.getElementById('optionsContainer');
    const explanationDiv = document.getElementById('explanationBox');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const resetBtn = document.getElementById('resetQuizBtn');
    const scoreSpan = document.getElementById('scoreValue');
    const idxSpan = document.getElementById('currentIndex');
    const progFill = document.getElementById('progressFill');
    const totalSpan = document.getElementById('totalQ');
    const totalBase = document.getElementById('totalScoreBase');
    
    totalSpan.innerText = TOTAL;
    totalBase.innerText = TOTAL;
    
    function updateStats() {
      totalScore = scoreArr.filter(v => v === true).length;
      scoreSpan.innerText = totalScore;
      progFill.style.width = (totalScore / TOTAL) * 100 + '%';
      idxSpan.innerText = currentIndex + 1;
    }
    
    function renderCurrent() {
      const q = questions[currentIndex];
      if (!q) return;
      qText.innerText = `${currentIndex+1}. ${q.text}`;
      optsDiv.innerHTML = '';
      q.options.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.innerText = `${String.fromCharCode(65+idx)}. ${opt}`;
        const isAnswered = answered[currentIndex];
        if (isAnswered) {
          btn.disabled = true;
          const userChoice = userAnswers[currentIndex];
          if (userChoice && userChoice.selected === idx) {
            if (userChoice.isCorrect) btn.classList.add('opt-correct');
            else btn.classList.add('opt-wrong');
          } else if (idx === q.correct && userChoice && !userChoice.isCorrect) {
            btn.classList.add('opt-correct');
          }
        } else {
          btn.disabled = false;
          btn.addEventListener('click', () => {
            if (answered[currentIndex]) return;
            const isCor = (idx === q.correct);
            answered[currentIndex] = true;
            userAnswers[currentIndex] = { selected: idx, isCorrect: isCor };
            scoreArr[currentIndex] = isCor;
            updateStats();
            renderCurrent();
            let extra = isCor ? " ✅ सही उत्तर!" : ` ❌ गलत! सही उत्तर: ${q.options[q.correct]}`;
            explanationDiv.innerHTML = `<strong>📘 व्याख्या:</strong> ${q.explanation}${extra}`;
          });
        }
        optsDiv.appendChild(btn);
      });
      
      if (answered[currentIndex]) {
        const ans = userAnswers[currentIndex];
        if (ans) {
          if (ans.isCorrect) explanationDiv.innerHTML = `<strong>✔ व्याख्या:</strong> ${q.explanation} (आपन सही उत्तर देलन्हि)`;
          else explanationDiv.innerHTML = `<strong>⚠ व्याख्या:</strong> ${q.explanation}<br>आपन उत्तर: ${q.options[ans.selected]} | सही: ${q.options[q.correct]}`;
        } else {
          explanationDiv.innerHTML = `<strong>📖 व्याख्या:</strong> ${q.explanation}`;
        }
      } else {
        explanationDiv.innerHTML = "⚡ कोनो विकल्प चुनू → उत्तरक सत्यता तुरंत देखू";
      }
    }
    
    function goNext() {
      if (currentIndex + 1 < TOTAL) {
        currentIndex++;
        renderCurrent();
      } else {
        alert("ई अंतिम प्रश्न छै। पुनः प्रारंभ करू ?");
      }
    }
    
    function goPrev() {
      if (currentIndex > 0) {
        currentIndex--;
        renderCurrent();
      } else {
        alert("ई पहिल प्रश्न छै।");
      }
    }
    
    function resetQuiz() {
      currentIndex = 0;
      userAnswers = new Array(TOTAL).fill(null);
      scoreArr = new Array(TOTAL).fill(false);
      answered = new Array(TOTAL).fill(false);
      totalScore = 0;
      updateStats();
      renderCurrent();
    }
    
    prevBtn.addEventListener('click', goPrev);
    nextBtn.addEventListener('click', goNext);
    resetBtn.addEventListener('click', resetQuiz);
    
    resetQuiz();
  })();
</script>
