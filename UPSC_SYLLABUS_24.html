    <script>

                    { q: "कवीश्वर चन्दा झा रचित 'मिथिलाभाषा रामायण' क सुन्दरकाण्डक आरम्भ कतय सँ होइत अछि?", o: ["रामक विलाप सँ", "हनुमानक समुद्र लांघय लेल प्रस्थान सँ", "सीताक खोज सँ", "रावणक दरबार सँ"], a: 1, e: "सुन्दरकाण्डक प्रारम्भ जाम्बवन्तक प्रेरणाक बाद हनुमान द्वारा समुद्र लांघय लेल प्रस्थान सँ होइत अछि।" },

                    { q: "हनुमानक छलाँग लगैते महेन्द्र पर्वतक की दशा भेल?", o: ["पर्वत पाताल धसि गेल", "पर्वत उड़य लागल", "पर्वत सोनाक भऽ गेल", "किछु नहि भेल"], a: 0, e: "हनुमानक भारी दबाब सँ महेन्द्र पर्वत काँपि गेल आ ओकर एकटा हिस्सा पाताल दिस धसि गेल।" },
                    { q: "समुद्र हनुमानक थकान दूर करबाक लेल कोन पर्वतकें ऊपर उठय लेल कहलक?", o: ["सुमेरु", "मैनाक", "कैलाश", "गोवर्धन"], a: 1, e: "समुद्रक अनुरोध पर मैनाक (स्वर्ण) पर्वत जल सँ ऊपर उठल जाहि सँ हनुमान किछु काल विश्राम कऽ सकथि।" },
                    { q: "मैनाक पर्वतकें इन्द्रक वज्र सँ के बचेने छल?", o: ["पवनदेव (हनुमानक पिता)", "वरुण", "सूर्य", "राम"], a: 0, e: "प्राचीन कालमे पवनदेव मैनाचकें उडि कऽ समुद्रमे खसा देने छलाह, जाहि सँ ओकर पंख इन्द्रक वज्र सँ बचि गेल छल। ताहि उपकार स्वरूप मैनाक हनुमानक सेवा करय आयल।" },
                    { q: "हनुमान मैनाक पर्वतक आतिथ्य सँ की केलनि?", o: ["ओतय सुइत रहलाह", "हाथ सँ स्पर्श कऽ (प्रणाम कऽ) राम-काज लेल आगू बढ़ि गेलाह", "पर्वतकें मारि देलनि", "ओकरा संग लऽ गेलाह"], a: 1, e: "हनुमान मैनाचकें केवल हाथ सँ स्पर्श केलनि आ कहलनि जे रामक काज केने बिना हमरा विश्राम नहि अछि।" },
                    { q: "देवता सभ हनुमानक बल आ बुद्धिक परीक्षा लेबाक लेल ककरा पठेल्क?", o: ["पूतना", "सुरसा (नागमाता)", "ताड़का", "सिंहिका"], a: 1, e: "देवता सभ सुरसा (जे नागसभक माता छलीह) कें पठेल्क जाहि सँ हनुमानक बुद्धिक परीक्षा लेल जा सकय।" },
                    { q: "सुरसा हनुमानकें खएबाक लेल जखन अपन मुँह पैघ केलक, तखन हनुमान की केलनि?", o: ["हनुमान सेहो अपन शरीर सुरसा सँ दू-गुना पैघ कऽ लेलनि", "हनुमान भागि गेलाह", "हनुमान रोबय लगलाह", "सुरसाकें मारि देलनि"], a: 0, e: "सुरसा जतेक योजन मुँह पसारैत छल, हनुमान ओकर दू-गुना पैघ शरीर कऽ लैत छलाह (जहिना सोलह, बत्तीस योजन)।" },
                    { q: "अन्तमे सुरसा सँ बचबाक लेल हनुमान कोन युक्ति अपनाओल?", o: ["अस्त्र सँ मारलनि", "अत्यन्त छोट रूप धऽ कऽ ओकर मुँहमे पसि कऽ तुरन्त बाहर आबि गेलाह", "रामक नाम लेलनि", "समुद्रमे डुबकी लगेलनि"], a: 1, e: "हनुमान मच्छर जकाँ छोट रूप धारण कऽ सुरसाक मुँहमे पसि कऽ तुरंत बाहर आबि गेलाह आ प्रणाम केलनि।" },
                    { q: "सुरसा हनुमानक बुद्धिकें देखि की देलक?", o: ["श्राप", "आशीर्वाद जे अहाँ रामक काज अवश्य पूर्ण करब", "धन", "अस्त्र"], a: 1, e: "सुरसा प्रसन्न भऽ कऽ आशीर्वाद देलक जे अहाँ बल आ बुद्धिमे निपुण छी, रामक काज अवश्य सिद्ध करब।" },
                    { q: "सुरसाक बाद मार्गमे हनुमानकें कोन दोसर राक्षसी सँ भेट भेल जे आकाशमे उड़ैत पक्षीक परछाईं पकड़ैत छल?", o: ["त्रिजटा", "सिंहिका", "लंकिनी", "मन्दोदरी"], a: 1, e: "सिंहिका नाम राछसी जलमे रहैत छल आ आकाशमे उड़ैत जीवक परछाईं पकड़ि कऽ ओकरा खा जाइत छल।" },
                    { q: "सिंहिका जखन हनुमानक परछाईं पकड़लक तँ की भेल?", o: ["हनुमानक गती रुकि गेल", "हनुमान तेज दौड़लाह", "हनुमान गिर पड़लाह", "किछु नहि भेल"], a: 0, e: "परछाईं पकड़ाइल सँ हनुमानकें लागल जेना कोनो जहाजक गती रुकि गेल होय, ओ अचम्भित भऽ गेलाह।" },
                    { q: "हनुमान सिंहिकाक वध कोना केलनि?", o: ["बाण मारि कऽ", "छोट रूप धऽ कऽ ओकर पेटमे पसि कऽ ओकर अँतड़ी (हृदय) फाड़ि देलनि", "पर्वत खसा कऽ", "आगि लगा कऽ"], a: 1, e: "जखन सिंहिका मुँह फड़लक, हनुमान छोट रूप धऽ पेटमे पसि गेलाह आ ओकर हृदय फाड़ि कऽ मारि देलनि।" },
                    { q: "चन्दा झाक रामायणमे सिंहिका वधक बाद देवता सभ आकाश सँ की केलनि?", o: ["पुष्प वृष्टि कऽ हनुमानक जय-जयकार केलनि", "विरोध केलनि", "इन्द्रकें बजेलनि", "युद्ध केलनि"], a: 0, e: "सिंहिका जकाँ पापिनीक वध भेला पर आकाश सँ देवता सभ फूलक वर्षा केलनि।" },

                    expDiv.id = 'exp-' + qId;
                    expDiv.className = 'explanation';
                    expDiv.innerHTML = `<strong>व्याख्या:</strong> ${qObj.e}`;
                    qBlock.appendChild(expDiv);

                    contentDiv.appendChild(qBlock);
                });

                // 4. Submit Section
                const submitSection = document.createElement('div');
                submitSection.className = 'submit-section';
                
                const submitBtn = document.createElement('button');
                submitBtn.className = 'submit-btn';
                submitBtn.innerText = 'Evaluate / Submit ' + tab.title.split(':')[0];
                submitBtn.onclick = () => showTabScore(tabId);
                
                const resultDiv = document.createElement('div');
                resultDiv.id = 'result-' + tabId;
                resultDiv.className = 'result-score';

                submitSection.appendChild(submitBtn);
                submitSection.appendChild(resultDiv);
                contentDiv.appendChild(submitSection);

                tabsBody.appendChild(contentDiv);
            });

            // Logic Functions
            window.openTab = function(evt, tabId) {
                const contents = document.getElementsByClassName("tab-content");
                for (let i = 0; i < contents.length; i++) {
                    contents[i].style.display = "none";
                }
                const btns = document.getElementsByClassName("tab-btn");
                for (let i = 0; i < btns.length; i++) {
                    btns[i].className = btns[i].className.replace(" active", "");
                }
                document.getElementById(tabId).style.display = "block";
                evt.currentTarget.className += " active";
            };

            window.evaluateAnswer = function(radioBtn, qId, isCorrect, tabId) {
                if (tabState[tabId].answered.includes(qId)) return;
                tabState[tabId].answered.push(qId);

                const questionBlock = document.getElementById(qId);
                const labels = questionBlock.querySelectorAll('.option-label');
                const explanation = document.getElementById('exp-' + qId);

                labels.forEach(label => {
                    label.classList.add('disabled-option');
                    const input = label.querySelector('input');
                    input.disabled = true;
                    if(input.value === 'correct') {
                        label.classList.add('correct-ans');
                    }
                });

                const clickedLabel = radioBtn.parentElement;
                if (isCorrect) {
                    tabState[tabId].score++;
                } else {
                    clickedLabel.classList.add('incorrect-ans');
                }

                explanation.style.display = 'block';
            };

            window.showTabScore = function(tabId) {
                const resultDiv = document.getElementById('result-' + tabId);
                const state = tabState[tabId];
                
                if(state.answered.length < state.total) {
                    resultDiv.innerHTML = "कृपया एहि भागक सबहि प्रश्नक उत्तर दिअ।";
                    resultDiv.style.color = "#dc3545";
                } else {
                    resultDiv.innerHTML = `एहि भागमे अहाँक प्राप्तांक: ${state.score} / ${state.total}`;
                    resultDiv.style.color = "#000080";
                }
            };
        });
    </script>
</body>
</html>
