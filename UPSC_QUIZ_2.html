    const container = document.getElementById('questionsContainer');
    container.innerHTML = '';
    QUESTIONS.forEach((q, idx) => {
      const card = document.createElement('div');
      card.className = 'question-card';
      if (submitted) {
        const selected = userAnswers[idx];
        const isCorrect = (selected === q.correct);
        if (isCorrect) card.classList.add('correct-highlight');
        else if (selected !== null && selected !== q.correct) card.classList.add('wrong-highlight');
      }
      const qHeader = document.createElement('div');
      qHeader.className = 'question-text';
      qHeader.innerHTML = `<span class="q-num">${idx+1}</span> <span>${q.text}</span>`;
      const optionsDiv = document.createElement('div');
      optionsDiv.className = 'options';
      q.options.forEach((opt, optIdx) => {
        const radId = `q${idx}_opt${optIdx}`;
        const isChecked = (userAnswers[idx] === optIdx);
        const radio = document.createElement('input');
        radio.type = 'radio';
        radio.name = `q${idx}`;
        radio.value = optIdx;
        radio.id = radId;
        radio.disabled = submitted;
        if (isChecked) radio.checked = true;
        radio.addEventListener('change', (e) => {
          if (!submitted) {
            userAnswers[idx] = parseInt(e.target.value);
            updateScoreDisplay();
          }
        });
        const label = document.createElement('label');
        label.htmlFor = radId;
        label.innerText = opt;
        const optionWrap = document.createElement('div');
        optionWrap.className = 'option';
        optionWrap.appendChild(radio);
        optionWrap.appendChild(label);
        optionsDiv.appendChild(optionWrap);
      });
      card.appendChild(qHeader);
      card.appendChild(optionsDiv);
      if (submitted && userAnswers[idx] !== null && userAnswers[idx] !== q.correct) {
        const feed = document.createElement('div');
        feed.className = 'feedback';
        feed.innerHTML = `✅ सही उत्तर: ${q.options[q.correct]}`;
        card.appendChild(feed);
      } else if (submitted && userAnswers[idx] === null) {
        const feed = document.createElement('div');
        feed.className = 'feedback';
        feed.innerHTML = `⚠️ कोनो उत्तर नै देल गेल (सही: ${q.options[q.correct]})`;
        card.appendChild(feed);
      }
      container.appendChild(card);
    });
  }
  
  function updateScoreDisplay() {
    if (!submitted) {
      const answeredCount = userAnswers.filter(a => a !== null).length;
      document.getElementById('scoreDisplay').innerText = `${answeredCount} / ${QUESTIONS.length}`;
    } else {
      let correct = 0;
      for (let i = 0; i < QUESTIONS.length; i++) {
        if (userAnswers[i] !== null && userAnswers[i] === QUESTIONS[i].correct) correct++;
      }
      document.getElementById('scoreDisplay').innerHTML = `${correct} / ${QUESTIONS.length} 🏆`;
    }
  }
  
  function submitQuiz() {
    submitted = true;
    renderQuestions();
    let correctCount = 0;
    for (let i=0; i<QUESTIONS.length; i++) {
      if (userAnswers[i] !== null && userAnswers[i] === QUESTIONS[i].correct) correctCount++;
    }
    document.getElementById('scoreDisplay').innerHTML = `${correctCount} / ${QUESTIONS.length} ✨`;
    const subBtn = document.getElementById('submitBtn');
    subBtn.disabled = true;
    subBtn.style.opacity = '0.6';
  }
  
  function resetQuiz() {
    submitted = false;
    userAnswers = new Array(QUESTIONS.length).fill(null);
    const subBtn = document.getElementById('submitBtn');
    subBtn.disabled = false;
    subBtn.style.opacity = '1';
    renderQuestions();
    updateScoreDisplay();
  }
  
  document.getElementById('submitBtn').addEventListener('click', submitQuiz);
  document.getElementById('resetBtn').addEventListener('click', resetQuiz);
  renderQuestions();
  updateScoreDisplay();

</script><a class="vq-back" href="../videha-elearning.htm">&larr; विदेह ई-लर्निङ्ग हब पर वापस जाउ</a>
