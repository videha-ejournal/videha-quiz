            options: ["राजतरंगिणी", "सर्वदेश वृत्तांत संग्रह", "अकबर विजय", "मिथिला महात्म्य"],
            correct: 1

        {

            options: ["रामेश्वर सिंह", "लक्ष्मीश्वर सिंह", "कामेश्वर सिंह", "प्रताप सिंह"],
            correct: 1
        }
    ];

    // ---------- DOM elements ----------
    let questionsContainer = document.getElementById("questionsContainer");
    let submitBtn = document.getElementById("submitBtn");
    let resetBtn = document.getElementById("resetBtn");
    let scoreDisplay = document.getElementById("scoreDisplay");
    let feedbackMsg = document.getElementById("feedbackMsg");

    // store selected answers (array of selected indices, -1 = not selected)
    let userSelections = new Array(questions.length).fill(-1);

    // render all questions
    function renderQuiz() {
        if (!questionsContainer) return;
        let html = "";
        questions.forEach((q, idx) => {
            let qNumber = idx + 1;
            html += `<div class="question-card" data-qidx="${idx}">
                        <div class="question-text">${qNumber}. ${q.text}</div>
                        <div class="options">`;
            q.options.forEach((opt, optIdx) => {
                let isChecked = (userSelections[idx] === optIdx);
                let checkedAttr = isChecked ? 'checked' : '';
                html += `<div class="option" data-qidx="${idx}" data-optidx="${optIdx}">
                            <input type="radio" name="q${idx}" id="q${idx}_opt${optIdx}" value="${optIdx}" ${checkedAttr}>
                            <label for="q${idx}_opt${optIdx}">${opt}</label>
                        </div>`;
            });
            html += `</div></div>`;
        });
        questionsContainer.innerHTML = html;

        // attach event listeners to each option div for better UX
        document.querySelectorAll('.option').forEach(optDiv => {
            const radio = optDiv.querySelector('input[type="radio"]');
            if (radio) {
                radio.addEventListener('change', (e) => {
                    e.stopPropagation();
                    const qIdx = parseInt(optDiv.dataset.qidx);
                    const optIdx = parseInt(optDiv.dataset.optidx);
                    if (!isNaN(qIdx) && !isNaN(optIdx) && radio.checked) {
                        userSelections[qIdx] = optIdx;
                    }
                });
            }
            // click on div also triggers radio
            optDiv.addEventListener('click', (e) => {
                const radioInput = optDiv.querySelector('input[type="radio"]');
                if (radioInput && !radioInput.checked) {
                    radioInput.checked = true;
                    const qIdx = parseInt(optDiv.dataset.qidx);
                    const optIdx = parseInt(optDiv.dataset.optidx);
                    if (!isNaN(qIdx) && !isNaN(optIdx)) {
                        userSelections[qIdx] = optIdx;
                        // trigger change event for consistency
                        const changeEvent = new Event('change', { bubbles: true });
                        radioInput.dispatchEvent(changeEvent);
                    }
                }
            });
        });
    }

    // calculate score and show result with correct/wrong feedback (optional highlight)
    function checkAnswers() {
        let score = 0;
        let resultsHtml = "";
        for (let i = 0; i < questions.length; i++) {
            const selected = userSelections[i];
            const correctIdx = questions[i].correct;
            const isCorrect = (selected === correctIdx);
            if (isCorrect) score++;
            // build per-question status for feedback modal? Instead we show total score with message.
        }
        // display score
        scoreDisplay.innerHTML = `✨ आपक स्कोर : ${score} / ${questions.length} ✨`;
        if (score === questions.length) {
            feedbackMsg.innerHTML = "🎉 उत्तम ! आप खण्डवला वंशक विशेषज्ञ छी । 🎉";
            feedbackMsg.style.color = "#1f6d2b";
        } else if (score >= 11) {
            feedbackMsg.innerHTML = "📚 बहुत नीक ! थोड़क अध्ययन आवश्यक, मुदा आप इतिहासप्रेमी छी ।";
            feedbackMsg.style.color = "#b45f1b";
        } else if (score >= 7) {
            feedbackMsg.innerHTML = "📖 ठीक अछि, पुनः प्रयास करू आ अधिक जानकारी जमा करू ।";
            feedbackMsg.style.color = "#b45f1b";
        } else {
            feedbackMsg.innerHTML = "📜 पुनः प्रयास करू, खण्डवला वंशक इतिहास रोचक अछि, अध्ययन करू ।";
            feedbackMsg.style.color = "#a1311b";
        }
        // highlight correct count and give subtle remark
        // additional: scroll to score
        scoreDisplay.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    // reset all selections and clear feedback, re-render
    function resetQuiz() {
        userSelections.fill(-1);
        renderQuiz();
        scoreDisplay.innerHTML = "📌 उत्तर चुनू आ 'उत्तर जाँच करू' पर क्लिक करू ।";
        feedbackMsg.innerHTML = "";
        feedbackMsg.style.color = "#2d5e2c";
    }

    // Initial render
    renderQuiz();
    scoreDisplay.innerHTML = "📌 उत्तर चुनू आ 'उत्तर जाँच करू' पर क्लिक करू ।";

    // Event listeners
    if (submitBtn) submitBtn.addEventListener("click", checkAnswers);
    if (resetBtn) resetBtn.addEventListener("click", resetQuiz);

    // optional: update userSelections if any radio already pre-selected (but initial all -1)
    function syncSelectionsFromDOM() {
        for (let i = 0; i < questions.length; i++) {
            const selectedRadio = document.querySelector(`input[name="q${i}"]:checked`);
            if (selectedRadio) {
                const val = parseInt(selectedRadio.value);
                if (!isNaN(val)) userSelections[i] = val;
            } else {
                userSelections[i] = -1;
            }
        }
    }
    // sync before submit
    if (submitBtn) {
        submitBtn.addEventListener("click", () => {
            syncSelectionsFromDOM();
            checkAnswers();
        });
    }
    // sync on reset also already reset
    window.syncSelectionsFromDOM = syncSelectionsFromDOM;
