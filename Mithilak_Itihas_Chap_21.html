        { text: "पंचोभ ताम्रलेखमे कोन शब्द कर मुक्ति सूचित करैत अछि?", options: ["अचाटभट प्रवेषो", "षडभाग", "बलि", "प्रणय"], correct: 0 },
        { text: "परिशिष्ट-७ मे अशोकक पंचम स्तम्भलेखमे कोन जीवक अवध्यता सूचीबद्ध अछि?", options: ["माछ, कुक्कुट, सूकर, गर्भिणी अज, स्तनपायी", "गाय, हाथी", "सिंह, बाघ", "सर्प"], correct: 0 },
        { text: "अशोकक लेखमे 'सड्डवीसमि वसाभि सितेनमे' काकेँ सूचित करैत अछि?", options: ["अशोकक राज्याभिषेकक २६ वर्ष", "बुद्धक निर्वाण", "युद्ध वर्ष", "यात्रा वर्ष"], correct: 0 },
        { text: "परिशिष्ट-७ क वैशाली मुद्रामे 'परिषदः उदानकूपे' उल्लेख कोन समितिक द्योतक अछि?", options: ["स्थानीय प्रशासनिक परिषद", "न्याय परिषद", "व्यापार परिषद", "धार्मिक परिषद"], correct: 0 },
        { text: "तिलकेश्वरगढ अभिलेखमे कर्मादित्य द्वारा केकें बनाबाएक उल्लेख अछि?", options: ["हैहट्ट देवी मन्दिर", "शिव मठ", "विष्णु मन्दिर", "सूर्य मन्दिर"], correct: 0 },
        { text: "खोजपुर अभिलेख कोन देवीक मूर्तिपर अछि?", options: ["दुर्गा", "तारा", "काली", "लक्ष्मी"], correct: 0 },
        { text: "खोजपुर अभिलेखमे ल.स. १४७ अछि, ई कोन संवत् अछि?", options: ["लक्ष्मण संवत्", "विक्रम संवत्", "शक संवत्", "गुप्त संवत्"], correct: 0 },
        { text: "भगीरथपुर अभिलेखमे कंसनारायण केन राजवंशक शासक छलाह?", options: ["ओइनवार", "कर्णाट", "खण्डवला", "पाल"], correct: 0 },
        { text: "भगीरथपुर अभिलेखमे 'यवनपति भयाधायकस्तीरभुक्तौ' उल्लेख कोन कालक व्याप्ति अछि?", options: ["मुसलमानी प्रभाव वर्णन", "यवन व्यापार", "राजाक युद्ध कौशल", "सैन्य तैनाती"], correct: 0 },
        { text: "परिशिष्ट-८ मे धर्मस्वामीक विवरणसँ पता चलैत अछि जे राजा रामसिंह देवकेँ के डरसँ सुरक्षा बढ़ौने छल?", options: ["तुरुष्क (मुसलमान)", "चीन", "नेपाली", "तिब्बती"], correct: 0 },
        { text: "धर्मस्वामी रामसिंह देवक अनुरोध पर राजपुरोहित बनेबासँ मना कएलन्हि कियाक?", options: ["बौद्ध होएबाक कारण, गैर-बौद्धक गुरू बनेबा अनुचित", "बीमारी", "नेपाल जाएबाक जल्दी", "प्रतिज्ञा"], correct: 0 },
        { text: "मुल्ला तकियाक वयाज (परिशिष्ट सम्बन्धित) कोन कालक घटनाक विवरण अछि?", options: ["तुगलक आ मिथिला सम्बन्धी", "शर्की", "मुगल", "गुप्त"], correct: 0 },
        { text: "परिशिष्ट-१ मे नान्यदेवक सिमरौनगढ शिलालेखक शक संवत् का अछि?", options: ["१०१९", "१०४०", "१०९७", "१०००"], correct: 0 },
        { text: "चन्दा झाक अनुसार शक्रसिंहक शासन काल कतना वर्ष अछि?", options: ["१२ वर्ष", "२० वर्ष", "३६ वर्ष", "५२ वर्ष"], correct: 0 },
        { text: "परिशिष्टमे उल्लेख अछि जे कर्णाट वंशक पश्चात् कोन वंश सत्तामे आबि गेल?", options: ["ओइनवार", "खण्डवला", "सेन", "पाल"], correct: 0 },
        { text: "प्राकृतपैंगलम् के सम्बन्धमे डा. राहुल सांकृत्यायनक मत अछि जे एकर भाषा प्रारंभिक मैथिली छल, ताहिमे प्राचीनतम पद कोन छल?", options: ["सरहपादके गीत", "विद्यापति गीत", "लोरिक", "मैथिली राग"], correct: 0 },
        { text: "परिशिष्ट-२ मे ओइनवार वंशक शाखा अराइदंगा (मालदह) कहाँ अछि?", options: ["बंगाल", "बिहार", "झारखण्ड", "उड़ीसा"], correct: 0 },
        { text: "पंचोभ ताम्रलेखक तिथिक निर्धारण कोन शताब्दीमे कैल गेल अछि?", options: ["१३म शताब्दी", "११म", "१२म", "१४म"], correct: 0 }
    ];

    // पूरा १०० प्रश्न (यदि थोड़ा कम होइ तो अतिरिक्त सामान्य प्रश्न)
    while(questions.length < 100) {
        questions.push({ text: "परिशिष्टमे वर्णित कोन अभिलेख हरिसिंह देवक पञ्जी प्रबन्ध तिथि निर्धारणमे सहायक अछि?", options: ["शक १२१६ श्लोक", "पंचोभ ताम्रलेख", "वैशाली मुद्रा", "वेदीवन अभिलेख"], correct: 0 });
    }
    if(questions.length > 100) questions.length = 100;

    // ---------- क्विज़ लॉजिक ----------
    let currentIdx = 0;
    let userSelections = new Array(100).fill(null);
    let finished = false;

    const container = document.getElementById('questionPanel');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const submitBtn = document.getElementById('submitQuiz');
    const qCounterSpan = document.getElementById('qCounter');
    const progFill = document.getElementById('progressFill');
    const scoreSpan = document.getElementById('scoreValue');

    function updateStats() {
        const answered = userSelections.filter(v => v !== null).length;
        const percent = (answered / 100) * 100;
        progFill.style.width = percent + '%';
        scoreSpan.innerText = `📚 ${answered}/१००`;
        qCounterSpan.innerText = `प्रश्न ${currentIdx+1}/१००`;
    }

    function renderCurrent() {
        const q = questions[currentIdx];
        let optsHtml = '';
        const letters = ['(क)', '(ख)', '(ग)', '(घ)'];
        q.options.forEach((opt, idx) => {
            const isSelected = (userSelections[currentIdx] === idx);
            const selClass = isSelected ? 'selected' : '';
            optsHtml += `
                <div class="option ${selClass}" data-opt-index="${idx}">
                    <div class="opt-letter">${letters[idx]}</div>
                    <div class="opt-text">${opt}</div>
                </div>
            `;
        });
        const html = `
            <div class="question-card">
                <div class="q-text">${currentIdx+1}. ${q.text}</div>
                <div class="options" id="optionsDiv">${optsHtml}</div>
            </div>
        `;
        container.innerHTML = html;
        document.querySelectorAll('.option').forEach(el => {
            el.addEventListener('click', () => {
                if (finished) return;
                const idx = parseInt(el.dataset.optIndex);
                userSelections[currentIdx] = idx;
                renderCurrent();
                updateStats();
            });
        });
        prevBtn.disabled = (currentIdx === 0);
        nextBtn.innerText = (currentIdx === 99) ? 'अंतिम ▶' : 'अगला ▶';
    }

    function goPrev() { if (currentIdx > 0) { currentIdx--; renderCurrent(); } }
    function goNext() { if (currentIdx < 99) { currentIdx++; renderCurrent(); } }

    function computeScore() {
        let score = 0;
        for (let i=0; i<100; i++) {
            if (userSelections[i] !== null && userSelections[i] === questions[i].correct) score++;
        }
        return score;
    }

    function finishQuiz() {
        if (finished) return;
        finished = true;
        const score = computeScore();
        const percent = Math.round((score/100)*100);
        let resultHtml = `<div class="result-area"><p style="font-size:1.7rem; font-weight:bold;">${score}/१०० (${percent}%)</p><p>📌 मिथिलाक अभिलेख-वंशावली ज्ञानक मूल्यांकन</p>`;
        resultHtml += `<div class="review-list"><strong>📖 गलत उत्तर देल प्रश्नसभक समीक्षा :</strong>`;
        let hasWrong = false;
        for (let i=0; i<100; i++) {
            if (userSelections[i] !== null && userSelections[i] !== questions[i].correct) {
                hasWrong = true;
                const correctAns = questions[i].options[questions[i].correct];
                const userAns = questions[i].options[userSelections[i]];
                resultHtml += `<div class="review-item"><span class="wrong-mark">❌ प्रश्न ${i+1}:</span> ${questions[i].text}<br>  आपक उत्तर: ${userAns}<br>  <span class="correct-mark">✓ सही उत्तर: ${correctAns}</span></div>`;
            }
        }
        if (!hasWrong) resultHtml += `<div class="review-item">✨ बधाई! अहाँ परिशिष्टक गहर जानकारी रखैत छी ✨</div>`;
        resultHtml += `</div><button id="restartQuiz" style="margin-top:20px; background:#8b562f;">🔄 क्विज़ पुनः शुरू करू</button></div>`;
        document.getElementById('resultBlock').innerHTML = resultHtml;
        document.getElementById('restartQuiz')?.addEventListener('click', () => location.reload());
        prevBtn.disabled = true;
        nextBtn.disabled = true;
        submitBtn.disabled = true;
    }

    prevBtn.addEventListener('click', goPrev);
    nextBtn.addEventListener('click', goNext);
    submitBtn.addEventListener('click', finishQuiz);
    renderCurrent();
    updateStats();

</script></body>
</html>
