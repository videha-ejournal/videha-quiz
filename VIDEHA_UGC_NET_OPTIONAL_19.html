"९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "मोहन भारद्वाजक मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["मैथिली गद्य, हास्य-व्यंग्य, सामाजिक आलोचना आ बोलचालक सहजता केँ लोकप्रिय बनौनिहार", "केवल विदेशी यात्रावृत्तक अनुवाद", "समकालीन साहित्यक चयन, आलोचना, पाठकीय दिशा आ विधागत मूल्यांकनमे योगदान", "रचनाक मूल्यांकन, मानदण्ड, साहित्यिक अनुशासन आ विवेचन-पद्धति केँ बल देनिहार"], "answer": "समकालीन साहित्यक चयन, आलोचना, पाठकीय दिशा आ विधागत मूल्यांकनमे योगदान", "explanation": "मोहन भारद्वाजक अध्ययनमे मुख्य बात समकालीन साहित्यक चयन, आलोचना, पाठकीय दिशा आ विधागत मूल्यांकनमे योगदान अछि; एहि कारण हुनका समकालीन साहित्य-विमर्श सँ जोड़ल जाएत अछि।"}, {"id": 882, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "मोहन भारद्वाजक संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["समकालीन मैथिली कविता सम्बन्धी संपादन/विमर्श", "पारिजात-हरण परम्परा", "राजमोहन झाक साहित्य-विमर्श", "दत्त-वती"], "answer": "समकालीन मैथिली कविता सम्बन्धी संपादन/विमर्श", "explanation": "मोहन भारद्वाजक सन्दर्भमे समकालीन मैथिली कविता सम्बन्धी संपादन/विमर्श महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ समकालीन साहित्य-विमर्श स्पष्ट होइत अछि।"}, {"id": 883, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "मोहन भारद्वाज केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["व्यंग्य", "आलोचना, संपादन आ साहित्यिक विमर्श", "कथा-उपन्यास", "प्रबन्ध-काव्य"], "answer": "आलोचना, संपादन आ साहित्यिक विमर्श", "explanation": "आलोचना, संपादन आ साहित्यिक विमर्श मोहन भारद्वाजक रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 884, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "कालक्रमक दृष्टिसँ मोहन भारद्वाजक साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["नेपालक मध्यकालीन मैथिली नाटक", "आधुनिक समालोचना", "समकालीन आलोचना आ संपादन", "आधुनिक मैथिली नवजागरण"], "answer": "समकालीन आलोचना आ संपादन", "explanation": "मोहन भारद्वाजक योगदान समकालीन आलोचना आ संपादनक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 885, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "मोहन भारद्वाजक रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["समकालीनता, आलोचनात्मक संतुलन, संपादकीय दृष्टि आ विधा-चेतना", "ऐतिहासिक दृष्टि", "केवल खेतीक माप-जोखक तालिका", "केवल वैद्यकीय नुस्खाक संग्रह"], "answer": "समकालीनता, आलोचनात्मक संतुलन, संपादकीय दृष्टि आ विधा-चेतना", "explanation": "समकालीनता, आलोचनात्मक संतुलन, संपादकीय दृष्टि आ विधा-चेतना मोहन भारद्वाजक साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 886, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "मोहन भारद्वाज पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["रंगमंच", "शृङ्गार आ भक्ति", "समकालीन साहित्य-विमर्श", "छन्द-विधान"], "answer": "समकालीन साहित्य-विमर्श", "explanation": "मोहन भारद्वाजक योगदानक सार समकालीन साहित्य-विमर्श मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 887, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "मोहन भारद्वाजक योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका केवल गणना-पद्धति बनौल", "कारण हुनका मंच, भाषा वा रचना-संवेदना सँ कोनो सम्बन्ध नहि छल", "कारण हुनका केवल राजकीय कर-सूची लिखल", "कारण हुनका माध्यमेँ समकालीन साहित्य-विमर्श केँ बल भेटल"], "answer": "कारण हुनका माध्यमेँ समकालीन साहित्य-विमर्श केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे मोहन भारद्वाजक योगदान समकालीन साहित्य-विमर्श केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 888, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "मोहन भारद्वाजक नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["साहित्यिक विधा छोड़ि केवल वंशावली पढ़ब", "केवल नाम रटि छोड़ि देब", "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "केवल शहरक नाम खोजब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "मोहन भारद्वाज केँ बुझबाक लेल समकालीन मैथिली कविता सम्बन्धी संपादन/विमर्श, आलोचना, संपादन आ साहित्यिक विमर्श आ समकालीन साहित्यक चयन, आलोचना, पाठकीय दिशा आ विधागत मूल्यांकनमे योगदान केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 889, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "मोहन भारद्वाजक रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक काजमे भाषा वा समाजक प्रश्न नै अछि", "हुनक लेखन केवल प्रशासनिक परिपत्र अछि", "हुनक रचना केवल खगोल-गणना पर सीमित अछि", "हुनक लेखन आलोचना, संपादन आ साहित्यिक विमर्श मार्फत समकालीन साहित्य-विमर्श केँ उभारैत अछि"], "answer": "हुनक लेखन आलोचना, संपादन आ साहित्यिक विमर्श मार्फत समकालीन साहित्य-विमर्श केँ उभारैत अछि", "explanation": "मोहन भारद्वाजक विधागत पहचान आलोचना, संपादन आ साहित्यिक विमर्श अछि, आ ओहिसँ समकालीन साहित्य-विमर्शक बोध प्रबल होइत अछि।"}, {"id": 890, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "मोहन भारद्वाजक योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "केवल बाहरी भाषा सीखबाक लेल", "केवल मनोरंजनक नाम-सूची बनबाक लेल", "केवल मुद्रकक नाम याद रखबाक लेल"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "मोहन भारद्वाजक भूमिका समकालीन आलोचना आ संपादन आ समकालीन साहित्य-विमर्शक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 891, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "मोहन भारद्वाजक साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["लयात्मकता", "समकालीन साहित्य-विमर्श", "मंचीय संवाद", "स्त्री-अनुभव"], "answer": "समकालीन साहित्य-विमर्श", "explanation": "एहि लेखक/कविक साहित्यिक स्वर समकालीन साहित्य-विमर्शसँ चिन्हित कएल जा सकैत अछि।"}, {"id": 892, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "मोहन भारद्वाजक सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["मोहन भारद्वाज — कृति राजकमल", "मोहन भारद्वाज — श्रीशक साहित्यिक योगदान", "मोहन भारद्वाज — समकालीन मैथिली कविता सम्बन्धी संपादन/विमर्श", "मोहन भारद्वाज — मोहनक मुक्तक-काव्य"], "answer": "मोहन भारद्वाज — समकालीन मैथिली कविता सम्बन्धी संपादन/विमर्श", "explanation": "ठीक जोड़ी मोहन भारद्वाज — समकालीन मैथिली कविता सम्बन्धी संपादन/विमर्श अछि।"}, {"id": 893, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "मोहन भारद्वाजक साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["केवल मौन अभिनय बिना भाषा", "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "भाषा-संवेदना सँ असम्बद्धता", "केवल अंकीय संकेतक प्रयोग"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "मोहन भारद्वाजक रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ आलोचना, संपादन आ साहित्यिक विमर्शक माध्यमेँ बढ़बैत अछि।"}, {"id": 894, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "मोहन भारद्वाज पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["समकालीन साहित्यक चयन, आलोचना, पाठकीय दिशा आ विधागत मूल्यांकनमे योगदान", "केवल पञ्चाङ्गक गणना", "ऐतिहासिक दृष्टि", "लोकभाषाक सहजता"], "answer": "समकालीन साहित्यक चयन, आलोचना, पाठकीय दिशा आ विधागत मूल्यांकनमे योगदान", "explanation": "समकालीन साहित्यक चयन, आलोचना, पाठकीय दिशा आ विधागत मूल्यांकनमे योगदान केँ छोड़ला सँ मोहन भारद्वाजक मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 895, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "मोहन भारद्वाजक अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["केवल पृष्ठ-संख्याक आधार पर", "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "केवल नामक वर्णक्रमसँ", "केवल छपाईक आकार देखि"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "मोहन भारद्वाजक योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 896, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "मोहन भारद्वाजक साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["जनपक्षधरता", "समकालीन साहित्य-विमर्श", "केवल पञ्चाङ्गक गणना", "सामाजिक यथार्थ"], "answer": "समकालीन साहित्य-विमर्श", "explanation": "मोहन भारद्वाजक छवि समकालीन साहित्य-विमर्श केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 897, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "मोहन भारद्वाजक प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["प्रशासन, सैनिक आदेश आ दफ्तर", "आलोचना, संपादन आ साहित्यिक विमर्श, समकालीन साहित्य-विमर्श आ समकालीनता, आलोचनात्मक संतुलन, संपादकीय दृष्टि आ विधा-चेतना", "कर-सूची, नाप-जोख आ बाजार-भाव", "खगोल-गणना, मौसम-तालिका आ नुस्खा"], "answer": "आलोचना, संपादन आ साहित्यिक विमर्श, समकालीन साहित्य-विमर्श आ समकालीनता, आलोचनात्मक संतुलन, संपादकीय दृष्टि आ विधा-चेतना", "explanation": "एहि शब्द-समूहमे मोहन भारद्वाजक विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 898, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "मोहन भारद्वाजक रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["रचना-परम्परा टूटि गेल", "साहित्यिक विधा समाप्त भऽ गेल", "समकालीन साहित्य-विमर्शक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "लोक-संवेदना पूर्णतः हटि गेल"], "answer": "समकालीन साहित्य-विमर्शक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "मोहन भारद्वाजक काजसँ समकालीन साहित्य-विमर्शमे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 899, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "मोहन भारद्वाजक योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे", "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "केवल रसायनिक सूत्रक प्रश्नमे", "केवल भूगोलक नक्शा बनाबयवला प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "मोहन भारद्वाजक योगदान समकालीन आलोचना आ संपादन आ आलोचना, संपादन आ साहित्यिक विमर्शक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 900, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "मोहन भारद्वाजक सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["मोहन भारद्वाज समकालीन आलोचना आ संपादनमे आलोचना, संपादन आ साहित्यिक विमर्श द्वारा समकालीन साहित्यक चयन, आलोचना, पाठकीय दिशा आ विधागत मूल्यांकनमे योगदान", "मोहन भारद्वाजक योगदान केवल व्यापारिक लेखामे सीमित रहल", "मोहन भारद्वाज केवल पञ्जी-लेखक छलाह, साहित्यिक योगदान नहि", "मोहन भारद्वाजक अध्ययनमे काल, विधा आ कृति अप्रासंगिक अछि"], "answer": "मोहन भारद्वाज समकालीन आलोचना आ संपादनमे आलोचना, संपादन आ साहित्यिक विमर्श द्वारा समकालीन साहित्यक चयन, आलोचना, पाठकीय दिशा आ विधागत मूल्यांकनमे योगदान", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 901, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "जयधारी सिंहक मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["मैथिली गद्यक प्राचीन आधार आ समाज-संस्कृतिक विस्तृत वर्णन", "रचनाक मूल्यांकन, मानदण्ड, साहित्यिक अनुशासन आ विवेचन-पद्धति केँ बल देनिहार", "मैथिली रंगमंचमे सामाजिक कथ्य, संवाद-शक्ति आ नाटकीय संरचनाक विस्तार देनिहार", "असमक भक्ति-नाट्य परम्परा, संगीत, अभिनय आ धर्म-प्रसारक नाट्यरूपसँ जुड़ल महत्त्वपूर्ण नाम"], "answer": "रचनाक मूल्यांकन, मानदण्ड, साहित्यिक अनुशासन आ विवेचन-पद्धति केँ बल देनिहार", "explanation": "जयधारी सिंहक अध्ययनमे मुख्य बात रचनाक मूल्यांकन, मानदण्ड, साहित्यिक अनुशासन आ विवेचन-पद्धति केँ बल देनिहार अछि; एहि कारण हुनका आलोचनात्मक पद्धति सँ जोड़ल जाएत अछि।"}, {"id": 902, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "जयधारी सिंहक संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["मैथिली आलोचना-परम्परा", "लोरिक-विजय", "कीचकवध", "चित्रा"], "answer": "मैथिली आलोचना-परम्परा", "explanation": "जयधारी सिंहक सन्दर्भमे मैथिली आलोचना-परम्परा महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ आलोचनात्मक पद्धति स्पष्ट होइत अछि।"}, {"id": 903, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "जयधारी सिंह केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["आलोचना आ साहित्यिक विवेचन", "कथा-उपन्यास", "व्यंग्य", "महाकाव्य"], "answer": "आलोचना आ साहित्यिक विवेचन", "explanation": "आलोचना आ साहित्यिक विवेचन जयधारी सिंहक रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 904, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "कालक्रमक दृष्टिसँ जयधारी सिंहक साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["उत्तर-विद्यापति पदावली परम्परा", "मध्यकालीन मैथिली साहित्य", "आधुनिक मैथिली समालोचना", "आधुनिक कथा-उपन्यास परम्परा"], "answer": "आधुनिक मैथिली समालोचना", "explanation": "जयधारी सिंहक योगदान आधुनिक मैथिली समालोचनाक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 905, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "जयधारी सिंहक रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["लयात्मकता", "प्रतीकात्मकता", "तर्क, प्रमाण, साहित्यिक मानदण्ड आ संतुलित निर्णय", "छन्द-सजगता"], "answer": "तर्क, प्रमाण, साहित्यिक मानदण्ड आ संतुलित निर्णय", "explanation": "तर्क, प्रमाण, साहित्यिक मानदण्ड आ संतुलित निर्णय जयधारी सिंहक साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 906, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "जयधारी सिंह पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["आलोचनात्मक पद्धति", "छन्द-विधान", "स्त्री-अनुभव", "अनुसंधान"], "answer": "आलोचनात्मक पद्धति", "explanation": "जयधारी सिंहक योगदानक सार आलोचनात्मक पद्धति मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 907, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "जयधारी सिंहक योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका साहित्यसँ सम्बन्ध नहि छल", "कारण हुनका माध्यमेँ आलोचनात्मक पद्धति केँ बल भेटल", "कारण हुनका केवल राजकीय कर-सूची लिखल", "कारण हुनका केवल गणना-पद्धति बनौल"], "answer": "कारण हुनका माध्यमेँ आलोचनात्मक पद्धति केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे जयधारी सिंहक योगदान आलोचनात्मक पद्धति केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 908, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "जयधारी सिंहक नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["साहित्यिक विधा छोड़ि केवल वंशावली पढ़ब", "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "केवल जन्म-वर्षक अनुमान करब", "केवल नाम रटि छोड़ि देब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "जयधारी सिंह केँ बुझबाक लेल मैथिली आलोचना-परम्परा, आलोचना आ साहित्यिक विवेचन आ रचनाक मूल्यांकन, मानदण्ड, साहित्यिक अनुशासन आ विवेचन-पद्धति केँ बल देनिहार केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 909, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "जयधारी सिंहक रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक योगदान साहित्यिक इतिहाससँ असम्बद्ध अछि", "हुनक काजमे भाषा वा समाजक प्रश्न नै अछि", "हुनक लेखन आलोचना आ साहित्यिक विवेचन मार्फत आलोचनात्मक पद्धति केँ उभारैत अछि", "हुनक रचना केवल खगोल-गणना पर सीमित अछि"], "answer": "हुनक लेखन आलोचना आ साहित्यिक विवेचन मार्फत आलोचनात्मक पद्धति केँ उभारैत अछि", "explanation": "जयधारी सिंहक विधागत पहचान आलोचना आ साहित्यिक विवेचन अछि, आ ओहिसँ आलोचनात्मक पद्धतिक बोध प्रबल होइत अछि।"}, {"id": 910, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "जयधारी सिंहक योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल मनोरंजनक नाम-सूची बनबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "केवल पृष्ठ-संख्या गिनबाक लेल", "केवल बाहरी भाषा सीखबाक लेल"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "जयधारी सिंहक भूमिका आधुनिक मैथिली समालोचना आ आलोचनात्मक पद्धतिक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 911, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "जयधारी सिंहक साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["लोकभाषाक सहजता", "सामाजिक यथार्थ", "आलोचनात्मक पद्धति", "छन्द-सजगता"], "answer": "आलोचनात्मक पद्धति", "explanation": "एहि लेखक/कविक साहित्यिक स्वर आलोचनात्मक पद्धतिसँ चिन्हित कएल जा सकैत अछि।"}, {"id": 912, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "जयधारी सिंहक सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["जयधारी सिंह — मैथिली आलोचना-परम्परा", "जयधारी सिंह — खट्टर ककाक तरंग", "जयधारी सिंह — समकालीन मैथिली कविता सम्बन्धी योगदान", "जयधारी सिंह — मैथिली कथा-परम्परा"], "answer": "जयधारी सिंह — मैथिली आलोचना-परम्परा", "explanation": "ठीक जोड़ी जयधारी सिंह — मैथिली आलोचना-परम्परा अछि।"}, {"id": 913, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "जयधारी सिंहक साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["मैथिलीक प्रयोगक पूर्ण अभाव", "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "केवल अंकीय संकेतक प्रयोग", "केवल मौन अभिनय बिना भाषा"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "जयधारी सिंहक रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ आलोचना आ साहित्यिक विवेचनक माध्यमेँ बढ़बैत अछि।"}, {"id": 914, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "जयधारी सिंह पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["रचनाक मूल्यांकन, मानदण्ड, साहित्यिक अनुशासन आ विवेचन-पद्धति केँ बल देनिहार", "केवल व्यावसायिक हिसाब-किताबक पुस्तिका", "केवल शिलालेखक तिथि-सूची", "पात्र-मनोविज्ञान"], "answer": "रचनाक मूल्यांकन, मानदण्ड, साहित्यिक अनुशासन आ विवेचन-पद्धति केँ बल देनिहार", "explanation": "रचनाक मूल्यांकन, मानदण्ड, साहित्यिक अनुशासन आ विवेचन-पद्धति केँ बल देनिहार केँ छोड़ला सँ जयधारी सिंहक मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 915, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "जयधारी सिंहक अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["केवल छपाईक आकार देखि", "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "केवल नामक वर्णक्रमसँ", "केवल पुरस्कार-सूची पढ़ि"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "जयधारी सिंहक योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 916, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "जयधारी सिंहक साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["आलोचनात्मक पद्धति", "केवल गणितीय सूत्रक व्याख्या", "लोकजीवन", "केवल वैद्यकीय नुस्खाक संग्रह"], "answer": "आलोचनात्मक पद्धति", "explanation": "जयधारी सिंहक छवि आलोचनात्मक पद्धति केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 917, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "जयधारी सिंहक प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["केवल अनुवाद, बिना मौलिकता आ बिना भाषा-चेतना", "प्रशासन, सैनिक आदेश आ दफ्तर", "कर-सूची, नाप-जोख आ बाजार-भाव", "आलोचना आ साहित्यिक विवेचन, आलोचनात्मक पद्धति आ तर्क, प्रमाण, साहित्यिक मानदण्ड आ संतुलित निर्णय"], "answer": "आलोचना आ साहित्यिक विवेचन, आलोचनात्मक पद्धति आ तर्क, प्रमाण, साहित्यिक मानदण्ड आ संतुलित निर्णय", "explanation": "एहि शब्द-समूहमे जयधारी सिंहक विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 918, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "जयधारी सिंहक रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["आलोचनात्मक पद्धतिक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "भाषाक प्रयोग घटि गेल", "रचना-परम्परा टूटि गेल", "लोक-संवेदना पूर्णतः हटि गेल"], "answer": "आलोचनात्मक पद्धतिक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "जयधारी सिंहक काजसँ आलोचनात्मक पद्धतिमे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 919, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "जयधारी सिंहक योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["केवल खेलक नियम याद करयवला प्रश्नमे", "केवल भूगोलक नक्शा बनाबयवला प्रश्नमे", "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "केवल रसायनिक सूत्रक प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "जयधारी सिंहक योगदान आधुनिक मैथिली समालोचना आ आलोचना आ साहित्यिक विवेचनक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 920, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "जयधारी सिंहक सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["जयधारी सिंहक योगदान केवल व्यापारिक लेखामे सीमित रहल", "जयधारी सिंह केवल पञ्जी-लेखक छलाह, साहित्यिक योगदान नहि", "जयधारी सिंहक मैथिली साहित्यसँ कोनो सम्बन्ध नहि", "जयधारी सिंह आधुनिक मैथिली समालोचनामे आलोचना आ साहित्यिक विवेचन द्वारा रचनाक मूल्यांकन, मानदण्ड, साहित्यिक अनुशासन आ विवेचन-पद्धति केँ बल देनिहार"], "answer": "जयधारी सिंह आधुनिक मैथिली समालोचनामे आलोचना आ साहित्यिक विवेचन द्वारा रचनाक मूल्यांकन, मानदण्ड, साहित्यिक अनुशासन आ विवेचन-पद्धति केँ बल देनिहार", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 921, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "प्रेमशंकर सिंहक मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["ग्राम्य-संस्कृति, लोक-संसार आ सामाजिक परिवर्तनक कथा-स्वर केँ बल देनिहार", "केवल विदेशी यात्रावृत्तक अनुवाद", "मैथिली साहित्यक आधुनिक मूल्यांकन, विचार-पक्ष आ आलोचना-भाषा केँ सुदृढ़ करनिहार", "मैथिली गद्यक प्राचीन आधार आ समाज-संस्कृतिक विस्तृत वर्णन"], "answer": "मैथिली साहित्यक आधुनिक मूल्यांकन, विचार-पक्ष आ आलोचना-भाषा केँ सुदृढ़ करनिहार", "explanation": "प्रेमशंकर सिंहक अध्ययनमे मुख्य बात मैथिली साहित्यक आधुनिक मूल्यांकन, विचार-पक्ष आ आलोचना-भाषा केँ सुदृढ़ करनिहार अछि; एहि कारण हुनका आधुनिक आलोचना-दृष्टि सँ जोड़ल जाएत अछि।"}, {"id": 922, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "प्रेमशंकर सिंहक संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["व्यापार-लेखा", "प्रेमशंकर सिंहक आलोचनात्मक योगदान", "राजमोहन झाक साहित्य-विमर्श", "रमेश्वरचरित मिथिला रामायण"], "answer": "प्रेमशंकर सिंहक आलोचनात्मक योगदान", "explanation": "प्रेमशंकर सिंहक सन्दर्भमे प्रेमशंकर सिंहक आलोचनात्मक योगदान महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ आधुनिक आलोचना-दृष्टि स्पष्ट होइत अछि।"}, {"id": 923, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "प्रेमशंकर सिंह केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["समालोचना", "समालोचना, निबन्ध आ साहित्य-चिन्तन", "महाकाव्य", "व्यंग्य"], "answer": "समालोचना, निबन्ध आ साहित्य-चिन्तन", "explanation": "समालोचना, निबन्ध आ साहित्य-चिन्तन प्रेमशंकर सिंहक रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 924, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "कालक्रमक दृष्टिसँ प्रेमशंकर सिंहक साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["आधुनिक आलोचना-विमर्श", "आधुनिक कथा-उपन्यास परम्परा", "आदिकाल/पूर्व-विद्यापति साहित्य", "मध्यकालीन मैथिली साहित्य"], "answer": "आधुनिक आलोचना-विमर्श", "explanation": "प्रेमशंकर सिंहक योगदान आधुनिक आलोचना-विमर्शक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 925, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "प्रेमशंकर सिंहक रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["केवल विदेशी यात्रावृत्तक अनुवाद", "मौखिक परम्परा", "छन्द-सजगता", "विचार-गहनता, पाठ-केन्द्रित दृष्टि, सामाजिकता आ विवेचन"], "answer": "विचार-गहनता, पाठ-केन्द्रित दृष्टि, सामाजिकता आ विवेचन", "explanation": "विचार-गहनता, पाठ-केन्द्रित दृष्टि, सामाजिकता आ विवेचन प्रेमशंकर सिंहक साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 926, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "प्रेमशंकर सिंह पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["गद्यक परिपक्वता", "आधुनिक आलोचना-दृष्टि", "अनुसंधान", "जनपक्षधरता"], "answer": "आधुनिक आलोचना-दृष्टि", "explanation": "प्रेमशंकर सिंहक योगदानक सार आधुनिक आलोचना-दृष्टि मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 927, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "प्रेमशंकर सिंहक योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका माध्यमेँ आधुनिक आलोचना-दृष्टि केँ बल भेटल", "कारण हुनका मंच, भाषा वा रचना-संवेदना सँ कोनो सम्बन्ध नहि छल", "कारण हुनका केवल राजकीय कर-सूची लिखल", "कारण हुनका केवल गणना-पद्धति बनौल"], "answer": "कारण हुनका माध्यमेँ आधुनिक आलोचना-दृष्टि केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे प्रेमशंकर सिंहक योगदान आधुनिक आलोचना-दृष्टि केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 928, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "प्रेमशंकर सिंहक नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "केवल शहरक नाम खोजब", "साहित्यिक विधा छोड़ि केवल वंशावली पढ़ब", "केवल जन्म-वर्षक अनुमान करब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "प्रेमशंकर सिंह केँ बुझबाक लेल प्रेमशंकर सिंहक आलोचनात्मक योगदान, समालोचना, निबन्ध आ साहित्य-चिन्तन आ मैथिली साहित्यक आधुनिक मूल्यांकन, विचार-पक्ष आ आलोचना-भाषा केँ सुदृढ़ करनिहार केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 929, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "प्रेमशंकर सिंहक रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक लेखन केवल प्रशासनिक परिपत्र अछि", "हुनक लेखन समालोचना, निबन्ध आ साहित्य-चिन्तन मार्फत आधुनिक आलोचना-दृष्टि केँ उभारैत अछि", "हुनक रचना केवल खगोल-गणना पर सीमित अछि", "हुनक काजमे भाषा वा समाजक प्रश्न नै अछि"], "answer": "हुनक लेखन समालोचना, निबन्ध आ साहित्य-चिन्तन मार्फत आधुनिक आलोचना-दृष्टि केँ उभारैत अछि", "explanation": "प्रेमशंकर सिंहक विधागत पहचान समालोचना, निबन्ध आ साहित्य-चिन्तन अछि, आ ओहिसँ आधुनिक आलोचना-दृष्टिक बोध प्रबल होइत अछि।"}, {"id": 930, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "प्रेमशंकर सिंहक योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल मनोरंजनक नाम-सूची बनबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "केवल पृष्ठ-संख्या गिनबाक लेल", "केवल मुद्रकक नाम याद रखबाक लेल"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "प्रेमशंकर सिंहक भूमिका आधुनिक आलोचना-विमर्श आ आधुनिक आलोचना-दृष्टिक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 931, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "प्रेमशंकर सिंहक साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["आधुनिक आलोचना-दृष्टि", "इतिहास-बोध", "भाषा-संस्कार", "ग्राम्य परिवेश"], "answer": "आधुनिक आलोचना-दृष्टि", "explanation": "एहि लेखक/कविक साहित्यिक स्वर आधुनिक आलोचना-दृष्टिसँ चिन्हित कएल जा सकैत अछि।"}, {"id": 932, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "प्रेमशंकर सिंहक सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["प्रेमशंकर सिंह — मैथिली साहित्यक इतिहास लेखन", "प्रेमशंकर सिंह — खट्टर ककाक तरंग", "प्रेमशंकर सिंह — प्रेमशंकर सिंहक आलोचनात्मक योगदान", "प्रेमशंकर सिंह — राजमोहन झाक साहित्य-विमर्श"], "answer": "प्रेमशंकर सिंह — प्रेमशंकर सिंहक आलोचनात्मक योगदान", "explanation": "ठीक जोड़ी प्रेमशंकर सिंह — प्रेमशंकर सिंहक आलोचनात्मक योगदान अछि।"}, {"id": 933, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "प्रेमशंकर सिंहक साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["मैथिलीक प्रयोगक पूर्ण अभाव", "केवल अंकीय संकेतक प्रयोग", "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "केवल मौन अभिनय बिना भाषा"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "प्रेमशंकर सिंहक रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ समालोचना, निबन्ध आ साहित्य-चिन्तनक माध्यमेँ बढ़बैत अछि।"}, {"id": 934, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "प्रेमशंकर सिंह पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["मैथिली साहित्यक आधुनिक मूल्यांकन, विचार-पक्ष आ आलोचना-भाषा केँ सुदृढ़ करनिहार", "केवल विदेशी यात्रावृत्तक अनुवाद", "केवल खेतीक माप-जोखक तालिका", "प्रतीकात्मकता"], "answer": "मैथिली साहित्यक आधुनिक मूल्यांकन, विचार-पक्ष आ आलोचना-भाषा केँ सुदृढ़ करनिहार", "explanation": "मैथिली साहित्यक आधुनिक मूल्यांकन, विचार-पक्ष आ आलोचना-भाषा केँ सुदृढ़ करनिहार केँ छोड़ला सँ प्रेमशंकर सिंहक मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 935, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "प्रेमशंकर सिंहक अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["केवल छपाईक आकार देखि", "केवल पृष्ठ-संख्याक आधार पर", "केवल पुरस्कार-सूची पढ़ि", "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "प्रेमशंकर सिंहक योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 936, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "प्रेमशंकर सिंहक साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["आधुनिक आलोचना-दृष्टि", "केवल विदेशी यात्रावृत्तक अनुवाद", "केवल राजकीय प्रशासनिक आदेशक संकलन", "जनपक्षधरता"], "answer": "आधुनिक आलोचना-दृष्टि", "explanation": "प्रेमशंकर सिंहक छवि आधुनिक आलोचना-दृष्टि केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 937, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "प्रेमशंकर सिंहक प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["समालोचना, निबन्ध आ साहित्य-चिन्तन, आधुनिक आलोचना-दृष्टि आ विचार-गहनता, पाठ-केन्द्रित दृष्टि, सामाजिकता आ विवेचन", "खगोल-गणना, मौसम-तालिका आ नुस्खा", "कर-सूची, नाप-जोख आ बाजार-भाव", "केवल अनुवाद, बिना मौलिकता आ बिना भाषा-चेतना"], "answer": "समालोचना, निबन्ध आ साहित्य-चिन्तन, आधुनिक आलोचना-दृष्टि आ विचार-गहनता, पाठ-केन्द्रित दृष्टि, सामाजिकता आ विवेचन", "explanation": "एहि शब्द-समूहमे प्रेमशंकर सिंहक विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 938, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "प्रेमशंकर सिंहक रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["रचना-परम्परा टूटि गेल", "लोक-संवेदना पूर्णतः हटि गेल", "आधुनिक आलोचना-दृष्टिक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "भाषाक प्रयोग घटि गेल"], "answer": "आधुनिक आलोचना-दृष्टिक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "प्रेमशंकर सिंहक काजसँ आधुनिक आलोचना-दृष्टिमे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 939, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "प्रेमशंकर सिंहक योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे", "केवल भूगोलक नक्शा बनाबयवला प्रश्नमे", "केवल खेलक नियम याद करयवला प्रश्नमे", "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "प्रेमशंकर सिंहक योगदान आधुनिक आलोचना-विमर्श आ समालोचना, निबन्ध आ साहित्य-चिन्तनक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 940, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "प्रेमशंकर सिंहक सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["प्रेमशंकर सिंह केवल पञ्जी-लेखक छलाह, साहित्यिक योगदान नहि", "प्रेमशंकर सिंहक अध्ययनमे काल, विधा आ कृति अप्रासंगिक अछि", "प्रेमशंकर सिंहक योगदान केवल व्यापारिक लेखामे सीमित रहल", "प्रेमशंकर सिंह आधुनिक आलोचना-विमर्शमे समालोचना, निबन्ध आ साहित्य-चिन्तन द्वारा मैथिली साहित्यक आधुनिक मूल्यांकन, विचार-पक्ष आ आलोचना-भाषा केँ सुदृढ़ करनिहार"], "answer": "प्रेमशंकर सिंह आधुनिक आलोचना-विमर्शमे समालोचना, निबन्ध आ साहित्य-चिन्तन द्वारा मैथिली साहित्यक आधुनिक मूल्यांकन, विचार-पक्ष आ आलोचना-भाषा केँ सुदृढ़ करनिहार", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 941, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "राजमोहन झाक मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["साहित्यक पाठ, इतिहास, समाज आ शैलीक समन्वित मूल्यांकनमे योगदान", "केवल शिलालेखक तिथि-सूची", "मिथिला-दृष्टिसँ रामकथा, सीता-शक्ति आ भक्तिपरक आख्यान केँ विस्तार देनिहार", "असमक भक्ति-नाट्य परम्परा, संगीत, अभिनय आ धर्म-प्रसारक नाट्यरूपसँ जुड़ल महत्त्वपूर्ण नाम"], "answer": "साहित्यक पाठ, इतिहास, समाज आ शैलीक समन्वित मूल्यांकनमे योगदान", "explanation": "राजमोहन झाक अध्ययनमे मुख्य बात साहित्यक पाठ, इतिहास, समाज आ शैलीक समन्वित मूल्यांकनमे योगदान अछि; एहि कारण हुनका समन्वित साहित्य-विवेचन सँ जोड़ल जाएत अछि।"}, {"id": 942, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "राजमोहन झाक संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["पारिजात-हरण परम्परा", "राजमोहन झाक साहित्य-विमर्श", "मैथिली भाषा-साहित्य विमर्श", "वर्णरत्नाकर"], "answer": "राजमोहन झाक साहित्य-विमर्श", "explanation": "राजमोहन झाक सन्दर्भमे राजमोहन झाक साहित्य-विमर्श महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ समन्वित साहित्य-विवेचन स्पष्ट होइत अछि।"}, {"id": 943, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "राजमोहन झा केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["गीतिकाव्य", "आलोचना, निबन्ध आ शोध", "व्यंग्य", "गद्य-वर्णन"], "answer": "आलोचना, निबन्ध आ शोध", "explanation": "आलोचना, निबन्ध आ शोध राजमोहन झाक रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 944, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "कालक्रमक दृष्टिसँ राजमोहन झाक साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["आधुनिक कथा-उपन्यास परम्परा", "आदिकाल/पूर्व-विद्यापति साहित्य", "आधुनिक साहित्यिक आलोचना", "आधुनिक मैथिली नवजागरण"], "answer": "आधुनिक साहित्यिक आलोचना", "explanation": "राजमोहन झाक योगदान आधुनिक साहित्यिक आलोचनाक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 945, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "राजमोहन झाक रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["समन्वित दृष्टि, पाठ-विवेचन, संस्कृति-बोध आ भाषा-संस्कार", "लोकभाषाक सहजता", "ग्राम्य परिवेश", "मंचीय संवाद"], "answer": "समन्वित दृष्टि, पाठ-विवेचन, संस्कृति-बोध आ भाषा-संस्कार", "explanation": "समन्वित दृष्टि, पाठ-विवेचन, संस्कृति-बोध आ भाषा-संस्कार राजमोहन झाक साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 946, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "राजमोहन झा पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["समन्वित साहित्य-विवेचन", "इतिहास-बोध", "छन्द-विधान", "रंगमंच"], "answer": "समन्वित साहित्य-विवेचन", "explanation": "राजमोहन झाक योगदानक सार समन्वित साहित्य-विवेचन मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 947, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "राजमोहन झाक योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका केवल राजकीय कर-सूची लिखल", "कारण हुनका माध्यमेँ समन्वित साहित्य-विवेचन केँ बल भेटल", "कारण हुनका मंच, भाषा वा रचना-संवेदना सँ कोनो सम्बन्ध नहि छल", "कारण हुनका केवल शिलालेख पढ़ल"], "answer": "कारण हुनका माध्यमेँ समन्वित साहित्य-विवेचन केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे राजमोहन झाक योगदान समन्वित साहित्य-विवेचन केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 948, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "राजमोहन झाक नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["केवल नाम रटि छोड़ि देब", "केवल जन्म-वर्षक अनुमान करब", "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "केवल शहरक नाम खोजब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "राजमोहन झा केँ बुझबाक लेल राजमोहन झाक साहित्य-विमर्श, आलोचना, निबन्ध आ शोध आ साहित्यक पाठ, इतिहास, समाज आ शैलीक समन्वित मूल्यांकनमे योगदान केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 949, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "राजमोहन झाक रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक रचना केवल खगोल-गणना पर सीमित अछि", "हुनक काजमे भाषा वा समाजक प्रश्न नै अछि", "हुनक लेखन केवल प्रशासनिक परिपत्र अछि", "हुनक लेखन आलोचना, निबन्ध आ शोध मार्फत समन्वित साहित्य-विवेचन केँ उभारैत अछि"], "answer": "हुनक लेखन आलोचना, निबन्ध आ शोध मार्फत समन्वित साहित्य-विवेचन केँ उभारैत अछि", "explanation": "राजमोहन झाक विधागत पहचान आलोचना, निबन्ध आ शोध अछि, आ ओहिसँ समन्वित साहित्य-विवेचनक बोध प्रबल होइत अछि।"}, {"id": 950, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "राजमोहन झाक योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल मुद्रकक नाम याद रखबाक लेल", "केवल मनोरंजनक नाम-सूची बनबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "केवल बाहरी भाषा सीखबाक लेल"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "राजमोहन झाक भूमिका आधुनिक साहित्यिक आलोचना आ समन्वित साहित्य-विवेचनक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 951, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "राजमोहन झाक साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["पात्र-मनोविज्ञान", "भाषा-संस्कार", "समन्वित साहित्य-विवेचन", "भाषिक अनुशासन"], "answer": "समन्वित साहित्य-विवेचन", "explanation": "एहि लेखक/कविक साहित्यिक स्वर समन्वित साहित्य-विवेचनसँ चिन्हित कएल जा सकैत अछि।"}, {"id": 952, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "राजमोहन झाक सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["राजमोहन झा — राजमोहन झाक साहित्य-विमर्श", "राजमोहन झा — मोहनक मुक्तक-काव्य", "राजमोहन झा — मधुपक गीतिकाव्य", "राजमोहन झा — आधुनिक नाट्य-परम्परा"], "answer": "राजमोहन झा — राजमोहन झाक साहित्य-विमर्श", "explanation": "ठीक जोड़ी राजमोहन झा — राजमोहन झाक साहित्य-विमर्श अछि।"}, {"id": 953, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "राजमोहन झाक साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["केवल मौन अभिनय बिना भाषा", "मैथिलीक प्रयोगक पूर्ण अभाव", "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "केवल अंकीय संकेतक प्रयोग"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "राजमोहन झाक रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ आलोचना, निबन्ध आ शोधक माध्यमेँ बढ़बैत अछि।"}, {"id": 954, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "राजमोहन झा पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["साहित्यक पाठ, इतिहास, समाज आ शैलीक समन्वित मूल्यांकनमे योगदान", "केवल वैद्यकीय नुस्खाक संग्रह", "केवल विदेशी यात्रावृत्तक अनुवाद", "केवल राजकीय प्रशासनिक आदेशक संकलन"], "answer": "साहित्यक पाठ, इतिहास, समाज आ शैलीक समन्वित मूल्यांकनमे योगदान", "explanation": "साहित्यक पाठ, इतिहास, समाज आ शैलीक समन्वित मूल्यांकनमे योगदान केँ छोड़ला सँ राजमोहन झाक मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 955, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "राजमोहन झाक अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["केवल नामक वर्णक्रमसँ", "केवल पुरस्कार-सूची पढ़ि", "केवल छपाईक आकार देखि", "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "राजमोहन झाक योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 956, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "राजमोहन झाक साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["स्त्री-अनुभव", "समन्वित साहित्य-विवेचन", "केवल व्यावसायिक हिसाब-किताबक पुस्तिका", "सामाजिक यथार्थ"], "answer": "समन्वित साहित्य-विवेचन", "explanation": "राजमोहन झाक छवि समन्वित साहित्य-विवेचन केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 957, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "राजमोहन झाक प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["कर-सूची, नाप-जोख आ बाजार-भाव", "प्रशासन, सैनिक आदेश आ दफ्तर", "केवल अनुवाद, बिना मौलिकता आ बिना भाषा-चेतना", "आलोचना, निबन्ध आ शोध, समन्वित साहित्य-विवेचन आ समन्वित दृष्टि, पाठ-विवेचन, संस्कृति-बोध आ भाषा-संस्कार"], "answer": "आलोचना, निबन्ध आ शोध, समन्वित साहित्य-विवेचन आ समन्वित दृष्टि, पाठ-विवेचन, संस्कृति-बोध आ भाषा-संस्कार", "explanation": "एहि शब्द-समूहमे राजमोहन झाक विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 958, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "राजमोहन झाक रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["लोक-संवेदना पूर्णतः हटि गेल", "रचना-परम्परा टूटि गेल", "समन्वित साहित्य-विवेचनक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "भाषाक प्रयोग घटि गेल"], "answer": "समन्वित साहित्य-विवेचनक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "राजमोहन झाक काजसँ समन्वित साहित्य-विवेचनमे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 959, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "राजमोहन झाक योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे", "केवल खेलक नियम याद करयवला प्रश्नमे", "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "केवल भूगोलक नक्शा बनाबयवला प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "राजमोहन झाक योगदान आधुनिक साहित्यिक आलोचना आ आलोचना, निबन्ध आ शोधक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 960, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "राजमोहन झाक सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["राजमोहन झाक योगदान केवल व्यापारिक लेखामे सीमित रहल", "राजमोहन झाक अध्ययनमे काल, विधा आ कृति अप्रासंगिक अछि", "राजमोहन झा आधुनिक साहित्यिक आलोचनामे आलोचना, निबन्ध आ शोध द्वारा साहित्यक पाठ, इतिहास, समाज आ शैलीक समन्वित मूल्यांकनमे योगदान", "राजमोहन झाक मैथिली साहित्यसँ कोनो सम्बन्ध नहि"], "answer": "राजमोहन झा आधुनिक साहित्यिक आलोचनामे आलोचना, निबन्ध आ शोध द्वारा साहित्यक पाठ, इतिहास, समाज आ शैलीक समन्वित मूल्यांकनमे योगदान", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 961, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "रमानन्द झा ‘रमण’क मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["मैथिली कथा-गद्यक सामाजिक धरातल, पात्र-विकास आ कथात्मक भाषा केँ बल देनिहार", "मैथिली गीतक मधुरता, भाव-लालित्य आ भाषा-संस्कार केँ सुदृढ़ करनिहार", "लोकसाहित्य, साहित्यिक परम्परा, आलोचना आ शोध-पद्धति केँ जोड़निहार", "मैथिली रंगमंचमे सामाजिक विषय, पात्र-संरचना आ नाटकीय संवादक विकासमे योगदान"], "answer": "लोकसाहित्य, साहित्यिक परम्परा, आलोचना आ शोध-पद्धति केँ जोड़निहार", "explanation": "रमानन्द झा ‘रमण’क अध्ययनमे मुख्य बात लोकसाहित्य, साहित्यिक परम्परा, आलोचना आ शोध-पद्धति केँ जोड़निहार अछि; एहि कारण हुनका लोकसाहित्य आ आलोचना सँ जोड़ल जाएत अछि।"}, {"id": 962, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "रमानन्द झा ‘रमण’क संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["व्यासक कथा-साहित्यिक योगदान", "रमणक आलोचनात्मक लेखन", "आधुनिक मैथिली उपन्यास-परम्परा", "मधुपक गीतिकाव्य"], "answer": "रमणक आलोचनात्मक लेखन", "explanation": "रमानन्द झा ‘रमण’क सन्दर्भमे रमणक आलोचनात्मक लेखन महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ लोकसाहित्य आ आलोचना स्पष्ट होइत अछि।"}, {"id": 963, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "रमानन्द झा ‘रमण’ केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["आलोचना, लोकसाहित्य-विमर्श आ निबन्ध", "भाषा-अनुसंधान", "व्यंग्य", "नाटक"], "answer": "आलोचना, लोकसाहित्य-विमर्श आ निबन्ध", "explanation": "आलोचना, लोकसाहित्य-विमर्श आ निबन्ध रमानन्द झा ‘रमण’क रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 964, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "कालक्रमक दृष्टिसँ रमानन्द झा ‘रमण’क साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["आदिकाल/पूर्व-विद्यापति साहित्य", "समालोचना आ लोकसाहित्य अध्ययन", "उत्तर-विद्यापति पदावली परम्परा", "आधुनिक कथा-उपन्यास परम्परा"], "answer": "समालोचना आ लोकसाहित्य अध्ययन", "explanation": "रमानन्द झा ‘रमण’क योगदान समालोचना आ लोकसाहित्य अध्ययनक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 965, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "रमानन्द झा ‘रमण’क रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["लोकभाषाक सहजता", "केवल राजकीय प्रशासनिक आदेशक संकलन", "सामाजिक चेतना", "लोकधर्मी दृष्टि, पाठ-परख, सांस्कृतिक स्मृति आ आलोचनात्मक अनुशासन"], "answer": "लोकधर्मी दृष्टि, पाठ-परख, सांस्कृतिक स्मृति आ आलोचनात्मक अनुशासन", "explanation": "लोकधर्मी दृष्टि, पाठ-परख, सांस्कृतिक स्मृति आ आलोचनात्मक अनुशासन रमानन्द झा ‘रमण’क साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 966, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "रमानन्द झा ‘रमण’ पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["केवल तिथि-स्मरण", "केवल मूल्य-सूची", "इतिहास-बोध", "लोकसाहित्य आ आलोचना"], "answer": "लोकसाहित्य आ आलोचना", "explanation": "रमानन्द झा ‘रमण’क योगदानक सार लोकसाहित्य आ आलोचना मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 967, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "रमानन्द झा ‘रमण’क योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका केवल गणना-पद्धति बनौल", "कारण हुनका माध्यमेँ लोकसाहित्य आ आलोचना केँ बल भेटल", "कारण हुनका केवल शिलालेख पढ़ल", "कारण हुनका मंच, भाषा वा रचना-संवेदना सँ कोनो सम्बन्ध नहि छल"], "answer": "कारण हुनका माध्यमेँ लोकसाहित्य आ आलोचना केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे रमानन्द झा ‘रमण’क योगदान लोकसाहित्य आ आलोचना केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 968, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "रमानन्द झा ‘रमण’क नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["साहित्यिक विधा छोड़ि केवल वंशावली पढ़ब", "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "केवल शहरक नाम खोजब", "केवल जन्म-वर्षक अनुमान करब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "रमानन्द झा ‘रमण’ केँ बुझबाक लेल रमणक आलोचनात्मक लेखन, आलोचना, लोकसाहित्य-विमर्श आ निबन्ध आ लोकसाहित्य, साहित्यिक परम्परा, आलोचना आ शोध-पद्धति केँ जोड़निहार केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 969, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "रमानन्द झा ‘रमण’क रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक लेखन आलोचना, लोकसाहित्य-विमर्श आ निबन्ध मार्फत लोकसाहित्य आ आलोचना केँ उभारैत अछि", "हुनक रचना केवल खगोल-गणना पर सीमित अछि", "हुनक काजमे भाषा वा समाजक प्रश्न नै अछि", "हुनक योगदान साहित्यिक इतिहाससँ असम्बद्ध अछि"], "answer": "हुनक लेखन आलोचना, लोकसाहित्य-विमर्श आ निबन्ध मार्फत लोकसाहित्य आ आलोचना केँ उभारैत अछि", "explanation": "रमानन्द झा ‘रमण’क विधागत पहचान आलोचना, लोकसाहित्य-विमर्श आ निबन्ध अछि, आ ओहिसँ लोकसाहित्य आ आलोचनाक बोध प्रबल होइत अछि।"}, {"id": 970, "sectio  "रमानन्द झा ‘रमण’क रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["लोक-संवेदना पूर्णतः हटि गेल", "भाषाक प्रयोग घटि गेल", "साहित्यिक विधा समाप्त भऽ गेल", "लोकसाहित्य आ आलोचनाक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल"], "answer": "लोकसाहित्य आ आलोचनाक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "रमानन्द झा ‘रमण’क काजसँ लोकसाहित्य आ आलोचनामे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 979, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "रमानन्द झा ‘रमण’क योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["केवल खेलक नियम याद करयवला प्रश्नमे", "केवल रसायनिक सूत्रक प्रश्नमे", "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "रमानन्द झा ‘रमण’क योगदान समालोचना आ लोकसाहित्य अध्ययन आ आलोचना, लोकसाहित्य-विमर्श आ निबन्धक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 980, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "रमानन्द झा ‘रमण’क सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["रमानन्द झा ‘रमण’क योगदान केवल व्यापारिक लेखामे सीमित रहल", "रमानन्द झा ‘रमण’ समालोचना आ लोकसाहित्य अध्ययनमे आलोचना, लोकसाहित्य-विमर्श आ निबन्ध द्वारा लोकसाहित्य, साहित्यिक परम्परा, आलोचना आ शोध-पद्धति केँ जोड़निहार", "रमानन्द झा ‘रमण’क मैथिली साहित्यसँ कोनो सम्बन्ध नहि", "रमानन्द झा ‘रमण’ केवल पञ्जी-लेखक छलाह, साहित्यिक योगदान नहि"], "answer": "रमानन्द झा ‘रमण’ समालोचना आ लोकसाहित्य अध्ययनमे आलोचना, लोकसाहित्य-विमर्श आ निबन्ध द्वारा लोकसाहित्य, साहित्यिक परम्परा, आलोचना आ शोध-पद्धति केँ जोड़निहार", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 981, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "फूलचन्द्र मिश्र ‘रमण’क मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["लोकगीत, लोककथा, मौखिक परम्परा आ मैथिली संस्कृतिक अध्ययनमे योगदान", "मिथिलाक इतिहास, समाज, संस्कृति आ साहित्यक अन्तरसम्बन्ध केँ स्पष्ट करनिहार", "केवल विदेशी यात्रावृत्तक अनुवाद", "मैथिली साहित्यक काल-विभाजन, लेखक-परम्परा आ आलोचनात्मक अध्ययन केँ व्यवस्थित करनिहार"], "answer": "लोकगीत, लोककथा, मौखिक परम्परा आ मैथिली संस्कृतिक अध्ययनमे योगदान", "explanation": "फूलचन्द्र मिश्र ‘रमण’क अध्ययनमे मुख्य बात लोकगीत, लोककथा, मौखिक परम्परा आ मैथिली संस्कृतिक अध्ययनमे योगदान अछि; एहि कारण हुनका लोकसाहित्यक संरक्षण आ विवेचन सँ जोड़ल जाएत अछि।"}, {"id": 982, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "फूलचन्द्र मिश्र ‘रमण’क संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["मैथिली नवजागरणक साहित्यिक प्रसंग", "मैथिली आलोचना-परम्परा", "लोकसाहित्य-सम्बन्धी विमर्श", "भफाइत चाहक जिनगी"], "answer": "लोकसाहित्य-सम्बन्धी विमर्श", "explanation": "फूलचन्द्र मिश्र ‘रमण’क सन्दर्भमे लोकसाहित्य-सम्बन्धी विमर्श महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ लोकसाहित्यक संरक्षण आ विवेचन स्पष्ट होइत अछि।"}, {"id": 983, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "फूलचन्द्र मिश्र ‘रमण’ केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["गद्य-वर्णन", "लोकसाहित्य, आलोचना आ सांस्कृतिक अध्ययन", "प्रबन्ध-काव्य", "भाषा-अनुसंधान"], "answer": "लोकसाहित्य, आलोचना आ सांस्कृतिक अध्ययन", "explanation": "लोकसाहित्य, आलोचना आ सांस्कृतिक अध्ययन फूलचन्द्र मिश्र ‘रमण’क रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 984, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "कालक्रमक दृष्टिसँ फूलचन्द्र मिश्र ‘रमण’क साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["नेपालक मध्यकालीन मैथिली नाटक", "लोकसाहित्य आ समालोचना", "आधुनिक समालोचना", "आदिकाल/पूर्व-विद्यापति साहित्य"], "answer": "लोकसाहित्य आ समालोचना", "explanation": "फूलचन्द्र मिश्र ‘रमण’क योगदान लोकसाहित्य आ समालोचनाक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 985, "section": 10, "sectionTitle": "१०. आलोचना, लोकसाहित्य आ समकालीन विमर्श", "q": "फूलचन्द्र मिश्र ‘रमण’क रचना-कर्मक एक प्रमुख विशेष   for (const sec of SECTIONS) {
    const qs = QUESTIONS.filter(q => q.section === sec.id);
    html += `<section class="section" id="sec-${sec.id}"><h2>${sec.title}</h2><p class="desc">${sec.desc}</p>`;
    for (const q of qs) {
      html += `<article class="card" id="q-${q.id}" data-text="${escapeAttr(q.q + ' ' + q.options.join(' ') + ' ' + q.explanation)}">
        <div class="qhead"><div class="qno">प्रश्न ${devDigits(q.id)}</div><div class="qtext">${q.q}</div></div>
        <div class="options">${q.options.map((o,idx)=>`<button class="opt" onclick="chooseAnswer(${q.id}, ${idx})">${['क','ख','ग','घ'][idx]}. ${o}</button>`).join('')}</div>
        <div class="feedback" id="fb-${q.id}"></div>
        <div class="answer" id="ans-${q.id}"><b>सही उत्तर:</b> ${q.answer}<br><b>व्याख्या:</b> ${q.explanation}</div>
        <div class="card-actions"><button class="ghost" onclick="toggleAnswer(${q.id})">उत्तर देखू</button><button class="ghost" onclick="speakQuestion(${q.id})">प्रश्न सुनू</button></div>
      </article>`;
    }
    html += `</section>`;
  }
  quiz.innerHTML = html;
}
function escapeAttr(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function chooseAnswer(id, idx) {
  const q = QUESTIONS[id-1];
  const card = document.getElementById(`q-${id}`);
  const buttons = card.querySelectorAll('.opt');
  buttons.forEach(b => b.disabled = true);
  const chosen = q.options[idx];
  state.set(id, chosen);
  buttons.forEach((b,i)=>{
    if(q.options[i] === q.answer) b.classList.add('correct');
    if(i === idx && chosen !== q.answer) b.classList.add('wrong');
  });
  const fb = document.getElementById(`fb-${id}`);
  if(chosen === q.answer) {
    fb.className = 'feedback good';
    fb.innerHTML = 'सही उत्तर। ' + q.explanation;
  } else {
    fb.className = 'feedback bad';
    fb.innerHTML = 'गलत उत्तर। सही उत्तर: <b>' + q.answer + '</b><br>' + q.explanation;
  }
}
function toggleAnswer(id) {
  const el = document.getElementById(`ans-${id}`);
  el.style.display = el.style.display === 'block' ? 'none' : 'block';
}
function showAllAnswers() {
  QUESTIONS.forEach(q => document.getElementById(`ans-${q.id}`).style.display='block');
}
function evaluateQuiz() {
  let correct = 0;
  QUESTIONS.forEach(q => { if(state.get(q.id) === q.answer) correct++; });
  const attempted = state.size;
  const box = document.getElementById('scorebox');
  box.style.display = 'block';
  box.innerHTML = `कुल प्रश्न: ${devDigits(QUESTIONS.length)} | प्रयास: ${devDigits(attempted)} | सही: ${devDigits(correct)} | गलत: ${devDigits(attempted-correct)}`;
  window.scrollTo({top:0, behavior:'smooth'});
}
function resetQuiz() {
  state.clear();
  renderQuiz();
  document.getElementById('scorebox').style.display='none';
  document.getElementById('search').value='';
}
function speakQuestion(id) {
  const q = QUESTIONS[id-1];
  const text = q.q + ' विकल्प: ' + q.options.join('। ');
  if('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'hi-IN';
    u.rate = 0.9;
    window.speechSynthesis.speak(u);
  } else { alert('एहि ब्राउजरमे ध्वनि-पठन उपलब्ध नहि अछि।'); }
}
document.getElementById('search').addEventListener('input', e => {
  const term = e.target.value.trim().toLowerCase();
  document.querySelectorAll('.card').forEach(card => {
    const t = card.getAttribute('data-text').toLowerCase();
    card.classList.toggle('hidden', term && !t.includes(term));
  });
});
renderNav();
renderQuiz();
</script>
</body>
</html>
