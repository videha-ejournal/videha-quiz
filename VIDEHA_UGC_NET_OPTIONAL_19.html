कथन ठीक अछि?", "options": ["हुनक लेखन कविता, गीत आ मुक्तक मार्फत मुक्तक-काव्यक सुदृढ़ीकरण केँ उभारैत अछि", "हुनक योगदान साहित्यिक इतिहाससँ असम्बद्ध अछि", "हुनक रचना केवल खगोल-गणना पर सीमित अछि", "हुनक काजमे भाषा वा समाजक प्रश्न नै अछि"], "answer": "हुनक लेखन कविता, गीत आ मुक्तक मार्फत मुक्तक-काव्यक सुदृढ़ीकरण केँ उभारैत अछि", "explanation": "सीताराम झाक विधागत पहचान कविता, गीत आ मुक्तक अछि, आ ओहिसँ मुक्तक-काव्यक सुदृढ़ीकरणक बोध प्रबल होइत अछि।"}, {"id": 150, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "सीताराम झाक योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल बाहरी भाषा सीखबाक लेल", "केवल पृष्ठ-संख्या गिनबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "केवल मुद्रकक नाम याद रखबाक लेल"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "सीताराम झाक भूमिका आधुनिक मुक्तक-काव्य परम्परा आ मुक्तक-काव्यक सुदृढ़ीकरणक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 151, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "सीताराम झाक साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["पात्र-मनोविज्ञान", "छन्द-सजगता", "ऐतिहासिक दृष्टि", "मुक्तक-काव्यक सुदृढ़ीकरण"], "answer": "मुक्तक-काव्यक सुदृढ़ीकरण", "explanation": "एहि लेखक/कविक साहित्यिक स्वर मुक्तक-काव्यक सुदृढ़ीकरणसँ चिन्हित कएल जा सकैत अछि।"}, {"id": 152, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "सीताराम झाक सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["सीताराम झा — मलंगियाक नाट्य-योगदान", "सीताराम झा — मैथिली कथा-परम्परा", "सीताराम झा — अंकिया नाट परम्परा", "सीताराम झा — मैथिली मुक्तक-काव्य परम्परा"], "answer": "सीताराम झा — मैथिली मुक्तक-काव्य परम्परा", "explanation": "ठीक जोड़ी सीताराम झा — मैथिली मुक्तक-काव्य परम्परा अछि।"}, {"id": 153, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "सीताराम झाक साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "मैथिलीक प्रयोगक पूर्ण अभाव", "केवल अंकीय संकेतक प्रयोग", "केवल मौन अभिनय बिना भाषा"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "सीताराम झाक रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ कविता, गीत आ मुक्तकक माध्यमेँ बढ़बैत अछि।"}, {"id": 154, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "सीताराम झा पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["लोकभाषाक सहजता", "छन्द-सजगता", "मौखिक परम्परा", "आधुनिक मैथिली कवितामे भाव, छन्द, लोकधर्मिता आ भाषा-संस्कारक योगदान"], "answer": "आधुनिक मैथिली कवितामे भाव, छन्द, लोकधर्मिता आ भाषा-संस्कारक योगदान", "explanation": "आधुनिक मैथिली कवितामे भाव, छन्द, लोकधर्मिता आ भाषा-संस्कारक योगदान केँ छोड़ला सँ सीताराम झाक मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 155, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "सीताराम झाक अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "केवल पृष्ठ-संख्याक आधार पर", "केवल पुरस्कार-सूची पढ़ि", "केवल नामक वर्णक्रमसँ"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "सीताराम झाक योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 156, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "सीताराम झाक साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["स्त्री-अनुभव", "मुक्तक-काव्यक सुदृढ़ीकरण", "केवल विदेशी यात्रावृत्तक अनुवाद", "गद्यक परिपक्वता"], "answer": "मुक्तक-काव्यक सुदृढ़ीकरण", "explanation": "सीताराम झाक छवि मुक्तक-काव्यक सुदृढ़ीकरण केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 157, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "सीताराम झाक प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["केवल अनुवाद, बिना मौलिकता आ बिना भाषा-चेतना", "कविता, गीत आ मुक्तक, मुक्तक-काव्यक सुदृढ़ीकरण आ गीतात्मकता, भाव-संयम, संस्कार-बोध आ लोकानुभव", "कर-सूची, नाप-जोख आ बाजार-भाव", "खगोल-गणना, मौसम-तालिका आ नुस्खा"], "answer": "कविता, गीत आ मुक्तक, मुक्तक-काव्यक सुदृढ़ीकरण आ गीतात्मकता, भाव-संयम, संस्कार-बोध आ लोकानुभव", "explanation": "एहि शब्द-समूहमे सीताराम झाक विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 158, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "सीताराम झाक रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["साहित्यिक विधा समाप्त भऽ गेल", "भाषाक प्रयोग घटि गेल", "मुक्तक-काव्यक सुदृढ़ीकरणक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "रचना-परम्परा टूटि गेल"], "answer": "मुक्तक-काव्यक सुदृढ़ीकरणक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "सीताराम झाक काजसँ मुक्तक-काव्यक सुदृढ़ीकरणमे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 159, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "सीताराम झाक योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "केवल खेलक नियम याद करयवला प्रश्नमे", "केवल भूगोलक नक्शा बनाबयवला प्रश्नमे", "केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "सीताराम झाक योगदान आधुनिक मुक्तक-काव्य परम्परा आ कविता, गीत आ मुक्तकक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 160, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "सीताराम झाक सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["सीताराम झाक योगदान केवल व्यापारिक लेखामे सीमित रहल", "सीताराम झा आधुनिक मुक्तक-काव्य परम्परामे कविता, गीत आ मुक्तक द्वारा आधुनिक मैथिली कवितामे भाव, छन्द, लोकधर्मिता आ भाषा-संस्कारक योगदान", "सीताराम झा केवल पञ्जी-लेखक छलाह, साहित्यिक योगदान नहि", "सीताराम झाक मैथिली साहित्यसँ कोनो सम्बन्ध नहि"], "answer": "सीताराम झा आधुनिक मुक्तक-काव्य परम्परामे कविता, गीत आ मुक्तक द्वारा आधुनिक मैथिली कवितामे भाव, छन्द, लोकधर्मिता आ भाषा-संस्कारक योगदान", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 161, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "रघुनन्दन लालदासक मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["मिथिला-दृष्टिसँ रामकथा, सीता-शक्ति आ भक्तिपरक आख्यान केँ विस्तार देनिहार", "केवल विदेशी यात्रावृत्तक अनुवाद", "नवजागरणकालीन भाषा-चेतना, साहित्यिक संगठन आ सांस्कृतिक स्मृति केँ बल देनिहार", "विद्यापति-परम्पराक भक्ति-रस आ पद-माधुर्य केँ आगू बढ़ेनिहार"], "answer": "नवजागरणकालीन भाषा-चेतना, साहित्यिक संगठन आ सांस्कृतिक स्मृति केँ बल देनिहार", "explanation": "रघुनन्दन लालदासक अध्ययनमे मुख्य बात नवजागरणकालीन भाषा-चेतना, साहित्यिक संगठन आ सांस्कृतिक स्मृति केँ बल देनिहार अछि; एहि कारण हुनका नवजागरणक भाषिक-सांस्कृतिक चेतना सँ जोड़ल जाएत अछि।"}, {"id": 162, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "रघुनन्दन लालदासक संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["नाच-पाटी आ लोक-रंग परम्परा", "राजस्व-विवरण", "विद्यापति पदावली", "मैथिली नवजागरणक साहित्यिक प्रसंग"], "answer": "मैथिली नवजागरणक साहित्यिक प्रसंग", "explanation": "रघुनन्दन लालदासक सन्दर्भमे मैथिली नवजागरणक साहित्यिक प्रसंग महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ नवजागरणक भाषिक-सांस्कृतिक चेतना स्पष्ट होइत अछि।"}, {"id": 163, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "रघुनन्दन लालदास केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["लोकसाहित्य", "व्यंग्य", "काव्य, गद्य आ सांस्कृतिक लेखन", "समालोचना"], "answer": "काव्य, गद्य आ सांस्कृतिक लेखन", "explanation": "काव्य, गद्य आ सांस्कृतिक लेखन रघुनन्दन लालदासक रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 164, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "कालक्रमक दृष्टिसँ रघुनन्दन लालदासक साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["आधुनिक आरम्भिक गद्य-काव्य परम्परा", "नेपालक मध्यकालीन मैथिली नाटक", "आधुनिक समालोचना", "आदिकाल/पूर्व-विद्यापति साहित्य"], "answer": "आधुनिक आरम्भिक गद्य-काव्य परम्परा", "explanation": "रघुनन्दन लालदासक योगदान आधुनिक आरम्भिक गद्य-काव्य परम्पराक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 165, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "रघुनन्दन लालदासक रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["भाषा-प्रेम, सांस्कृतिक पुनर्स्मरण आ परम्परा-सजगता", "प्रतीकात्मकता", "भाषिक अनुशासन", "केवल खेतीक माप-जोखक तालिका"], "answer": "भाषा-प्रेम, सांस्कृतिक पुनर्स्मरण आ परम्परा-सजगता", "explanation": "भाषा-प्रेम, सांस्कृतिक पुनर्स्मरण आ परम्परा-सजगता रघुनन्दन लालदासक साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 166, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "रघुनन्दन लालदास पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["शृङ्गार आ भक्ति", "भाषा-संस्कार", "अनुसंधान", "नवजागरणक भाषिक-सांस्कृतिक चेतना"], "answer": "नवजागरणक भाषिक-सांस्कृतिक चेतना", "explanation": "रघुनन्दन लालदासक योगदानक सार नवजागरणक भाषिक-सांस्कृतिक चेतना मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 167, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "रघुनन्दन लालदासक योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका केवल गणना-पद्धति बनौल", "कारण हुनका मंच, भाषा वा रचना-संवेदना सँ कोनो सम्बन्ध नहि छल", "कारण हुनका केवल राजकीय कर-सूची लिखल", "कारण हुनका माध्यमेँ नवजागरणक भाषिक-सांस्कृतिक चेतना केँ बल भेटल"], "answer": "कारण हुनका माध्यमेँ नवजागरणक भाषिक-सांस्कृतिक चेतना केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे रघुनन्दन लालदासक योगदान नवजागरणक भाषिक-सांस्कृतिक चेतना केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 168, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "रघुनन्दन लालदासक नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["केवल नाम रटि छोड़ि देब", "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "साहित्यिक विधा छोड़ि केवल वंशावली पढ़ब", "केवल शहरक नाम खोजब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "रघुनन्दन लालदास केँ बुझबाक लेल मैथिली नवजागरणक साहित्यिक प्रसंग, काव्य, गद्य आ सांस्कृतिक लेखन आ नवजागरणकालीन भाषा-चेतना, साहित्यिक संगठन आ सांस्कृतिक स्मृति केँ बल देनिहार केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 169, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "रघुनन्दन लालदासक रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक रचना केवल खगोल-गणना पर सीमित अछि", "हुनक लेखन काव्य, गद्य आ सांस्कृतिक लेखन मार्फत नवजागरणक भाषिक-सांस्कृतिक चेतना केँ उभारैत अछि", "हुनक लेखन केवल प्रशासनिक परिपत्र अछि", "हुनक योगदान साहित्यिक इतिहाससँ असम्बद्ध अछि"], "answer": "हुनक लेखन काव्य, गद्य आ सांस्कृतिक लेखन मार्फत नवजागरणक भाषिक-सांस्कृतिक चेतना केँ उभारैत अछि", "explanation": "रघुनन्दन लालदासक विधागत पहचान काव्य, गद्य आ सांस्कृतिक लेखन अछि, आ ओहिसँ नवजागरणक भाषिक-सांस्कृतिक चेतनाक बोध प्रबल होइत अछि।"}, {"id": 170, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "रघुनन्दन लालदासक योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल पृष्ठ-संख्या गिनबाक लेल", "केवल बाहरी भाषा सीखबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "केवल मनोरंजनक नाम-सूची बनबाक लेल"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "रघुनन्दन लालदासक भूमिका आधुनिक आरम्भिक गद्य-काव्य परम्परा आ नवजागरणक भाषिक-सांस्कृतिक चेतनाक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 171, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "रघुनन्दन लालदासक साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["इतिहास-बोध", "लयात्मकता", "भाषा-संस्कार", "नवजागरणक भाषिक-सांस्कृतिक चेतना"], "answer": "नवजागरणक भाषिक-सांस्कृतिक चेतना", "explanation": "एहि लेखक/कविक साहित्यिक स्वर नवजागरणक भाषिक-सांस्कृतिक चेतनासँ चिन्हित कएल जा सकैत अछि।"}, {"id": 172, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "रघुनन्दन लालदासक सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["रघुनन्दन लालदास — आधुनिक मैथिली कथा-लेखन", "रघुनन्दन लालदास — मैथिली नवजागरणक साहित्यिक प्रसंग", "रघुनन्दन लालदास — वर्णरत्नाकर", "रघुनन्दन लालदास — बेटीक अपमान आ छीनरदेवी"], "answer": "रघुनन्दन लालदास — मैथिली नवजागरणक साहित्यिक प्रसंग", "explanation": "ठीक जोड़ी रघुनन्दन लालदास — मैथिली नवजागरणक साहित्यिक प्रसंग अछि।"}, {"id": 173, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "रघुनन्दन लालदासक साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "मैथिलीक प्रयोगक पूर्ण अभाव", "भाषा-संवेदना सँ असम्बद्धता", "केवल अंकीय संकेतक प्रयोग"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "रघुनन्दन लालदासक रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ काव्य, गद्य आ सांस्कृतिक लेखनक माध्यमेँ बढ़बैत अछि।"}, {"id": 174, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "रघुनन्दन लालदास पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["नवजागरणकालीन भाषा-चेतना, साहित्यिक संगठन आ सांस्कृतिक स्मृति केँ बल देनिहार", "केवल पञ्चाङ्गक गणना", "लोकभाषाक सहजता", "केवल राजकीय प्रशासनिक आदेशक संकलन"], "answer": "नवजागरणकालीन भाषा-चेतना, साहित्यिक संगठन आ सांस्कृतिक स्मृति केँ बल देनिहार", "explanation": "नवजागरणकालीन भाषा-चेतना, साहित्यिक संगठन आ सांस्कृतिक स्मृति केँ बल देनिहार केँ छोड़ला सँ रघुनन्दन लालदासक मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 175, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "रघुनन्दन लालदासक अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "केवल पृष्ठ-संख्याक आधार पर", "केवल पुरस्कार-सूची पढ़ि", "केवल छपाईक आकार देखि"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "रघुनन्दन लालदासक योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 176, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "रघुनन्दन लालदासक साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["सामाजिक यथार्थ", "नवजागरणक भाषिक-सांस्कृतिक चेतना", "केवल वैद्यकीय नुस्खाक संग्रह", "भाषा-संस्कार"], "answer": "नवजागरणक भाषिक-सांस्कृतिक चेतना", "explanation": "रघुनन्दन लालदासक छवि नवजागरणक भाषिक-सांस्कृतिक चेतना केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 177, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "रघुनन्दन लालदासक प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["कर-सूची, नाप-जोख आ बाजार-भाव", "प्रशासन, सैनिक आदेश आ दफ्तर", "खगोल-गणना, मौसम-तालिका आ नुस्खा", "काव्य, गद्य आ सांस्कृतिक लेखन, नवजागरणक भाषिक-सांस्कृतिक चेतना आ भाषा-प्रेम, सांस्कृतिक पुनर्स्मरण आ परम्परा-सजगता"], "answer": "काव्य, गद्य आ सांस्कृतिक लेखन, नवजागरणक भाषिक-सांस्कृतिक चेतना आ भाषा-प्रेम, सांस्कृतिक पुनर्स्मरण आ परम्परा-सजगता", "explanation": "एहि शब्द-समूहमे रघुनन्दन लालदासक विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 178, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "रघुनन्दन लालदासक रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["रचना-परम्परा टूटि गेल", "नवजागरणक भाषिक-सांस्कृतिक चेतनाक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "भाषाक प्रयोग घटि गेल", "लोक-संवेदना पूर्णतः हटि गेल"], "answer": "नवजागरणक भाषिक-सांस्कृतिक चेतनाक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "रघुनन्दन लालदासक काजसँ नवजागरणक भाषिक-सांस्कृतिक चेतनामे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 179, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "रघुनन्दन लालदासक योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["केवल भूगोलक नक्शा बनाबयवला प्रश्नमे", "केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे", "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "केवल रसायनिक सूत्रक प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "रघुनन्दन लालदासक योगदान आधुनिक आरम्भिक गद्य-काव्य परम्परा आ काव्य, गद्य आ सांस्कृतिक लेखनक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 180, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "रघुनन्दन लालदासक सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["रघुनन्दन लालदासक योगदान केवल व्यापारिक लेखामे सीमित रहल", "रघुनन्दन लालदासक अध्ययनमे काल, विधा आ कृति अप्रासंगिक अछि", "रघुनन्दन लालदास आधुनिक आरम्भिक गद्य-काव्य परम्परामे काव्य, गद्य आ सांस्कृतिक लेखन द्वारा नवजागरणकालीन भाषा-चेतना, साहित्यिक संगठन आ सांस्कृतिक स्मृति केँ बल देनिहार", "रघुनन्दन लालदास केवल पञ्जी-लेखक छलाह, साहित्यिक योगदान नहि"], "answer": "रघुनन्दन लालदास आधुनिक आरम्भिक गद्य-काव्य परम्परामे काव्य, गद्य आ सांस्कृतिक लेखन द्वारा नवजागरणकालीन भाषा-चेतना, साहित्यिक संगठन आ सांस्कृतिक स्मृति केँ बल देनिहार", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 181, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "तंत्रनाथ झाक मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["महाभारत-प्रसंग केँ मैथिली महाकाव्यात्मक रूपमे प्रतिष्ठित करनिहार", "समकालीन साहित्यक चयन, आलोचना, पाठकीय दिशा आ विधागत मूल्यांकनमे योगदान", "लोक-संवेदना, गीतात्मकता आ सरल मैथिली भाषाक काव्य-प्रवाह केँ बल देनिहार", "इतिहास, समाज, संस्कृति आ पात्रक जटिलता केँ उपन्यासमे विस्तृत करनिहार"], "answer": "महाभारत-प्रसंग केँ मैथिली महाकाव्यात्मक रूपमे प्रतिष्ठित करनिहार", "explanation": "तंत्रनाथ झाक अध्ययनमे मुख्य बात महाभारत-प्रसंग केँ मैथिली महाकाव्यात्मक रूपमे प्रतिष्ठित करनिहार अछि; एहि कारण हुनका वीरकाव्य आ नारी-गरिमाक रक्षा सँ जोड़ल जाएत अछि।"}, {"id": 182, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "तंत्रनाथ झाक संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["मैथिली भाषा-साहित्य विमर्श", "समकालीन मैथिली कविता सम्बन्धी संपादन/विमर्श", "मोहनक मुक्तक-काव्य", "कीचकवध"], "answer": "कीचकवध", "explanation": "तंत्रनाथ झाक सन्दर्भमे कीचकवध महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ वीरकाव्य आ नारी-गरिमाक रक्षा स्पष्ट होइत अछि।"}, {"id": 183, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "तंत्रनाथ झा केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["मुक्तक-काव्य", "गद्य-वर्णन", "महाकाव्य", "महाकाव्य आ अमित्राक्षर काव्य"], "answer": "महाकाव्य आ अमित्राक्षर काव्य", "explanation": "महाकाव्य आ अमित्राक्षर काव्य तंत्रनाथ झाक रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 184, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "कालक्रमक दृष्टिसँ तंत्रनाथ झाक साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["समकालीन मैथिली साहित्य", "आधुनिक प्रबन्ध/महाकाव्य परम्परा", "आधुनिक मैथिली नवजागरण", "आधुनिक समालोचना"], "answer": "आधुनिक प्रबन्ध/महाकाव्य परम्परा", "explanation": "तंत्रनाथ झाक योगदान आधुनिक प्रबन्ध/महाकाव्य परम्पराक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 185, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "तंत्रनाथ झाक रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["सामाजिक चेतना", "ग्राम्य परिवेश", "पात्र-मनोविज्ञान", "अज्ञातवास, कीचक-वध, भीम-द्रौपदी प्रसंग आ वीर-करुण भाव"], "answer": "अज्ञातवास, कीचक-वध, भीम-द्रौपदी प्रसंग आ वीर-करुण भाव", "explanation": "अज्ञातवास, कीचक-वध, भीम-द्रौपदी प्रसंग आ वीर-करुण भाव तंत्रनाथ झाक साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 186, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "तंत्रनाथ झा पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["रंगमंच", "वीरकाव्य आ नारी-गरिमाक रक्षा", "लोकजीवन", "आलोचना"], "answer": "वीरकाव्य आ नारी-गरिमाक रक्षा", "explanation": "तंत्रनाथ झाक योगदानक सार वीरकाव्य आ नारी-गरिमाक रक्षा मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 187, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "तंत्रनाथ झाक योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका केवल गणना-पद्धति बनौल", "कारण हुनका केवल राजकीय कर-सूची लिखल", "कारण हुनका माध्यमेँ वीरकाव्य आ नारी-गरिमाक रक्षा केँ बल भेटल", "कारण हुनका मंच, भाषा वा रचना-संवेदना सँ कोनो सम्बन्ध नहि छल"], "answer": "कारण हुनका माध्यमेँ वीरकाव्य आ नारी-गरिमाक रक्षा केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे तंत्रनाथ झाक योगदान वीरकाव्य आ नारी-गरिमाक रक्षा केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 188, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "तंत्रनाथ झाक नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["केवल शहरक नाम खोजब", "साहित्यिक विधा छोड़ि केवल वंशावली पढ़ब", "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "केवल नाम रटि छोड़ि देब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "तंत्रनाथ झा केँ बुझबाक लेल कीचकवध, महाकाव्य आ अमित्राक्षर काव्य आ महाभारत-प्रसंग केँ मैथिली महाकाव्यात्मक रूपमे प्रतिष्ठित करनिहार केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 189, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "तंत्रनाथ झाक रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक काजमे भाषा वा समाजक प्रश्न नै अछि", "हुनक लेखन केवल प्रशासनिक परिपत्र अछि", "हुनक रचना केवल खगोल-गणना पर सीमित अछि", "हुनक लेखन महाकाव्य आ अमित्राक्षर काव्य मार्फत वीरकाव्य आ नारी-गरिमाक रक्षा केँ उभारैत अछि"], "answer": "हुनक लेखन महाकाव्य आ अमित्राक्षर काव्य मार्फत वीरकाव्य आ नारी-गरिमाक रक्षा केँ उभारैत अछि", "explanation": "तंत्रनाथ झाक विधागत पहचान महाकाव्य आ अमित्राक्षर काव्य अछि, आ ओहिसँ वीरकाव्य आ नारी-गरिमाक रक्षाक बोध प्रबल होइत अछि।"}, {"id": 190, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "तंत्रनाथ झाक योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल बाहरी भाषा सीखबाक लेल", "केवल पृष्ठ-संख्या गिनबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "केवल मुद्रकक नाम याद रखबाक लेल"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "तंत्रनाथ झाक भूमिका आधुनिक प्रबन्ध/महाकाव्य परम्परा आ वीरकाव्य आ नारी-गरिमाक रक्षाक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 191, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "तंत्रनाथ झाक साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["वीरकाव्य आ नारी-गरिमाक रक्षा", "रंगमंच", "भाषा-संस्कार", "पात्र-मनोविज्ञान"], "answer": "वीरकाव्य आ नारी-गरिमाक रक्षा", "explanation": "एहि लेखक/कविक साहित्यिक स्वर वीरकाव्य आ नारी-गरिमाक रक्षासँ चिन्हित कएल जा सकैत अछि।"}, {"id": 192, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "तंत्रनाथ झाक सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["तंत्रनाथ झा — रमणक आलोचनात्मक लेखन", "तंत्रनाथ झा — मैथिली भाषा-साहित्य विमर्श", "तंत्रनाथ झा — मैथिली नवजागरणक साहित्यिक प्रसंग", "तंत्रनाथ झा — कीचकवध"], "answer": "तंत्रनाथ झा — कीचकवध", "explanation": "ठीक जोड़ी तंत्रनाथ झा — कीचकवध अछि।"}, {"id": 193, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "तंत्रनाथ झाक साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["केवल अंकीय संकेतक प्रयोग", "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "केवल मौन अभिनय बिना भाषा", "मैथिलीक प्रयोगक पूर्ण अभाव"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "तंत्रनाथ झाक रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ महाकाव्य आ अमित्राक्षर काव्यक माध्यमेँ बढ़बैत अछि।"}, {"id": 194, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "तंत्रनाथ झा पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["महाभारत-प्रसंग केँ मैथिली महाकाव्यात्मक रूपमे प्रतिष्ठित करनिहार", "केवल शिलालेखक तिथि-सूची", "राधा-कृष्ण भाव", "छन्द-सजगता"], "answer": "महाभारत-प्रसंग केँ मैथिली महाकाव्यात्मक रूपमे प्रतिष्ठित करनिहार", "explanation": "महाभारत-प्रसंग केँ मैथिली महाकाव्यात्मक रूपमे प्रतिष्ठित करनिहार केँ छोड़ला सँ तंत्रनाथ झाक मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 195, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "तंत्रनाथ झाक अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["केवल पृष्ठ-संख्याक आधार पर", "केवल पुरस्कार-सूची पढ़ि", "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "केवल नामक वर्णक्रमसँ"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "तंत्रनाथ झाक योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 196, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "तंत्रनाथ झाक साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["गद्यक परिपक्वता", "वीरकाव्य आ नारी-गरिमाक रक्षा", "केवल वैद्यकीय नुस्खाक संग्रह", "अनुसंधान"], "answer": "वीरकाव्य आ नारी-गरिमाक रक्षा", "explanation": "तंत्रनाथ झाक छवि वीरकाव्य आ नारी-गरिमाक रक्षा केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 197, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "तंत्रनाथ झाक प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["प्रशासन, सैनिक आदेश आ दफ्तर", "खगोल-गणना, मौसम-तालिका आ नुस्खा", "महाकाव्य आ अमित्राक्षर काव्य, वीरकाव्य आ नारी-गरिमाक रक्षा आ अज्ञातवास, कीचक-वध, भीम-द्रौपदी प्रसंग आ वीर-करुण भाव", "केवल अनुवाद, बिना मौलिकता आ बिना भाषा-चेतना"], "answer": "महाकाव्य आ अमित्राक्षर काव्य, वीरकाव्य आ नारी-गरिमाक रक्षा आ अज्ञातवास, कीचक-वध, भीम-द्रौपदी प्रसंग आ वीर-करुण भाव", "explanation": "एहि शब्द-समूहमे तंत्रनाथ झाक विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 198, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "तंत्रनाथ झाक रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["भाषाक प्रयोग घटि गेल", "रचना-परम्परा टूटि गेल", "लोक-संवेदना पूर्णतः हटि गेल", "वीरकाव्य आ नारी-गरिमाक रक्षाक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल"], "answer": "वीरकाव्य आ नारी-गरिमाक रक्षाक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "तंत्रनाथ झाक काजसँ वीरकाव्य आ नारी-गरिमाक रक्षामे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 199, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "तंत्रनाथ झाक योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["केवल रसायनिक सूत्रक प्रश्नमे", "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "केवल भूगोलक नक्शा बनाबयवला प्रश्नमे", "केवल खेलक नियम याद करयवला प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "तंत्रनाथ झाक योगदान आधुनिक प्रबन्ध/महाकाव्य परम्परा आ महाकाव्य आ अमित्राक्षर काव्यक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 200, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "तंत्रनाथ झाक सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["तंत्रनाथ झाक अध्ययनमे काल, विधा आ कृति अप्रासंगिक अछि", "तंत्रनाथ झा केवल पञ्जी-लेखक छलाह, साहित्यिक योगदान नहि", "तंत्रनाथ झाक मैथिली साहित्यसँ कोनो सम्बन्ध नहि", "तंत्रनाथ झा आधुनिक प्रबन्ध/महाकाव्य परम्परामे महाकाव्य आ अमित्राक्षर काव्य द्वारा महाभारत-प्रसंग केँ मैथिली महाकाव्यात्मक रूपमे प्रतिष्ठित करनिहार"], "answer": "तंत्रनाथ झा आधुनिक प्रबन्ध/महाकाव्य परम्परामे महाकाव्य आ अमित्राक्षर काव्य द्वारा महाभारत-प्रसंग केँ मैथिली महाकाव्यात्मक रूपमे प्रतिष्ठित करनिहार", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 201, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "हरिमोहन झाक मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["मैथिली गद्य, हास्य-व्यंग्य, सामाजिक आलोचना आ बोलचालक सहजता केँ लोकप्रिय बनौनिहार", "बेरोजगारी, सामाजिक संघर्ष, हास्य-मर्म आ मंचीय जीवनक मार्मिक प्रस्तुति देनिहार", "भाषा, रंग, साहित्य-विमर्श आ समकालीन संवेदनाकेँ जोड़निहार बहुआयामी लेखक", "मैथिली रंगमंचमे सामाजिक विषय, पात्र-संरचना आ नाटकीय संवादक विकासमे योगदान"], "answer": "मैथिली गद्य, हास्य-व्यंग्य, सामाजिक आलोचना आ बोलचालक सहजता केँ लोकप्रिय बनौनिहार", "explanation": "हरिमोहन झाक अध्ययनमे मुख्य बात मैथिली गद्य, हास्य-व्यंग्य, सामाजिक आलोचना आ बोलचालक सहजता केँ लोकप्रिय बनौनिहार अछि; एहि कारण हुनका हास्य-व्यंग्य आ सामाजिक विवेक सँ जोड़ल जाएत अछि।"}, {"id": 202, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "हरिमोहन झाक संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["भफाइत चाहक जिनगी", "व्यापार-लेखा", "कीचकवध", "खट्टर ककाक तरंग"], "answer": "खट्टर ककाक तरंग", "explanation": "हरिमोहन झाक सन्दर्भमे खट्टर ककाक तरंग महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ हास्य-व्यंग्य आ सामाजिक विवेक स्पष्ट होइत अछि।"}, {"id": 203, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "हरिमोहन झा केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["निबन्ध", "प्रबन्ध-काव्य", "भाषा-अनुसंधान", "उपन्यास, व्यंग्य, निबन्ध आ संवादप्रधान गद्य"], "answer": "उपन्यास, व्यंग्य, निबन्ध आ संवादप्रधान गद्य", "explanation": "उपन्यास, व्यंग्य, निबन्ध आ संवादप्रधान गद्य हरिमोहन झाक रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 204, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "कालक्रमक दृष्टिसँ हरिमोहन झाक साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["आधुनिक मैथिली गद्यक उत्कर्ष", "आधुनिक कथा-उपन्यास परम्परा", "आधुनिक मैथिली नवजागरण", "आदिकाल/पूर्व-विद्यापति साहित्य"], "answer": "आधुनिक मैथिली गद्यक उत्कर्ष", "explanation": "हरिमोहन झाक योगदान आधुनिक मैथिली गद्यक उत्कर्षक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 205, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "हरिमोहन झाक रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["केवल शिलालेखक तिथि-सूची", "कर्मकाण्ड, पाखण्ड, समाज-रूढ़ि आ बुद्धिवादी प्रश्नक व्यंग्यात्मक परीक्षण", "लयात्मकता", "मौखिक परम्परा"], "answer": "कर्मकाण्ड, पाखण्ड, समाज-रूढ़ि आ बुद्धिवादी प्रश्नक व्यंग्यात्मक परीक्षण", "explanation": "कर्मकाण्ड, पाखण्ड, समाज-रूढ़ि आ बुद्धिवादी प्रश्नक व्यंग्यात्मक परीक्षण हरिमोहन झाक साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 206, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "हरिमोहन झा पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["जनपक्षधरता", "आलोचना", "हास्य-व्यंग्य आ सामाजिक विवेक", "सामाजिक यथार्थ"], "answer": "हास्य-व्यंग्य आ सामाजिक विवेक", "explanation": "हरिमोहन झाक योगदानक सार हास्य-व्यंग्य आ सामाजिक विवेक मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 207, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "हरिमोहन झाक योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका मंच, भाषा वा रचना-संवेदना सँ कोनो सम्बन्ध नहि छल", "कारण हुनका केवल राजकीय कर-सूची लिखल", "कारण हुनका केवल गणना-पद्धति बनौल", "कारण हुनका माध्यमेँ हास्य-व्यंग्य आ सामाजिक विवेक केँ बल भेटल"], "answer": "कारण हुनका माध्यमेँ हास्य-व्यंग्य आ सामाजिक विवेक केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे हरिमोहन झाक योगदान हास्य-व्यंग्य आ सामाजिक विवेक केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 208, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "हरिमोहन झाक नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "केवल जन्म-वर्षक अनुमान करब", "केवल शहरक नाम खोजब", "केवल नाम रटि छोड़ि देब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "हरिमोहन झा केँ बुझबाक लेल खट्टर ककाक तरंग, उपन्यास, व्यंग्य, निबन्ध आ संवादप्रधान गद्य आ मैथिली गद्य, हास्य-व्यंग्य, सामाजिक आलोचना आ बोलचालक सहजता केँ लोकप्रिय बनौनिहार केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 209, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "हरिमोहन झाक रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक रचना केवल खगोल-गणना पर सीमित अछि", "हुनक योगदान साहित्यिक इतिहाससँ असम्बद्ध अछि", "हुनक लेखन केवल प्रशासनिक परिपत्र अछि", "हुनक लेखन उपन्यास, व्यंग्य, निबन्ध आ संवादप्रधान गद्य मार्फत हास्य-व्यंग्य आ सामाजिक विवेक केँ उभारैत अछि"], "answer": "हुनक लेखन उपन्यास, व्यंग्य, निबन्ध आ संवादप्रधान गद्य मार्फत हास्य-व्यंग्य आ सामाजिक विवेक केँ उभारैत अछि", "explanation": "हरिमोहन झाक विधागत पहचान उपन्यास, व्यंग्य, निबन्ध आ संवादप्रधान गद्य अछि, आ ओहिसँ हास्य-व्यंग्य आ सामाजिक विवेकक बोध प्रबल होइत अछि।"}, {"id": 210, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "हरिमोहन झाक योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल मनोरंजनक नाम-सूची बनबाक लेल", "केवल बाहरी भाषा सीखबाक लेल", "केवल पृष्ठ-संख्या गिनबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "हरिमोहन झाक भूमिका आधुनिक मैथिली गद्यक उत्कर्ष आ हास्य-व्यंग्य आ सामाजिक विवेकक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 211, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "हरिमोहन झाक साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["पात्र-मनोविज्ञान", "सामाजिक चेतना", "ऐतिहासिक दृष्टि", "हास्य-व्यंग्य आ सामाजिक विवेक"], "answer": "हास्य-व्यंग्य आ सामाजिक विवेक", "explanation": "एहि लेखक/कविक साहित्यिक स्वर हास्य-व्यंग्य आ सामाजिक विवेकसँ चिन्हित कएल जा सकैत अछि।"}, {"id": 212, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "हरिमोहन झाक सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["हरिमोहन झा — लोकसाहित्य-सम्बन्धी विमर्श", "हरिमोहन झा — खट्टर ककाक तरंग", "हरिमोहन झा — अमरक मुक्तक-काव्य", "हरिमोहन झा — चित्रा"], "answer": "हरिमोहन झा — खट्टर ककाक तरंग", "explanation": "ठीक जोड़ी हरिमोहन झा — खट्टर ककाक तरंग अछि।"}, {"id": 213, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "हरिमोहन झाक साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "केवल अंकीय संकेतक प्रयोग", "केवल मौन अभिनय बिना भाषा", "मैथिलीक प्रयोगक पूर्ण अभाव"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "हरिमोहन झाक रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ उपन्यास, व्यंग्य, निबन्ध आ संवादप्रधान गद्यक माध्यमेँ बढ़बैत अछि।"}, {"id": 214, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "हरिमोहन झा पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["मैथिली गद्य, हास्य-व्यंग्य, सामाजिक आलोचना आ बोलचालक सहजता केँ लोकप्रिय बनौनिहार", "मंचीय संवाद", "केवल शिलालेखक तिथि-सूची", "ग्राम्य परिवेश"], "answer": "मैथिली गद्य, हास्य-व्यंग्य, सामाजिक आलोचना आ बोलचालक सहजता केँ लोकप्रिय बनौनिहार", "explanation": "मैथिली गद्य, हास्य-व्यंग्य, सामाजिक आलोचना आ बोलचालक सहजता केँ लोकप्रिय बनौनिहार केँ छोड़ला सँ हरिमोहन झाक मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 215, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "हरिमोहन झाक अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["केवल पुरस्कार-सूची पढ़ि", "केवल पृष्ठ-संख्याक आधार पर", "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "केवल छपाईक आकार देखि"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "हरिमोहन झाक योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 216, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "हरिमोहन झाक साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["हास्य-व्यंग्य आ सामाजिक विवेक", "केवल राजकीय प्रशासनिक आदेशक संकलन", "जनपक्षधरता", "गद्यक परिपक्वता"], "answer": "हास्य-व्यंग्य आ सामाजिक विवेक", "explanation": "हरिमोहन झाक छवि हास्य-व्यंग्य आ सामाजिक विवेक केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 217, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "हरिमोहन झाक प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["खगोल-गणना, मौसम-तालिका आ नुस्खा", "प्रशासन, सैनिक आदेश आ दफ्तर", "केवल अनुवाद, बिना मौलिकता आ बिना भाषा-चेतना", "उपन्यास, व्यंग्य, निबन्ध आ संवादप्रधान गद्य, हास्य-व्यंग्य आ सामाजिक विवेक आ कर्मकाण्ड, पाखण्ड, समाज-रूढ़ि आ बुद्धिवादी प्रश्नक व्यंग्यात्मक परीक्षण"], "answer": "उपन्यास, व्यंग्य, निबन्ध आ संवादप्रधान गद्य, हास्य-व्यंग्य आ सामाजिक विवेक आ कर्मकाण्ड, पाखण्ड, समाज-रूढ़ि आ बुद्धिवादी प्रश्नक व्यंग्यात्मक परीक्षण", "explanation": "एहि शब्द-समूहमे हरिमोहन झाक विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 218, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "हरिमोहन झाक रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["लोक-संवेदना पूर्णतः हटि गेल", "रचना-परम्परा टूटि गेल", "साहित्यिक विधा समाप्त भऽ गेल", "हास्य-व्यंग्य आ सामाजिक विवेकक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल"], "answer": "हास्य-व्यंग्य आ सामाजिक विवेकक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "हरिमोहन झाक काजसँ हास्य-व्यंग्य आ सामाजिक विवेकमे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 219, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "हरिमोहन झाक योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे", "केवल भूगोलक नक्शा बनाबयवला प्रश्नमे", "केवल खेलक नियम याद करयवला प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "हरिमोहन झाक योगदान आधुनिक मैथिली गद्यक उत्कर्ष आ उपन्यास, व्यंग्य, निबन्ध आ संवादप्रधान गद्यक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 220, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "हरिमोहन झाक सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["हरिमोहन झा केवल पञ्जी-लेखक छलाह, साहित्यिक योगदान नहि", "हरिमोहन झाक मैथिली साहित्यसँ कोनो सम्बन्ध नहि", "हरिमोहन झाक योगदान केवल व्यापारिक लेखामे सीमित रहल", "हरिमोहन झा आधुनिक मैथिली गद्यक उत्कर्षमे उपन्यास, व्यंग्य, निबन्ध आ संवादप्रधान गद्य द्वारा मैथिली गद्य, हास्य-व्यंग्य, सामाजिक आलोचना आ बोलचालक सहजता केँ लोकप्रिय बनौनिहार"], "answer": "हरिमोहन झा आधुनिक मैथिली गद्यक उत्कर्षमे उपन्यास, व्यंग्य, निबन्ध आ संवादप्रधान गद्य द्वारा मैथिली गद्य, हास्य-व्यंग्य, सामाजिक आलोचना आ बोलचालक सहजता केँ लोकप्रिय बनौनिहार", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 221, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "यात्रीक मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["लोकसाहित्य, साहित्यिक परम्परा, आलोचना आ शोध-पद्धति केँ जोड़निहार", "मैथिली नाटकमे गीत, संवाद, भक्ति आ मंचीय परम्पराक विकाससँ जुड़ल नाम", "लोकजीवन, जन-संघर्ष, प्रकृति, व्यंग्य आ प्रगतिशील चेतनाकेँ मैथिलीमे प्रखर करनिहार", "आधुनिक मैथिली अभिव्यक्ति, काव्य-स्वर आ सामाजिक संवेदनाक विकासमे योगदान"], "answer": "लोकजीवन, जन-संघर्ष, प्रकृति, व्यंग्य आ प्रगतिशील चेतनाकेँ मैथिलीमे प्रखर करनिहार", "explanation": "यात्रीक अध्ययनमे मुख्य बात लोकजीवन, जन-संघर्ष, प्रकृति, व्यंग्य आ प्रगतिशील चेतनाकेँ मैथिलीमे प्रखर करनिहार अछि; एहि कारण हुनका जनपक्षधर आधुनिकता सँ जोड़ल जाएत अछि।"}, {"id": 222, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "यात्रीक संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["चित्रा", "समकालीन मैथिली कविता सम्बन्धी योगदान", "मैथिली भाषा-साहित्य विमर्श", "आरसीक काव्य-योगदान"], "answer": "चित्रा", "explanation": "यात्रीक सन्दर्भमे चित्रा महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ जनपक्षधर आधुनिकता स्पष्ट होइत अछि।"}, {"id": 223, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "यात्री केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["लोकसाहित्य", "मुक्तक-काव्य", "गीतिकाव्य", "कविता, कथा, उपन्यास आ जनधर्मी लेखन"], "answer": "कविता, कथा, उपन्यास आ जनधर्मी लेखन", "explanation": "कविता, कथा, उपन्यास आ जनधर्मी लेखन यात्रीक रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 224, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "कालक्रमक दृष्टिसँ यात्रीक साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["आधुनिक जनमुखी काव्य-कथा परम्परा", "नेपालक मध्यकालीन मैथिली नाटक", "आधुनिक समालोचना", "मध्यकालीन मैथिली साहित्य"], "answer": "आधुनिक जनमुखी काव्य-कथा परम्परा", "explanation": "यात्रीक योगदान आधुनिक जनमुखी काव्य-कथा परम्पराक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 225, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "यात्रीक रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["केवल विदेशी यात्रावृत्तक अनुवाद", "गाम-घरक भाषा, सामाजिक प्रतिरोध, जनपक्षधरता आ तीक्ष्ण व्यंग्य", "राधा-कृष्ण भाव", "लयात्मकता"], "answer": "गाम-घरक भाषा, सामाजिक प्रतिरोध, जनपक्षधरता आ तीक्ष्ण व्यंग्य", "explanation": "गाम-घरक भाषा, सामाजिक प्रतिरोध, जनपक्षधरता आ तीक्ष्ण व्यंग्य यात्रीक साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 226, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "यात्री पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["शृङ्गार आ भक्ति", "लोकजीवन", "जनपक्षधर आधुनिकता", "केवल तिथि-स्मरण"], "answer": "जनपक्षधर आधुनिकता", "explanation": "यात्रीक योगदानक सार जनपक्षधर आधुनिकता मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 227, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "यात्रीक योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका मंच, भाषा वा रचना-संवेदना सँ कोनो सम्बन्ध नहि छल", "कारण हुनका माध्यमेँ जनपक्षधर आधुनिकता केँ बल भेटल", "कारण हुनका केवल राजकीय कर-सूची लिखल", "कारण हुनका केवल शिलालेख पढ़ल"], "answer": "कारण हुनका माध्यमेँ जनपक्षधर आधुनिकता केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे यात्रीक योगदान जनपक्षधर आधुनिकता केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 228, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "यात्रीक नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "साहित्यिक विधा छोड़ि केवल वंशावली पढ़ब", "केवल शहरक नाम खोजब", "केवल नाम रटि छोड़ि देब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "यात्री केँ बुझबाक लेल चित्रा, कविता, कथा, उपन्यास आ जनधर्मी लेखन आ लोकजीवन, जन-संघर्ष, प्रकृति, व्यंग्य आ प्रगतिशील चेतनाकेँ मैथिलीमे प्रखर करनिहार केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 229, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "यात्रीक रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक काजमे भाषा वा समाजक प्रश्न नै अछि", "हुनक लेखन केवल प्रशासनिक परिपत्र अछि", "हुनक लेखन कविता, कथा, उपन्यास आ जनधर्मी लेखन मार्फत जनपक्षधर आधुनिकता केँ उभारैत अछि", "हुनक योगदान साहित्यिक इतिहाससँ असम्बद्ध अछि"], "answer": "हुनक लेखन कविता, कथा, उपन्यास आ जनधर्मी लेखन मार्फत जनपक्षधर आधुनिकता केँ उभारैत अछि", "explanation": "यात्रीक विधागत पहचान कविता, कथा, उपन्यास आ जनधर्मी लेखन अछि, आ ओहिसँ जनपक्षधर आधुनिकताक बोध प्रबल होइत अछि।"}, {"id": 230, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "यात्रीक योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल मुद्रकक नाम याद रखबाक लेल", "केवल बाहरी भाषा सीखबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "केवल पृष्ठ-संख्या गिनबाक लेल"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "यात्रीक भूमिका आधुनिक जनमुखी काव्य-कथा परम्परा आ जनपक्षधर आधुनिकताक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 231, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "यात्रीक साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["ऐतिहासिक दृष्टि", "शृङ्गार आ भक्ति", "ग्राम्य परिवेश", "जनपक्षधर आधुनिकता"], "answer": "जनपक्षधर आधुनिकता", "explanation": "एहि लेखक/कविक साहित्यिक स्वर जनपक्षधर आधुनिकतासँ चिन्हित कएल जा सकैत अछि।"}, {"id": 232, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "यात्रीक सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["यात्री — चित्रा", "यात्री — भफाइत चाहक जिनगी", "यात्री — बेटीक अपमान आ छीनरदेवी", "यात्री — विदितक कथा-लेखन"], "answer": "यात्री — चित्रा", "explanation": "ठीक जोड़ी यात्री — चित्रा अछि।"}, {"id": 233, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "यात्रीक साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["केवल मौन अभिनय बिना भाषा", "भाषा-संवेदना सँ असम्बद्धता", "मैथिलीक प्रयोगक पूर्ण अभाव", "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "यात्रीक रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ कविता, कथा, उपन्यास आ जनधर्मी लेखनक माध्यमेँ बढ़बैत अछि।"}, {"id": 234, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "यात्री पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["लोकजीवन, जन-संघर्ष, प्रकृति, व्यंग्य आ प्रगतिशील चेतनाकेँ मैथिलीमे प्रखर करनिहार", "केवल शिलालेखक तिथि-सूची", "मंचीय संवाद", "केवल विदेशी यात्रावृत्तक अनुवाद"], "answer": "लोकजीवन, जन-संघर्ष, प्रकृति, व्यंग्य आ प्रगतिशील चेतनाकेँ मैथिलीमे प्रखर करनिहार", "explanation": "लोकजीवन, जन-संघर्ष, प्रकृति, व्यंग्य आ प्रगतिशील चेतनाकेँ मैथिलीमे प्रखर करनिहार केँ छोड़ला सँ यात्रीक मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 235, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "यात्रीक अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["केवल पुरस्कार-सूची पढ़ि", "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "केवल पृष्ठ-संख्याक आधार पर", "केवल छपाईक आकार देखि"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "यात्रीक योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 236, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "यात्रीक साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["केवल विदेशी यात्रावृत्तक अनुवाद", "अनुसंधान", "केवल शिलालेखक तिथि-सूची", "जनपक्षधर आधुनिकता"], "answer": "जनपक्षधर आधुनिकता", "explanation": "यात्रीक छवि जनपक्षधर आधुनिकता केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 237, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "यात्रीक प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["कविता, कथा, उपन्यास आ जनधर्मी लेखन, जनपक्षधर आधुनिकता आ गाम-घरक भाषा, सामाजिक प्रतिरोध, जनपक्षधरता आ तीक्ष्ण व्यंग्य", "प्रशासन, सैनिक आदेश आ दफ्तर", "केवल अनुवाद, बिना मौलिकता आ बिना भाषा-चेतना", "कर-सूची, नाप-जोख आ बाजार-भाव"], "answer": "कविता, कथा, उपन्यास आ जनधर्मी लेखन, जनपक्षधर आधुनिकता आ गाम-घरक भाषा, सामाजिक प्रतिरोध, जनपक्षधरता आ तीक्ष्ण व्यंग्य", "explanation": "एहि शब्द-समूहमे यात्रीक विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 238, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "यात्रीक रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["लोक-संवेदना पूर्णतः हटि गेल", "भाषाक प्रयोग घटि गेल", "जनपक्षधर आधुनिकताक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "साहित्यिक विधा समाप्त भऽ गेल"], "answer": "जनपक्षधर आधुनिकताक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "यात्रीक काजसँ जनपक्षधर आधुनिकतामे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 239, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "यात्रीक योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे", "केवल भूगोलक नक्शा बनाबयवला प्रश्नमे", "केवल खेलक नियम याद करयवला प्रश्नमे", "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "यात्रीक योगदान आधुनिक जनमुखी काव्य-कथा परम्परा आ कविता, कथा, उपन्यास आ जनधर्मी लेखनक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 240, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "यात्रीक सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["यात्रीक योगदान केवल व्यापारिक लेखामे सीमित रहल", "यात्री केवल पञ्जी-लेखक छलाह, साहित्यिक योगदान नहि", "यात्री आधुनिक जनमुखी काव्य-कथा परम्परामे कविता, कथा, उपन्यास आ जनधर्मी लेखन द्वारा लोकजीवन, जन-संघर्ष, प्रकृति, व्यंग्य आ प्रगतिशील चेतनाकेँ मैथिलीमे प्रखर करनिहार", "यात्रीक अध्ययनमे काल, विधा आ कृति अप्रासंगिक अछि"], "answer": "यात्री आधुनिक जनमुखी काव्य-कथा परम्परामे कविता, कथा, उपन्यास आ जनधर्मी लेखन द्वारा लोकजीवन, जन-संघर्ष, प्रकृति, व्यंग्य आ प्रगतिशील चेतनाकेँ मैथिलीमे प्रखर करनिहार", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 241, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "उपेन्द्रनाथ झा ‘व्यास’क मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["मैथिली कथा-गद्यक सामाजिक धरातल, पात्र-विकास आ कथात्मक भाषा केँ बल देनिहार", "असमक भक्ति-नाट्य परम्परा, संगीत, अभिनय आ धर्म-प्रसारक नाट्यरूपसँ जुड़ल महत्त्वपूर्ण नाम", "मैथिली रंगमंचमे सामाजिक कथ्य, संवाद-शक्ति आ नाटकीय संरचनाक विस्तार देनिहार", "मैथिली भाषा-सम्मान, रामकाव्य, छन्द-विधान आ लोक-भाषिक गौरवक युगप्रवर्तक"], "answer": "मैथिली कथा-गद्यक सामाजिक धरातल, पात्र-विकास आ कथात्मक भाषा केँ बल देनिहार", "explanation": "उपेन्द्रनाथ झा ‘व्यास’क अध्ययनमे मुख्य बात मैथिली कथा-गद्यक सामाजिक धरातल, पात्र-विकास आ कथात्मक भाषा केँ बल देनिहार अछि; एहि कारण हुनका आधुनिक कथा-संरचना सँ जोड़ल जाएत अछि।"}, {"id": 242, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "उपेन्द्रनाथ झा ‘व्यास’क संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["खट्टर ककाक तरंग", "रमणक आलोचनात्मक लेखन", "व्यासक कथा-साहित्यिक योगदान", "भफाइत चाहक जिनगी"], "answer": "व्यासक कथा-साहित्यिक योगदान", "explanation": "उपेन्द्रनाथ झा ‘व्यास’क सन्दर्भमे व्यासक कथा-साहित्यिक योगदान महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ आधुनिक कथा-संरचना स्पष्ट होइत अछि।"}, {"id": 243, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "उपेन्द्रनाथ झा ‘व्यास’ केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["लोकसाहित्य", "कथा-उपन्यास", "गीतिकाव्य", "कथा, उपन्यास आ सामाजिक गद्य"], "answer": "कथा, उपन्यास आ सामाजिक गद्य", "explanation": "कथा, उपन्यास आ सामाजिक गद्य उपेन्द्रनाथ झा ‘व्यास’क रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 244, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "कालक्रमक दृष्टिसँ उपेन्द्रनाथ झा ‘व्यास’क साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["आधुनिक कथा-उपन्यास परम्परा", "आधुनिक समालोचना", "मध्यकालीन मैथिली साहित्य", "उत्तर-विद्यापति पदावली परम्परा"], "answer": "आधुनिक कथा-उपन्यास परम्परा", "explanation": "उपेन्द्रनाथ झा ‘व्यास’क योगदान आधुनिक कथा-उपन्यास परम्पराक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 245, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "उपेन्द्रनाथ झा ‘व्यास’क रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["ग्राम्य समाज, परिवार, नैतिक द्वन्द्व आ कथानक-विन्यास", "पात्र-मनोविज्ञान", "भाषिक अनुशासन", "सामाजिक चेतना"], "answer": "ग्राम्य समाज, परिवार, नैतिक द्वन्द्व आ कथानक-विन्यास", "explanation": "ग्राम्य समाज, परिवार, नैतिक द्वन्द्व आ कथानक-विन्यास उपेन्द्रनाथ झा ‘व्यास’क साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 246, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "उपेन्द्रनाथ झा ‘व्यास’ पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["रंगमंच", "आधुनिक कथा-संरचना", "केवल तिथि-स्मरण", "स्त्री-अनुभव"], "answer": "आधुनिक कथा-संरचना", "explanation": "उपेन्द्रनाथ झा ‘व्यास’क योगदानक सार आधुनिक कथा-संरचना मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 247, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "उपेन्द्रनाथ झा ‘व्यास’क योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका केवल गणना-पद्धति बनौल", "कारण हुनका केवल राजकीय कर-सूची लिखल", "कारण हुनका मंच, भाषा वा रचना-संवेदना सँ कोनो सम्बन्ध नहि छल", "कारण हुनका माध्यमेँ आधुनिक कथा-संरचना केँ बल भेटल"], "answer": "कारण हुनका माध्यमेँ आधुनिक कथा-संरचना केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे उपेन्द्रनाथ झा ‘व्यास’क योगदान आधुनिक कथा-संरचना केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 248, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "उपेन्द्रनाथ झा ‘व्यास’क नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["साहित्यिक विधा छोड़ि केवल वंशावली पढ़ब", "केवल शहरक नाम खोजब", "केवल नाम रटि छोड़ि देब", "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "उपेन्द्रनाथ झा ‘व्यास’ केँ बुझबाक लेल व्यासक कथा-साहित्यिक योगदान, कथा, उपन्यास आ सामाजिक गद्य आ मैथिली कथा-गद्यक सामाजिक धरातल, पात्र-विकास आ कथात्मक भाषा केँ बल देनिहार केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 249, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "उपेन्द्रनाथ झा ‘व्यास’क रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक रचना केवल खगोल-गणना पर सीमित अछि", "हुनक लेखन कथा, उपन्यास आ सामाजिक गद्य मार्फत आधुनिक कथा-संरचना केँ उभारैत अछि", "हुनक लेखन केवल प्रशासनिक परिपत्र अछि", "हुनक योगदान साहित्यिक इतिहाससँ असम्बद्ध अछि"], "answer": "हुनक लेखन कथा, उपन्यास आ सामाजिक गद्य मार्फत आधुनिक कथा-संरचना केँ उभारैत अछि", "explanation": "उपेन्द्रनाथ झा ‘व्यास’क विधागत पहचान कथा, उपन्यास आ सामाजिक गद्य अछि, आ ओहिसँ आधुनिक कथा-संरचनाक बोध प्रबल होइत अछि।"}, {"id": 250, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "उपेन्द्रनाथ झा ‘व्यास’क योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल पृष्ठ-संख्या गिनबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "केवल बाहरी भाषा सीखबाक लेल", "केवल मुद्रकक नाम याद रखबाक लेल"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "उपेन्द्रनाथ झा ‘व्यास’क भूमिका आधुनिक कथा-उपन्यास परम्परा आ आधुनिक कथा-संरचनाक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 251, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "उपेन्द्रनाथ झा ‘व्यास’क साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["आधुनिक कथा-संरचना", "अनुसंधान", "शृङ्गार आ भक्ति", "लोकजीवन"], "answer": "आधुनिक कथा-संरचना", "explanation": "एहि लेखक/कविक साहित्यिक स्वर आधुनिक कथा-संरचनासँ चिन्हित कएल जा सकैत अछि।"}, {"id": 252, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "उपेन्द्रनाथ झा ‘व्यास’क सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["उपेन्द्रनाथ झा ‘व्यास’ — व्यासक कथा-साहित्यिक योगदान", "उपेन्द्रनाथ झा ‘व्यास’ — आधुनिक मैथिली कथा-लेखन", "उपेन्द्रनाथ झा ‘व्यास’ — मैथिली भाषा-साहित्य विमर्श", "उपेन्द्रनाथ झा ‘व्यास’ — मैथिली नारी-चेतनाक कथा-परम्परा"], "answer": "उपेन्द्रनाथ झा ‘व्यास’ — व्यासक कथा-साहित्यिक योगदान", "explanation": "ठीक जोड़ी उपेन्द्रनाथ झा ‘व्यास’ — व्यासक कथा-साहित्यिक योगदान अछि।"}, {"id": 253, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "उपेन्द्रनाथ झा ‘व्यास’क साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "भाषा-संवेदना सँ असम्बद्धता", "केवल अंकीय संकेतक प्रयोग", "केवल मौन अभिनय बिना भाषा"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "उपेन्द्रनाथ झा ‘व्यास’क रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ कथा, उपन्यास आ सामाजिक गद्यक माध्यमेँ बढ़बैत अछि।"}, {"id": 254, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "उपेन्द्रनाथ झा ‘व्यास’ पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["प्रतीकात्मकता", "मंचीय संवाद", "मैथिली कथा-गद्यक सामाजिक धरातल, पात्र-विकास आ कथात्मक भाषा केँ बल देनिहार", "केवल वैद्यकीय नुस्खाक संग्रह"], "answer": "मैथिली कथा-गद्यक सामाजिक धरातल, पात्र-विकास आ कथात्मक भाषा केँ बल देनिहार", "explanation": "मैथिली कथा-गद्यक सामाजिक धरातल, पात्र-विकास आ कथात्मक भाषा केँ बल देनिहार केँ छोड़ला सँ उपेन्द्रनाथ झा ‘व्यास’क मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 255, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "उपेन्द्रनाथ झा ‘व्यास’क अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["केवल पृष्ठ-संख्याक आधार पर", "केवल छपाईक आकार देखि", "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "केवल पुरस्कार-सूची पढ़ि"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "उपेन्द्रनाथ झा ‘व्यास’क योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 256, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "उपेन्द्रनाथ झा ‘व्यास’क साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["केवल गणितीय सूत्रक व्याख्या", "केवल पञ्चाङ्गक गणना", "शृङ्गार आ भक्ति", "आधुनिक कथा-संरचना"], "answer": "आधुनिक कथा-संरचना", "explanation": "उपेन्द्रनाथ झा ‘व्यास’क छवि आधुनिक कथा-संरचना केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 257, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "उपेन्द्रनाथ झा ‘व्यास’क प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["कथा, उपन्यास आ सामाजिक गद्य, आधुनिक कथा-संरचना आ ग्राम्य समाज, परिवार, नैतिक द्वन्द्व आ कथानक-विन्यास", "प्रशासन, सैनिक आदेश आ दफ्तर", "कर-सूची, नाप-जोख आ बाजार-भाव", "केवल अनुवाद, बिना मौलिकता आ बिना भाषा-चेतना"], "answer": "कथा, उपन्यास आ सामाजिक गद्य, आधुनिक कथा-संरचना आ ग्राम्य समाज, परिवार, नैतिक द्वन्द्व आ कथानक-विन्यास", "explanation": "एहि शब्द-समूहमे उपेन्द्रनाथ झा ‘व्यास’क विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 258, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "उपेन्द्रनाथ झा ‘व्यास’क रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["लोक-संवेदना पूर्णतः हटि गेल", "साहित्यिक विधा समाप्त भऽ गेल", "रचना-परम्परा टूटि गेल", "आधुनिक कथा-संरचनाक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल"], "answer": "आधुनिक कथा-संरचनाक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "उपेन्द्रनाथ झा ‘व्यास’क काजसँ आधुनिक कथा-संरचनामे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 259, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "उपेन्द्रनाथ झा ‘व्यास’क योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["केवल भूगोलक नक्शा बनाबयवला प्रश्नमे", "केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे", "केवल रसायनिक सूत्रक प्रश्नमे", "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "उपेन्द्रनाथ झा ‘व्यास’क योगदान आधुनिक कथा-उपन्यास परम्परा आ कथा, उपन्यास आ सामाजिक गद्यक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 260, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "उपेन्द्रनाथ झा ‘व्यास’क सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["उपेन्द्रनाथ झा ‘व्यास’ आधुनिक कथा-उपन्यास परम्परामे कथा, उपन्यास आ सामाजिक गद्य द्वारा मैथिली कथा-गद्यक सामाजिक धरातल, पात्र-विकास आ कथात्मक भाषा केँ बल देनिहार", "उपेन्द्रनाथ झा ‘व्यास’क योगदान केवल व्यापारिक लेखामे सीमित रहल", "उपेन्द्रनाथ झा ‘व्यास’क मैथिली साहित्यसँ कोनो सम्बन्ध नहि", "उपेन्द्रनाथ झा ‘व्यास’ केवल पञ्जी-लेखक छलाह, साहित्यिक योगदान नहि"], "answer": "उपेन्द्रनाथ झा ‘व्यास’ आधुनिक कथा-उपन्यास परम्परामे कथा, उपन्यास आ सामाजिक गद्य द्वारा मैथिली कथा-गद्यक सामाजिक धरातल, पात्र-विकास आ कथात्मक भाषा केँ बल देनिहार", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 261, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "ब्रजकिशोर वर्मा ‘मणिपद्म’क मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["समकालीन रंगमंचमे नवीन विषय, युवा-चेतना, अभिनययोग्य संवाद आ प्रयोगशीलता केँ बल देनिहार", "मैथिली गीतिकाव्य केँ लोकभाषा, प्रेम, भक्ति आ संगीतक ऊँचाई देनिहार", "ग्राम्य-संस्कृति, लोक-संसार आ सामाजिक परिवर्तनक कथा-स्वर केँ बल देनिहार", "लोकगाथा, इतिहास-बोध, शोषण-विरोध आ समाज-संघर्ष केँ उपन्यासमे रूपायित करनिहार"], "answer": "लोकगाथा, इतिहास-बोध, शोषण-विरोध आ समाज-संघर्ष केँ उपन्यासमे रूपायित करनिहार", "explanation": "ब्रजकिशोर वर्मा ‘मणिपद्म’क अध्ययनमे मुख्य बात लोकगाथा, इतिहास-बोध, शोषण-विरोध आ समाज-संघर्ष केँ उपन्यासमे रूपायित करनिहार अछि; एहि कारण हुनका लोकगाथाक आधुनिक उपन्यास रूप सँ जोड़ल जाएत अछि।"}, {"id": 262, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "ब्रजकिशोर वर्मा ‘मणिपद्म’क संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["आधुनिक मैथिली कथा-लेखन", "कृति राजकमल", "लोरिक-विजय", "आधुनिक मैथिली उपन्यास-परम्परा"], "answer": "लोरिक-विजय", "explanation": "ब्रजकिशोर वर्मा ‘मणिपद्म’क सन्दर्भमे लोरिक-विजय महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ लोकगाथाक आधुनिक उपन्यास रूप स्पष्ट होइत अछि।"}, {"id": 263, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "ब्रजकिशोर वर्मा ‘मणिपद्म’ केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["लोकसाहित्य", "उपन्यास आ कथा", "समालोचना", "निबन्ध"], "answer": "उपन्यास आ कथा", "explanation": "उपन्यास आ कथा ब्रजकिशोर वर्मा ‘मणिपद्म’क रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 264, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "कालक्रमक दृष्टिसँ ब्रजकिशोर वर्मा ‘मणिपद्म’क साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["समकालीन मैथिली साहित्य", "आधुनिक ऐतिहासिक/लोकगाथात्मक उपन्यास धारा", "उत्तर-विद्यापति पदावली परम्परा", "नेपालक मध्यकालीन मैथिली नाटक"], "answer": "आधुनिक ऐतिहासिक/लोकगाथात्मक उपन्यास धारा", "explanation": "ब्रजकिशोर वर्मा ‘मणिपद्म’क योगदान आधुनिक ऐतिहासिक/लोकगाथात्मक उपन्यास धाराक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 265, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "ब्रजकिशोर वर्मा ‘मणिपद्म’क रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["ग्राम्य परिवेश", "लोकभाषाक सहजता", "लोरिकक वीरता, लोक-स्मृति, सामन्ती अत्याचार आ संघर्षधर्मी कथानक", "केवल गणितीय सूत्रक व्याख्या"], "answer": "लोरिकक वीरता, लोक-स्मृति, सामन्ती अत्याचार आ संघर्षधर्मी कथानक", "explanation": "लोरिकक वीरता, लोक-स्मृति, सामन्ती अत्याचार आ संघर्षधर्मी कथानक ब्रजकिशोर वर्मा ‘मणिपद्म’क साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 266, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "ब्रजकिशोर वर्मा ‘मणिपद्म’ पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["केवल मूल्य-सूची", "लोकगाथाक आधुनिक उपन्यास रूप", "शृङ्गार आ भक्ति", "लोकजीवन"], "answer": "लोकगाथाक आधुनिक उपन्यास रूप", "explanation": "ब्रजकिशोर वर्मा ‘मणिपद्म’क योगदानक सार लोकगाथाक आधुनिक उपन्यास रूप मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 267, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "ब्रजकिशोर वर्मा ‘मणिपद्म’क योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल ज ोध, शोषण-विरोध आ समाज-संघर्ष केँ उपन्यासमे रूपायित करनिहार", "explanation": "लोकगाथा, इतिहास-बोध, शोषण-विरोध आ समाज-संघर्ष केँ उपन्यासमे रूपायित करनिहार केँ छोड़ला सँ ब्रजकिशोर वर्मा ‘मणिपद्म’क मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 275, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "ब्रजकिशोर वर्मा ‘मणिपद्म’क अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["केवल पृष्ठ-संख्याक आधार पर", "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "केवल छपाईक आकार देखि", "केवल पुरस्कार-सूची पढ़ि"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "ब्रजकिशोर वर्मा ‘मणिपद्म’क योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 276, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "ब्रजकिशोर वर्मा ‘मणिपद्म’क साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["केवल वैद्यकीय नुस्खाक संग्रह", "केवल शिलालेखक तिथि-सूची", "लोकगाथाक आधुनिक उपन्यास रूप", "केवल खेतीक माप-जोखक तालिका"], "answer": "लोकगाथाक आधुनिक उपन्यास रूप", "explanation": "ब्रजकिशोर वर्मा ‘मणिपद्म’क छवि लोकगाथाक आधुनिक उपन्यास रूप केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 277, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "ब्रजकिशोर वर्मा ‘मणिपद्म’क प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["कर-सूची, नाप-जोख आ बाजार-भाव", "प्रशासन, सैनिक आदेश आ दफ्तर", "केवल अनुवाद, बिना मौलिकता आ बिना भाषा-चेतना", "उपन्यास आ कथा, लोकगाथाक आधुनिक उपन्यास रूप आ लोरिकक वीरता, लोक-स्मृति, सामन्ती अत्याचार आ संघर्षधर्मी कथानक"], "answer": "उपन्यास आ कथा, लोकगाथाक आधुनिक उपन्यास रूप आ लोरिकक वीरता, लोक-स्मृति, सामन्ती अत्याचार आ संघर्षधर्मी कथानक", "explanation": "एहि शब्द-समूहमे ब्रजकिशोर वर्मा ‘मणिपद्म’क विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 278, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "ब्रजकिशोर वर्मा ‘मणिपद्म’क रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भे
