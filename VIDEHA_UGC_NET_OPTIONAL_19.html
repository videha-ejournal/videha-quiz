answer": "मैथिली गीतक मधुरता, भाव-लालित्य आ भाषा-संस्कार केँ सुदृढ़ करनिहार", "explanation": "मैथिली गीतक मधुरता, भाव-लालित्य आ भाषा-संस्कार केँ सुदृढ़ करनिहार केँ छोड़ला सँ काशीकान्त मिश्र ‘मधुप’क मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 415, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "काशीकान्त मिश्र ‘मधुप’क अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["केवल पृष्ठ-संख्याक आधार पर", "केवल पुरस्कार-सूची पढ़ि", "केवल छपाईक आकार देखि", "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "काशीकान्त मिश्र ‘मधुप’क योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 416, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "काशीकान्त मिश्र ‘मधुप’क साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["केवल वैद्यकीय नुस्खाक संग्रह", "लोकजीवन", "गीतात्मक मधुरता", "छन्द-विधान"], "answer": "गीतात्मक मधुरता", "explanation": "काशीकान्त मिश्र ‘मधुप’क छवि गीतात्मक मधुरता केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 417, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "काशीकान्त मिश्र ‘मधुप’क प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["प्रशासन, सैनिक आदेश आ दफ्तर", "कर-सूची, नाप-जोख आ बाजार-भाव", "गीत, मुक्तक आ भावकाव्य, गीतात्मक मधुरता आ कोमल भाव, लयात्मकता, सौंदर्य-बोध आ छन्द-सजगता", "केवल अनुवाद, बिना मौलिकता आ बिना भाषा-चेतना"], "answer": "गीत, मुक्तक आ भावकाव्य, गीतात्मक मधुरता आ कोमल भाव, लयात्मकता, सौंदर्य-बोध आ छन्द-सजगता", "explanation": "एहि शब्द-समूहमे काशीकान्त मिश्र ‘मधुप’क विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 418, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "काशीकान्त मिश्र ‘मधुप’क रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["साहित्यिक विधा समाप्त भऽ गेल", "भाषाक प्रयोग घटि गेल", "गीतात्मक मधुरताक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "रचना-परम्परा टूटि गेल"], "answer": "गीतात्मक मधुरताक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "काशीकान्त मिश्र ‘मधुप’क काजसँ गीतात्मक मधुरतामे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 419, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "काशीकान्त मिश्र ‘मधुप’क योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "केवल खेलक नियम याद करयवला प्रश्नमे", "केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे", "केवल भूगोलक नक्शा बनाबयवला प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "काशीकान्त मिश्र ‘मधुप’क योगदान आधुनिक मुक्तक-काव्य आ गीत, मुक्तक आ भावकाव्यक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 420, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "काशीकान्त मिश्र ‘मधुप’क सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["काशीकान्त मिश्र ‘मधुप’क योगदान केवल व्यापारिक लेखामे सीमित रहल", "काशीकान्त मिश्र ‘मधुप’ केवल पञ्जी-लेखक छलाह, साहित्यिक योगदान नहि", "काशीकान्त मिश्र ‘मधुप’क मैथिली साहित्यसँ कोनो सम्बन्ध नहि", "काशीकान्त मिश्र ‘मधुप’ आधुनिक मुक्तक-काव्यमे गीत, मुक्तक आ भावकाव्य द्वारा मैथिली गीतक मधुरता, भाव-लालित्य आ भाषा-संस्कार केँ सुदृढ़ करनिहार"], "answer": "काशीकान्त मिश्र ‘मधुप’ आधुनिक मुक्तक-काव्यमे गीत, मुक्तक आ भावकाव्य द्वारा मैथिली गीतक मधुरता, भाव-लालित्य आ भाषा-संस्कार केँ सुदृढ़ करनिहार", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 421, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "सुरेन्द्र झा ‘सुमन’क मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["मैथिली भाषा-सम्मान, रामकाव्य, छन्द-विधान आ लोक-भाषिक गौरवक युगप्रवर्तक", "प्रबन्धात्मक काव्य, भावुकता, सांस्कृतिक चेतना आ छन्द-विधानक योगदान देनिहार", "मैथिली रंगमंचमे सामाजिक विषय, पात्र-संरचना आ नाटकीय संवादक विकासमे योगदान", "आधुनिक मैथिली अभिव्यक्ति, काव्य-स्वर आ सामाजिक संवेदनाक विकासमे योगदान"], "answer": "प्रबन्धात्मक काव्य, भावुकता, सांस्कृतिक चेतना आ छन्द-विधानक योगदान देनिहार", "explanation": "सुरेन्द्र झा ‘सुमन’क अध्ययनमे मुख्य बात प्रबन्धात्मक काव्य, भावुकता, सांस्कृतिक चेतना आ छन्द-विधानक योगदान देनिहार अछि; एहि कारण हुनका प्रबन्ध-काव्य आ भाव-संरचना सँ जोड़ल जाएत अछि।"}, {"id": 422, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "सुरेन्द्र झा ‘सुमन’क संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["मिथिला-भाषा रामायण", "मैथिली साहित्यक इतिहास लेखन", "मैथिली साहित्यक इतिहास-विमर्श", "दत्त-वती"], "answer": "दत्त-वती", "explanation": "सुरेन्द्र झा ‘सुमन’क सन्दर्भमे दत्त-वती महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ प्रबन्ध-काव्य आ भाव-संरचना स्पष्ट होइत अछि।"}, {"id": 423, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "सुरेन्द्र झा ‘सुमन’ केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["लोकसाहित्य", "मुक्तक, प्रबन्ध आ सांस्कृतिक काव्य", "निबन्ध", "मुक्तक-काव्य"], "answer": "मुक्तक, प्रबन्ध आ सांस्कृतिक काव्य", "explanation": "मुक्तक, प्रबन्ध आ सांस्कृतिक काव्य सुरेन्द्र झा ‘सुमन’क रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 424, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "कालक्रमक दृष्टिसँ सुरेन्द्र झा ‘सुमन’क साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["आधुनिक मैथिली नवजागरण", "उत्तर-विद्यापति पदावली परम्परा", "आधुनिक काव्य आ प्रबन्ध-काव्य", "समकालीन मैथिली साहित्य"], "answer": "आधुनिक काव्य आ प्रबन्ध-काव्य", "explanation": "सुरेन्द्र झा ‘सुमन’क योगदान आधुनिक काव्य आ प्रबन्ध-काव्यक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 425, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "सुरेन्द्र झा ‘सुमन’क रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["केवल शिलालेखक तिथि-सूची", "मौखिक परम्परा", "कथ्यक विस्तार, भाव-संयम, नारी-चरित्र आ काव्यात्मक भाषा", "लोकभाषाक सहजता"], "answer": "कथ्यक विस्तार, भाव-संयम, नारी-चरित्र आ काव्यात्मक भाषा", "explanation": "कथ्यक विस्तार, भाव-संयम, नारी-चरित्र आ काव्यात्मक भाषा सुरेन्द्र झा ‘सुमन’क साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 426, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "सुरेन्द्र झा ‘सुमन’ पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["प्रबन्ध-काव्य आ भाव-संरचना", "जनपक्षधरता", "छन्द-विधान", "केवल मूल्य-सूची"], "answer": "प्रबन्ध-काव्य आ भाव-संरचना", "explanation": "सुरेन्द्र झा ‘सुमन’क योगदानक सार प्रबन्ध-काव्य आ भाव-संरचना मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 427, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "सुरेन्द्र झा ‘सुमन’क योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका साहित्यसँ सम्बन्ध नहि छल", "कारण हुनका माध्यमेँ प्रबन्ध-काव्य आ भाव-संरचना केँ बल भेटल", "कारण हुनका केवल शिलालेख पढ़ल", "कारण हुनका मंच, भाषा वा रचना-संवेदना सँ कोनो सम्बन्ध नहि छल"], "answer": "कारण हुनका माध्यमेँ प्रबन्ध-काव्य आ भाव-संरचना केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे सुरेन्द्र झा ‘सुमन’क योगदान प्रबन्ध-काव्य आ भाव-संरचना केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 428, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "सुरेन्द्र झा ‘सुमन’क नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["केवल शहरक नाम खोजब", "केवल जन्म-वर्षक अनुमान करब", "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "साहित्यिक विधा छोड़ि केवल वंशावली पढ़ब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "सुरेन्द्र झा ‘सुमन’ केँ बुझबाक लेल दत्त-वती, मुक्तक, प्रबन्ध आ सांस्कृतिक काव्य आ प्रबन्धात्मक काव्य, भावुकता, सांस्कृतिक चेतना आ छन्द-विधानक योगदान देनिहार केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 429, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "सुरेन्द्र झा ‘सुमन’क रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक काजमे भाषा वा समाजक प्रश्न नै अछि", "हुनक रचना केवल खगोल-गणना पर सीमित अछि", "हुनक योगदान साहित्यिक इतिहाससँ असम्बद्ध अछि", "हुनक लेखन मुक्तक, प्रबन्ध आ सांस्कृतिक काव्य मार्फत प्रबन्ध-काव्य आ भाव-संरचना केँ उभारैत अछि"], "answer": "हुनक लेखन मुक्तक, प्रबन्ध आ सांस्कृतिक काव्य मार्फत प्रबन्ध-काव्य आ भाव-संरचना केँ उभारैत अछि", "explanation": "सुरेन्द्र झा ‘सुमन’क विधागत पहचान मुक्तक, प्रबन्ध आ सांस्कृतिक काव्य अछि, आ ओहिसँ प्रबन्ध-काव्य आ भाव-संरचनाक बोध प्रबल होइत अछि।"}, {"id": 430, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "सुरेन्द्र झा ‘सुमन’क योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल मनोरंजनक नाम-सूची बनबाक लेल", "केवल मुद्रकक नाम याद रखबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "केवल पृष्ठ-संख्या गिनबाक लेल"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "सुरेन्द्र झा ‘सुमन’क भूमिका आधुनिक काव्य आ प्रबन्ध-काव्य आ प्रबन्ध-काव्य आ भाव-संरचनाक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 431, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "सुरेन्द्र झा ‘सुमन’क साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["भाषा-संस्कार", "प्रबन्ध-काव्य आ भाव-संरचना", "लोकजीवन", "शृङ्गार आ भक्ति"], "answer": "प्रबन्ध-काव्य आ भाव-संरचना", "explanation": "एहि लेखक/कविक साहित्यिक स्वर प्रबन्ध-काव्य आ भाव-संरचनासँ चिन्हित कएल जा सकैत अछि।"}, {"id": 432, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "सुरेन्द्र झा ‘सुमन’क सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["सुरेन्द्र झा ‘सुमन’ — लोकसाहित्य-सम्बन्धी विमर्श", "सुरेन्द्र झा ‘सुमन’ — नाच-पाटी आ लोक-रंग परम्परा", "सुरेन्द्र झा ‘सुमन’ — दत्त-वती", "सुरेन्द्र झा ‘सुमन’ — अक्कूक नाट्य-योगदान"], "answer": "सुरेन्द्र झा ‘सुमन’ — दत्त-वती", "explanation": "ठीक जोड़ी सुरेन्द्र झा ‘सुमन’ — दत्त-वती अछि।"}, {"id": 433, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "सुरेन्द्र झा ‘सुमन’क साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "भाषा-संवेदना सँ असम्बद्धता", "केवल मौन अभिनय बिना भाषा", "मैथिलीक प्रयोगक पूर्ण अभाव"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "सुरेन्द्र झा ‘सुमन’क रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ मुक्तक, प्रबन्ध आ सांस्कृतिक काव्यक माध्यमेँ बढ़बैत अछि।"}, {"id": 434, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "सुरेन्द्र झा ‘सुमन’ पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["प्रबन्धात्मक काव्य, भावुकता, सांस्कृतिक चेतना आ छन्द-विधानक योगदान देनिहार", "मौखिक परम्परा", "केवल शिलालेखक तिथि-सूची", "केवल वैद्यकीय नुस्खाक संग्रह"], "answer": "प्रबन्धात्मक काव्य, भावुकता, सांस्कृतिक चेतना आ छन्द-विधानक योगदान देनिहार", "explanation": "प्रबन्धात्मक काव्य, भावुकता, सांस्कृतिक चेतना आ छन्द-विधानक योगदान देनिहार केँ छोड़ला सँ सुरेन्द्र झा ‘सुमन’क मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 435, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "सुरेन्द्र झा ‘सुमन’क अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["केवल नामक वर्णक्रमसँ", "केवल पुरस्कार-सूची पढ़ि", "केवल पृष्ठ-संख्याक आधार पर", "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "सुरेन्द्र झा ‘सुमन’क योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 436, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "सुरेन्द्र झा ‘सुमन’क साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["अनुसंधान", "भाषा-संस्कार", "रंगमंच", "प्रबन्ध-काव्य आ भाव-संरचना"], "answer": "प्रबन्ध-काव्य आ भाव-संरचना", "explanation": "सुरेन्द्र झा ‘सुमन’क छवि प्रबन्ध-काव्य आ भाव-संरचना केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 437, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "सुरेन्द्र झा ‘सुमन’क प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["खगोल-गणना, मौसम-तालिका आ नुस्खा", "कर-सूची, नाप-जोख आ बाजार-भाव", "मुक्तक, प्रबन्ध आ सांस्कृतिक काव्य, प्रबन्ध-काव्य आ भाव-संरचना आ कथ्यक विस्तार, भाव-संयम, नारी-चरित्र आ काव्यात्मक भाषा", "केवल अनुवाद, बिना मौलिकता आ बिना भाषा-चेतना"], "answer": "मुक्तक, प्रबन्ध आ सांस्कृतिक काव्य, प्रबन्ध-काव्य आ भाव-संरचना आ कथ्यक विस्तार, भाव-संयम, नारी-चरित्र आ काव्यात्मक भाषा", "explanation": "एहि शब्द-समूहमे सुरेन्द्र झा ‘सुमन’क विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 438, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "सुरेन्द्र झा ‘सुमन’क रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["रचना-परम्परा टूटि गेल", "प्रबन्ध-काव्य आ भाव-संरचनाक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "लोक-संवेदना पूर्णतः हटि गेल", "भाषाक प्रयोग घटि गेल"], "answer": "प्रबन्ध-काव्य आ भाव-संरचनाक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "सुरेन्द्र झा ‘सुमन’क काजसँ प्रबन्ध-काव्य आ भाव-संरचनामे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 439, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "सुरेन्द्र झा ‘सुमन’क योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "केवल रसायनिक सूत्रक प्रश्नमे", "केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे", "केवल भूगोलक नक्शा बनाबयवला प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "सुरेन्द्र झा ‘सुमन’क योगदान आधुनिक काव्य आ प्रबन्ध-काव्य आ मुक्तक, प्रबन्ध आ सांस्कृतिक काव्यक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 440, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "सुरेन्द्र झा ‘सुमन’क सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["सुरेन्द्र झा ‘सुमन’ केवल पञ्जी-लेखक छलाह, साहित्यिक योगदान नहि", "सुरेन्द्र झा ‘सुमन’क मैथिली साहित्यसँ कोनो सम्बन्ध नहि", "सुरेन्द्र झा ‘सुमन’ आधुनिक काव्य आ प्रबन्ध-काव्यमे मुक्तक, प्रबन्ध आ सांस्कृतिक काव्य द्वारा प्रबन्धात्मक काव्य, भावुकता, सांस्कृतिक चेतना आ छन्द-विधानक योगदान देनिहार", "सुरेन्द्र झा ‘सुमन’क अध्ययनमे काल, विधा आ कृति अप्रासंगिक अछि"], "answer": "सुरेन्द्र झा ‘सुमन’ आधुनिक काव्य आ प्रबन्ध-काव्यमे मुक्तक, प्रबन्ध आ सांस्कृतिक काव्य द्वारा प्रबन्धात्मक काव्य, भावुकता, सांस्कृतिक चेतना आ छन्द-विधानक योगदान देनिहार", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 441, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "आरसी प्रसाद सिंहक मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["मैथिली कथा-गद्यक सामाजिक धरातल, पात्र-विकास आ कथात्मक भाषा केँ बल देनिहार", "महाभारत-प्रसंग केँ मैथिली महाकाव्यात्मक रूपमे प्रतिष्ठित करनिहार", "राष्ट्र, प्रकृति, लोक-संस्कार आ भावसंपन्न कविताकेँ मैथिलीमे प्रतिष्ठा देनिहार", "साहित्य, संस्कृति आ भाषा-चेतना केँ आधुनिक मैथिली लेखनमे जोड़निहार"], "answer": "राष्ट्र, प्रकृति, लोक-संस्कार आ भावसंपन्न कविताकेँ मैथिलीमे प्रतिष्ठा देनिहार", "explanation": "आरसी प्रसाद सिंहक अध्ययनमे मुख्य बात राष्ट्र, प्रकृति, लोक-संस्कार आ भावसंपन्न कविताकेँ मैथिलीमे प्रतिष्ठा देनिहार अछि; एहि कारण हुनका भावमय आधुनिक कविता सँ जोड़ल जाएत अछि।"}, {"id": 442, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "आरसी प्रसाद सिंहक संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["अंकिया नाट परम्परा", "चित्रा", "आरसीक काव्य-योगदान", "गोविन्ददास भजनावली"], "answer": "आरसीक काव्य-योगदान", "explanation": "आरसी प्रसाद सिंहक सन्दर्भमे आरसीक काव्य-योगदान महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ भावमय आधुनिक कविता स्पष्ट होइत अछि।"}, {"id": 443, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "आरसी प्रसाद सिंह केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["निबन्ध", "भाषा-अनुसंधान", "कविता, गीत आ राष्ट्र-सांस्कृतिक स्वर", "गद्य-वर्णन"], "answer": "कविता, गीत आ राष्ट्र-सांस्कृतिक स्वर", "explanation": "कविता, गीत आ राष्ट्र-सांस्कृतिक स्वर आरसी प्रसाद सिंहक रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 444, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "कालक्रमक दृष्टिसँ आरसी प्रसाद सिंहक साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["उत्तर-विद्यापति पदावली परम्परा", "आधुनिक कथा-उपन्यास परम्परा", "आधुनिक मैथिली कविता", "मध्यकालीन मैथिली साहित्य"], "answer": "आधुनिक मैथिली कविता", "explanation": "आरसी प्रसाद सिंहक योगदान आधुनिक मैथिली कविताक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 445, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "आरसी प्रसाद सिंहक रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["भाषिक अनुशासन", "सामाजिक चेतना", "लोकभाषाक सहजता", "ओज, करुणा, प्रकृति-चित्रण आ काव्य-लय"], "answer": "ओज, करुणा, प्रकृति-चित्रण आ काव्य-लय", "explanation": "ओज, करुणा, प्रकृति-चित्रण आ काव्य-लय आरसी प्रसाद सिंहक साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 446, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "आरसी प्रसाद सिंह पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["लोकजीवन", "गद्यक परिपक्वता", "भावमय आधुनिक कविता", "केवल तिथि-स्मरण"], "answer": "भावमय आधुनिक कविता", "explanation": "आरसी प्रसाद सिंहक योगदानक सार भावमय आधुनिक कविता मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 447, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "आरसी प्रसाद सिंहक योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका मंच, भाषा वा रचना-संवेदना सँ कोनो सम्बन्ध नहि छल", "कारण हुनका केवल गणना-पद्धति बनौल", "कारण हुनका केवल शिलालेख पढ़ल", "कारण हुनका माध्यमेँ भावमय आधुनिक कविता केँ बल भेटल"], "answer": "कारण हुनका माध्यमेँ भावमय आधुनिक कविता केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे आरसी प्रसाद सिंहक योगदान भावमय आधुनिक कविता केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 448, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "आरसी प्रसाद सिंहक नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "केवल नाम रटि छोड़ि देब", "साहित्यिक विधा छोड़ि केवल वंशावली पढ़ब", "केवल शहरक नाम खोजब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "आरसी प्रसाद सिंह केँ बुझबाक लेल आरसीक काव्य-योगदान, कविता, गीत आ राष्ट्र-सांस्कृतिक स्वर आ राष्ट्र, प्रकृति, लोक-संस्कार आ भावसंपन्न कविताकेँ मैथिलीमे प्रतिष्ठा देनिहार केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 449, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "आरसी प्रसाद सिंहक रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक काजमे भाषा वा समाजक प्रश्न नै अछि", "हुनक लेखन कविता, गीत आ राष्ट्र-सांस्कृतिक स्वर मार्फत भावमय आधुनिक कविता केँ उभारैत अछि", "हुनक योगदान साहित्यिक इतिहाससँ असम्बद्ध अछि", "हुनक रचना केवल खगोल-गणना पर सीमित अछि"], "answer": "हुनक लेखन कविता, गीत आ राष्ट्र-सांस्कृतिक स्वर मार्फत भावमय आधुनिक कविता केँ उभारैत अछि", "explanation": "आरसी प्रसाद सिंहक विधागत पहचान कविता, गीत आ राष्ट्र-सांस्कृतिक स्वर अछि, आ ओहिसँ भावमय आधुनिक कविताक बोध प्रबल होइत अछि।"}, {"id": 450, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "आरसी प्रसाद सिंहक योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल पृष्ठ-संख्या गिनबाक लेल", "केवल मनोरंजनक नाम-सूची बनबाक लेल", "केवल मुद्रकक नाम याद रखबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "आरसी प्रसाद सिंहक भूमिका आधुनिक मैथिली कविता आ भावमय आधुनिक कविताक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 451, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "आरसी प्रसाद सिंहक साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["जनपक्षधरता", "भावमय आधुनिक कविता", "रंगमंच", "सामाजिक यथार्थ"], "answer": "भावमय आधुनिक कविता", "explanation": "एहि लेखक/कविक साहित्यिक स्वर भावमय आधुनिक कवितासँ चिन्हित कएल जा सकैत अछि।"}, {"id": 452, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "आरसी प्रसाद सिंहक सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["आरसी प्रसाद सिंह — गोविन्ददास भजनावली", "आरसी प्रसाद सिंह — मैथिली साहित्यक इतिहास-विमर्श", "आरसी प्रसाद सिंह — आरसीक काव्य-योगदान", "आरसी प्रसाद सिंह — मैथिली आलोचना-परम्परा"], "answer": "आरसी प्रसाद सिंह — आरसीक काव्य-योगदान", "explanation": "ठीक जोड़ी आरसी प्रसाद सिंह — आरसीक काव्य-योगदान अछि।"}, {"id": 453, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "आरसी प्रसाद सिंहक साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["भाषा-संवेदना सँ असम्बद्धता", "मैथिलीक प्रयोगक पूर्ण अभाव", "केवल मौन अभिनय बिना भाषा", "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "आरसी प्रसाद सिंहक रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ कविता, गीत आ राष्ट्र-सांस्कृतिक स्वरक माध्यमेँ बढ़बैत अछि।"}, {"id": 454, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "आरसी प्रसाद सिंह पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["मंचीय संवाद", "राष्ट्र, प्रकृति, लोक-संस्कार आ भावसंपन्न कविताकेँ मैथिलीमे प्रतिष्ठा देनिहार", "प्रतीकात्मकता", "केवल विदेशी यात्रावृत्तक अनुवाद"], "answer": "राष्ट्र, प्रकृति, लोक-संस्कार आ भावसंपन्न कविताकेँ मैथिलीमे प्रतिष्ठा देनिहार", "explanation": "राष्ट्र, प्रकृति, लोक-संस्कार आ भावसंपन्न कविताकेँ मैथिलीमे प्रतिष्ठा देनिहार केँ छोड़ला सँ आरसी प्रसाद सिंहक मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 455, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "आरसी प्रसाद सिंहक अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["केवल पृष्ठ-संख्याक आधार पर", "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "केवल नामक वर्णक्रमसँ", "केवल छपाईक आकार देखि"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "आरसी प्रसाद सिंहक योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 456, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "आरसी प्रसाद सिंहक साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["भावमय आधुनिक कविता", "केवल वैद्यकीय नुस्खाक संग्रह", "भाषा-संस्कार", "स्त्री-अनुभव"], "answer": "भावमय आधुनिक कविता", "explanation": "आरसी प्रसाद सिंहक छवि भावमय आधुनिक कविता केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 457, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "आरसी प्रसाद सिंहक प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["कर-सूची, नाप-जोख आ बाजार-भाव", "खगोल-गणना, मौसम-तालिका आ नुस्खा", "प्रशासन, सैनिक आदेश आ दफ्तर", "कविता, गीत आ राष्ट्र-सांस्कृतिक स्वर, भावमय आधुनिक कविता आ ओज, करुणा, प्रकृति-चित्रण आ काव्य-लय"], "answer": "कविता, गीत आ राष्ट्र-सांस्कृतिक स्वर, भावमय आधुनिक कविता आ ओज, करुणा, प्रकृति-चित्रण आ काव्य-लय", "explanation": "एहि शब्द-समूहमे आरसी प्रसाद सिंहक विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 458, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "आरसी प्रसाद सिंहक रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["लोक-संवेदना पूर्णतः हटि गेल", "भावमय आधुनिक कविताक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "रचना-परम्परा टूटि गेल", "भाषाक प्रयोग घटि गेल"], "answer": "भावमय आधुनिक कविताक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "आरसी प्रसाद सिंहक काजसँ भावमय आधुनिक कवितामे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 459, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "आरसी प्रसाद सिंहक योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे", "केवल खेलक नियम याद करयवला प्रश्नमे", "केवल रसायनिक सूत्रक प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "आरसी प्रसाद सिंहक योगदान आधुनिक मैथिली कविता आ कविता, गीत आ राष्ट्र-सांस्कृतिक स्वरक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 460, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "आरसी प्रसाद सिंहक सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["आरसी प्रसाद सिंहक मैथिली साहित्यसँ कोनो सम्बन्ध नहि", "आरसी प्रसाद सिंह आधुनिक मैथिली कवितामे कविता, गीत आ राष्ट्र-सांस्कृतिक स्वर द्वारा राष्ट्र, प्रकृति, लोक-संस्कार आ भावसंपन्न कविताकेँ मैथिलीमे प्रतिष्ठा देनिहार", "आरसी प्रसाद सिंहक योगदान केवल व्यापारिक लेखामे सीमित रहल", "आरसी प्रसाद सिंहक अध्ययनमे काल, विधा आ कृति अप्रासंगिक अछि"], "answer": "आरसी प्रसाद सिंह आधुनिक मैथिली कवितामे कविता, गीत आ राष्ट्र-सांस्कृतिक स्वर द्वारा राष्ट्र, प्रकृति, लोक-संस्कार आ भावसंपन्न कविताकेँ मैथिलीमे प्रतिष्ठा देनिहार", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 461, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "चन्द्रनाथ मिश्र ‘अमर’क मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["ग्राम्य रंगमंच, नाच-पाटी, अभिनय आ नृत्यक मौखिक/मंचीय परम्परा केँ जीवित रखनिहार", "आधुनिक मैथिली कवितामे भाव, चिंतन, भाषा-संयम आ कलात्मकता जोड़निहार", "मैथिली साहित्यक आधुनिक मूल्यांकन, विचार-पक्ष आ आलोचना-भाषा केँ सुदृढ़ करनिहार", "मैथिली नाटकमे गीत, संवाद, भक्ति आ मंचीय परम्पराक विकाससँ जुड़ल नाम"], "answer": "आधुनिक मैथिली कवितामे भाव, चिंतन, भाषा-संयम आ कलात्मकता जोड़निहार", "explanation": "चन्द्रनाथ मिश्र ‘अमर’क अध्ययनमे मुख्य बात आधुनिक मैथिली कवितामे भाव, चिंतन, भाषा-संयम आ कलात्मकता जोड़निहार अछि; एहि कारण हुनका चिन्तनशील मुक्तक सँ जोड़ल जाएत अछि।"}, {"id": 462, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "चन्द्रनाथ मिश्र ‘अमर’क संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["लोकसाहित्य-सम्बन्धी विमर्श", "कृति राजकमल", "अमरक मुक्तक-काव्य", "रमेश्वरचरित मिथिला रामायण"], "answer": "अमरक मुक्तक-काव्य", "explanation": "चन्द्रनाथ मिश्र ‘अमर’क सन्दर्भमे अमरक मुक्तक-काव्य महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ चिन्तनशील मुक्तक स्पष्ट होइत अछि।"}, {"id": 463, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "चन्द्रनाथ मिश्र ‘अमर’ केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["कथा-उपन्यास", "व्यंग्य", "समालोचना", "कविता, गीत आ साहित्यिक चिंतन"], "answer": "कविता, गीत आ साहित्यिक चिंतन", "explanation": "कविता, गीत आ साहित्यिक चिंतन चन्द्रनाथ मिश्र ‘अमर’क रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 464, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "कालक्रमक दृष्टिसँ चन्द्रनाथ मिश्र ‘अमर’क साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["आधुनिक मुक्तक-काव्य", "समकालीन मैथिली साहित्य", "आधुनिक कथा-उपन्यास परम्परा", "आदिकाल/पूर्व-विद्यापति साहित्य"], "answer": "आधुनिक मुक्तक-काव्य", "explanation": "चन्द्रनाथ मिश्र ‘अमर’क योगदान आधुनिक मुक्तक-काव्यक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 465, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "चन्द्रनाथ मिश्र ‘अमर’क रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["केवल शिलालेखक तिथि-सूची", "छन्द-सजगता", "प्रतीकात्मकता", "संक्षिप्त कथ्य, भाव-गहनता, लय आ विचारशीलता"], "answer": "संक्षिप्त कथ्य, भाव-गहनता, लय आ विचारशीलता", "explanation": "संक्षिप्त कथ्य, भाव-गहनता, लय आ विचारशीलता चन्द्रनाथ मिश्र ‘अमर’क साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 466, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "चन्द्रनाथ मिश्र ‘अमर’ पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["आलोचना", "स्त्री-अनुभव", "चिन्तनशील मुक्तक", "सामाजिक यथार्थ"], "answer": "चिन्तनशील मुक्तक", "explanation": "चन्द्रनाथ मिश्र ‘अमर’क योगदानक सार चिन्तनशील मुक्तक मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 467, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "चन्द्रनाथ मिश्र ‘अमर’क योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका साहित्यसँ सम्बन्ध नहि छल", "कारण हुनका केवल शिलालेख पढ़ल", "कारण हुनका मंच, भाषा वा रचना-संवेदना सँ कोनो सम्बन्ध नहि छल", "कारण हुनका माध्यमेँ चिन्तनशील मुक्तक केँ बल भेटल"], "answer": "कारण हुनका माध्यमेँ चिन्तनशील मुक्तक केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे चन्द्रनाथ मिश्र ‘अमर’क योगदान चिन्तनशील मुक्तक केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 468, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "चन्द्रनाथ मिश्र ‘अमर’क नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "केवल शहरक नाम खोजब", "केवल नाम रटि छोड़ि देब", "केवल जन्म-वर्षक अनुमान करब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "चन्द्रनाथ मिश्र ‘अमर’ केँ बुझबाक लेल अमरक मुक्तक-काव्य, कविता, गीत आ साहित्यिक चिंतन आ आधुनिक मैथिली कवितामे भाव, चिंतन, भाषा-संयम आ कलात्मकता जोड़निहार केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 469, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "चन्द्रनाथ मिश्र ‘अमर’क रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक लेखन केवल प्रशासनिक परिपत्र अछि", "हुनक काजमे भाषा वा समाजक प्रश्न नै अछि", "हुनक योगदान साहित्यिक इतिहाससँ असम्बद्ध अछि", "हुनक लेखन कविता, गीत आ साहित्यिक चिंतन मार्फत चिन्तनशील मुक्तक केँ उभारैत अछि"], "answer": "हुनक लेखन कविता, गीत आ साहित्यिक चिंतन मार्फत चिन्तनशील मुक्तक केँ उभारैत अछि", "explanation": "चन्द्रनाथ मिश्र ‘अमर’क विधागत पहचान कविता, गीत आ साहित्यिक चिंतन अछि, आ ओहिसँ चिन्तनशील मुक्तकक बोध प्रबल होइत अछि।"}, {"id": 470, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "चन्द्रनाथ मिश्र ‘अमर’क योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल बाहरी भाषा सीखबाक लेल", "केवल पृष्ठ-संख्या गिनबाक लेल", "केवल मनोरंजनक नाम-सूची बनबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "चन्द्रनाथ मिश्र ‘अमर’क भूमिका आधुनिक मुक्तक-काव्य आ चिन्तनशील मुक्तकक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 471, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "चन्द्रनाथ मिश्र ‘अमर’क साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["चिन्तनशील मुक्तक", "अनुसंधान", "लयात्मकता", "प्रतीकात्मकता"], "answer": "चिन्तनशील मुक्तक", "explanation": "एहि लेखक/कविक साहित्यिक स्वर चिन्तनशील मुक्तकसँ चिन्हित कएल जा सकैत अछि।"}, {"id": 472, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "चन्द्रनाथ मिश्र ‘अमर’क सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["चन्द्रनाथ मिश्र ‘अमर’ — चित्रा", "चन्द्रनाथ मिश्र ‘अमर’ — अमरक मुक्तक-काव्य", "चन्द्रनाथ मिश्र ‘अमर’ — समकालीन मैथिली कविता सम्बन्धी योगदान", "चन्द्रनाथ मिश्र ‘अमर’ — खट्टर ककाक तरंग"], "answer": "चन्द्रनाथ मिश्र ‘अमर’ — अमरक मुक्तक-काव्य", "explanation": "ठीक जोड़ी चन्द्रनाथ मिश्र ‘अमर’ — अमरक मुक्तक-काव्य अछि।"}, {"id": 473, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "चन्द्रनाथ मिश्र ‘अमर’क साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["केवल मौन अभिनय बिना भाषा", "भाषा-संवेदना सँ असम्बद्धता", "मैथिलीक प्रयोगक पूर्ण अभाव", "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "चन्द्रनाथ मिश्र ‘अमर’क रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ कविता, गीत आ साहित्यिक चिंतनक माध्यमेँ बढ़बैत अछि।"}, {"id": 474, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "चन्द्रनाथ मिश्र ‘अमर’ पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["केवल गणितीय सूत्रक व्याख्या", "केवल शिलालेखक तिथि-सूची", "सामाजिक चेतना", "आधुनिक मैथिली कवितामे भाव, चिंतन, भाषा-संयम आ कलात्मकता जोड़निहार"], "answer": "आधुनिक मैथिली कवितामे भाव, चिंतन, भाषा-संयम आ कलात्मकता जोड़निहार", "explanation": "आधुनिक मैथिली कवितामे भाव, चिंतन, भाषा-संयम आ कलात्मकता जोड़निहार केँ छोड़ला सँ चन्द्रनाथ मिश्र ‘अमर’क मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 475, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "चन्द्रनाथ मिश्र ‘अमर’क अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "केवल नामक वर्णक्रमसँ", "केवल छपाईक आकार देखि", "केवल पृष्ठ-संख्याक आधार पर"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "चन्द्रनाथ मिश्र ‘अमर’क योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 476, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "चन्द्रनाथ मिश्र ‘अमर’क साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["केवल पञ्चाङ्गक गणना", "केवल व्यावसायिक हिसाब-किताबक पुस्तिका", "चिन्तनशील मुक्तक", "गद्यक परिपक्वता"], "answer": "चिन्तनशील मुक्तक", "explanation": "चन्द्रनाथ मिश्र ‘अमर’क छवि चिन्तनशील मुक्तक केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 477, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "चन्द्रनाथ मिश्र ‘अमर’क प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["खगोल-गणना, मौसम-तालिका आ नुस्खा", "कर-सूची, नाप-जोख आ बाजार-भाव", "कविता, गीत आ साहित्यिक चिंतन, चिन्तनशील मुक्तक आ संक्षिप्त कथ्य, भाव-गहनता, लय आ विचारशीलता", "केवल अनुवाद, बिना मौलिकता आ बिना भाषा-चेतना"], "answer": "कविता, गीत आ साहित्यिक चिंतन, चिन्तनशील मुक्तक आ संक्षिप्त कथ्य, भाव-गहनता, लय आ विचारशीलता", "explanation": "एहि शब्द-समूहमे चन्द्रनाथ मिश्र ‘अमर’क विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 478, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "चन्द्रनाथ मिश्र ‘अमर’क रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["साहित्यिक विधा समाप्त भऽ गेल", "लोक-संवेदना पूर्णतः हटि गेल", "रचना-परम्परा टूटि गेल", "चिन्तनशील मुक्तकक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल"], "answer": "चिन्तनशील मुक्तकक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "चन्द्रनाथ मिश्र ‘अमर’क काजसँ चिन्तनशील मुक्तकमे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 479, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "चन्द्रनाथ मिश्र ‘अमर’क योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["केवल खेलक नियम याद करयवला प्रश्नमे", "केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे", "केवल भूगोलक नक्शा बनाबयवला प्रश्नमे", "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "चन्द्रनाथ मिश्र ‘अमर’क योगदान आधुनिक मुक्तक-काव्य आ कविता, गीत आ साहित्यिक चिंतनक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 480, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "चन्द्रनाथ मिश्र ‘अमर’क सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["चन्द्रनाथ मिश्र ‘अमर’ केवल पञ्जी-लेखक छलाह, साहित्यिक योगदान नहि", "चन्द्रनाथ मिश्र ‘अमर’ आधुनिक मुक्तक-काव्यमे कविता, गीत आ साहित्यिक चिंतन द्वारा आधुनिक मैथिली कवितामे भाव, चिंतन, भाषा-संयम आ कलात्मकता जोड़निहार", "चन्द्रनाथ मिश्र ‘अमर’क मैथिली साहित्यसँ कोनो सम्बन्ध नहि", "चन्द्रनाथ मिश्र ‘अमर’क अध्ययनमे काल, विधा आ कृति अप्रासंगिक अछि"], "answer": "चन्द्रनाथ मिश्र ‘अमर’ आधुनिक मुक्तक-काव्यमे कविता, गीत आ साहित्यिक चिंतन द्वारा आधुनिक मैथिली कवितामे भाव, चिंतन, भाषा-संयम आ कलात्मकता जोड़निहार", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 481, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "जीवकान्तक मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["मैथिली भाषा-सम्मान, रामकाव्य, छन्द-विधान आ लोक-भाषिक गौरवक युगप्रवर्तक", "लोकसाहित्य, साहित्यिक परम्परा, आलोचना आ शोध-पद्धति केँ जोड़निहार", "समकालीन यथार्थ, शहरी-बोध, आत्मसंघर्ष आ आधुनिक प्रतीक-विधान केँ स्वर देनिहार", "समकालीन रंगमंचमे नवीन विषय, युवा-चेतना, अभिनययोग्य संवाद आ प्रयोगशीलता केँ बल देनिहार"], "answer": "समकालीन यथार्थ, शहरी-बोध, आत्मसंघर्ष आ आधुनिक प्रतीक-विधान केँ स्वर देनिहार", "explanation": "जीवकान्तक अध्ययनमे मुख्य बात समकालीन यथार्थ, शहरी-बोध, आत्मसंघर्ष आ आधुनिक प्रतीक-विधान केँ स्वर देनिहार अछि; एहि कारण हुनका समकालीन काव्य-संवेदना सँ जोड़ल जाएत अछि।"}, {"id": 482, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "जीवकान्तक संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["मैथिली मुक्तक-काव्य परम्परा", "आधुनिक मैथिली उपन्यास-परम्परा", "जीवकान्तक कवितात्मक योगदान", "बेटीक अपमान आ छीनरदेवी"], "answer": "जीवकान्तक कवितात्मक योगदान", "explanation": "जीवकान्तक सन्दर्भमे जीवकान्तक कवितात्मक योगदान महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ समकालीन काव्य-संवेदना स्पष्ट होइत अछि।"}, {"id": 483, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "जीवकान्त केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["व्यंग्य", "गीतिकाव्य", "आधुनिक कविता आ आलोचनात्मक संवेदना", "मुक्तक-काव्य"], "answer": "आधुनिक कविता आ आलोचनात्मक संवेदना", "explanation": "आधुनिक कविता आ आलोचनात्मक संवेदना जीवकान्तक रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 484, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "कालक्रमक दृष्टिसँ जीवकान्तक साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["आधुनिक समालोचना", "समकालीन मैथिली साहित्य", "समकालीन मैथिली कविता", "नेपालक मध्यकालीन मैथिली नाटक"], "answer": "समकालीन मैथिली कविता", "explanation": "जीवकान्तक योगदान समकालीन मैथिली कविताक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 485, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "जीवकान्तक रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["विचार-गहनता, प्रतीक, आत्मसंवाद आ समय-बोध", "प्रतीकात्मकता", "लयात्मकता", "केवल खेतीक माप-जोखक तालिका"], "answer": "विचार-गहनता, प्रतीक, आत्मसंवाद आ समय-बोध", "explanation": "विचार-गहनता, प्रतीक, आत्मसंवाद आ समय-बोध जीवकान्तक साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 486, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "जीवकान्त पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["जनपक्षधरता", "समकालीन काव्य-संवेदना", "आलोचना", "इतिहास-बोध"], "answer": "समकालीन काव्य-संवेदना", "explanation": "जीवकान्तक योगदानक सार समकालीन काव्य-संवेदना मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 487, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "जीवकान्तक योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका माध्यमेँ समकालीन काव्य-संवेदना केँ बल भेटल", "कारण हुनका मंच, भाषा वा रचना-संवेदना सँ कोनो सम्बन्ध नहि छल", "कारण हुनका केवल शिलालेख पढ़ल", "कारण हुनका साहित्यसँ सम्बन्ध नहि छल"], "answer": "कारण हुनका माध्यमेँ समकालीन काव्य-संवेदना केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे जीवकान्तक योगदान समकालीन काव्य-संवेदना केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 488, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "जीवकान्तक नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["केवल शहरक नाम खोजब", "केवल जन्म-वर्षक अनुमान करब", "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "साहित्यिक विधा छोड़ि केवल वंशावली पढ़ब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "जीवकान्त केँ बुझबाक लेल जीवकान्तक कवितात्मक योगदान, आधुनिक कविता आ आलोचनात्मक संवेदना आ समकालीन यथार्थ, शहरी-बोध, आत्मसंघर्ष आ आधुनिक प्रतीक-विधान केँ स्वर देनिहार केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 489, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "जीवकान्तक रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक काजमे भाषा वा समाजक प्रश्न नै अछि", "हुनक रचना केवल खगोल-गणना पर सीमित अछि", "हुनक लेखन आधुनिक कविता आ आलोचनात्मक संवेदना मार्फत समकालीन काव्य-संवेदना केँ उभारैत अछि", "हुनक योगदान साहित्यिक इतिहाससँ असम्बद्ध अछि"], "answer": "हुनक लेखन आधुनिक कविता आ आलोचनात्मक संवेदना मार्फत समकालीन काव्य-संवेदना केँ उभारैत अछि", "explanation": "जीवकान्तक विधागत पहचान आधुनिक कविता आ आलोचनात्मक संवेदना अछि, आ ओहिसँ समकालीन काव्य-संवेदनाक बोध प्रबल होइत अछि।"}, {"id": 490, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "जीवकान्तक योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "केवल पृष्ठ-संख्या गिनबाक लेल", "केवल बाहरी भाषा सीखबाक लेल", "केवल मुद्रकक नाम याद रखबाक लेल"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "जीवकान्तक भूमिका समकालीन मैथिली कविता आ समकालीन काव्य-संवेदनाक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 491, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "जीवकान्तक साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["ऐतिहासिक दृष्टि", "ग्राम्य परिवेश", "मंचीय संवाद", "समकालीन काव्य-संवेदना"], "answer": "समकालीन काव्य-संवेदना", "explanation": "एहि लेखक/कविक साहित्यिक स्वर समकालीन काव्य-संवेदनासँ चिन्हित कएल जा सकैत अछि।"}, {"id": 492, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "जीवकान्तक सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["जीवकान्त — जीवकान्तक कवितात्मक योगदान", "जीवकान्त — प्रेमशंकर सिंहक आलोचनात्मक योगदान", "जीवकान्त — मधुपक गीतिकाव्य", "जीवकान्त — दत्त-वती"], "answer": "जीवकान्त — जीवकान्तक कवितात्मक योगदान", "explanation": "ठीक जोड़ी जीवकान्त — जीवकान्तक कवितात्मक योगदान अछि।"}, {"id": 493, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "जीवकान्तक साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["केवल मौन अभिनय बिना भाषा", "मैथिलीक प्रयोगक पूर्ण अभाव", "भाषा-संवेदना सँ असम्बद्धता", "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "जीवकान्तक रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ आधुनिक कविता आ आलोचनात्मक संवेदनाक माध्यमेँ बढ़बैत अछि।"}, {"id": 494, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "जीवकान्त पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["केवल खेतीक माप-जोखक तालिका", "समकालीन यथार्थ, शहरी-बोध, आत्मसंघर्ष आ आधुनिक प्रतीक-विधान केँ स्वर देनिहार", "केवल विदेशी यात्रावृत्तक अनुवाद", "लयात्मकता"], "answer": "समकालीन यथार्थ, शहरी-बोध, आत्मसंघर्ष आ आधुनिक प्रतीक-विधान केँ स्वर देनिहार", "explanation": "समकालीन यथार्थ, शहरी-बोध, आत्मसंघर्ष आ आधुनिक प्रतीक-विधान केँ स्वर देनिहार केँ छोड़ला सँ जीवकान्तक मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 495, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "जीवकान्तक अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["केवल छपाईक आकार देखि", "केवल पुरस्कार-सूची पढ़ि", "केवल नामक वर्णक्रमसँ", "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "जीवकान्तक योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 496, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "जीवकान्तक साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["छन्द-विधान", "सामाजिक यथार्थ", "केवल विदेशी यात्रावृत्तक अनुवाद", "समकालीन काव्य-संवेदना"], "answer": "समकालीन काव्य-संवेदना", "explanation": "जीवकान्तक छवि समकालीन काव्य-संवेदना केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 497, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "जीवकान्तक प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["प्रशासन, सैनिक आदेश आ दफ्तर", "कर-सूची, नाप-जोख आ बाजार-भाव", "खगोल-गणना, मौसम-तालिका आ नुस्खा", "आधुनिक कविता आ आलोचनात्मक संवेदना, समकालीन काव्य-संवेदना आ विचार-गहनता, प्रतीक, आत्मसंवाद आ समय-बोध"], "answer": "आधुनिक कविता आ आलोचनात्मक संवेदना, समकालीन काव्य-संवेदना आ विचार-गहनता, प्रतीक, आत्मसंवाद आ समय-बोध", "explanation": "एहि शब्द-समूहमे जीवकान्तक विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 498, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "जीवकान्तक रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["भाषाक प्रयोग घटि गेल", "साहित्यिक विधा समाप्त भऽ गेल", "समकालीन काव्य-संवेदनाक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "लोक-संवेदना पूर्णतः हटि गेल"], "answer": "समकालीन काव्य-संवेदनाक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "जीवकान्तक काजसँ समकालीन काव्य-संवेदनामे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 499, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "जीवकान्तक योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे", "केवल खेलक नियम याद करयवला प्रश्नमे", "केवल भूगोलक नक्शा बनाबयवला प्रश्नमे", "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "जीवकान्तक योगदान समकालीन मैथिली कविता आ आधुनिक कविता आ आलोचनात्मक संवेदनाक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 500, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "जीवकान्तक सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["जीवकान्तक मैथिली साहित्यसँ कोनो सम्बन्ध नहि", "जीवकान्त समकालीन मैथिली कवितामे आधुनिक कविता आ आलोचनात्मक संवेदना द्वारा समकालीन यथार्थ, शहरी-बोध, आत्मसंघर्ष आ आधुनिक प्रतीक-विधान केँ स्वर देनिहार", "जीवकान्तक अध्ययनमे काल, विधा आ कृति अप्रासंगिक अछि", "जीवकान्तक योगदान केवल व्यापारिक लेखामे सीमित रहल"], "answer": "जीवकान्त समकालीन मैथिली कवितामे आधुनिक कविता आ आलोचनात्मक संवेदना द्वारा समकालीन यथार्थ, शहरी-बोध, आत्मसंघर्ष आ आधुनिक प्रतीक-विधान केँ स्वर देनिहार", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 501, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "भीमनाथ झाक मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["बेरोजगारी, सामाजिक संघर्ष, हास्य-मर्म आ मंचीय जीवनक मार्मिक प्रस्तुति देनिहार", "आधुनिक मैथिली साहित्यमे सामाजिक दृष्टि, कथात्मक अनुशासन आ भाषा-संस्कारक योगदान", "स्त्री-अनुभव, घरेलू-सामाजिक द्वन्द्व आ आधुनिक संवेदनाकेँ कथा-साहित्यमे स्वर देनिहार", "समकालीन काव्य-चर्चा, कविता-संवेदना आ साहित्यिक संपादनक क्षेत्रमे योगदान"], "answer": "समकालीन काव्य-चर्चा, कविता-संवेदना आ साहित्यिक संपादनक क्षेत्रमे योगदान", "explanation": "भीमनाथ झाक अध्ययनमे मुख्य बात समकालीन काव्य-चर्चा, कविता-संवेदना आ साहित्यिक संपादनक क्षेत्रमे योगदान अछि; एहि कारण हुनका समकालीन काव्य-विमर्श सँ जोड़ल जाएत अछि।"}, {"id": 502, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "भीमनाथ झाक संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["कीचकवध", "मैथिली नारी-चेतनाक कथा-परम्परा", "नचिकेताक साहित्यिक योगदान", "समकालीन मैथिली कविता सम्बन्धी योगदान"], "answer": "समकालीन मैथिली कविता सम्बन्धी योगदान", "explanation": "भीमनाथ झाक सन्दर्भमे समकालीन मैथिली कविता सम्बन्धी योगदान महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ समकालीन काव्य-विमर्श स्पष्ट होइत अछि।"}, {"id": 503, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "भीमनाथ झा केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["महाकाव्य", "भाषा-अनुसंधान", "प्रबन्ध-काव्य", "कविता आ काव्य-संपादन/विमर्श"], "answer": "कविता आ काव्य-संपादन/विमर्श", "explanation": "कविता आ काव्य-संपादन/विमर्श भीमनाथ झाक रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 504, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कालक्रमक दृष्टिसँ भीमनाथ झाक साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["उत्तर-विद्यापति पदावली परम्परा", "समकालीन मैथिली कविता", "आधुनिक समालोचना", "नेपालक मध्यकालीन मैथिली नाटक"], "answer": "समकालीन मैथिली कविता", "explanation": "भीमनाथ झाक योगदान समकालीन मैथिली कविताक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 505, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "भीमनाथ झाक रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["प्रतीकात्मकता", "केवल शिलालेखक तिथि-सूची", "केवल व्यावसायिक हिसाब-किताबक पुस्तिका", "समकालीनता, आलोचनात्मक दृष्टि, चयन-बोध आ काव्य-परिचय"], "answer": "समकालीनता, आलोचनात्मक दृष्टि, चयन-बोध आ काव्य-परिचय", "explanation": "समकालीनता, आलोचनात्मक दृष्टि, चयन-बोध आ काव्य-परिचय भीमनाथ झाक साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 506, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "भीमनाथ झा पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["छन्द-विधान", "गद्यक परिपक्वता", "शृङ्गार आ भक्ति", "समकालीन काव्य-विमर्श"], "answer": "समकालीन काव्य-विमर्श", "explanation": "भीमनाथ झाक योगदानक सार समकालीन काव्य-विमर्श मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 507, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "भीमनाथ झाक योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका साहित्यसँ सम्बन्ध नहि छल", "कारण हुनका माध्यमेँ समकालीन काव्य-विमर्श केँ बल भेटल", "कारण हुनका केवल राजकीय कर-सूची लिखल", "कारण हुनका केवल शिलालेख पढ़ल"], "answer": "कारण हुनका माध्यमेँ समकालीन काव्य-विमर्श केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे भीमनाथ झाक योगदान समकालीन काव्य-विमर्श केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 508, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "भीमनाथ झाक नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["केवल जन्म-वर्षक अनुमान करब", "साहित्यिक विधा छोड़ि केवल वंशावली पढ़ब", "केवल नाम रटि छोड़ि देब", "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "भीमनाथ झा केँ बुझबाक लेल समकालीन मैथिली कविता सम्बन्धी योगदान, कविता आ काव्य-संपादन/विमर्श आ समकालीन काव्य-चर्चा, कविता-संवेदना आ साहित्यिक संपादनक क्षेत्रमे योगदान केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 509, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "भीमनाथ झाक रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक योगदान साहित्यिक इतिहाससँ असम्बद्ध अछि", "हुनक लेखन केवल प्रशासनिक परिपत्र अछि", "हुनक लेखन कविता आ काव्य-संपादन/विमर्श मार्फत समकालीन काव्य-विमर्श केँ उभारैत अछि", "हुनक काजमे भाषा वा समाजक प्रश्न नै अछि"], "answer": "हुनक लेखन कविता आ काव्य-संपादन/विमर्श मार्फत समकालीन काव्य-विमर्श केँ उभारैत अछि", "explanation": "भीमनाथ झाक विधागत पहचान कविता आ काव्य-संपादन/विमर्श अछि, आ ओहिसँ समकालीन काव्य-विमर्शक बोध प्रबल होइत अछि।"}, {"id": 510, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "भीमनाथ झाक योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल मनोरंजनक नाम-सूची बनबाक लेल", "केवल मुद्रकक नाम याद रखबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "केवल पृष्ठ-संख्या गिनबाक लेल"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "भीमनाथ झाक भूमिका समकालीन मैथिली कविता आ समकालीन काव्य-विमर्शक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 511, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "भीमनाथ झाक साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["गद्यक परिपक्वता", "अनुसंधान", "इतिहास-बोध", "समकालीन काव्य-विमर्श"], "answer": "समकालीन काव्य-विमर्श", "explanation": "एहि लेखक/कविक साहित्यिक स्वर समकालीन काव्य-विमर्शसँ चिन्हित कएल जा सकैत अछि।"}, {"id": 512, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "भीमनाथ झाक सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["भीमनाथ झा — समकालीन मैथिली कविता सम्बन्धी योगदान", "भीमनाथ झा — मैथिली मुक्तक-काव्य परम्परा", "भीमनाथ झा — मिथिला-भाषा रामायण", "भीमनाथ झा — नचिकेताक साहित्यिक योगदान"], "answer": "भीमनाथ झा — समकालीन मैथिली कविता सम्बन्धी योगदान", "explanation": "ठीक जोड़ी भीमनाथ झा — समकालीन मैथिली कविता सम्बन्धी योगदान अछि।"}, {"id": 513, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "भीमनाथ झाक साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["केवल अंकीय संकेतक प्रयोग", "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "केवल मौन अभिनय बिना भाषा", "मैथिलीक प्रयोगक पूर्ण अभाव"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "भीमनाथ झाक रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ कविता आ काव्य-संपादन/विमर्शक माध्यमेँ बढ़बैत अछि।"}, {"id": 514, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "भीमनाथ झा पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["प्रतीकात्मकता", "लोकभाषाक सहजता", "समकालीन काव्य-चर्चा, कविता-संवेदना आ साहित्यिक संपादनक क्षेत्रमे योगदान", "छन्द-सजगता"], "answer": "समकालीन काव्य-चर्चा, कविता-संवेदना आ साहित्यिक संपादनक क्षेत्रमे योगदान", "explanation": "समकालीन काव्य-चर्चा, कविता-संवेदना आ साहित्यिक संपादनक क्षेत्रमे योगदान केँ छोड़ला सँ भीमनाथ झाक मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 515, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "भीमनाथ झाक अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "केवल छपाईक आकार देखि", "केवल नामक वर्णक्रमसँ", "केवल पुरस्कार-सूची पढ़ि"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "भीमनाथ झाक योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 516, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "भीमनाथ झाक साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["केवल राजकीय प्रशासनिक आदेशक संकलन", "केवल शिलालेखक तिथि-सूची", "समकालीन काव्य-विमर्श", "रंगमंच"], "answer": "समकालीन काव्य-विमर्श", "explanation": "भीमनाथ झाक छवि समकालीन काव्य-विमर्श केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 517, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "भीमनाथ झाक प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["कविता आ काव्य-संपादन/विमर्श, समकालीन काव्य-विमर्श आ समकालीनता, आलोचनात्मक दृष्टि, चयन-बोध आ काव्य-परिचय", "प्रशासन, सैनिक आदेश आ दफ्तर", "केवल अनुवाद, बिना मौलिकता आ बिना भाषा-चेतना", "खगोल-गणना, मौसम-तालिका आ नुस्खा"], "answer": "कविता आ काव्य-संपादन/विमर्श, समकालीन काव्य-विमर्श आ समकालीनता, आलोचनात्मक दृष्टि, चयन-बोध आ काव्य-परिचय", "explanation": "एहि शब्द-समूहमे भीमनाथ झाक विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 518, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "भीमनाथ झाक रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["समकालीन काव्य-विमर्शक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "लोक-संवेदना पूर्णतः हटि गेल", "साहित्यिक विधा समाप्त भऽ गेल", "भाषाक प्रयोग घटि गेल"], "answer": "समकालीन काव्य-विमर्शक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "भीमनाथ झाक काजसँ समकालीन काव्य-विमर्शमे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 519, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "भीमनाथ झाक योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["केवल खेलक नियम याद करयवला प्रश्नमे", "केवल भूगोलक नक्शा बनाबयवला प्रश्नमे", "केवल रसायनिक सूत्रक प्रश्नमे", "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "भीमनाथ झाक योगदान समकालीन मैथिली कविता आ कविता आ काव्य-संपादन/विमर्शक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 520, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "भीमनाथ झाक सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["भीमनाथ झाक अध्ययनमे काल, विधा आ कृति अप्रासंगिक अछि", "भीमनाथ झा समकालीन मैथिली कवितामे कविता आ काव्य-संपादन/विमर्श द्वारा समकालीन काव्य-चर्चा, कविता-संवेदना आ साहित्यिक संपादनक क्षेत्रमे योगदान", "भीमनाथ झाक योगदान केवल व्यापारिक लेखामे सीमित रहल", "भीमनाथ झा केवल पञ्जी-लेखक छलाह, साहित्यिक योगदान नहि"], "answer": "भीमनाथ झा समकालीन मैथिली कवितामे कविता आ काव्य-संपादन/विमर्श द्वारा समकालीन काव्य-चर्चा, कविता-संवेदना आ साहित्यिक संपादनक क्षेत्रमे योगदान", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 521, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कीर्ति नारायण मिश्रक मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["मुक्तक-काव्यक भाव-वैविध्य, भाषा-संयम आ आधुनिक चिंतन केँ विकसित करनिहार", "मैथिली रंगमंचमे सामाजिक कथ्य, संवाद-शक्ति आ नाटकीय संरचनाक विस्तार देनिहार", "मैथिली कथा-गद्यक सामाजिक धरातल, पात्र-विकास आ कथात्मक भाषा केँ बल देनिहार", "लोक-संवेदना, गीतात्मकता आ सरल मैथिली भाषाक काव्य-प्रवाह केँ बल देनिहार"], "answer": "मुक्तक-काव्यक भाव-वैविध्य, भाषा-संयम आ आधुनिक चिंतन केँ विकसित करनिहार", "explanation": "कीर्ति नारायण मिश्रक अध्ययनमे मुख्य बात मुक्तक-काव्यक भाव-वैविध्य, भाषा-संयम आ आधुनिक चिंतन केँ विकसित करनिहार अछि; एहि कारण हुनका भाव-विचारक संतुलित कविता सँ जोड़ल जाएत अछि।"}, {"id": 522, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कीर्ति नारायण मिश्रक संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["कीर्ति नारायण मिश्रक काव्य-योगदान", "आरसीक काव्य-योगदान", "वर्णरत्नाकर", "मोहनक मुक्तक-काव्य"], "answer": "कीर्ति नारायण मिश्रक काव्य-योगदान", "explanation": "कीर्ति नारायण मिश्रक सन्दर्भमे कीर्ति नारायण मिश्रक काव्य-योगदान महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ भाव-विचारक संतुलित कविता स्पष्ट होइत अछि।"}, {"id": 523, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कीर्ति नारायण मिश्र केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["कथा-उपन्यास", "कविता, गीत आ साहित्यिक रचना", "महाकाव्य", "व्यंग्य"], "answer": "कविता, गीत आ साहित्यिक रचना", "explanation": "कविता, गीत आ साहित्यिक रचना कीर्ति नारायण मिश्रक रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 524, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कालक्रमक दृष्टिसँ कीर्ति नारायण मिश्रक साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["आधुनिक मुक्तक-काव्य", "नेपालक मध्यकालीन मैथिली नाटक", "आधुनिक मैथिली नवजागरण", "आधुनिक समालोचना"], "answer": "आधुनिक मुक्तक-काव्य", "explanation": "कीर्ति नारायण मिश्रक योगदान आधुनिक मुक्तक-काव्यक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 525, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कीर्ति नारायण मिश्रक रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["केवल विदेशी यात्रावृत्तक अनुवाद", "भाव, विचार, सामाजिकता आ लयक संतुलन", "मौखिक परम्परा", "भाषिक अनुशासन"], "answer": "भाव, विचार, सामाजिकता आ लयक संतुलन", "explanation": "भाव, विचार, सामाजिकता आ लयक संतुलन कीर्ति नारायण मिश्रक साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 526, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कीर्ति नारायण मिश्र पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["रंगमंच", "भाव-विचारक संतुलित कविता", "आलोचना", "भाषा-संस्कार"], "answer": "भाव-विचारक संतुलित कविता", "explanation": "कीर्ति नारायण मिश्रक योगदानक सार भाव-विचारक संतुलित कविता मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 527, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कीर्ति नारायण मिश्रक योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका केवल गणना-पद्धति बनौल", "कारण हुनका माध्यमेँ भाव-विचारक संतुलित कविता केँ बल भेटल", "कारण हुनका केवल राजकीय कर-सूची लिखल", "कारण हुनका केवल शिलालेख पढ़ल"], "answer": "कारण हुनका माध्यमेँ भाव-विचारक संतुलित कविता केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे कीर्ति नारायण मिश्रक योगदान भाव-विचारक संतुलित कविता केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 528, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कीर्ति नारायण मिश्रक नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "केवल नाम रटि छोड़ि देब", "साहित्यिक विधा छोड़ि केवल वंशावली पढ़ब", "केवल जन्म-वर्षक अनुमान करब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "कीर्ति नारायण मिश्र केँ बुझबाक लेल कीर्ति नारायण मिश्रक काव्य-योगदान, कविता, गीत आ साहित्यिक रचना आ मुक्तक-काव्यक भाव-वैविध्य, भाषा-संयम आ आधुनिक चिंतन केँ विकसित करनिहार केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 529, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कीर्ति नारायण मिश्रक रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक योगदान साहित्यिक इतिहाससँ असम्बद्ध अछि", "हुनक लेखन कविता, गीत आ साहित्यिक रचना मार्फत भाव-विचारक संतुलित कविता केँ उभारैत अछि", "हुनक लेखन केवल प्रशासनिक परिपत्र अछि", "हुनक रचना केवल खगोल-गणना पर सीमित अछि"], "answer": "हुनक लेखन कविता, गीत आ साहित्यिक रचना मार्फत भाव-विचारक संतुलित कविता केँ उभारैत अछि", "explanation": "कीर्ति नारायण मिश्रक विधागत पहचान कविता, गीत आ साहित्यिक रचना अछि, आ ओहिसँ भाव-विचारक संतुलित कविताक बोध प्रबल होइत अछि।"}, {"id": 530, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कीर्ति नारायण मिश्रक योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल पृष्ठ-संख्या गिनबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "केवल मनोरंजनक नाम-सूची बनबाक लेल", "केवल मुद्रकक नाम याद रखबाक लेल"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "कीर्ति नारायण मिश्रक भूमिका आधुनिक मुक्तक-काव्य आ भाव-विचारक संतुलित कविताक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 531, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कीर्ति नारायण मिश्रक साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["भाव-विचारक संतुलित कविता", "लयात्मकता", "स्त्री-अनुभव", "ग्राम्य परिवेश"], "answer": "भाव-विचारक संतुलित कविता", "explanation": "एहि लेखक/कविक साहित्यिक स्वर भाव-विचारक संतुलित कवितासँ चिन्हित कएल जा सकैत अछि।"}, {"id": 532, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कीर्ति नारायण मिश्रक सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["कीर्ति नारायण मिश्र — आधुनिक नाट्य-परम्परा", "कीर्ति नारायण मिश्र — भफाइत चाहक जिनगी", "कीर्ति नारायण मिश्र — कृष्णजन्म", "कीर्ति नारायण मिश्र — कीर्ति नारायण मिश्रक काव्य-योगदान"], "answer": "कीर्ति नारायण मिश्र — कीर्ति नारायण मिश्रक काव्य-योगदान", "explanation": "ठीक जोड़ी कीर्ति नारायण मिश्र — कीर्ति नारायण मिश्रक काव्य-योगदान अछि।"}, {"id": 533, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कीर्ति नारायण मिश्रक साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "मैथिलीक प्रयोगक पूर्ण अभाव", "भाषा-संवेदना सँ असम्बद्धता", "केवल अंकीय संकेतक प्रयोग"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "कीर्ति नारायण मिश्रक रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ कविता, गीत आ साहित्यिक रचनाक माध्यमेँ बढ़बैत अछि।"}, {"id": 534, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कीर्ति नारायण मिश्र पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["मुक्तक-काव्यक भाव-वैविध्य, भाषा-संयम आ आधुनिक चिंतन केँ विकसित करनिहार", "लयात्मकता", "मंचीय संवाद", "केवल राजकीय प्रशासनिक आदेशक संकलन"], "answer": "मुक्तक-काव्यक भाव-वैविध्य, भाषा-संयम आ आधुनिक चिंतन केँ विकसित करनिहार", "explanation": "मुक्तक-काव्यक भाव-वैविध्य, भाषा-संयम आ आधुनिक चिंतन केँ विकसित करनिहार केँ छोड़ला सँ कीर्ति नारायण मिश्रक मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 535, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कीर्ति नारायण मिश्रक अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["केवल पुरस्कार-सूची पढ़ि", "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "केवल नामक वर्णक्रमसँ", "केवल पृष्ठ-संख्याक आधार पर"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "कीर्ति नारायण मिश्रक योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 536, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कीर्ति नारायण मिश्रक साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["केवल वैद्यकीय नुस्खाक संग्रह", "गद्यक परिपक्वता", "भाव-विचारक संतुलित कविता", "केवल पञ्चाङ्गक गणना"], "answer": "भाव-विचारक संतुलित कविता", "explanation": "कीर्ति नारायण मिश्रक छवि भाव-विचारक संतुलित कविता केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 537, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कीर्ति नारायण मिश्रक प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["खगोल-गणना, मौसम-तालिका आ नुस्खा", "कविता, गीत आ साहित्यिक रचना, भाव-विचारक संतुलित कविता आ भाव, विचार, सामाजिकता आ लयक संतुलन", "प्रशासन, सैनिक आदेश आ दफ्तर", "कर-सूची, नाप-जोख आ बाजार-भाव"], "answer": "कविता, गीत आ साहित्यिक रचना, भाव-विचारक संतुलित कविता आ भाव, विचार, सामाजिकता आ लयक संतुलन", "explanation": "एहि शब्द-समूहमे कीर्ति नारायण मिश्रक विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 538, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कीर्ति नारायण मिश्रक रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["साहित्यिक विधा समाप्त भऽ गेल", "रचना-परम्परा टूटि गेल", "भाव-विचारक संतुलित कविताक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "भाषाक प्रयोग घटि गेल"], "answer": "भाव-विचारक संतुलित कविताक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "कीर्ति नारायण मिश्रक काजसँ भाव-विचारक संतुलित कवितामे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 539, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कीर्ति नारायण मिश्रक योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "केवल भूगोलक नक्शा बनाबयवला प्रश्नमे", "केवल खेलक नियम याद करयवला प्रश्नमे", "केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "कीर्ति नारायण मिश्रक योगदान आधुनिक मुक्तक-काव्य आ कविता, गीत आ साहित्यिक रचनाक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 540, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कीर्ति नारायण मिश्रक सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["कीर्ति नारायण मिश्र केवल पञ्जी-लेखक छलाह, साहित्यिक योगदान नहि", "कीर्ति नारायण मिश्रक योगदान केवल व्यापारिक लेखामे सीमित रहल", "कीर्ति नारायण मिश्रक अध्ययनमे काल, विधा आ कृति अप्रासंगिक अछि", "कीर्ति नारायण मिश्र आधुनिक मुक्तक-काव्यमे कविता, गीत आ साहित्यिक रचना द्वारा मुक्तक-काव्यक भाव-वैविध्य, भाषा-संयम आ आधुनिक चिंतन केँ विकसित करनिहार"], "answer": "कीर्ति नारायण मिश्र आधुनिक मुक्तक-काव्यमे कविता, गीत आ साहित्यिक रचना द्वारा मुक्तक-काव्यक भाव-वैविध्य, भाषा-संयम आ आधुनिक चिंतन केँ विकसित करनिहार", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 541, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "उपेन्द्र ठाकुर ‘मोहन’क मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["रचनाक मूल्यांकन, मानदण्ड, साहित्यिक अनुशासन आ विवेचन-पद्धति केँ बल देनिहार", "लोक-संवेदना, गीतात्मकता आ सरल मैथिली भाषाक काव्य-प्रवाह केँ बल देनिहार", "मैथिली रंगमंचमे सामाजिक कथ्य, संवाद-शक्ति आ नाटकीय संरचनाक विस्तार देनिहार", "साहित्यक पाठ, इतिहास, समाज आ शैलीक समन्वित मूल्यांकनमे योगदान"], "answer": "लोक-संवेदना, गीतात्मकता आ सरल मैथिली भाषाक काव्य-प्रवाह केँ बल देनिहार", "explanation": "उपेन्द्र ठाकुर ‘मोहन’क अध्ययनमे मुख्य बात लोक-संवेदना, गीतात्मकता आ सरल मैथिली भाषाक काव्य-प्रवाह केँ बल देनिहार अछि; एहि कारण हुनका लोकानुभूतिक गीत-कविता सँ जोड़ल जाएत अछि।"}, {"id": 542, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "उपेन्द्र ठाकुर ‘मोहन’क संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["कृति राजकमल", "मधुपक गीतिकाव्य", "प्रेमशंकर सिंहक आलोचनात्मक योगदान", "मोहनक मुक्तक-काव्य"], "answer": "मोहनक मुक्तक-काव्य", "explanation": "उपेन्द्र ठाकुर ‘मोहन’क सन्दर्भमे मोहनक मुक्तक-काव्य महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ लोकानुभूतिक गीत-कविता स्पष्ट होइत अछि।"}, {"id": 543, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "उपेन्द्र ठाकुर ‘मोहन’ केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["व्यंग्य", "समालोचना", "गीत, कविता आ लोकानुभव", "कथा-उपन्यास"], "answer": "गीत, कविता आ लोकानुभव", "explanation": "गीत, कविता आ लोकानुभव उपेन्द्र ठाकुर ‘मोहन’क रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 544, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कालक्रमक दृष्टिसँ उपेन्द्र ठाकुर ‘मोहन’क साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["आदिकाल/पूर्व-विद्यापति साहित्य", "मध्यकालीन मैथिली साहित्य", "आधुनिक गीत-मुक्तक परम्परा", "समकालीन मैथिली साहित्य"], "answer": "आधुनिक गीत-मुक्तक परम्परा", "explanation": "उपेन्द्र ठाकुर ‘मोहन’क योगदान आधुनिक गीत-मुक्तक परम्पराक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 545, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "उपेन्द्र ठाकुर ‘मोहन’क रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["सामाजिक चेतना", "पात्र-मनोविज्ञान", "मौखिक परम्परा", "सहज भाषा, लोकजीवन, भावप्रवणता आ गेयता"], "answer": "सहज भाषा, लोकजीवन, भावप्रवणता आ गेयता", "explanation": "सहज भाषा, लोकजीवन, भावप्रवणता आ गेयता उपेन्द्र ठाकुर ‘मोहन’क साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 546, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "उपेन्द्र ठाकुर ‘मोहन’ पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["स्त्री-अनुभव", "लोकानुभूतिक गीत-कविता", "इतिहास-बोध", "सामाजिक यथार्थ"], "answer": "लोकानुभूतिक गीत-कविता", "explanation": "उपेन्द्र ठाकुर ‘मोहन’क योगदानक सार लोकानुभूतिक गीत-कविता मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 547, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "उपेन्द्र ठाकुर ‘मोहन’क योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका माध्यमेँ लोकानुभूतिक गीत-कविता केँ बल भेटल", "कारण हुनका मंच, भाषा वा रचना-संवेदना सँ कोनो सम्बन्ध नहि छल", "कारण हुनका साहित्यसँ सम्बन्ध नहि छल", "कारण हुनका केवल शिलालेख पढ़ल"], "answer": "कारण हुनका माध्यमेँ लोकानुभूतिक गीत-कविता केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे उपेन्द्र ठाकुर ‘मोहन’क योगदान लोकानुभूतिक गीत-कविता केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 548, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "उपेन्द्र ठाकुर ‘मोहन’क नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["साहित्यिक विधा छोड़ि केवल वंशावली पढ़ब", "केवल शहरक नाम खोजब", "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "केवल जन्म-वर्षक अन ", "q": "उपेन्द्र ठाकुर ‘मोहन’क साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["इतिहास-बोध", "लोकानुभूतिक गीत-कविता", "केवल व्यावसायिक हिसाब-किताबक पुस्तिका", "लोकजीवन"], "answer": "लोकानुभूतिक गीत-कविता", "explanation": "उपेन्द्र ठाकुर ‘मोहन’क छवि लोकानुभूतिक गीत-कविता केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 557, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "उपेन्द्र ठाकुर ‘मोहन’क प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["गीत, कविता आ लोकानुभव, लोकानुभूतिक गीत-कविता आ सहज भाषा, लोकजीवन, भावप्रवणता आ गेयता", "कर-सूची, नाप-जोख आ बाजार-भाव", "प्रशासन, सैनिक आदेश आ दफ्तर", "खगोल-गणना, मौसम-तालिका आ नुस्खा"], "answer": "गीत, कविता आ लोकानुभव, लोकानुभूतिक गीत-कविता आ सहज भाषा, लोकजीवन, भावप्रवणता आ गेयता", "explanation": "एहि शब्द-समूहमे उपेन्द्र ठाकुर ‘मोहन’क विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 558, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "उपेन्द्र ठाकुर ‘मोहन’क रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["रचना-परम्परा टूटि गेल", "भाषाक प्रयोग घटि गेल", "साहित्यिक विधा समाप्त भऽ गेल", "लोकानुभूतिक गीत-कविताक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल"], "answer": "लोकानुभूतिक गीत-कविताक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "उपेन्द्र ठाकुर ‘मोहन’क काजसँ लोकानुभूतिक गीत-कवितामे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 559, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "उपेन्द्र ठाकुर ‘मोहन’क योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "केवल रसायनिक सूत्रक प्रश्नमे", "केवल भूगोलक नक्शा बनाबयवला प्रश्नमे", "केवल खेलक नियम याद करयवला प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "उपेन्द्र ठाकुर ‘मोहन’क योगदान आधुनिक गीत-मुक्तक परम्परा आ गीत, कविता आ लोकानुभवक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 560, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "उपेन्द्र ठाकुर ‘मोहन’क सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["उपेन्द्र ठाकुर ‘मोहन’क योगदान केवल व्यापारिक लेखामे सीमित रहल", "उपेन्द्र ठाकुर ‘मोहन’ केवल पञ्जी-लेखक छलाह, साहित्यिक योगदान नहि", "उपेन्द्र ठाकुर ‘मोहन’क अध्ययनमे काल, विधा आ कृति अप्रासंगिक अछि", "उपेन्द्र ठाकुर ‘मोहन’ आधुनिक गीत-मुक्तक परम्परामे गीत, कविता आ लोकानुभव द्वारा लोक-संवेदना, गीतात्मकता आ सरल मैथिली भाषाक काव्य-प्रवाह केँ बल देनिहार"], "answer": "उपेन्द्र ठाकुर ‘मोहन’ आधुनिक गीत-मुक्तक परम्परामे गीत, कविता आ लोकानुभव द्वारा लोक-संवेदना, गीतात्मकता आ सरल मैथिली भाषाक काव्य-प्रवाह केँ बल देनिहार", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 561, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कुमार गंगानन्द सिंहक मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["महाभारत-प्रसंग केँ मैथिली महाकाव्यात्मक रूपमे प्रतिष्ठित करनिहार", "मैथिली साहित्येतिहास, आलोचना-शैली, निबन्ध-विन्यास आ विद्वत्तापूर्ण मूल्यांकनक विकासमे योगदान", "रचनाक मूल्यांकन, मानदण्ड, साहित्यिक अनुशासन आ विवेचन-पद्धति केँ बल देनिहार", "साहित्य, संस्कृति आ भाषा-चेतना केँ आधुनिक मैथिली लेखनमे जोड़निहार"], "answer": "साहित्य, संस्कृति आ भाषा-चेतना केँ आधुनिक मैथिली लेखनमे जोड़निहार", "explanation": "कुमार गंगानन्द सिंहक अध्ययनमे मुख्य बात साहित्य, संस्कृति आ भाषा-चेतना केँ आधुनिक मैथिली लेखनमे जोड़निहार अछि; एहि कारण हुनका साहित्य-संस्कृति समन्वय सँ जोड़ल जाएत अछि।"}, {"id": 562, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कुमार गंगानन्द सिंहक संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["रमणक आलोचनात्मक लेखन", "अक्कूक नाट्य-योगदान", "विद्यापति पदावली", "कुमार गंगानन्द सिंहक साहित्यिक योगदान"], "answer": "कुमार गंगानन्द सिंहक साहित्यिक योगदान", "explanation": "कुमार गंगानन्द सिंहक सन्दर्भमे कुमार गंगानन्द सिंहक साहित्यिक योगदान महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ साहित्य-संस्कृति समन्वय स्पष्ट होइत अछि।"}, {"id": 563, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कुमार गंगानन्द सिंह केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["गद्य-वर्णन", "लोकसाहित्य", "भाषा-अनुसंधान", "काव्य, गद्य आ सांस्कृतिक लेखन"], "answer": "काव्य, गद्य आ सांस्कृतिक लेखन", "explanation": "काव्य, गद्य आ सांस्कृतिक लेखन कुमार गंगानन्द सिंहक रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 564, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कालक्रमक दृष्टिसँ कुमार गंगानन्द सिंहक साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["आधुनिक मैथिली नवजागरण", "नेपालक मध्यकालीन मैथिली नाटक", "उत्तर-विद्यापति पदावली परम्परा", "आधुनिक मैथिली साहित्य"], "answer": "आधुनिक मैथिली साहित्य", "explanation": "कुमार गंगानन्द सिंहक योगदान आधुनिक मैथिली साहित्यक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 565, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कुमार गंगानन्द सिंहक रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["भाषिक अनुशासन", "सांस्कृतिक गौरव, भाषिक सजगता आ साहित्यिक अनुशासन", "मौखिक परम्परा", "केवल व्यावसायिक हिसाब-किताबक पुस्तिका"], "answer": "सांस्कृतिक गौरव, भाषिक सजगता आ साहित्यिक अनुशासन", "explanation": "सांस्कृतिक गौरव, भाषिक सजगता आ साहित्यिक अनुशासन कुमार गंगानन्द सिंहक साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 566, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कुमार गंगानन्द सिंह पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["केवल तिथि-स्मरण", "गद्यक परिपक्वता", "साहित्य-संस्कृति समन्वय", "जनपक्षधरता"], "answer": "साहित्य-संस्कृति समन्वय", "explanation": "कुमार गंगानन्द सिंहक योगदानक सार साहित्य-संस्कृति समन्वय मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 567, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कुमार गंगानन्द सिंहक योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका केवल राजकीय कर-सूची लिखल", "कारण हुनका मंच, भाषा वा रचना-संवेदना सँ कोनो सम्बन्ध नहि छल", "कारण हुनका केवल गणना-पद्धति बनौल", "कारण हुनका माध्यमेँ साहित्य-संस्कृति समन्वय केँ बल भेटल"], "answer": "कारण हुनका माध्यमेँ साहित्य-संस्कृति समन्वय केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे कुमार गंगानन्द सिंहक योगदान साहित्य-संस्कृति समन्वय केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 568, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कुमार गंगानन्द सिंहक नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["केवल शहरक नाम खोजब", "साहित्यिक विधा छोड़ि केवल वंशावली पढ़ब", "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "केवल नाम रटि छोड़ि देब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "कुमार गंगानन्द सिंह केँ बुझबाक लेल कुमार गंगानन्द सिंहक साहित्यिक योगदान, काव्य, गद्य आ सांस्कृतिक लेखन आ साहित्य, संस्कृति आ भाषा-चेतना केँ आधुनिक मैथिली लेखनमे जोड़निहार केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 569, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कुमार गंगानन्द सिंहक रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक योगदान साहित्यिक इतिहाससँ असम्बद्ध अछि", "हुनक रचना केवल खगोल-गणना पर सीमित अछि", "हुनक लेखन काव्य, गद्य आ सांस्कृतिक लेखन मार्फत साहित्य-संस्कृति समन्वय केँ उभारैत अछि", "हुनक लेखन केवल प्रशासनिक परिपत्र अछि"], "answer": "हुनक लेखन काव्य, गद्य आ सांस्कृतिक लेखन मार्फत साहित्य-संस्कृति समन्वय केँ उभारैत अछि", "explanation": "कुमार गंगानन्द सिंहक विधागत पहचान काव्य, गद्य आ सांस्कृतिक लेखन अछि, आ ओहिसँ साहित्य-संस्कृति समन्वयक बोध प्रबल होइत अछि।"}, {"id": 570, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कुमार गंगानन्द सिंहक योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल मनोरंजनक नाम-सूची बनबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "केवल मुद्रकक नाम याद रखबाक लेल", "केवल पृष्ठ-संख्या गिनबाक लेल"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "कुमार गंगानन्द सिंहक भूमिका आधुनिक मैथिली साहित्य आ साहित्य-संस्कृति समन्वयक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 571, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कुमार गंगानन्द सिंहक साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["साहित्य-संस्कृति समन्वय", "गद्यक परिपक्वता", "आलोचना", "जनपक्षधरता"], "answer": "साहित्य-संस्कृति समन्वय", "explanation": "एहि लेखक/कविक साहित्यिक स्वर साहित्य-संस्कृति समन्वयसँ चिन्हित कएल जा सकैत अछि।"}, {"id": 572, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कुमार गंगानन्द सिंहक सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["कुमार गंगानन्द सिंह — नेपालक मैथिली नाट्य परम्परा", "कुमार गंगानन्द सिंह — अंकिया नाट परम्परा", "कुमार गंगानन्द सिंह — कुमार गंगानन्द सिंहक साहित्यिक योगदान", "कुमार गंगानन्द सिंह — मैथिली नवजागरणक साहित्यिक प्रसंग"], "answer": "कुमार गंगानन्द सिंह — कुमार गंगानन्द सिंहक साहित्यिक योगदान", "explanation": "ठीक जोड़ी कुमार गंगानन्द सिंह — कुमार गंगानन्द सिंहक साहित्यिक योगदान अछि।"}, {"id": 573, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कुमार गंगानन्द सिंहक साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "भाषा-संवेदना सँ असम्बद्धता", "केवल अंकीय संकेतक प्रयोग", "केवल मौन अभिनय बिना भाषा"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "कुमार गंगानन्द सिंहक रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ काव्य, गद्य आ सांस्कृतिक लेखनक माध्यमेँ बढ़बैत अछि।"}, {"id": 574, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कुमार गंगानन्द सिंह पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["साहित्य, संस्कृति आ भाषा-चेतना केँ आधुनिक मैथिली लेखनमे जोड़निहार", "केवल पञ्चाङ्गक गणना", "प्रतीकात्मकता", "केवल व्यावसायिक हिसाब-किताबक पुस्तिका"], "answer": "साह
