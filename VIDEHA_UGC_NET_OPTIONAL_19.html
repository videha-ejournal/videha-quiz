<title>विदेह क्विज — विभिन्न कालक प्रमुख कवि आ लेखकक योगदान</title>
<style>
:root {
  --navy:#0a2747; --deep:#123b63; --gold:#f2b705; --cream:#fff8e7; --ink:#1a1a1a; --green:#15803d; --red:#b91c1c; --soft:#e8f1fb;
}
* { box-sizing:border-box; }
body { margin:0; font-family: 'Noto Sans Devanagari', 'Mangal', 'Kokila', Arial, sans-serif; background:linear-gradient(180deg,#eef6ff 0%,#fff8e7 100%); color:var(--ink); }
header { background:linear-gradient(135deg,var(--navy),var(--deep)); color:white; padding:22px 16px; border-bottom:6px solid var(--gold); }
.header-inner { max-width:1200px; margin:0 auto; }
.brand { font-size:1.35rem; font-weight:800; line-height:1.5; letter-spacing:.2px; }
.subtitle { margin-top:10px; font-size:1.8rem; font-weight:900; color:#fff3b0; }
.meta { margin-top:8px; font-size:1rem; opacity:.95; }
.sticky { position:sticky; top:0; z-index:50; background:rgba(255,248,231,.96); backdrop-filter:blur(7px); border-bottom:1px solid #d7cda8; box-shadow:0 2px 10px rgba(0,0,0,.08); }
.nav { max-width:1200px; margin:0 auto; padding:10px 12px; display:flex; gap:8px; overflow-x:auto; }
.nav a { text-decoration:none; color:var(--navy); background:white; border:1px solid #ccd8ea; border-radius:999px; padding:8px 12px; white-space:nowrap; font-weight:700; }
.nav a:hover { background:var(--navy); color:white; }
main { max-width:1200px; margin:18px auto; padding:0 14px 30px; }
.tools { display:grid; grid-template-columns: 1fr auto auto auto; gap:10px; align-items:center; background:white; border:1px solid #d7e3f3; border-radius:18px; padding:14px; box-shadow:0 5px 18px rgba(10,39,71,.08); margin-bottom:18px; }
.tools input { width:100%; padding:13px 14px; border:2px solid #ccd8ea; border-radius:12px; font-size:1rem; }
button { border:0; border-radius:12px; padding:11px 14px; cursor:pointer; font-weight:800; font-size:.98rem; }
.primary { background:var(--navy); color:white; }
.secondary { background:var(--gold); color:#2d2200; }
.ghost { background:#edf4ff; color:var(--navy); border:1px solid #cbdcf2; }
.scorebox { background:#fff; border:2px solid #e2d48a; border-radius:16px; padding:12px 14px; margin:12px 0; font-weight:800; display:none; }
.section { margin:24px 0; }
.section h2 { background:linear-gradient(90deg,var(--navy),#245c91); color:white; padding:14px 18px; border-radius:16px; border-left:8px solid var(--gold); box-shadow:0 5px 14px rgba(10,39,71,.18); }
.section p.desc { background:#fff8d6; border-left:5px solid var(--gold); padding:10px 12px; border-radius:10px; }
.card { background:white; border:1px solid #d9e5f2; border-radius:18px; padding:15px; margin:12px 0; box-shadow:0 6px 18px rgba(10,39,71,.08); }
.qhead { display:flex; gap:10px; align-items:flex-start; justify-content:space-between; }
.qno { min-width:76px; color:var(--navy); font-weight:900; }
.qtext { flex:1; font-weight:800; font-size:1.04rem; line-height:1.65; }
.options { display:grid; gap:9px; margin-top:12px; }
.opt { text-align:left; background:#f7fbff; border:2px solid #d6e6f6; color:#102a43; padding:11px 12px; border-radius:12px; font-weight:700; line-height:1.45; }
.opt:hover { border-color:var(--navy); background:#eef6ff; }
.opt.correct { background:#dcfce7; border-color:var(--green); color:#064e3b; }
.opt.wrong { background:#fee2e2; border-color:var(--red); color:#7f1d1d; }
.feedback { display:none; margin-top:10px; padding:10px 12px; border-radius:12px; line-height:1.55; }
.feedback.good { display:block; background:#dcfce7; border:1px solid #86efac; }
.feedback.bad { display:block; background:#fee2e2; border:1px solid #fecaca; }
.answer { display:none; margin-top:10px; background:#fff7cc; border:1px solid #efd56a; padding:10px 12px; border-radius:12px; line-height:1.55; }
.card-actions { margin-top:12px; display:flex; flex-wrap:wrap; gap:8px; }
.backlink { display:inline-block; margin:18px 0; text-decoration:none; background:var(--navy); color:white; padding:12px 18px; border-radius:999px; font-weight:900; }
footer { background:var(--navy); color:white; text-align:center; padding:18px; border-top:6px solid var(--gold); font-weight:700; }
.hidden { display:none !important; }
@media(max-width:760px) { .tools { grid-template-columns:1fr; } .qhead { flex-direction:column; } .subtitle { font-size:1.35rem; } }
</style>
</head>

const QUESTIONS = [{"id": 1, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "ज्योतिरीश्वर ठाकुरक मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["आधुनिक मैथिली अभिव्यक्ति, काव्य-स्वर आ सामाजिक संवेदनाक विकासमे योगदान", "मैथिली गद्यक प्राचीन आधार आ समाज-संस्कृतिक विस्तृत वर्णन", "समकालीन साहित्यक चयन, आलोचना, पाठकीय दिशा आ विधागत मूल्यांकनमे योगदान", "समकालीन जीवन, सामाजिक परिवेश आ कथा-भाषाक विकासमे योगदान देनिहार"], "answer": "मैथिली गद्यक प्राचीन आधार आ समाज-संस्कृतिक विस्तृत वर्णन", "explanation": "ज्योतिरीश्वर ठाकुरक अध्ययनमे मुख्य बात मैथिली गद्यक प्राचीन आधार आ समाज-संस्कृतिक विस्तृत वर्णन अछि; एहि कारण हुनका गद्यक परिपक्वता आ वर्णन-कला सँ जोड़ल जाएत अछि।"}, {"id": 2, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "ज्योतिरीश्वर ठाकुरक संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["वर्णरत्नाकर", "मलंगियाक नाट्य-योगदान", "विद्यापति पदावली", "आधुनिक नाट्य-परम्परा"], "answer": "वर्णरत्नाकर", "explanation": "ज्योतिरीश्वर ठाकुरक सन्दर्भमे वर्णरत्नाकर महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ गद्यक परिपक्वता आ वर्णन-कला स्पष्ट होइत अछि।"}, {"id": 3, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "ज्योतिरीश्वर ठाकुर केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["गद्य-वर्णन आ विश्वकोशीय शैली", "व्यंग्य", "समालोचना", "गद्य-वर्णन"], "answer": "गद्य-वर्णन आ विश्वकोशीय शैली", "explanation": "गद्य-वर्णन आ विश्वकोशीय शैली ज्योतिरीश्वर ठाकुरक रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 4, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "कालक्रमक दृष्टिसँ ज्योतिरीश्वर ठाकुरक साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["नेपालक मध्यकालीन मैथिली नाटक", "आदिकाल/पूर्व-विद्यापति साहित्य", "आधुनिक मैथिली नवजागरण", "उत्तर-विद्यापति पदावली परम्परा"], "answer": "आदिकाल/पूर्व-विद्यापति साहित्य", "explanation": "ज्योतिरीश्वर ठाकुरक योगदान आदिकाल/पूर्व-विद्यापति साहित्यक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 5, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "ज्योतिरीश्वर ठाकुरक रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["प्रतीकात्मकता", "वस्तु-वर्णन, नगर-जीवन, रस-सामग्री आ शब्द-संपदाक समृद्धि", "केवल विदेशी यात्रावृत्तक अनुवाद", "केवल गणितीय सूत्रक व्याख्या"], "answer": "वस्तु-वर्णन, नगर-जीवन, रस-सामग्री आ शब्द-संपदाक समृद्धि", "explanation": "वस्तु-वर्णन, नगर-जीवन, रस-सामग्री आ शब्द-संपदाक समृद्धि ज्योतिरीश्वर ठाकुरक साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 6, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "ज्योतिरीश्वर ठाकुर पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["भाषा-संस्कार", "केवल तिथि-स्मरण", "केवल मूल्य-सूची", "गद्यक परिपक्वता आ वर्णन-कला"], "answer": "गद्यक परिपक्वता आ वर्णन-कला", "explanation": "ज्योतिरीश्वर ठाकुरक योगदानक सार गद्यक परिपक्वता आ वर्णन-कला मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 7, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "ज्योतिरीश्वर ठाकुरक योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका माध्यमेँ गद्यक परिपक्वता आ वर्णन-कला केँ बल भेटल", "कारण हुनका मंच, भाषा वा रचना-संवेदना सँ कोनो सम्बन्ध नहि छल", "कारण हुनका साहित्यसँ सम्बन्ध नहि छल", "कारण हुनका केवल शिलालेख पढ़ल"], "answer": "कारण हुनका माध्यमेँ गद्यक परिपक्वता आ वर्णन-कला केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे ज्योतिरीश्वर ठाकुरक योगदान गद्यक परिपक्वता आ वर्णन-कला केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 8, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "ज्योतिरीश्वर ठाकुरक नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "केवल शहरक नाम खोजब", "साहित्यिक विधा छोड़ि केवल वंशावली पढ़ब", "केवल नाम रटि छोड़ि देब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "ज्योतिरीश्वर ठाकुर केँ बुझबाक लेल वर्णरत्नाकर, गद्य-वर्णन आ विश्वकोशीय शैली आ मैथिली गद्यक प्राचीन आधार आ समाज-संस्कृतिक विस्तृत वर्णन केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 9, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "ज्योतिरीश्वर ठाकुरक रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक लेखन केवल प्रशासनिक परिपत्र अछि", "हुनक योगदान साहित्यिक इतिहाससँ असम्बद्ध अछि", "हुनक रचना केवल खगोल-गणना पर सीमित अछि", "हुनक लेखन गद्य-वर्णन आ विश्वकोशीय शैली मार्फत गद्यक परिपक्वता आ वर्णन-कला केँ उभारैत अछि"], "answer": "हुनक लेखन गद्य-वर्णन आ विश्वकोशीय शैली मार्फत गद्यक परिपक्वता आ वर्णन-कला केँ उभारैत अछि", "explanation": "ज्योतिरीश्वर ठाकुरक विधागत पहचान गद्य-वर्णन आ विश्वकोशीय शैली अछि, आ ओहिसँ गद्यक परिपक्वता आ वर्णन-कलाक बोध प्रबल होइत अछि।"}, {"id": 10, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "ज्योतिरीश्वर ठाकुरक योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल मुद्रकक नाम याद रखबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "केवल बाहरी भाषा सीखबाक लेल", "केवल पृष्ठ-संख्या गिनबाक लेल"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "ज्योतिरीश्वर ठाकुरक भूमिका आदिकाल/पूर्व-विद्यापति साहित्य आ गद्यक परिपक्वता आ वर्णन-कलाक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 11, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "ज्योतिरीश्वर ठाकुरक साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["गद्यक परिपक्वता", "प्रतीकात्मकता", "गद्यक परिपक्वता आ वर्णन-कला", "ग्राम्य परिवेश"], "answer": "गद्यक परिपक्वता आ वर्णन-कला", "explanation": "एहि लेखक/कविक साहित्यिक स्वर गद्यक परिपक्वता आ वर्णन-कलासँ चिन्हित कएल जा सकैत अछि।"}, {"id": 12, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "ज्योतिरीश्वर ठाकुरक सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["ज्योतिरीश्वर ठाकुर — मलंगियाक नाट्य-योगदान", "ज्योतिरीश्वर ठाकुर — मिथिला-भाषा रामायण", "ज्योतिरीश्वर ठाकुर — वर्णरत्नाकर", "ज्योतिरीश्वर ठाकुर — बेटीक अपमान आ छीनरदेवी"], "answer": "ज्योतिरीश्वर ठाकुर — वर्णरत्नाकर", "explanation": "ठीक जोड़ी ज्योतिरीश्वर ठाकुर — वर्णरत्नाकर अछि।"}, {"id": 13, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "ज्योतिरीश्वर ठाकुरक साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["मैथिलीक प्रयोगक पूर्ण अभाव", "केवल अंकीय संकेतक प्रयोग", "भाषा-संवेदना सँ असम्बद्धता", "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "ज्योतिरीश्वर ठाकुरक रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ गद्य-वर्णन आ विश्वकोशीय शैलीक माध्यमेँ बढ़बैत अछि।"}, {"id": 14, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "ज्योतिरीश्वर ठाकुर पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["पात्र-मनोविज्ञान", "छन्द-सजगता", "केवल खेतीक माप-जोखक तालिका", "मैथिली गद्यक प्राचीन आधार आ समाज-संस्कृतिक विस्तृत वर्णन"], "answer": "मैथिली गद्यक प्राचीन आधार आ समाज-संस्कृतिक विस्तृत वर्णन", "explanation": "मैथिली गद्यक प्राचीन आधार आ समाज-संस्कृतिक विस्तृत वर्णन केँ छोड़ला सँ ज्योतिरीश्वर ठाकुरक मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 15, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "ज्योतिरीश्वर ठाकुरक अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "केवल पृष्ठ-संख्याक आधार पर", "केवल नामक वर्णक्रमसँ", "केवल पुरस्कार-सूची पढ़ि"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "ज्योतिरीश्वर ठाकुरक योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 16, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "ज्योतिरीश्वर ठाकुरक साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["केवल वैद्यकीय नुस्खाक संग्रह", "गद्यक परिपक्वता आ वर्णन-कला", "आलोचना", "केवल गणितीय सूत्रक व्याख्या"], "answer": "गद्यक परिपक्वता आ वर्णन-कला", "explanation": "ज्योतिरीश्वर ठाकुरक छवि गद्यक परिपक्वता आ वर्णन-कला केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 17, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "ज्योतिरीश्वर ठाकुरक प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["प्रशासन, सैनिक आदेश आ दफ्तर", "कर-सूची, नाप-जोख आ बाजार-भाव", "खगोल-गणना, मौसम-तालिका आ नुस्खा", "गद्य-वर्णन आ विश्वकोशीय शैली, गद्यक परिपक्वता आ वर्णन-कला आ वस्तु-वर्णन, नगर-जीवन, रस-सामग्री आ शब्द-संपदाक समृद्धि"], "answer": "गद्य-वर्णन आ विश्वकोशीय शैली, गद्यक परिपक्वता आ वर्णन-कला आ वस्तु-वर्णन, नगर-जीवन, रस-सामग्री आ शब्द-संपदाक समृद्धि", "explanation": "एहि शब्द-समूहमे ज्योतिरीश्वर ठाकुरक विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 18, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "ज्योतिरीश्वर ठाकुरक रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["रचना-परम्परा टूटि गेल", "भाषाक प्रयोग घटि गेल", "लोक-संवेदना पूर्णतः हटि गेल", "गद्यक परिपक्वता आ वर्णन-कलाक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल"], "answer": "गद्यक परिपक्वता आ वर्णन-कलाक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "ज्योतिरीश्वर ठाकुरक काजसँ गद्यक परिपक्वता आ वर्णन-कलामे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 19, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "ज्योतिरीश्वर ठाकुरक योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे", "केवल खेलक नियम याद करयवला प्रश्नमे", "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "केवल भूगोलक नक्शा बनाबयवला प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "ज्योतिरीश्वर ठाकुरक योगदान आदिकाल/पूर्व-विद्यापति साहित्य आ गद्य-वर्णन आ विश्वकोशीय शैलीक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 20, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "ज्योतिरीश्वर ठाकुरक सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["ज्योतिरीश्वर ठाकुर केवल पञ्जी-लेखक छलाह, साहित्यिक योगदान नहि", "ज्योतिरीश्वर ठाकुरक योगदान केवल व्यापारिक लेखामे सीमित रहल", "ज्योतिरीश्वर ठाकुरक मैथिली साहित्यसँ कोनो सम्बन्ध नहि", "ज्योतिरीश्वर ठाकुर आदिकाल/पूर्व-विद्यापति साहित्यमे गद्य-वर्णन आ विश्वकोशीय शैली द्वारा मैथिली गद्यक प्राचीन आधार आ समाज-संस्कृतिक विस्तृत वर्णन"], "answer": "ज्योतिरीश्वर ठाकुर आदिकाल/पूर्व-विद्यापति साहित्यमे गद्य-वर्णन आ विश्वकोशीय शैली द्वारा मैथिली गद्यक प्राचीन आधार आ समाज-संस्कृतिक विस्तृत वर्णन", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 21, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "विद्यापतिक मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["नवजागरणकालीन भाषा-चेतना, साहित्यिक संगठन आ सांस्कृतिक स्मृति केँ बल देनिहार", "मैथिली साहित्यक काल-विभाजन, लेखक-परम्परा आ आलोचनात्मक अध्ययन केँ व्यवस्थित करनिहार", "मैथिली गीतिकाव्य केँ लोकभाषा, प्रेम, भक्ति आ संगीतक ऊँचाई देनिहार", "आधुनिक मैथिली कवितामे भाव, चिंतन, भाषा-संयम आ कलात्मकता जोड़निहार"], "answer": "मैथिली गीतिकाव्य केँ लोकभाषा, प्रेम, भक्ति आ संगीतक ऊँचाई देनिहार", "explanation": "विद्यापतिक अध्ययनमे मुख्य बात मैथिली गीतिकाव्य केँ लोकभाषा, प्रेम, भक्ति आ संगीतक ऊँचाई देनिहार अछि; एहि कारण हुनका शृङ्गार आ भक्ति केर जीवंत समन्वय सँ जोड़ल जाएत अछि।"}, {"id": 22, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "विद्यापतिक संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["अंकिया नाट परम्परा", "राजमोहन झाक साहित्य-विमर्श", "नचिकेताक साहित्यिक योगदान", "विद्यापति पदावली"], "answer": "विद्यापति पदावली", "explanation": "विद्यापतिक सन्दर्भमे विद्यापति पदावली महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ शृङ्गार आ भक्ति केर जीवंत समन्वय स्पष्ट होइत अछि।"}, {"id": 23, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "विद्यापति केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["समालोचना", "गीतिकाव्य, पदावली, भक्तिआश्रित शृङ्गार", "प्रबन्ध-काव्य", "गीतिकाव्य"], "answer": "गीतिकाव्य, पदावली, भक्तिआश्रित शृङ्गार", "explanation": "गीतिकाव्य, पदावली, भक्तिआश्रित शृङ्गार विद्यापतिक रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 24, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "कालक्रमक दृष्टिसँ विद्यापतिक साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["नेपालक मध्यकालीन मैथिली नाटक", "मध्यकालीन मैथिली साहित्य", "उत्तर-विद्यापति पदावली परम्परा", "आदिकाल/पूर्व-विद्यापति साहित्य"], "answer": "मध्यकालीन मैथिली साहित्य", "explanation": "विद्यापतिक योगदान मध्यकालीन मैथिली साहित्यक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 25, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "विद्यापतिक रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["ग्राम्य परिवेश", "लोकभाषाक सहजता", "राधा-कृष्ण भाव, वयःसन्धि, पूर्वराग, मान, विरह आ अभिसारक सूक्ष्म चित्रण", "केवल राजकीय प्रशासनिक आदेशक संकलन"], "answer": "राधा-कृष्ण भाव, वयःसन्धि, पूर्वराग, मान, विरह आ अभिसारक सूक्ष्म चित्रण", "explanation": "राधा-कृष्ण भाव, वयःसन्धि, पूर्वराग, मान, विरह आ अभिसारक सूक्ष्म चित्रण विद्यापतिक साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 26, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "विद्यापति पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["आलोचना", "शृङ्गार आ भक्ति केर जीवंत समन्वय", "केवल तिथि-स्मरण", "केवल मूल्य-सूची"], "answer": "शृङ्गार आ भक्ति केर जीवंत समन्वय", "explanation": "विद्यापतिक योगदानक सार शृङ्गार आ भक्ति केर जीवंत समन्वय मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 27, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "विद्यापतिक योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका मंच, भाषा वा रचना-संवेदना सँ कोनो सम्बन्ध नहि छल", "कारण हुनका केवल राजकीय कर-सूची लिखल", "कारण हुनका माध्यमेँ शृङ्गार आ भक्ति केर जीवंत समन्वय केँ बल भेटल", "कारण हुनका साहित्यसँ सम्बन्ध नहि छल"], "answer": "कारण हुनका माध्यमेँ शृङ्गार आ भक्ति केर जीवंत समन्वय केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे विद्यापतिक योगदान शृङ्गार आ भक्ति केर जीवंत समन्वय केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 28, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "विद्यापतिक नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["साहित्यिक विधा छोड़ि केवल वंशावली पढ़ब", "केवल शहरक नाम खोजब", "केवल जन्म-वर्षक अनुमान करब", "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "विद्यापति केँ बुझबाक लेल विद्यापति पदावली, गीतिकाव्य, पदावली, भक्तिआश्रित शृङ्गार आ मैथिली गीतिकाव्य केँ लोकभाषा, प्रेम, भक्ति आ संगीतक ऊँचाई देनिहार केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 29, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "विद्यापतिक रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक लेखन गीतिकाव्य, पदावली, भक्तिआश्रित शृङ्गार मार्फत शृङ्गार आ भक्ति केर जीवंत समन्वय केँ उभारैत अछि", "हुनक लेखन केवल प्रशासनिक परिपत्र अछि", "हुनक योगदान साहित्यिक इतिहाससँ असम्बद्ध अछि", "हुनक रचना केवल खगोल-गणना पर सीमित अछि"], "answer": "हुनक लेखन गीतिकाव्य, पदावली, भक्तिआश्रित शृङ्गार मार्फत शृङ्गार आ भक्ति केर जीवंत समन्वय केँ उभारैत अछि", "explanation": "विद्यापतिक विधागत पहचान गीतिकाव्य, पदावली, भक्तिआश्रित शृङ्गार अछि, आ ओहिसँ शृङ्गार आ भक्ति केर जीवंत समन्वयक बोध प्रबल होइत अछि।"}, {"id": 30, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "विद्यापतिक योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल मुद्रकक नाम याद रखबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "केवल पृष्ठ-संख्या गिनबाक लेल", "केवल मनोरंजनक नाम-सूची बनबाक लेल"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "विद्यापतिक भूमिका मध्यकालीन मैथिली साहित्य आ शृङ्गार आ भक्ति केर जीवंत समन्वयक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 31, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "विद्यापतिक साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["शृङ्गार आ भक्ति केर जीवंत समन्वय", "गद्यक परिपक्वता", "ऐतिहासिक दृष्टि", "शृङ्गार आ भक्ति"], "answer": "शृङ्गार आ भक्ति केर जीवंत समन्वय", "explanation": "एहि लेखक/कविक साहित्यिक स्वर शृङ्गार आ भक्ति केर जीवंत समन्वयसँ चिन्हित कएल जा सकैत अछि।"}, {"id": 32, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "विद्यापतिक सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["विद्यापति — विद्यापति पदावली", "विद्यापति — जीवकान्तक कवितात्मक योगदान", "विद्यापति — मैथिली साहित्यक इतिहास-विमर्श", "विद्यापति — नेपालक मैथिली नाट्य परम्परा"], "answer": "विद्यापति — विद्यापति पदावली", "explanation": "ठीक जोड़ी विद्यापति — विद्यापति पदावली अछि।"}, {"id": 33, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "विद्यापतिक साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["भाषा-संवेदना सँ असम्बद्धता", "मैथिलीक प्रयोगक पूर्ण अभाव", "केवल अंकीय संकेतक प्रयोग", "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "विद्यापतिक रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ गीतिकाव्य, पदावली, भक्तिआश्रित शृङ्गारक माध्यमेँ बढ़बैत अछि।"}, {"id": 34, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "विद्यापति पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["केवल खेतीक माप-जोखक तालिका", "ग्राम्य परिवेश", "मैथिली गीतिकाव्य केँ लोकभाषा, प्रेम, भक्ति आ संगीतक ऊँचाई देनिहार", "लोकभाषाक सहजता"], "answer": "मैथिली गीतिकाव्य केँ लोकभाषा, प्रेम, भक्ति आ संगीतक ऊँचाई देनिहार", "explanation": "मैथिली गीतिकाव्य केँ लोकभाषा, प्रेम, भक्ति आ संगीतक ऊँचाई देनिहार केँ छोड़ला सँ विद्यापतिक मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 35, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "विद्यापतिक अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["केवल पुरस्कार-सूची पढ़ि", "केवल नामक वर्णक्रमसँ", "केवल छपाईक आकार देखि", "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "विद्यापतिक योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 36, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "विद्यापतिक साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["केवल खेतीक माप-जोखक तालिका", "केवल शिलालेखक तिथि-सूची", "केवल व्यावसायिक हिसाब-किताबक पुस्तिका", "शृङ्गार आ भक्ति केर जीवंत समन्वय"], "answer": "शृङ्गार आ भक्ति केर जीवंत समन्वय", "explanation": "विद्यापतिक छवि शृङ्गार आ भक्ति केर जीवंत समन्वय केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 37, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "विद्यापतिक प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["केवल अनुवाद, बिना मौलिकता आ बिना भाषा-चेतना", "गीतिकाव्य, पदावली, भक्तिआश्रित शृङ्गार, शृङ्गार आ भक्ति केर जीवंत समन्वय आ राधा-कृष्ण भाव, वयःसन्धि, पूर्वराग, मान, विरह आ अभिसारक सूक्ष्म चित्रण", "प्रशासन, सैनिक आदेश आ दफ्तर", "खगोल-गणना, मौसम-तालिका आ नुस्खा"], "answer": "गीतिकाव्य, पदावली, भक्तिआश्रित शृङ्गार, शृङ्गार आ भक्ति केर जीवंत समन्वय आ राधा-कृष्ण भाव, वयःसन्धि, पूर्वराग, मान, विरह आ अभिसारक सूक्ष्म चित्रण", "explanation": "एहि शब्द-समूहमे विद्यापतिक विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 38, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "विद्यापतिक रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["शृङ्गार आ भक्ति केर जीवंत समन्वयक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "भाषाक प्रयोग घटि गेल", "रचना-परम्परा टूटि गेल", "साहित्यिक विधा समाप्त भऽ गेल"], "answer": "शृङ्गार आ भक्ति केर जीवंत समन्वयक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "विद्यापतिक काजसँ शृङ्गार आ भक्ति केर जीवंत समन्वयमे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 39, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "विद्यापतिक योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे", "केवल भूगोलक नक्शा बनाबयवला प्रश्नमे", "केवल खेलक नियम याद करयवला प्रश्नमे", "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "विद्यापतिक योगदान मध्यकालीन मैथिली साहित्य आ गीतिकाव्य, पदावली, भक्तिआश्रित शृङ्गारक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 40, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "विद्यापतिक सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["विद्यापतिक अध्ययनमे काल, विधा आ कृति अप्रासंगिक अछि", "विद्यापतिक मैथिली साहित्यसँ कोनो सम्बन्ध नहि", "विद्यापति मध्यकालीन मैथिली साहित्यमे गीतिकाव्य, पदावली, भक्तिआश्रित शृङ्गार द्वारा मैथिली गीतिकाव्य केँ लोकभाषा, प्रेम, भक्ति आ संगीतक ऊँचाई देनिहार", "विद्यापतिक योगदान केवल व्यापारिक लेखामे सीमित रहल"], "answer": "विद्यापति मध्यकालीन मैथिली साहित्यमे गीतिकाव्य, पदावली, भक्तिआश्रित शृङ्गार द्वारा मैथिली गीतिकाव्य केँ लोकभाषा, प्रेम, भक्ति आ संगीतक ऊँचाई देनिहार", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 41, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "गोविन्ददासक मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["मैथिली गद्यक प्राचीन आधार आ समाज-संस्कृतिक विस्तृत वर्णन", "इतिहास, समाज, संस्कृति आ पात्रक जटिलता केँ उपन्यासमे विस्तृत करनिहार", "विद्यापति-परम्पराक भक्ति-रस आ पद-माधुर्य केँ आगू बढ़ेनिहार", "केवल खेतीक माप-जोखक तालिका"], "answer": "विद्यापति-परम्पराक भक्ति-रस आ पद-माधुर्य केँ आगू बढ़ेनिहार", "explanation": "गोविन्ददासक अध्ययनमे मुख्य बात विद्यापति-परम्पराक भक्ति-रस आ पद-माधुर्य केँ आगू बढ़ेनिहार अछि; एहि कारण हुनका भजनात्मक गीत-परम्परा सँ जोड़ल जाएत अछि।"}, {"id": 42, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "गोविन्ददासक संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["मैथिली साहित्यक इतिहास लेखन", "गोविन्ददास भजनावली", "श्रीशक साहित्यिक योगदान", "मोहनक मुक्तक-काव्य"], "answer": "गोविन्ददास भजनावली", "explanation": "गोविन्ददासक सन्दर्भमे गोविन्ददास भजनावली महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ भजनात्मक गीत-परम्परा स्पष्ट होइत अछि।"}, {"id": 43, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "गोविन्ददास केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["गद्य-वर्णन", "गीतिकाव्य", "नाटक", "भजन-पद आ गीतिकाव्य"], "answer": "भजन-पद आ गीतिकाव्य", "explanation": "भजन-पद आ गीतिकाव्य गोविन्ददासक रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 44, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "कालक्रमक दृष्टिसँ गोविन्ददासक साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["आधुनिक कथा-उपन्यास परम्परा", "आधुनिक समालोचना", "समकालीन मैथिली साहित्य", "उत्तर-विद्यापति पदावली परम्परा"], "answer": "उत्तर-विद्यापति पदावली परम्परा", "explanation": "गोविन्ददासक योगदान उत्तर-विद्यापति पदावली परम्पराक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 45, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "गोविन्ददासक रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["मौखिक परम्परा", "श्रवण-माधुर्य, राधा-कृष्ण भाव आ पद-लालित्य", "लोकभाषाक सहजता", "सामाजिक चेतना"], "answer": "श्रवण-माधुर्य, राधा-कृष्ण भाव आ पद-लालित्य", "explanation": "श्रवण-माधुर्य, राधा-कृष्ण भाव आ पद-लालित्य गोविन्ददासक साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 46, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "गोविन्ददास पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["भजनात्मक गीत-परम्परा", "इतिहास-बोध", "अनुसंधान", "गद्यक परिपक्वता"], "answer": "भजनात्मक गीत-परम्परा", "explanation": "गोविन्ददासक योगदानक सार भजनात्मक गीत-परम्परा मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 47, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "गोविन्ददासक योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका माध्यमेँ भजनात्मक गीत-परम्परा केँ बल भेटल", "कारण हुनका केवल गणना-पद्धति बनौल", "कारण हुनका मंच, भाषा वा रचना-संवेदना सँ कोनो सम्बन्ध नहि छल", "कारण हुनका साहित्यसँ सम्बन्ध नहि छल"], "answer": "कारण हुनका माध्यमेँ भजनात्मक गीत-परम्परा केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे गोविन्ददासक योगदान भजनात्मक गीत-परम्परा केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 48, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "गोविन्ददासक नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["केवल नाम रटि छोड़ि देब", "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "साहित्यिक विधा छोड़ि केवल वंशावली पढ़ब", "केवल जन्म-वर्षक अनुमान करब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "गोविन्ददास केँ बुझबाक लेल गोविन्ददास भजनावली, भजन-पद आ गीतिकाव्य आ विद्यापति-परम्पराक भक्ति-रस आ पद-माधुर्य केँ आगू बढ़ेनिहार केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 49, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "गोविन्ददासक रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक लेखन भजन-पद आ गीतिकाव्य मार्फत भजनात्मक गीत-परम्परा केँ उभारैत अछि", "हुनक लेखन केवल प्रशासनिक परिपत्र अछि", "हुनक काजमे भाषा वा समाजक प्रश्न नै अछि", "हुनक योगदान साहित्यिक इतिहाससँ असम्बद्ध अछि"], "answer": "हुनक लेखन भजन-पद आ गीतिकाव्य मार्फत भजनात्मक गीत-परम्परा केँ उभारैत अछि", "explanation": "गोविन्ददासक विधागत पहचान भजन-पद आ गीतिकाव्य अछि, आ ओहिसँ भजनात्मक गीत-परम्पराक बोध प्रबल होइत अछि।"}, {"id": 50, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "गोविन्ददासक योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल मुद्रकक नाम याद रखबाक लेल", "केवल बाहरी भाषा सीखबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "केवल मनोरंजनक नाम-सूची बनबाक लेल"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "गोविन्ददासक भूमिका उत्तर-विद्यापति पदावली परम्परा आ भजनात्मक गीत-परम्पराक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 51, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "गोविन्ददासक साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["सामाजिक चेतना", "भजनात्मक गीत-परम्परा", "ग्राम्य परिवेश", "जनपक्षधरता"], "answer": "भजनात्मक गीत-परम्परा", "explanation": "एहि लेखक/कविक साहित्यिक स्वर भजनात्मक गीत-परम्परासँ चिन्हित कएल जा सकैत अछि।"}, {"id": 52, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "गोविन्ददासक सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["गोविन्ददास — गोविन्ददास भजनावली", "गोविन्ददास — दत्त-वती", "गोविन्ददास — आधुनिक मैथिली उपन्यास-परम्परा", "गोविन्ददास — मोहनक मुक्तक-काव्य"], "answer": "गोविन्ददास — गोविन्ददास भजनावली", "explanation": "ठीक जोड़ी गोविन्ददास — गोविन्ददास भजनावली अछि।"}, {"id": 53, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "गोविन्ददासक साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["केवल मौन अभिनय बिना भाषा", "भाषा-संवेदना सँ असम्बद्धता", "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "केवल अंकीय संकेतक प्रयोग"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "गोविन्ददासक रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ भजन-पद आ गीतिकाव्यक माध्यमेँ बढ़बैत अछि।"}, {"id": 54, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "गोविन्ददास पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["केवल गणितीय सूत्रक व्याख्या", "विद्यापति-परम्पराक भक्ति-रस आ पद-माधुर्य केँ आगू बढ़ेनिहार", "केवल व्यावसायिक हिसाब-किताबक पुस्तिका", "प्रतीकात्मकता"], "answer": "विद्यापति-परम्पराक भक्ति-रस आ पद-माधुर्य केँ आगू बढ़ेनिहार", "explanation": "विद्यापति-परम्पराक भक्ति-रस आ पद-माधुर्य केँ आगू बढ़ेनिहार केँ छोड़ला सँ गोविन्ददासक मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 55, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "गोविन्ददासक अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["केवल नामक वर्णक्रमसँ", "केवल पृष्ठ-संख्याक आधार पर", "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "केवल छपाईक आकार देखि"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "गोविन्ददासक योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 56, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "गोविन्ददासक साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["भजनात्मक गीत-परम्परा", "केवल वैद्यकीय नुस्खाक संग्रह", "केवल राजकीय प्रशासनिक आदेशक संकलन", "गद्यक परिपक्वता"], "answer": "भजनात्मक गीत-परम्परा", "explanation": "गोविन्ददासक छवि भजनात्मक गीत-परम्परा केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 57, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "गोविन्ददासक प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["भजन-पद आ गीतिकाव्य, भजनात्मक गीत-परम्परा आ श्रवण-माधुर्य, राधा-कृष्ण भाव आ पद-लालित्य", "प्रशासन, सैनिक आदेश आ दफ्तर", "केवल अनुवाद, बिना मौलिकता आ बिना भाषा-चेतना", "खगोल-गणना, मौसम-तालिका आ नुस्खा"], "answer": "भजन-पद आ गीतिकाव्य, भजनात्मक गीत-परम्परा आ श्रवण-माधुर्य, राधा-कृष्ण भाव आ पद-लालित्य", "explanation": "एहि शब्द-समूहमे गोविन्ददासक विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 58, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "गोविन्ददासक रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["लोक-संवेदना पूर्णतः हटि गेल", "साहित्यिक विधा समाप्त भऽ गेल", "भजनात्मक गीत-परम्पराक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "रचना-परम्परा टूटि गेल"], "answer": "भजनात्मक गीत-परम्पराक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "गोविन्ददासक काजसँ भजनात्मक गीत-परम्परामे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 59, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "गोविन्ददासक योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे", "केवल रसायनिक सूत्रक प्रश्नमे", "केवल भूगोलक नक्शा बनाबयवला प्रश्नमे", "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "गोविन्ददासक योगदान उत्तर-विद्यापति पदावली परम्परा आ भजन-पद आ गीतिकाव्यक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 60, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "गोविन्ददासक सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["गोविन्ददास केवल पञ्जी-लेखक छलाह, साहित्यिक योगदान नहि", "गोविन्ददास उत्तर-विद्यापति पदावली परम्परामे भजन-पद आ गीतिकाव्य द्वारा विद्यापति-परम्पराक भक्ति-रस आ पद-माधुर्य केँ आगू बढ़ेनिहार", "गोविन्ददासक अध्ययनमे काल, विधा आ कृति अप्रासंगिक अछि", "गोविन्ददासक योगदान केवल व्यापारिक लेखामे सीमित रहल"], "answer": "गोविन्ददास उत्तर-विद्यापति पदावली परम्परामे भजन-पद आ गीतिकाव्य द्वारा विद्यापति-परम्पराक भक्ति-रस आ पद-माधुर्य केँ आगू बढ़ेनिहार", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 61, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "उमापतिक मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["केवल पञ्चाङ्गक गणना", "मैथिली नाटकमे गीत, संवाद, भक्ति आ मंचीय परम्पराक विकाससँ जुड़ल नाम", "मैथिली कथा-गद्यक सामाजिक धरातल, पात्र-विकास आ कथात्मक भाषा केँ बल देनिहार", "लोक-संवेदना, गीतात्मकता आ सरल मैथिली भाषाक काव्य-प्रवाह केँ बल देनिहार"], "answer": "मैथिली नाटकमे गीत, संवाद, भक्ति आ मंचीय परम्पराक विकाससँ जुड़ल नाम", "explanation": "उमापतिक अध्ययनमे मुख्य बात मैथिली नाटकमे गीत, संवाद, भक्ति आ मंचीय परम्पराक विकाससँ जुड़ल नाम अछि; एहि कारण हुनका मध्यकालीन मैथिली रंग-परम्परा सँ जोड़ल जाएत अछि।"}, {"id": 62, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "उमापतिक संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["पारिजात-हरण परम्परा", "मोहनक मुक्तक-काव्य", "अंकिया नाट परम्परा", "केवल पञ्जी-सूची"], "answer": "पारिजात-हरण परम्परा", "explanation": "उमापतिक सन्दर्भमे पारिजात-हरण परम्परा महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ मध्यकालीन मैथिली रंग-परम्परा स्पष्ट होइत अछि।"}, {"id": 63, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "उमापति केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["मुक्तक-काव्य", "लोकसाहित्य", "व्यंग्य", "कीर्तनिया/गीतिनाट्य परम्परा"], "answer": "कीर्तनिया/गीतिनाट्य परम्परा", "explanation": "कीर्तनिया/गीतिनाट्य परम्परा उमापतिक रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 64, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "कालक्रमक दृष्टिसँ उमापतिक साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["आधुनिक समालोचना", "मध्यकालीन नाट्य-परम्परा", "नेपालक मध्यकालीन मैथिली नाटक", "उत्तर-विद्यापति पदावली परम्परा"], "answer": "मध्यकालीन नाट्य-परम्परा", "explanation": "उमापतिक योगदान मध्यकालीन नाट्य-परम्पराक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 65, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "उमापतिक रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["लयात्मकता", "केवल विदेशी यात्रावृत्तक अनुवाद", "कीर्तन, पात्र-संवाद, नृत्य-संगीत आ भक्तिपरक नाट्य-रूप", "केवल शिलालेखक तिथि-सूची"], "answer": "कीर्तन, पात्र-संवाद, नृत्य-संगीत आ भक्तिपरक नाट्य-रूप", "explanation": "कीर्तन, पात्र-संवाद, नृत्य-संगीत आ भक्तिपरक नाट्य-रूप उमापतिक साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 66, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "उमापति पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["सामाजिक यथार्थ", "आलोचना", "केवल मूल्य-सूची", "मध्यकालीन मैथिली रंग-परम्परा"], "answer": "मध्यकालीन मैथिली रंग-परम्परा", "explanation": "उमापतिक योगदानक सार मध्यकालीन मैथिली रंग-परम्परा मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 67, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "उमापतिक योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका केवल राजकीय कर-सूची लिखल", "कारण हुनका केवल गणना-पद्धति बनौल", "कारण हुनका माध्यमेँ मध्यकालीन मैथिली रंग-परम्परा केँ बल भेटल", "कारण हुनका साहित्यसँ सम्बन्ध नहि छल"], "answer": "कारण हुनका माध्यमेँ मध्यकालीन मैथिली रंग-परम्परा केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे उमापतिक योगदान मध्यकालीन मैथिली रंग-परम्परा केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 68, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "उमापतिक नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["साहित्यिक विधा छोड़ि केवल वंशावली पढ़ब", "केवल शहरक नाम खोजब", "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "केवल जन्म-वर्षक अनुमान करब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "उमापति केँ बुझबाक लेल पारिजात-हरण परम्परा, कीर्तनिया/गीतिनाट्य परम्परा आ मैथिली नाटकमे गीत, संवाद, भक्ति आ मंचीय परम्पराक विकाससँ जुड़ल नाम केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 69, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "उमापतिक रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक काजमे भाषा वा समाजक प्रश्न नै अछि", "हुनक रचना केवल खगोल-गणना पर सीमित अछि", "हुनक लेखन कीर्तनिया/गीतिनाट्य परम्परा मार्फत मध्यकालीन मैथिली रंग-परम्परा केँ उभारैत अछि", "हुनक लेखन केवल प्रशासनिक परिपत्र अछि"], "answer": "हुनक लेखन कीर्तनिया/गीतिनाट्य परम्परा मार्फत मध्यकालीन मैथिली रंग-परम्परा केँ उभारैत अछि", "explanation": "उमापतिक विधागत पहचान कीर्तनिया/गीतिनाट्य परम्परा अछि, आ ओहिसँ मध्यकालीन मैथिली रंग-परम्पराक बोध प्रबल होइत अछि।"}, {"id": 70, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "उमापतिक योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल मुद्रकक नाम याद रखबाक लेल", "केवल बाहरी भाषा सीखबाक लेल", "केवल मनोरंजनक नाम-सूची बनबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "उमापतिक भूमिका मध्यकालीन नाट्य-परम्परा आ मध्यकालीन मैथिली रंग-परम्पराक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 71, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "उमापतिक साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["भाषा-संस्कार", "मौखिक परम्परा", "लोकभाषाक सहजता", "मध्यकालीन मैथिली रंग-परम्परा"], "answer": "मध्यकालीन मैथिली रंग-परम्परा", "explanation": "एहि लेखक/कविक साहित्यिक स्वर मध्यकालीन मैथिली रंग-परम्परासँ चिन्हित कएल जा सकैत अछि।"}, {"id": 72, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "उमापतिक सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["उमापति — आरसीक काव्य-योगदान", "उमापति — मिथिला इतिहास-संस्कृति अध्ययन", "उमापति — वर्णरत्नाकर", "उमापति — पारिजात-हरण परम्परा"], "answer": "उमापति — पारिजात-हरण परम्परा", "explanation": "ठीक जोड़ी उमापति — पारिजात-हरण परम्परा अछि।"}, {"id": 73, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "उमापतिक साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["केवल मौन अभिनय बिना भाषा", "केवल अंकीय संकेतक प्रयोग", "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "भाषा-संवेदना सँ असम्बद्धता"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "उमापतिक रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ कीर्तनिया/गीतिनाट्य परम्पराक माध्यमेँ बढ़बैत अछि।"}, {"id": 74, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "उमापति पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["ऐतिहासिक दृष्टि", "पात्र-मनोविज्ञान", "मैथिली नाटकमे गीत, संवाद, भक्ति आ मंचीय परम्पराक विकाससँ जुड़ल नाम", "केवल शिलालेखक तिथि-सूची"], "answer": "मैथिली नाटकमे गीत, संवाद, भक्ति आ मंचीय परम्पराक विकाससँ जुड़ल नाम", "explanation": "मैथिली नाटकमे गीत, संवाद, भक्ति आ मंचीय परम्पराक विकाससँ जुड़ल नाम केँ छोड़ला सँ उमापतिक मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 75, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "उमापतिक अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["केवल पृष्ठ-संख्याक आधार पर", "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "केवल नामक वर्णक्रमसँ", "केवल पुरस्कार-सूची पढ़ि"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "उमापतिक योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 76, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "उमापतिक साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["लोकजीवन", "आलोचना", "अनुसंधान", "मध्यकालीन मैथिली रंग-परम्परा"], "answer": "मध्यकालीन मैथिली रंग-परम्परा", "explanation": "उमापतिक छवि मध्यकालीन मैथिली रंग-परम्परा केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 77, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "उमापतिक प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["खगोल-गणना, मौसम-तालिका आ नुस्खा", "कर-सूची, नाप-जोख आ बाजार-भाव", "कीर्तनिया/गीतिनाट्य परम्परा, मध्यकालीन मैथिली रंग-परम्परा आ कीर्तन, पात्र-संवाद, नृत्य-संगीत आ भक्तिपरक नाट्य-रूप", "प्रशासन, सैनिक आदेश आ दफ्तर"], "answer": "कीर्तनिया/गीतिनाट्य परम्परा, मध्यकालीन मैथिली रंग-परम्परा आ कीर्तन, पात्र-संवाद, नृत्य-संगीत आ भक्तिपरक नाट्य-रूप", "explanation": "एहि शब्द-समूहमे उमापतिक विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 78, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "उमापतिक रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["साहित्यिक विधा समाप्त भऽ गेल", "भाषाक प्रयोग घटि गेल", "लोक-संवेदना पूर्णतः हटि गेल", "मध्यकालीन मैथिली रंग-परम्पराक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल"], "answer": "मध्यकालीन मैथिली रंग-परम्पराक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "उमापतिक काजसँ मध्यकालीन मैथिली रंग-परम्परामे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 79, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "उमापतिक योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["केवल रसायनिक सूत्रक प्रश्नमे", "केवल भूगोलक नक्शा बनाबयवला प्रश्नमे", "केवल खेलक नियम याद करयवला प्रश्नमे", "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "उमापतिक योगदान मध्यकालीन नाट्य-परम्परा आ कीर्तनिया/गीतिनाट्य परम्पराक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 80, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "उमापतिक सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["उमापतिक योगदान केवल व्यापारिक लेखामे सीमित रहल", "उमापति मध्यकालीन नाट्य-परम्परामे कीर्तनिया/गीतिनाट्य परम्परा द्वारा मैथिली नाटकमे गीत, संवाद, भक्ति आ मंचीय परम्पराक विकाससँ जुड़ल नाम", "उमापतिक मैथिली साहित्यसँ कोनो सम्बन्ध नहि", "उमापति केवल पञ्जी-लेखक छलाह, साहित्यिक योगदान नहि"], "answer": "उमापति मध्यकालीन नाट्य-परम्परामे कीर्तनिया/गीतिनाट्य परम्परा द्वारा मैथिली नाटकमे गीत, संवाद, भक्ति आ मंचीय परम्पराक विकाससँ जुड़ल नाम", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 81, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "मनबोधक मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["साहित्य, संस्कृति आ भाषा-चेतना केँ आधुनिक मैथिली लेखनमे जोड़निहार", "आधुनिक मैथिली कवितामे भाव, चिंतन, भाषा-संयम आ कलात्मकता जोड़निहार", "कृष्णकथाक मैथिली प्रबन्ध-काव्य रूप केँ प्रतिष्ठित करनिहार", "लोक-रंग, मंच-अनुभव, सामाजिक कथ्य आ अभिनय-परम्पराक संरक्षणमे योगदान"], "answer": "कृष्णकथाक मैथिली प्रबन्ध-काव्य रूप केँ प्रतिष्ठित करनिहार", "explanation": "मनबोधक अध्ययनमे मुख्य बात कृष्णकथाक मैथिली प्रबन्ध-काव्य रूप केँ प्रतिष्ठित करनिहार अछि; एहि कारण हुनका कृष्णकथा आ भक्तिपरक आख्यान सँ जोड़ल जाएत अछि।"}, {"id": 82, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "मनबोधक संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["कृति राजकमल", "वर्णरत्नाकर", "कृष्णजन्म", "अमरक मुक्तक-काव्य"], "answer": "कृष्णजन्म", "explanation": "मनबोधक सन्दर्भमे कृष्णजन्म महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ कृष्णकथा आ भक्तिपरक आख्यान स्पष्ट होइत अछि।"}, {"id": 83, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "मनबोध केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["प्रबन्ध-काव्य", "व्यंग्य", "निबन्ध", "कथा-उपन्यास"], "answer": "प्रबन्ध-काव्य", "explanation": "प्रबन्ध-काव्य मनबोधक रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 84, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "कालक्रमक दृष्टिसँ मनबोधक साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["आधुनिक मैथिली नवजागरण", "मध्यकालीन कथात्मक काव्यधारा", "मध्यकालीन मैथिली साहित्य", "आधुनिक कथा-उपन्यास परम्परा"], "answer": "मध्यकालीन कथात्मक काव्यधारा", "explanation": "मनबोधक योगदान मध्यकालीन कथात्मक काव्यधाराक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 85, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "मनबोधक रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["कथा-प्रवाह, भक्तिभाव, लोकधर्मी भाषा आ काव्यात्मक वर्णन", "ग्राम्य परिवेश", "छन्द-सजगता", "केवल वैद्यकीय नुस्खाक संग्रह"], "answer": "कथा-प्रवाह, भक्तिभाव, लोकधर्मी भाषा आ काव्यात्मक वर्णन", "explanation": "कथा-प्रवाह, भक्तिभाव, लोकधर्मी भाषा आ काव्यात्मक वर्णन मनबोधक साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 86, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "मनबोध पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["अनुसंधान", "कृष्णकथा आ भक्तिपरक आख्यान", "लोकजीवन", "सामाजिक यथार्थ"], "answer": "कृष्णकथा आ भक्तिपरक आख्यान", "explanation": "मनबोधक योगदानक सार कृष्णकथा आ भक्तिपरक आख्यान मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 87, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "मनबोधक योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका केवल शिलालेख पढ़ल", "कारण हुनका साहित्यसँ सम्बन्ध नहि छल", "कारण हुनका माध्यमेँ कृष्णकथा आ भक्तिपरक आख्यान केँ बल भेटल", "कारण हुनका केवल राजकीय कर-सूची लिखल"], "answer": "कारण हुनका माध्यमेँ कृष्णकथा आ भक्तिपरक आख्यान केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे मनबोधक योगदान कृष्णकथा आ भक्तिपरक आख्यान केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 88, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "मनबोधक नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["केवल नाम रटि छोड़ि देब", "साहित्यिक विधा छोड़ि केवल वंशावली पढ़ब", "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "केवल जन्म-वर्षक अनुमान करब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "मनबोध केँ बुझबाक लेल कृष्णजन्म, प्रबन्ध-काव्य आ कृष्णकथाक मैथिली प्रबन्ध-काव्य रूप केँ प्रतिष्ठित करनिहार केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 89, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "मनबोधक रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक रचना केवल खगोल-गणना पर सीमित अछि", "हुनक योगदान साहित्यिक इतिहाससँ असम्बद्ध अछि", "हुनक लेखन केवल प्रशासनिक परिपत्र अछि", "हुनक लेखन प्रबन्ध-काव्य मार्फत कृष्णकथा आ भक्तिपरक आख्यान केँ उभारैत अछि"], "answer": "हुनक लेखन प्रबन्ध-काव्य मार्फत कृष्णकथा आ भक्तिपरक आख्यान केँ उभारैत अछि", "explanation": "मनबोधक विधागत पहचान प्रबन्ध-काव्य अछि, आ ओहिसँ कृष्णकथा आ भक्तिपरक आख्यानक बोध प्रबल होइत अछि।"}, {"id": 90, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "मनबोधक योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल पृष्ठ-संख्या गिनबाक लेल", "केवल बाहरी भाषा सीखबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "केवल मनोरंजनक नाम-सूची बनबाक लेल"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "मनबोधक भूमिका मध्यकालीन कथात्मक काव्यधारा आ कृष्णकथा आ भक्तिपरक आख्यानक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 91, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "मनबोधक साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["अनुसंधान", "ऐतिहासिक दृष्टि", "शृङ्गार आ भक्ति", "कृष्णकथा आ भक्तिपरक आख्यान"], "answer": "कृष्णकथा आ भक्तिपरक आख्यान", "explanation": "एहि लेखक/कविक साहित्यिक स्वर कृष्णकथा आ भक्तिपरक आख्यानसँ चिन्हित कएल जा सकैत अछि।"}, {"id": 92, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "मनबोधक सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["मनबोध — खट्टर ककाक तरंग", "मनबोध — कुमार गंगानन्द सिंहक साहित्यिक योगदान", "मनबोध — चित्रा", "मनबोध — कृष्णजन्म"], "answer": "मनबोध — कृष्णजन्म", "explanation": "ठीक जोड़ी मनबोध — कृष्णजन्म अछि।"}, {"id": 93, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "मनबोधक साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["केवल अंकीय संकेतक प्रयोग", "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "केवल मौन अभिनय बिना भाषा", "मैथिलीक प्रयोगक पूर्ण अभाव"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "मनबोधक रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ प्रबन्ध-काव्यक माध्यमेँ बढ़बैत अछि।"}, {"id": 94, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "मनबोध पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["लोकभाषाक सहजता", "लयात्मकता", "राधा-कृष्ण भाव", "कृष्णकथाक मैथिली प्रबन्ध-काव्य रूप केँ प्रतिष्ठित करनिहार"], "answer": "कृष्णकथाक मैथिली प्रबन्ध-काव्य रूप केँ प्रतिष्ठित करनिहार", "explanation": "कृष्णकथाक मैथिली प्रबन्ध-काव्य रूप केँ प्रतिष्ठित करनिहार केँ छोड़ला सँ मनबोधक मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 95, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "मनबोधक अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["केवल पुरस्कार-सूची पढ़ि", "केवल नामक वर्णक्रमसँ", "केवल छपाईक आकार देखि", "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "मनबोधक योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 96, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "मनबोधक साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["भाषा-संस्कार", "कृष्णकथा आ भक्तिपरक आख्यान", "केवल खेतीक माप-जोखक तालिका", "स्त्री-अनुभव"], "answer": "कृष्णकथा आ भक्तिपरक आख्यान", "explanation": "मनबोधक छवि कृष्णकथा आ भक्तिपरक आख्यान केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 97, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "मनबोधक प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["कर-सूची, नाप-जोख आ बाजार-भाव", "प्रबन्ध-काव्य, कृष्णकथा आ भक्तिपरक आख्यान आ कथा-प्रवाह, भक्तिभाव, लोकधर्मी भाषा आ काव्यात्मक वर्णन", "खगोल-गणना, मौसम-तालिका आ नुस्खा", "केवल अनुवाद, बिना मौलिकता आ बिना भाषा-चेतना"], "answer": "प्रबन्ध-काव्य, कृष्णकथा आ भक्तिपरक आख्यान आ कथा-प्रवाह, भक्तिभाव, लोकधर्मी भाषा आ काव्यात्मक वर्णन", "explanation": "एहि शब्द-समूहमे मनबोधक विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 98, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "मनबोधक रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["लोक-संवेदना पूर्णतः हटि गेल", "कृष्णकथा आ भक्तिपरक आख्यानक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "भाषाक प्रयोग घटि गेल", "साहित्यिक विधा समाप्त भऽ गेल"], "answer": "कृष्णकथा आ भक्तिपरक आख्यानक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "मनबोधक काजसँ कृष्णकथा आ भक्तिपरक आख्यानमे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 99, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "मनबोधक योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["केवल रसायनिक सूत्रक प्रश्नमे", "केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे", "केवल भूगोलक नक्शा बनाबयवला प्रश्नमे", "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "मनबोधक योगदान मध्यकालीन कथात्मक काव्यधारा आ प्रबन्ध-काव्यक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 100, "section": 1, "sectionTitle": "१. आदिकाल आ मध्यकालक आधार-स्तम्भ", "q": "मनबोधक सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["मनबोध केवल पञ्जी-लेखक छलाह, साहित्यिक योगदान नहि", "मनबोधक मैथिली साहित्यसँ कोनो सम्बन्ध नहि", "मनबोध मध्यकालीन कथात्मक काव्यधारामे प्रबन्ध-काव्य द्वारा कृष्णकथाक मैथिली प्रबन्ध-काव्य रूप केँ प्रतिष्ठित करनिहार", "मनबोधक अध्ययनमे काल, विधा आ कृति अप्रासंगिक अछि"], "answer": "मनबोध मध्यकालीन कथात्मक काव्यधारामे प्रबन्ध-काव्य द्वारा कृष्णकथाक मैथिली प्रबन्ध-काव्य रूप केँ प्रतिष्ठित करनिहार", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 101, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "चन्दा झाक मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["समकालीन यथार्थ, शहरी-बोध, आत्मसंघर्ष आ आधुनिक प्रतीक-विधान केँ स्वर देनिहार", "केवल राजकीय प्रशासनिक आदेशक संकलन", "मुक्तक-काव्यक भाव-वैविध्य, भाषा-संयम आ आधुनिक चिंतन केँ विकसित करनिहार", "मैथिली भाषा-सम्मान, रामकाव्य, छन्द-विधान आ लोक-भाषिक गौरवक युगप्रवर्तक"], "answer": "मैथिली भाषा-सम्मान, रामकाव्य, छन्द-विधान आ लोक-भाषिक गौरवक युगप्रवर्तक", "explanation": "चन्दा झाक अध्ययनमे मुख्य बात मैथिली भाषा-सम्मान, रामकाव्य, छन्द-विधान आ लोक-भाषिक गौरवक युगप्रवर्तक अछि; एहि कारण हुनका मैथिली नवजागरण आ रामकाव्य सँ जोड़ल जाएत अछि।"}, {"id": 102, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "चन्दा झाक संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["मिथिला-भाषा रामायण", "मलंगियाक नाट्य-योगदान", "कीचकवध", "खट्टर ककाक तरंग"], "answer": "मिथिला-भाषा रामायण", "explanation": "चन्दा झाक सन्दर्भमे मिथिला-भाषा रामायण महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ मैथिली नवजागरण आ रामकाव्य स्पष्ट होइत अछि।"}, {"id": 103, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "चन्दा झा केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["महाकाव्य", "भाषा-अनुसंधान", "व्यंग्य", "रामकाव्य, गीत, नचारी-महेसबानी आ गद्य-अनुवाद"], "answer": "रामकाव्य, गीत, नचारी-महेसबानी आ गद्य-अनुवाद", "explanation": "रामकाव्य, गीत, नचारी-महेसबानी आ गद्य-अनुवाद चन्दा झाक रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 104, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "कालक्रमक दृष्टिसँ चन्दा झाक साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["आधुनिक समालोचना", "समकालीन मैथिली साहित्य", "आधुनिक मैथिली नवजागरण", "आदिकाल/पूर्व-विद्यापति साहित्य"], "answer": "आधुनिक मैथिली नवजागरण", "explanation": "चन्दा झाक योगदान आधुनिक मैथिली नवजागरणक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 105, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "चन्दा झाक रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["ऐतिहासिक दृष्टि", "लोकभाषाक सहजता", "पात्र-मनोविज्ञान", "रामकथा केँ मैथिली संस्कार, लोकोक्ति, छन्द आ सामाजिक चेतनासँ जोड़ब"], "answer": "रामकथा केँ मैथिली संस्कार, लोकोक्ति, छन्द आ सामाजिक चेतनासँ जोड़ब", "explanation": "रामकथा केँ मैथिली संस्कार, लोकोक्ति, छन्द आ सामाजिक चेतनासँ जोड़ब चन्दा झाक साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 106, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "चन्दा झा पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["मैथिली नवजागरण आ रामकाव्य", "भाषा-संस्कार", "जनपक्षधरता", "केवल मूल्य-सूची"], "answer": "मैथिली नवजागरण आ रामकाव्य", "explanation": "चन्दा झाक योगदानक सार मैथिली नवजागरण आ रामकाव्य मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 107, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "चन्दा झाक योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका केवल शिलालेख पढ़ल", "कारण हुनका माध्यमेँ मैथिली नवजागरण आ रामकाव्य केँ बल भेटल", "कारण हुनका केवल गणना-पद्धति बनौल", "कारण हुनका साहित्यसँ सम्बन्ध नहि छल"], "answer": "कारण हुनका माध्यमेँ मैथिली नवजागरण आ रामकाव्य केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे चन्दा झाक योगदान मैथिली नवजागरण आ रामकाव्य केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 108, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "चन्दा झाक नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["केवल जन्म-वर्षक अनुमान करब", "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "केवल शहरक नाम खोजब", "केवल नाम रटि छोड़ि देब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "चन्दा झा केँ बुझबाक लेल मिथिला-भाषा रामायण, रामकाव्य, गीत, नचारी-महेसबानी आ गद्य-अनुवाद आ मैथिली भाषा-सम्मान, रामकाव्य, छन्द-विधान आ लोक-भाषिक गौरवक युगप्रवर्तक केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 109, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "चन्दा झाक रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक रचना केवल खगोल-गणना पर सीमित अछि", "हुनक काजमे भाषा वा समाजक प्रश्न नै अछि", "हुनक लेखन केवल प्रशासनिक परिपत्र अछि", "हुनक लेखन रामकाव्य, गीत, नचारी-महेसबानी आ गद्य-अनुवाद मार्फत मैथिली नवजागरण आ रामकाव्य केँ उभारैत अछि"], "answer": "हुनक लेखन रामकाव्य, गीत, नचारी-महेसबानी आ गद्य-अनुवाद मार्फत मैथिली नवजागरण आ रामकाव्य केँ उभारैत अछि", "explanation": "चन्दा झाक विधागत पहचान रामकाव्य, गीत, नचारी-महेसबानी आ गद्य-अनुवाद अछि, आ ओहिसँ मैथिली नवजागरण आ रामकाव्यक बोध प्रबल होइत अछि।"}, {"id": 110, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "चन्दा झाक योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल मुद्रकक नाम याद रखबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "केवल मनोरंजनक नाम-सूची बनबाक लेल", "केवल बाहरी भाषा सीखबाक लेल"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "चन्दा झाक भूमिका आधुनिक मैथिली नवजागरण आ मैथिली नवजागरण आ रामकाव्यक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 111, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "चन्दा झाक साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["मंचीय संवाद", "शृङ्गार आ भक्ति", "रंगमंच", "मैथिली नवजागरण आ रामकाव्य"], "answer": "मैथिली नवजागरण आ रामकाव्य", "explanation": "एहि लेखक/कविक साहित्यिक स्वर मैथिली नवजागरण आ रामकाव्यसँ चिन्हित कएल जा सकैत अछि।"}, {"id": 112, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "चन्दा झाक सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["चन्दा झा — श्रीशक साहित्यिक योगदान", "चन्दा झा — समकालीन मैथिली कविता सम्बन्धी संपादन/विमर्श", "चन्दा झा — मिथिला-भाषा रामायण", "चन्दा झा — मैथिली नवजागरणक साहित्यिक प्रसंग"], "answer": "चन्दा झा — मिथिला-भाषा रामायण", "explanation": "ठीक जोड़ी चन्दा झा — मिथिला-भाषा रामायण अछि।"}, {"id": 113, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "चन्दा झाक साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["भाषा-संवेदना सँ असम्बद्धता", "केवल अंकीय संकेतक प्रयोग", "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "मैथिलीक प्रयोगक पूर्ण अभाव"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "चन्दा झाक रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ रामकाव्य, गीत, नचारी-महेसबानी आ गद्य-अनुवादक माध्यमेँ बढ़बैत अछि।"}, {"id": 114, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "चन्दा झा पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["मौखिक परम्परा", "लयात्मकता", "केवल शिलालेखक तिथि-सूची", "मैथिली भाषा-सम्मान, रामकाव्य, छन्द-विधान आ लोक-भाषिक गौरवक युगप्रवर्तक"], "answer": "मैथिली भाषा-सम्मान, रामकाव्य, छन्द-विधान आ लोक-भाषिक गौरवक युगप्रवर्तक", "explanation": "मैथिली भाषा-सम्मान, रामकाव्य, छन्द-विधान आ लोक-भाषिक गौरवक युगप्रवर्तक केँ छोड़ला सँ चन्दा झाक मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 115, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "चन्दा झाक अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["केवल नामक वर्णक्रमसँ", "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "केवल छपाईक आकार देखि", "केवल पृष्ठ-संख्याक आधार पर"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "चन्दा झाक योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 116, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "चन्दा झाक साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["अनुसंधान", "मैथिली नवजागरण आ रामकाव्य", "लोकजीवन", "केवल शिलालेखक तिथि-सूची"], "answer": "मैथिली नवजागरण आ रामकाव्य", "explanation": "चन्दा झाक छवि मैथिली नवजागरण आ रामकाव्य केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 117, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "चन्दा झाक प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["रामकाव्य, गीत, नचारी-महेसबानी आ गद्य-अनुवाद, मैथिली नवजागरण आ रामकाव्य आ रामकथा केँ मैथिली संस्कार, लोकोक्ति, छन्द आ सामाजिक चेतनासँ जोड़ब", "कर-सूची, नाप-जोख आ बाजार-भाव", "प्रशासन, सैनिक आदेश आ दफ्तर", "केवल अनुवाद, बिना मौलिकता आ बिना भाषा-चेतना"], "answer": "रामकाव्य, गीत, नचारी-महेसबानी आ गद्य-अनुवाद, मैथिली नवजागरण आ रामकाव्य आ रामकथा केँ मैथिली संस्कार, लोकोक्ति, छन्द आ सामाजिक चेतनासँ जोड़ब", "explanation": "एहि शब्द-समूहमे चन्दा झाक विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 118, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "चन्दा झाक रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["रचना-परम्परा टूटि गेल", "लोक-संवेदना पूर्णतः हटि गेल", "साहित्यिक विधा समाप्त भऽ गेल", "मैथिली नवजागरण आ रामकाव्यक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल"], "answer": "मैथिली नवजागरण आ रामकाव्यक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "चन्दा झाक काजसँ मैथिली नवजागरण आ रामकाव्यमे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 119, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "चन्दा झाक योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "केवल भूगोलक नक्शा बनाबयवला प्रश्नमे", "केवल खेलक नियम याद करयवला प्रश्नमे", "केवल रसायनिक सूत्रक प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "चन्दा झाक योगदान आधुनिक मैथिली नवजागरण आ रामकाव्य, गीत, नचारी-महेसबानी आ गद्य-अनुवादक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 120, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "चन्दा झाक सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["चन्दा झा आधुनिक मैथिली नवजागरणमे रामकाव्य, गीत, नचारी-महेसबानी आ गद्य-अनुवाद द्वारा मैथिली भाषा-सम्मान, रामकाव्य, छन्द-विधान आ लोक-भाषिक गौरवक युगप्रवर्तक", "चन्दा झाक अध्ययनमे काल, विधा आ कृति अप्रासंगिक अछि", "चन्दा झाक योगदान केवल व्यापारिक लेखामे सीमित रहल", "चन्दा झाक मैथिली साहित्यसँ कोनो सम्बन्ध नहि"], "answer": "चन्दा झा आधुनिक मैथिली नवजागरणमे रामकाव्य, गीत, नचारी-महेसबानी आ गद्य-अनुवाद द्वारा मैथिली भाषा-सम्मान, रामकाव्य, छन्द-विधान आ लोक-भाषिक गौरवक युगप्रवर्तक", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 121, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "लालदासक मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["मिथिला-दृष्टिसँ रामकथा, सीता-शक्ति आ भक्तिपरक आख्यान केँ विस्तार देनिहार", "मैथिली गीतिकाव्य केँ लोकभाषा, प्रेम, भक्ति आ संगीतक ऊँचाई देनिहार", "मैथिली नाटकमे गीत, संवाद, भक्ति आ मंचीय परम्पराक विकाससँ जुड़ल नाम", "स्त्री-अनुभव, घरेलू-सामाजिक द्वन्द्व आ आधुनिक संवेदनाकेँ कथा-साहित्यमे स्वर देनिहार"], "answer": "मिथिला-दृष्टिसँ रामकथा, सीता-शक्ति आ भक्तिपरक आख्यान केँ विस्तार देनिहार", "explanation": "लालदासक अध्ययनमे मुख्य बात मिथिला-दृष्टिसँ रामकथा, सीता-शक्ति आ भक्तिपरक आख्यान केँ विस्तार देनिहार अछि; एहि कारण हुनका मिथिला-रामायण परम्परा सँ जोड़ल जाएत अछि।"}, {"id": 122, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "लालदासक संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["रमेश्वरचरित मिथिला रामायण", "मैथिली नवजागरणक साहित्यिक प्रसंग", "राजस्व-विवरण", "राजमोहन झाक साहित्य-विमर्श"], "answer": "रमेश्वरचरित मिथिला रामायण", "explanation": "लालदासक सन्दर्भमे रमेश्वरचरित मिथिला रामायण महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ मिथिला-रामायण परम्परा स्पष्ट होइत अछि।"}, {"id": 123, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "लालदास केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["निबन्ध", "समालोचना", "व्यंग्य", "महाकाव्यात्मक रामकाव्य"], "answer": "महाकाव्यात्मक रामकाव्य", "explanation": "महाकाव्यात्मक रामकाव्य लालदासक रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 124, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "कालक्रमक दृष्टिसँ लालदासक साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["आधुनिक महाकाव्य/रामकथा परम्परा", "नेपालक मध्यकालीन मैथिली नाटक", "उत्तर-विद्यापति पदावली परम्परा", "आधुनिक कथा-उपन्यास परम्परा"], "answer": "आधुनिक महाकाव्य/रामकथा परम्परा", "explanation": "लालदासक योगदान आधुनिक महाकाव्य/रामकथा परम्पराक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 125, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "लालदासक रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["बालकाण्ड, सीता-महिमा, मिथिला-संस्कार आ काव्यात्मक वर्णन", "भाषिक अनुशासन", "सामाजिक चेतना", "प्रतीकात्मकता"], "answer": "बालकाण्ड, सीता-महिमा, मिथिला-संस्कार आ काव्यात्मक वर्णन", "explanation": "बालकाण्ड, सीता-महिमा, मिथिला-संस्कार आ काव्यात्मक वर्णन लालदासक साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 126, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "लालदास पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["आलोचना", "केवल तिथि-स्मरण", "मिथिला-रामायण परम्परा", "स्त्री-अनुभव"], "answer": "मिथिला-रामायण परम्परा", "explanation": "लालदासक योगदानक सार मिथिला-रामायण परम्परा मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 127, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "लालदासक योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका केवल शिलालेख पढ़ल", "कारण हुनका माध्यमेँ मिथिला-रामायण परम्परा केँ बल भेटल", "कारण हुनका मंच, भाषा वा रचना-संवेदना सँ कोनो सम्बन्ध नहि छल", "कारण हुनका केवल राजकीय कर-सूची लिखल"], "answer": "कारण हुनका माध्यमेँ मिथिला-रामायण परम्परा केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे लालदासक योगदान मिथिला-रामायण परम्परा केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 128, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "लालदासक नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["साहित्यिक विधा छोड़ि केवल वंशावली पढ़ब", "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "केवल शहरक नाम खोजब", "केवल जन्म-वर्षक अनुमान करब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "लालदास केँ बुझबाक लेल रमेश्वरचरित मिथिला रामायण, महाकाव्यात्मक रामकाव्य आ मिथिला-दृष्टिसँ रामकथा, सीता-शक्ति आ भक्तिपरक आख्यान केँ विस्तार देनिहार केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 129, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "लालदासक रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक लेखन महाकाव्यात्मक रामकाव्य मार्फत मिथिला-रामायण परम्परा केँ उभारैत अछि", "हुनक लेखन केवल प्रशासनिक परिपत्र अछि", "हुनक काजमे भाषा वा समाजक प्रश्न नै अछि", "हुनक रचना केवल खगोल-गणना पर सीमित अछि"], "answer": "हुनक लेखन महाकाव्यात्मक रामकाव्य मार्फत मिथिला-रामायण परम्परा केँ उभारैत अछि", "explanation": "लालदासक विधागत पहचान महाकाव्यात्मक रामकाव्य अछि, आ ओहिसँ मिथिला-रामायण परम्पराक बोध प्रबल होइत अछि।"}, {"id": 130, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "लालदासक योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल बाहरी भाषा सीखबाक लेल", "केवल मुद्रकक नाम याद रखबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "केवल पृष्ठ-संख्या गिनबाक लेल"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "लालदासक भूमिका आधुनिक महाकाव्य/रामकथा परम्परा आ मिथिला-रामायण परम्पराक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 131, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "लालदासक साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["मिथिला-रामायण परम्परा", "भाषा-संस्कार", "ऐतिहासिक दृष्टि", "लोकजीवन"], "answer": "मिथिला-रामायण परम्परा", "explanation": "एहि लेखक/कविक साहित्यिक स्वर मिथिला-रामायण परम्परासँ चिन्हित कएल जा सकैत अछि।"}, {"id": 132, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "लालदासक सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["लालदास — कीर्ति नारायण मिश्रक काव्य-योगदान", "लालदास — रमेश्वरचरित मिथिला रामायण", "लालदास — लोरिक-विजय", "लालदास — मधुपक गीतिकाव्य"], "answer": "लालदास — रमेश्वरचरित मिथिला रामायण", "explanation": "ठीक जोड़ी लालदास — रमेश्वरचरित मिथिला रामायण अछि।"}, {"id": 133, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "लालदासक साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["केवल मौन अभिनय बिना भाषा", "केवल अंकीय संकेतक प्रयोग", "मैथिलीक प्रयोगक पूर्ण अभाव", "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "लालदासक रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ महाकाव्यात्मक रामकाव्यक माध्यमेँ बढ़बैत अछि।"}, {"id": 134, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "लालदास पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["मिथिला-दृष्टिसँ रामकथा, सीता-शक्ति आ भक्तिपरक आख्यान केँ विस्तार देनिहार", "राधा-कृष्ण भाव", "ऐतिहासिक दृष्टि", "मंचीय संवाद"], "answer": "मिथिला-दृष्टिसँ रामकथा, सीता-शक्ति आ भक्तिपरक आख्यान केँ विस्तार देनिहार", "explanation": "मिथिला-दृष्टिसँ रामकथा, सीता-शक्ति आ भक्तिपरक आख्यान केँ विस्तार देनिहार केँ छोड़ला सँ लालदासक मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 135, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "लालदासक अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "केवल पृष्ठ-संख्याक आधार पर", "केवल नामक वर्णक्रमसँ", "केवल छपाईक आकार देखि"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "लालदासक योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 136, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "लालदासक साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["भाषा-संस्कार", "मिथिला-रामायण परम्परा", "केवल खेतीक माप-जोखक तालिका", "केवल शिलालेखक तिथि-सूची"], "answer": "मिथिला-रामायण परम्परा", "explanation": "लालदासक छवि मिथिला-रामायण परम्परा केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 137, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "लालदासक प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["प्रशासन, सैनिक आदेश आ दफ्तर", "खगोल-गणना, मौसम-तालिका आ नुस्खा", "केवल अनुवाद, बिना मौलिकता आ बिना भाषा-चेतना", "महाकाव्यात्मक रामकाव्य, मिथिला-रामायण परम्परा आ बालकाण्ड, सीता-महिमा, मिथिला-संस्कार आ काव्यात्मक वर्णन"], "answer": "महाकाव्यात्मक रामकाव्य, मिथिला-रामायण परम्परा आ बालकाण्ड, सीता-महिमा, मिथिला-संस्कार आ काव्यात्मक वर्णन", "explanation": "एहि शब्द-समूहमे लालदासक विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 138, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "लालदासक रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["भाषाक प्रयोग घटि गेल", "मिथिला-रामायण परम्पराक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "रचना-परम्परा टूटि गेल", "लोक-संवेदना पूर्णतः हटि गेल"], "answer": "मिथिला-रामायण परम्पराक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "लालदासक काजसँ मिथिला-रामायण परम्परामे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 139, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "लालदासक योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["केवल भूगोलक नक्शा बनाबयवला प्रश्नमे", "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "केवल खेलक नियम याद करयवला प्रश्नमे", "केवल रसायनिक सूत्रक प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "लालदासक योगदान आधुनिक महाकाव्य/रामकथा परम्परा आ महाकाव्यात्मक रामकाव्यक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 140, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "लालदासक सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["लालदासक मैथिली साहित्यसँ कोनो सम्बन्ध नहि", "लालदासक अध्ययनमे काल, विधा आ कृति अप्रासंगिक अछि", "लालदास आधुनिक महाकाव्य/रामकथा परम्परामे महाकाव्यात्मक रामकाव्य द्वारा मिथिला-दृष्टिसँ रामकथा, सीता-शक्ति आ भक्तिपरक आख्यान केँ विस्तार देनिहार", "लालदासक योगदान केवल व्यापारिक लेखामे सीमित रहल"], "answer": "लालदास आधुनिक महाकाव्य/रामकथा परम्परामे महाकाव्यात्मक रामकाव्य द्वारा मिथिला-दृष्टिसँ रामकथा, सीता-शक्ति आ भक्तिपरक आख्यान केँ विस्तार देनिहार", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 141, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "सीताराम झाक मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["ग्राम्य-संस्कृति, लोक-संसार आ सामाजिक परिवर्तनक कथा-स्वर केँ बल देनिहार", "महाभारत-प्रसंग केँ मैथिली महाकाव्यात्मक रूपमे प्रतिष्ठित करनिहार", "आधुनिक मैथिली कवितामे भाव, छन्द, लोकधर्मिता आ भाषा-संस्कारक योगदान", "विद्यापति-परम्पराक भक्ति-रस आ पद-माधुर्य केँ आगू बढ़ेनिहार"], "answer": "आधुनिक मैथिली कवितामे भाव, छन्द, लोकधर्मिता आ भाषा-संस्कारक योगदान", "explanation": "सीताराम झाक अध्ययनमे मुख्य बात आधुनिक मैथिली कवितामे भाव, छन्द, लोकधर्मिता आ भाषा-संस्कारक योगदान अछि; एहि कारण हुनका मुक्तक-काव्यक सुदृढ़ीकरण सँ जोड़ल जाएत अछि।"}, {"id": 142, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "सीताराम झाक संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["रमेश्वरचरित मिथिला रामायण", "रमणक आलोचनात्मक लेखन", "मोहनक मुक्तक-काव्य", "मैथिली मुक्तक-काव्य परम्परा"], "answer": "मैथिली मुक्तक-काव्य परम्परा", "explanation": "सीताराम झाक सन्दर्भमे मैथिली मुक्तक-काव्य परम्परा महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ मुक्तक-काव्यक सुदृढ़ीकरण स्पष्ट होइत अछि।"}, {"id": 143, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "सीताराम झा केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["कविता, गीत आ मुक्तक", "मुक्तक-काव्य", "गीतिकाव्य", "लोकसाहित्य"], "answer": "कविता, गीत आ मुक्तक", "explanation": "कविता, गीत आ मुक्तक सीताराम झाक रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 144, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "कालक्रमक दृष्टिसँ सीताराम झाक साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["आदिकाल/पूर्व-विद्यापति साहित्य", "आधुनिक मुक्तक-काव्य परम्परा", "आधुनिक मैथिली नवजागरण", "आधुनिक कथा-उपन्यास परम्परा"], "answer": "आधुनिक मुक्तक-काव्य परम्परा", "explanation": "सीताराम झाक योगदान आधुनिक मुक्तक-काव्य परम्पराक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 145, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "सीताराम झाक रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["प्रतीकात्मकता", "केवल राजकीय प्रशासनिक आदेशक संकलन", "गीतात्मकता, भाव-संयम, संस्कार-बोध आ लोकानुभव", "केवल शिलालेखक तिथि-सूची"], "answer": "गीतात्मकता, भाव-संयम, संस्कार-बोध आ लोकानुभव", "explanation": "गीतात्मकता, भाव-संयम, संस्कार-बोध आ लोकानुभव सीताराम झाक साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 146, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "सीताराम झा पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["केवल तिथि-स्मरण", "भाषा-संस्कार", "मुक्तक-काव्यक सुदृढ़ीकरण", "इतिहास-बोध"], "answer": "मुक्तक-काव्यक सुदृढ़ीकरण", "explanation": "सीताराम झाक योगदानक सार मुक्तक-काव्यक सुदृढ़ीकरण मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 147, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "सीताराम झाक योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका केवल राजकीय कर-सूची लिखल", "कारण हुनका केवल शिलालेख पढ़ल", "कारण हुनका माध्यमेँ मुक्तक-काव्यक सुदृढ़ीकरण केँ बल भेटल", "कारण हुनका केवल गणना-पद्धति बनौल"], "answer": "कारण हुनका माध्यमेँ मुक्तक-काव्यक सुदृढ़ीकरण केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे सीताराम झाक योगदान मुक्तक-काव्यक सुदृढ़ीकरण केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 148, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "सीताराम झाक नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["केवल नाम रटि छोड़ि देब", "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "केवल जन्म-वर्षक अनुमान करब", "केवल शहरक नाम खोजब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "सीताराम झा केँ बुझबाक लेल मैथिली मुक्तक-काव्य परम्परा, कविता, गीत आ मुक्तक आ आधुनिक मैथिली कवितामे भाव, छन्द, लोकधर्मिता आ भाषा-संस्कारक योगदान केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 149, "section": 2, "sectionTitle": "२. नवजागरण आ महाकाव्य-प्रबन्ध परम्परा", "q": "सीताराम झाक रचनात्मक पहिचानक तुलना करैत कोन
