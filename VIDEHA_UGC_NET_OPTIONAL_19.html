क क्षेत्रमे योगदान", "केवल शिलालेखक तिथि-सूची", "केवल विदेशी यात्रावृत्तक अनुवाद", "आधुनिक मनुष्यक अकेलापन, देह-संवेदना, शहर-समाज आ विद्रोही चेतनाकेँ तीव्र रूप देनिहार"], "answer": "आधुनिक मनुष्यक अकेलापन, देह-संवेदना, शहर-समाज आ विद्रोही चेतनाकेँ तीव्र रूप देनिहार", "explanation": "राजकमल चौधरीक अध्ययनमे मुख्य बात आधुनिक मनुष्यक अकेलापन, देह-संवेदना, शहर-समाज आ विद्रोही चेतनाकेँ तीव्र रूप देनिहार अछि; एहि कारण हुनका आधुनिक संवेदना आ कथाशिल्प सँ जोड़ल जाएत अछि।"}, {"id": 282, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "राजकमल चौधरीक संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["मैथिली मुक्तक-काव्य परम्परा", "विदितक कथा-लेखन", "कृति राजकमल", "मौसम-पत्रक"], "answer": "कृति राजकमल", "explanation": "राजकमल चौधरीक सन्दर्भमे कृति राजकमल महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ आधुनिक संवेदना आ कथाशिल्प स्पष्ट होइत अछि।"}, {"id": 283, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "राजकमल चौधरी केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["कथा, कविता, उपन्यास आ विद्रोही गद्य", "महाकाव्य", "समालोचना", "गद्य-वर्णन"], "answer": "कथा, कविता, उपन्यास आ विद्रोही गद्य", "explanation": "कथा, कविता, उपन्यास आ विद्रोही गद्य राजकमल चौधरीक रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 284, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "कालक्रमक दृष्टिसँ राजकमल चौधरीक साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["उत्तर-विद्यापति पदावली परम्परा", "समकालीन मैथिली साहित्य", "उत्तर-आधुनिक संवेदनाक आरम्भिक आधुनिक स्वर", "आदिकाल/पूर्व-विद्यापति साहित्य"], "answer": "उत्तर-आधुनिक संवेदनाक आरम्भिक आधुनिक स्वर", "explanation": "राजकमल चौधरीक योगदान उत्तर-आधुनिक संवेदनाक आरम्भिक आधुनिक स्वरक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 285, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "राजकमल चौधरीक रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["लोकभाषाक सहजता", "मनोवैज्ञानिक बेचैनी, सामाजिक विखण्डन, निर्भीक भाषा आ नवीन शिल्प", "केवल पञ्चाङ्गक गणना", "केवल शिलालेखक तिथि-सूची"], "answer": "मनोवैज्ञानिक बेचैनी, सामाजिक विखण्डन, निर्भीक भाषा आ नवीन शिल्प", "explanation": "मनोवैज्ञानिक बेचैनी, सामाजिक विखण्डन, निर्भीक भाषा आ नवीन शिल्प राजकमल चौधरीक साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 286, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "राजकमल चौधरी पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["गद्यक परिपक्वता", "आधुनिक संवेदना आ कथाशिल्प", "केवल मूल्य-सूची", "छन्द-विधान"], "answer": "आधुनिक संवेदना आ कथाशिल्प", "explanation": "राजकमल चौधरीक योगदानक सार आधुनिक संवेदना आ कथाशिल्प मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 287, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "राजकमल चौधरीक योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका माध्यमेँ आधुनिक संवेदना आ कथाशिल्प केँ बल भेटल", "कारण हुनका मंच, भाषा वा रचना-संवेदना सँ कोनो सम्बन्ध नहि छल", "कारण हुनका केवल गणना-पद्धति बनौल", "कारण हुनका केवल शिलालेख पढ़ल"], "answer": "कारण हुनका माध्यमेँ आधुनिक संवेदना आ कथाशिल्प केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे राजकमल चौधरीक योगदान आधुनिक संवेदना आ कथाशिल्प केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 288, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "राजकमल चौधरीक नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["केवल शहरक नाम खोजब", "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "साहित्यिक विधा छोड़ि केवल वंशावली पढ़ब", "केवल नाम रटि छोड़ि देब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "राजकमल चौधरी केँ बुझबाक लेल कृति राजकमल, कथा, कविता, उपन्यास आ विद्रोही गद्य आ आधुनिक मनुष्यक अकेलापन, देह-संवेदना, शहर-समाज आ विद्रोही चेतनाकेँ तीव्र रूप देनिहार केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 289, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "राजकमल चौधरीक रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक रचना केवल खगोल-गणना पर सीमित अछि", "हुनक लेखन कथा, कविता, उपन्यास आ विद्रोही गद्य मार्फत आधुनिक संवेदना आ कथाशिल्प केँ उभारैत अछि", "हुनक लेखन केवल प्रशासनिक परिपत्र अछि", "हुनक योगदान साहित्यिक इतिहाससँ असम्बद्ध अछि"], "answer": "हुनक लेखन कथा, कविता, उपन्यास आ विद्रोही गद्य मार्फत आधुनिक संवेदना आ कथाशिल्प केँ उभारैत अछि", "explanation": "राजकमल चौधरीक विधागत पहचान कथा, कविता, उपन्यास आ विद्रोही गद्य अछि, आ ओहिसँ आधुनिक संवेदना आ कथाशिल्पक बोध प्रबल होइत अछि।"}, {"id": 290, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "राजकमल चौधरीक योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल बाहरी भाषा सीखबाक लेल", "केवल मनोरंजनक नाम-सूची बनबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "केवल मुद्रकक नाम याद रखबाक लेल"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "राजकमल चौधरीक भूमिका उत्तर-आधुनिक संवेदनाक आरम्भिक आधुनिक स्वर आ आधुनिक संवेदना आ कथाशिल्पक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 291, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "राजकमल चौधरीक साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["मंचीय संवाद", "भाषिक अनुशासन", "लोकभाषाक सहजता", "आधुनिक संवेदना आ कथाशिल्प"], "answer": "आधुनिक संवेदना आ कथाशिल्प", "explanation": "एहि लेखक/कविक साहित्यिक स्वर आधुनिक संवेदना आ कथाशिल्पसँ चिन्हित कएल जा सकैत अछि।"}, {"id": 292, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "राजकमल चौधरीक सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["राजकमल चौधरी — कृति राजकमल", "राजकमल चौधरी — नचिकेताक साहित्यिक योगदान", "राजकमल चौधरी — मैथिली नारी-चेतनाक कथा-परम्परा", "राजकमल चौधरी — राजमोहन झाक साहित्य-विमर्श"], "answer": "राजकमल चौधरी — कृति राजकमल", "explanation": "ठीक जोड़ी राजकमल चौधरी — कृति राजकमल अछि।"}, {"id": 293, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "राजकमल चौधरीक साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["केवल मौन अभिनय बिना भाषा", "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "मैथिलीक प्रयोगक पूर्ण अभाव", "केवल अंकीय संकेतक प्रयोग"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "राजकमल चौधरीक रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ कथा, कविता, उपन्यास आ विद्रोही गद्यक माध्यमेँ बढ़बैत अछि।"}, {"id": 294, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "राजकमल चौधरी पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["केवल शिलालेखक तिथि-सूची", "आधुनिक मनुष्यक अकेलापन, देह-संवेदना, शहर-समाज आ विद्रोही चेतनाकेँ तीव्र रूप देनिहार", "पात्र-मनोविज्ञान", "केवल विदेशी यात्रावृत्तक अनुवाद"], "answer": "आधुनिक मनुष्यक अकेलापन, देह-संवेदना, शहर-समाज आ विद्रोही चेतनाकेँ तीव्र रूप देनिहार", "explanation": "आधुनिक मनुष्यक अकेलापन, देह-संवेदना, शहर-समाज आ विद्रोही चेतनाकेँ तीव्र रूप देनिहार केँ छोड़ला सँ राजकमल चौधरीक मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 295, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "राजकमल चौधरीक अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "केवल छपाईक आकार देखि", "केवल नामक वर्णक्रमसँ", "केवल पृष्ठ-संख्याक आधार पर"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "राजकमल चौधरीक योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 296, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "राजकमल चौधरीक साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["केवल गणितीय सूत्रक व्याख्या", "केवल विदेशी यात्रावृत्तक अनुवाद", "आधुनिक संवेदना आ कथाशिल्प", "केवल व्यावसायिक हिसाब-किताबक पुस्तिका"], "answer": "आधुनिक संवेदना आ कथाशिल्प", "explanation": "राजकमल चौधरीक छवि आधुनिक संवेदना आ कथाशिल्प केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 297, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "राजकमल चौधरीक प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["कथा, कविता, उपन्यास आ विद्रोही गद्य, आधुनिक संवेदना आ कथाशिल्प आ मनोवैज्ञानिक बेचैनी, सामाजिक विखण्डन, निर्भीक भाषा आ नवीन शिल्प", "खगोल-गणना, मौसम-तालिका आ नुस्खा", "कर-सूची, नाप-जोख आ बाजार-भाव", "केवल अनुवाद, बिना मौलिकता आ बिना भाषा-चेतना"], "answer": "कथा, कविता, उपन्यास आ विद्रोही गद्य, आधुनिक संवेदना आ कथाशिल्प आ मनोवैज्ञानिक बेचैनी, सामाजिक विखण्डन, निर्भीक भाषा आ नवीन शिल्प", "explanation": "एहि शब्द-समूहमे राजकमल चौधरीक विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 298, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "राजकमल चौधरीक रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["साहित्यिक विधा समाप्त भऽ गेल", "भाषाक प्रयोग घटि गेल", "रचना-परम्परा टूटि गेल", "आधुनिक संवेदना आ कथाशिल्पक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल"], "answer": "आधुनिक संवेदना आ कथाशिल्पक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "राजकमल चौधरीक काजसँ आधुनिक संवेदना आ कथाशिल्पमे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 299, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "राजकमल चौधरीक योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "केवल खेलक नियम याद करयवला प्रश्नमे", "केवल भूगोलक नक्शा बनाबयवला प्रश्नमे", "केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "राजकमल चौधरीक योगदान उत्तर-आधुनिक संवेदनाक आरम्भिक आधुनिक स्वर आ कथा, कविता, उपन्यास आ विद्रोही गद्यक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 300, "section": 3, "sectionTitle": "३. आधुनिक कथा, उपन्यास आ व्यंग्यक अग्रणी लेखक", "q": "राजकमल चौधरीक सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["राजकमल चौधरी उत्तर-आधुनिक संवेदनाक आरम्भिक आधुनिक स्वरमे कथा, कविता, उपन्यास आ विद्रोही गद्य द्वारा आधुनिक मनुष्यक अकेलापन, देह-संवेदना, शहर-समाज आ विद्रोही चेतनाकेँ तीव्र रूप देनिहार", "राजकमल चौधरीक अध्ययनमे काल, विधा आ कृति अप्रासंगिक अछि", "राजकमल चौधरीक मैथिली साहित्यसँ कोनो सम्बन्ध नहि", "राजकमल चौधरी केवल पञ्जी-लेखक छलाह, साहित्यिक योगदान नहि"], "answer": "राजकमल चौधरी उत्तर-आधुनिक संवेदनाक आरम्भिक आधुनिक स्वरमे कथा, कविता, उपन्यास आ विद्रोही गद्य द्वारा आधुनिक मनुष्यक अकेलापन, देह-संवेदना, शहर-समाज आ विद्रोही चेतनाकेँ तीव्र रूप देनिहार", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 301, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "लिली रेक मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["स्त्री-अनुभव, घरेलू-सामाजिक द्वन्द्व आ आधुनिक संवेदनाकेँ कथा-साहित्यमे स्वर देनिहार", "लोक-रंग, मंच-अनुभव, सामाजिक कथ्य आ अभिनय-परम्पराक संरक्षणमे योगदान", "इतिहास, समाज, संस्कृति आ पात्रक जटिलता केँ उपन्यासमे विस्तृत करनिहार", "रचनाक मूल्यांकन, मानदण्ड, साहित्यिक अनुशासन आ विवेचन-पद्धति केँ बल देनिहार"], "answer": "स्त्री-अनुभव, घरेलू-सामाजिक द्वन्द्व आ आधुनिक संवेदनाकेँ कथा-साहित्यमे स्वर देनिहार", "explanation": "लिली रेक अध्ययनमे मुख्य बात स्त्री-अनुभव, घरेलू-सामाजिक द्वन्द्व आ आधुनिक संवेदनाकेँ कथा-साहित्यमे स्वर देनिहार अछि; एहि कारण हुनका नारी-दृष्टि आ आधुनिक कथा सँ जोड़ल जाएत अछि।"}, {"id": 302, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "लिली रेक संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["मैथिली नारी-चेतनाक कथा-परम्परा", "लोकसाहित्य-सम्बन्धी विमर्श", "बेटीक अपमान आ छीनरदेवी", "कृष्णजन्म"], "answer": "मैथिली नारी-चेतनाक कथा-परम्परा", "explanation": "लिली रेक सन्दर्भमे मैथिली नारी-चेतनाक कथा-परम्परा महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ नारी-दृष्टि आ आधुनिक कथा स्पष्ट होइत अछि।"}, {"id": 303, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "लिली रे केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["व्यंग्य", "कथा, उपन्यास आ स्त्री-अनुभव लेखन", "भाषा-अनुसंधान", "नाटक"], "answer": "कथा, उपन्यास आ स्त्री-अनुभव लेखन", "explanation": "कथा, उपन्यास आ स्त्री-अनुभव लेखन लिली रेक रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 304, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "कालक्रमक दृष्टिसँ लिली रेक साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["समकालीन मैथिली साहित्य", "आधुनिक समालोचना", "आधुनिक मैथिली कथा-उपन्यास", "आधुनिक मैथिली नवजागरण"], "answer": "आधुनिक मैथिली कथा-उपन्यास", "explanation": "लिली रेक योगदान आधुनिक मैथिली कथा-उपन्यासक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 305, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "लिली रेक रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["केवल गणितीय सूत्रक व्याख्या", "नारी-मन, परिवार, सामाजिक दबाव आ आत्मसम्मानक प्रश्न", "लयात्मकता", "राधा-कृष्ण भाव"], "answer": "नारी-मन, परिवार, सामाजिक दबाव आ आत्मसम्मानक प्रश्न", "explanation": "नारी-मन, परिवार, सामाजिक दबाव आ आत्मसम्मानक प्रश्न लिली रेक साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 306, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "लिली रे पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["केवल मूल्य-सूची", "केवल तिथि-स्मरण", "छन्द-विधान", "नारी-दृष्टि आ आधुनिक कथा"], "answer": "नारी-दृष्टि आ आधुनिक कथा", "explanation": "लिली रेक योगदानक सार नारी-दृष्टि आ आधुनिक कथा मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 307, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "लिली रेक योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका केवल राजकीय कर-सूची लिखल", "कारण हुनका माध्यमेँ नारी-दृष्टि आ आधुनिक कथा केँ बल भेटल", "कारण हुनका मंच, भाषा वा रचना-संवेदना सँ कोनो सम्बन्ध नहि छल", "कारण हुनका साहित्यसँ सम्बन्ध नहि छल"], "answer": "कारण हुनका माध्यमेँ नारी-दृष्टि आ आधुनिक कथा केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे लिली रेक योगदान नारी-दृष्टि आ आधुनिक कथा केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 308, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "लिली रेक नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "केवल शहरक नाम खोजब", "केवल जन्म-वर्षक अनुमान करब", "साहित्यिक विधा छोड़ि केवल वंशावली पढ़ब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "लिली रे केँ बुझबाक लेल मैथिली नारी-चेतनाक कथा-परम्परा, कथा, उपन्यास आ स्त्री-अनुभव लेखन आ स्त्री-अनुभव, घरेलू-सामाजिक द्वन्द्व आ आधुनिक संवेदनाकेँ कथा-साहित्यमे स्वर देनिहार केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 309, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "लिली रेक रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक काजमे भाषा वा समाजक प्रश्न नै अछि", "हुनक लेखन केवल प्रशासनिक परिपत्र अछि", "हुनक लेखन कथा, उपन्यास आ स्त्री-अनुभव लेखन मार्फत नारी-दृष्टि आ आधुनिक कथा केँ उभारैत अछि", "हुनक रचना केवल खगोल-गणना पर सीमित अछि"], "answer": "हुनक लेखन कथा, उपन्यास आ स्त्री-अनुभव लेखन मार्फत नारी-दृष्टि आ आधुनिक कथा केँ उभारैत अछि", "explanation": "लिली रेक विधागत पहचान कथा, उपन्यास आ स्त्री-अनुभव लेखन अछि, आ ओहिसँ नारी-दृष्टि आ आधुनिक कथाक बोध प्रबल होइत अछि।"}, {"id": 310, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "लिली रेक योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल मनोरंजनक नाम-सूची बनबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "केवल मुद्रकक नाम याद रखबाक लेल", "केवल पृष्ठ-संख्या गिनबाक लेल"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "लिली रेक भूमिका आधुनिक मैथिली कथा-उपन्यास आ नारी-दृष्टि आ आधुनिक कथाक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 311, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "लिली रेक साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["नारी-दृष्टि आ आधुनिक कथा", "प्रतीकात्मकता", "सामाजिक चेतना", "स्त्री-अनुभव"], "answer": "नारी-दृष्टि आ आधुनिक कथा", "explanation": "एहि लेखक/कविक साहित्यिक स्वर नारी-दृष्टि आ आधुनिक कथासँ चिन्हित कएल जा सकैत अछि।"}, {"id": 312, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "लिली रेक सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["लिली रे — अक्कूक नाट्य-योगदान", "लिली रे — मिथिला इतिहास-संस्कृति अध्ययन", "लिली रे — मैथिली नारी-चेतनाक कथा-परम्परा", "लिली रे — पारिजात-हरण परम्परा"], "answer": "लिली रे — मैथिली नारी-चेतनाक कथा-परम्परा", "explanation": "ठीक जोड़ी लिली रे — मैथिली नारी-चेतनाक कथा-परम्परा अछि।"}, {"id": 313, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "लिली रेक साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "केवल मौन अभिनय बिना भाषा", "मैथिलीक प्रयोगक पूर्ण अभाव", "भाषा-संवेदना सँ असम्बद्धता"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "लिली रेक रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ कथा, उपन्यास आ स्त्री-अनुभव लेखनक माध्यमेँ बढ़बैत अछि।"}, {"id": 314, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "लिली रे पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["भाषिक अनुशासन", "केवल वैद्यकीय नुस्खाक संग्रह", "स्त्री-अनुभव, घरेलू-सामाजिक द्वन्द्व आ आधुनिक संवेदनाकेँ कथा-साहित्यमे स्वर देनिहार", "लयात्मकता"], "answer": "स्त्री-अनुभव, घरेलू-सामाजिक द्वन्द्व आ आधुनिक संवेदनाकेँ कथा-साहित्यमे स्वर देनिहार", "explanation": "स्त्री-अनुभव, घरेलू-सामाजिक द्वन्द्व आ आधुनिक संवेदनाकेँ कथा-साहित्यमे स्वर देनिहार केँ छोड़ला सँ लिली रेक मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 315, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "लिली रेक अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["केवल नामक वर्णक्रमसँ", "केवल पुरस्कार-सूची पढ़ि", "केवल छपाईक आकार देखि", "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "लिली रेक योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 316, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "लिली रेक साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["केवल वैद्यकीय नुस्खाक संग्रह", "रंगमंच", "स्त्री-अनुभव", "नारी-दृष्टि आ आधुनिक कथा"], "answer": "नारी-दृष्टि आ आधुनिक कथा", "explanation": "लिली रेक छवि नारी-दृष्टि आ आधुनिक कथा केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 317, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "लिली रेक प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["कर-सूची, नाप-जोख आ बाजार-भाव", "कथा, उपन्यास आ स्त्री-अनुभव लेखन, नारी-दृष्टि आ आधुनिक कथा आ नारी-मन, परिवार, सामाजिक दबाव आ आत्मसम्मानक प्रश्न", "प्रशासन, सैनिक आदेश आ दफ्तर", "खगोल-गणना, मौसम-तालिका आ नुस्खा"], "answer": "कथा, उपन्यास आ स्त्री-अनुभव लेखन, नारी-दृष्टि आ आधुनिक कथा आ नारी-मन, परिवार, सामाजिक दबाव आ आत्मसम्मानक प्रश्न", "explanation": "एहि शब्द-समूहमे लिली रेक विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 318, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "लिली रेक रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["नारी-दृष्टि आ आधुनिक कथाक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "भाषाक प्रयोग घटि गेल", "रचना-परम्परा टूटि गेल", "साहित्यिक विधा समाप्त भऽ गेल"], "answer": "नारी-दृष्टि आ आधुनिक कथाक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "लिली रेक काजसँ नारी-दृष्टि आ आधुनिक कथामे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 319, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "लिली रेक योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "केवल भूगोलक नक्शा बनाबयवला प्रश्नमे", "केवल रसायनिक सूत्रक प्रश्नमे", "केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "लिली रेक योगदान आधुनिक मैथिली कथा-उपन्यास आ कथा, उपन्यास आ स्त्री-अनुभव लेखनक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 320, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "लिली रेक सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["लिली रे आधुनिक मैथिली कथा-उपन्यासमे कथा, उपन्यास आ स्त्री-अनुभव लेखन द्वारा स्त्री-अनुभव, घरेलू-सामाजिक द्वन्द्व आ आधुनिक संवेदनाकेँ कथा-साहित्यमे स्वर देनिहार", "लिली रेक मैथिली साहित्यसँ कोनो सम्बन्ध नहि", "लिली रे केवल पञ्जी-लेखक छलाह, साहित्यिक योगदान नहि", "लिली रेक अध्ययनमे काल, विधा आ कृति अप्रासंगिक अछि"], "answer": "लिली रे आधुनिक मैथिली कथा-उपन्यासमे कथा, उपन्यास आ स्त्री-अनुभव लेखन द्वारा स्त्री-अनुभव, घरेलू-सामाजिक द्वन्द्व आ आधुनिक संवेदनाकेँ कथा-साहित्यमे स्वर देनिहार", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 321, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "प्रभास कुमार चौधरीक मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["मिथिलाक इतिहास, समाज, संस्कृति आ साहित्यक अन्तरसम्बन्ध केँ स्पष्ट करनिहार", "समकालीन जीवन, सामाजिक परिवेश आ कथा-भाषाक विकासमे योगदान देनिहार", "समकालीन साहित्यक चयन, आलोचना, पाठकीय दिशा आ विधागत मूल्यांकनमे योगदान", "मैथिली रंगमंचमे सामाजिक कथ्य, संवाद-शक्ति आ नाटकीय संरचनाक विस्तार देनिहार"], "answer": "समकालीन जीवन, सामाजिक परिवेश आ कथा-भाषाक विकासमे योगदान देनिहार", "explanation": "प्रभास कुमार चौधरीक अध्ययनमे मुख्य बात समकालीन जीवन, सामाजिक परिवेश आ कथा-भाषाक विकासमे योगदान देनिहार अछि; एहि कारण हुनका समकालीन कथात्मक यथार्थ सँ जोड़ल जाएत अछि।"}, {"id": 322, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "प्रभास कुमार चौधरीक संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["आधुनिक मैथिली कथा-लेखन", "समकालीन मैथिली कविता सम्बन्धी संपादन/विमर्श", "कीर्ति नारायण मिश्रक काव्य-योगदान", "मैथिली नारी-चेतनाक कथा-परम्परा"], "answer": "आधुनिक मैथिली कथा-लेखन", "explanation": "प्रभास कुमार चौधरीक सन्दर्भमे आधुनिक मैथिली कथा-लेखन महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ समकालीन कथात्मक यथार्थ स्पष्ट होइत अछि।"}, {"id": 323, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "प्रभास कुमार चौधरी केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["कथा आ उपन्यास", "भाषा-अनुसंधान", "लोकसाहित्य", "समालोचना"], "answer": "कथा आ उपन्यास", "explanation": "कथा आ उपन्यास प्रभास कुमार चौधरीक रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 324, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "कालक्रमक दृष्टिसँ प्रभास कुमार चौधरीक साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["आधुनिक कथा-उपन्यास परम्परा", "आधुनिक कथा-गद्य परम्परा", "आधुनिक समालोचना", "आदिकाल/पूर्व-विद्यापति साहित्य"], "answer": "आधुनिक कथा-गद्य परम्परा", "explanation": "प्रभास कुमार चौधरीक योगदान आधुनिक कथा-गद्य परम्पराक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 325, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "प्रभास कुमार चौधरीक रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["पात्र-मनोविज्ञान", "केवल पञ्चाङ्गक गणना", "पात्रक मनोभूमि, सामाजिक यथार्थ आ संवादात्मक गद्य", "लोकभाषाक सहजता"], "answer": "पात्रक मनोभूमि, सामाजिक यथार्थ आ संवादात्मक गद्य", "explanation": "पात्रक मनोभूमि, सामाजिक यथार्थ आ संवादात्मक गद्य प्रभास कुमार चौधरीक साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 326, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "प्रभास कुमार चौधरी पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["सामाजिक यथार्थ", "स्त्री-अनुभव", "रंगमंच", "समकालीन कथात्मक यथार्थ"], "answer": "समकालीन कथात्मक यथार्थ", "explanation": "प्रभास कुमार चौधरीक योगदानक सार समकालीन कथात्मक यथार्थ मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 327, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "प्रभास कुमार चौधरीक योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका साहित्यसँ सम्बन्ध नहि छल", "कारण हुनका माध्यमेँ समकालीन कथात्मक यथार्थ केँ बल भेटल", "कारण हुनका केवल राजकीय कर-सूची लिखल", "कारण हुनका केवल शिलालेख पढ़ल"], "answer": "कारण हुनका माध्यमेँ समकालीन कथात्मक यथार्थ केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे प्रभास कुमार चौधरीक योगदान समकालीन कथात्मक यथार्थ केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 328, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "प्रभास कुमार चौधरीक नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["साहित्यिक विधा छोड़ि केवल वंशावली पढ़ब", "केवल जन्म-वर्षक अनुमान करब", "केवल नाम रटि छोड़ि देब", "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "प्रभास कुमार चौधरी केँ बुझबाक लेल आधुनिक मैथिली कथा-लेखन, कथा आ उपन्यास आ समकालीन जीवन, सामाजिक परिवेश आ कथा-भाषाक विकासमे योगदान देनिहार केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 329, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "प्रभास कुमार चौधरीक रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक रचना केवल खगोल-गणना पर सीमित अछि", "हुनक लेखन कथा आ उपन्यास मार्फत समकालीन कथात्मक यथार्थ केँ उभारैत अछि", "हुनक काजमे भाषा वा समाजक प्रश्न नै अछि", "हुनक लेखन केवल प्रशासनिक परिपत्र अछि"], "answer": "हुनक लेखन कथा आ उपन्यास मार्फत समकालीन कथात्मक यथार्थ केँ उभारैत अछि", "explanation": "प्रभास कुमार चौधरीक विधागत पहचान कथा आ उपन्यास अछि, आ ओहिसँ समकालीन कथात्मक यथार्थक बोध प्रबल होइत अछि।"}, {"id": 330, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "प्रभास कुमार चौधरीक योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल पृष्ठ-संख्या गिनबाक लेल", "केवल मुद्रकक नाम याद रखबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "केवल बाहरी भाषा सीखबाक लेल"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "प्रभास कुमार चौधरीक भूमिका आधुनिक कथा-गद्य परम्परा आ समकालीन कथात्मक यथार्थक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 331, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "प्रभास कुमार चौधरीक साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["अनुसंधान", "समकालीन कथात्मक यथार्थ", "भाषिक अनुशासन", "मौखिक परम्परा"], "answer": "समकालीन कथात्मक यथार्थ", "explanation": "एहि लेखक/कविक साहित्यिक स्वर समकालीन कथात्मक यथार्थसँ चिन्हित कएल जा सकैत अछि।"}, {"id": 332, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "प्रभास कुमार चौधरीक सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["प्रभास कुमार चौधरी — प्रेमशंकर सिंहक आलोचनात्मक योगदान", "प्रभास कुमार चौधरी — आधुनिक मैथिली कथा-लेखन", "प्रभास कुमार चौधरी — जीवकान्तक कवितात्मक योगदान", "प्रभास कुमार चौधरी — लोकसाहित्य-सम्बन्धी विमर्श"], "answer": "प्रभास कुमार चौधरी — आधुनिक मैथिली कथा-लेखन", "explanation": "ठीक जोड़ी प्रभास कुमार चौधरी — आधुनिक मैथिली कथा-लेखन अछि।"}, {"id": 333, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "प्रभास कुमार चौधरीक साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["मैथिलीक प्रयोगक पूर्ण अभाव", "केवल मौन अभिनय बिना भाषा", "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "भाषा-संवेदना सँ असम्बद्धता"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "प्रभास कुमार चौधरीक रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ कथा आ उपन्यासक माध्यमेँ बढ़बैत अछि।"}, {"id": 334, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "प्रभास कुमार चौधरी पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["समकालीन जीवन, सामाजिक परिवेश आ कथा-भाषाक विकासमे योगदान देनिहार", "केवल खेतीक माप-जोखक तालिका", "ग्राम्य परिवेश", "सामाजिक चेतना"], "answer": "समकालीन जीवन, सामाजिक परिवेश आ कथा-भाषाक विकासमे योगदान देनिहार", "explanation": "समकालीन जीवन, सामाजिक परिवेश आ कथा-भाषाक विकासमे योगदान देनिहार केँ छोड़ला सँ प्रभास कुमार चौधरीक मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 335, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "प्रभास कुमार चौधरीक अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["केवल नामक वर्णक्रमसँ", "केवल छपाईक आकार देखि", "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "केवल पुरस्कार-सूची पढ़ि"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "प्रभास कुमार चौधरीक योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 336, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "प्रभास कुमार चौधरीक साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["केवल गणितीय सूत्रक व्याख्या", "सामाजिक यथार्थ", "समकालीन कथात्मक यथार्थ", "रंगमंच"], "answer": "समकालीन कथात्मक यथार्थ", "explanation": "प्रभास कुमार चौधरीक छवि समकालीन कथात्मक यथार्थ केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 337, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "प्रभास कुमार चौधरीक प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["प्रशासन, सैनिक आदेश आ दफ्तर", "केवल अनुवाद, बिना मौलिकता आ बिना भाषा-चेतना", "कथा आ उपन्यास, समकालीन कथात्मक यथार्थ आ पात्रक मनोभूमि, सामाजिक यथार्थ आ संवादात्मक गद्य", "कर-सूची, नाप-जोख आ बाजार-भाव"], "answer": "कथा आ उपन्यास, समकालीन कथात्मक यथार्थ आ पात्रक मनोभूमि, सामाजिक यथार्थ आ संवादात्मक गद्य", "explanation": "एहि शब्द-समूहमे प्रभास कुमार चौधरीक विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 338, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "प्रभास कुमार चौधरीक रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["साहित्यिक विधा समाप्त भऽ गेल", "रचना-परम्परा टूटि गेल", "समकालीन कथात्मक यथार्थक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "भाषाक प्रयोग घटि गेल"], "answer": "समकालीन कथात्मक यथार्थक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "प्रभास कुमार चौधरीक काजसँ समकालीन कथात्मक यथार्थमे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 339, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "प्रभास कुमार चौधरीक योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["केवल रसायनिक सूत्रक प्रश्नमे", "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "केवल भूगोलक नक्शा बनाबयवला प्रश्नमे", "केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "प्रभास कुमार चौधरीक योगदान आधुनिक कथा-गद्य परम्परा आ कथा आ उपन्यासक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 340, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "प्रभास कुमार चौधरीक सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["प्रभास कुमार चौधरी आधुनिक कथा-गद्य परम्परामे कथा आ उपन्यास द्वारा समकालीन जीवन, सामाजिक परिवेश आ कथा-भाषाक विकासमे योगदान देनिहार", "प्रभास कुमार चौधरीक योगदान केवल व्यापारिक लेखामे सीमित रहल", "प्रभास कुमार चौधरीक मैथिली साहित्यसँ कोनो सम्बन्ध नहि", "प्रभास कुमार चौधरी केवल पञ्जी-लेखक छलाह, साहित्यिक योगदान नहि"], "answer": "प्रभास कुमार चौधरी आधुनिक कथा-गद्य परम्परामे कथा आ उपन्यास द्वारा समकालीन जीवन, सामाजिक परिवेश आ कथा-भाषाक विकासमे योगदान देनिहार", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 341, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "मायानन्द मिश्रक मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["आधुनिक मनुष्यक अकेलापन, देह-संवेदना, शहर-समाज आ विद्रोही चेतनाकेँ तीव्र रूप देनिहार", "इतिहास, समाज, संस्कृति आ पात्रक जटिलता केँ उपन्यासमे विस्तृत करनिहार", "महाभारत-प्रसंग केँ मैथिली महाकाव्यात्मक रूपमे प्रतिष्ठित करनिहार", "केवल राजकीय प्रशासनिक आदेशक संकलन"], "answer": "इतिहास, समाज, संस्कृति आ पात्रक जटिलता केँ उपन्यासमे विस्तृत करनिहार", "explanation": "मायानन्द मिश्रक अध्ययनमे मुख्य बात इतिहास, समाज, संस्कृति आ पात्रक जटिलता केँ उपन्यासमे विस्तृत करनिहार अछि; एहि कारण हुनका उपन्यासक व्यापकता सँ जोड़ल जाएत अछि।"}, {"id": 342, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "मायानन्द मिश्रक संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["मैथिली कथा-परम्परा", "केवल पञ्जी-सूची", "आधुनिक मैथिली उपन्यास-परम्परा", "मैथिली नारी-चेतनाक कथा-परम्परा"], "answer": "आधुनिक मैथिली उपन्यास-परम्परा", "explanation": "मायानन्द मिश्रक सन्दर्भमे आधुनिक मैथिली उपन्यास-परम्परा महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ उपन्यासक व्यापकता स्पष्ट होइत अछि।"}, {"id": 343, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "मायानन्द मिश्र केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["नाटक", "भाषा-अनुसंधान", "उपन्यास, कथा आ ऐतिहासिक-सामाजिक गद्य", "प्रबन्ध-काव्य"], "answer": "उपन्यास, कथा आ ऐतिहासिक-सामाजिक गद्य", "explanation": "उपन्यास, कथा आ ऐतिहासिक-सामाजिक गद्य मायानन्द मिश्रक रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 344, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "कालक्रमक दृष्टिसँ मायानन्द मिश्रक साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["समकालीन मैथिली साहित्य", "आधुनिक मैथिली नवजागरण", "नेपालक मध्यकालीन मैथिली नाटक", "आधुनिक कथा-उपन्यासक महत्त्वपूर्ण चरण"], "answer": "आधुनिक कथा-उपन्यासक महत्त्वपूर्ण चरण", "explanation": "मायानन्द मिश्रक योगदान आधुनिक कथा-उपन्यासक महत्त्वपूर्ण चरणक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 345, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "मायानन्द मिश्रक रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["सामाजिक चेतना", "राधा-कृष्ण भाव", "वृहत्तर कथानक, ऐतिहासिक चेतना, सामाजिक विस्तार आ मनोवैज्ञानिक गहराई", "केवल गणितीय सूत्रक व्याख्या"], "answer": "वृहत्तर कथानक, ऐतिहासिक चेतना, सामाजिक विस्तार आ मनोवैज्ञानिक गहराई", "explanation": "वृहत्तर कथानक, ऐतिहासिक चेतना, सामाजिक विस्तार आ मनोवैज्ञानिक गहराई मायानन्द मिश्रक साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 346, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "मायानन्द मिश्र पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["उपन्यासक व्यापकता", "जनपक्षधरता", "भाषा-संस्कार", "अनुसंधान"], "answer": "उपन्यासक व्यापकता", "explanation": "मायानन्द मिश्रक योगदानक सार उपन्यासक व्यापकता मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 347, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "मायानन्द मिश्रक योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका केवल गणना-पद्धति बनौल", "कारण हुनका माध्यमेँ उपन्यासक व्यापकता केँ बल भेटल", "कारण हुनका केवल राजकीय कर-सूची लिखल", "कारण हुनका केवल शिलालेख पढ़ल"], "answer": "कारण हुनका माध्यमेँ उपन्यासक व्यापकता केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे मायानन्द मिश्रक योगदान उपन्यासक व्यापकता केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 348, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "मायानन्द मिश्रक नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["केवल शहरक नाम खोजब", "साहित्यिक विधा छोड़ि केवल वंशावली पढ़ब", "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "केवल नाम रटि छोड़ि देब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "मायानन्द मिश्र केँ बुझबाक लेल आधुनिक मैथिली उपन्यास-परम्परा, उपन्यास, कथा आ ऐतिहासिक-सामाजिक गद्य आ इतिहास, समाज, संस्कृति आ पात्रक जटिलता केँ उपन्यासमे विस्तृत करनिहार केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 349, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "मायानन्द मिश्रक रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक लेखन उपन्यास, कथा आ ऐतिहासिक-सामाजिक गद्य मार्फत उपन्यासक व्यापकता केँ उभारैत अछि", "हुनक योगदान साहित्यिक इतिहाससँ असम्बद्ध अछि", "हुनक काजमे भाषा वा समाजक प्रश्न नै अछि", "हुनक रचना केवल खगोल-गणना पर सीमित अछि"], "answer": "हुनक लेखन उपन्यास, कथा आ ऐतिहासिक-सामाजिक गद्य मार्फत उपन्यासक व्यापकता केँ उभारैत अछि", "explanation": "मायानन्द मिश्रक विधागत पहचान उपन्यास, कथा आ ऐतिहासिक-सामाजिक गद्य अछि, आ ओहिसँ उपन्यासक व्यापकताक बोध प्रबल होइत अछि।"}, {"id": 350, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "मायानन्द मिश्रक योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल पृष्ठ-संख्या गिनबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "केवल मनोरंजनक नाम-सूची बनबाक लेल", "केवल मुद्रकक नाम याद रखबाक लेल"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "मायानन्द मिश्रक भूमिका आधुनिक कथा-उपन्यासक महत्त्वपूर्ण चरण आ उपन्यासक व्यापकताक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 351, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "मायानन्द मिश्रक साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["अनुसंधान", "रंगमंच", "उपन्यासक व्यापकता", "सामाजिक यथार्थ"], "answer": "उपन्यासक व्यापकता", "explanation": "एहि लेखक/कविक साहित्यिक स्वर उपन्यासक व्यापकतासँ चिन्हित कएल जा सकैत अछि।"}, {"id": 352, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "मायानन्द मिश्रक सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["मायानन्द मिश्र — आधुनिक मैथिली उपन्यास-परम्परा", "मायानन्द मिश्र — जीवकान्तक कवितात्मक योगदान", "मायानन्द मिश्र — आधुनिक नाट्य-परम्परा", "मायानन्द मिश्र — मैथिली मुक्तक-काव्य परम्परा"], "answer": "मायानन्द मिश्र — आधुनिक मैथिली उपन्यास-परम्परा", "explanation": "ठीक जोड़ी मायानन्द मिश्र — आधुनिक मैथिली उपन्यास-परम्परा अछि।"}, {"id": 353, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "मायानन्द मिश्रक साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["केवल मौन अभिनय बिना भाषा", "भाषा-संवेदना सँ असम्बद्धता", "मैथिलीक प्रयोगक पूर्ण अभाव", "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "मायानन्द मिश्रक रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ उपन्यास, कथा आ ऐतिहासिक-सामाजिक गद्यक माध्यमेँ बढ़बैत अछि।"}, {"id": 354, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "मायानन्द मिश्र पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["भाषिक अनुशासन", "इतिहास, समाज, संस्कृति आ पात्रक जटिलता केँ उपन्यासमे विस्तृत करनिहार", "ग्राम्य परिवेश", "सामाजिक चेतना"], "answer": "इतिहास, समाज, संस्कृति आ पात्रक जटिलता केँ उपन्यासमे विस्तृत करनिहार", "explanation": "इतिहास, समाज, संस्कृति आ पात्रक जटिलता केँ उपन्यासमे विस्तृत करनिहार केँ छोड़ला सँ मायानन्द मिश्रक मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 355, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "मायानन्द मिश्रक अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["केवल पृष्ठ-संख्याक आधार पर", "केवल पुरस्कार-सूची पढ़ि", "केवल छपाईक आकार देखि", "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "मायानन्द मिश्रक योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 356, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "मायानन्द मिश्रक साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["अनुसंधान", "केवल पञ्चाङ्गक गणना", "उपन्यासक व्यापकता", "केवल विदेशी यात्रावृत्तक अनुवाद"], "answer": "उपन्यासक व्यापकता", "explanation": "मायानन्द मिश्रक छवि उपन्यासक व्यापकता केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 357, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "मायानन्द मिश्रक प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["केवल अनुवाद, बिना मौलिकता आ बिना भाषा-चेतना", "खगोल-गणना, मौसम-तालिका आ नुस्खा", "कर-सूची, नाप-जोख आ बाजार-भाव", "उपन्यास, कथा आ ऐतिहासिक-सामाजिक गद्य, उपन्यासक व्यापकता आ वृहत्तर कथानक, ऐतिहासिक चेतना, सामाजिक विस्तार आ मनोवैज्ञानिक गहराई"], "answer": "उपन्यास, कथा आ ऐतिहासिक-सामाजिक गद्य, उपन्यासक व्यापकता आ वृहत्तर कथानक, ऐतिहासिक चेतना, सामाजिक विस्तार आ मनोवैज्ञानिक गहराई", "explanation": "एहि शब्द-समूहमे मायानन्द मिश्रक विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 358, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "मायानन्द मिश्रक रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["लोक-संवेदना पूर्णतः हटि गेल", "उपन्यासक व्यापकताक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "भाषाक प्रयोग घटि गेल", "साहित्यिक विधा समाप्त भऽ गेल"], "answer": "उपन्यासक व्यापकताक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "मायानन्द मिश्रक काजसँ उपन्यासक व्यापकतामे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 359, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "मायानन्द मिश्रक योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "केवल रसायनिक सूत्रक प्रश्नमे", "केवल भूगोलक नक्शा बनाबयवला प्रश्नमे", "केवल खेलक नियम याद करयवला प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "मायानन्द मिश्रक योगदान आधुनिक कथा-उपन्यासक महत्त्वपूर्ण चरण आ उपन्यास, कथा आ ऐतिहासिक-सामाजिक गद्यक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 360, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "मायानन्द मिश्रक सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["मायानन्द मिश्र केवल पञ्जी-लेखक छलाह, साहित्यिक योगदान नहि", "मायानन्द मिश्र आधुनिक कथा-उपन्यासक महत्त्वपूर्ण चरणमे उपन्यास, कथा आ ऐतिहासिक-सामाजिक गद्य द्वारा इतिहास, समाज, संस्कृति आ पात्रक जटिलता केँ उपन्यासमे विस्तृत करनिहार", "मायानन्द मिश्रक योगदान केवल व्यापारिक लेखामे सीमित रहल", "मायानन्द मिश्रक अध्ययनमे काल, विधा आ कृति अप्रासंगिक अछि"], "answer": "मायानन्द मिश्र आधुनिक कथा-उपन्यासक महत्त्वपूर्ण चरणमे उपन्यास, कथा आ ऐतिहासिक-सामाजिक गद्य द्वारा इतिहास, समाज, संस्कृति आ पात्रक जटिलता केँ उपन्यासमे विस्तृत करनिहार", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 361, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "रमानन्द रेणुक मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["समकालीन काव्य-चर्चा, कविता-संवेदना आ साहित्यिक संपादनक क्षेत्रमे योगदान", "ग्राम्य-संस्कृति, लोक-संसार आ सामाजिक परिवर्तनक कथा-स्वर केँ बल देनिहार", "रचनाक मूल्यांकन, मानदण्ड, साहित्यिक अनुशासन आ विवेचन-पद्धति केँ बल देनिहार", "समकालीन साहित्यक चयन, आलोचना, पाठकीय दिशा आ विधागत मूल्यांकनमे योगदान"], "answer": "ग्राम्य-संस्कृति, लोक-संसार आ सामाजिक परिवर्तनक कथा-स्वर केँ बल देनिहार", "explanation": "रमानन्द रेणुक अध्ययनमे मुख्य बात ग्राम्य-संस्कृति, लोक-संसार आ सामाजिक परिवर्तनक कथा-स्वर केँ बल देनिहार अछि; एहि कारण हुनका ग्राम्य कथात्मक चेतना सँ जोड़ल जाएत अछि।"}, {"id": 362, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "रमानन्द रेणुक संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["आरसीक काव्य-योगदान", "कुमार गंगानन्द सिंहक साहित्यिक योगदान", "चित्रा", "मैथिली कथा-परम्परा"], "answer": "मैथिली कथा-परम्परा", "explanation": "रमानन्द रेणुक सन्दर्भमे मैथिली कथा-परम्परा महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ ग्राम्य कथात्मक चेतना स्पष्ट होइत अछि।"}, {"id": 363, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "रमानन्द रेणु केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["गद्य-वर्णन", "नाटक", "कथा आ सामाजिक गद्य", "मुक्तक-काव्य"], "answer": "कथा आ सामाजिक गद्य", "explanation": "कथा आ सामाजिक गद्य रमानन्द रेणुक रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 364, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "कालक्रमक दृष्टिसँ रमानन्द रेणुक साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["आदिकाल/पूर्व-विद्यापति साहित्य", "नेपालक मध्यकालीन मैथिली नाटक", "मध्यकालीन मैथिली साहित्य", "आधुनिक कथा-साहित्य"], "answer": "आधुनिक कथा-साहित्य", "explanation": "रमानन्द रेणुक योगदान आधुनिक कथा-साहित्यक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 365, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "रमानन्द रेणुक रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["लोकानुभव, संबंध, सामाजिक परिवर्तन आ कथाभाषाक सहजता", "केवल खेतीक माप-जोखक तालिका", "पात्र-मनोविज्ञान", "केवल विदेशी यात्रावृत्तक अनुवाद"], "answer": "लोकानुभव, संबंध, सामाजिक परिवर्तन आ कथाभाषाक सहजता", "explanation": "लोकानुभव, संबंध, सामाजिक परिवर्तन आ कथाभाषाक सहजता रमानन्द रेणुक साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 366, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "रमानन्द रेणु पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["इतिहास-बोध", "ग्राम्य कथात्मक चेतना", "केवल तिथि-स्मरण", "शृङ्गार आ भक्ति"], "answer": "ग्राम्य कथात्मक चेतना", "explanation": "रमानन्द रेणुक योगदानक सार ग्राम्य कथात्मक चेतना मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 367, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "रमानन्द रेणुक योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका माध्यमेँ ग्राम्य कथात्मक चेतना केँ बल भेटल", "कारण हुनका केवल राजकीय कर-सूची लिखल", "कारण हुनका साहित्यसँ सम्बन्ध नहि छल", "कारण हुनका मंच, भाषा वा रचना-संवेदना सँ कोनो सम्बन्ध नहि छल"], "answer": "कारण हुनका माध्यमेँ ग्राम्य कथात्मक चेतना केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे रमानन्द रेणुक योगदान ग्राम्य कथात्मक चेतना केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 368, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "रमानन्द रेणुक नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "केवल नाम रटि छोड़ि देब", "केवल शहरक नाम खोजब", "केवल जन्म-वर्षक अनुमान करब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "रमानन्द रेणु केँ बुझबाक लेल मैथिली कथा-परम्परा, कथा आ सामाजिक गद्य आ ग्राम्य-संस्कृति, लोक-संसार आ सामाजिक परिवर्तनक कथा-स्वर केँ बल देनिहार केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 369, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "रमानन्द रेणुक रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक लेखन कथा आ सामाजिक गद्य मार्फत ग्राम्य कथात्मक चेतना केँ उभारैत अछि", "हुनक योगदान साहित्यिक इतिहाससँ असम्बद्ध अछि", "हुनक रचना केवल खगोल-गणना पर सीमित अछि", "हुनक लेखन केवल प्रशासनिक परिपत्र अछि"], "answer": "हुनक लेखन कथा आ सामाजिक गद्य मार्फत ग्राम्य कथात्मक चेतना केँ उभारैत अछि", "explanation": "रमानन्द रेणुक विधागत पहचान कथा आ सामाजिक गद्य अछि, आ ओहिसँ ग्राम्य कथात्मक चेतनाक बोध प्रबल होइत अछि।"}, {"id": 370, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "रमानन्द रेणुक योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल पृष्ठ-संख्या गिनबाक लेल", "केवल मुद्रकक नाम याद रखबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "केवल मनोरंजनक नाम-सूची बनबाक लेल"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "रमानन्द रेणुक भूमिका आधुनिक कथा-साहित्य आ ग्राम्य कथात्मक चेतनाक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 371, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "रमानन्द रेणुक साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["छन्द-सजगता", "रंगमंच", "आलोचना", "ग्राम्य कथात्मक चेतना"], "answer": "ग्राम्य कथात्मक चेतना", "explanation": "एहि लेखक/कविक साहित्यिक स्वर ग्राम्य कथात्मक चेतनासँ चिन्हित कएल जा सकैत अछि।"}, {"id": 372, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "रमानन्द रेणुक सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["रमानन्द रेणु — मैथिली कथा-परम्परा", "रमानन्द रेणु — मैथिली मुक्तक-काव्य परम्परा", "रमानन्द रेणु — कुमार गंगानन्द सिंहक साहित्यिक योगदान", "रमानन्द रेणु — रमेश्वरचरित मिथिला रामायण"], "answer": "रमानन्द रेणु — मैथिली कथा-परम्परा", "explanation": "ठीक जोड़ी रमानन्द रेणु — मैथिली कथा-परम्परा अछि।"}, {"id": 373, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "रमानन्द रेणुक साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["भाषा-संवेदना सँ असम्बद्धता", "केवल अंकीय संकेतक प्रयोग", "मैथिलीक प्रयोगक पूर्ण अभाव", "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "रमानन्द रेणुक रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ कथा आ सामाजिक गद्यक माध्यमेँ बढ़बैत अछि।"}, {"id": 374, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "रमानन्द रेणु पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["केवल खेतीक माप-जोखक तालिका", "ऐतिहासिक दृष्टि", "ग्राम्य-संस्कृति, लोक-संसार आ सामाजिक परिवर्तनक कथा-स्वर केँ बल देनिहार", "प्रतीकात्मकता"], "answer": "ग्राम्य-संस्कृति, लोक-संसार आ सामाजिक परिवर्तनक कथा-स्वर केँ बल देनिहार", "explanation": "ग्राम्य-संस्कृति, लोक-संसार आ सामाजिक परिवर्तनक कथा-स्वर केँ बल देनिहार केँ छोड़ला सँ रमानन्द रेणुक मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 375, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "रमानन्द रेणुक अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["केवल नामक वर्णक्रमसँ", "केवल छपाईक आकार देखि", "केवल पुरस्कार-सूची पढ़ि", "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "रमानन्द रेणुक योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 376, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "रमानन्द रेणुक साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["ग्राम्य कथात्मक चेतना", "केवल गणितीय सूत्रक व्याख्या", "केवल वैद्यकीय नुस्खाक संग्रह", "शृङ्गार आ भक्ति"], "answer": "ग्राम्य कथात्मक चेतना", "explanation": "रमानन्द रेणुक छवि ग्राम्य कथात्मक चेतना केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 377, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "रमानन्द रेणुक प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["कथा आ सामाजिक गद्य, ग्राम्य कथात्मक चेतना आ लोकानुभव, संबंध, सामाजिक परिवर्तन आ कथाभाषाक सहजता", "प्रशासन, सैनिक आदेश आ दफ्तर", "खगोल-गणना, मौसम-तालिका आ नुस्खा", "केवल अनुवाद, बिना मौलिकता आ बिना भाषा-चेतना"], "answer": "कथा आ सामाजिक गद्य, ग्राम्य कथात्मक चेतना आ लोकानुभव, संबंध, सामाजिक परिवर्तन आ कथाभाषाक सहजता", "explanation": "एहि शब्द-समूहमे रमानन्द रेणुक विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 378, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "रमानन्द रेणुक रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["भाषाक प्रयोग घटि गेल", "लोक-संवेदना पूर्णतः हटि गेल", "साहित्यिक विधा समाप्त भऽ गेल", "ग्राम्य कथात्मक चेतनाक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल"], "answer": "ग्राम्य कथात्मक चेतनाक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "रमानन्द रेणुक काजसँ ग्राम्य कथात्मक चेतनामे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 379, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "रमानन्द रेणुक योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "केवल रसायनिक सूत्रक प्रश्नमे", "केवल भूगोलक नक्शा बनाबयवला प्रश्नमे", "केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "रमानन्द रेणुक योगदान आधुनिक कथा-साहित्य आ कथा आ सामाजिक गद्यक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 380, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "रमानन्द रेणुक सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["रमानन्द रेणुक योगदान केवल व्यापारिक लेखामे सीमित रहल", "रमानन्द रेणुक मैथिली साहित्यसँ कोनो सम्बन्ध नहि", "रमानन्द रेणुक अध्ययनमे काल, विधा आ कृति अप्रासंगिक अछि", "रमानन्द रेणु आधुनिक कथा-साहित्यमे कथा आ सामाजिक गद्य द्वारा ग्राम्य-संस्कृति, लोक-संसार आ सामाजिक परिवर्तनक कथा-स्वर केँ बल देनिहार"], "answer": "रमानन्द रेणु आधुनिक कथा-साहित्यमे कथा आ सामाजिक गद्य द्वारा ग्राम्य-संस्कृति, लोक-संसार आ सामाजिक परिवर्तनक कथा-स्वर केँ बल देनिहार", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 381, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "विद्यानाथ झा ‘विदित’क मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["आधुनिक मैथिली साहित्यमे सामाजिक दृष्टि, कथात्मक अनुशासन आ भाषा-संस्कारक योगदान", "समकालीन यथार्थ, शहरी-बोध, आत्मसंघर्ष आ आधुनिक प्रतीक-विधान केँ स्वर देनिहार", "समकालीन काव्य-चर्चा, कविता-संवेदना आ साहित्यिक संपादनक क्षेत्रमे योगदान", "मैथिली साहित्यक काल-विभाजन, लेखक-परम्परा आ आलोचनात्मक अध्ययन केँ व्यवस्थित करनिहार"], "answer": "आधुनिक मैथिली साहित्यमे सामाजिक दृष्टि, कथात्मक अनुशासन आ भाषा-संस्कारक योगदान", "explanation": "विद्यानाथ झा ‘विदित’क अध्ययनमे मुख्य बात आधुनिक मैथिली साहित्यमे सामाजिक दृष्टि, कथात्मक अनुशासन आ भाषा-संस्कारक योगदान अछि; एहि कारण हुनका कथा आ विचारक समन्वय सँ जोड़ल जाएत अछि।"}, {"id": 382, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "विद्यानाथ झा ‘विदित’क संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["कीर्ति नारायण मिश्रक काव्य-योगदान", "मैथिली मुक्तक-काव्य परम्परा", "विदितक कथा-लेखन", "कृति राजकमल"], "answer": "विदितक कथा-लेखन", "explanation": "विद्यानाथ झा ‘विदित’क सन्दर्भमे विदितक कथा-लेखन महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ कथा आ विचारक समन्वय स्पष्ट होइत अछि।"}, {"id": 383, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "विद्यानाथ झा ‘विदित’ केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["प्रबन्ध-काव्य", "कथा, लेखन आ साहित्यिक विमर्श", "गीतिकाव्य", "भाषा-अनुसंधान"], "answer": "कथा, लेखन आ साहित्यिक विमर्श", "explanation": "कथा, लेखन आ साहित्यिक विमर्श विद्यानाथ झा ‘विदित’क रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 384, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "कालक्रमक दृष्टिसँ विद्यानाथ झा ‘विदित’क साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["नेपालक मध्यकालीन मैथिली नाटक", "आधुनिक कथा-समालोचना परिवेश", "आधुनिक समालोचना", "मध्यकालीन मैथिली साहित्य"], "answer": "आधुनिक कथा-समालोचना परिवेश", "explanation": "विद्यानाथ झा ‘विदित’क योगदान आधुनिक कथा-समालोचना परिवेशक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 385, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "विद्यानाथ झा ‘विदित’क रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["छन्द-सजगता", "पात्र-मनोविज्ञान", "संतुलित कथन, सामाजिक प्रसंग, नैतिक विवेक आ भाषा-शुद्धता", "केवल राजकीय प्रशासनिक आदेशक संकलन"], "answer": "संतुलित कथन, सामाजिक प्रसंग, नैतिक विवेक आ भाषा-शुद्धता", "explanation": "संतुलित कथन, सामाजिक प्रसंग, नैतिक विवेक आ भाषा-शुद्धता विद्यानाथ झा ‘विदित’क साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 386, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "विद्यानाथ झा ‘विदित’ पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["सामाजिक यथार्थ", "कथा आ विचारक समन्वय", "इतिहास-बोध", "जनपक्षधरता"], "answer": "कथा आ विचारक समन्वय", "explanation": "विद्यानाथ झा ‘विदित’क योगदानक सार कथा आ विचारक समन्वय मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 387, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "विद्यानाथ झा ‘विदित’क योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका साहित्यसँ सम्बन्ध नहि छल", "कारण हुनका केवल शिलालेख पढ़ल", "कारण हुनका केवल राजकीय कर-सूची लिखल", "कारण हुनका माध्यमेँ कथा आ विचारक समन्वय केँ बल भेटल"], "answer": "कारण हुनका माध्यमेँ कथा आ विचारक समन्वय केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे विद्यानाथ झा ‘विदित’क योगदान कथा आ विचारक समन्वय केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 388, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "विद्यानाथ झा ‘विदित’क नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["केवल जन्म-वर्षक अनुमान करब", "केवल नाम रटि छोड़ि देब", "केवल शहरक नाम खोजब", "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "विद्यानाथ झा ‘विदित’ केँ बुझबाक लेल विदितक कथा-लेखन, कथा, लेखन आ साहित्यिक विमर्श आ आधुनिक मैथिली साहित्यमे सामाजिक दृष्टि, कथात्मक अनुशासन आ भाषा-संस्कारक योगदान केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 389, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "विद्यानाथ झा ‘विदित’क रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक लेखन केवल प्रशासनिक परिपत्र अछि", "हुनक योगदान साहित्यिक इतिहाससँ असम्बद्ध अछि", "हुनक रचना केवल खगोल-गणना पर सीमित अछि", "हुनक लेखन कथा, लेखन आ साहित्यिक विमर्श मार्फत कथा आ विचारक समन्वय केँ उभारैत अछि"], "answer": "हुनक लेखन कथा, लेखन आ साहित्यिक विमर्श मार्फत कथा आ विचारक समन्वय केँ उभारैत अछि", "explanation": "विद्यानाथ झा ‘विदित’क विधागत पहचान कथा, लेखन आ साहित्यिक विमर्श अछि, आ ओहिसँ कथा आ विचारक समन्वयक बोध प्रबल होइत अछि।"}, {"id": 390, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "विद्यानाथ झा ‘विदित’क योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल मनोरंजनक नाम-सूची बनबाक लेल", "केवल बाहरी भाषा सीखबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "केवल मुद्रकक नाम याद रखबाक लेल"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "विद्यानाथ झा ‘विदित’क भूमिका आधुनिक कथा-समालोचना परिवेश आ कथा आ विचारक समन्वयक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 391, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "विद्यानाथ झा ‘विदित’क साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["भाषि पृष्ठ-संख्याक आधार पर", "केवल नामक वर्णक्रमसँ", "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "केवल छपाईक आकार देखि"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "विद्यानाथ झा ‘विदित’क योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 396, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "विद्यानाथ झा ‘विदित’क साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["स्त्री-अनुभव", "भाषा-संस्कार", "कथा आ विचारक समन्वय", "इतिहास-बोध"], "answer": "कथा आ विचारक समन्वय", "explanation": "विद्यानाथ झा ‘विदित’क छवि कथा आ विचारक समन्वय केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 397, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "विद्यानाथ झा ‘विदित’क प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["प्रशासन, सैनिक आदेश आ दफ्तर", "कर-सूची, नाप-जोख आ बाजार-भाव", "कथा, लेखन आ साहित्यिक विमर्श, कथा आ विचारक समन्वय आ संतुलित कथन, सामाजिक प्रसंग, नैतिक विवेक आ भाषा-शुद्धता", "केवल अनुवाद, बिना मौलिकता आ बिना भाषा-चेतना"], "answer": "कथा, लेखन आ साहित्यिक विमर्श, कथा आ विचारक समन्वय आ संतुलित कथन, सामाजिक प्रसंग, नैतिक विवेक आ भाषा-शुद्धता", "explanation": "एहि शब्द-समूहमे विद्यानाथ झा ‘विदित’क विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 398, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "विद्यानाथ झा ‘विदित’क रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["लोक-संवेदना पूर्णतः हटि गेल", "साहित्यिक विधा समाप्त भऽ गेल", "कथा आ विचारक समन्वयक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "रचना-परम्परा टूटि गेल"], "answer": "कथा आ विचारक समन्वयक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "विद्यानाथ झा ‘विदित’क काजसँ कथा आ विचारक समन्वयमे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 399, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "विद्यानाथ झा ‘विदित’क योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["केवल रसायनिक सूत्रक प्रश्नमे", "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे", "केवल भूगोलक नक्शा बनाबयवला प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "विद्यानाथ झा ‘विदित’क योगदान आधुनिक कथा-समालोचना परिवेश आ कथा, लेखन आ साहित्यिक विमर्शक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 400, "section": 4, "sectionTitle": "४. कथा-उपन्यासक सामाजिक, नारी आ ग्राम्य विस्तार", "q": "विद्यानाथ झा ‘विदित’क सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["विद्यानाथ झा ‘विदित’क अध्ययनमे काल, विधा आ कृति अप्रासंगिक अछि", "विद्यानाथ झा ‘विदित’ आधुनिक कथा-समालोचना परिवेशमे कथा, लेखन आ साहित्यिक विमर्श द्वारा आधुनिक मैथिली साहित्यमे सामाजिक दृष्टि, कथात्मक अनुशासन आ भाषा-संस्कारक योगदान", "विद्यानाथ झा ‘विदित’क मैथिली साहित्यसँ कोनो सम्बन्ध नहि", "विद्यानाथ झा ‘विदित’ केवल पञ्जी-लेखक छलाह, साहित्यिक योगदान नहि"], "answer": "विद्यानाथ झा ‘विदित’ आधुनिक कथा-समालोचना परिवेशमे कथा, लेखन आ साहित्यिक विमर्श द्वारा आधुनिक मैथिली साहित्यमे सामाजिक दृष्टि, कथात्मक अनुशासन आ भाषा-संस्कारक योगदान", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 401, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "काशीकान्त मिश्र ‘मधुप’क मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["मैथिली गद्यक प्राचीन आधार आ समाज-संस्कृतिक विस्तृत वर्णन", "मैथिली गीतक मधुरता, भाव-लालित्य आ भाषा-संस्कार केँ सुदृढ़ करनिहार", "मैथिली नाटकमे गीत, संवाद, भक्ति आ मंचीय परम्पराक विकाससँ जुड़ल नाम", "केवल खेतीक माप-जोखक तालिका"], "answer": "मैथिली गीतक मधुरता, भाव-लालित्य आ भाषा-संस्कार केँ सुदृढ़ करनिहार", "explanation": "काशीकान्त मिश्र ‘मधुप’क अध्ययनमे मुख्य बात मैथिली गीतक मधुरता, भाव-लालित्य आ भाषा-संस्कार केँ सुदृढ़ करनिहार अछि; एहि कारण हुनका गीतात्मक मधुरता सँ जोड़ल जाएत अछि।"}, {"id": 402, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "काशीकान्त मिश्र ‘मधुप’क संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["मधुपक गीतिकाव्य", "मैथिली मुक्तक-काव्य परम्परा", "दत्त-वती", "रमेश्वरचरित मिथिला रामायण"], "answer": "मधुपक गीतिकाव्य", "explanation": "काशीकान्त मिश्र ‘मधुप’क सन्दर्भमे मधुपक गीतिकाव्य महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ गीतात्मक मधुरता स्पष्ट होइत अछि।"}, {"id": 403, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "काशीकान्त मिश्र ‘मधुप’ केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["गीत, मुक्तक आ भावकाव्य", "मुक्तक-काव्य", "भाषा-अनुसंधान", "गद्य-वर्णन"], "answer": "गीत, मुक्तक आ भावकाव्य", "explanation": "गीत, मुक्तक आ भावकाव्य काशीकान्त मिश्र ‘मधुप’क रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 404, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "कालक्रमक दृष्टिसँ काशीकान्त मिश्र ‘मधुप’क साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["नेपालक मध्यकालीन मैथिली नाटक", "आधुनिक मैथिली नवजागरण", "समकालीन मैथिली साहित्य", "आधुनिक मुक्तक-काव्य"], "answer": "आधुनिक मुक्तक-काव्य", "explanation": "काशीकान्त मिश्र ‘मधुप’क योगदान आधुनिक मुक्तक-काव्यक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 405, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "काशीकान्त मिश्र ‘मधुप’क रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["मंचीय संवाद", "कोमल भाव, लयात्मकता, सौंदर्य-बोध आ छन्द-सजगता", "केवल गणितीय सूत्रक व्याख्या", "केवल व्यावसायिक हिसाब-किताबक पुस्तिका"], "answer": "कोमल भाव, लयात्मकता, सौंदर्य-बोध आ छन्द-सजगता", "explanation": "कोमल भाव, लयात्मकता, सौंदर्य-बोध आ छन्द-सजगता काशीकान्त मिश्र ‘मधुप’क साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 406, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "काशीकान्त मिश्र ‘मधुप’ पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["केवल तिथि-स्मरण", "गीतात्मक मधुरता", "गद्यक परिपक्वता", "अनुसंधान"], "answer": "गीतात्मक मधुरता", "explanation": "काशीकान्त मिश्र ‘मधुप’क योगदानक सार गीतात्मक मधुरता मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 407, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "काशीकान्त मिश्र ‘मधुप’क योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका माध्यमेँ गीतात्मक मधुरता केँ बल भेटल", "कारण हुनका केवल शिलालेख पढ़ल", "कारण हुनका मंच, भाषा वा रचना-संवेदना सँ कोनो सम्बन्ध नहि छल", "कारण हुनका केवल राजकीय कर-सूची लिखल"], "answer": "कारण हुनका माध्यमेँ गीतात्मक मधुरता केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे काशीकान्त मिश्र ‘मधुप’क योगदान गीतात्मक मधुरता केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 408, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "काशीकान्त मिश्र ‘मधुप’क नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["साहित्यिक विधा छोड़ि केवल वंशावली पढ़ब", "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "केवल शहरक नाम खोजब", "केवल जन्म-वर्षक अनुमान करब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "काशीकान्त मिश्र ‘मधुप’ केँ बुझबाक लेल मधुपक गीतिकाव्य, गीत, मुक्तक आ भावकाव्य आ मैथिली गीतक मधुरता, भाव-लालित्य आ भाषा-संस्कार केँ सुदृढ़ करनिहार केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 409, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "काशीकान्त मिश्र ‘मधुप’क रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक रचना केवल खगोल-गणना पर सीमित अछि", "हुनक काजमे भाषा वा समाजक प्रश्न नै अछि", "हुनक लेखन गीत, मुक्तक आ भावकाव्य मार्फत गीतात्मक मधुरता केँ उभारैत अछि", "हुनक लेखन केवल प्रशासनिक परिपत्र अछि"], "answer": "हुनक लेखन गीत, मुक्तक आ भावकाव्य मार्फत गीतात्मक मधुरता केँ उभारैत अछि", "explanation": "काशीकान्त मिश्र ‘मधुप’क विधागत पहचान गीत, मुक्तक आ भावकाव्य अछि, आ ओहिसँ गीतात्मक मधुरताक बोध प्रबल होइत अछि।"}, {"id": 410, "section": 5, "sectionTitle": "५. आधुनिक मुक्तक-काव्य आ गीतिकाव्यक कवि", "q": "काशीकान्त मिश्र ‘मधुप’क योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल पृष्ठ-संख्या
