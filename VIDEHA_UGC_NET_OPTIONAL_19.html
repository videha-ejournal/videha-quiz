ित्य, संस्कृति आ भाषा-चेतना केँ आधुनिक मैथिली लेखनमे जोड़निहार", "explanation": "साहित्य, संस्कृति आ भाषा-चेतना केँ आधुनिक मैथिली लेखनमे जोड़निहार केँ छोड़ला सँ कुमार गंगानन्द सिंहक मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 575, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कुमार गंगानन्द सिंहक अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["केवल पृष्ठ-संख्याक आधार पर", "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "केवल नामक वर्णक्रमसँ", "केवल पुरस्कार-सूची पढ़ि"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "कुमार गंगानन्द सिंहक योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 576, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कुमार गंगानन्द सिंहक साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["साहित्य-संस्कृति समन्वय", "आलोचना", "छन्द-विधान", "भाषा-संस्कार"], "answer": "साहित्य-संस्कृति समन्वय", "explanation": "कुमार गंगानन्द सिंहक छवि साहित्य-संस्कृति समन्वय केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 577, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कुमार गंगानन्द सिंहक प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["कर-सूची, नाप-जोख आ बाजार-भाव", "खगोल-गणना, मौसम-तालिका आ नुस्खा", "प्रशासन, सैनिक आदेश आ दफ्तर", "काव्य, गद्य आ सांस्कृतिक लेखन, साहित्य-संस्कृति समन्वय आ सांस्कृतिक गौरव, भाषिक सजगता आ साहित्यिक अनुशासन"], "answer": "काव्य, गद्य आ सांस्कृतिक लेखन, साहित्य-संस्कृति समन्वय आ सांस्कृतिक गौरव, भाषिक सजगता आ साहित्यिक अनुशासन", "explanation": "एहि शब्द-समूहमे कुमार गंगानन्द सिंहक विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 578, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कुमार गंगानन्द सिंहक रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["साहित्य-संस्कृति समन्वयक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "रचना-परम्परा टूटि गेल", "साहित्यिक विधा समाप्त भऽ गेल", "लोक-संवेदना पूर्णतः हटि गेल"], "answer": "साहित्य-संस्कृति समन्वयक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "कुमार गंगानन्द सिंहक काजसँ साहित्य-संस्कृति समन्वयमे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 579, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कुमार गंगानन्द सिंहक योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["केवल रसायनिक सूत्रक प्रश्नमे", "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "केवल खेलक नियम याद करयवला प्रश्नमे", "केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "कुमार गंगानन्द सिंहक योगदान आधुनिक मैथिली साहित्य आ काव्य, गद्य आ सांस्कृतिक लेखनक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 580, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कुमार गंगानन्द सिंहक सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["कुमार गंगानन्द सिंहक योगदान केवल व्यापारिक लेखामे सीमित रहल", "कुमार गंगानन्द सिंहक अध्ययनमे काल, विधा आ कृति अप्रासंगिक अछि", "कुमार गंगानन्द सिंहक मैथिली साहित्यसँ कोनो सम्बन्ध नहि", "कुमार गंगानन्द सिंह आधुनिक मैथिली साहित्यमे काव्य, गद्य आ सांस्कृतिक लेखन द्वारा साहित्य, संस्कृति आ भाषा-चेतना केँ आधुनिक मैथिली लेखनमे जोड़निहार"], "answer": "कुमार गंगानन्द सिंह आधुनिक मैथिली साहित्यमे काव्य, गद्य आ सांस्कृतिक लेखन द्वारा साहित्य, संस्कृति आ भाषा-चेतना केँ आधुनिक मैथिली लेखनमे जोड़निहार", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 581, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "दुर्गानाथ झा ‘श्रीश’क मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["लोकसाहित्य, साहित्यिक परम्परा, आलोचना आ शोध-पद्धति केँ जोड़निहार", "मिथिलाक इतिहास, समाज, संस्कृति आ साहित्यक अन्तरसम्बन्ध केँ स्पष्ट करनिहार", "मैथिली रंगमंचमे सामाजिक कथ्य, संवाद-शक्ति आ नाटकीय संरचनाक विस्तार देनिहार", "आधुनिक मैथिली अभिव्यक्ति, काव्य-स्वर आ सामाजिक संवेदनाक विकासमे योगदान"], "answer": "आधुनिक मैथिली अभिव्यक्ति, काव्य-स्वर आ सामाजिक संवेदनाक विकासमे योगदान", "explanation": "दुर्गानाथ झा ‘श्रीश’क अध्ययनमे मुख्य बात आधुनिक मैथिली अभिव्यक्ति, काव्य-स्वर आ सामाजिक संवेदनाक विकासमे योगदान अछि; एहि कारण हुनका आधुनिक संवेदनाक रचना सँ जोड़ल जाएत अछि।"}, {"id": 582, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "दुर्गानाथ झा ‘श्रीश’क संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["श्रीशक साहित्यिक योगदान", "रमेश्वरचरित मिथिला रामायण", "प्रेमशंकर सिंहक आलोचनात्मक योगदान", "अक्कूक नाट्य-योगदान"], "answer": "श्रीशक साहित्यिक योगदान", "explanation": "दुर्गानाथ झा ‘श्रीश’क सन्दर्भमे श्रीशक साहित्यिक योगदान महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ आधुनिक संवेदनाक रचना स्पष्ट होइत अछि।"}, {"id": 583, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "दुर्गानाथ झा ‘श्रीश’ केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["गीतिकाव्य", "व्यंग्य", "प्रबन्ध-काव्य", "कविता, गद्य आ साहित्यिक रचना"], "answer": "कविता, गद्य आ साहित्यिक रचना", "explanation": "कविता, गद्य आ साहित्यिक रचना दुर्गानाथ झा ‘श्रीश’क रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 584, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "कालक्रमक दृष्टिसँ दुर्गानाथ झा ‘श्रीश’क साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["समकालीन मैथिली साहित्य", "आधुनिक समालोचना", "आधुनिक मैथिली लेखन", "आदिकाल/पूर्व-विद्यापति साहित्य"], "answer": "आधुनिक मैथिली लेखन", "explanation": "दुर्गानाथ झा ‘श्रीश’क योगदान आधुनिक मैथिली लेखनक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 585, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "दुर्गानाथ झा ‘श्रीश’क रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["केवल खेतीक माप-जोखक तालिका", "समय-बोध, भाव-प्रवणता, सामाजिक दृष्टि आ भाषिक सजगता", "लोकभाषाक सहजता", "केवल व्यावसायिक हिसाब-किताबक पुस्तिका"], "answer": "समय-बोध, भाव-प्रवणता, सामाजिक दृष्टि आ भाषिक सजगता", "explanation": "समय-बोध, भाव-प्रवणता, सामाजिक दृष्टि आ भाषिक सजगता दुर्गानाथ झा ‘श्रीश’क साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 586, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "दुर्गानाथ झा ‘श्रीश’ पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["रंगमंच", "गद्यक परिपक्वता", "भाषा-संस्कार", "आधुनिक संवेदनाक रचना"], "answer": "आधुनिक संवेदनाक रचना", "explanation": "दुर्गानाथ झा ‘श्रीश’क योगदानक सार आधुनिक संवेदनाक रचना मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 587, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "दुर्गानाथ झा ‘श्रीश’क योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका माध्यमेँ आधुनिक संवेदनाक रचना केँ बल भेटल", "कारण हुनका केवल गणना-पद्धति बनौल", "कारण हुनका केवल शिलालेख पढ़ल", "कारण हुनका साहित्यसँ सम्बन्ध नहि छल"], "answer": "कारण हुनका माध्यमेँ आधुनिक संवेदनाक रचना केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे दुर्गानाथ झा ‘श्रीश’क योगदान आधुनिक संवेदनाक रचना केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 588, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "दुर्गानाथ झा ‘श्रीश’क नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["केवल जन्म-वर्षक अनुमान करब", "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "साहित्यिक विधा छोड़ि केवल वंशावली पढ़ब", "केवल शहरक नाम खोजब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "दुर्गानाथ झा ‘श्रीश’ केँ बुझबाक लेल श्रीशक साहित्यिक योगदान, कविता, गद्य आ साहित्यिक रचना आ आधुनिक मैथिली अभिव्यक्ति, काव्य-स्वर आ सामाजिक संवेदनाक विकासमे योगदान केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 589, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "दुर्गानाथ झा ‘श्रीश’क रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक रचना केवल खगोल-गणना पर सीमित अछि", "हुनक लेखन कविता, गद्य आ साहित्यिक रचना मार्फत आधुनिक संवेदनाक रचना केँ उभारैत अछि", "हुनक योगदान साहित्यिक इतिहाससँ असम्बद्ध अछि", "हुनक लेखन केवल प्रशासनिक परिपत्र अछि"], "answer": "हुनक लेखन कविता, गद्य आ साहित्यिक रचना मार्फत आधुनिक संवेदनाक रचना केँ उभारैत अछि", "explanation": "दुर्गानाथ झा ‘श्रीश’क विधागत पहचान कविता, गद्य आ साहित्यिक रचना अछि, आ ओहिसँ आधुनिक संवेदनाक रचनाक बोध प्रबल होइत अछि।"}, {"id": 590, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "दुर्गानाथ झा ‘श्रीश’क योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल पृष्ठ-संख्या गिनबाक लेल", "केवल मनोरंजनक नाम-सूची बनबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "केवल मुद्रकक नाम याद रखबाक लेल"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "दुर्गानाथ झा ‘श्रीश’क भूमिका आधुनिक मैथिली लेखन आ आधुनिक संवेदनाक रचनाक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 591, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "दुर्गानाथ झा ‘श्रीश’क साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["आलोचना", "आधुनिक संवेदनाक रचना", "शृङ्गार आ भक्ति", "अनुसंधान"], "answer": "आधुनिक संवेदनाक रचना", "explanation": "एहि लेखक/कविक साहित्यिक स्वर आधुनिक संवेदनाक रचनासँ चिन्हित कएल जा सकैत अछि।"}, {"id": 592, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "दुर्गानाथ झा ‘श्रीश’क सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["दुर्गानाथ झा ‘श्रीश’ — जीवकान्तक कवितात्मक योगदान", "दुर्गानाथ झा ‘श्रीश’ — कीचकवध", "दुर्गानाथ झा ‘श्रीश’ — श्रीशक साहित्यिक योगदान", "दुर्गानाथ झा ‘श्रीश’ — खट्टर ककाक तरंग"], "answer": "दुर्गानाथ झा ‘श्रीश’ — श्रीशक साहित्यिक योगदान", "explanation": "ठीक जोड़ी दुर्गानाथ झा ‘श्रीश’ — श्रीशक साहित्यिक योगदान अछि।"}, {"id": 593, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "दुर्गानाथ झा ‘श्रीश’क साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["भाषा-संवेदना सँ असम्बद्धता", "मैथिलीक प्रयोगक पूर्ण अभाव", "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "केवल मौन अभिनय बिना भाषा"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "दुर्गानाथ झा ‘श्रीश’क रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ कविता, गद्य आ साहित्यिक रचनाक माध्यमेँ बढ़बैत अछि।"}, {"id": 594, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "दुर्गानाथ झा ‘श्रीश’ पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["लोकभाषाक सहजता", "ऐतिहासिक दृष्टि", "आधुनिक मैथिली अभिव्यक्ति, काव्य-स्वर आ सामाजिक संवेदनाक विकासमे योगदान", "केवल राजकीय प्रशासनिक आदेशक संकलन"], "answer": "आधुनिक मैथिली अभिव्यक्ति, काव्य-स्वर आ सामाजिक संवेदनाक विकासमे योगदान", "explanation": "आधुनिक मैथिली अभिव्यक्ति, काव्य-स्वर आ सामाजिक संवेदनाक विकासमे योगदान केँ छोड़ला सँ दुर्गानाथ झा ‘श्रीश’क मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 595, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "दुर्गानाथ झा ‘श्रीश’क अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["केवल पृष्ठ-संख्याक आधार पर", "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "केवल पुरस्कार-सूची पढ़ि", "केवल छपाईक आकार देखि"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "दुर्गानाथ झा ‘श्रीश’क योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 596, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "दुर्गानाथ झा ‘श्रीश’क साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["केवल वैद्यकीय नुस्खाक संग्रह", "केवल विदेशी यात्रावृत्तक अनुवाद", "भाषा-संस्कार", "आधुनिक संवेदनाक रचना"], "answer": "आधुनिक संवेदनाक रचना", "explanation": "दुर्गानाथ झा ‘श्रीश’क छवि आधुनिक संवेदनाक रचना केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 597, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "दुर्गानाथ झा ‘श्रीश’क प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["प्रशासन, सैनिक आदेश आ दफ्तर", "कर-सूची, नाप-जोख आ बाजार-भाव", "खगोल-गणना, मौसम-तालिका आ नुस्खा", "कविता, गद्य आ साहित्यिक रचना, आधुनिक संवेदनाक रचना आ समय-बोध, भाव-प्रवणता, सामाजिक दृष्टि आ भाषिक सजगता"], "answer": "कविता, गद्य आ साहित्यिक रचना, आधुनिक संवेदनाक रचना आ समय-बोध, भाव-प्रवणता, सामाजिक दृष्टि आ भाषिक सजगता", "explanation": "एहि शब्द-समूहमे दुर्गानाथ झा ‘श्रीश’क विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 598, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "दुर्गानाथ झा ‘श्रीश’क रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["रचना-परम्परा टूटि गेल", "साहित्यिक विधा समाप्त भऽ गेल", "आधुनिक संवेदनाक रचनाक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "लोक-संवेदना पूर्णतः हटि गेल"], "answer": "आधुनिक संवेदनाक रचनाक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "दुर्गानाथ झा ‘श्रीश’क काजसँ आधुनिक संवेदनाक रचनामे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 599, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "दुर्गानाथ झा ‘श्रीश’क योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे", "केवल भूगोलक नक्शा बनाबयवला प्रश्नमे", "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "केवल रसायनिक सूत्रक प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "दुर्गानाथ झा ‘श्रीश’क योगदान आधुनिक मैथिली लेखन आ कविता, गद्य आ साहित्यिक रचनाक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 600, "section": 6, "sectionTitle": "६. मुक्तक, समकालीन कविता आ भाषा-संस्कारक कवि", "q": "दुर्गानाथ झा ‘श्रीश’क सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["दुर्गानाथ झा ‘श्रीश’क अध्ययनमे काल, विधा आ कृति अप्रासंगिक अछि", "दुर्गानाथ झा ‘श्रीश’ केवल पञ्जी-लेखक छलाह, साहित्यिक योगदान नहि", "दुर्गानाथ झा ‘श्रीश’क योगदान केवल व्यापारिक लेखामे सीमित रहल", "दुर्गानाथ झा ‘श्रीश’ आधुनिक मैथिली लेखनमे कविता, गद्य आ साहित्यिक रचना द्वारा आधुनिक मैथिली अभिव्यक्ति, काव्य-स्वर आ सामाजिक संवेदनाक विकासमे योगदान"], "answer": "दुर्गानाथ झा ‘श्रीश’ आधुनिक मैथिली लेखनमे कविता, गद्य आ साहित्यिक रचना द्वारा आधुनिक मैथिली अभिव्यक्ति, काव्य-स्वर आ सामाजिक संवेदनाक विकासमे योगदान", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 601, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "जगज्ज्योतिर्मल्लक मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["नेपाल दरबारमे मैथिली नाटकक संरक्षण, भाषा-प्रसार आ रंग-परम्परासँ जुड़ल प्रमुख नाम", "लोक-संवेदना, गीतात्मकता आ सरल मैथिली भाषाक काव्य-प्रवाह केँ बल देनिहार", "इतिहास, समाज, संस्कृति आ पात्रक जटिलता केँ उपन्यासमे विस्तृत करनिहार", "लोकसाहित्य, साहित्यिक परम्परा, आलोचना आ शोध-पद्धति केँ जोड़निहार"], "answer": "नेपाल दरबारमे मैथिली नाटकक संरक्षण, भाषा-प्रसार आ रंग-परम्परासँ जुड़ल प्रमुख नाम", "explanation": "जगज्ज्योतिर्मल्लक अध्ययनमे मुख्य बात नेपाल दरबारमे मैथिली नाटकक संरक्षण, भाषा-प्रसार आ रंग-परम्परासँ जुड़ल प्रमुख नाम अछि; एहि कारण हुनका नेपालक मैथिली नाट्य-धारा सँ जोड़ल जाएत अछि।"}, {"id": 602, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "जगज्ज्योतिर्मल्लक संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["नचिकेताक साहित्यिक योगदान", "नेपालक मैथिली नाट्य परम्परा", "विद्यापति पदावली", "श्रीशक साहित्यिक योगदान"], "answer": "नेपालक मैथिली नाट्य परम्परा", "explanation": "जगज्ज्योतिर्मल्लक सन्दर्भमे नेपालक मैथिली नाट्य परम्परा महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ नेपालक मैथिली नाट्य-धारा स्पष्ट होइत अछि।"}, {"id": 603, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "जगज्ज्योतिर्मल्ल केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["गीतिकाव्य", "दरबारी नाटक आ गीतिनाट्य", "नाटक", "मुक्तक-काव्य"], "answer": "दरबारी नाटक आ गीतिनाट्य", "explanation": "दरबारी नाटक आ गीतिनाट्य जगज्ज्योतिर्मल्लक रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 604, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "कालक्रमक दृष्टिसँ जगज्ज्योतिर्मल्लक साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["उत्तर-विद्यापति पदावली परम्परा", "आधुनिक समालोचना", "नेपालक मध्यकालीन मैथिली नाटक", "मध्यकालीन मैथिली साहित्य"], "answer": "नेपालक मध्यकालीन मैथिली नाटक", "explanation": "जगज्ज्योतिर्मल्लक योगदान नेपालक मध्यकालीन मैथिली नाटकक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 605, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "जगज्ज्योतिर्मल्लक रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["मंचीय संवाद", "केवल राजकीय प्रशासनिक आदेशक संकलन", "केवल व्यावसायिक हिसाब-किताबक पुस्तिका", "दरबारी मंच, गीत, संवाद, पाण्डुलिपि आ सांस्कृतिक आदान-प्रदान"], "answer": "दरबारी मंच, गीत, संवाद, पाण्डुलिपि आ सांस्कृतिक आदान-प्रदान", "explanation": "दरबारी मंच, गीत, संवाद, पाण्डुलिपि आ सांस्कृतिक आदान-प्रदान जगज्ज्योतिर्मल्लक साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 606, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "जगज्ज्योतिर्मल्ल पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["शृङ्गार आ भक्ति", "केवल मूल्य-सूची", "नेपालक मैथिली नाट्य-धारा", "आलोचना"], "answer": "नेपालक मैथिली नाट्य-धारा", "explanation": "जगज्ज्योतिर्मल्लक योगदानक सार नेपालक मैथिली नाट्य-धारा मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 607, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "जगज्ज्योतिर्मल्लक योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका माध्यमेँ नेपालक मैथिली नाट्य-धारा केँ बल भेटल", "कारण हुनका मंच, भाषा वा रचना-संवेदना सँ कोनो सम्बन्ध नहि छल", "कारण हुनका केवल राजकीय कर-सूची लिखल", "कारण हुनका केवल शिलालेख पढ़ल"], "answer": "कारण हुनका माध्यमेँ नेपालक मैथिली नाट्य-धारा केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे जगज्ज्योतिर्मल्लक योगदान नेपालक मैथिली नाट्य-धारा केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 608, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "जगज्ज्योतिर्मल्लक नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["साहित्यिक विधा छोड़ि केवल वंशावली पढ़ब", "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "केवल शहरक नाम खोजब", "केवल नाम रटि छोड़ि देब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "जगज्ज्योतिर्मल्ल केँ बुझबाक लेल नेपालक मैथिली नाट्य परम्परा, दरबारी नाटक आ गीतिनाट्य आ नेपाल दरबारमे मैथिली नाटकक संरक्षण, भाषा-प्रसार आ रंग-परम्परासँ जुड़ल प्रमुख नाम केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 609, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "जगज्ज्योतिर्मल्लक रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक लेखन दरबारी नाटक आ गीतिनाट्य मार्फत नेपालक मैथिली नाट्य-धारा केँ उभारैत अछि", "हुनक लेखन केवल प्रशासनिक परिपत्र अछि", "हुनक योगदान साहित्यिक इतिहाससँ असम्बद्ध अछि", "हुनक रचना केवल खगोल-गणना पर सीमित अछि"], "answer": "हुनक लेखन दरबारी नाटक आ गीतिनाट्य मार्फत नेपालक मैथिली नाट्य-धारा केँ उभारैत अछि", "explanation": "जगज्ज्योतिर्मल्लक विधागत पहचान दरबारी नाटक आ गीतिनाट्य अछि, आ ओहिसँ नेपालक मैथिली नाट्य-धाराक बोध प्रबल होइत अछि।"}, {"id": 610, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "जगज्ज्योतिर्मल्लक योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल मुद्रकक नाम याद रखबाक लेल", "केवल मनोरंजनक नाम-सूची बनबाक लेल", "केवल बाहरी भाषा सीखबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "जगज्ज्योतिर्मल्लक भूमिका नेपालक मध्यकालीन मैथिली नाटक आ नेपालक मैथिली नाट्य-धाराक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 611, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "जगज्ज्योतिर्मल्लक साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["प्रतीकात्मकता", "ग्राम्य परिवेश", "लोकभाषाक सहजता", "नेपालक मैथिली नाट्य-धारा"], "answer": "नेपालक मैथिली नाट्य-धारा", "explanation": "एहि लेखक/कविक साहित्यिक स्वर नेपालक मैथिली नाट्य-धारासँ चिन्हित कएल जा सकैत अछि।"}, {"id": 612, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "जगज्ज्योतिर्मल्लक सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["जगज्ज्योतिर्मल्ल — अंकिया नाट परम्परा", "जगज्ज्योतिर्मल्ल — दत्त-वती", "जगज्ज्योतिर्मल्ल — नेपालक मैथिली नाट्य परम्परा", "जगज्ज्योतिर्मल्ल — मधुपक गीतिकाव्य"], "answer": "जगज्ज्योतिर्मल्ल — नेपालक मैथिली नाट्य परम्परा", "explanation": "ठीक जोड़ी जगज्ज्योतिर्मल्ल — नेपालक मैथिली नाट्य परम्परा अछि।"}, {"id": 613, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "जगज्ज्योतिर्मल्लक साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["केवल अंकीय संकेतक प्रयोग", "केवल मौन अभिनय बिना भाषा", "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "भाषा-संवेदना सँ असम्बद्धता"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "जगज्ज्योतिर्मल्लक रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ दरबारी नाटक आ गीतिनाट्यक माध्यमेँ बढ़बैत अछि।"}, {"id": 614, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "जगज्ज्योतिर्मल्ल पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["नेपाल दरबारमे मैथिली नाटकक संरक्षण, भाषा-प्रसार आ रंग-परम्परासँ जुड़ल प्रमुख नाम", "छन्द-सजगता", "राधा-कृष्ण भाव", "लोकभाषाक सहजता"], "answer": "नेपाल दरबारमे मैथिली नाटकक संरक्षण, भाषा-प्रसार आ रंग-परम्परासँ जुड़ल प्रमुख नाम", "explanation": "नेपाल दरबारमे मैथिली नाटकक संरक्षण, भाषा-प्रसार आ रंग-परम्परासँ जुड़ल प्रमुख नाम केँ छोड़ला सँ जगज्ज्योतिर्मल्लक मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 615, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "जगज्ज्योतिर्मल्लक अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "केवल छपाईक आकार देखि", "केवल पुरस्कार-सूची पढ़ि", "केवल नामक वर्णक्रमसँ"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "जगज्ज्योतिर्मल्लक योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 616, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "जगज्ज्योतिर्मल्लक साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["नेपालक मैथिली नाट्य-धारा", "केवल व्यावसायिक हिसाब-किताबक पुस्तिका", "केवल राजकीय प्रशासनिक आदेशक संकलन", "केवल विदेशी यात्रावृत्तक अनुवाद"], "answer": "नेपालक मैथिली नाट्य-धारा", "explanation": "जगज्ज्योतिर्मल्लक छवि नेपालक मैथिली नाट्य-धारा केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 617, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "जगज्ज्योतिर्मल्लक प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["प्रशासन, सैनिक आदेश आ दफ्तर", "केवल अनुवाद, बिना मौलिकता आ बिना भाषा-चेतना", "दरबारी नाटक आ गीतिनाट्य, नेपालक मैथिली नाट्य-धारा आ दरबारी मंच, गीत, संवाद, पाण्डुलिपि आ सांस्कृतिक आदान-प्रदान", "खगोल-गणना, मौसम-तालिका आ नुस्खा"], "answer": "दरबारी नाटक आ गीतिनाट्य, नेपालक मैथिली नाट्य-धारा आ दरबारी मंच, गीत, संवाद, पाण्डुलिपि आ सांस्कृतिक आदान-प्रदान", "explanation": "एहि शब्द-समूहमे जगज्ज्योतिर्मल्लक विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 618, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "जगज्ज्योतिर्मल्लक रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["नेपालक मैथिली नाट्य-धाराक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "लोक-संवेदना पूर्णतः हटि गेल", "भाषाक प्रयोग घटि गेल", "साहित्यिक विधा समाप्त भऽ गेल"], "answer": "नेपालक मैथिली नाट्य-धाराक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "जगज्ज्योतिर्मल्लक काजसँ नेपालक मैथिली नाट्य-धारामे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 619, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "जगज्ज्योतिर्मल्लक योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "केवल भूगोलक नक्शा बनाबयवला प्रश्नमे", "केवल रसायनिक सूत्रक प्रश्नमे", "केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "जगज्ज्योतिर्मल्लक योगदान नेपालक मध्यकालीन मैथिली नाटक आ दरबारी नाटक आ गीतिनाट्यक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 620, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "जगज्ज्योतिर्मल्लक सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["जगज्ज्योतिर्मल्ल नेपालक मध्यकालीन मैथिली नाटकमे दरबारी नाटक आ गीतिनाट्य द्वारा नेपाल दरबारमे मैथिली नाटकक संरक्षण, भाषा-प्रसार आ रंग-परम्परासँ जुड़ल प्रमुख नाम", "जगज्ज्योतिर्मल्लक मैथिली साहित्यसँ कोनो सम्बन्ध नहि", "जगज्ज्योतिर्मल्लक अध्ययनमे काल, विधा आ कृति अप्रासंगिक अछि", "जगज्ज्योतिर्मल्लक योगदान केवल व्यापारिक लेखामे सीमित रहल"], "answer": "जगज्ज्योतिर्मल्ल नेपालक मध्यकालीन मैथिली नाटकमे दरबारी नाटक आ गीतिनाट्य द्वारा नेपाल दरबारमे मैथिली नाटकक संरक्षण, भाषा-प्रसार आ रंग-परम्परासँ जुड़ल प्रमुख नाम", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 621, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "शंकरदेवक मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["साहित्यक पाठ, इतिहास, समाज आ शैलीक समन्वित मूल्यांकनमे योगदान", "कृष्णकथाक मैथिली प्रबन्ध-काव्य रूप केँ प्रतिष्ठित करनिहार", "समकालीन रंगमंचमे नवीन विषय, युवा-चेतना, अभिनययोग्य संवाद आ प्रयोगशीलता केँ बल देनिहार", "असमक भक्ति-नाट्य परम्परा, संगीत, अभिनय आ धर्म-प्रसारक नाट्यरूपसँ जुड़ल महत्त्वपूर्ण नाम"], "answer": "असमक भक्ति-नाट्य परम्परा, संगीत, अभिनय आ धर्म-प्रसारक नाट्यरूपसँ जुड़ल महत्त्वपूर्ण नाम", "explanation": "शंकरदेवक अध्ययनमे मुख्य बात असमक भक्ति-नाट्य परम्परा, संगीत, अभिनय आ धर्म-प्रसारक नाट्यरूपसँ जुड़ल महत्त्वपूर्ण नाम अछि; एहि कारण हुनका अंकिया नाट आ भक्ति-रंग सँ जोड़ल जाएत अछि।"}, {"id": 622, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "शंकरदेवक संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["आरसीक काव्य-योगदान", "अंकिया नाट परम्परा", "मोहनक मुक्तक-काव्य", "खट्टर ककाक तरंग"], "answer": "अंकिया नाट परम्परा", "explanation": "शंकरदेवक सन्दर्भमे अंकिया नाट परम्परा महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ अंकिया नाट आ भक्ति-रंग स्पष्ट होइत अछि।"}, {"id": 623, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "शंकरदेव केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["अंकिया नाट आ भाओना", "मुक्तक-काव्य", "गीतिकाव्य", "नाटक"], "answer": "अंकिया नाट आ भाओना", "explanation": "अंकिया नाट आ भाओना शंकरदेवक रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 624, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "कालक्रमक दृष्टिसँ शंकरदेवक साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["नेपालक मध्यकालीन मैथिली नाटक", "आधुनिक समालोचना", "मध्यकालीन मैथिली साहित्य", "असमक मध्यकालीन नाट्य-भक्ति परम्परा"], "answer": "असमक मध्यकालीन नाट्य-भक्ति परम्परा", "explanation": "शंकरदेवक योगदान असमक मध्यकालीन नाट्य-भक्ति परम्पराक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 625, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "शंकरदेवक रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["केवल विदेशी यात्रावृत्तक अनुवाद", "केवल शिलालेखक तिथि-सूची", "केवल पञ्चाङ्गक गणना", "भक्ति, सामुदायिक प्रस्तुति, संगीत, मुखौटा आ रंग-व्यवस्था"], "answer": "भक्ति, सामुदायिक प्रस्तुति, संगीत, मुखौटा आ रंग-व्यवस्था", "explanation": "भक्ति, सामुदायिक प्रस्तुति, संगीत, मुखौटा आ रंग-व्यवस्था शंकरदेवक साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 626, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "शंकरदेव पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["छन्द-विधान", "अंकिया नाट आ भक्ति-रंग", "गद्यक परिपक्वता", "केवल तिथि-स्मरण"], "answer": "अंकिया नाट आ भक्ति-रंग", "explanation": "शंकरदेवक योगदानक सार अंकिया नाट आ भक्ति-रंग मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 627, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "शंकरदेवक योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका साहित्यसँ सम्बन्ध नहि छल", "कारण हुनका माध्यमेँ अंकिया नाट आ भक्ति-रंग केँ बल भेटल", "कारण हुनका केवल राजकीय कर-सूची लिखल", "कारण हुनका केवल शिलालेख पढ़ल"], "answer": "कारण हुनका माध्यमेँ अंकिया नाट आ भक्ति-रंग केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे शंकरदेवक योगदान अंकिया नाट आ भक्ति-रंग केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 628, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "शंकरदेवक नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["केवल जन्म-वर्षक अनुमान करब", "साहित्यिक विधा छोड़ि केवल वंशावली पढ़ब", "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "केवल नाम रटि छोड़ि देब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "शंकरदेव केँ बुझबाक लेल अंकिया नाट परम्परा, अंकिया नाट आ भाओना आ असमक भक्ति-नाट्य परम्परा, संगीत, अभिनय आ धर्म-प्रसारक नाट्यरूपसँ जुड़ल महत्त्वपूर्ण नाम केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 629, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "शंकरदेवक रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक लेखन अंकिया नाट आ भाओना मार्फत अंकिया नाट आ भक्ति-रंग केँ उभारैत अछि", "हुनक लेखन केवल प्रशासनिक परिपत्र अछि", "हुनक रचना केवल खगोल-गणना पर सीमित अछि", "हुनक काजमे भाषा वा समाजक प्रश्न नै अछि"], "answer": "हुनक लेखन अंकिया नाट आ भाओना मार्फत अंकिया नाट आ भक्ति-रंग केँ उभारैत अछि", "explanation": "शंकरदेवक विधागत पहचान अंकिया नाट आ भाओना अछि, आ ओहिसँ अंकिया नाट आ भक्ति-रंगक बोध प्रबल होइत अछि।"}, {"id": 630, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "शंकरदेवक योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "केवल मनोरंजनक नाम-सूची बनबाक लेल", "केवल पृष्ठ-संख्या गिनबाक लेल", "केवल मुद्रकक नाम याद रखबाक लेल"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "शंकरदेवक भूमिका असमक मध्यकालीन नाट्य-भक्ति परम्परा आ अंकिया नाट आ भक्ति-रंगक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 631, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "शंकरदेवक साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["इतिहास-बोध", "मंचीय संवाद", "छन्द-विधान", "अंकिया नाट आ भक्ति-रंग"], "answer": "अंकिया नाट आ भक्ति-रंग", "explanation": "एहि लेखक/कविक साहित्यिक स्वर अंकिया नाट आ भक्ति-रंगसँ चिन्हित कएल जा सकैत अछि।"}, {"id": 632, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "शंकरदेवक सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["शंकरदेव — मैथिली नारी-चेतनाक कथा-परम्परा", "शंकरदेव — मिथिला इतिहास-संस्कृति अध्ययन", "शंकरदेव — रमणक आलोचनात्मक लेखन", "शंकरदेव — अंकिया नाट परम्परा"], "answer": "शंकरदेव — अंकिया नाट परम्परा", "explanation": "ठीक जोड़ी शंकरदेव — अंकिया नाट परम्परा अछि।"}, {"id": 633, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "शंकरदेवक साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "केवल मौन अभिनय बिना भाषा", "केवल अंकीय संकेतक प्रयोग", "मैथिलीक प्रयोगक पूर्ण अभाव"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "शंकरदेवक रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ अंकिया नाट आ भाओनाक माध्यमेँ बढ़बैत अछि।"}, {"id": 634, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "शंकरदेव पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["केवल राजकीय प्रशासनिक आदेशक संकलन", "केवल पञ्चाङ्गक गणना", "लोकभाषाक सहजता", "असमक भक्ति-नाट्य परम्परा, संगीत, अभिनय आ धर्म-प्रसारक नाट्यरूपसँ जुड़ल महत्त्वपूर्ण नाम"], "answer": "असमक भक्ति-नाट्य परम्परा, संगीत, अभिनय आ धर्म-प्रसारक नाट्यरूपसँ जुड़ल महत्त्वपूर्ण नाम", "explanation": "असमक भक्ति-नाट्य परम्परा, संगीत, अभिनय आ धर्म-प्रसारक नाट्यरूपसँ जुड़ल महत्त्वपूर्ण नाम केँ छोड़ला सँ शंकरदेवक मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 635, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "शंकरदेवक अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["केवल पृष्ठ-संख्याक आधार पर", "केवल पुरस्कार-सूची पढ़ि", "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "केवल छपाईक आकार देखि"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "शंकरदेवक योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 636, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "शंकरदेवक साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["सामाजिक यथार्थ", "केवल गणितीय सूत्रक व्याख्या", "केवल विदेशी यात्रावृत्तक अनुवाद", "अंकिया नाट आ भक्ति-रंग"], "answer": "अंकिया नाट आ भक्ति-रंग", "explanation": "शंकरदेवक छवि अंकिया नाट आ भक्ति-रंग केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 637, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "शंकरदेवक प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["अंकिया नाट आ भाओना, अंकिया नाट आ भक्ति-रंग आ भक्ति, सामुदायिक प्रस्तुति, संगीत, मुखौटा आ रंग-व्यवस्था", "केवल अनुवाद, बिना मौलिकता आ बिना भाषा-चेतना", "खगोल-गणना, मौसम-तालिका आ नुस्खा", "कर-सूची, नाप-जोख आ बाजार-भाव"], "answer": "अंकिया नाट आ भाओना, अंकिया नाट आ भक्ति-रंग आ भक्ति, सामुदायिक प्रस्तुति, संगीत, मुखौटा आ रंग-व्यवस्था", "explanation": "एहि शब्द-समूहमे शंकरदेवक विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 638, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "शंकरदेवक रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["भाषाक प्रयोग घटि गेल", "रचना-परम्परा टूटि गेल", "अंकिया नाट आ भक्ति-रंगक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "साहित्यिक विधा समाप्त भऽ गेल"], "answer": "अंकिया नाट आ भक्ति-रंगक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "शंकरदेवक काजसँ अंकिया नाट आ भक्ति-रंगमे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 639, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "शंकरदेवक योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["केवल खेलक नियम याद करयवला प्रश्नमे", "केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे", "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "केवल रसायनिक सूत्रक प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "शंकरदेवक योगदान असमक मध्यकालीन नाट्य-भक्ति परम्परा आ अंकिया नाट आ भाओनाक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 640, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "शंकरदेवक सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["शंकरदेवक मैथिली साहित्यसँ कोनो सम्बन्ध नहि", "शंकरदेव असमक मध्यकालीन नाट्य-भक्ति परम्परामे अंकिया नाट आ भाओना द्वारा असमक भक्ति-नाट्य परम्परा, संगीत, अभिनय आ धर्म-प्रसारक नाट्यरूपसँ जुड़ल महत्त्वपूर्ण नाम", "शंकरदेवक अध्ययनमे काल, विधा आ कृति अप्रासंगिक अछि", "शंकरदेव केवल पञ्जी-लेखक छलाह, साहित्यिक योगदान नहि"], "answer": "शंकरदेव असमक मध्यकालीन नाट्य-भक्ति परम्परामे अंकिया नाट आ भाओना द्वारा असमक भक्ति-नाट्य परम्परा, संगीत, अभिनय आ धर्म-प्रसारक नाट्यरूपसँ जुड़ल महत्त्वपूर्ण नाम", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 641, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "ईशनाथ झाक मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["मैथिली रंगमंचमे सामाजिक विषय, पात्र-संरचना आ नाटकीय संवादक विकासमे योगदान", "मैथिली साहित्यक आधुनिक मूल्यांकन, विचार-पक्ष आ आलोचना-भाषा केँ सुदृढ़ करनिहार", "इतिहास, समाज, संस्कृति आ पात्रक जटिलता केँ उपन्यासमे विस्तृत करनिहार", "लोकजीवन, जन-संघर्ष, प्रकृति, व्यंग्य आ प्रगतिशील चेतनाकेँ मैथिलीमे प्रखर करनिहार"], "answer": "मैथिली रंगमंचमे सामाजिक विषय, पात्र-संरचना आ नाटकीय संवादक विकासमे योगदान", "explanation": "ईशनाथ झाक अध्ययनमे मुख्य बात मैथिली रंगमंचमे सामाजिक विषय, पात्र-संरचना आ नाटकीय संवादक विकासमे योगदान अछि; एहि कारण हुनका आधुनिक मैथिली नाटक सँ जोड़ल जाएत अछि।"}, {"id": 642, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "ईशनाथ झाक संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["मैथिली साहित्यक इतिहास लेखन", "आधुनिक मैथिली उपन्यास-परम्परा", "आधुनिक नाट्य-परम्परा", "मैथिली साहित्यक इतिहास-विमर्श"], "answer": "आधुनिक नाट्य-परम्परा", "explanation": "ईशनाथ झाक सन्दर्भमे आधुनिक नाट्य-परम्परा महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ आधुनिक मैथिली नाटक स्पष्ट होइत अछि।"}, {"id": 643, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "ईशनाथ झा केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["व्यंग्य", "नाटक आ रंगमंचीय लेखन", "लोकसाहित्य", "प्रबन्ध-काव्य"], "answer": "नाटक आ रंगमंचीय लेखन", "explanation": "नाटक आ रंगमंचीय लेखन ईशनाथ झाक रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 644, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "कालक्रमक दृष्टिसँ ईशनाथ झाक साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["नेपालक मध्यकालीन मैथिली नाटक", "आधुनिक मैथिली नाटक", "उत्तर-विद्यापति पदावली परम्परा", "मध्यकालीन मैथिली साहित्य"], "answer": "आधुनिक मैथिली नाटक", "explanation": "ईशनाथ झाक योगदान आधुनिक मैथिली नाटकक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 645, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "ईशनाथ झाक रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["केवल वैद्यकीय नुस्खाक संग्रह", "ग्राम्य परिवेश", "मंचीय संवाद, सामाजिक कथ्य, पात्र-संघर्ष आ दृश्य-संरचना", "भाषिक अनुशासन"], "answer": "मंचीय संवाद, सामाजिक कथ्य, पात्र-संघर्ष आ दृश्य-संरचना", "explanation": "मंचीय संवाद, सामाजिक कथ्य, पात्र-संघर्ष आ दृश्य-संरचना ईशनाथ झाक साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 646, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "ईशनाथ झा पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["रंगमंच", "इतिहास-बोध", "शृङ्गार आ भक्ति", "आधुनिक मैथिली नाटक"], "answer": "आधुनिक मैथिली नाटक", "explanation": "ईशनाथ झाक योगदानक सार आधुनिक मैथिली नाटक मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 647, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "ईशनाथ झाक योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका केवल राजकीय कर-सूची लिखल", "कारण हुनका साहित्यसँ सम्बन्ध नहि छल", "कारण हुनका माध्यमेँ आधुनिक मैथिली नाटक केँ बल भेटल", "कारण हुनका मंच, भाषा वा रचना-संवेदना सँ कोनो सम्बन्ध नहि छल"], "answer": "कारण हुनका माध्यमेँ आधुनिक मैथिली नाटक केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे ईशनाथ झाक योगदान आधुनिक मैथिली नाटक केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 648, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "ईशनाथ झाक नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["केवल शहरक नाम खोजब", "केवल जन्म-वर्षक अनुमान करब", "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "केवल नाम रटि छोड़ि देब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "ईशनाथ झा केँ बुझबाक लेल आधुनिक नाट्य-परम्परा, नाटक आ रंगमंचीय लेखन आ मैथिली रंगमंचमे सामाजिक विषय, पात्र-संरचना आ नाटकीय संवादक विकासमे योगदान केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 649, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "ईशनाथ झाक रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक काजमे भाषा वा समाजक प्रश्न नै अछि", "हुनक लेखन नाटक आ रंगमंचीय लेखन मार्फत आधुनिक मैथिली नाटक केँ उभारैत अछि", "हुनक योगदान साहित्यिक इतिहाससँ असम्बद्ध अछि", "हुनक लेखन केवल प्रशासनिक परिपत्र अछि"], "answer": "हुनक लेखन नाटक आ रंगमंचीय लेखन मार्फत आधुनिक मैथिली नाटक केँ उभारैत अछि", "explanation": "ईशनाथ झाक विधागत पहचान नाटक आ रंगमंचीय लेखन अछि, आ ओहिसँ आधुनिक मैथिली नाटकक बोध प्रबल होइत अछि।"}, {"id": 650, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "ईशनाथ झाक योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल मुद्रकक नाम याद रखबाक लेल", "केवल मनोरंजनक नाम-सूची बनबाक लेल", "केवल बाहरी भाषा सीखबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "ईशनाथ झाक भूमिका आधुनिक मैथिली नाटक आ आधुनिक मैथिली नाटकक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 651, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "ईशनाथ झाक साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["आधुनिक मैथिली नाटक", "भाषिक अनुशासन", "मंचीय संवाद", "भाषा-संस्कार"], "answer": "आधुनिक मैथिली नाटक", "explanation": "एहि लेखक/कविक साहित्यिक स्वर आधुनिक मैथिली नाटकसँ चिन्हित कएल जा सकैत अछि।"}, {"id": 652, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "ईशनाथ झाक सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["ईशनाथ झा — आधुनिक नाट्य-परम्परा", "ईशनाथ झा — मैथिली साहित्यक इतिहास-विमर्श", "ईशनाथ झा — लोरिक-विजय", "ईशनाथ झा — मैथिली नारी-चेतनाक कथा-परम्परा"], "answer": "ईशनाथ झा — आधुनिक नाट्य-परम्परा", "explanation": "ठीक जोड़ी ईशनाथ झा — आधुनिक नाट्य-परम्परा अछि।"}, {"id": 653, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "ईशनाथ झाक साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["केवल अंकीय संकेतक प्रयोग", "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "केवल मौन अभिनय बिना भाषा", "मैथिलीक प्रयोगक पूर्ण अभाव"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "ईशनाथ झाक रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ नाटक आ रंगमंचीय लेखनक माध्यमेँ बढ़बैत अछि।"}, {"id": 654, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "ईशनाथ झा पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["केवल राजकीय प्रशासनिक आदेशक संकलन", "मैथिली रंगमंचमे सामाजिक विषय, पात्र-संरचना आ नाटकीय संवादक विकासमे योगदान", "केवल गणितीय सूत्रक व्याख्या", "प्रतीकात्मकता"], "answer": "मैथिली रंगमंचमे सामाजिक विषय, पात्र-संरचना आ नाटकीय संवादक विकासमे योगदान", "explanation": "मैथिली रंगमंचमे सामाजिक विषय, पात्र-संरचना आ नाटकीय संवादक विकासमे योगदान केँ छोड़ला सँ ईशनाथ झाक मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 655, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "ईशनाथ झाक अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["केवल पुरस्कार-सूची पढ़ि", "केवल नामक वर्णक्रमसँ", "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "केवल पृष्ठ-संख्याक आधार पर"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "ईशनाथ झाक योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 656, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "ईशनाथ झाक साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["रंगमंच", "सामाजिक यथार्थ", "आधुनिक मैथिली नाटक", "अनुसंधान"], "answer": "आधुनिक मैथिली नाटक", "explanation": "ईशनाथ झाक छवि आधुनिक मैथिली नाटक केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 657, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "ईशनाथ झाक प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["केवल अनुवाद, बिना मौलिकता आ बिना भाषा-चेतना", "खगोल-गणना, मौसम-तालिका आ नुस्खा", "नाटक आ रंगमंचीय लेखन, आधुनिक मैथिली नाटक आ मंचीय संवाद, सामाजिक कथ्य, पात्र-संघर्ष आ दृश्य-संरचना", "कर-सूची, नाप-जोख आ बाजार-भाव"], "answer": "नाटक आ रंगमंचीय लेखन, आधुनिक मैथिली नाटक आ मंचीय संवाद, सामाजिक कथ्य, पात्र-संघर्ष आ दृश्य-संरचना", "explanation": "एहि शब्द-समूहमे ईशनाथ झाक विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 658, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "ईशनाथ झाक रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["लोक-संवेदना पूर्णतः हटि गेल", "आधुनिक मैथिली नाटकक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "भाषाक प्रयोग घटि गेल", "साहित्यिक विधा समाप्त भऽ गेल"], "answer": "आधुनिक मैथिली नाटकक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "ईशनाथ झाक काजसँ आधुनिक मैथिली नाटकमे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 659, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "ईशनाथ झाक योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["केवल भूगोलक नक्शा बनाबयवला प्रश्नमे", "केवल रसायनिक सूत्रक प्रश्नमे", "केवल खेलक नियम याद करयवला प्रश्नमे", "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "ईशनाथ झाक योगदान आधुनिक मैथिली नाटक आ नाटक आ रंगमंचीय लेखनक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 660, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "ईशनाथ झाक सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["ईशनाथ झा केवल पञ्जी-लेखक छलाह, साहित्यिक योगदान नहि", "ईशनाथ झाक योगदान केवल व्यापारिक लेखामे सीमित रहल", "ईशनाथ झा आधुनिक मैथिली नाटकमे नाटक आ रंगमंचीय लेखन द्वारा मैथिली रंगमंचमे सामाजिक विषय, पात्र-संरचना आ नाटकीय संवादक विकासमे योगदान", "ईशनाथ झाक मैथिली साहित्यसँ कोनो सम्बन्ध नहि"], "answer": "ईशनाथ झा आधुनिक मैथिली नाटकमे नाटक आ रंगमंचीय लेखन द्वारा मैथिली रंगमंचमे सामाजिक विषय, पात्र-संरचना आ नाटकीय संवादक विकासमे योगदान", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 661, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "सुधांशु शेखर चौधरीक मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["मिथिला-दृष्टिसँ रामकथा, सीता-शक्ति आ भक्तिपरक आख्यान केँ विस्तार देनिहार", "बेरोजगारी, सामाजिक संघर्ष, हास्य-मर्म आ मंचीय जीवनक मार्मिक प्रस्तुति देनिहार", "लोक-संवेदना, गीतात्मकता आ सरल मैथिली भाषाक काव्य-प्रवाह केँ बल देनिहार", "समकालीन यथार्थ, शहरी-बोध, आत्मसंघर्ष आ आधुनिक प्रतीक-विधान केँ स्वर देनिहार"], "answer": "बेरोजगारी, सामाजिक संघर्ष, हास्य-मर्म आ मंचीय जीवनक मार्मिक प्रस्तुति देनिहार", "explanation": "सुधांशु शेखर चौधरीक अध्ययनमे मुख्य बात बेरोजगारी, सामाजिक संघर्ष, हास्य-मर्म आ मंचीय जीवनक मार्मिक प्रस्तुति देनिहार अछि; एहि कारण हुनका सामाजिक नाटक आ मंचीय यथार्थ सँ जोड़ल जाएत अछि।"}, {"id": 662, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "सुधांशु शेखर चौधरीक संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["मैथिली नारी-चेतनाक कथा-परम्परा", "मैथिली साहित्यक इतिहास-विमर्श", "भफाइत चाहक जिनगी", "बेटीक अपमान आ छीनरदेवी"], "answer": "भफाइत चाहक जिनगी", "explanation": "सुधांशु शेखर चौधरीक सन्दर्भमे भफाइत चाहक जिनगी महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ सामाजिक नाटक आ मंचीय यथार्थ स्पष्ट होइत अछि।"}, {"id": 663, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "सुधांशु शेखर चौधरी केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["महाकाव्य", "व्यंग्य", "समालोचना", "नाटक, एकांकी आ सामाजिक रंगलेखन"], "answer": "नाटक, एकांकी आ सामाजिक रंगलेखन", "explanation": "नाटक, एकांकी आ सामाजिक रंगलेखन सुधांशु शेखर चौधरीक रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 664, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "कालक्रमक दृष्टिसँ सुधांशु शेखर चौधरीक साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["आधुनिक मैथिली नाटक", "आदिकाल/पूर्व-विद्यापति साहित्य", "आधुनिक कथा-उपन्यास परम्परा", "उत्तर-विद्यापति पदावली परम्परा"], "answer": "आधुनिक मैथिली नाटक", "explanation": "सुधांशु शेखर चौधरीक योगदान आधुनिक मैथिली नाटकक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 665, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "सुधांशु शेखर चौधरीक रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["चाय-दोकानक परिवेश, महेशक संघर्ष, संवादक जीवन्तता आ सामाजिक व्यथा", "केवल वैद्यकीय नुस्खाक संग्रह", "केवल गणितीय सूत्रक व्याख्या", "ग्राम्य परिवेश"], "answer": "चाय-दोकानक परिवेश, महेशक संघर्ष, संवादक जीवन्तता आ सामाजिक व्यथा", "explanation": "चाय-दोकानक परिवेश, महेशक संघर्ष, संवादक जीवन्तता आ सामाजिक व्यथा सुधांशु शेखर चौधरीक साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 666, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "सुधांशु शेखर चौधरी पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["सामाजिक नाटक आ मंचीय यथार्थ", "केवल तिथि-स्मरण", "इतिहास-बोध", "सामाजिक यथार्थ"], "answer": "सामाजिक नाटक आ मंचीय यथार्थ", "explanation": "सुधांशु शेखर चौधरीक योगदानक सार सामाजिक नाटक आ मंचीय यथार्थ मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 667, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "सुधांशु शेखर चौधरीक योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका केवल शिलालेख पढ़ल", "कारण हुनका माध्यमेँ सामाजिक नाटक आ मंचीय यथार्थ केँ बल भेटल", "कारण हुनका केवल गणना-पद्धति बनौल", "कारण हुनका केवल राजकीय कर-सूची लिखल"], "answer": "कारण हुनका माध्यमेँ सामाजिक नाटक आ मंचीय यथार्थ केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे सुधांशु शेखर चौधरीक योगदान सामाजिक नाटक आ मंचीय यथार्थ केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 668, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "सुधांशु शेखर चौधरीक नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["साहित्यिक विधा छोड़ि केवल वंशावली पढ़ब", "केवल नाम रटि छोड़ि देब", "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "केवल शहरक नाम खोजब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "सुधांशु शेखर चौधरी केँ बुझबाक लेल भफाइत चाहक जिनगी, नाटक, एकांकी आ सामाजिक रंगलेखन आ बेरोजगारी, सामाजिक संघर्ष, हास्य-मर्म आ मंचीय जीवनक मार्मिक प्रस्तुति देनिहार केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 669, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "सुधांशु शेखर चौधरीक रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक योगदान साहित्यिक इतिहाससँ असम्बद्ध अछि", "हुनक काजमे भाषा वा समाजक प्रश्न नै अछि", "हुनक लेखन केवल प्रशासनिक परिपत्र अछि", "हुनक लेखन नाटक, एकांकी आ सामाजिक रंगलेखन मार्फत सामाजिक नाटक आ मंचीय यथार्थ केँ उभारैत अछि"], "answer": "हुनक लेखन नाटक, एकांकी आ सामाजिक रंगलेखन मार्फत सामाजिक नाटक आ मंचीय यथार्थ केँ उभारैत अछि", "explanation": "सुधांशु शेखर चौधरीक विधागत पहचान नाटक, एकांकी आ सामाजिक रंगलेखन अछि, आ ओहिसँ सामाजिक नाटक आ मंचीय यथार्थक बोध प्रबल होइत अछि।"}, {"id": 670, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "सुधांशु शेखर चौधरीक योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल मुद्रकक नाम याद रखबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "केवल मनोरंजनक नाम-सूची बनबाक लेल", "केवल पृष्ठ-संख्या गिनबाक लेल"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "सुधांशु शेखर चौधरीक भूमिका आधुनिक मैथिली नाटक आ सामाजिक नाटक आ मंचीय यथार्थक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 671, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "सुधांशु शेखर चौधरीक साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["सामाजिक नाटक आ मंचीय यथार्थ", "गद्यक परिपक्वता", "भाषा-संस्कार", "आलोचना"], "answer": "सामाजिक नाटक आ मंचीय यथार्थ", "explanation": "एहि लेखक/कविक साहित्यिक स्वर सामाजिक नाटक आ मंचीय यथार्थसँ चिन्हित कएल जा सकैत अछि।"}, {"id": 672, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "सुधांशु शेखर चौधरीक सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["सुधांशु शेखर चौधरी — कीचकवध", "सुधांशु शेखर चौधरी — मधुपक गीतिकाव्य", "सुधांशु शेखर चौधरी — मलंगियाक नाट्य-योगदान", "सुधांशु शेखर चौधरी — भफाइत चाहक जिनगी"], "answer": "सुधांशु शेखर चौधरी — भफाइत चाहक जिनगी", "explanation": "ठीक जोड़ी सुधांशु शेखर चौधरी — भफाइत चाहक जिनगी अछि।"}, {"id": 673, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "सुधांशु शेखर चौधरीक साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["मैथिलीक प्रयोगक पूर्ण अभाव", "भाषा-संवेदना सँ असम्बद्धता", "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "केवल अंकीय संकेतक प्रयोग"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "सुधांशु शेखर चौधरीक रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ नाटक, एकांकी आ सामाजिक रंगलेखनक माध्यमेँ बढ़बैत अछि।"}, {"id": 674, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "सुधांशु शेखर चौधरी पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["केवल गणितीय सूत्रक व्याख्या", "केवल विदेशी यात्रावृत्तक अनुवाद", "छन्द-सजगता", "बेरोजगारी, सामाजिक संघर्ष, हास्य-मर्म आ मंचीय जीवनक मार्मिक प्रस्तुति देनिहार"], "answer": "बेरोजगारी, सामाजिक संघर्ष, हास्य-मर्म आ मंचीय जीवनक मार्मिक प्रस्तुति देनिहार", "explanation": "बेरोजगारी, सामाजिक संघर्ष, हास्य-मर्म आ मंचीय जीवनक मार्मिक प्रस्तुति देनिहार केँ छोड़ला सँ सुधांशु शेखर चौधरीक मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 675, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "सुधांशु शेखर चौधरीक अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "केवल नामक वर्णक्रमसँ", "केवल पुरस्कार-सूची पढ़ि", "केवल छपाईक आकार देखि"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "सुधांशु शेखर चौधरीक योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 676, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "सुधांशु शेखर चौधरीक साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["सामाजिक नाटक आ मंचीय यथार्थ", "केवल राजकीय प्रशासनिक आदेशक संकलन", "केवल पञ्चाङ्गक गणना", "इतिहास-बोध"], "answer": "सामाजिक नाटक आ मंचीय यथार्थ", "explanation": "सुधांशु शेखर चौधरीक छवि सामाजिक नाटक आ मंचीय यथार्थ केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 677, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "सुधांशु शेखर चौधरीक प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["कर-सूची, नाप-जोख आ बाजार-भाव", "केवल अनुवाद, बिना मौलिकता आ बिना भाषा-चेतना", "प्रशासन, सैनिक आदेश आ दफ्तर", "नाटक, एकांकी आ सामाजिक रंगलेखन, सामाजिक नाटक आ मंचीय यथार्थ आ चाय-दोकानक परिवेश, महेशक संघर्ष, संवादक जीवन्तता आ सामाजिक व्यथा"], "answer": "नाटक, एकांकी आ सामाजिक रंगलेखन, सामाजिक नाटक आ मंचीय यथार्थ आ चाय-दोकानक परिवेश, महेशक संघर्ष, संवादक जीवन्तता आ सामाजिक व्यथा", "explanation": "एहि शब्द-समूहमे सुधांशु शेखर चौधरीक विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 678, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "सुधांशु शेखर चौधरीक रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["साहित्यिक विधा समाप्त भऽ गेल", "भाषाक प्रयोग घटि गेल", "लोक-संवेदना पूर्णतः हटि गेल", "सामाजिक नाटक आ मंचीय यथार्थक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल"], "answer": "सामाजिक नाटक आ मंचीय यथार्थक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "सुधांशु शेखर चौधरीक काजसँ सामाजिक नाटक आ मंचीय यथार्थमे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 679, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "सुधांशु शेखर चौधरीक योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे", "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "केवल रसायनिक सूत्रक प्रश्नमे", "केवल भूगोलक नक्शा बनाबयवला प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "सुधांशु शेखर चौधरीक योगदान आधुनिक मैथिली नाटक आ नाटक, एकांकी आ सामाजिक रंगलेखनक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 680, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "सुधांशु शेखर चौधरीक सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["सुधांशु शेखर चौधरीक अध्ययनमे काल, विधा आ कृति अप्रासंगिक अछि", "सुधांशु शेखर चौधरी केवल पञ्जी-लेखक छलाह, साहित्यिक योगदान नहि", "सुधांशु शेखर चौधरीक मैथिली साहित्यसँ कोनो सम्बन्ध नहि", "सुधांशु शेखर चौधरी आधुनिक मैथिली नाटकमे नाटक, एकांकी आ सामाजिक रंगलेखन द्वारा बेरोजगारी, सामाजिक संघर्ष, हास्य-मर्म आ मंचीय जीवनक मार्मिक प्रस्तुति देनिहार"], "answer": "सुधांशु शेखर चौधरी आधुनिक मैथिली नाटकमे नाटक, एकांकी आ सामाजिक रंगलेखन द्वारा बेरोजगारी, सामाजिक संघर्ष, हास्य-मर्म आ मंचीय जीवनक मार्मिक प्रस्तुति देनिहार", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 681, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "महेन्द्र मलंगियाक मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["विद्यापति-परम्पराक भक्ति-रस आ पद-माधुर्य केँ आगू बढ़ेनिहार", "समकालीन मैथिली रंगमंचमे लोकशैली, सामाजिक प्रश्न आ मंचीय प्रयोग केँ समृद्ध करनिहार", "भाषा, रंग, साहित्य-विमर्श आ समकालीन संवेदनाकेँ जोड़निहार बहुआयामी लेखक", "मैथिली रंगमंचमे सामाजिक विषय, पात्र-संरचना आ नाटकीय संवादक विकासमे योगदान"], "answer": "समकालीन मैथिली रंगमंचमे लोकशैली, सामाजिक प्रश्न आ मंचीय प्रयोग केँ समृद्ध करनिहार", "explanation": "महेन्द्र मलंगियाक अध्ययनमे मुख्य बात समकालीन मैथिली रंगमंचमे लोकशैली, सामाजिक प्रश्न आ मंचीय प्रयोग केँ समृद्ध करनिहार अछि; एहि कारण हुनका समकालीन लोक-रंग सँ जोड़ल जाएत अछि।"}, {"id": 682, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "महेन्द्र मलंगियाक संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["अमरक मुक्तक-काव्य", "मैथिली कथा-परम्परा", "विद्यापति पदावली", "मलंगियाक नाट्य-योगदान"], "answer": "मलंगियाक नाट्य-योगदान", "explanation": "महेन्द्र मलंगियाक सन्दर्भमे मलंगियाक नाट्य-योगदान महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ समकालीन लोक-रंग स्पष्ट होइत अछि।"}, {"id": 683, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "महेन्द्र मलंगिया केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["निबन्ध", "नाटक, लोक-रंग आ सामाजिक रंगधर्म", "प्रबन्ध-काव्य", "मुक्तक-काव्य"], "answer": "नाटक, लोक-रंग आ सामाजिक रंगधर्म", "explanation": "नाटक, लोक-रंग आ सामाजिक रंगधर्म महेन्द्र मलंगियाक रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 684, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "कालक्रमक दृष्टिसँ महेन्द्र मलंगियाक साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["आधुनिक कथा-उपन्यास परम्परा", "आधुनिक मैथिली नवजागरण", "आदिकाल/पूर्व-विद्यापति साहित्य", "समकालीन मैथिली रंगमंच"], "answer": "समकालीन मैथिली रंगमंच", "explanation": "महेन्द्र मलंगियाक योगदान समकालीन मैथिली रंगमंचक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 685, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "महेन्द्र मलंगियाक रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["मंचीय संवाद", "राधा-कृष्ण भाव", "लोक-भाषा, रंग-प्रयोग, सामाजिक विडम्बना आ जीवंत संवाद", "केवल व्यावसायिक हिसाब-किताबक पुस्तिका"], "answer": "लोक-भाषा, रंग-प्रयोग, सामाजिक विडम्बना आ जीवंत संवाद", "explanation": "लोक-भाषा, रंग-प्रयोग, सामाजिक विडम्बना आ जीवंत संवाद महेन्द्र मलंगियाक साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 686, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "महेन्द्र मलंगिया पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["सामाजिक यथार्थ", "समकालीन लोक-रंग", "भाषा-संस्कार", "रंगमंच"], "answer": "समकालीन लोक-रंग", "explanation": "महेन्द्र मलंगियाक योगदानक सार समकालीन लोक-रंग मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 687, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "महेन्द्र मलंगियाक योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका केवल गणना-पद्धति बनौल", "कारण हुनका केवल शिलालेख पढ़ल", "कारण हुनका साहित्यसँ सम्बन्ध नहि छल", "कारण हुनका माध्यमेँ समकालीन लोक-रंग केँ बल भेटल"], "answer": "कारण हुनका माध्यमेँ समकालीन लोक-रंग केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे महेन्द्र मलंगियाक योगदान समकालीन लोक-रंग केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 688, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "महेन्द्र मलंगियाक नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["केवल जन्म-वर्षक अनुमान करब", "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "केवल नाम रटि छोड़ि देब", "साहित्यिक विधा छोड़ि केवल वंशावली पढ़ब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "महेन्द्र मलंगिया केँ बुझबाक लेल मलंगियाक नाट्य-योगदान, नाटक, लोक-रंग आ सामाजिक रंगधर्म आ समकालीन मैथिली रंगमंचमे लोकशैली, सामाजिक प्रश्न आ मंचीय प्रयोग केँ समृद्ध करनिहार केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 689, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "महेन्द्र मलंगियाक रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक रचना केवल खगोल-गणना पर सीमित अछि", "हुनक योगदान साहित्यिक इतिहाससँ असम्बद्ध अछि", "हुनक लेखन नाटक, लोक-रंग आ सामाजिक रंगधर्म मार्फत समकालीन लोक-रंग केँ उभारैत अछि", "हुनक लेखन केवल प्रशासनिक परिपत्र अछि"], "answer": "हुनक लेखन नाटक, लोक-रंग आ सामाजिक रंगधर्म मार्फत समकालीन लोक-रंग केँ उभारैत अछि", "explanation": "महेन्द्र मलंगियाक विधागत पहचान नाटक, लोक-रंग आ सामाजिक रंगधर्म अछि, आ ओहिसँ समकालीन लोक-रंगक बोध प्रबल होइत अछि।"}, {"id": 690, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "महेन्द्र मलंगियाक योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल मनोरंजनक नाम-सूची बनबाक लेल", "केवल पृष्ठ-संख्या गिनबाक लेल", "केवल मुद्रकक नाम याद रखबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "महेन्द्र मलंगियाक भूमिका समकालीन मैथिली रंगमंच आ समकालीन लोक-रंगक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 691, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "महेन्द्र मलंगियाक साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["आलोचना", "समकालीन लोक-रंग", "छन्द-विधान", "मंचीय संवाद"], "answer": "समकालीन लोक-रंग", "explanation": "एहि लेखक/कविक साहित्यिक स्वर समकालीन लोक-रंगसँ चिन्हित कएल जा सकैत अछि।"}, {"id": 692, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "महेन्द्र मलंगियाक सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["महेन्द्र मलंगिया — अमरक मुक्तक-काव्य", "महेन्द्र मलंगिया — अंकिया नाट परम्परा", "महेन्द्र मलंगिया — नाच-पाटी आ लोक-रंग परम्परा", "महेन्द्र मलंगिया — मलंगियाक नाट्य-योगदान"], "answer": "महेन्द्र मलंगिया — मलंगियाक नाट्य-योगदान", "explanation": "ठीक जोड़ी महेन्द्र मलंगिया — मलंगियाक नाट्य-योगदान अछि।"}, {"id": 693, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "महेन्द्र मलंगियाक साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["मैथिलीक प्रयोगक पूर्ण अभाव", "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "केवल अंकीय संकेतक प्रयोग", "केवल मौन अभिनय बिना भाषा"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "महेन्द्र मलंगियाक रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ नाटक, लोक-रंग आ सामाजिक रंगधर्मक माध्यमेँ बढ़बैत अछि।"}, {"id": 694, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "महेन्द्र मलंगिया पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["केवल वैद्यकीय नुस्खाक संग्रह", "ऐतिहासिक दृष्टि", "राधा-कृष्ण भाव", "समकालीन मैथिली रंगमंचमे लोकशैली, सामाजिक प्रश्न आ मंचीय प्रयोग केँ समृद्ध करनिहार"], "answer": "समकालीन मैथिली रंगमंचमे लोकशैली, सामाजिक प्रश्न आ मंचीय प्रयोग केँ समृद्ध करनिहार", "explanation": "समकालीन मैथिली रंगमंचमे लोकशैली, सामाजिक प्रश्न आ मंचीय प्रयोग केँ समृद्ध करनिहार केँ छोड़ला सँ महेन्द्र मलंगियाक मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 695, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "महेन्द्र मलंगियाक अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["केवल छपाईक आकार देखि", "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "केवल पुरस्कार-सूची पढ़ि", "केवल नामक वर्णक्रमसँ"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "महेन्द्र मलंगियाक योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 696, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "महेन्द्र मलंगियाक साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["केवल पञ्चाङ्गक गणना", "गद्यक परिपक्वता", "लोकजीवन", "समकालीन लोक-रंग"], "answer": "समकालीन लोक-रंग", "explanation": "महेन्द्र मलंगियाक छवि समकालीन लोक-रंग केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 697, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "महेन्द्र मलंगियाक प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["केवल अनुवाद, बिना मौलिकता आ बिना भाषा-चेतना", "कर-सूची, नाप-जोख आ बाजार-भाव", "प्रशासन, सैनिक आदेश आ दफ्तर", "नाटक, लोक-रंग आ सामाजिक रंगधर्म, समकालीन लोक-रंग आ लोक-भाषा, रंग-प्रयोग, सामाजिक विडम्बना आ जीवंत संवाद"], "answer": "नाटक, लोक-रंग आ सामाजिक रंगधर्म, समकालीन लोक-रंग आ लोक-भाषा, रंग-प्रयोग, सामाजिक विडम्बना आ जीवंत संवाद", "explanation": "एहि शब्द-समूहमे महेन्द्र मलंगियाक विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 698, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "महेन्द्र मलंगियाक रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["लोक-संवेदना पूर्णतः हटि गेल", "रचना-परम्परा टूटि गेल", "साहित्यिक विधा समाप्त भऽ गेल", "समकालीन लोक-रंगक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल"], "answer": "समकालीन लोक-रंगक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "महेन्द्र मलंगियाक काजसँ समकालीन लोक-रंगमे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 699, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "महेन्द्र मलंगियाक योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["केवल खेलक नियम याद करयवला प्रश्नमे", "केवल भूगोलक नक्शा बनाबयवला प्रश्नमे", "केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे", "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "महेन्द्र मलंगियाक योगदान समकालीन मैथिली रंगमंच आ नाटक, लोक-रंग आ सामाजिक रंगधर्मक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 700, "section": 7, "sectionTitle": "७. नाटक, रंगमंच आ लोक-रंगक प्रमुख रचनाकार", "q": "महेन्द्र मलंगियाक सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["महेन्द्र मलंगियाक योगदान केवल व्यापारिक लेखामे सीमित रहल", "महेन्द्र मलंगिया समकालीन मैथिली रंगमंचमे नाटक, लोक-रंग आ सामाजिक रंगधर्म द्वारा समकालीन मैथिली रंगमंचमे लोकशैली, सामाजिक प्रश्न आ मंचीय प्रयोग केँ समृद्ध करनिहार", "महेन्द्र मलंगिया केवल पञ्जी-लेखक छलाह, साहित्यिक योगदान नहि", "महेन्द्र मलंगियाक अध्ययनमे काल, विधा आ कृति अप्रासंगिक अछि"], "answer": "महेन्द्र मलंगिया समकालीन मैथिली रंगमंचमे नाटक, लोक-रंग आ सामाजिक रंगधर्म द्वारा समकालीन मैथिली रंगमंचमे लोकशैली, सामाजिक प्रश्न आ मंचीय प्रयोग केँ समृद्ध करनिहार", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 701, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "रामदेव झाक मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["लोकसाहित्य, साहित्यिक परम्परा, आलोचना आ शोध-पद्धति केँ जोड़निहार", "प्रबन्धात्मक काव्य, भावुकता, सांस्कृतिक चेतना आ छन्द-विधानक योगदान देनिहार", "मैथिली रंगमंचमे सामाजिक कथ्य, संवाद-शक्ति आ नाटकीय संरचनाक विस्तार देनिहार", "इतिहास, समाज, संस्कृति आ पात्रक जटिलता केँ उपन्यासमे विस्तृत करनिहार"], "answer": "मैथिली रंगमंचमे सामाजिक कथ्य, संवाद-शक्ति आ नाटकीय संरचनाक विस्तार देनिहार", "explanation": "रामदेव झाक अध्ययनमे मुख्य बात मैथिली रंगमंचमे सामाजिक कथ्य, संवाद-शक्ति आ नाटकीय संरचनाक विस्तार देनिहार अछि; एहि कारण हुनका सामाजिक रंगमंच सँ जोड़ल जाएत अछि।"}, {"id": 702, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "रामदेव झाक संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["बेटीक अपमान आ छीनरदेवी", "रमेश्वरचरित मिथिला रामायण", "भफाइत चाहक जिनगी", "रामदेव झाक नाट्य योगदान"], "answer": "रामदेव झाक नाट्य योगदान", "explanation": "रामदेव झाक सन्दर्भमे रामदेव झाक नाट्य योगदान महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ सामाजिक रंगमंच स्पष्ट होइत अछि।"}, {"id": 703, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "रामदेव झा केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["नाटक आ रंगमंचीय लेखन", "निबन्ध", "गद्य-वर्णन", "गीतिकाव्य"], "answer": "नाटक आ रंगमंचीय लेखन", "explanation": "नाटक आ रंगमंचीय लेखन रामदेव झाक रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 704, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "कालक्रमक दृष्टिसँ रामदेव झाक साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["आधुनिक मैथिली नाटक", "उत्तर-विद्यापति पदावली परम्परा", "मध्यकालीन मैथिली साहित्य", "आधुनिक मैथिली नवजागरण"], "answer": "आधुनिक मैथिली नाटक", "explanation": "रामदेव झाक योगदान आधुनिक मैथिली नाटकक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 705, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "रामदेव झाक रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["केवल राजकीय प्रशासनिक आदेशक संकलन", "केवल वैद्यकीय नुस्खाक संग्रह", "विषयक सामाजिकता, पात्रक मनोभूमि आ मंचीय टकराव", "केवल विदेशी यात्रावृत्तक अनुवाद"], "answer": "विषयक सामाजिकता, पात्रक मनोभूमि आ मंचीय टकराव", "explanation": "विषयक सामाजिकता, पात्रक मनोभूमि आ मंचीय टकराव रामदेव झाक साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 706, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "रामदेव झा पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["इतिहास-बोध", "छन्द-विधान", "सामाजिक रंगमंच", "भाषा-संस्कार"], "answer": "सामाजिक रंगमंच", "explanation": "रामदेव झाक योगदानक सार सामाजिक रंगमंच मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 707, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "रामदेव झाक योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका साहित्यसँ सम्बन्ध नहि छल", "कारण हुनका मंच, भाषा वा रचना-संवेदना सँ कोनो सम्बन्ध नहि छल", "कारण हुनका माध्यमेँ सामाजिक रंगमंच केँ बल भेटल", "कारण हुनका केवल शिलालेख पढ़ल"], "answer": "कारण हुनका माध्यमेँ सामाजिक रंगमंच केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे रामदेव झाक योगदान सामाजिक रंगमंच केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 708, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "रामदेव झाक नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["साहित्यिक विधा छोड़ि केवल वंशावली पढ़ब", "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "केवल शहरक नाम खोजब", "केवल जन्म-वर्षक अनुमान करब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "रामदेव झा केँ बुझबाक लेल रामदेव झाक नाट्य योगदान, नाटक आ रंगमंचीय लेखन आ मैथिली रंगमंचमे सामाजिक कथ्य, संवाद-शक्ति आ नाटकीय संरचनाक विस्तार देनिहार केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 709, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "रामदेव झाक रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक काजमे भाषा वा समाजक प्रश्न नै अछि", "हुनक लेखन नाटक आ रंगमंचीय लेखन मार्फत सामाजिक रंगमंच केँ उभारैत अछि", "हुनक रचना केवल खगोल-गणना पर सीमित अछि", "हुनक योगदान साहित्यिक इतिहाससँ असम्बद्ध अछि"], "answer": "हुनक लेखन नाटक आ रंगमंचीय लेखन मार्फत सामाजिक रंगमंच केँ उभारैत अछि", "explanation": "रामदेव झाक विधागत पहचान नाटक आ रंगमंचीय लेखन अछि, आ ओहिसँ सामाजिक रंगमंचक बोध प्रबल होइत अछि।"}, {"id": 710, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "रामदेव झाक योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "केवल बाहरी भाषा सीखबाक लेल", "केवल पृष्ठ-संख्या गिनबाक लेल", "केवल मुद्रकक नाम याद रखबाक लेल"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "रामदेव झाक भूमिका आधुनिक मैथिली नाटक आ सामाजिक रंगमंचक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 711, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "रामदेव झाक साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["सामाजिक रंगमंच", "आलोचना", "छन्द-सजगता", "जनपक्षधरता"], "answer": "सामाजिक रंगमंच", "explanation": "एहि लेखक/कविक साहित्यिक स्वर सामाजिक रंगमंचसँ चिन्हित कएल जा सकैत अछि।"}, {"id": 712, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "रामदेव झाक सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["रामदेव झा — दत्त-वती", "रामदेव झा — अमरक मुक्तक-काव्य", "रामदेव झा — कीचकवध", "रामदेव झा — रामदेव झाक नाट्य योगदान"], "answer": "रामदेव झा — रामदेव झाक नाट्य योगदान", "explanation": "ठीक जोड़ी रामदेव झा — रामदेव झाक नाट्य योगदान अछि।"}, {"id": 713, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "रामदेव झाक साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["मैथिलीक प्रयोगक पूर्ण अभाव", "केवल अंकीय संकेतक प्रयोग", "भाषा-संवेदना सँ असम्बद्धता", "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "रामदेव झाक रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ नाटक आ रंगमंचीय लेखनक माध्यमेँ बढ़बैत अछि।"}, {"id": 714, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "रामदेव झा पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["केवल विदेशी यात्रावृत्तक अनुवाद", "राधा-कृष्ण भाव", "मंचीय संवाद", "मैथिली रंगमंचमे सामाजिक कथ्य, संवाद-शक्ति आ नाटकीय संरचनाक विस्तार देनिहार"], "answer": "मैथिली रंगमंचमे सामाजिक कथ्य, संवाद-शक्ति आ नाटकीय संरचनाक विस्तार देनिहार", "explanation": "मैथिली रंगमंचमे सामाजिक कथ्य, संवाद-शक्ति आ नाटकीय संरचनाक विस्तार देनिहार केँ छोड़ला सँ रामदेव झाक मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 715, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "रामदेव झाक अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "केवल पृष्ठ-संख्याक आधार पर", "केवल नामक वर्णक्रमसँ", "केवल पुरस्कार-सूची पढ़ि"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "रामदेव झाक योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 716, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "रामदेव झाक साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["केवल वैद्यकीय नुस्खाक संग्रह", "सामाजिक रंगमंच", "रंगमंच", "आलोचना"], "answer": "सामाजिक रंगमंच", "explanation": "रामदेव झाक छवि सामाजिक रंगमंच केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 717, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "रामदेव झाक प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["कर-सूची, नाप-जोख आ बाजार-भाव", "प्रशासन, सैनिक आदेश आ दफ्तर", "केवल अनुवाद, बिना मौलिकता आ बिना भाषा-चेतना", "नाटक आ रंगमंचीय लेखन, सामाजिक रंगमंच आ विषयक सामाजिकता, पात्रक मनोभूमि आ मंचीय टकराव"], "answer": "नाटक आ रंगमंचीय लेखन, सामाजिक रंगमंच आ विषयक सामाजिकता, पात्रक मनोभूमि आ मंचीय टकराव", "explanation": "एहि शब्द-समूहमे रामदेव झाक विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 718, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "रामदेव झाक रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["सामाजिक रंगमंचक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "भाषाक प्रयोग घटि गेल", "लोक-संवेदना पूर्णतः हटि गेल", "रचना-परम्परा टूटि गेल"], "answer": "सामाजिक रंगमंचक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "रामदेव झाक काजसँ सामाजिक रंगमंचमे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 719, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "रामदेव झाक योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे", "केवल खेलक नियम याद करयवला प्रश्नमे", "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "केवल भूगोलक नक्शा बनाबयवला प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "रामदेव झाक योगदान आधुनिक मैथिली नाटक आ नाटक आ रंगमंचीय लेखनक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 720, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "रामदेव झाक सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["रामदेव झाक मैथिली साहित्यसँ कोनो सम्बन्ध नहि", "रामदेव झा आधुनिक मैथिली नाटकमे नाटक आ रंगमंचीय लेखन द्वारा मैथिली रंगमंचमे सामाजिक कथ्य, संवाद-शक्ति आ नाटकीय संरचनाक विस्तार देनिहार", "रामदेव झाक योगदान केवल व्यापारिक लेखामे सीमित रहल", "रामदेव झाक अध्ययनमे काल, विधा आ कृति अप्रासंगिक अछि"], "answer": "रामदेव झा आधुनिक मैथिली नाटकमे नाटक आ रंगमंचीय लेखन द्वारा मैथिली रंगमंचमे सामाजिक कथ्य, संवाद-शक्ति आ नाटकीय संरचनाक विस्तार देनिहार", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 721, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "उदय नारायण सिंह ‘नचिकेता’क मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["मैथिली नाटकमे गीत, संवाद, भक्ति आ मंचीय परम्पराक विकाससँ जुड़ल नाम", "आधुनिक मैथिली साहित्यमे सामाजिक दृष्टि, कथात्मक अनुशासन आ भाषा-संस्कारक योगदान", "प्रबन्धात्मक काव्य, भावुकता, सांस्कृतिक चेतना आ छन्द-विधानक योगदान देनिहार", "भाषा, रंग, साहित्य-विमर्श आ समकालीन संवेदनाकेँ जोड़निहार बहुआयामी लेखक"], "answer": "भाषा, रंग, साहित्य-विमर्श आ समकालीन संवेदनाकेँ जोड़निहार बहुआयामी लेखक", "explanation": "उदय नारायण सिंह ‘नचिकेता’क अध्ययनमे मुख्य बात भाषा, रंग, साहित्य-विमर्श आ समकालीन संवेदनाकेँ जोड़निहार बहुआयामी लेखक अछि; एहि कारण हुनका समकालीन साहित्यिक प्रयोग सँ जोड़ल जाएत अछि।"}, {"id": 722, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "उदय नारायण सिंह ‘नचिकेता’क संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["नचिकेताक साहित्यिक योगदान", "खट्टर ककाक तरंग", "मैथिली भाषा-साहित्य विमर्श", "आधुनिक मैथिली उपन्यास-परम्परा"], "answer": "नचिकेताक साहित्यिक योगदान", "explanation": "उदय नारायण सिंह ‘नचिकेता’क सन्दर्भमे नचिकेताक साहित्यिक योगदान महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ समकालीन साहित्यिक प्रयोग स्पष्ट होइत अछि।"}, {"id": 723, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "उदय नारायण सिंह ‘नचिकेता’ केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["निबन्ध", "लोकसाहित्य", "नाटक, भाषा-विमर्श आ साहित्यिक लेखन", "गद्य-वर्णन"], "answer": "नाटक, भाषा-विमर्श आ साहित्यिक लेखन", "explanation": "नाटक, भाषा-विमर्श आ साहित्यिक लेखन उदय नारायण सिंह ‘नचिकेता’क रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 724, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "कालक्रमक दृष्टिसँ उदय नारायण सिंह ‘नचिकेता’क साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["नेपालक मध्यकालीन मैथिली नाटक", "समकालीन साहित्य आ रंग-विमर्श", "आदिकाल/पूर्व-विद्यापति साहित्य", "आधुनिक समालोचना"], "answer": "समकालीन साहित्य आ रंग-विमर्श", "explanation": "उदय नारायण सिंह ‘नचिकेता’क योगदान समकालीन साहित्य आ रंग-विमर्शक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 725, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "उदय नारायण सिंह ‘नचिकेता’क रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["विचार, प्रयोग, भाषा-सजगता आ आधुनिकता", "प्रतीकात्मकता", "लयात्मकता", "केवल वैद्यकीय नुस्खाक संग्रह"], "answer": "विचार, प्रयोग, भाषा-सजगता आ आधुनिकता", "explanation": "विचार, प्रयोग, भाषा-सजगता आ आधुनिकता उदय नारायण सिंह ‘नचिकेता’क साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 726, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "उदय नारायण सिंह ‘नचिकेता’ पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["इतिहास-बोध", "केवल मूल्य-सूची", "समकालीन साहित्यिक प्रयोग", "गद्यक परिपक्वता"], "answer": "समकालीन साहित्यिक प्रयोग", "explanation": "उदय नारायण सिंह ‘नचिकेता’क योगदानक सार समकालीन साहित्यिक प्रयोग मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 727, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "उदय नारायण सिंह ‘नचिकेता’क योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका मंच, भाषा वा रचना-संवेदना सँ कोनो सम्बन्ध नहि छल", "कारण हुनका माध्यमेँ समकालीन साहित्यिक प्रयोग केँ बल भेटल", "कारण हुनका केवल राजकीय कर-सूची लिखल", "कारण हुनका केवल गणना-पद्धति बनौल"], "answer": "कारण हुनका माध्यमेँ समकालीन साहित्यिक प्रयोग केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे उदय नारायण सिंह ‘नचिकेता’क योगदान समकालीन साहित्यिक प्रयोग केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 728, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "उदय नारायण सिंह ‘नचिकेता’क नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["केवल नाम रटि छोड़ि देब", "साहित्यिक विधा छोड़ि केवल वंशावली पढ़ब", "केवल जन्म-वर्षक अनुम
