ान करब", "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "उदय नारायण सिंह ‘नचिकेता’ केँ बुझबाक लेल नचिकेताक साहित्यिक योगदान, नाटक, भाषा-विमर्श आ साहित्यिक लेखन आ भाषा, रंग, साहित्य-विमर्श आ समकालीन संवेदनाकेँ जोड़निहार बहुआयामी लेखक केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 729, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "उदय नारायण सिंह ‘नचिकेता’क रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक काजमे भाषा वा समाजक प्रश्न नै अछि", "हुनक लेखन केवल प्रशासनिक परिपत्र अछि", "हुनक रचना केवल खगोल-गणना पर सीमित अछि", "हुनक लेखन नाटक, भाषा-विमर्श आ साहित्यिक लेखन मार्फत समकालीन साहित्यिक प्रयोग केँ उभारैत अछि"], "answer": "हुनक लेखन नाटक, भाषा-विमर्श आ साहित्यिक लेखन मार्फत समकालीन साहित्यिक प्रयोग केँ उभारैत अछि", "explanation": "उदय नारायण सिंह ‘नचिकेता’क विधागत पहचान नाटक, भाषा-विमर्श आ साहित्यिक लेखन अछि, आ ओहिसँ समकालीन साहित्यिक प्रयोगक बोध प्रबल होइत अछि।"}, {"id": 730, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "उदय नारायण सिंह ‘नचिकेता’क योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल मनोरंजनक नाम-सूची बनबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "केवल मुद्रकक नाम याद रखबाक लेल", "केवल पृष्ठ-संख्या गिनबाक लेल"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "उदय नारायण सिंह ‘नचिकेता’क भूमिका समकालीन साहित्य आ रंग-विमर्श आ समकालीन साहित्यिक प्रयोगक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 731, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "उदय नारायण सिंह ‘नचिकेता’क साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["ऐतिहासिक दृष्टि", "समकालीन साहित्यिक प्रयोग", "लोकभाषाक सहजता", "लयात्मकता"], "answer": "समकालीन साहित्यिक प्रयोग", "explanation": "एहि लेखक/कविक साहित्यिक स्वर समकालीन साहित्यिक प्रयोगसँ चिन्हित कएल जा सकैत अछि।"}, {"id": 732, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "उदय नारायण सिंह ‘नचिकेता’क सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["उदय नारायण सिंह ‘नचिकेता’ — नचिकेताक साहित्यिक योगदान", "उदय नारायण सिंह ‘नचिकेता’ — जीवकान्तक कवितात्मक योगदान", "उदय नारायण सिंह ‘नचिकेता’ — मैथिली नवजागरणक साहित्यिक प्रसंग", "उदय नारायण सिंह ‘नचिकेता’ — विद्यापति पदावली"], "answer": "उदय नारायण सिंह ‘नचिकेता’ — नचिकेताक साहित्यिक योगदान", "explanation": "ठीक जोड़ी उदय नारायण सिंह ‘नचिकेता’ — नचिकेताक साहित्यिक योगदान अछि।"}, {"id": 733, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "उदय नारायण सिंह ‘नचिकेता’क साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["केवल अंकीय संकेतक प्रयोग", "केवल मौन अभिनय बिना भाषा", "मैथिलीक प्रयोगक पूर्ण अभाव", "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "उदय नारायण सिंह ‘नचिकेता’क रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ नाटक, भाषा-विमर्श आ साहित्यिक लेखनक माध्यमेँ बढ़बैत अछि।"}, {"id": 734, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "उदय नारायण सिंह ‘नचिकेता’ पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["भाषिक अनुशासन", "ऐतिहासिक दृष्टि", "भाषा, रंग, साहित्य-विमर्श आ समकालीन संवेदनाकेँ जोड़निहार बहुआयामी लेखक", "पात्र-मनोविज्ञान"], "answer": "भाषा, रंग, साहित्य-विमर्श आ समकालीन संवेदनाकेँ जोड़निहार बहुआयामी लेखक", "explanation": "भाषा, रंग, साहित्य-विमर्श आ समकालीन संवेदनाकेँ जोड़निहार बहुआयामी लेखक केँ छोड़ला सँ उदय नारायण सिंह ‘नचिकेता’क मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 735, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "उदय नारायण सिंह ‘नचिकेता’क अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["केवल पृष्ठ-संख्याक आधार पर", "केवल पुरस्कार-सूची पढ़ि", "केवल नामक वर्णक्रमसँ", "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "उदय नारायण सिंह ‘नचिकेता’क योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 736, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "उदय नारायण सिंह ‘नचिकेता’क साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["केवल विदेशी यात्रावृत्तक अनुवाद", "स्त्री-अनुभव", "छन्द-विधान", "समकालीन साहित्यिक प्रयोग"], "answer": "समकालीन साहित्यिक प्रयोग", "explanation": "उदय नारायण सिंह ‘नचिकेता’क छवि समकालीन साहित्यिक प्रयोग केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 737, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "उदय नारायण सिंह ‘नचिकेता’क प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["कर-सूची, नाप-जोख आ बाजार-भाव", "नाटक, भाषा-विमर्श आ साहित्यिक लेखन, समकालीन साहित्यिक प्रयोग आ विचार, प्रयोग, भाषा-सजगता आ आधुनिकता", "खगोल-गणना, मौसम-तालिका आ नुस्खा", "प्रशासन, सैनिक आदेश आ दफ्तर"], "answer": "नाटक, भाषा-विमर्श आ साहित्यिक लेखन, समकालीन साहित्यिक प्रयोग आ विचार, प्रयोग, भाषा-सजगता आ आधुनिकता", "explanation": "एहि शब्द-समूहमे उदय नारायण सिंह ‘नचिकेता’क विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 738, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "उदय नारायण सिंह ‘नचिकेता’क रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["साहित्यिक विधा समाप्त भऽ गेल", "रचना-परम्परा टूटि गेल", "लोक-संवेदना पूर्णतः हटि गेल", "समकालीन साहित्यिक प्रयोगक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल"], "answer": "समकालीन साहित्यिक प्रयोगक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "उदय नारायण सिंह ‘नचिकेता’क काजसँ समकालीन साहित्यिक प्रयोगमे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 739, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "उदय नारायण सिंह ‘नचिकेता’क योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "केवल रसायनिक सूत्रक प्रश्नमे", "केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे", "केवल भूगोलक नक्शा बनाबयवला प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "उदय नारायण सिंह ‘नचिकेता’क योगदान समकालीन साहित्य आ रंग-विमर्श आ नाटक, भाषा-विमर्श आ साहित्यिक लेखनक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 740, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "उदय नारायण सिंह ‘नचिकेता’क सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["उदय नारायण सिंह ‘नचिकेता’ केवल पञ्जी-लेखक छलाह, साहित्यिक योगदान नहि", "उदय नारायण सिंह ‘नचिकेता’क योगदान केवल व्यापारिक लेखामे सीमित रहल", "उदय नारायण सिंह ‘नचिकेता’ समकालीन साहित्य आ रंग-विमर्शमे नाटक, भाषा-विमर्श आ साहित्यिक लेखन द्वारा भाषा, रंग, साहित्य-विमर्श आ समकालीन संवेदनाकेँ जोड़निहार बहुआयामी लेखक", "उदय नारायण सिंह ‘नचिकेता’क अध्ययनमे काल, विधा आ कृति अप्रासंगिक अछि"], "answer": "उदय नारायण सिंह ‘नचिकेता’ समकालीन साहित्य आ रंग-विमर्शमे नाटक, भाषा-विमर्श आ साहित्यिक लेखन द्वारा भाषा, रंग, साहित्य-विमर्श आ समकालीन संवेदनाकेँ जोड़निहार बहुआयामी लेखक", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 741, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "अरविन्द ‘अक्कू’क मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["केवल वैद्यकीय नुस्खाक संग्रह", "समकालीन रंगमंचमे नवीन विषय, युवा-चेतना, अभिनययोग्य संवाद आ प्रयोगशीलता केँ बल देनिहार", "केवल व्यावसायिक हिसाब-किताबक पुस्तिका", "मैथिली गीतक मधुरता, भाव-लालित्य आ भाषा-संस्कार केँ सुदृढ़ करनिहार"], "answer": "समकालीन रंगमंचमे नवीन विषय, युवा-चेतना, अभिनययोग्य संवाद आ प्रयोगशीलता केँ बल देनिहार", "explanation": "अरविन्द ‘अक्कू’क अध्ययनमे मुख्य बात समकालीन रंगमंचमे नवीन विषय, युवा-चेतना, अभिनययोग्य संवाद आ प्रयोगशीलता केँ बल देनिहार अछि; एहि कारण हुनका युवा रंग-प्रयोग सँ जोड़ल जाएत अछि।"}, {"id": 742, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "अरविन्द ‘अक्कू’क संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["मोहनक मुक्तक-काव्य", "अक्कूक नाट्य-योगदान", "गोविन्ददास भजनावली", "नाच-पाटी आ लोक-रंग परम्परा"], "answer": "अक्कूक नाट्य-योगदान", "explanation": "अरविन्द ‘अक्कू’क सन्दर्भमे अक्कूक नाट्य-योगदान महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ युवा रंग-प्रयोग स्पष्ट होइत अछि।"}, {"id": 743, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "अरविन्द ‘अक्कू’ केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["कथा-उपन्यास", "व्यंग्य", "नाटक, एकांकी आ रंग-प्रयोग", "भाषा-अनुसंधान"], "answer": "नाटक, एकांकी आ रंग-प्रयोग", "explanation": "नाटक, एकांकी आ रंग-प्रयोग अरविन्द ‘अक्कू’क रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 744, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "कालक्रमक दृष्टिसँ अरविन्द ‘अक्कू’क साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["आधुनिक समालोचना", "नेपालक मध्यकालीन मैथिली नाटक", "समकालीन मैथिली रंगकर्म", "आदिकाल/पूर्व-विद्यापति साहित्य"], "answer": "समकालीन मैथिली रंगकर्म", "explanation": "अरविन्द ‘अक्कू’क योगदान समकालीन मैथिली रंगकर्मक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 745, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "अरविन्द ‘अक्कू’क रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["भाषिक अनुशासन", "केवल वैद्यकीय नुस्खाक संग्रह", "केवल खेतीक माप-जोखक तालिका", "नवीन कथ्य, तेज संवाद, मंच-संवेदना आ समकालीन व्यंग्य"], "answer": "नवीन कथ्य, तेज संवाद, मंच-संवेदना आ समकालीन व्यंग्य", "explanation": "नवीन कथ्य, तेज संवाद, मंच-संवेदना आ समकालीन व्यंग्य अरविन्द ‘अक्कू’क साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 746, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "अरविन्द ‘अक्कू’ पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["जनपक्षधरता", "भाषा-संस्कार", "छन्द-विधान", "युवा रंग-प्रयोग"], "answer": "युवा रंग-प्रयोग", "explanation": "अरविन्द ‘अक्कू’क योगदानक सार युवा रंग-प्रयोग मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 747, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "अरविन्द ‘अक्कू’क योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका माध्यमेँ युवा रंग-प्रयोग केँ बल भेटल", "कारण हुनका केवल राजकीय कर-सूची लिखल", "कारण हुनका मंच, भाषा वा रचना-संवेदना सँ कोनो सम्बन्ध नहि छल", "कारण हुनका केवल गणना-पद्धति बनौल"], "answer": "कारण हुनका माध्यमेँ युवा रंग-प्रयोग केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे अरविन्द ‘अक्कू’क योगदान युवा रंग-प्रयोग केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 748, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "अरविन्द ‘अक्कू’क नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["केवल नाम रटि छोड़ि देब", "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "साहित्यिक विधा छोड़ि केवल वंशावली पढ़ब", "केवल जन्म-वर्षक अनुमान करब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "अरविन्द ‘अक्कू’ केँ बुझबाक लेल अक्कूक नाट्य-योगदान, नाटक, एकांकी आ रंग-प्रयोग आ समकालीन रंगमंचमे नवीन विषय, युवा-चेतना, अभिनययोग्य संवाद आ प्रयोगशीलता केँ बल देनिहार केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 749, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "अरविन्द ‘अक्कू’क रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक योगदान साहित्यिक इतिहाससँ असम्बद्ध अछि", "हुनक रचना केवल खगोल-गणना पर सीमित अछि", "हुनक काजमे भाषा वा समाजक प्रश्न नै अछि", "हुनक लेखन नाटक, एकांकी आ रंग-प्रयोग मार्फत युवा रंग-प्रयोग केँ उभारैत अछि"], "answer": "हुनक लेखन नाटक, एकांकी आ रंग-प्रयोग मार्फत युवा रंग-प्रयोग केँ उभारैत अछि", "explanation": "अरविन्द ‘अक्कू’क विधागत पहचान नाटक, एकांकी आ रंग-प्रयोग अछि, आ ओहिसँ युवा रंग-प्रयोगक बोध प्रबल होइत अछि।"}, {"id": 750, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "अरविन्द ‘अक्कू’क योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल मुद्रकक नाम याद रखबाक लेल", "केवल बाहरी भाषा सीखबाक लेल", "केवल मनोरंजनक नाम-सूची बनबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "अरविन्द ‘अक्कू’क भूमिका समकालीन मैथिली रंगकर्म आ युवा रंग-प्रयोगक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 751, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "अरविन्द ‘अक्कू’क साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["युवा रंग-प्रयोग", "सामाजिक यथार्थ", "गद्यक परिपक्वता", "प्रतीकात्मकता"], "answer": "युवा रंग-प्रयोग", "explanation": "एहि लेखक/कविक साहित्यिक स्वर युवा रंग-प्रयोगसँ चिन्हित कएल जा सकैत अछि।"}, {"id": 752, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "अरविन्द ‘अक्कू’क सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["अरविन्द ‘अक्कू’ — कुमार गंगानन्द सिंहक साहित्यिक योगदान", "अरविन्द ‘अक्कू’ — गोविन्ददास भजनावली", "अरविन्द ‘अक्कू’ — कीचकवध", "अरविन्द ‘अक्कू’ — अक्कूक नाट्य-योगदान"], "answer": "अरविन्द ‘अक्कू’ — अक्कूक नाट्य-योगदान", "explanation": "ठीक जोड़ी अरविन्द ‘अक्कू’ — अक्कूक नाट्य-योगदान अछि।"}, {"id": 753, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "अरविन्द ‘अक्कू’क साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["भाषा-संवेदना सँ असम्बद्धता", "केवल अंकीय संकेतक प्रयोग", "मैथिलीक प्रयोगक पूर्ण अभाव", "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "अरविन्द ‘अक्कू’क रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ नाटक, एकांकी आ रंग-प्रयोगक माध्यमेँ बढ़बैत अछि।"}, {"id": 754, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "अरविन्द ‘अक्कू’ पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["राधा-कृष्ण भाव", "केवल गणितीय सूत्रक व्याख्या", "मंचीय संवाद", "समकालीन रंगमंचमे नवीन विषय, युवा-चेतना, अभिनययोग्य संवाद आ प्रयोगशीलता केँ बल देनिहार"], "answer": "समकालीन रंगमंचमे नवीन विषय, युवा-चेतना, अभिनययोग्य संवाद आ प्रयोगशीलता केँ बल देनिहार", "explanation": "समकालीन रंगमंचमे नवीन विषय, युवा-चेतना, अभिनययोग्य संवाद आ प्रयोगशीलता केँ बल देनिहार केँ छोड़ला सँ अरविन्द ‘अक्कू’क मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 755, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "अरविन्द ‘अक्कू’क अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["केवल छपाईक आकार देखि", "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "केवल नामक वर्णक्रमसँ", "केवल पृष्ठ-संख्याक आधार पर"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "अरविन्द ‘अक्कू’क योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 756, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "अरविन्द ‘अक्कू’क साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["केवल व्यावसायिक हिसाब-किताबक पुस्तिका", "युवा रंग-प्रयोग", "जनपक्षधरता", "रंगमंच"], "answer": "युवा रंग-प्रयोग", "explanation": "अरविन्द ‘अक्कू’क छवि युवा रंग-प्रयोग केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 757, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "अरविन्द ‘अक्कू’क प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["नाटक, एकांकी आ रंग-प्रयोग, युवा रंग-प्रयोग आ नवीन कथ्य, तेज संवाद, मंच-संवेदना आ समकालीन व्यंग्य", "केवल अनुवाद, बिना मौलिकता आ बिना भाषा-चेतना", "खगोल-गणना, मौसम-तालिका आ नुस्खा", "कर-सूची, नाप-जोख आ बाजार-भाव"], "answer": "नाटक, एकांकी आ रंग-प्रयोग, युवा रंग-प्रयोग आ नवीन कथ्य, तेज संवाद, मंच-संवेदना आ समकालीन व्यंग्य", "explanation": "एहि शब्द-समूहमे अरविन्द ‘अक्कू’क विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 758, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "अरविन्द ‘अक्कू’क रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["लोक-संवेदना पूर्णतः हटि गेल", "युवा रंग-प्रयोगक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "भाषाक प्रयोग घटि गेल", "रचना-परम्परा टूटि गेल"], "answer": "युवा रंग-प्रयोगक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "अरविन्द ‘अक्कू’क काजसँ युवा रंग-प्रयोगमे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 759, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "अरविन्द ‘अक्कू’क योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे", "केवल खेलक नियम याद करयवला प्रश्नमे", "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "केवल रसायनिक सूत्रक प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "अरविन्द ‘अक्कू’क योगदान समकालीन मैथिली रंगकर्म आ नाटक, एकांकी आ रंग-प्रयोगक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 760, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "अरविन्द ‘अक्कू’क सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["अरविन्द ‘अक्कू’ समकालीन मैथिली रंगकर्ममे नाटक, एकांकी आ रंग-प्रयोग द्वारा समकालीन रंगमंचमे नवीन विषय, युवा-चेतना, अभिनययोग्य संवाद आ प्रयोगशीलता केँ बल देनिहार", "अरविन्द ‘अक्कू’क मैथिली साहित्यसँ कोनो सम्बन्ध नहि", "अरविन्द ‘अक्कू’ केवल पञ्जी-लेखक छलाह, साहित्यिक योगदान नहि", "अरविन्द ‘अक्कू’क योगदान केवल व्यापारिक लेखामे सीमित रहल"], "answer": "अरविन्द ‘अक्कू’ समकालीन मैथिली रंगकर्ममे नाटक, एकांकी आ रंग-प्रयोग द्वारा समकालीन रंगमंचमे नवीन विषय, युवा-चेतना, अभिनययोग्य संवाद आ प्रयोगशीलता केँ बल देनिहार", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 761, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "बेचन ठाकुरक मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["मैथिली भाषा-सम्मान, रामकाव्य, छन्द-विधान आ लोक-भाषिक गौरवक युगप्रवर्तक", "आधुनिक मैथिली कवितामे भाव, चिंतन, भाषा-संयम आ कलात्मकता जोड़निहार", "लोक-रंग, मंच-अनुभव, सामाजिक कथ्य आ अभिनय-परम्पराक संरक्षणमे योगदान", "समकालीन जीवन, सामाजिक परिवेश आ कथा-भाषाक विकासमे योगदान देनिहार"], "answer": "लोक-रंग, मंच-अनुभव, सामाजिक कथ्य आ अभिनय-परम्पराक संरक्षणमे योगदान", "explanation": "बेचन ठाकुरक अध्ययनमे मुख्य बात लोक-रंग, मंच-अनुभव, सामाजिक कथ्य आ अभिनय-परम्पराक संरक्षणमे योगदान अछि; एहि कारण हुनका लोक-रंग आ सामाजिक नाटक सँ जोड़ल जाएत अछि।"}, {"id": 762, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "बेचन ठाकुरक संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["विदितक कथा-लेखन", "नेपालक मैथिली नाट्य परम्परा", "बेटीक अपमान आ छीनरदेवी", "रमणक आलोचनात्मक लेखन"], "answer": "बेटीक अपमान आ छीनरदेवी", "explanation": "बेचन ठाकुरक सन्दर्भमे बेटीक अपमान आ छीनरदेवी महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ लोक-रंग आ सामाजिक नाटक स्पष्ट होइत अछि।"}, {"id": 763, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "बेचन ठाकुर केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["प्रबन्ध-काव्य", "गीतिकाव्य", "कथा-उपन्यास", "नाटक, मंचन आ निर्देशन"], "answer": "नाटक, मंचन आ निर्देशन", "explanation": "नाटक, मंचन आ निर्देशन बेचन ठाकुरक रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 764, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "कालक्रमक दृष्टिसँ बेचन ठाकुरक साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["लोक-रंग आ समकालीन नाट्य-प्रस्तुति", "आधुनिक कथा-उपन्यास परम्परा", "आदिकाल/पूर्व-विद्यापति साहित्य", "उत्तर-विद्यापति पदावली परम्परा"], "answer": "लोक-रंग आ समकालीन नाट्य-प्रस्तुति", "explanation": "बेचन ठाकुरक योगदान लोक-रंग आ समकालीन नाट्य-प्रस्तुतिक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 765, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "बेचन ठाकुरक रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["ग्रामीण रंगमंच, लोकभाषा, सामाजिक प्रश्न आ प्रस्तुति-कौशल", "राधा-कृष्ण भाव", "मौखिक परम्परा", "केवल विदेशी यात्रावृत्तक अनुवाद"], "answer": "ग्रामीण रंगमंच, लोकभाषा, सामाजिक प्रश्न आ प्रस्तुति-कौशल", "explanation": "ग्रामीण रंगमंच, लोकभाषा, सामाजिक प्रश्न आ प्रस्तुति-कौशल बेचन ठाकुरक साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 766, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "बेचन ठाकुर पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["गद्यक परिपक्वता", "लोक-रंग आ सामाजिक नाटक", "जनपक्षधरता", "छन्द-विधान"], "answer": "लोक-रंग आ सामाजिक नाटक", "explanation": "बेचन ठाकुरक योगदानक सार लोक-रंग आ सामाजिक नाटक मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 767, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "बेचन ठाकुरक योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका साहित्यसँ सम्बन्ध नहि छल", "कारण हुनका केवल शिलालेख पढ़ल", "कारण हुनका केवल राजकीय कर-सूची लिखल", "कारण हुनका माध्यमेँ लोक-रंग आ सामाजिक नाटक केँ बल भेटल"], "answer": "कारण हुनका माध्यमेँ लोक-रंग आ सामाजिक नाटक केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे बेचन ठाकुरक योगदान लोक-रंग आ सामाजिक नाटक केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 768, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "बेचन ठाकुरक नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["साहित्यिक विधा छोड़ि केवल वंशावली पढ़ब", "केवल शहरक नाम खोजब", "केवल नाम रटि छोड़ि देब", "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "बेचन ठाकुर केँ बुझबाक लेल बेटीक अपमान आ छीनरदेवी, नाटक, मंचन आ निर्देशन आ लोक-रंग, मंच-अनुभव, सामाजिक कथ्य आ अभिनय-परम्पराक संरक्षणमे योगदान केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 769, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "बेचन ठाकुरक रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक काजमे भाषा वा समाजक प्रश्न नै अछि", "हुनक लेखन नाटक, मंचन आ निर्देशन मार्फत लोक-रंग आ सामाजिक नाटक केँ उभारैत अछि", "हुनक योगदान साहित्यिक इतिहाससँ असम्बद्ध अछि", "हुनक लेखन केवल प्रशासनिक परिपत्र अछि"], "answer": "हुनक लेखन नाटक, मंचन आ निर्देशन मार्फत लोक-रंग आ सामाजिक नाटक केँ उभारैत अछि", "explanation": "बेचन ठाकुरक विधागत पहचान नाटक, मंचन आ निर्देशन अछि, आ ओहिसँ लोक-रंग आ सामाजिक नाटकक बोध प्रबल होइत अछि।"}, {"id": 770, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "बेचन ठाकुरक योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल मनोरंजनक नाम-सूची बनबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "केवल मुद्रकक नाम याद रखबाक लेल", "केवल पृष्ठ-संख्या गिनबाक लेल"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "बेचन ठाकुरक भूमिका लोक-रंग आ समकालीन नाट्य-प्रस्तुति आ लोक-रंग आ सामाजिक नाटकक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 771, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "बेचन ठाकुरक साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["पात्र-मनोविज्ञान", "मंचीय संवाद", "सामाजिक चेतना", "लोक-रंग आ सामाजिक नाटक"], "answer": "लोक-रंग आ सामाजिक नाटक", "explanation": "एहि लेखक/कविक साहित्यिक स्वर लोक-रंग आ सामाजिक नाटकसँ चिन्हित कएल जा सकैत अछि।"}, {"id": 772, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "बेचन ठाकुरक सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["बेचन ठाकुर — कुमार गंगानन्द सिंहक साहित्यिक योगदान", "बेचन ठाकुर — लोकसाहित्य-सम्बन्धी विमर्श", "बेचन ठाकुर — बेटीक अपमान आ छीनरदेवी", "बेचन ठाकुर — समकालीन मैथिली कविता सम्बन्धी योगदान"], "answer": "बेचन ठाकुर — बेटीक अपमान आ छीनरदेवी", "explanation": "ठीक जोड़ी बेचन ठाकुर — बेटीक अपमान आ छीनरदेवी अछि।"}, {"id": 773, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "बेचन ठाकुरक साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "केवल मौन अभिनय बिना भाषा", "मैथिलीक प्रयोगक पूर्ण अभाव", "केवल अंकीय संकेतक प्रयोग"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "बेचन ठाकुरक रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ नाटक, मंचन आ निर्देशनक माध्यमेँ बढ़बैत अछि।"}, {"id": 774, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "बेचन ठाकुर पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["लयात्मकता", "ग्राम्य परिवेश", "लोक-रंग, मंच-अनुभव, सामाजिक कथ्य आ अभिनय-परम्पराक संरक्षणमे योगदान", "केवल पञ्चाङ्गक गणना"], "answer": "लोक-रंग, मंच-अनुभव, सामाजिक कथ्य आ अभिनय-परम्पराक संरक्षणमे योगदान", "explanation": "लोक-रंग, मंच-अनुभव, सामाजिक कथ्य आ अभिनय-परम्पराक संरक्षणमे योगदान केँ छोड़ला सँ बेचन ठाकुरक मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 775, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "बेचन ठाकुरक अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "केवल पुरस्कार-सूची पढ़ि", "केवल पृष्ठ-संख्याक आधार पर", "केवल नामक वर्णक्रमसँ"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "बेचन ठाकुरक योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 776, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "बेचन ठाकुरक साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["अनुसंधान", "केवल पञ्चाङ्गक गणना", "आलोचना", "लोक-रंग आ सामाजिक नाटक"], "answer": "लोक-रंग आ सामाजिक नाटक", "explanation": "बेचन ठाकुरक छवि लोक-रंग आ सामाजिक नाटक केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 777, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "बेचन ठाकुरक प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["खगोल-गणना, मौसम-तालिका आ नुस्खा", "कर-सूची, नाप-जोख आ बाजार-भाव", "नाटक, मंचन आ निर्देशन, लोक-रंग आ सामाजिक नाटक आ ग्रामीण रंगमंच, लोकभाषा, सामाजिक प्रश्न आ प्रस्तुति-कौशल", "केवल अनुवाद, बिना मौलिकता आ बिना भाषा-चेतना"], "answer": "नाटक, मंचन आ निर्देशन, लोक-रंग आ सामाजिक नाटक आ ग्रामीण रंगमंच, लोकभाषा, सामाजिक प्रश्न आ प्रस्तुति-कौशल", "explanation": "एहि शब्द-समूहमे बेचन ठाकुरक विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 778, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "बेचन ठाकुरक रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["रचना-परम्परा टूटि गेल", "लोक-रंग आ सामाजिक नाटकक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "लोक-संवेदना पूर्णतः हटि गेल", "भाषाक प्रयोग घटि गेल"], "answer": "लोक-रंग आ सामाजिक नाटकक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "बेचन ठाकुरक काजसँ लोक-रंग आ सामाजिक नाटकमे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 779, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "बेचन ठाकुरक योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे", "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "केवल भूगोलक नक्शा बनाबयवला प्रश्नमे", "केवल रसायनिक सूत्रक प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "बेचन ठाकुरक योगदान लोक-रंग आ समकालीन नाट्य-प्रस्तुति आ नाटक, मंचन आ निर्देशनक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 780, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "बेचन ठाकुरक सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["बेचन ठाकुरक मैथिली साहित्यसँ कोनो सम्बन्ध नहि", "बेचन ठाकुर लोक-रंग आ समकालीन नाट्य-प्रस्तुतिमे नाटक, मंचन आ निर्देशन द्वारा लोक-रंग, मंच-अनुभव, सामाजिक कथ्य आ अभिनय-परम्पराक संरक्षणमे योगदान", "बेचन ठाकुर केवल पञ्जी-लेखक छलाह, साहित्यिक योगदान नहि", "बेचन ठाकुरक योगदान केवल व्यापारिक लेखामे सीमित रहल"], "answer": "बेचन ठाकुर लोक-रंग आ समकालीन नाट्य-प्रस्तुतिमे नाटक, मंचन आ निर्देशन द्वारा लोक-रंग, मंच-अनुभव, सामाजिक कथ्य आ अभिनय-परम्पराक संरक्षणमे योगदान", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 781, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "हरिनारायण मण्डलक मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["समकालीन काव्य-चर्चा, कविता-संवेदना आ साहित्यिक संपादनक क्षेत्रमे योगदान", "विद्यापति-परम्पराक भक्ति-रस आ पद-माधुर्य केँ आगू बढ़ेनिहार", "ग्राम्य रंगमंच, नाच-पाटी, अभिनय आ नृत्यक मौखिक/मंचीय परम्परा केँ जीवित रखनिहार", "ग्राम्य-संस्कृति, लोक-संसार आ सामाजिक परिवर्तनक कथा-स्वर केँ बल देनिहार"], "answer": "ग्राम्य रंगमंच, नाच-पाटी, अभिनय आ नृत्यक मौखिक/मंचीय परम्परा केँ जीवित रखनिहार", "explanation": "हरिनारायण मण्डलक अध्ययनमे मुख्य बात ग्राम्य रंगमंच, नाच-पाटी, अभिनय आ नृत्यक मौखिक/मंचीय परम्परा केँ जीवित रखनिहार अछि; एहि कारण हुनका लोकनाट्यक जीवित परम्परा सँ जोड़ल जाएत अछि।"}, {"id": 782, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "हरिनारायण मण्डलक संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["नाच-पाटी आ लोक-रंग परम्परा", "नचिकेताक साहित्यिक योगदान", "कीचकवध", "केवल पञ्जी-सूची"], "answer": "नाच-पाटी आ लोक-रंग परम्परा", "explanation": "हरिनारायण मण्डलक सन्दर्भमे नाच-पाटी आ लोक-रंग परम्परा महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ लोकनाट्यक जीवित परम्परा स्पष्ट होइत अछि।"}, {"id": 783, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "हरिनारायण मण्डल केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["महाकाव्य", "लोक-अभिनय, नाच आ मंचीय लोककला", "लोकसाहित्य", "व्यंग्य"], "answer": "लोक-अभिनय, नाच आ मंचीय लोककला", "explanation": "लोक-अभिनय, नाच आ मंचीय लोककला हरिनारायण मण्डलक रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 784, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "कालक्रमक दृष्टिसँ हरिनारायण मण्डलक साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["आधुनिक कथा-उपन्यास परम्परा", "उत्तर-विद्यापति पदावली परम्परा", "लोकनाट्य आ नृत्य-परम्परा", "नेपालक मध्यकालीन मैथिली नाटक"], "answer": "लोकनाट्य आ नृत्य-परम्परा", "explanation": "हरिनारायण मण्डलक योगदान लोकनाट्य आ नृत्य-परम्पराक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 785, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "हरिनारायण मण्डलक रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["सामाजिक चेतना", "ऐतिहासिक दृष्टि", "लोक-नृत्य, सामुदायिक प्रस्तुति, पात्र-अभिनय आ गामक रंग-संस्कार", "लोकभाषाक सहजता"], "answer": "लोक-नृत्य, सामुदायिक प्रस्तुति, पात्र-अभिनय आ गामक रंग-संस्कार", "explanation": "लोक-नृत्य, सामुदायिक प्रस्तुति, पात्र-अभिनय आ गामक रंग-संस्कार हरिनारायण मण्डलक साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 786, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "हरिनारायण मण्डल पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["जनपक्षधरता", "केवल तिथि-स्मरण", "केवल छपाई-संख्या", "लोकनाट्यक जीवित परम्परा"], "answer": "लोकनाट्यक जीवित परम्परा", "explanation": "हरिनारायण मण्डलक योगदानक सार लोकनाट्यक जीवित परम्परा मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 787, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "हरिनारायण मण्डलक योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका मंच, भाषा वा रचना-संवेदना सँ कोनो सम्बन्ध नहि छल", "कारण हुनका साहित्यसँ सम्बन्ध नहि छल", "कारण हुनका केवल राजकीय कर-सूची लिखल", "कारण हुनका माध्यमेँ लोकनाट्यक जीवित परम्परा केँ बल भेटल"], "answer": "कारण हुनका माध्यमेँ लोकनाट्यक जीवित परम्परा केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे हरिनारायण मण्डलक योगदान लोकनाट्यक जीवित परम्परा केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 788, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "हरिनारायण मण्डलक नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["साहित्यिक विधा छोड़ि केवल वंशावली पढ़ब", "केवल शहरक नाम खोजब", "केवल नाम रटि छोड़ि देब", "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "हरिनारायण मण्डल केँ बुझबाक लेल नाच-पाटी आ लोक-रंग परम्परा, लोक-अभिनय, नाच आ मंचीय लोककला आ ग्राम्य रंगमंच, नाच-पाटी, अभिनय आ नृत्यक मौखिक/मंचीय परम्परा केँ जीवित रखनिहार केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 789, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "हरिनारायण मण्डलक रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक लेखन लोक-अभिनय, नाच आ मंचीय लोककला मार्फत लोकनाट्यक जीवित परम्परा केँ उभारैत अछि", "हुनक लेखन केवल प्रशासनिक परिपत्र अछि", "हुनक रचना केवल खगोल-गणना पर सीमित अछि", "हुनक योगदान साहित्यिक इतिहाससँ असम्बद्ध अछि"], "answer": "हुनक लेखन लोक-अभिनय, नाच आ मंचीय लोककला मार्फत लोकनाट्यक जीवित परम्परा केँ उभारैत अछि", "explanation": "हरिनारायण मण्डलक विधागत पहचान लोक-अभिनय, नाच आ मंचीय लोककला अछि, आ ओहिसँ लोकनाट्यक जीवित परम्पराक बोध प्रबल होइत अछि।"}, {"id": 790, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "हरिनारायण मण्डलक योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल बाहरी भाषा सीखबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "केवल मनोरंजनक नाम-सूची बनबाक लेल", "केवल पृष्ठ-संख्या गिनबाक लेल"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "हरिनारायण मण्डलक भूमिका लोकनाट्य आ नृत्य-परम्परा आ लोकनाट्यक जीवित परम्पराक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 791, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "हरिनारायण मण्डलक साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["लोकनाट्यक जीवित परम्परा", "मौखिक परम्परा", "छन्द-विधान", "गद्यक परिपक्वता"], "answer": "लोकनाट्यक जीवित परम्परा", "explanation": "एहि लेखक/कविक साहित्यिक स्वर लोकनाट्यक जीवित परम्परासँ चिन्हित कएल जा सकैत अछि।"}, {"id": 792, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "हरिनारायण मण्डलक सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["हरिनारायण मण्डल — नाच-पाटी आ लोक-रंग परम्परा", "हरिनारायण मण्डल — अंकिया नाट परम्परा", "हरिनारायण मण्डल — रमेश्वरचरित मिथिला रामायण", "हरिनारायण मण्डल — राजमोहन झाक साहित्य-विमर्श"], "answer": "हरिनारायण मण्डल — नाच-पाटी आ लोक-रंग परम्परा", "explanation": "ठीक जोड़ी हरिनारायण मण्डल — नाच-पाटी आ लोक-रंग परम्परा अछि।"}, {"id": 793, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "हरिनारायण मण्डलक साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "भाषा-संवेदना सँ असम्बद्धता", "मैथिलीक प्रयोगक पूर्ण अभाव", "केवल अंकीय संकेतक प्रयोग"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "हरिनारायण मण्डलक रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ लोक-अभिनय, नाच आ मंचीय लोककलाक माध्यमेँ बढ़बैत अछि।"}, {"id": 794, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "हरिनारायण मण्डल पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["भाषिक अनुशासन", "केवल पञ्चाङ्गक गणना", "ग्राम्य रंगमंच, नाच-पाटी, अभिनय आ नृत्यक मौखिक/मंचीय परम्परा केँ जीवित रखनिहार", "पात्र-मनोविज्ञान"], "answer": "ग्राम्य रंगमंच, नाच-पाटी, अभिनय आ नृत्यक मौखिक/मंचीय परम्परा केँ जीवित रखनिहार", "explanation": "ग्राम्य रंगमंच, नाच-पाटी, अभिनय आ नृत्यक मौखिक/मंचीय परम्परा केँ जीवित रखनिहार केँ छोड़ला सँ हरिनारायण मण्डलक मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 795, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "हरिनारायण मण्डलक अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["केवल पुरस्कार-सूची पढ़ि", "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "केवल नामक वर्णक्रमसँ", "केवल छपाईक आकार देखि"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "हरिनारायण मण्डलक योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 796, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "हरिनारायण मण्डलक साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["केवल शिलालेखक तिथि-सूची", "लोकनाट्यक जीवित परम्परा", "केवल विदेशी यात्रावृत्तक अनुवाद", "रंगमंच"], "answer": "लोकनाट्यक जीवित परम्परा", "explanation": "हरिनारायण मण्डलक छवि लोकनाट्यक जीवित परम्परा केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 797, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "हरिनारायण मण्डलक प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["प्रशासन, सैनिक आदेश आ दफ्तर", "खगोल-गणना, मौसम-तालिका आ नुस्खा", "लोक-अभिनय, नाच आ मंचीय लोककला, लोकनाट्यक जीवित परम्परा आ लोक-नृत्य, सामुदायिक प्रस्तुति, पात्र-अभिनय आ गामक रंग-संस्कार", "कर-सूची, नाप-जोख आ बाजार-भाव"], "answer": "लोक-अभिनय, नाच आ मंचीय लोककला, लोकनाट्यक जीवित परम्परा आ लोक-नृत्य, सामुदायिक प्रस्तुति, पात्र-अभिनय आ गामक रंग-संस्कार", "explanation": "एहि शब्द-समूहमे हरिनारायण मण्डलक विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 798, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "हरिनारायण मण्डलक रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["साहित्यिक विधा समाप्त भऽ गेल", "भाषाक प्रयोग घटि गेल", "लोकनाट्यक जीवित परम्पराक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "लोक-संवेदना पूर्णतः हटि गेल"], "answer": "लोकनाट्यक जीवित परम्पराक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "हरिनारायण मण्डलक काजसँ लोकनाट्यक जीवित परम्परामे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 799, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "हरिनारायण मण्डलक योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "केवल भूगोलक नक्शा बनाबयवला प्रश्नमे", "केवल खेलक नियम याद करयवला प्रश्नमे", "केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "हरिनारायण मण्डलक योगदान लोकनाट्य आ नृत्य-परम्परा आ लोक-अभिनय, नाच आ मंचीय लोककलाक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 800, "section": 8, "sectionTitle": "८. आधुनिक नाटक, एकांकी आ रंग-प्रयोग", "q": "हरिनारायण मण्डलक सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["हरिनारायण मण्डलक योगदान केवल व्यापारिक लेखामे सीमित रहल", "हरिनारायण मण्डल लोकनाट्य आ नृत्य-परम्परामे लोक-अभिनय, नाच आ मंचीय लोककला द्वारा ग्राम्य रंगमंच, नाच-पाटी, अभिनय आ नृत्यक मौखिक/मंचीय परम्परा केँ जीवित रखनिहार", "हरिनारायण मण्डलक मैथिली साहित्यसँ कोनो सम्बन्ध नहि", "हरिनारायण मण्डल केवल पञ्जी-लेखक छलाह, साहित्यिक योगदान नहि"], "answer": "हरिनारायण मण्डल लोकनाट्य आ नृत्य-परम्परामे लोक-अभिनय, नाच आ मंचीय लोककला द्वारा ग्राम्य रंगमंच, नाच-पाटी, अभिनय आ नृत्यक मौखिक/मंचीय परम्परा केँ जीवित रखनिहार", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 801, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "रमानाथ झाक मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["मिथिलाक इतिहास, समाज, संस्कृति आ साहित्यक अन्तरसम्बन्ध केँ स्पष्ट करनिहार", "आधुनिक मैथिली साहित्यमे सामाजिक दृष्टि, कथात्मक अनुशासन आ भाषा-संस्कारक योगदान", "मैथिली साहित्येतिहास, आलोचना-शैली, निबन्ध-विन्यास आ विद्वत्तापूर्ण मूल्यांकनक विकासमे योगदान", "लोकसाहित्य, साहित्यिक परम्परा, आलोचना आ शोध-पद्धति केँ जोड़निहार"], "answer": "मैथिली साहित्येतिहास, आलोचना-शैली, निबन्ध-विन्यास आ विद्वत्तापूर्ण मूल्यांकनक विकासमे योगदान", "explanation": "रमानाथ झाक अध्ययनमे मुख्य बात मैथिली साहित्येतिहास, आलोचना-शैली, निबन्ध-विन्यास आ विद्वत्तापूर्ण मूल्यांकनक विकासमे योगदान अछि; एहि कारण हुनका साहित्येतिहास आ आलोचना सँ जोड़ल जाएत अछि।"}, {"id": 802, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "रमानाथ झाक संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["कृष्णजन्म", "चित्रा", "मौसम-पत्रक", "मैथिली साहित्यक इतिहास-विमर्श"], "answer": "मैथिली साहित्यक इतिहास-विमर्श", "explanation": "रमानाथ झाक सन्दर्भमे मैथिली साहित्यक इतिहास-विमर्श महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ साहित्येतिहास आ आलोचना स्पष्ट होइत अछि।"}, {"id": 803, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "रमानाथ झा केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["निबन्ध, आलोचना आ साहित्येतिहास", "नाटक", "समालोचना", "भाषा-अनुसंधान"], "answer": "निबन्ध, आलोचना आ साहित्येतिहास", "explanation": "निबन्ध, आलोचना आ साहित्येतिहास रमानाथ झाक रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 804, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "कालक्रमक दृष्टिसँ रमानाथ झाक साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["आधुनिक मैथिली नवजागरण", "नेपालक मध्यकालीन मैथिली नाटक", "आधुनिक निबन्ध आ समालोचना", "आदिकाल/पूर्व-विद्यापति साहित्य"], "answer": "आधुनिक निबन्ध आ समालोचना", "explanation": "रमानाथ झाक योगदान आधुनिक निबन्ध आ समालोचनाक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 805, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "रमानाथ झाक रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["तथ्य, तर्क, इतिहास-बोध, संतुलित भाषा आ आलोचनात्मक दृष्टि", "लोकभाषाक सहजता", "केवल पञ्चाङ्गक गणना", "केवल गणितीय सूत्रक व्याख्या"], "answer": "तथ्य, तर्क, इतिहास-बोध, संतुलित भाषा आ आलोचनात्मक दृष्टि", "explanation": "तथ्य, तर्क, इतिहास-बोध, संतुलित भाषा आ आलोचनात्मक दृष्टि रमानाथ झाक साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 806, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "रमानाथ झा पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["केवल मूल्य-सूची", "इतिहास-बोध", "केवल छपाई-संख्या", "साहित्येतिहास आ आलोचना"], "answer": "साहित्येतिहास आ आलोचना", "explanation": "रमानाथ झाक योगदानक सार साहित्येतिहास आ आलोचना मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 807, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "रमानाथ झाक योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका मंच, भाषा वा रचना-संवेदना सँ कोनो सम्बन्ध नहि छल", "कारण हुनका केवल राजकीय कर-सूची लिखल", "कारण हुनका केवल शिलालेख पढ़ल", "कारण हुनका माध्यमेँ साहित्येतिहास आ आलोचना केँ बल भेटल"], "answer": "कारण हुनका माध्यमेँ साहित्येतिहास आ आलोचना केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे रमानाथ झाक योगदान साहित्येतिहास आ आलोचना केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 808, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "रमानाथ झाक नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "केवल जन्म-वर्षक अनुमान करब", "केवल नाम रटि छोड़ि देब", "केवल शहरक नाम खोजब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "रमानाथ झा केँ बुझबाक लेल मैथिली साहित्यक इतिहास-विमर्श, निबन्ध, आलोचना आ साहित्येतिहास आ मैथिली साहित्येतिहास, आलोचना-शैली, निबन्ध-विन्यास आ विद्वत्तापूर्ण मूल्यांकनक विकासमे योगदान केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 809, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "रमानाथ झाक रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक काजमे भाषा वा समाजक प्रश्न नै अछि", "हुनक लेखन केवल प्रशासनिक परिपत्र अछि", "हुनक लेखन निबन्ध, आलोचना आ साहित्येतिहास मार्फत साहित्येतिहास आ आलोचना केँ उभारैत अछि", "हुनक योगदान साहित्यिक इतिहाससँ असम्बद्ध अछि"], "answer": "हुनक लेखन निबन्ध, आलोचना आ साहित्येतिहास मार्फत साहित्येतिहास आ आलोचना केँ उभारैत अछि", "explanation": "रमानाथ झाक विधागत पहचान निबन्ध, आलोचना आ साहित्येतिहास अछि, आ ओहिसँ साहित्येतिहास आ आलोचनाक बोध प्रबल होइत अछि।"}, {"id": 810, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "रमानाथ झाक योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल पृष्ठ-संख्या गिनबाक लेल", "केवल मनोरंजनक नाम-सूची बनबाक लेल", "केवल मुद्रकक नाम याद रखबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "रमानाथ झाक भूमिका आधुनिक निबन्ध आ समालोचना आ साहित्येतिहास आ आलोचनाक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 811, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "रमानाथ झाक साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["भाषा-संस्कार", "लयात्मकता", "साहित्येतिहास आ आलोचना", "जनपक्षधरता"], "answer": "साहित्येतिहास आ आलोचना", "explanation": "एहि लेखक/कविक साहित्यिक स्वर साहित्येतिहास आ आलोचनासँ चिन्हित कएल जा सकैत अछि।"}, {"id": 812, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "रमानाथ झाक सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["रमानाथ झा — समकालीन मैथिली कविता सम्बन्धी योगदान", "रमानाथ झा — पारिजात-हरण परम्परा", "रमानाथ झा — लोरिक-विजय", "रमानाथ झा — मैथिली साहित्यक इतिहास-विमर्श"], "answer": "रमानाथ झा — मैथिली साहित्यक इतिहास-विमर्श", "explanation": "ठीक जोड़ी रमानाथ झा — मैथिली साहित्यक इतिहास-विमर्श अछि।"}, {"id": 813, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "रमानाथ झाक साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["मैथिलीक प्रयोगक पूर्ण अभाव", "केवल अंकीय संकेतक प्रयोग", "केवल मौन अभिनय बिना भाषा", "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "रमानाथ झाक रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ निबन्ध, आलोचना आ साहित्येतिहासक माध्यमेँ बढ़बैत अछि।"}, {"id": 814, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "रमानाथ झा पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["मैथिली साहित्येतिहास, आलोचना-शैली, निबन्ध-विन्यास आ विद्वत्तापूर्ण मूल्यांकनक विकासमे योगदान", "सामाजिक चेतना", "केवल व्यावसायिक हिसाब-किताबक पुस्तिका", "केवल राजकीय प्रशासनिक आदेशक संकलन"], "answer": "मैथिली साहित्येतिहास, आलोचना-शैली, निबन्ध-विन्यास आ विद्वत्तापूर्ण मूल्यांकनक विकासमे योगदान", "explanation": "मैथिली साहित्येतिहास, आलोचना-शैली, निबन्ध-विन्यास आ विद्वत्तापूर्ण मूल्यांकनक विकासमे योगदान केँ छोड़ला सँ रमानाथ झाक मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 815, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "रमानाथ झाक अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "केवल छपाईक आकार देखि", "केवल पृष्ठ-संख्याक आधार पर", "केवल पुरस्कार-सूची पढ़ि"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "रमानाथ झाक योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 816, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "रमानाथ झाक साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["लोकजीवन", "साहित्येतिहास आ आलोचना", "छन्द-विधान", "केवल गणितीय सूत्रक व्याख्या"], "answer": "साहित्येतिहास आ आलोचना", "explanation": "रमानाथ झाक छवि साहित्येतिहास आ आलोचना केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 817, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "रमानाथ झाक प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["केवल अनुवाद, बिना मौलिकता आ बिना भाषा-चेतना", "कर-सूची, नाप-जोख आ बाजार-भाव", "निबन्ध, आलोचना आ साहित्येतिहास, साहित्येतिहास आ आलोचना आ तथ्य, तर्क, इतिहास-बोध, संतुलित भाषा आ आलोचनात्मक दृष्टि", "प्रशासन, सैनिक आदेश आ दफ्तर"], "answer": "निबन्ध, आलोचना आ साहित्येतिहास, साहित्येतिहास आ आलोचना आ तथ्य, तर्क, इतिहास-बोध, संतुलित भाषा आ आलोचनात्मक दृष्टि", "explanation": "एहि शब्द-समूहमे रमानाथ झाक विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 818, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "रमानाथ झाक रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["साहित्येतिहास आ आलोचनाक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "रचना-परम्परा टूटि गेल", "लोक-संवेदना पूर्णतः हटि गेल", "भाषाक प्रयोग घटि गेल"], "answer": "साहित्येतिहास आ आलोचनाक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "रमानाथ झाक काजसँ साहित्येतिहास आ आलोचनामे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 819, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "रमानाथ झाक योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे", "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "केवल रसायनिक सूत्रक प्रश्नमे", "केवल खेलक नियम याद करयवला प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "रमानाथ झाक योगदान आधुनिक निबन्ध आ समालोचना आ निबन्ध, आलोचना आ साहित्येतिहासक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 820, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "रमानाथ झाक सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["रमानाथ झाक मैथिली साहित्यसँ कोनो सम्बन्ध नहि", "रमानाथ झा आधुनिक निबन्ध आ समालोचनामे निबन्ध, आलोचना आ साहित्येतिहास द्वारा मैथिली साहित्येतिहास, आलोचना-शैली, निबन्ध-विन्यास आ विद्वत्तापूर्ण मूल्यांकनक विकासमे योगदान", "रमानाथ झाक योगदान केवल व्यापारिक लेखामे सीमित रहल", "रमानाथ झाक अध्ययनमे काल, विधा आ कृति अप्रासंगिक अछि"], "answer": "रमानाथ झा आधुनिक निबन्ध आ समालोचनामे निबन्ध, आलोचना आ साहित्येतिहास द्वारा मैथिली साहित्येतिहास, आलोचना-शैली, निबन्ध-विन्यास आ विद्वत्तापूर्ण मूल्यांकनक विकासमे योगदान", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 821, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "जयकान्त मिश्रक मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["मैथिली साहित्यक काल-विभाजन, लेखक-परम्परा आ आलोचनात्मक अध्ययन केँ व्यवस्थित करनिहार", "महाभारत-प्रसंग केँ मैथिली महाकाव्यात्मक रूपमे प्रतिष्ठित करनिहार", "लोक-संवेदना, गीतात्मकता आ सरल मैथिली भाषाक काव्य-प्रवाह केँ बल देनिहार", "मैथिली रंगमंचमे सामाजिक विषय, पात्र-संरचना आ नाटकीय संवादक विकासमे योगदान"], "answer": "मैथिली साहित्यक काल-विभाजन, लेखक-परम्परा आ आलोचनात्मक अध्ययन केँ व्यवस्थित करनिहार", "explanation": "जयकान्त मिश्रक अध्ययनमे मुख्य बात मैथिली साहित्यक काल-विभाजन, लेखक-परम्परा आ आलोचनात्मक अध्ययन केँ व्यवस्थित करनिहार अछि; एहि कारण हुनका शोधपरक साहित्येतिहास सँ जोड़ल जाएत अछि।"}, {"id": 822, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "जयकान्त मिश्रक संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["मैथिली साहित्यक इतिहास लेखन", "आरसीक काव्य-योगदान", "मौसम-पत्रक", "कृष्णजन्म"], "answer": "मैथिली साहित्यक इतिहास लेखन", "explanation": "जयकान्त मिश्रक सन्दर्भमे मैथिली साहित्यक इतिहास लेखन महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ शोधपरक साहित्येतिहास स्पष्ट होइत अछि।"}, {"id": 823, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "जयकान्त मिश्र केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["व्यंग्य", "गद्य-वर्णन", "साहित्येतिहास, आलोचना आ भाषा-अध्ययन", "निबन्ध"], "answer": "साहित्येतिहास, आलोचना आ भाषा-अध्ययन", "explanation": "साहित्येतिहास, आलोचना आ भाषा-अध्ययन जयकान्त मिश्रक रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 824, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "कालक्रमक दृष्टिसँ जयकान्त मिश्रक साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["नेपालक मध्यकालीन मैथिली नाटक", "आधुनिक मैथिली नवजागरण", "आधुनिक शोध आ साहित्येतिहास", "आधुनिक कथा-उपन्यास परम्परा"], "answer": "आधुनिक शोध आ साहित्येतिहास", "explanation": "जयकान्त मिश्रक योगदान आधुनिक शोध आ साहित्येतिहासक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 825, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "जयकान्त मिश्रक रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["ग्राम्य परिवेश", "स्रोत-संग्रह, इतिहास-दृष्टि, तुलनात्मकता आ विश्लेषण", "प्रतीकात्मकता", "पात्र-मनोविज्ञान"], "answer": "स्रोत-संग्रह, इतिहास-दृष्टि, तुलनात्मकता आ विश्लेषण", "explanation": "स्रोत-संग्रह, इतिहास-दृष्टि, तुलनात्मकता आ विश्लेषण जयकान्त मिश्रक साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 826, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "जयकान्त मिश्र पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["आलोचना", "अनुसंधान", "शोधपरक साहित्येतिहास", "सामाजिक यथार्थ"], "answer": "शोधपरक साहित्येतिहास", "explanation": "जयकान्त मिश्रक योगदानक सार शोधपरक साहित्येतिहास मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 827, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "जयकान्त मिश्रक योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका माध्यमेँ शोधपरक साहित्येतिहास केँ बल भेटल", "कारण हुनका केवल गणना-पद्धति बनौल", "कारण हुनका मंच, भाषा वा रचना-संवेदना सँ कोनो सम्बन्ध नहि छल", "कारण हुनका केवल शिलालेख पढ़ल"], "answer": "कारण हुनका माध्यमेँ शोधपरक साहित्येतिहास केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे जयकान्त मिश्रक योगदान शोधपरक साहित्येतिहास केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 828, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "जयकान्त मिश्रक नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["साहित्यिक विधा छोड़ि केवल वंशावली पढ़ब", "केवल जन्म-वर्षक अनुमान करब", "केवल नाम रटि छोड़ि देब", "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "जयकान्त मिश्र केँ बुझबाक लेल मैथिली साहित्यक इतिहास लेखन, साहित्येतिहास, आलोचना आ भाषा-अध्ययन आ मैथिली साहित्यक काल-विभाजन, लेखक-परम्परा आ आलोचनात्मक अध्ययन केँ व्यवस्थित करनिहार केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 829, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "जयकान्त मिश्रक रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक योगदान साहित्यिक इतिहाससँ असम्बद्ध अछि", "हुनक रचना केवल खगोल-गणना पर सीमित अछि", "हुनक काजमे भाषा वा समाजक प्रश्न नै अछि", "हुनक लेखन साहित्येतिहास, आलोचना आ भाषा-अध्ययन मार्फत शोधपरक साहित्येतिहास केँ उभारैत अछि"], "answer": "हुनक लेखन साहित्येतिहास, आलोचना आ भाषा-अध्ययन मार्फत शोधपरक साहित्येतिहास केँ उभारैत अछि", "explanation": "जयकान्त मिश्रक विधागत पहचान साहित्येतिहास, आलोचना आ भाषा-अध्ययन अछि, आ ओहिसँ शोधपरक साहित्येतिहासक बोध प्रबल होइत अछि।"}, {"id": 830, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "जयकान्त मिश्रक योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल मनोरंजनक नाम-सूची बनबाक लेल", "केवल पृष्ठ-संख्या गिनबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "केवल बाहरी भाषा सीखबाक लेल"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "जयकान्त मिश्रक भूमिका आधुनिक शोध आ साहित्येतिहास आ शोधपरक साहित्येतिहासक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 831, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "जयकान्त मिश्रक साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["राधा-कृष्ण भाव", "शृङ्गार आ भक्ति", "रंगमंच", "शोधपरक साहित्येतिहास"], "answer": "शोधपरक साहित्येतिहास", "explanation": "एहि लेखक/कविक साहित्यिक स्वर शोधपरक साहित्येतिहाससँ चिन्हित कएल जा सकैत अछि।"}, {"id": 832, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "जयकान्त मिश्रक सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["जयकान्त मिश्र — खट्टर ककाक तरंग", "जयकान्त मिश्र — मैथिली साहित्यक इतिहास लेखन", "जयकान्त मिश्र — विदितक कथा-लेखन", "जयकान्त मिश्र — समकालीन मैथिली कविता सम्बन्धी संपादन/विमर्श"], "answer": "जयकान्त मिश्र — मैथिली साहित्यक इतिहास लेखन", "explanation": "ठीक जोड़ी जयकान्त मिश्र — मैथिली साहित्यक इतिहास लेखन अछि।"}, {"id": 833, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "जयकान्त मिश्रक साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["भाषा-संवेदना सँ असम्बद्धता", "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "केवल मौन अभिनय बिना भाषा", "मैथिलीक प्रयोगक पूर्ण अभाव"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "जयकान्त मिश्रक रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ साहित्येतिहास, आलोचना आ भाषा-अध्ययनक माध्यमेँ बढ़बैत अछि।"}, {"id": 834, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "जयकान्त मिश्र पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["केवल विदेशी यात्रावृत्तक अनुवाद", "लोकभाषाक सहजता", "छन्द-सजगता", "मैथिली साहित्यक काल-विभाजन, लेखक-परम्परा आ आलोचनात्मक अध्ययन केँ व्यवस्थित करनिहार"], "answer": "मैथिली साहित्यक काल-विभाजन, लेखक-परम्परा आ आलोचनात्मक अध्ययन केँ व्यवस्थित करनिहार", "explanation": "मैथिली साहित्यक काल-विभाजन, लेखक-परम्परा आ आलोचनात्मक अध्ययन केँ व्यवस्थित करनिहार केँ छोड़ला सँ जयकान्त मिश्रक मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 835, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "जयकान्त मिश्रक अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["केवल नामक वर्णक्रमसँ", "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "केवल पुरस्कार-सूची पढ़ि", "केवल छपाईक आकार देखि"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "जयकान्त मिश्रक योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 836, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "जयकान्त मिश्रक साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["इतिहास-बोध", "शोधपरक साहित्येतिहास", "शृङ्गार आ भक्ति", "छन्द-विधान"], "answer": "शोधपरक साहित्येतिहास", "explanation": "जयकान्त मिश्रक छवि शोधपरक साहित्येतिहास केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 837, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "जयकान्त मिश्रक प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["कर-सूची, नाप-जोख आ बाजार-भाव", "प्रशासन, सैनिक आदेश आ दफ्तर", "साहित्येतिहास, आलोचना आ भाषा-अध्ययन, शोधपरक साहित्येतिहास आ स्रोत-संग्रह, इतिहास-दृष्टि, तुलनात्मकता आ विश्लेषण", "खगोल-गणना, मौसम-तालिका आ नुस्खा"], "answer": "साहित्येतिहास, आलोचना आ भाषा-अध्ययन, शोधपरक साहित्येतिहास आ स्रोत-संग्रह, इतिहास-दृष्टि, तुलनात्मकता आ विश्लेषण", "explanation": "एहि शब्द-समूहमे जयकान्त मिश्रक विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 838, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "जयकान्त मिश्रक रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["साहित्यिक विधा समाप्त भऽ गेल", "रचना-परम्परा टूटि गेल", "शोधपरक साहित्येतिहासक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "लोक-संवेदना पूर्णतः हटि गेल"], "answer": "शोधपरक साहित्येतिहासक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "जयकान्त मिश्रक काजसँ शोधपरक साहित्येतिहासमे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 839, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "जयकान्त मिश्रक योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["केवल खेलक नियम याद करयवला प्रश्नमे", "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे", "केवल भूगोलक नक्शा बनाबयवला प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "जयकान्त मिश्रक योगदान आधुनिक शोध आ साहित्येतिहास आ साहित्येतिहास, आलोचना आ भाषा-अध्ययनक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 840, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "जयकान्त मिश्रक सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["जयकान्त मिश्रक मैथिली साहित्यसँ कोनो सम्बन्ध नहि", "जयकान्त मिश्रक योगदान केवल व्यापारिक लेखामे सीमित रहल", "जयकान्त मिश्र केवल पञ्जी-लेखक छलाह, साहित्यिक योगदान नहि", "जयकान्त मिश्र आधुनिक शोध आ साहित्येतिहासमे साहित्येतिहास, आलोचना आ भाषा-अध्ययन द्वारा मैथिली साहित्यक काल-विभाजन, लेखक-परम्परा आ आलोचनात्मक अध्ययन केँ व्यवस्थित करनिहार"], "answer": "जयकान्त मिश्र आधुनिक शोध आ साहित्येतिहासमे साहित्येतिहास, आलोचना आ भाषा-अध्ययन द्वारा मैथिली साहित्यक काल-विभाजन, लेखक-परम्परा आ आलोचनात्मक अध्ययन केँ व्यवस्थित करनिहार", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 841, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "गोविन्द झाक मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["मैथिली भाषा, व्याकरण, पाठ-संपादन, साहित्यिक समीक्षा आ सांस्कृतिक शोधमे व्यापक योगदान", "केवल व्यावसायिक हिसाब-किताबक पुस्तिका", "साहित्य, संस्कृति आ भाषा-चेतना केँ आधुनिक मैथिली लेखनमे जोड़निहार", "लोक-संवेदना, गीतात्मकता आ सरल मैथिली भाषाक काव्य-प्रवाह केँ बल देनिहार"], "answer": "मैथिली भाषा, व्याकरण, पाठ-संपादन, साहित्यिक समीक्षा आ सांस्कृतिक शोधमे व्यापक योगदान", "explanation": "गोविन्द झाक अध्ययनमे मुख्य बात मैथिली भाषा, व्याकरण, पाठ-संपादन, साहित्यिक समीक्षा आ सांस्कृतिक शोधमे व्यापक योगदान अछि; एहि कारण हुनका भाषा-अनुसंधान आ सम्पादन सँ जोड़ल जाएत अछि।"}, {"id": 842, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "गोविन्द झाक संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["राजस्व-विवरण", "पारिजात-हरण परम्परा", "वर्णरत्नाकर", "मैथिली भाषा-साहित्य विमर्श"], "answer": "मैथिली भाषा-साहित्य विमर्श", "explanation": "गोविन्द झाक सन्दर्भमे मैथिली भाषा-साहित्य विमर्श महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ भाषा-अनुसंधान आ सम्पादन स्पष्ट होइत अछि।"}, {"id": 843, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "गोविन्द झा केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["गीतिकाव्य", "मुक्तक-काव्य", "व्याकरण, भाषा-विचार, निबन्ध आ सम्पादन", "कथा-उपन्यास"], "answer": "व्याकरण, भाषा-विचार, निबन्ध आ सम्पादन", "explanation": "व्याकरण, भाषा-विचार, निबन्ध आ सम्पादन गोविन्द झाक रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 844, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "कालक्रमक दृष्टिसँ गोविन्द झाक साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["आधुनिक कथा-उपन्यास परम्परा", "आधुनिक भाषा-अध्ययन आ सम्पादन", "आधुनिक मैथिली नवजागरण", "आधुनिक समालोचना"], "answer": "आधुनिक भाषा-अध्ययन आ सम्पादन", "explanation": "गोविन्द झाक योगदान आधुनिक भाषा-अध्ययन आ सम्पादनक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 845, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "गोविन्द झाक रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["भाषिक अनुशासन", "पात्र-मनोविज्ञान", "भाषिक सूक्ष्मता, पाठ-शुद्धि, अनुशासन आ पाण्डित्य", "लयात्मकता"], "answer": "भाषिक सूक्ष्मता, पाठ-शुद्धि, अनुशासन आ पाण्डित्य", "explanation": "भाषिक सूक्ष्मता, पाठ-शुद्धि, अनुशासन आ पाण्डित्य गोविन्द झाक साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 846, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "गोविन्द झा पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["गद्यक परिपक्वता", "केवल तिथि-स्मरण", "भाषा-अनुसंधान आ सम्पादन", "केवल छपाई-संख्या"], "answer": "भाषा-अनुसंधान आ सम्पादन", "explanation": "गोविन्द झाक योगदानक सार भाषा-अनुसंधान आ सम्पादन मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 847, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "गोविन्द झाक योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका साहित्यसँ सम्बन्ध नहि छल", "कारण हुनका माध्यमेँ भाषा-अनुसंधान आ सम्पादन केँ बल भेटल", "कारण हुनका केवल गणना-पद्धति बनौल", "कारण हुनका केवल शिलालेख पढ़ल"], "answer": "कारण हुनका माध्यमेँ भाषा-अनुसंधान आ सम्पादन केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे गोविन्द झाक योगदान भाषा-अनुसंधान आ सम्पादन केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 848, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "गोविन्द झाक नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "केवल नाम रटि छोड़ि देब", "केवल शहरक नाम खोजब", "केवल जन्म-वर्षक अनुमान करब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "गोविन्द झा केँ बुझबाक लेल मैथिली भाषा-साहित्य विमर्श, व्याकरण, भाषा-विचार, निबन्ध आ सम्पादन आ मैथिली भाषा, व्याकरण, पाठ-संपादन, साहित्यिक समीक्षा आ सांस्कृतिक शोधमे व्यापक योगदान केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 849, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "गोविन्द झाक रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक योगदान साहित्यिक इतिहाससँ असम्बद्ध अछि", "हुनक लेखन केवल प्रशासनिक परिपत्र अछि", "हुनक लेखन व्याकरण, भाषा-विचार, निबन्ध आ सम्पादन मार्फत भाषा-अनुसंधान आ सम्पादन केँ उभारैत अछि", "हुनक काजमे भाषा वा समाजक प्रश्न नै अछि"], "answer": "हुनक लेखन व्याकरण, भाषा-विचार, निबन्ध आ सम्पादन मार्फत भाषा-अनुसंधान आ सम्पादन केँ उभारैत अछि", "explanation": "गोविन्द झाक विधागत पहचान व्याकरण, भाषा-विचार, निबन्ध आ सम्पादन अछि, आ ओहिसँ भाषा-अनुसंधान आ सम्पादनक बोध प्रबल होइत अछि।"}, {"id": 850, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "गोविन्द झाक योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल मुद्रकक नाम याद रखबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "केवल मनोरंजनक नाम-सूची बनबाक लेल", "केवल बाहरी भाषा सीखबाक लेल"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "गोविन्द झाक भूमिका आधुनिक भाषा-अध्ययन आ सम्पादन आ भाषा-अनुसंधान आ सम्पादनक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 851, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "गोविन्द झाक साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["भाषा-अनुसंधान आ सम्पादन", "ऐतिहासिक दृष्टि", "लोकजीवन", "आलोचना"], "answer": "भाषा-अनुसंधान आ सम्पादन", "explanation": "एहि लेखक/कविक साहित्यिक स्वर भाषा-अनुसंधान आ सम्पादनसँ चिन्हित कएल जा सकैत अछि।"}, {"id": 852, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "गोविन्द झाक सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["गोविन्द झा — गोविन्ददास भजनावली", "गोविन्द झा — मैथिली भाषा-साहित्य विमर्श", "गोविन्द झा — आधुनिक नाट्य-परम्परा", "गोविन्द झा — मिथिला इतिहास-संस्कृति अध्ययन"], "answer": "गोविन्द झा — मैथिली भाषा-साहित्य विमर्श", "explanation": "ठीक जोड़ी गोविन्द झा — मैथिली भाषा-साहित्य विमर्श अछि।"}, {"id": 853, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "गोविन्द झाक साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["मैथिलीक प्रयोगक पूर्ण अभाव", "केवल मौन अभिनय बिना भाषा", "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "भाषा-संवेदना सँ असम्बद्धता"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "गोविन्द झाक रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ व्याकरण, भाषा-विचार, निबन्ध आ सम्पादनक माध्यमेँ बढ़बैत अछि।"}, {"id": 854, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "गोविन्द झा पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["मैथिली भाषा, व्याकरण, पाठ-संपादन, साहित्यिक समीक्षा आ सांस्कृतिक शोधमे व्यापक योगदान", "केवल व्यावसायिक हिसाब-किताबक पुस्तिका", "केवल वैद्यकीय नुस्खाक संग्रह", "मौखिक परम्परा"], "answer": "मैथिली भाषा, व्याकरण, पाठ-संपादन, साहित्यिक समीक्षा आ सांस्कृतिक शोधमे व्यापक योगदान", "explanation": "मैथिली भाषा, व्याकरण, पाठ-संपादन, साहित्यिक समीक्षा आ सांस्कृतिक शोधमे व्यापक योगदान केँ छोड़ला सँ गोविन्द झाक मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 855, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "गोविन्द झाक अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "केवल नामक वर्णक्रमसँ", "केवल पृष्ठ-संख्याक आधार पर", "केवल पुरस्कार-सूची पढ़ि"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "गोविन्द झाक योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 856, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "गोविन्द झाक साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["केवल विदेशी यात्रावृत्तक अनुवाद", "केवल पञ्चाङ्गक गणना", "रंगमंच", "भाषा-अनुसंधान आ सम्पादन"], "answer": "भाषा-अनुसंधान आ सम्पादन", "explanation": "गोविन्द झाक छवि भाषा-अनुसंधान आ सम्पादन केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 857, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "गोविन्द झाक प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["केवल अनुवाद, बिना मौलिकता आ बिना भाषा-चेतना", "खगोल-गणना, मौसम-तालिका आ नुस्खा", "कर-सूची, नाप-जोख आ बाजार-भाव", "व्याकरण, भाषा-विचार, निबन्ध आ सम्पादन, भाषा-अनुसंधान आ सम्पादन आ भाषिक सूक्ष्मता, पाठ-शुद्धि, अनुशासन आ पाण्डित्य"], "answer": "व्याकरण, भाषा-विचार, निबन्ध आ सम्पादन, भाषा-अनुसंधान आ सम्पादन आ भाषिक सूक्ष्मता, पाठ-शुद्धि, अनुशासन आ पाण्डित्य", "explanation": "एहि शब्द-समूहमे गोविन्द झाक विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 858, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "गोविन्द झाक रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["भाषाक प्रयोग घटि गेल", "साहित्यिक विधा समाप्त भऽ गेल", "भाषा-अनुसंधान आ सम्पादनक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "रचना-परम्परा टूटि गेल"], "answer": "भाषा-अनुसंधान आ सम्पादनक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "गोविन्द झाक काजसँ भाषा-अनुसंधान आ सम्पादनमे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 859, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "गोविन्द झाक योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे", "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "केवल भूगोलक नक्शा बनाबयवला प्रश्नमे", "केवल खेलक नियम याद करयवला प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "गोविन्द झाक योगदान आधुनिक भाषा-अध्ययन आ सम्पादन आ व्याकरण, भाषा-विचार, निबन्ध आ सम्पादनक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 860, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "गोविन्द झाक सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["गोविन्द झाक योगदान केवल व्यापारिक लेखामे सीमित रहल", "गोविन्द झाक अध्ययनमे काल, विधा आ कृति अप्रासंगिक अछि", "गोविन्द झाक मैथिली साहित्यसँ कोनो सम्बन्ध नहि", "गोविन्द झा आधुनिक भाषा-अध्ययन आ सम्पादनमे व्याकरण, भाषा-विचार, निबन्ध आ सम्पादन द्वारा मैथिली भाषा, व्याकरण, पाठ-संपादन, साहित्यिक समीक्षा आ सांस्कृतिक शोधमे व्यापक योगदान"], "answer": "गोविन्द झा आधुनिक भाषा-अध्ययन आ सम्पादनमे व्याकरण, भाषा-विचार, निबन्ध आ सम्पादन द्वारा मैथिली भाषा, व्याकरण, पाठ-संपादन, साहित्यिक समीक्षा आ सांस्कृतिक शोधमे व्यापक योगदान", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 861, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "राधाकृष्ण चौधरीक मैथिली साहित्यमे प्रमुख योगदान कोन रूपमे बुझल जाएत अछि?", "options": ["मिथिलाक इतिहास, समाज, संस्कृति आ साहित्यक अन्तरसम्बन्ध केँ स्पष्ट करनिहार", "राष्ट्र, प्रकृति, लोक-संस्कार आ भावसंपन्न कविताकेँ मैथिलीमे प्रतिष्ठा देनिहार", "केवल वैद्यकीय नुस्खाक संग्रह", "केवल राजकीय प्रशासनिक आदेशक संकलन"], "answer": "मिथिलाक इतिहास, समाज, संस्कृति आ साहित्यक अन्तरसम्बन्ध केँ स्पष्ट करनिहार", "explanation": "राधाकृष्ण चौधरीक अध्ययनमे मुख्य बात मिथिलाक इतिहास, समाज, संस्कृति आ साहित्यक अन्तरसम्बन्ध केँ स्पष्ट करनिहार अछि; एहि कारण हुनका इतिहास-संस्कृति आ साहित्य सँ जोड़ल जाएत अछि।"}, {"id": 862, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "राधाकृष्ण चौधरीक संग देल गेल कृति/सन्दर्भमे सभसँ उपयुक्त विकल्प कोन अछि?", "options": ["कृष्णजन्म", "मैथिली आलोचना-परम्परा", "समकालीन मैथिली कविता सम्बन्धी योगदान", "मिथिला इतिहास-संस्कृति अध्ययन"], "answer": "मिथिला इतिहास-संस्कृति अध्ययन", "explanation": "राधाकृष्ण चौधरीक सन्दर्भमे मिथिला इतिहास-संस्कृति अध्ययन महत्त्वपूर्ण अछि, कारण एकर माध्यमेँ इतिहास-संस्कृति आ साहित्य स्पष्ट होइत अछि।"}, {"id": 863, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "राधाकृष्ण चौधरी केँ कोन साहित्यिक विधा/क्षेत्रसँ विशेष रूपेँ जोड़ल जा सकैत अछि?", "options": ["निबन्ध", "भाषा-अनुसंधान", "इतिहास, निबन्ध, आलोचना आ शोध", "लोकसाहित्य"], "answer": "इतिहास, निबन्ध, आलोचना आ शोध", "explanation": "इतिहास, निबन्ध, आलोचना आ शोध राधाकृष्ण चौधरीक रचनात्मक पहिचानक महत्त्वपूर्ण आधार अछि।"}, {"id": 864, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "कालक्रमक दृष्टिसँ राधाकृष्ण चौधरीक साहित्यिक स्थान मुख्यतः कोन धारा मे राखल जाएत अछि?", "options": ["इतिहास, संस्कृति आ साहित्य-विमर्श", "समकालीन मैथिली साहित्य", "आधुनिक मैथिली नवजागरण", "आदिकाल/पूर्व-विद्यापति साहित्य"], "answer": "इतिहास, संस्कृति आ साहित्य-विमर्श", "explanation": "राधाकृष्ण चौधरीक योगदान इतिहास, संस्कृति आ साहित्य-विमर्शक प्रसंगमे देखला पर हुनक साहित्यिक भूमिका नीकसँ बुझाइत अछि।"}, {"id": 865, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "राधाकृष्ण चौधरीक रचना-कर्मक एक प्रमुख विशेषता की अछि?", "options": ["राधा-कृष्ण भाव", "सामाजिक चेतना", "ग्राम्य परिवेश", "ऐतिहासिक साक्ष्य, सांस्कृतिक विश्लेषण, सामाजिक दृष्टि आ स्रोत-चेतना"], "answer": "ऐतिहासिक साक्ष्य, सांस्कृतिक विश्लेषण, सामाजिक दृष्टि आ स्रोत-चेतना", "explanation": "ऐतिहासिक साक्ष्य, सांस्कृतिक विश्लेषण, सामाजिक दृष्टि आ स्रोत-चेतना राधाकृष्ण चौधरीक साहित्यिक योगदानकेँ अलग पहिचान दैत अछि।"}, {"id": 866, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "राधाकृष्ण चौधरी पर संक्षिप्त टिप्पणी लिखैत समय मुख्य केन्द्र-बिन्दु कोन होयबाक चाही?", "options": ["इतिहास-संस्कृति आ साहित्य", "शृङ्गार आ भक्ति", "आलोचना", "सामाजिक यथार्थ"], "answer": "इतिहास-संस्कृति आ साहित्य", "explanation": "राधाकृष्ण चौधरीक योगदानक सार इतिहास-संस्कृति आ साहित्य मे भेटैत अछि; एहि बिन्दुसँ उत्तर अधिक केन्द्रित बनैत अछि।"}, {"id": 867, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "राधाकृष्ण चौधरीक योगदान मैथिली साहित्यक विकासमे किएक महत्त्वपूर्ण मानल जाएत अछि?", "options": ["कारण हुनका केवल गणना-पद्धति बनौल", "कारण हुनका साहित्यसँ सम्बन्ध नहि छल", "कारण हुनका केवल राजकीय कर-सूची लिखल", "कारण हुनका माध्यमेँ इतिहास-संस्कृति आ साहित्य केँ बल भेटल"], "answer": "कारण हुनका माध्यमेँ इतिहास-संस्कृति आ साहित्य केँ बल भेटल", "explanation": "मैथिली साहित्यक इतिहासमे राधाकृष्ण चौधरीक योगदान इतिहास-संस्कृति आ साहित्य केँ सुदृढ़ करबाक कारणसँ महत्त्वपूर्ण अछि।"}, {"id": 868, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "राधाकृष्ण चौधरीक नाम सुनिते कोन अध्ययन-दृष्टि अपनाबी?", "options": ["केवल शहरक नाम खोजब", "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "साहित्यिक विधा छोड़ि केवल वंशावली पढ़ब", "केवल नाम रटि छोड़ि देब"], "answer": "हुनक कृति, विधा, काल आ योगदानक आपसी सम्बन्ध देखब", "explanation": "राधाकृष्ण चौधरी केँ बुझबाक लेल मिथिला इतिहास-संस्कृति अध्ययन, इतिहास, निबन्ध, आलोचना आ शोध आ मिथिलाक इतिहास, समाज, संस्कृति आ साहित्यक अन्तरसम्बन्ध केँ स्पष्ट करनिहार केँ एकसाथ देखब आवश्यक अछि।"}, {"id": 869, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "राधाकृष्ण चौधरीक रचनात्मक पहिचानक तुलना करैत कोन कथन ठीक अछि?", "options": ["हुनक योगदान साहित्यिक इतिहाससँ असम्बद्ध अछि", "हुनक रचना केवल खगोल-गणना पर सीमित अछि", "हुनक लेखन इतिहास, निबन्ध, आलोचना आ शोध मार्फत इतिहास-संस्कृति आ साहित्य केँ उभारैत अछि", "हुनक काजमे भाषा वा समाजक प्रश्न नै अछि"], "answer": "हुनक लेखन इतिहास, निबन्ध, आलोचना आ शोध मार्फत इतिहास-संस्कृति आ साहित्य केँ उभारैत अछि", "explanation": "राधाकृष्ण चौधरीक विधागत पहचान इतिहास, निबन्ध, आलोचना आ शोध अछि, आ ओहिसँ इतिहास-संस्कृति आ साहित्यक बोध प्रबल होइत अछि।"}, {"id": 870, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "राधाकृष्ण चौधरीक योगदानक पाठ्यक्रमीय महत्त्व की अछि?", "options": ["केवल बाहरी भाषा सीखबाक लेल", "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "केवल पृष्ठ-संख्या गिनबाक लेल", "केवल मुद्रकक नाम याद रखबाक लेल"], "answer": "विभिन्न कालक साहित्यिक विकास बुझबाक लेल हुनक भूमिका उपयोगी अछि", "explanation": "राधाकृष्ण चौधरीक भूमिका इतिहास, संस्कृति आ साहित्य-विमर्श आ इतिहास-संस्कृति आ साहित्यक कारण पाठ्यक्रममे उपयोगी बनैत अछि।"}, {"id": 871, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "राधाकृष्ण चौधरीक साहित्यिक योगदानक मूल स्वर कोन अछि?", "options": ["प्रतीकात्मकता", "जनपक्षधरता", "इतिहास-संस्कृति आ साहित्य", "लोकभाषाक सहजता"], "answer": "इतिहास-संस्कृति आ साहित्य", "explanation": "एहि लेखक/कविक साहित्यिक स्वर इतिहास-संस्कृति आ साहित्यसँ चिन्हित कएल जा सकैत अछि।"}, {"id": 872, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "राधाकृष्ण चौधरीक सम्बन्धमे कोन जोड़ी ठीक अछि?", "options": ["राधाकृष्ण चौधरी — मिथिला इतिहास-संस्कृति अध्ययन", "राधाकृष्ण चौधरी — आरसीक काव्य-योगदान", "राधाकृष्ण चौधरी — मैथिली नवजागरणक साहित्यिक प्रसंग", "राधाकृष्ण चौधरी — गोविन्ददास भजनावली"], "answer": "राधाकृष्ण चौधरी — मिथिला इतिहास-संस्कृति अध्ययन", "explanation": "ठीक जोड़ी राधाकृष्ण चौधरी — मिथिला इतिहास-संस्कृति अध्ययन अछि।"}, {"id": 873, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "राधाकृष्ण चौधरीक साहित्यिक योगदानमे भाषा सम्बन्धी कोन पक्ष देखल जा सकैत अछि?", "options": ["मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "केवल अंकीय संकेतक प्रयोग", "मैथिलीक प्रयोगक पूर्ण अभाव", "केवल मौन अभिनय बिना भाषा"], "answer": "मैथिली अभिव्यक्तिक क्षमता आ विधागत प्रयोगक विस्तार", "explanation": "राधाकृष्ण चौधरीक रचनात्मकता मैथिली भाषाक प्रयोग-क्षमता केँ इतिहास, निबन्ध, आलोचना आ शोधक माध्यमेँ बढ़बैत अछि।"}, {"id": 874, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "राधाकृष्ण चौधरी पर प्रश्न बनल हो तऽ उत्तरमे कोन बात छोड़ल नै जाय?", "options": ["छन्द-सजगता", "केवल पञ्चाङ्गक गणना", "प्रतीकात्मकता", "मिथिलाक इतिहास, समाज, संस्कृति आ साहित्यक अन्तरसम्बन्ध केँ स्पष्ट करनिहार"], "answer": "मिथिलाक इतिहास, समाज, संस्कृति आ साहित्यक अन्तरसम्बन्ध केँ स्पष्ट करनिहार", "explanation": "मिथिलाक इतिहास, समाज, संस्कृति आ साहित्यक अन्तरसम्बन्ध केँ स्पष्ट करनिहार केँ छोड़ला सँ राधाकृष्ण चौधरीक मूल साहित्यिक भूमिका स्पष्ट नहि होयत।"}, {"id": 875, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "राधाकृष्ण चौधरीक अध्ययनकेँ कोन पद्धति सँ अधिक नीक बुझल जा सकैत अछि?", "options": ["केवल पुरस्कार-सूची पढ़ि", "केवल छपाईक आकार देखि", "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "केवल नामक वर्णक्रमसँ"], "answer": "काल, विधा, प्रमुख कृति आ योगदान—चारूकेँ मिलाकऽ", "explanation": "राधाकृष्ण चौधरीक योगदान बहुआयामी अछि; तें काल, विधा, कृति आ योगदान केँ जोड़ि देखब आवश्यक अछि।"}, {"id": 876, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "राधाकृष्ण चौधरीक साहित्यिक छवि मुख्यतः ककरा बल दैत अछि?", "options": ["इतिहास-संस्कृति आ साहित्य", "शृङ्गार आ भक्ति", "केवल खेतीक माप-जोखक तालिका", "स्त्री-अनुभव"], "answer": "इतिहास-संस्कृति आ साहित्य", "explanation": "राधाकृष्ण चौधरीक छवि इतिहास-संस्कृति आ साहित्य केँ बल देबाक कारण अलग चिन्हाइत अछि।"}, {"id": 877, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "राधाकृष्ण चौधरीक प्रमुख योगदान बुझबाक लेल कोन शब्द-समूह सर्वाधिक उपयुक्त अछि?", "options": ["खगोल-गणना, मौसम-तालिका आ नुस्खा", "इतिहास, निबन्ध, आलोचना आ शोध, इतिहास-संस्कृति आ साहित्य आ ऐतिहासिक साक्ष्य, सांस्कृतिक विश्लेषण, सामाजिक दृष्टि आ स्रोत-चेतना", "केवल अनुवाद, बिना मौलिकता आ बिना भाषा-चेतना", "कर-सूची, नाप-जोख आ बाजार-भाव"], "answer": "इतिहास, निबन्ध, आलोचना आ शोध, इतिहास-संस्कृति आ साहित्य आ ऐतिहासिक साक्ष्य, सांस्कृतिक विश्लेषण, सामाजिक दृष्टि आ स्रोत-चेतना", "explanation": "एहि शब्द-समूहमे राधाकृष्ण चौधरीक विधा, केन्द्र आ शैली तीनू समाहित अछि।"}, {"id": 878, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "राधाकृष्ण चौधरीक रचना/योगदानसँ मैथिली साहित्यकेँ कोन लाभ भेटल?", "options": ["इतिहास-संस्कृति आ साहित्यक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "रचना-परम्परा टूटि गेल", "साहित्यिक विधा समाप्त भऽ गेल", "भाषाक प्रयोग घटि गेल"], "answer": "इतिहास-संस्कृति आ साहित्यक क्षेत्रमे अभिव्यक्ति अधिक सुदृढ़ भेल", "explanation": "राधाकृष्ण चौधरीक काजसँ इतिहास-संस्कृति आ साहित्यमे मैथिली अभिव्यक्ति विस्तार पबैत अछि।"}, {"id": 879, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "राधाकृष्ण चौधरीक योगदान केँ कोन प्रकारक प्रश्नमे उपयोगी मानल जाएत?", "options": ["केवल गणितक प्रमेय सिद्ध करयवला प्रश्नमे", "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "केवल खेलक नियम याद करयवला प्रश्नमे", "केवल रसायनिक सूत्रक प्रश्नमे"], "answer": "लेखकक योगदान, काल-प्रवृत्ति आ विधा-विकास सम्बन्धी प्रश्नमे", "explanation": "राधाकृष्ण चौधरीक योगदान इतिहास, संस्कृति आ साहित्य-विमर्श आ इतिहास, निबन्ध, आलोचना आ शोधक कारण साहित्येतिहासक प्रश्नमे उपयोगी अछि।"}, {"id": 880, "section": 9, "sectionTitle": "९. निबन्ध, समालोचना, इतिहास आ भाषा-अनुसंधान", "q": "राधाकृष्ण चौधरीक सम्बन्धमे सही सार-वाक्य कोन अछि?", "options": ["राधाकृष्ण चौधरी केवल पञ्जी-लेखक छलाह, साहित्यिक योगदान नहि", "राधाकृष्ण चौधरी इतिहास, संस्कृति आ साहित्य-विमर्शमे इतिहास, निबन्ध, आलोचना आ शोध द्वारा मिथिलाक इतिहास, समाज, संस्कृति आ साहित्यक अन्तरसम्बन्ध केँ स्पष्ट करनिहार", "राधाकृष्ण चौधरीक योगदान केवल व्यापारिक लेखामे सीमित रहल", "राधाकृष्ण चौधरीक मैथिली साहित्यसँ कोनो सम्बन्ध नहि"], "answer": "राधाकृष्ण चौधरी इतिहास, संस्कृति आ साहित्य-विमर्शमे इतिहास, निबन्ध, आलोचना आ शोध द्वारा मिथिलाक इतिहास, समाज, संस्कृति आ साहित्यक अन्तरसम्बन्ध केँ स्पष्ट करनिहार", "explanation": "एहि सार-वाक्यमे काल, विधा आ योगदान—तीनू एकसाथ अछि।"}, {"id": 881, "section": 9, "sectionTitle":
