let current = 0;
let answers = new Array(DATA.questions.length).fill(null);
let revealed = new Array(DATA.questions.length).fill(false);
const nav = document.getElementById('nav');
const grid = document.getElementById('quizGrid');
const sectionTitle = document.getElementById('sectionTitle');
const sectionDesc = document.getElementById('sectionDesc');
const score = document.getElementById('score');
const search = document.getElementById('search');
function makeNav(){
  nav.innerHTML='';
  DATA.sections.forEach((s,i)=>{
    const b=document.createElement('button');
    b.textContent=(i+1)+'. '+s.title;
    b.className=i===current?'active':'';
    b.onclick=()=>{current=i;search.value='';render();window.scrollTo({top:0,behavior:'smooth'})};
    nav.appendChild(b);
  });
}
function card(q){
  const div=document.createElement('div');
  div.className='card';
  div.dataset.text=(q.q+' '+q.options.join(' ')+' '+q.explain).toLowerCase();
  const chosen=answers[q.id-1];
  const isRev=revealed[q.id-1];
  div.innerHTML='<span class="qno">प्रश्न '+q.id+'</span><div class="q"></div><div class="opts"></div><button class="smallbtn">उत्तर देखू</button><div class="feedback"></div>';
  div.querySelector('.q').textContent=q.q;
  const opts=div.querySelector('.opts');
  q.options.forEach((o,idx)=>{
    const b=document.createElement('button');
    b.className='opt';
    b.textContent=o;
    if(chosen!==null || isRev){
      if(idx===q.answer)b.classList.add('correct');
      if(chosen===idx && idx!==q.answer)b.classList.add('wrong');
    }
    b.onclick=()=>{answers[q.id-1]=idx;revealed[q.id-1]=true;render();};
    opts.appendChild(b);
  });
  const fb=div.querySelector('.feedback');
  if(chosen!==null || isRev){
    fb.classList.add('show');
    const ok = chosen===q.answer;
    fb.innerHTML='<b>'+(chosen===null?'सही उत्तर: ':ok?'सही उत्तर। ':'गलत उत्तर। सही उत्तर: ')+'</b>'+q.options[q.answer]+'<br>'+q.explain;
  }
  div.querySelector('.smallbtn').onclick=()=>{revealed[q.id-1]=true;render();};
  return div;
}
function render(){
  makeNav();
  sectionTitle.textContent=DATA.sections[current].title;
  sectionDesc.textContent=DATA.sections[current].desc;
  const term=search.value.trim().toLowerCase();
  grid.innerHTML='';
  const qs=DATA.questions.filter(q=>q.section===current);
  let shown=0;
  qs.forEach(q=>{
    const c=card(q);
    if(term && !c.dataset.text.includes(term)) c.classList.add('hidden'); else shown++;
    grid.appendChild(c);
  });
  if(term) score.textContent='एहि खण्डमे खोज अनुसार '+shown+' प्रश्न देखाइत अछि।';
}
function evaluate(){
  let attempted=0, correct=0;
  DATA.questions.forEach(q=>{const a=answers[q.id-1]; if(a!==null){attempted++; if(a===q.answer)correct++;}});
  score.textContent='कुल प्रयास: '+attempted+' / '+DATA.questions.length+' | सही: '+correct+' | गलत: '+(attempted-correct)+' | बाँकी: '+(DATA.questions.length-attempted);
}
document.getElementById('evalBtn').onclick=evaluate;
document.getElementById('showBtn').onclick=()=>{DATA.questions.filter(q=>q.section===current).forEach(q=>revealed[q.id-1]=true);render();};
document.getElementById('resetBtn').onclick=()=>{answers.fill(null);revealed.fill(false);score.textContent='कुल १००० प्रश्न। ऊपरक खण्ड-लिंक सँ विषय चुनू।';render();};
search.oninput=render;
render();
</script>
